<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#F4ECEA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ratio" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Ratio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#F4ECEA;--surface:#FCF6F4;--ink:#322B2A;--muted:#8C8079;--accent:#B25E6A;--tint:#F3DDE0;--line:rgba(50,43,42,0.10);--brand:#49423A;--on-brand:#F4ECEA;--on-brand-dim:rgba(244,236,234,.7);--font-ui:'Inter',-apple-system,"Segoe UI",system-ui,sans-serif;--font-display:'Fraunces',Georgia,serif;--font-mono:'Space Mono',ui-monospace,"SF Mono",Menlo,monospace}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);position:fixed;top:0;left:0;right:0;height:100dvh;display:flex;flex-direction:column}
  .board{flex:1;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
  .bhead{background:var(--brand);display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:var(--on-brand);min-height:60px}
  .bhead svg path{fill:var(--on-brand)}
  .bhead .logo{width:38px;height:38px;display:block}
  .bhead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .hright{display:flex;flex-direction:column;align-items:flex-end;gap:1px;line-height:1}
  #who{font-size:11px;color:var(--on-brand);opacity:.7;font-weight:500}
  #who:empty{display:none}
  .clock{font-size:26px;font-weight:700;font-family:var(--font-mono);color:var(--on-brand);letter-spacing:0}
  .feed{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .ctitle{display:none;padding:11px 16px 10px;font-size:15px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--line);font-family:var(--font-display)}
  .ctitle .ct-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ctitle .ct-week{font-size:15px;font-weight:700;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ctitle .ct-sub{font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
  .ct-hist{display:flex;align-items:center;gap:3px;flex:0 0 auto;border:none;background:var(--accent-tint,#F3DDE0);color:var(--accent-ink,#6E2F39);font-family:inherit;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .ct-hist{font-family:var(--font-ui)}
  .ct-hist:active{opacity:.75}
  .ct-hist .ct-hist-arr{font-size:15px;line-height:1;margin-left:1px}
  .ctitle .ct-rt{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .ct-na{display:flex;align-items:center;flex:0 0 auto;border:1.5px solid var(--accent);background:var(--surface);color:var(--accent);font-family:var(--font-ui);font-size:11.5px;font-weight:700;padding:5px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;letter-spacing:.02em}
  .ct-na:active{background:var(--tint)}
  .ctitle.show{display:block}
  .plan-done{display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 28px 40px}
  .plan-done .pd-ic{width:64px;height:64px;border-radius:50%;background:var(--success-tint,#E2EADD);color:var(--success,#5E8C61);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .plan-done .pd-ic svg{width:34px;height:34px}
  .plan-done .pd-t{font-size:20px;font-weight:700;color:var(--ink);font-family:var(--font-display)}
  .plan-done .pd-s{font-size:13px;color:var(--muted);margin:8px 0 26px;line-height:1.6}
  .plan-done .gbtn{width:100%;max-width:280px}
  .plan-done .gbtn.ghost{margin-top:10px}
  .cpanel{display:none}
  .cpanel.show{display:block;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
  .msg{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .msg:last-child{border-bottom:none}
  .msg.read .mtitle{font-weight:500;color:#6B5E50}
  .mdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .mbody{flex:1;min-width:0;text-align:left}
  .mtitle{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .mtext{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .mtext:empty{display:none}
  .mright{flex:0 0 auto;display:flex;align-items:center;gap:2px;align-self:flex-start;padding-top:1px}
  .mtime{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap;letter-spacing:-.03em}
  .mdel{flex:0 0 auto;border:none;background:none;color:rgba(50,43,42,0.22);cursor:pointer;padding:5px;margin:-3px -5px -3px 0;display:flex;align-items:center;border-radius:8px}
  .mdel svg{width:14px;height:14px}
  .mdel:active{color:var(--accent);background:var(--tint)}
  .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:0;padding:0 16px calc(env(safe-area-inset-bottom,0px) - 18px)}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .16s ease,transform .16s ease}
  .cname{font-size:12px;font-weight:600;color:var(--muted)}
  .pill{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;border-radius:30px;background:var(--surface);border:.5px solid var(--line)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;cursor:pointer;transition:transform .12s ease}
  .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;color:var(--ink);overflow:hidden}
  .ic svg{width:40px;height:40px}
  .lbl{font-size:10px;color:var(--muted)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:0}
  .swap{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:transform .3s ease}
  .swap.spin{transform:rotate(180deg)}
  .swap svg{width:23px;height:23px}
  .folder{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .fgrid{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:5px}
  .fgrid span{background:var(--accent);border-radius:2px;opacity:.85}
  #power{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:color .2s ease}
  /* dock-morph: module dock = SAME size as the dashboard dock. Pill keeps its app-mode box;
     JS locks each pill's measured width/height on enter, and the single button fills it 100%. */
  .bar.module .pill{background:transparent;border:none;padding:0;display:block}
  .bar.module .cname{visibility:hidden}
  .dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;width:100%;height:100%;border:.5px solid var(--line);border-radius:30px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .12s ease}
  .dock-btn:active{transform:scale(.96)}
  .dock-btn .db-ic{width:52px;height:52px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .dock-btn .db-ic svg{width:27px;height:27px;color:var(--accent)}
  .dock-btn .db-lab{font-size:14px;font-weight:600;color:var(--ink);line-height:1.15;text-align:center;padding:0 6px}
  .dock-btn .db-zh{font-size:10px;color:var(--muted);margin-top:-4px}
  .dock-btn.on{background:var(--accent-tint,#F3DDE0);border-color:var(--accent)}
  .dock-btn.on .db-ic{background:var(--accent)}
  .dock-btn.on .db-ic svg{color:#fff}
  .dock-btn.on .db-lab{color:var(--accent-ink,#6E2F39)}
  .dock-btn.on .db-zh{color:var(--accent)}
  .dock-btn.db-timebtn .db-lab{font-family:var(--font-mono);font-size:12.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .dock-btn.db-timebtn .db-zh{font-size:11px;margin-top:-2px}
  .swap.back{color:var(--accent)}
  .dock-soon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border:1.5px dashed #CBBEB7;border-radius:30px;background:var(--bg);color:var(--muted);font-size:13px;font-weight:600}
  @keyframes press-pf{0%{transform:scale(1)}30%{transform:scale(.84);background:var(--tint)}60%{transform:scale(1.1);background:var(--tint)}100%{transform:scale(1)}}
  @keyframes cp-rowup{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:none}}
  .pressing{animation:press-pf .42s ease}
  .item[data-id="beans"] .ic svg{transform:scale(.7)}
  .item[data-id="roast"] .ic svg{transform:translateY(3px) scale(1.2)}
  .item[data-id="recipe"] .ic svg{transform:scale(.82)}
  .ov{position:fixed;inset:0;background:rgba(50,43,42,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}
  .ov.open{display:flex}
  .panel{background:var(--surface);border-radius:26px;padding:20px 18px 22px;width:100%;max-width:330px;transform:scale(.85);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .ov.open .panel{transform:scale(1);opacity:1}
  /* ---- full-screen module page (Timesheet, etc.) ---- */
  .screen{position:fixed;inset:0;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 16px);background:var(--bg);border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;z-index:20;display:flex;flex-direction:column;transform:translateY(calc(100% + 24px));transition:transform .28s cubic-bezier(.4,0,.2,1);visibility:hidden}
  .screen.open{transform:none;visibility:visible}
  .shead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 18px;min-height:60px;background:var(--brand);color:var(--on-brand);flex:0 0 auto}
  .shead .back{width:36px;height:36px;border-radius:11px;border:none;background:rgba(244,236,234,.14);color:var(--on-brand);display:grid;place-items:center;cursor:pointer;padding:0;transition:background .15s ease}
  .shead .logo{width:38px;height:38px;display:block;flex:0 0 auto}
  .shead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .shead .back:active{background:rgba(244,236,234,.24)}
  .shead .back svg{width:20px;height:20px}
  .shead .hkey{font-size:13px;font-weight:500;color:var(--on-brand);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .shead .hkey:empty{display:none}
  .stitle{padding:11px 18px;font-size:15px;font-weight:700;color:var(--ink);background:var(--surface);border-bottom:1px solid var(--line);flex:0 0 auto;font-family:var(--font-display)}
  .stitle:empty{display:none}
  .sbody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
  .dayhd{position:sticky;top:0;background:var(--bg);padding:15px 18px 7px;z-index:1;display:flex;align-items:baseline;gap:9px}
  .dayhd .dh-dow{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.07em}
  .dayhd .dh-date{font-size:12px;font-weight:600;color:var(--muted)}
  .shift{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
  .shift .who{flex:1;min-width:0}
  .shift .nm{font-size:15px;font-weight:600;color:var(--ink)}
  .shift .role{font-size:11px;color:var(--muted);margin-top:2px}
  .shift .rt{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
  .shift .tm{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--ink)}
  .shift .hrs{font-family:var(--font-mono);font-size:12px;color:var(--accent)}
  .sempty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
  /* timesheet History: collapsible week + PDF + cash select */
  .thw-head{display:flex;align-items:stretch;border-bottom:1px solid var(--line);background:var(--surface)}
  .thw-head .rdate{flex:1;border-bottom:none;background:none}
  .ts-pdf{flex:0 0 auto;display:flex;align-items:center;gap:6px;border:none;border-left:1px solid var(--line);background:none;color:var(--accent);font-family:inherit;font-size:12px;font-weight:600;padding:0 14px;cursor:pointer}
  .ts-pdf:active{background:var(--accent-tint,#F3DDE0)}
  .ts-pdf svg{width:16px;height:16px}
  .ts-pdf[disabled]{color:var(--muted);opacity:.6}
  .cash-sec{padding:12px 16px 6px}
  .cash-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
  .cash-list{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cashrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-top:1px solid var(--line)}
  .cashrow:first-child{border-top:none}
  .cashrow .cn{font-size:14px;font-weight:600;color:var(--ink)}
  .cashrow .ch{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:1px}
  .cash-toggle{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:999px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;min-width:64px}
  .cash-toggle.on{background:#5E8C61;border-color:#5E8C61;color:#fff}
  .dayhd.today{background:var(--accent-tint,#F3DDE0);box-shadow:inset 3px 0 0 var(--accent)}
  .dayhd.today .dh-dow,.dayhd.today .dh-date{color:var(--accent)}
  .shift.today{background:var(--accent-tint,#F3DDE0);box-shadow:inset 3px 0 0 var(--accent)}
  .shift.today .tm,.shift.today .nm{color:var(--accent-ink,#6E2F39)}
  .shift.solo{display:grid;grid-template-columns:42px 56px 1fr auto;align-items:baseline;column-gap:12px;padding:13px 18px}
  .shift.solo .sl-dow{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:.04em}
  .shift.solo .sl-date{font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap}
  .shift.solo .tm{font-size:16px;font-weight:700;color:var(--ink)}
  .shift.solo .hrs{font-size:12px;font-weight:600;text-align:right}
  .shift.solo.today .sl-dow,.shift.solo.today .tm{color:var(--accent-ink,#6E2F39)}
  .rdate.today .rd-date{color:var(--accent)}
  .dayhd .td-now{font-size:10px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:1px 7px;margin-left:8px;vertical-align:middle}
  .ts-filter{display:flex;gap:6px;padding:12px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tf-chip{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 13px;cursor:pointer;white-space:nowrap;letter-spacing:.01em}
  .tf-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ts-tophdr{display:flex;align-items:center;gap:11px;padding:12px 16px 4px}
  .na-pill{flex:0 0 auto;border:1.5px solid var(--accent);background:var(--surface);color:var(--accent);border-radius:999px;font-family:inherit;font-size:12px;font-weight:700;padding:6px 16px;cursor:pointer;letter-spacing:.03em}
  .na-pill:active{background:var(--tint)}
  .ts-tophint{font-size:11.5px;color:var(--muted);line-height:1.3}
  .na-wrap{padding:14px 16px 28px}
  .na-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-bottom:14px}
  .na-h{font-family:var(--font-display);font-size:21px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .na-sub{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:18px;line-height:1.4}
  .na-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin:0 0 9px}
  .na-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
  .na-dates{display:flex;gap:10px;margin-bottom:9px}
  .na-dates .smp-f{flex:1;min-width:0}
  .na-hint{font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:6px}
  .na-list{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .na-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .na-item .nai-nm{font-size:14px;font-weight:600;color:var(--ink)}
  .na-item .nai-rg{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-top:2px}
  .na-item .nai-del{flex:0 0 auto;background:none;border:none;color:#C0392B;cursor:pointer;padding:6px;display:flex}
  .na-item .nai-del svg{width:17px;height:17px}
  .na-empty{font-size:12.5px;color:var(--muted);text-align:center;padding:14px}
  .cm-wrap{padding:12px 12px 4px;height:100%;box-sizing:border-box}
  .cm-chart{position:relative;height:62vh;min-height:300px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface)}
  .cm-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
  .ps-submit{padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 18px)}
  .ts-del{flex:0 0 auto;display:flex;align-items:center;border:none;border-left:1px solid var(--line);background:none;color:#B2544E;padding:0 13px;cursor:pointer}
  .ts-del:active{background:#F6DEDC}
  .ts-del svg{width:17px;height:17px}
  .ts-delbar{padding:4px 4px 8px;display:flex;flex-direction:column;gap:10px}
  .ts-delbar span{font-size:13px;color:var(--ink);line-height:1.5}
  .ts-delact{display:flex;gap:10px}
  .ts-delact .gbtn{margin:0}
  /* New: roster planner */
  .plan-week{padding:14px 16px 6px}
  .plan-week .gl{font-size:12px;color:var(--muted);padding-left:2px}
  .plan-week input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;margin-top:5px}
  .plan-week input:focus{border-color:var(--accent)}
  .plan-rng{font-size:13px;color:var(--accent);font-weight:600;margin-top:7px;padding-left:2px}
  .plan-add{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 16px 10px}
  .plan-add .gsel,.plan-add input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
  .plan-add .gsel:focus,.plan-add input:focus{border-color:var(--accent)}
  .plan-add .span2{grid-column:1 / -1}
  .plan-add .pa-add{grid-column:1 / -1;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:12px;cursor:pointer;font-family:inherit}
  .plan-add .pa-add:active{opacity:.85}
  .plan-msg{padding:0 18px;font-size:12px;color:var(--muted);min-height:14px}
  .plan-msg.err{color:var(--accent)}
  .ps-x{flex:0 0 auto;border:none;background:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 10px;line-height:1}
  .ps-x:active{color:var(--accent)}
  .plan-note{font-size:11px;color:var(--muted);padding:2px 18px 0;line-height:1.5}
  .pshift{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}

  .pgrid .ic{width:48px;height:48px;border-radius:13px}
  .pgrid .ic svg{width:26px;height:26px}
  .composer{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--line);background:var(--surface)}
  .composer input{flex:1;min-width:0;border:1px solid var(--line);border-radius:18px;padding:9px 14px;font-size:13px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit}
  .composer input::placeholder{color:var(--muted)}
  .bean-cta{margin-top:11px;width:100%;border:none;border-radius:11px;padding:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}

  .bean-acts .bean-cta{margin-top:0}
  .bean-acts .bean-cta:not(.ico){flex:1}

  .composer button:active{opacity:.7}
  .composer button svg{width:18px;height:18px}
  /* ---- invoice generator ---- */
  .inv-rowcard{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:12px 14px;margin:0 16px 10px}

  .inv-sel:focus{border-color:var(--accent);background-color:var(--surface)}
  .inv-f2{display:flex;gap:10px}

  .inv-line{display:flex;justify-content:space-between;align-items:baseline;margin-top:11px;font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--ink)}

  .inv-trow{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--ink);padding:4px 0}
  .inv-rowfoot{margin-top:11px}

  .post-p{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px}
  .file-card{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin:0 16px 10px}

  /* ---- login gate ---- */
  .auth{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px}
  .auth.show{display:flex}
  .auth-card{width:100%;max-width:320px;text-align:center;position:relative}
  .auth-x{position:absolute;top:-14px;right:-6px;width:34px;height:34px;border:none;background:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;font-family:inherit}
  .auth-x:active{opacity:.6}
  .auth-logo{width:54px;height:54px;margin:0 auto 14px}
  .auth-logo img{width:100%;height:100%;display:block}
  .auth h2{font-size:30px;font-weight:600;margin:0 0 4px;color:var(--ink);letter-spacing:.01em;font-family:var(--font-display)}
  .auth .sub{font-size:13px;color:var(--muted);margin:0 0 22px}
  .auth input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 15px;font-size:15px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;margin-bottom:10px}
  .auth input:focus{border-color:var(--accent)}
  .auth input::placeholder{color:var(--muted)}
  .auth .go{width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;color:#fff;background:var(--accent);cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s ease}
  .auth .go:active{opacity:.8}
  .auth .go[disabled]{opacity:.5}
  .auth .lnk{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:14px;font-family:inherit;text-decoration:underline}
  .auth .hint{font-size:12px;margin:12px 2px 0;min-height:16px;line-height:1.4}
  .auth .hint.err{color:var(--accent)}
  .auth .hint.ok{color:var(--muted)}

  body:not(.role-staff) .cluster{display:none}
  body:not(.role-staff) #swap{display:none}
  body:not(.role-staff) .bar{justify-content:center}
  body:not(.role-staff) .center{height:auto!important}

    const wasApps=!dockStack.length, willApps=!stack.length;

      const bar=document.querySelector('.bar'),sw=document.getElementById('swap');

        bar.classList.remove('module');
        lp.style.width='';lp.style.height='';rp.style.width='';rp.style.height='';

  function relTime(iso){
    if(!iso)return '';
    const t=new Date(iso).getTime();
    if(isNaN(t))return '';
    let sec=Math.floor((Date.now()-t)/1000); if(sec<0)sec=0;
    if(sec<60)return 'now';
    const m=Math.floor(sec/60); if(m<60)return m+'m';
    const h=Math.floor(m/60);   if(h<24)return h+'h';
    const d=Math.floor(h/24);   if(d<7) return d+'d';
    const w=Math.floor(d/7);    if(w<5) return w+'w';
    return Math.floor(d/30)+'mo';

  async function loadMessages(){
    var ch=feedChannel;
    var q=sb.from('messages').select('*').order('created_at',{ascending:false});
    q=(ch==='general')?q.or('channel.is.null,channel.eq.general'):q.eq('channel',ch);
    const {data,error}=await q;
    if(error){
      /* channel column not added yet → general falls back to the whole feed */
      if(ch==='general'){
        const r2=await sb.from('messages').select('*').order('created_at',{ascending:false});
        if(!r2.error){rows=r2.data||[];sortRows();renderFeed();return;}
      }
      console.error('[Ratio] load error:',error.message||error);rows=[];renderFeed();return;
    }
    rows=data||[];sortRows();renderFeed();
  }

  /* realtime: INSERT / UPDATE / DELETE keep the local list in sync */
  sb.channel('messages-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},payload=>{
      const ev=payload.eventType, nu=payload.new, od=payload.old;
      if(ev==='INSERT'){if(chOf(nu)!==feedChannel)return;rows.push(nu);}
      else if(ev==='UPDATE'){if(chOf(nu)!==feedChannel)return;const i=rows.findIndex(r=>idOf(r)===idOf(nu));i>-1?rows[i]=nu:rows.push(nu);}
      else if(ev==='DELETE'){const did=idOf(od);rows=rows.filter(r=>idOf(r)!==did);}
      sortRows();renderFeed();

  /* ============ Invoice generator (More → Generate Invoice) ============ */
  const INV_CATS=['Roasted Beans','Green Beans','Shipping','Catering'];
  const ROAST_PACKS=['100g','150g','200g','250g'];
  const HANDLE_FEE=5;   /* per green-bean line, GST inclusive */
  let INV={buyerName:'',buyerEmail:'',buyerAddr:'',items:[],notes:'',date:'',due:''};
  function invTaxable(cat){return cat==='Catering'||cat==='Shipping';}
  function invIsGreen(it){return it.cat==='Green Beans';}
  function invHasHandle(it){return invIsGreen(it)&&!!it.beanId;}
  function blankInvItem(cat){cat=cat||INV_CATS[0];return {cat:cat,desc:'',qty:'1',unit:'',gstMode:'plus',pack:'250g',beanId:'',beanName:'',country:''};}
  function openInvoice(){closeFolder();openPage('invoice');if(!INV.date)INV.date=todayStr();if(!INV.items.length)INV.items=[blankInvItem('Roasted Beans')];renderInvoice();ensureBeansForInvoice().then(function(){captureInv();renderInvoice();});}
  async function ensureBeansForInvoice(){if(BEANS&&BEANS.length)return;try{var r=await sb.from('beans').select('*').order('name');if(r&&r.data)BEANS=r.data;}catch(e){}}
  function invRaw(it){return (parseFloat(it.qty)||0)*(parseFloat(it.unit)||0);}
  function invGreenCost(it){return (parseFloat(it.qty)||0)*(parseFloat(it.unit)||0);}
  function invEx(it){
    if(invIsGreen(it)){var ex=invGreenCost(it);if(invHasHandle(it))ex+=HANDLE_FEE/1.1;return ex;}
    if(it.cat==='Roasted Beans')return invRaw(it);
    var amt=invRaw(it);return it.gstMode==='inc'?amt/1.1:amt;
  }
  function invGstLine(it){
    if(invIsGreen(it))return invHasHandle(it)?(HANDLE_FEE-HANDLE_FEE/1.1):0;
    if(it.cat==='Roasted Beans')return 0;
    var amt=invRaw(it);return it.gstMode==='inc'?(amt-amt/1.1):amt*0.1;
  }
  function invLineTotal(it){return invEx(it)+invGstLine(it);}
  function invSubtotal(){var t=0;INV.items.forEach(function(it){t+=invEx(it);});return t;}
  function invGstAmt(){var t=0;INV.items.forEach(function(it){t+=invGstLine(it);});return t;}
  function invTotal(){return invSubtotal()+invGstAmt();}
  function invMoney(n){return '$'+(Number(n)||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function invLineHTML(it){
    if(invIsGreen(it)){var gc=invGreenCost(it);var l='Green '+invMoney(gc)+' · GST-free'+(invHasHandle(it)?' + Handle $5.00':'');return '<span class="l">'+l+'</span><span>'+invMoney(invLineTotal(it))+'</span>';}
    if(it.cat==='Roasted Beans')return '<span class="l">GST-free</span><span>'+invMoney(invLineTotal(it))+'</span>';
    return '<span class="l">Ex '+invMoney(invEx(it))+' · GST '+invMoney(invGstLine(it))+'</span><span>'+invMoney(invLineTotal(it))+'</span>';
  }

  /* ---- New: roster planner ---- */
  const STAFF_NAMES=['Yi','Manami','Joshua','Juwa','Daniel','Samuel','Nina','Lovey'];
  const TS_ORDER=['mon','tue','wed','thu','fri','sat','sun'];
  const TS_DAYLBL={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  const TS_MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function tsHM(s){var p=String(s).split(':');return (+p[0])*60+(+p[1]);}
  function tsPaid(dayKey,start,end){
    if(!start||!end)return 0;
    var x=(tsHM(end)-tsHM(start))/60;if(x<0)x+=24;
    if(['mon','tue','wed','thu','fri'].indexOf(dayKey)>-1)x-=0.5; // weekday 30min unpaid break
    return x<0?0:x;
  }
  function tsHH(x){return (x===Math.round(x)?String(x):String(Math.round(x*10)/10))+'h';}
  function tsPaidBr(start,end,br){
    if(!start||!end)return 0;
    var x=(tsHM(end)-tsHM(start))/60;if(x<0)x+=24;
    if(br)x-=0.5;
    return x<0?0:x;
  }
  /* default shift slots per day type — [start, end, hasBreak]; just defaults, all editable */
  const DAY_PRESETS={
    weekday:[['05:45','14:15',true],['08:15','14:15',false]],
    sat:[['06:15','15:15',false],['08:15','16:15',false],['08:15','16:15',false]],
    sun:[['06:15','08:15',false],['08:15','16:15',false],['08:15','16:15',false],['09:15','16:15',false]]
  };
  function dayPresetList(dk){return dk==='sat'?DAY_PRESETS.sat:(dk==='sun'?DAY_PRESETS.sun:DAY_PRESETS.weekday);}
  function presetFor(dk,n){var L=dayPresetList(dk);var p=L[Math.min(n,L.length-1)];return {start:p[0],end:p[1],br:p[2]};}
  function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function mondayOf(d){var wd=(d.getDay()+6)%7;var m=new Date(d);m.setDate(m.getDate()-wd);m.setHours(0,0,0,0);return m;}
  function weekRangeOf(monIso){var a=new Date(monIso+'T00:00:00');var b=new Date(a);b.setDate(b.getDate()+6);return TS_MON[a.getMonth()]+' '+a.getDate()+' – '+TS_MON[b.getMonth()]+' '+b.getDate();}
  function dayLabelOf(monIso,i){var a=new Date(monIso+'T00:00:00');a.setDate(a.getDate()+i);return TS_DAYLBL[TS_ORDER[i]]+' · '+TS_MON[a.getMonth()]+' '+a.getDate();}
  /* ---- roster data layer: static seed + Supabase `rosters` (cached in ROSTERS) ---- */
  const ROSTERS={}; let rostersLoaded=false;
  function rosterRow(ws){return ROSTERS[ws]||(ROSTERS[ws]={shifts:[],cash:[],deleted:false});}
  function saveRosterRow(ws){
    if(!sb)return;var r=rosterRow(ws);
    sb.from('rosters').upsert({week_start:ws,shifts:r.shifts||[],cash:r.cash||[],deleted:!!r.deleted,updated_at:new Date().toISOString()},{onConflict:'week_start'}).then(function(res){if(res.error)console.error('[Ratio] roster save:',res.error.message||res.error);});
  }
  async function loadRosters(){
    if(!sb)return;
    try{
      var res=await sb.from('rosters').select('*');
      if(res.error){console.error('[Ratio] rosters load:',res.error.message||res.error);return;}
      (res.data||[]).forEach(function(r){ROSTERS[r.week_start]={shifts:r.shifts||[],cash:r.cash||[],deleted:!!r.deleted};});
      rostersLoaded=true;refreshTimesheetIfOpen();
    }catch(e){console.error('[Ratio] rosters load:',e);}
  }
  function refreshTimesheetIfOpen(){
    try{if(dockStack[0]==='timesheet')renderModulePanel('timesheet');}catch(e){}
    try{var t=document.getElementById('ts-title');var scr=document.getElementById('screen-timesheet');
      if(scr&&scr.classList.contains('open')&&t&&t.textContent==='History')renderTimesheetWeeks(historyWeeks());}catch(e){}
  }
  function submittedRoster(ws){var r=ROSTERS[ws];return (r&&!r.deleted&&r.shifts&&r.shifts.length)?r.shifts:null;}
  function saveRoster(ws,shifts){var r=rosterRow(ws);r.shifts=shifts;saveRosterRow(ws);}
  function deletedSet(){var s=new Set();for(var k in ROSTERS){if(ROSTERS[k]&&ROSTERS[k].deleted)s.add(k);}return s;}
  function deleteWeek(ws){var r=rosterRow(ws);r.deleted=true;saveRosterRow(ws);}
  function submitRoster(ws,shifts){var r=rosterRow(ws);r.shifts=shifts;r.deleted=false;saveRosterRow(ws);}
  if(sb){
    loadRosters();
    try{sb.channel('rosters-feed').on('postgres_changes',{event:'*',schema:'public',table:'rosters'},function(p){
      var r=p.new||p.old;if(!r||!r.week_start)return;
      if(p.eventType==='DELETE'){delete ROSTERS[r.week_start];}
      else{ROSTERS[r.week_start]={shifts:r.shifts||[],cash:r.cash||[],deleted:!!r.deleted};}
      refreshTimesheetIfOpen();
    }).subscribe();}catch(e){}
  }
  function staticWeek(ws){return TIMESHEET_WEEKS.find(function(w){return w.weekStart===ws;})||null;}
  function weekFromShifts(ws,shifts){
    var byDay={};shifts.forEach(function(s){(byDay[s.day]=byDay[s.day]||[]).push(s);});
    var groups=[],tot={},wd={},sat={},sun={};var r1=function(x){return Math.round(x*10)/10;};
    TS_ORDER.forEach(function(dk,i){
      var arr=byDay[dk];if(!arr||!arr.length)return;
      arr=arr.slice().sort(function(a,b){return tsHM(a.start)-tsHM(b.start);});
      var rows=arr.map(function(s){
        var h=tsPaidBr(s.start,s.end,s.br);
        if(s.name){tot[s.name]=(tot[s.name]||0)+h;if(i<5)wd[s.name]=(wd[s.name]||0)+h;else if(i===5)sat[s.name]=(sat[s.name]||0)+h;else sun[s.name]=(sun[s.name]||0)+h;}
        return {nm:s.name,tm:s.start+'–'+s.end,hrs:tsHH(r1(h))};
      });
      groups.push({day:dayLabelOf(ws,i),dk:dk,rows:rows});
    });
    var staff=Object.keys(tot).sort().map(function(n){return {name:n,hrs:r1(tot[n]),hl:tsHH(r1(tot[n])),wd:r1(wd[n]||0),sat:r1(sat[n]||0),sun:r1(sun[n]||0)};});
    return {weekStart:ws,range:weekRangeOf(ws),groups:groups,staff:staff,cash:[]};
  }
  function effectiveWeek(ws){if(deletedSet().has(ws))return null;var sub=submittedRoster(ws);return sub?weekFromShifts(ws,sub):staticWeek(ws);}
  function allWeekStarts(){
    var set={};TIMESHEET_WEEKS.forEach(function(w){set[w.weekStart]=1;});
    for(var k in ROSTERS){if(ROSTERS[k]&&ROSTERS[k].shifts&&ROSTERS[k].shifts.length)set[k]=1;}
    var del=deletedSet();
    return Object.keys(set).filter(function(ws){return !del.has(ws);}).sort(function(a,b){return a<b?1:-1;});
  }
  function currentWeekStart(){return isoDate(mondayOf(new Date()));}
  function thisWeekEntry(){return effectiveWeek(currentWeekStart());}
  function historyWeeks(){var cw=currentWeekStart();return allWeekStarts().filter(function(ws){return ws<cw;}).map(effectiveWeek).filter(Boolean);}

  let planWeek='', planLabel='', planShifts=[], planOpen={}, planMsg='', planDone=false;
  function planKey(ws){return 'ratio_plan_'+ws;}
  function loadPlan(ws){try{var s=localStorage.getItem(planKey(ws));if(s)return JSON.parse(s);}catch(e){}return [];}
  function savePlan(){try{localStorage.setItem(planKey(planWeek),JSON.stringify(planShifts));}catch(e){}}
  function planWeeksFromToday(){
    var m=mondayOf(new Date());
    var n=new Date(m);n.setDate(n.getDate()+7);
    var a=new Date(m);a.setDate(a.getDate()+14);
    return {next:isoDate(n),after:isoDate(a)};
  }
  function staticToShifts(w){
    var out=[];(w&&w.groups||[]).forEach(function(g){var dk=g.dk;(g.rows||[]).forEach(function(r){
      var t=String(r.tm||'').split(/[–-]/);
      if(t.length===2&&r.nm){out.push({day:dk,name:r.nm,start:t[0].trim(),end:t[1].trim(),br:['mon','tue','wed','thu','fri'].indexOf(dk)>-1});}
    });});
    return out;
  }
  function openWeekPlan(ws,label){
    planWeek=ws;planLabel=label;planMsg='';planOpen={};planDone=false;
    var draft=loadPlan(ws);var sub=submittedRoster(ws);var stat=staticWeek(ws);
    planShifts=(draft&&draft.length)?draft : (sub?sub.slice() : (stat?staticToShifts(stat):[]));
    document.getElementById('ts-title').textContent=label;
    document.getElementById('ts-week').textContent=weekRangeOf(ws);
    renderWeekPlan();openPage('timesheet');
  }
  /* ---- read view: show an already-saved future-week roster (with staff tabs) ---- */
  let wvWeek='', wvLabel='', wvFilter=null;
  function openWeekView(ws,label){
    var sub=submittedRoster(ws);
    if(!sub||!sub.length){openWeekPlan(ws,label);return;}
    wvWeek=ws;wvLabel=label;wvFilter=null;
    document.getElementById('ts-title').textContent=label;
    document.getElementById('ts-week').textContent=weekRangeOf(ws);
    renderWeekView();openPage('timesheet');
  }
  function renderWeekView(){
    const body=document.getElementById('timesheet-body');
    document.getElementById('ts-title').textContent=wvLabel||'Timesheet';
    document.getElementById('ts-week').textContent=wvWeek?weekRangeOf(wvWeek):'';
    var sub=submittedRoster(wvWeek);
    var w=sub?weekFromShifts(wvWeek,sub):null;
    if(!w){openWeekPlan(wvWeek,wvLabel);return;}
    var names=w.staff.map(function(s){return s.name;});
    if(wvFilter&&names.indexOf(wvFilter)<0)wvFilter=null;
    var chips='<div class="ts-filter"><button class="tf-chip'+(wvFilter?'':' on')+'" data-n="">All</button>'
      +names.map(function(n){return '<button class="tf-chip'+(wvFilter===n?' on':'')+'" data-n="'+esc(n)+'">'+esc(n)+'</button>';}).join('')+'</div>';
    var gs=filterGroups(w.groups,wvFilter);
    var sched=gs.length?tsGroupsHTML(gs,wvWeek,!!wvFilter):'<div class="sempty">'+esc(wvFilter||'')+' no shifts this week</div>';
    var editBtn='<div style="padding:12px 16px 16px"><button class="gbtn" id="wv-edit">Edit roster</button></div>';
    body.innerHTML=chips+sched+editBtn;
    body.querySelectorAll('.tf-chip').forEach(function(c){c.addEventListener('click',function(){wvFilter=c.dataset.n||null;renderWeekView();});});
    var eb=document.getElementById('wv-edit');if(eb)eb.addEventListener('click',function(){openWeekPlan(wvWeek,wvLabel);});
  }
  function planStaffTotals(){
    var t={};planShifts.forEach(function(s){t[s.name]=(t[s.name]||0)+tsPaidBr(s.start,s.end,s.br);});
    return Object.keys(t).sort().map(function(n){return {name:n,hl:tsHH(Math.round(t[n]*10)/10)};});
  }
  function renderWeekPlan(){
    const body=document.getElementById('timesheet-body');const sc=body.scrollTop;
    document.getElementById('ts-title').textContent=planLabel||'Timesheet';
    document.getElementById('ts-week').textContent=planWeek?weekRangeOf(planWeek):'';
    if(planDone){
      body.innerHTML='<div class="plan-done">'
        +'<div class="pd-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg></div>'
        +'<div class="pd-t">Saved as the official roster</div>'
        +'<div class="pd-s">'+esc(weekRangeOf(planWeek))+'<br>Now shown in This Week and History</div>'
        +'<button class="gbtn" id="plan-done-ok">Done</button>'
        +'<button class="gbtn ghost" id="plan-done-edit">Keep editing</button>'
        +'</div>';
      var okB=document.getElementById('plan-done-ok');if(okB)okB.addEventListener('click',function(){closePage();});
      var edB=document.getElementById('plan-done-edit');if(edB)edB.addEventListener('click',function(){planDone=false;renderWeekPlan();});

    var days=TS_ORDER.map(function(dk){
      var idx=TS_ORDER.indexOf(dk);var arr=byDay[dk]||[];var open=(planOpen[dk]!==undefined)?planOpen[dk]:(arr.length>0);
      var p0=presetFor(dk,0);
      var dd=new Date(planWeek+'T00:00:00');dd.setDate(dd.getDate()+idx);var isToday=isoDate(dd)===isoDate(new Date());
      var tot=arr.reduce(function(a,s){return a+tsPaidBr(s.start,s.end,s.br);},0);
      var meta=arr.length?(arr.length+' shifts · <b>'+tsHH(Math.round(tot*10)/10)+'</b>'):('default '+p0.start+'–'+p0.end+' …');
      var head='<button class="rdate'+(open?' open':'')+(isToday?' today':'')+'" data-d="'+dk+'">'
        +'<span class="rd-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>'
        +'<span class="rd-date">'+esc(dayLabelOf(planWeek,idx))+(isToday?' <span class="td-now">TODAY</span>':'')+'</span>'
        +'<span class="rd-meta">'+meta+'</span></button>';
      var bd='';
      if(open){
        var rows=arr.map(function(s){
          return '<div class="pshift"><div class="ps-top"><div class="ps-nm">'+esc(s.name)+'</div><button class="ps-x" data-i="'+s.i+'" aria-label="remove">✕</button></div>'
            +'<div class="ps-times"><input class="ps-t" type="time" step="900" data-i="'+s.i+'" data-f="start" value="'+esc(s.start)+'" />'
            +'<span class="ps-dash">–</span>'
            +'<input class="ps-t" type="time" step="900" data-i="'+s.i+'" data-f="end" value="'+esc(s.end)+'" />'
            +'<div class="ps-h">'+tsHH(Math.round(tsPaidBr(s.start,s.end,s.br)*10)/10)+'</div></div></div>';
        }).join('');
        var taken={};arr.forEach(function(s){taken[s.name]=1;});
        var np=presetFor(dk,arr.length);
        var opts='<option value="">+ Add staff (default '+np.start+'–'+np.end+')</option>'+STAFF_NAMES.filter(function(n){return !taken[n];}).map(function(n){return '<option>'+esc(n)+'</option>';}).join('');
        var add='<div class="ps-add"><select class="ps-addsel" data-d="'+dk+'">'+opts+'</select></div>';
        bd='<div class="rd-body">'+(rows||'<div class="sempty" style="padding:18px">No one scheduled</div>')+add+'</div>';
      }
      return '<div class="thw">'+head+bd+'</div>';
    }).join('');
    var totals='';
    var st=planStaffTotals();
    if(st.length){
      totals='<div class="cash-sec"><div class="cash-sec-h">Week hours total</div><div class="cash-list">'
        +st.map(function(s){return '<div class="cashrow"><div class="cn">'+esc(s.name)+'</div><div class="ch" style="margin:0;font-size:13px;color:var(--ink)">'+esc(s.hl)+'</div></div>';}).join('')
        +'</div></div>';
    }
    var submitBtn=planShifts.length?('<div class="plan-msg ok" id="plan-msg">'+esc(planMsg||'')+'</div><div class="ps-submit"><button class="gbtn" id="plan-submit">Submit · save as official roster</button></div>'):'';
    body.innerHTML=note+days+totals+submitBtn;
    var subBtn=document.getElementById('plan-submit');
    if(subBtn)subBtn.addEventListener('click',function(){
      submitRoster(planWeek,planShifts);
      planMsg='';planDone=true;
      try{renderModulePanel('timesheet');}catch(e){}
      renderWeekPlan();body.scrollTop=0;
    });
    body.querySelectorAll('.rdate').forEach(function(el){el.addEventListener('click',function(){
      var dk=el.dataset.d;var has=planShifts.some(function(s){return s.day===dk;});

    body.querySelectorAll('.ps-addsel').forEach(function(sel){sel.addEventListener('change',function(){
      var nm=sel.value;if(!nm)return;var dk=sel.dataset.d;

      var pr=presetFor(dk,n);
      planShifts.push({day:dk,name:nm,start:pr.start,end:pr.end,br:pr.br});
      planShifts.sort(function(a,b){return TS_ORDER.indexOf(a.day)-TS_ORDER.indexOf(b.day)||tsHM(a.start)-tsHM(b.start)||String(a.name).localeCompare(b.name);});
      planOpen[dk]=true;savePlan();renderWeekPlan();body.scrollTop=sc;
    });});
    body.querySelectorAll('.ps-t').forEach(function(inp){inp.addEventListener('change',function(){
      var i=+inp.dataset.i;if(!planShifts[i])return;planShifts[i][inp.dataset.f]=inp.value;savePlan();renderWeekPlan();body.scrollTop=sc;
    });});
    body.querySelectorAll('.ps-br').forEach(function(el){el.addEventListener('click',function(){
      var i=+el.dataset.i;if(!planShifts[i])return;planShifts[i].br=!planShifts[i].br;savePlan();renderWeekPlan();body.scrollTop=sc;
    });});

150,price:25},{g:250,price:25}];\nlet activePkg=0,wsActivePkg=0,pots=4,wsQty=20,currentTab='retail';\n\nfunction renderPkgGrid(){\n  document.getElementById('pkg-grid').innerHTML=packages.map((p,i)=>\n    `<div class=\"pkg-btn${i===activePkg?' active':''}\" onclick=\"selectPkg(${i})\">${p.g}g \u2014 $${p.price}<\/div>`).join('');\n  document.getElementById('ws-pkg-grid').innerHTML=packages.map((p,i)=>\n    `<div class=\"pkg-btn${i===wsActivePkg?' active':''}\" onclick=\"selectWsPkg(${i})\">${p.g}g<\/div>`).join('');\n}\nfunction selectPkg(i){activePkg=i;renderPkgGrid();calc();}\nfunction selectWsPkg(i){wsActivePkg=i;renderPkgGrid();calc();}\nfunction addCustomPkg(){\n  const g=parseInt(document.getElementById('custom-g').value);\n  const price=parseFloat(document.getElementById('custom-price').value);\n  if(!g||!price||g<50||price<1)return;\n  packages.push({g,price});activePkg=packages.length-1;\n  document.getElementById('custom-g').value='';document.getElementById('custom-price').value='';\n  renderPkgGrid();calc();\n}\nfunction getNum(id){const v=parseFloat(document.getElementById(id).value);return isNaN(v)?0:v;}\nfunction brow(label,val,bold,color){\n  return `<div class=\"brow\"><span class=\"lbl\"${bold?' style=\"color:#1a1a1a;\"':''}>${label}<\/span><span class=\"val\"${color?` style=\"color:${color};\"`:''}>  ${val}<\/span><\/div>`;\n}\nfunction fmtMin(m){const h=Math.floor(m/60),r=m%60;return r?(h?h+'h ':'')+r+'min':h+'h';}\nfunction getBase(){\n  const beanPrice=parseInt(document.getElementById('bean-price-val').textContent);\n  const greenKg=parseInt(document.getElementById('green-kg-val').textContent);\n  const shrink=parseInt(document.getElementById('shrink-val').textContent)/100;\n  const venueRate=parseInt(document.getElementById('venue-rate-val').textContent);\n  const staffRate=parseInt(document.getElementById('staff-rate-val').textContent);\n  const transport=parseInt(document.getElementById('transport-val').textContent);\n  const packRate=parseInt(document.getElementById('pack-rate-val').textContent);\n  const packSpeed=parseInt(document.getElementById('pack-speed-val').textContent);\n  const costBag=getNum('cost-bag'),costSticker=getNum('cost-sticker'),costBox=getNum('cost-box');\n  const packLaborPerBag=packRate/packSpeed;\n  const matCostPerBag=costBag+costSticker+costBox;\n  const roastedKg=pots*greenKg*(1-shrink);\n  const totalGreenKg=pots*greenKg;\n  const roastMin=pots*15,totalMin=30+roastMin+30;\n  const venueHrs=roastMin/60,staffHrs=totalMin/60;\n  const venueCost=venueHrs*venueRate,staffCost=staffHrs*staffRate,beanCost=totalGreenKg*beanPrice;\n  document.getElementById('pack-cost-hint').textContent='\u6bcf\u5305\u5305\u88dd\u4eba\u4e8b\u6210\u672c\uff1a$'+packLaborPerBag.toFixed(2);\n  return{beanPrice,greenKg,shrink,venueRate,staffRate,transport,packRate,packSpeed,packLaborPerBag,matCostPerBag,costBag,costSticker,costBox,roastedKg,totalGreenKg,roastMin,totalMin,venueHrs,staffHrs,venueCost,staffCost,beanCost};\n}\nfunction calcRetail(){\n  const b=getBase();const pkg=packages[activePkg];\n  const bags=Math.floor(b.roastedKg/(pkg.g/1000));\n  const matTotal=bags*b.matCostPerBag,packLaborTotal=bags*b.packLaborPerBag;\n  const packTimeHrs=bags/b.packSpeed;\n  const totalCost=b.venueCost+b.staffCost+b.transport+b.beanCost+matTotal+packLaborTotal;\n  const revenue=bags*pkg.price,profit=revenue-totalCost,margin=revenue>0?(profit/revenue*100):0;\n  document.getElementById('r-kg').textContent=b.roastedKg.toFixed(1)+' kg';\n  document.getElementById('r-bags').textContent=bags+' \u5305';\n  document.getElementById('r-pack-time').textContent=packTimeHrs<1?(packTimeHrs*60).toFixed(0)+'min':packTimeHrs.toFixed(1)+'hr';\n  document.getElementById('r-cost-kg').textContent='$'+(b.roastedKg>0?totalCost/b.roastedKg:0).toFixed(2);\n  let bd=brow('\u4ea4\u901a\u8cbb\uff08\u542b\u4eba\u4e8b\uff09','$'+b.transport.toFixed(2))+\n    brow('\u5834\u5730\u8cbb \u00d7 '+b.venueHrs.toFixed(2)+' hr','$'+b.venueCost.toFixed(2))+\n    brow('\u70d8\u7119\u4eba\u4e8b \u00d7 '+b.staffHrs.toFixed(2)+' hr\uff08'+fmtMin(b.totalMin)+'\uff09','$'+b.staffCost.toFixed(2))+\n    brow('\u751f\u8c46\u6210\u672c\uff08'+b.totalGreenKg+' kg \u00d7 $'+b.beanPrice+'\uff09','$'+b.beanCost.toFixed(2));\n  if(b.costBag>0)bd+=brow('\u5496\u5561\u888b\uff08'+bags+' \u00d7 $'+b.costBag.toFixed(2)+'\uff09','$'+(bags*b.costBag).toFixed(2));\n  if(b.costSticker>0)bd+=brow('\u8cbc\u7d19\uff08'+bags+' \u00d7 $'+b.costSticker.toFixed(2)+'\uff09','$'+(bags*b.costSticker).toFixed(2));\n  if(b.costBox>0)bd+=brow('\u76d2\u5b50\uff08'+bags+' \u00d7 $'+b.costBox.toFixed(2)+'\uff09','$'+(bags*b.costBox).toFixed(2));\n  bd+=brow('\u5305\u88dd\u4eba\u4e8b\uff08'+bags+' \u5305 \u00d7 $'+b.packLaborPerBag.toFixed(2)+'\uff09','$'+packLaborTotal.toFixed(2))+\n    brow('\u7e3d\u6210\u672c','$'+totalCost.toFixed(2),true)+\n    brow('\u7e3d\u6536\u5165\uff08'+bags+' \u5305 \u00d7 $'+pkg.price+'\uff09','$'+revenue.toFixed(2),true)+\n    brow('\u5229\u6f64',(profit>=0?'+':'')+' $'+profit.toFixed(2),true,profit>=0?'#2e7d32':'#c62828');\n  document.getElementById('r-breakdown').innerHTML=bd;\n  const pe=document.getElementById('r-profit');pe.textContent=(profit>=0?'+':'')+' $'+profit.toFixed(2);pe.style.color=profit>=0?'#2e7d32':'#c62828';\n  const me=document.getElementById('r-margin');me.textContent=margin.toFixed(1)+'%';me.style.color=margin>=0?'#2e7d32':'#c62828';\n}\nfunction calcWholesale(){\n  const b=getBase();const pkg=packages[wsActivePkg];\n  const wsPrice=parseFloat(document.getElementById('ws-price').value)||0;\n  const MOQ=150,SHIPPING=20;\n  const totalBags=Math.floor(b.roastedKg/(pkg.g/1000));\n  const roastCostPerBag=totalBags>0?(b.venueCost+b.staffCost+b.transport+b.beanCost)/totalBags:0;\n  const totalCostPerBag=roastCostPerBag+b.matCostPerBag+b.packLaborPerBag;\n  const subtotal=wsQty*wsPrice,moqMet=subtotal>=MOQ,shipping=moqMet?0:SHIPPING;\n  const orderTotal=subtotal+shipping,orderCost=wsQty*totalCostPerBag;\n  const orderProfit=orderTotal-orderCost,orderMargin=orderTotal>0?(orderProfit/orderTotal*100):0;\n  const profitPerBag=wsPrice-totalCostPerBag;\n  document.getElementById('ws-order-status').innerHTML=moqMet\n    ?`<span class=\"badge badge-green\">\u2713 \u9054\u5230 MOQ $150 \u00b7 \u514d\u904b\u8cbb<\/span>`\n    :`<span class=\"badge badge-yellow\">\u672a\u9054 MOQ \u00b7 \u52a0\u6536\u904b\u8cbb $20\uff08\u9084\u5dee $${(MOQ-subtotal).toFixed(2)}\uff09<\/span>`;\n  document.getElementById('ws-order-subtotal').textContent='$'+subtotal.toFixed(2);\n  document.getElementById('ws-shipping').textContent=moqMet?'\u514d\u904b':'$'+SHIPPING;\n  document.getElementById('ws-order-total').textContent='$'+orderTotal.toFixed(2);\n  const ppbEl=document.getElementById('ws-profit-per-bag');\n  ppbEl.textContent=(profitPerBag>=0?'+':'')+' $'+profitPerBag.toFixed(2);\n  ppbEl.style.color=profitPerBag>=0?'#2e7d32':'#c62828';\n  let bd=brow('\u6bcf\u5305\u70d8\u7119\u6210\u672c\uff08\u6524\u5206\uff09','$'+roastCostPerBag.toFixed(2));\n  if(b.matCostPerBag>0)bd+=brow('\u6bcf\u5305\u5305\u88dd\u6750\u6599','$'+b.matCostPerBag.toFixed(2));\n  bd+=brow('\u6bcf\u5305\u5305\u88dd\u4eba\u4e8b','$'+b.packLaborPerBag.toFixed(2))+\n    brow('\u6bcf\u5305\u7e3d\u6210\u672c','$'+totalCostPerBag.toFixed(2),true)+\n    brow('\u5546\u54c1\u91d1\u984d\uff08'+wsQty+' \u5305 \u00d7 $'+wsPrice.toFixed(2)+'\uff09','$'+subtotal.toFixed(2))+\n    brow('\u904b\u8cbb',moqMet?'$0 (\u514d\u904b)':'$'+SHIPPING,false,moqMet?'#2e7d32':'#f57f17')+\n    brow('\u8a02\u55ae\u7e3d\u984d','$'+orderTotal.toFixed(2),true)+\n    brow('\u8a02\u55ae\u6210\u672c','$'+orderCost.toFixed(2))+\n    brow('\u8a02\u55ae\u5229\u6f64',(orderProfit>=0?'+':'')+' $'+orderProfit.toFixed(2),true,orderProfit>=0?'#2e7d32':'#c62828');\n  document.getElementById('ws-breakdown').innerHTML=bd;\n  const pe=document.getElementById('ws-profit');pe.textContent=(orderProfit>=0?'+':'')+' $'+orderProfit.toFixed(2);pe.style.color=orderProfit>=0?'#2e7d32':'#c62828';\n  const me=document.getElementById('ws-margin');me.textContent=orderMargin.toFixed(1)+'%';me.style.color=orderMargin>=0?'#2e7d32':'#c62828';\n}\nfunction calc(){if(currentTab==='retail')calcRetail();else calcWholesale();}\nfunction switchTab(tab){\n  currentTab=tab;\n  document.getElementById('mode-retail').style.display=tab==='retail'?'':'none';\n  document.getElementById('mode-wholesale').style.display=tab==='wholesale'?'':'none';\n  document.getElementById('tab-retail').classList.toggle('active',tab==='retail');\n  document.getElementById('tab-wholesale').classList.toggle('active',tab==='wholesale');\n  calc();\n}\nfunction bindSlider(id,outId){\n  document.getElementById(id).addEventListener('input',()=>{document.getElementById(outId).textContent=document.getElementById(id).value;calc();});\n}\nbindSlider('bean-price','bean-price-val');bindSlider('green-kg','green-kg-val');bindSlider('shrink','shrink-val');\nbindSlider('venue-rate','venue-rate-val');bindSlider('staff-rate','staff-rate-val');bindSlider('transport','transport-val');\nbindSlider('pack-rate','pack-rate-val');bindSlider('pack-speed','pack-speed-val');\ndocument.getElementById('pots-dn').onclick=()=>{if(pots>1){pots--;document.getElementById('pots-val').textContent=pots;calc();}};\ndocument.getElementById('pots-up').onclick=()=>{if(pots<20){pots++;document.getElementById('pots-val').textContent=pots;calc();}};\ndocument.getElementById('ws-qty-dn').onclick=()=>{if(wsQty>1){wsQty--;document.getElementById('ws-qty-val').textContent=wsQty;calc();}};\ndocument.getElementById('ws-qty-up').onclick=()=>{wsQty++;document.getElementById('ws-qty-val').textContent=wsQty;calc();};\n['cost-bag','cost-sticker','cost-box','ws-price'].forEach(id=>document.getElementById(id).addEventListener('input',calc));\nrenderPkgGrid();calc();\n<\/script>\n\n\n<\/body><\/html>";
  function openOrderCalc(){closeFolder();openPage('calc');var f=document.getElementById('calc-frame');if(f&&f.getAttribute('data-loaded')!=='1'){f.srcdoc=CALC_HTML;f.setAttribute('data-loaded','1');}}
  /* ============ Contacts (More → Account) ============ */
  const CONTACT_TYPES=['Supplier','Customer','Roaster','Service'];
  const CT_COLORS={Supplier:'#6E6256',Customer:'#B25E6A',Roaster:'#7E9B7A',Service:'#7C7BA0'};
  let CONTACTS=[], contactType=null, contactEdit=null, contactObj=null, contactDelConfirm=false;
  function openContacts(){closeFolder();openPage('contacts');loadContacts();}
  function contactsBack(){if(contactEdit){contactEdit=null;contactObj=null;contactDelConfirm=false;renderContacts();}else{closePage();}}
  async function loadContacts(){
    var box=document.getElementById('contacts-content');
    box.innerHTML='<div class="sempty">Loading…</div>';
    var r=await sb.from('contacts').select('*').order('name');
    if(r.error){box.innerHTML='<div class="sempty">Load failed: '+esc(r.error.message)+'<br>(create the contacts table in Supabase first)</div>';document.getElementById('contacts-key').textContent='';return;}
    CONTACTS=r.data||[];contactEdit=null;contactObj=null;contactDelConfirm=false;renderContacts();
  }
  function renderContacts(){
    if(contactEdit){renderContactEdit();return;}
    var box=document.getElementById('contacts-content');
    document.getElementById('contacts-title').textContent='Contacts';
    document.getElementById('contacts-key').textContent=CONTACTS.length+' contacts';
    var chips='<div class="ts-filter"><button class="tf-chip'+(!contactType?' on':'')+'" data-t="">All</button>'+CONTACT_TYPES.map(function(t){return '<button class="tf-chip'+(contactType===t?' on':'')+'" data-t="'+t+'">'+t+'</button>';}).join('')+'</div>';
    var list=CONTACTS.filter(function(c){return !contactType||c.type===contactType;});
    var body;
    if(!list.length){body='<div class="sempty">'+(contactType?('No '+esc(contactType)+' contacts yet'):'No contacts yet')+'</div>';}
    else{
      body='<div class="gbeans">'+list.map(function(c){
        var sub=esc(c.address||c.company||c.email||c.phone||'');
        return '<div class="gbean" data-id="'+esc(c.id)+'"><div class="gb-main"><div class="gb-name">'+esc(c.name||'—')+'</div>'+(sub?'<div class="gb-sub">'+sub+'</div>':'')+'</div><span class="ct-type" style="background:'+(CT_COLORS[c.type]||'#9A8B82')+'">'+esc(c.type||'—')+'</span></div>';
      }).join('')+'</div>';
    }
    var addBtn='<div class="inv-gen-wrap"><button class="gbtn" id="ct-add">+ New contact</button></div>';
    box.innerHTML=chips+body+addBtn;
    box.querySelectorAll('.tf-chip').forEach(function(b){b.addEventListener('click',function(){contactType=b.dataset.t||null;renderContacts();});});
    box.querySelectorAll('.gbean').forEach(function(el){el.addEventListener('click',function(){var c=CONTACTS.find(function(x){return String(x.id)===String(el.dataset.id);});if(c){contactEdit=c.id;contactObj=Object.assign({},c);contactDelConfirm=false;renderContacts();box.scrollTop=0;}});});
    document.getElementById('ct-add').addEventListener('click',function(){contactEdit='new';contactObj={name:'',type:contactType||'Supplier',company:'',email:'',phone:'',notes:''};contactDelConfirm=false;renderContacts();box.scrollTop=0;});
  }
  function renderContactEdit(){
    var box=document.getElementById('contacts-content');
    var p=contactObj;var isNew=contactEdit==='new';
    document.getElementById('contacts-title').textContent=isNew?'New contact':(p.name||'Contact');
    document.getElementById('contacts-key').textContent=isNew?'':(p.type||'');
    var typeOpts=CONTACT_TYPES.map(function(t){return '<option'+(t===p.type?' selected':'')+'>'+t+'</option>';}).join('');
    box.innerHTML='<div class="gform" style="padding:16px 16px 0">'
      +'<label class="gfield"><span class="gl">Type</span><select class="inv-sel" id="ct-type">'+typeOpts+'</select></label>'
      +'<label class="gfield"><span class="gl">Name</span><input id="ct-name" type="text" value="'+esc(p.name||'')+'" placeholder="Contact name" /></label>'
      +'<label class="gfield"><span class="gl">Company</span><input id="ct-company" type="text" value="'+esc(p.company||'')+'" /></label>'
      +'<label class="gfield"><span class="gl">Address</span><input id="ct-address" type="text" value="'+esc(p.address||'')+'" placeholder="Street, suburb STATE postcode" /></label>'
      +'<label class="gfield"><span class="gl">Email</span><input id="ct-email" type="email" value="'+esc(p.email||'')+'" /></label>'
      +'<label class="gfield"><span class="gl">Phone</span><input id="ct-phone" type="tel" value="'+esc(p.phone||'')+'" /></label>'
      +'<label class="gfield"><span class="gl">Notes</span><textarea id="ct-notes" class="gta" rows="2">'+esc(p.notes||'')+'</textarea></label>'
      +'<div class="gform-msg" id="ct-msg"></div>'
      +'<div class="gform-actions"><button class="gbtn ghost" id="ct-cancel">Cancel</button><button class="gbtn" id="ct-save">Save</button></div>'
      +(isNew?'':'<div class="gdel">'+(contactDelConfirm?'<div class="gdel-msg">Delete "'+esc(p.name||'')+'"? This cannot be undone.</div><div class="gform-actions"><button class="gbtn ghost" id="ct-del-cancel">Cancel</button><button class="gbtn danger" id="ct-del-yes">Delete</button></div>':'<button class="gbtn dghost" id="ct-del">Delete this contact</button>')+'</div>')
      +'</div>';
    document.getElementById('ct-cancel').addEventListener('click',function(){contactsBack();box.scrollTop=0;});
    document.getElementById('ct-save').addEventListener('click',saveContact);
    var d=document.getElementById('ct-del');if(d)d.addEventListener('click',function(){contactDelConfirm=true;renderContactEdit();});
    var dc=document.getElementById('ct-del-cancel');if(dc)dc.addEventListener('click',function(){contactDelConfirm=false;renderContactEdit();});
    var dy=document.getElementById('ct-del-yes');if(dy)dy.addEventListener('click',deleteContact);
  }
  async function saveContact(){
    var msg=document.getElementById('ct-msg');var btn=document.getElementById('ct-save');
    var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
    var rec={type:g('ct-type'),name:g('ct-name'),company:g('ct-company')||null,address:g('ct-address')||null,email:g('ct-email')||null,phone:g('ct-phone')||null,notes:g('ct-notes')||null};
    if(!rec.name){msg.textContent='Name is required';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    if(contactEdit==='new'){
      var ins=await sb.from('contacts').insert(rec).select();
      if(ins.error){btn.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
      if(ins.data&&ins.data[0])CONTACTS.push(ins.data[0]);
    }else{
      var up=await sb.from('contacts').update(rec).eq('id',contactEdit);
      if(up.error){btn.disabled=false;msg.textContent='Save failed: '+up.error.message;msg.className='gform-msg err';return;}
      var i=CONTACTS.findIndex(function(x){return String(x.id)===String(contactEdit);});if(i>-1)CONTACTS[i]=Object.assign({},CONTACTS[i],rec);
    }
    contactEdit=null;contactObj=null;contactDelConfirm=false;renderContacts();
  }
  async function deleteContact(){

  let ROAST_CART=[], roastDate='', roastTime='', roastBanner='', roastBannerErr=false, roastAddOpen={};

  async function saveRoast(){
    const btn=document.getElementById('ro-save');
    var rows=ROAST_CART.map(function(r){return {r:r,kg:parseFloat(r.kg)};}).filter(function(x){return x.kg>0;});
    if(!rows.length){roastBanner='Enter a quantity for at least one bean';roastBannerErr=true;renderRoast();return;}
    btn.disabled=true;btn.textContent='Logging…';
    var ok=0,fail=0,failMsg='';
    for(var i=0;i<rows.length;i++){
      var r=rows[i].r,kg=rows[i].kg;
      var bean=BEANS.find(function(b){return String(b.id)===String(r.id);});
      var rec={bean_id:r.id,bean_name:r.name,country:r.country,green_kg:kg,status:'pending_cupping'};
      if(roastDate)rec.roast_date=roastDate;
      var ins=await sb.from('roasts').insert(rec).select();
      if(ins.error){fail++;failMsg=ins.error.message;continue;}
      var newQty=Math.max(0,(Number(bean&&bean.quantity)||0)-kg);
      await sb.from('beans').update({quantity:newQty}).eq('id',r.id);
      if(bean)bean.quantity=newQty;
      if(ins.data&&ins.data[0])ROASTS.unshift(ins.data[0]);
      ok++;
    }
    ROAST_CART=[];
    roastBanner=ok+' logged and deducted from stock'+(fail?(', '+fail+' failed: '+failMsg):'');
    roastBannerErr=fail>0;
    renderRoast();
  }

  async function adjustStock(beanId,deltaKg){
    if(!beanId||!deltaKg)return;
    const {data}=await sb.from('beans').select('quantity').eq('id',beanId).single();
    if(!data)return;
    var nq=Math.max(0,(Number(data.quantity)||0)+deltaKg);
    await sb.from('beans').update({quantity:nq}).eq('id',beanId);
    var lb=BEANS.find(function(x){return String(x.id)===String(beanId);});
    if(lb)lb.quantity=nq;
  }
  async function saveRoastEdit(){

    if(!r)return;
    var newKg=parseFloat(document.getElementById('re-kg').value);
    var newDate=document.getElementById('re-date').value;
    if(isNaN(newKg)||newKg<0){msg.textContent='Enter a valid quantity';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    var oldKg=Number(r.green_kg)||0;
    var delta=newKg-oldKg; // extra amount → deduct from stock
    if(delta!==0)await adjustStock(r.bean_id, -delta);
    var upd={green_kg:newKg};
    if(newDate)upd.roast_date=newDate;
    const {error}=await sb.from('roasts').update(upd).eq('id',r.id);
    if(error){btn.disabled=false;msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    r.green_kg=newKg;if(newDate)r.roast_date=newDate;
    roastEdit=null;roastDelConfirm=false;renderRoasted();
  }

    document.getElementById('se-save').addEventListener('click',saveSampleEdit);
    var dd=document.getElementById('se-del');if(dd)dd.addEventListener('click',function(){smpDelConfirm=true;renderSampleEdit();});
    var dc=document.getElementById('se-del-cancel');if(dc)dc.addEventListener('click',function(){smpDelConfirm=false;renderSampleEdit();});
    var dy=document.getElementById('se-del-yes');if(dy)dy.addEventListener('click',deleteSample);
  }
  async function saveSampleEdit(){
    const msg=document.getElementById('se-msg');
    const btn=document.getElementById('se-save');
    var p=smpEditObj;var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
    captureChars('se',p);
    var upd={cupping_date:p.cupping_date||todayStr(),supplier:g('se-supplier').trim()||null,sample_id:g('se-id').trim()||null,process:g('se-process').trim()||null,
      fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:g('se-comment').trim()||null,decision:p.decision||null};
    if(!upd.supplier&&!upd.sample_id){msg.textContent='Enter at least Supplier or ID';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    var ures=await sb.from('samples').update(upd).eq('id',smpEdit);
    if(ures.error&&upd.features!==undefined){var u2=Object.assign({},upd);delete u2.features;ures=await sb.from('samples').update(u2).eq('id',smpEdit);}
    var error=ures.error;
    btn.disabled=false;
    if(error){msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    var i=SAMPLES.findIndex(function(x){return String(x.id)===String(smpEdit);});
    if(i>-1)SAMPLES[i]=Object.assign({},SAMPLES[i],upd);
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;smpAfterEdit();
    document.getElementById('green-content').scrollTop=0;
  }
  function smpAfterEdit(){if(smpEditFrom==='history'){renderHistory();}else{renderSample();}}
  async function deleteSample(){
    const {error}=await sb.from('samples').delete().eq('id',smpEdit);
    if(error){var m=document.getElementById('se-msg');if(m){m.textContent='Delete failed: '+error.message;m.className='gform-msg err';}smpDelConfirm=false;renderSampleEdit();return;}
    SAMPLES=SAMPLES.filter(function(x){return String(x.id)!==String(smpEdit);});
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;smpAfterEdit();
  }
  function sampleCard(s){
    var chips=[['F/A',s.fragrance],['Acid',s.acidity],['Sweet',s.sweetness],['Body',s.body],['After',s.aftertaste]].filter(function(x){return x[1]!=null;}).map(function(x){return '<span class="sc-chip">'+x[0]+'<b>'+strLabel(x[1])+'</b></span>';}).join('');
    var sub=[s.supplier?'Supplier '+esc(s.supplier):'',s.process?esc(s.process):''].filter(Boolean).join(' · ');
    var dec=s.decision==='buy'?'<span class="smp-badge buy">Buy</span>':(s.decision==='maybe'?'<span class="smp-badge maybe">Maybe</span>':(s.decision==='skip'?'<span class="smp-badge skip">Skip</span>':'<span class="rd-meta">'+esc(fmtDate(s.cupping_date))+'</span>'));
    var nm=(s.no!=null?'<span class="smp-no">No.'+s.no+'</span> ':'')+esc(s.sample_id||s.supplier||'Sample');
    var FEAT={fragrance:'Fragrance',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
    var feats=(s.features&&s.features.length)?('<div class="smp-feats">'+s.features.map(function(k){return '<span class="feat-chip">'+esc(FEAT[k]||k)+'</span>';}).join('')+'</div>'):'';
    return '<div class="smp-item" data-id="'+esc(s.id)+'"><div class="bean-top"><span class="bean-nm">'+nm+'</span>'+dec+'</div>'
      +'<div class="bean-sub">'+esc(fmtDate(s.cupping_date))+(sub?' · '+sub:'')+'</div>'
      +(chips?'<div class="smp-scoreline">'+chips+'</div>':'')
      +feats
      +(s.comment?'<div class="smp-cmt">'+esc(s.comment)+'</div>':'')+'</div>';
  }
  async function openCupping(roastId){
    var r=ROASTS.find(function(x){return String(x.id)===String(roastId);});
    if(!r)return;
    var proc='';
    var bean=BEANS.find(function(b){return String(b.id)===String(r.bean_id);});
    if(bean){proc=bean.process||'';}
    openPage('green');
    document.getElementById('green-title').textContent='Analyse';
    document.getElementById('green-count').textContent='';
    document.getElementById('green-content').innerHTML='<div class="sempty">Loading…</div>';
    if(!bean&&r.bean_id){try{var bq=await sb.from('beans').select('process').eq('id',r.bean_id).single();if(bq&&bq.data)proc=bq.data.process||'';}catch(e){}}
    var res=await sb.from('samples').select('*').order('cupping_date',{ascending:false}).order('no',{ascending:false}).order('created_at',{ascending:false});
    SAMPLES=res.error?[]:(res.data||[]);
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;
    smpCuppingRoast=r.id;
    smpPages=[Object.assign(blankSmp(),{supplier:'Ratio Coffee',sample_id:r.bean_name||'',process:proc})];
    smpIdx=0;greenView='sample';
    renderSample(res.error?res.error.message:'');
  }
  async function submitCupping(){
    captureSmp();
    var p=smpPages[smpIdx];
    var msg=document.getElementById('smp-msg');
    var btn=document.getElementById('smp-submit');
    var rid=smpCuppingRoast;
    var hasInfo=(p.fragrance!=null||p.acidity!=null||p.sweetness!=null||p.body!=null||p.aftertaste!=null)||((p.features||[]).length>0)||((p.comment||'').trim()!=='');
    if(btn)btn.disabled=true;if(msg){msg.textContent='Saving…';msg.className='gform-msg';}
    if(!hasInfo){
      if(rid){
        var lp=ROASTS.find(function(x){return String(x.id)===String(rid);});
        var bn=lp?lp.bean_name:null;
        var upp=await sb.from('roasts').update({status:'pending_cupping'}).eq('id',rid);
        if(upp&&upp.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Update failed: '+upp.error.message;msg.className='gform-msg err';}return;}
        if(lp)lp.status='pending_cupping';
        if(bn){
          try{await sb.from('samples').delete().eq('supplier','Ratio Coffee').eq('sample_id',bn);}catch(e){}
          SAMPLES=SAMPLES.filter(function(x){return !(x.supplier==='Ratio Coffee'&&x.sample_id===bn);});
        }
      }
      smpCuppingRoast=null;smpPages=[blankSmp()];smpIdx=0;
      roastedTitle='Pending';beansView='production';openPage('beans');renderRoasted();return;
    }
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||'Ratio Coffee',sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:null};
    if(!rec.sample_id){if(btn)btn.disabled=false;if(msg){msg.textContent='Missing coffee name (ID)';msg.className='gform-msg err';}return;}
    let ins=await sb.from('samples').insert(rec).select();
    if(ins.error&&rec.features!==undefined){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';}return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    if(rid){
      var up=await sb.from('roasts').update({status:'cupped'}).eq('id',rid);
      if(up&&up.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Saved sample, but status update failed: '+up.error.message;msg.className='gform-msg err';}return;}
      var lr=ROASTS.find(function(x){return String(x.id)===String(rid);});
      if(lr)lr.status='cupped';
    }
    smpCuppingRoast=null;
    smpPages=[blankSmp()];smpIdx=0;
    roastedTitle='Pending';beansView='production';
    openPage('beans');
    renderRoasted();
  }
  async function saveSample(decision){
    captureSmp();
    const msg=document.getElementById('smp-msg');
    const buy=document.getElementById('smp-buy'),skip=document.getElementById('smp-skip'),maybe=document.getElementById('smp-maybe');
    var p=smpPages[smpIdx];
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||null,sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:decision};
    if(!rec.supplier&&!rec.sample_id){msg.textContent='Enter at least Supplier or ID';msg.className='gform-msg err';return;}
    buy.disabled=true;skip.disabled=true;if(maybe)maybe.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    let ins=await sb.from('samples').insert(rec).select();
    if(ins.error&&rec.features!==undefined){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error){buy.disabled=false;skip.disabled=false;if(maybe)maybe.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    smpPages.splice(smpIdx,1);
    if(!smpPages.length)smpPages=[blankSmp()];
    if(smpIdx>=smpPages.length)smpIdx=smpPages.length-1;
    renderSample('','Saved ('+(decision==='buy'?'Buy':(decision==='maybe'?'Maybe':'Skip'))+') — on to the next');
    document.getElementById('green-content').scrollTop=0;
  }
  function swapSides(){var pdfS=document.getElementById('screen-pdf');if(pdfS&&pdfS.classList.contains('open')){pdfBack();return;}const pg=document.querySelector('.screen.open');if(pg){if(pg.id==='screen-green'&&typeof greenBack==='function'){greenBack();return;}if(pg.id==='screen-beans'&&typeof beansBack==='function'){beansBack();return;}if(pg.id==='screen-contacts'&&typeof contactsBack==='function'){contactsBack();return;}closePage();return;}if(dockStack.length){dockBack();return;}const lp=document.querySelector('.pill[data-side="shop"]');const rp=document.querySelector('.pill[data-side="roastery"]');const cl=document.querySelectorAll('.cluster');document.getElementById('swap').classList.toggle('spin');cl.forEach(c=>{c.style.opacity='0';c.style.transform='scale(.94)';});setTimeout(()=>{const t=lp.innerHTML;lp.innerHTML=rp.innerHTML;rp.innerHTML=t;const n=document.querySelectorAll('.cname');if(n.length>=2){const tn=n[0].textContent;n[0].textContent=n[1].textContent;n[1].textContent=tn;}cl.forEach(c=>{c.style.opacity='1';c.style.transform='scale(1)';});},160);}
  function openFolder(){document.getElementById('ov').classList.add('open');}
  function closeFolder(){document.getElementById('ov').classList.remove('open');}

  const pad=n=>n<10?'0'+n:n;
  function tick(){const d=new Date(),h=d.getHours(),h12=h%12===0?12:h%12;
    document.getElementById('clock').textContent=h12+':'+pad(d.getMinutes());}
  tick();setInterval(tick,10000);
</script>
