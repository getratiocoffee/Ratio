<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#F4ECEA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Ratio</title>
<style>
  :root{--bg:#F4ECEA;--surface:#FCF6F4;--ink:#322B2A;--muted:#8C8079;--accent:#B25E6A;--tint:#F3DDE0;--line:rgba(50,43,42,0.10);--brand:#49423A;--on-brand:#F4ECEA;--on-brand-dim:rgba(244,236,234,.7)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",system-ui,sans-serif;position:fixed;top:0;left:0;right:0;height:100dvh;display:flex;flex-direction:column}
  .board{flex:1;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
  .bhead{background:var(--brand);display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:var(--on-brand);min-height:60px}
  .bhead svg path{fill:var(--on-brand)}
  .bhead .logo{width:38px;height:38px;display:block}
  .bhead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .hright{display:flex;flex-direction:column;align-items:flex-end;gap:1px;line-height:1}
  #who{font-size:11px;color:var(--on-brand);opacity:.7;font-weight:500}
  #who:empty{display:none}
  .clock{font-size:26px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;color:var(--on-brand);letter-spacing:.5px}
  .feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .msg{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .msg:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
  .mbody{flex:1;min-width:0;text-align:left}
  .mtitle{font-size:13px;font-weight:600;color:var(--ink)}
  .mtext{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtime{font-size:11px;color:var(--muted);flex:0 0 auto;margin-top:1px}
  .mdel{flex:0 0 auto;border:none;background:none;color:var(--line);cursor:pointer;padding:2px;margin:-2px -4px 0 -2px;display:flex;align-items:center}
  .mdel svg{width:15px;height:15px}
  .mdel:active{color:var(--accent)}
  .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:0;padding:0 16px calc(env(safe-area-inset-bottom,0px) - 18px)}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .16s ease,transform .16s ease}
  .cname{font-size:12px;font-weight:600;color:var(--muted)}
  .pill{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;border-radius:30px;background:var(--surface);border:.5px solid var(--line)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;cursor:pointer;transition:transform .12s ease}
  .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;color:var(--ink);overflow:hidden}
  .ic svg{width:40px;height:40px}
  .lbl{font-size:10px;color:var(--muted)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:0}
  .swap{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:transform .3s ease}
  .swap.spin{transform:rotate(180deg)}
  .swap svg{width:23px;height:23px}
  .folder{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .fgrid{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:5px}
  .fgrid span{background:var(--accent);border-radius:2px;opacity:.85}
  #power{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#5FA45C;cursor:pointer;padding:0;transition:color .2s ease}
  /* dock-morph: tapping an app swaps the two side clusters for that module's two buttons */
  .bar.module{gap:10px}
  .bar.module .cluster{flex:1;min-width:0}
  .bar.module .pill{grid-template-columns:1fr;background:transparent;border:none;padding:0;width:100%}
  .bar.module .cname{display:none}
  .dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;width:100%;min-height:150px;border:1px solid var(--line);border-radius:26px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .12s ease}
  .dock-btn:active{transform:scale(.96)}
  .dock-btn .db-ic{width:52px;height:52px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .dock-btn .db-ic svg{width:27px;height:27px;color:var(--accent)}
  .dock-btn .db-lab{font-size:14px;font-weight:600;color:var(--ink);line-height:1.15;text-align:center;padding:0 6px}
  .dock-btn .db-zh{font-size:10px;color:var(--muted);margin-top:-4px}
  .swap.back{color:var(--accent)}
  @keyframes press-pf{0%{transform:scale(1)}30%{transform:scale(.84);background:var(--tint)}60%{transform:scale(1.1);background:var(--tint)}100%{transform:scale(1)}}
  .pressing{animation:press-pf .42s ease}
  .item[data-id="beans"] .ic svg{transform:scale(.7)}
  .item[data-id="roast"] .ic svg{transform:translateY(3px) scale(1.2)}
  .item[data-id="tools"] .ic svg{transform:scale(1.2)}
  .ov{position:fixed;inset:0;background:rgba(50,43,42,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}
  .ov.open{display:flex}
  .panel{background:var(--surface);border-radius:26px;padding:20px 18px 22px;width:100%;max-width:330px;transform:scale(.85);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .ov.open .panel{transform:scale(1);opacity:1}
  /* ---- full-screen module page (Timesheet, etc.) ---- */
  .screen{position:fixed;inset:0;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 16px);background:var(--bg);border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;z-index:20;display:flex;flex-direction:column;transform:translateX(calc(100% + 24px));transition:transform .28s cubic-bezier(.4,0,.2,1);visibility:hidden}
  .screen.open{transform:none;visibility:visible}
  .shead{display:flex;align-items:center;gap:10px;padding:0 14px;min-height:60px;background:var(--brand);color:var(--on-brand)}
  .shead .back{width:36px;height:36px;border-radius:11px;border:none;background:rgba(244,236,234,.14);color:var(--on-brand);display:grid;place-items:center;cursor:pointer;padding:0;transition:background .15s ease}
  .shead .back:active{background:rgba(244,236,234,.24)}
  .shead .back svg{width:20px;height:20px}
  .shead h1{font-size:18px;font-weight:600;margin:0;flex:1}
  .shead .wk{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:var(--on-brand-dim)}
  .sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
  .dayhd{position:sticky;top:0;background:var(--bg);font-size:12px;font-weight:600;color:var(--muted);padding:14px 18px 6px;letter-spacing:.02em;z-index:1}
  .shift{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
  .shift .who{flex:1;min-width:0}
  .shift .nm{font-size:14px;font-weight:600;color:var(--ink)}
  .shift .role{font-size:11px;color:var(--muted);margin-top:2px}
  .shift .rt{text-align:right;white-space:nowrap}
  .shift .tm{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;color:var(--ink)}
  .shift .hrs{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--accent);margin-top:2px}
  .sempty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
  .beans-search{padding:12px 16px 6px;position:sticky;top:0;background:var(--bg);z-index:2}
  .green-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 4px}
  .green-stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
  .green-stat .lab{font-size:11px;color:var(--muted)}
  .green-stat .val{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:19px;font-weight:600;color:var(--ink);margin-top:3px;line-height:1.1}
  .green-stat .val small{font-size:11px;font-weight:500;color:var(--muted);margin-left:2px}
  .gsec{font-size:12px;font-weight:600;color:var(--muted);padding:14px 18px 2px;letter-spacing:.02em}
  /* level 1: country tiles */
  .gcountries{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:8px 16px 16px}
  .gcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 15px;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .12s ease,border-color .12s ease}
  .gcard:active{transform:scale(.97)}
  .gcard .gc-name{font-size:17px;font-weight:600;color:var(--ink)}
  .gcard .gc-sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--muted);margin-top:8px}
  .gcard .gc-n{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:600;border-radius:8px;padding:1px 8px;align-self:flex-start}
  /* level 2: bean tiles */
  .gbeans{display:flex;flex-direction:column;gap:10px;padding:8px 16px 16px}
  .gbean{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:transform .12s ease}
  .gbean:active{transform:scale(.98)}
  .gbean .gb-main{min-width:0}
  .gbean .gb-name{font-size:16px;font-weight:600;color:var(--ink)}
  .gbean .gb-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .gbean .gb-arrow{color:var(--muted);flex:0 0 auto}
  .gbean .gb-arrow svg{width:18px;height:18px;display:block}
  /* level 3: detail rows */
  .gdetail{padding:6px 16px 20px}
  .gd-hero{padding:16px 4px 12px}
  .gd-hero .gd-nm{font-size:22px;font-weight:600;color:var(--ink);line-height:1.15}
  .gd-hero .gd-ct{font-size:13px;color:var(--accent);font-weight:600;margin-top:4px}
  .gd-list{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .grow{display:flex;justify-content:space-between;gap:14px;padding:12px 15px;border-top:1px solid var(--line)}
  .grow:first-child{border-top:none}
  .grow .gk{font-size:13px;color:var(--muted);flex:0 0 auto}
  .grow .gv{font-size:13px;color:var(--ink);text-align:right;font-weight:500}
  .grow .gv.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  /* edit button + form */
  .gbtn{display:block;width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .15s ease}
  .gbtn:active{opacity:.8}
  .gbtn[disabled]{opacity:.5}
  .gbtn.ghost{background:var(--surface);color:var(--accent);border:1px solid var(--line);margin-bottom:12px}
  .gform{display:flex;flex-direction:column;gap:11px;padding-top:4px}
  .gfield{display:flex;flex-direction:column;gap:5px}
  .gfield .gl{font-size:12px;color:var(--muted);padding-left:2px}
  .gfield input{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit}
  .gfield input:focus{border-color:var(--accent)}
  .gform-actions{display:flex;gap:10px;margin-top:6px}
  .gform-actions .gbtn{margin-bottom:0}
  .gform-msg{font-size:12px;color:var(--muted);min-height:14px}
  .gform-msg.err{color:var(--accent)}
  .gform-msg.ok{color:#5b7a57}
  .gbtn.danger{background:#C0392B;color:#fff}
  .gbtn.dghost{background:var(--surface);color:#C0392B;border:1px solid #E6BBB5}
  .gdel{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
  .gdel-msg{font-size:13px;color:var(--ink);margin-bottom:11px;text-align:center;line-height:1.5}
  .re-seg{display:flex;gap:8px}
  .re-opt{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:12px;padding:11px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
  .re-opt.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .gta{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;resize:vertical;width:100%}
  .gta:focus{border-color:var(--accent)}
  /* sample form (redesigned) */
  .smp-pager{display:flex;align-items:center;gap:8px;padding:12px 16px 2px}
  .smp-nav{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:inherit}
  .smp-nav:active{background:#EDE3DF}
  .smp-pos{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--ink)}
  .smp-add{border:1px solid var(--accent);background:var(--surface);color:var(--accent);border-radius:11px;padding:0 14px;height:40px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:0 0 auto}
  .smp-add:active{background:#F4E4E0}
  .smp-nohdr{font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:700;color:var(--accent);padding:6px 18px 2px}
  .smp-no{font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:1px 7px;margin-right:2px}
  .smp-item{cursor:pointer}
  .smp-item:active{background:#FAF2EF}
  .smp-hint{font-size:12px;color:var(--muted);text-align:center;padding:10px 4px 0}
  .smp-sec{margin:0 16px 14px}
  .smp-sec:first-child{margin-top:14px}
  .smp-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
  .smp-fields{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px;display:flex;flex-direction:column;gap:12px}
  .smp-f{display:flex;flex-direction:column;gap:5px}
  .smp-f span{font-size:12px;color:var(--muted);padding-left:2px}
  .smp-f input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit;width:100%}
  .smp-f input:focus{border-color:var(--accent);background:var(--surface)}
  .smp-f2{display:flex;gap:10px}
  .smp-f2 .smp-f{flex:1;min-width:0}
  .smp-scores{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .smp-score{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border-top:1px solid var(--line)}
  .smp-score:first-child{border-top:none}
  .smp-sname{font-size:14px;color:var(--ink);font-weight:500}
  .dots{display:flex;gap:9px;align-items:center}
  .dot{width:23px;height:23px;border-radius:50%;border:1.7px solid #D6C8C1;background:transparent;cursor:pointer;padding:0;transition:transform .12s ease,background .12s ease,border-color .12s ease}
  .dot.fill{background:var(--accent);border-color:var(--accent)}
  .dot:active{transform:scale(.85)}
  .smp-msg-wrap{padding:0 18px}
  .smp-decide-wrap{position:sticky;bottom:0;padding:10px 16px 14px;background:linear-gradient(to top,var(--bg) 72%,rgba(244,236,234,0))}
  .smp-decide{display:flex;gap:11px}
  .smp-decide .gbtn{padding:15px;font-size:15px;border-radius:14px}
  .gbtn.buy{background:#5E8C61;color:#fff}
  .gbtn.skip{background:var(--surface);color:#6B5E50;border:1px solid var(--line)}
  .smp-list{display:flex;flex-direction:column;gap:10px}
  .smp-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .smp-scoreline{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .sc-chip{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px 8px}
  .sc-chip b{color:var(--ink);margin-left:4px;font-family:ui-monospace,Menlo,monospace}
  .smp-cmt{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.5}
  .smp-badge{font-size:11px;font-weight:600;border-radius:8px;padding:3px 11px;color:#fff}
  .smp-badge.buy{background:#5E8C61}
  .smp-badge.skip{background:#9A8B82}
  /* green home 2x2 */
  .ghome{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:16px}
  .ghome-tile{background:var(--surface);border:1px solid var(--line);border-radius:20px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:transform .12s ease}
  .ghome-tile:active{transform:scale(.97)}
  .gh-ic{width:52px;height:52px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .gh-ic svg{width:26px;height:26px;color:var(--accent)}
  .gh-lab{font-size:18px;font-weight:600;color:var(--ink)}
  .gh-zh{font-size:11px;color:var(--muted);margin-top:-6px}
  .ghome-tile.soon{background:var(--bg);border:1.5px dashed #CBBEB7}
  .ghome-tile.soon .gh-ic{background:#EDE3DF}
  .ghome-tile.soon .gh-ic svg{color:var(--muted)}
  .ghome-tile.soon .gh-lab{color:#6B5E50}
  .ghome-tile.wide{grid-column:1 / -1;min-height:84px}
  /* ===== STANDARD: module landing — two big buttons, anchored center-bottom (one-handed phone use) =====
     Markup:  <div class="landing"><div class="cta2">
                 <button class="bhome-tile">…</button>
                 <button class="bhome-tile">…</button>
              </div></div>                                                                              */
  .landing{min-height:calc(100dvh - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px) - 112px);display:flex;flex-direction:column;justify-content:flex-end;padding:16px 16px 26px;box-sizing:border-box}
  .cta2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .bhome-tile{background:var(--surface);border:1px solid var(--line);border-radius:22px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .12s ease}
  .bhome-tile:active{transform:scale(.97)}
  .bhome-ic{width:66px;height:66px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .bhome-ic svg{width:32px;height:32px;color:var(--accent)}
  .bhome-lab{font-size:19px;font-weight:600;color:var(--ink)}
  .bhome-zh{font-size:12px;color:var(--muted);margin-top:-8px}
  .gsel{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
  .gsel:focus{border-color:var(--accent)}
  .rbadge{font-size:11px;font-weight:600;color:#fff;background:var(--accent);border-radius:8px;padding:2px 9px;white-space:nowrap}
  .rbadge.done{background:#7E9B7A}
  .rcard{cursor:pointer}
  /* roasted by-date collapsible (Beans) */
  .rdate{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 18px;cursor:pointer;font-family:inherit}
  .rd-chev{color:var(--muted);display:flex;transition:transform .15s ease}
  .rd-chev svg{width:18px;height:18px}
  .rdate.open .rd-chev{transform:rotate(90deg)}
  .rd-date{font-size:15px;font-weight:600;color:var(--ink);flex:1;font-family:ui-monospace,Menlo,monospace}
  .rd-meta{font-size:12px;color:var(--muted)}
  .rd-meta b{color:var(--accent)}
  .rd-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:10px;background:#FAF2EF}
  .rd-body .bean{margin:0}
  /* roasting cart UI */
  .ro-banner{margin:12px 16px 0;font-size:13px;font-weight:500;color:#5b7a57}
  .ro-banner.err{color:var(--accent)}
  .ro-banner:empty{display:none}
  .ro-top{display:flex;gap:10px;padding:12px 16px 2px}
  .ro-dt{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
  .ro-dt span{font-size:11px;color:var(--muted);padding-left:2px}
  .ro-dt input{border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;width:100%}
  .ro-dt input:focus{border-color:var(--accent)}
  .ro-cart{padding:2px 16px 6px;display:flex;flex-direction:column;gap:10px}
  .ro-row{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:12px 14px}
  .ro-rh{display:flex;justify-content:space-between;align-items:center}
  .ro-nm{font-size:15px;font-weight:600;color:var(--ink)}
  .ro-x{border:none;background:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 6px;line-height:1}
  .ro-rem{font-size:11px;color:var(--muted);margin-top:2px}
  .ro-qty{display:flex;align-items:center;gap:10px;margin-top:11px}
  .ro-step{width:46px;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:inherit}
  .ro-step:active{background:#EDE3DF}
  .ro-in{flex:1;min-width:0;text-align:center;border:1px solid var(--line);border-radius:13px;padding:11px;font-size:19px;font-weight:600;color:var(--ink);background:var(--bg);outline:none;font-family:ui-monospace,Menlo,monospace}
  .ro-in:focus{border-color:var(--accent)}
  .ro-unit{font-size:13px;color:var(--muted);flex:0 0 auto}
  .ro-add{padding:2px 16px 16px;display:flex;flex-direction:column;gap:8px}
  .ro-aitem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;cursor:pointer;font-family:inherit}
  .ro-aitem:active{background:#FAF2EF}
  .ro-an{font-size:15px;font-weight:600;color:var(--ink)}
  .ro-as{font-size:12px;color:var(--muted);margin-top:2px}
  .ro-plus{width:32px;height:32px;border-radius:50%;background:#F4E4E0;color:var(--accent);font-size:19px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ro-save-wrap{position:sticky;bottom:0;padding:12px 16px 14px;background:linear-gradient(to top,var(--bg) 72%,rgba(244,236,234,0))}
  .ro-cgroup{border-bottom:1px solid var(--line)}
  .ro-chead{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:13px 2px;cursor:pointer;font-family:inherit}
  .ro-chead .rd-chev{color:var(--muted);display:flex;transition:transform .15s ease}
  .ro-chead .rd-chev svg{width:18px;height:18px}
  .ro-chead.open .rd-chev{transform:rotate(90deg)}
  .ro-cname{font-size:14px;font-weight:600;color:var(--ink);flex:1}
  .ro-cbody{display:flex;flex-direction:column;gap:8px;padding:2px 0 12px}
  .beans-search input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit}
  .beans-search input:focus{border-color:var(--accent)}
  .bean{margin:8px 14px;padding:13px 15px;background:var(--surface);border:1px solid var(--line);border-radius:14px}
  .bean-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .bean-nm{font-size:15px;font-weight:600;color:var(--ink)}
  .bean-ct{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap}
  .bean-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .bean-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .bean-chip{font-size:11px;color:#6B5E50;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:2px 8px}
  .bean-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--muted)}
  .bean-meta b{color:var(--ink);font-weight:600}
  .ptitle{font-size:15px;font-weight:600;text-align:center;margin:0 0 16px}
  .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 8px}
  .pgrid .item{width:auto}
  .pgrid .ic{width:48px;height:48px;border-radius:13px}
  .pgrid .ic svg{width:26px;height:26px}
  .composer{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--line);background:var(--surface)}
  .composer input{flex:1;min-width:0;border:1px solid var(--line);border-radius:18px;padding:9px 14px;font-size:13px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit}
  .composer input::placeholder{color:var(--muted)}
  .composer button{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:grid;place-items:center;cursor:pointer;padding:0;transition:opacity .15s ease}
  .composer button:active{opacity:.7}
  .composer button svg{width:18px;height:18px}
  @media(min-width:520px){body{max-width:430px;left:50%;right:auto;transform:translateX(-50%);border-left:.5px solid var(--line);border-right:.5px solid var(--line)}}
  /* ---- login gate ---- */
  .auth{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px}
  .auth.show{display:flex}
  .auth-card{width:100%;max-width:320px;text-align:center;position:relative}
  .auth-x{position:absolute;top:-14px;right:-6px;width:34px;height:34px;border:none;background:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;font-family:inherit}
  .auth-x:active{opacity:.6}
  .auth-logo{width:54px;height:54px;margin:0 auto 14px}
  .auth-logo img{width:100%;height:100%;display:block}
  .auth h2{font-size:26px;font-weight:600;margin:0 0 4px;color:var(--ink);letter-spacing:.01em}
  .auth .sub{font-size:13px;color:var(--muted);margin:0 0 22px}
  .auth input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 15px;font-size:15px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;margin-bottom:10px}
  .auth input:focus{border-color:var(--accent)}
  .auth input::placeholder{color:var(--muted)}
  .auth .go{width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;color:#fff;background:var(--accent);cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s ease}
  .auth .go:active{opacity:.8}
  .auth .go[disabled]{opacity:.5}
  .auth .lnk{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:14px;font-family:inherit;text-decoration:underline}
  .auth .hint{font-size:12px;margin:12px 2px 0;min-height:16px;line-height:1.4}
  .auth .hint.err{color:var(--accent)}
  .auth .hint.ok{color:var(--muted)}
  /* ---- role-based view ---- */
  body:not(.role-staff) .cluster{display:none}
  body:not(.role-staff) #swap{display:none}
  body:not(.role-staff) .bar{justify-content:center}
  body:not(.role-staff) .center{height:auto!important}
</style>
</head>
<body>
  <div class="auth" id="auth">
    <div class="auth-card">
      <div class="auth-logo"><img src="logo.png" alt="Ratio" /></div>

      <p class="sub" id="auth-sub">登入你的帳號</p>
      <input id="auth-name" type="text" placeholder="你的名字" autocomplete="name" style="display:none" />

      <input id="auth-pass" type="password" placeholder="密碼（至少 6 位）" inputmode="numeric" autocomplete="current-password" />
      <button class="go" id="auth-go">登入</button>
      <button class="lnk" id="auth-toggle">還沒有帳號？申請一個</button>
      <p class="hint" id="auth-hint"></p>

  <div class="board">

    </div>

  <div class="bar">
    <div class="cluster"><div class="cname">Shop</div><div class="pill" data-side="shop"></div></div>
    <div class="center">
      <button class="swap" id="swap" onclick="swapSides()" aria-label="swap sides"></button>
      <div class="folder" onclick="openFolder()"><div class="fgrid" id="fgrid"></div></div>
      <button id="power" aria-label="logout"></button>
    </div>
    <div class="cluster"><div class="cname">Roastery</div><div class="pill" data-side="roastery"></div></div>
  </div>

  <div class="ov" id="ov" onclick="if(event.target===this)closeFolder()">
    <div class="panel"><p class="ptitle">More</p><div class="pgrid" id="pgrid"></div></div>
  </div>

  <div class="screen" id="screen-timesheet">
    <header class="shead">
      <button class="back" onclick="closePage()" aria-label="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
      <h1>Timesheet</h1>
      <span class="wk" id="ts-week"></span>
    </header>
    <div class="sbody" id="timesheet-body"></div>
  </div>

  <div class="screen" id="screen-green">

    <div class="sbody">
      <div id="green-content"></div>
    </div>
  </div>

    </header>
    <div class="sbody">
      <div id="beans-content"></div>

  function relTime(iso){
    if(!iso)return '';
    const t=new Date(iso).getTime();
    if(isNaN(t))return '';
    let sec=Math.floor((Date.now()-t)/1000); if(sec<0)sec=0;
    if(sec<60)return 'now';
    const m=Math.floor(sec/60); if(m<60)return m+'m';
    const h=Math.floor(m/60);   if(h<24)return h+'h';
    const d=Math.floor(h/24);   if(d<7) return d+'d';
    const w=Math.floor(d/7);    if(w<5) return w+'w';
    return Math.floor(d/30)+'mo';
  }

  /* realtime: INSERT / UPDATE / DELETE keep the local list in sync */
  sb.channel('messages-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},payload=>{
      const ev=payload.eventType, nu=payload.new, od=payload.old;
      if(ev==='INSERT'){rows.push(nu);}
      else if(ev==='UPDATE'){const i=rows.findIndex(r=>idOf(r)===idOf(nu));i>-1?rows[i]=nu:rows.push(nu);}
      else if(ev==='DELETE'){const did=idOf(od);rows=rows.filter(r=>idOf(r)!==did);}

  async function saveRoast(){
    const btn=document.getElementById('ro-save');
    var rows=ROAST_CART.map(function(r){return {r:r,kg:parseFloat(r.kg)};}).filter(function(x){return x.kg>0;});
    if(!rows.length){roastBanner='請至少給一支豆子填數量';roastBannerErr=true;renderRoast();return;}
    btn.disabled=true;btn.textContent='記錄中…';
    var ok=0,fail=0,failMsg='';
    for(var i=0;i<rows.length;i++){
      var r=rows[i].r,kg=rows[i].kg;
      var bean=BEANS.find(function(b){return String(b.id)===String(r.id);});
      var rec={bean_id:r.id,bean_name:r.name,country:r.country,green_kg:kg,status:'pending_cupping'};
      if(roastDate)rec.roast_date=roastDate;
      var ins=await sb.from('roasts').insert(rec).select();
      if(ins.error){fail++;failMsg=ins.error.message;continue;}
      var newQty=Math.max(0,(Number(bean&&bean.quantity)||0)-kg);
      await sb.from('beans').update({quantity:newQty}).eq('id',r.id);
      if(bean)bean.quantity=newQty;
      if(ins.data&&ins.data[0])ROASTS.unshift(ins.data[0]);
      ok++;
    }
    ROAST_CART=[];
    roastBanner=ok+' 筆已記錄並從庫存扣除'+(fail?('，'+fail+' 筆失敗：'+failMsg):'');
    roastBannerErr=fail>0;
    renderRoast();
  }

    box.querySelectorAll('.smp-item').forEach(function(el){el.addEventListener('click',function(){
      var s=SAMPLES.find(function(x){return String(x.id)===String(el.dataset.id);});
      if(s){smpEdit=s.id;smpEditObj=Object.assign({},s);smpEditFrom='history';smpDelConfirm=false;renderHistory();box.scrollTop=0;}
    });});
  }
  function dotRow(p,name){
    var v=p[name]||0,d='';
    for(var i=1;i<=5;i++){d+='<button class="dot'+(i<=v?' fill':'')+'" data-n="'+i+'" aria-label="'+i+'"></button>';}
    return '<div class="dots" data-name="'+name+'">'+d+'</div>';
  }
  function renderSample(errMsg,okMsg){
    const box=document.getElementById('green-content');
    if(smpEdit){renderSampleEdit();return;}
    document.getElementById('green-title').textContent='Sample';
    document.getElementById('green-count').textContent=SAMPLES.length?(SAMPLES.length+' 筆'):'';
    if(!smpPages.length)smpPages=[blankSmp()];
    if(smpIdx<0)smpIdx=0;if(smpIdx>=smpPages.length)smpIdx=smpPages.length-1;
    var p=smpPages[smpIdx];
    var no=nextNo(p.cupping_date||todayStr());
    var nav='<div class="smp-pager"><button class="smp-nav" id="smp-prev" aria-label="上一個">‹</button>'
      +'<span class="smp-pos">樣品 '+(smpIdx+1)+' / '+smpPages.length+'</span>'
      +'<button class="smp-nav" id="smp-next" aria-label="下一個">›</button>'
      +'<button class="smp-add" id="smp-add">＋ 新增</button></div>'
      +'<div class="smp-nohdr">No.'+no+'</div>';
    var scores=SMP_FIELDS.map(function(f){return '<div class="smp-score"><span class="smp-sname">'+f[1]+'</span>'+dotRow(p,f[0])+'</div>';}).join('');
    var form=''
      +'<div class="smp-sec"><div class="smp-sec-h">樣品資料</div><div class="smp-fields">'
      +'<label class="smp-f"><span>杯測日期</span><input id="smp-date" type="date" value="'+esc(p.cupping_date||todayStr())+'" /></label>'
      +'<div class="smp-f2"><label class="smp-f"><span>Supplier</span><input id="smp-supplier" type="text" value="'+esc(p.supplier||'')+'" /></label>'
      +'<label class="smp-f"><span>ID</span><input id="smp-id" type="text" value="'+esc(p.sample_id||'')+'" /></label></div>'
      +'<label class="smp-f"><span>Process</span><input id="smp-process" type="text" value="'+esc(p.process||'')+'" /></label>'
      +'</div></div>'
      +'<div class="smp-sec"><div class="smp-sec-h">杯測評分　1–5</div><div class="smp-scores">'+scores+'</div></div>'
      +'<div class="smp-sec"><div class="smp-sec-h">Comment</div><textarea id="smp-comment" class="gta" rows="3">'+esc(p.comment||'')+'</textarea></div>'
      +'<div class="smp-msg-wrap"><div class="gform-msg'+(errMsg?' err':(okMsg?' ok':''))+'" id="smp-msg">'+(errMsg?('讀取失敗：'+esc(errMsg)+'（請先在 Supabase 跑 samples 建表 SQL）'):(okMsg?esc(okMsg):''))+'</div></div>'
      +'<div class="smp-decide-wrap"><div class="smp-decide"><button class="gbtn skip" id="smp-skip">Skip</button><button class="gbtn buy" id="smp-buy">Buy</button></div></div>';
    var today=todayStr();
    var todays=SAMPLES.filter(function(x){return x.cupping_date===today;});
    var list=todays.length?('<div class="smp-sec"><div class="smp-sec-h">今天的樣品　點一下可修改／刪除</div><div class="smp-list">'+todays.map(sampleCard).join('')+'</div><div class="smp-hint">更早的紀錄在 dock 的 History</div></div>'):'';
    box.innerHTML=nav+form+list;
    box.querySelectorAll('.dots').forEach(function(dr){
      var name=dr.dataset.name;
      dr.querySelectorAll('.dot').forEach(function(d){d.addEventListener('click',function(){
        var n=+d.dataset.n;p[name]=(p[name]===n?null:n);
        var v=p[name]||0;dr.querySelectorAll('.dot').forEach(function(x){x.classList.toggle('fill',+x.dataset.n<=v);});
      });});
    });
    document.getElementById('smp-prev').addEventListener('click',function(){captureSmp();smpIdx=(smpIdx-1+smpPages.length)%smpPages.length;renderSample();box.scrollTop=0;});
    document.getElementById('smp-next').addEventListener('click',function(){captureSmp();smpIdx=(smpIdx+1)%smpPages.length;renderSample();box.scrollTop=0;});
    document.getElementById('smp-add').addEventListener('click',function(){captureSmp();smpPages.push(blankSmp());smpIdx=smpPages.length-1;renderSample();box.scrollTop=0;});
    document.getElementById('smp-buy').addEventListener('click',function(){saveSample('buy');});
    document.getElementById('smp-skip').addEventListener('click',function(){saveSample('skip');});
    box.querySelectorAll('.smp-item').forEach(function(el){el.addEventListener('click',function(){
      var s=SAMPLES.find(function(x){return String(x.id)===String(el.dataset.id);});
      if(s){smpEdit=s.id;smpEditObj=Object.assign({},s);smpEditFrom='sample';smpDelConfirm=false;renderSample();box.scrollTop=0;}
    });});
  }
  function renderSampleEdit(){
    const box=document.getElementById('green-content');
    document.getElementById('green-title').textContent='編輯樣品';
    document.getElementById('green-count').textContent='';
    var p=smpEditObj;
    var scores=SMP_FIELDS.map(function(f){return '<div class="smp-score"><span class="smp-sname">'+f[1]+'</span>'+dotRow(p,f[0])+'</div>';}).join('');
    var seg='<div class="re-seg"><button class="re-opt'+(p.decision==='buy'?' on':'')+'" data-s="buy">Buy</button><button class="re-opt'+(p.decision==='skip'?' on':'')+'" data-s="skip">Skip</button></div>';
    box.innerHTML=''
      +(p.no!=null?'<div class="smp-nohdr" style="padding-top:14px">No.'+p.no+'</div>':'')
      +'<div class="smp-sec"'+(p.no!=null?' style="margin-top:4px"':'')+'><div class="smp-sec-h">樣品資料</div><div class="smp-fields">'
      +'<label class="smp-f"><span>杯測日期</span><input id="se-date" type="date" value="'+esc(p.cupping_date||todayStr())+'" /></label>'
      +'<div class="smp-f2"><label class="smp-f"><span>Supplier</span><input id="se-supplier" type="text" value="'+esc(p.supplier||'')+'" /></label>'
      +'<label class="smp-f"><span>ID</span><input id="se-id" type="text" value="'+esc(p.sample_id||'')+'" /></label></div>'
      +'<label class="smp-f"><span>Process</span><input id="se-process" type="text" value="'+esc(p.process||'')+'" /></label>'
      +'</div></div>'
      +'<div class="smp-sec"><div class="smp-sec-h">杯測評分　1–5</div><div class="smp-scores">'+scores+'</div></div>'
      +'<div class="smp-sec"><div class="smp-sec-h">決定</div>'+seg+'</div>'
      +'<div class="smp-sec"><div class="smp-sec-h">Comment</div><textarea id="se-comment" class="gta" rows="3">'+esc(p.comment||'')+'</textarea></div>'
      +'<div class="smp-msg-wrap"><div class="gform-msg" id="se-msg"></div></div>'
      +'<div class="smp-sec"><div class="gform-actions"><button class="gbtn ghost" id="se-cancel">返回</button><button class="gbtn" id="se-save">儲存修改</button></div>'
      +'<div class="gdel">'+(smpDelConfirm
          ?'<div class="gdel-msg">確定刪除這支樣品？此動作無法復原。</div><div class="gform-actions"><button class="gbtn ghost" id="se-del-cancel">取消</button><button class="gbtn danger" id="se-del-yes">確定刪除</button></div>'
          :'<button class="gbtn dghost" id="se-del">刪除這支樣品</button>')
      +'</div></div>';
    box.querySelectorAll('.dots').forEach(function(dr){
      var name=dr.dataset.name;
      dr.querySelectorAll('.dot').forEach(function(d){d.addEventListener('click',function(){
        var n=+d.dataset.n;p[name]=(p[name]===n?null:n);
        var v=p[name]||0;dr.querySelectorAll('.dot').forEach(function(x){x.classList.toggle('fill',+x.dataset.n<=v);});
      });});
    });
    box.querySelectorAll('.re-opt').forEach(function(o){o.addEventListener('click',function(){
      p.decision=o.dataset.s;box.querySelectorAll('.re-opt').forEach(function(x){x.classList.toggle('on',x.dataset.s===p.decision);});
    });});
    document.getElementById('se-cancel').addEventListener('click',function(){smpEdit=null;smpEditObj=null;smpDelConfirm=false;smpAfterEdit();box.scrollTop=0;});
    document.getElementById('se-save').addEventListener('click',saveSampleEdit);
    var dd=document.getElementById('se-del');if(dd)dd.addEventListener('click',function(){smpDelConfirm=true;renderSampleEdit();});
    var dc=document.getElementById('se-del-cancel');if(dc)dc.addEventListener('click',function(){smpDelConfirm=false;renderSampleEdit();});
    var dy=document.getElementById('se-del-yes');if(dy)dy.addEventListener('click',deleteSample);
  }
  async function saveSampleEdit(){
    const msg=document.getElementById('se-msg');
    const btn=document.getElementById('se-save');
    var p=smpEditObj;var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
    var upd={cupping_date:g('se-date')||todayStr(),supplier:g('se-supplier').trim()||null,sample_id:g('se-id').trim()||null,process:g('se-process').trim()||null,
      fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,comment:g('se-comment').trim()||null,decision:p.decision||null};
    if(!upd.supplier&&!upd.sample_id){msg.textContent='請至少填 Supplier 或 ID';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='儲存中…';msg.className='gform-msg';
    const {error}=await sb.from('samples').update(upd).eq('id',smpEdit);
    btn.disabled=false;
    if(error){msg.textContent='儲存失敗：'+error.message;msg.className='gform-msg err';return;}
    var i=SAMPLES.findIndex(function(x){return String(x.id)===String(smpEdit);});
    if(i>-1)SAMPLES[i]=Object.assign({},SAMPLES[i],upd);
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;smpAfterEdit();
    document.getElementById('green-content').scrollTop=0;
  }
  function smpAfterEdit(){if(smpEditFrom==='history'){renderHistory();}else{renderSample();}}
  async function deleteSample(){
    const {error}=await sb.from('samples').delete().eq('id',smpEdit);
    if(error){var m=document.getElementById('se-msg');if(m){m.textContent='刪除失敗：'+error.message;m.className='gform-msg err';}smpDelConfirm=false;renderSampleEdit();return;}
    SAMPLES=SAMPLES.filter(function(x){return String(x.id)!==String(smpEdit);});
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;smpAfterEdit();
  }
  function sampleCard(s){
    var chips=[['F/A',s.fragrance],['Acid',s.acidity],['Sweet',s.sweetness],['Body',s.body],['After',s.aftertaste]].filter(function(x){return x[1]!=null;}).map(function(x){return '<span class="sc-chip">'+x[0]+'<b>'+x[1]+'</b></span>';}).join('');
    var sub=[s.sample_id?'ID '+esc(s.sample_id):'',s.process?esc(s.process):''].filter(Boolean).join(' · ');
    var dec=s.decision==='buy'?'<span class="smp-badge buy">Buy</span>':(s.decision==='skip'?'<span class="smp-badge skip">Skip</span>':'<span class="rd-meta">'+esc(fmtDate(s.cupping_date))+'</span>');
    var nm=(s.no!=null?'<span class="smp-no">No.'+s.no+'</span> ':'')+esc(s.supplier||s.sample_id||'樣品');
    return '<div class="smp-item" data-id="'+esc(s.id)+'"><div class="bean-top"><span class="bean-nm">'+nm+'</span>'+dec+'</div>'
      +'<div class="bean-sub">'+esc(fmtDate(s.cupping_date))+(sub?' · '+sub:'')+'</div>'
      +(chips?'<div class="smp-scoreline">'+chips+'</div>':'')
      +(s.comment?'<div class="smp-cmt">'+esc(s.comment)+'</div>':'')+'</div>';
  }
  async function saveSample(decision){
    captureSmp();
    const msg=document.getElementById('smp-msg');
    const buy=document.getElementById('smp-buy'),skip=document.getElementById('smp-skip');
    var p=smpPages[smpIdx];
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||null,sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,comment:(p.comment||'').trim()||null,decision:decision};
    if(!rec.supplier&&!rec.sample_id){msg.textContent='請至少填 Supplier 或 ID';msg.className='gform-msg err';return;}
    buy.disabled=true;skip.disabled=true;msg.textContent='儲存中…';msg.className='gform-msg';
    const ins=await sb.from('samples').insert(rec).select();
    if(ins.error){buy.disabled=false;skip.disabled=false;msg.textContent='儲存失敗：'+ins.error.message;msg.className='gform-msg err';return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    smpPages.splice(smpIdx,1);
    if(!smpPages.length)smpPages=[blankSmp()];
    if(smpIdx>=smpPages.length)smpIdx=smpPages.length-1;
    renderSample('','已儲存（'+(decision==='buy'?'Buy':'Skip')+'），接著填下一支');
    document.getElementById('green-content').scrollTop=0;
  }
  function swapSides(){if(dockMode==='module'){exitModule();return;}const lp=document.querySelector('.pill[data-side="shop"]');const rp=document.querySelector('.pill[data-side="roastery"]');const cl=document.querySelectorAll('.cluster');document.getElementById('swap').classList.toggle('spin');cl.forEach(c=>{c.style.opacity='0';c.style.transform='scale(.94)';});setTimeout(()=>{const t=lp.innerHTML;lp.innerHTML=rp.innerHTML;rp.innerHTML=t;const n=document.querySelectorAll('.cname');if(n.length>=2){const tn=n[0].textContent;n[0].textContent=n[1].textContent;n[1].textContent=tn;}cl.forEach(c=>{c.style.opacity='1';c.style.transform='scale(1)';});},160);}
  function openFolder(){document.getElementById('ov').classList.add('open');}
  function closeFolder(){document.getElementById('ov').classList.remove('open');}

  const pad=n=>n<10?'0'+n:n;
  function tick(){const d=new Date(),h=d.getHours(),h12=h%12===0?12:h%12;
    document.getElementById('clock').textContent=h12+':'+pad(d.getMinutes());}
  tick();setInterval(tick,10000);
</script>
</body>
</html>
