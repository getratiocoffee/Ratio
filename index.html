    doc.setFont('helvetica','bold');doc.setFontSize(FS_TITLE);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Ratio Crows Nest',ox+w/2,y+21,{align:'center'});
    y+=21;

    /* ---------- section header ---------- */
    function section(label,sub){
      y+=SEC_TOP;
      doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
      doc.text(label.toUpperCase(),x0,y,{charSpace:1.8});
      if(sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(sub),xEnd,y,{align:'right'});}
      doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.6);
      doc.line(x0,y+6,xEnd,y+6);
      y+=SEC_GAP;
    }
    /* ---------- price row (name | size .... price) ---------- */
    function priceRow(name,size,price,note){
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(mnAsc(name),x0,y);
      var nw=doc.getTextWidth(mnAsc(name));
      if(size){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text('  |  '+size,x0+nw+3,y);}
      if(price){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(price,xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
      if(note){y+=META_LH;doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(note),x0,y);}
      y+=ROW;
    }
    /* ---------- a plain meta line: label left, value right ---------- */
    function metaRow(label,value){
      doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(mnAsc(label),x0,y);
      if(value)doc.text(mnAsc(value),xEnd,y,{align:'right'});
      y+=META_LH+2;
    }

    /* ---------- two espresso blends ---------- */
    var bl=cfg.blends||[], colCx=[x0+innerW*0.27, x0+innerW*0.73], by=y+30;
    [0,1].forEach(function(ci){
      var b=bl[ci]||{}, cx=colCx[ci], hl=!!b.highlight;
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',cx,by-12,{align:'center',charSpace:1.2});}
      doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);

      if(b.sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(b.sub),cx,by+12,{align:'center'});}
      if(b.notes){doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(mnAsc(b.notes),cx,by+25,{align:'center'});}
    });

    /* ---------- ESPRESSO BASED ---------- */
    section('Espresso Based');
    priceRow('Espresso','',pv('espresso'));
    priceRow('Small','6oz',pv('small'));
    priceRow('Large','10oz',pv('large'));
    priceRow('On Ice','10oz',pv('ice'));
    metaRow('extra shot \u00b7 alternative milk',pv('altmilk','50 cents'));
    metaRow('decaf',pv('decaf','1 dollar'));

    /* ---------- SIGNATURE ---------- */
    section('Signature');
    doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Dirty Ratio',x0,y);
    var dnw=doc.getTextWidth('Dirty Ratio');
    if(cfg.dirtySub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('  '+mnAsc(cfg.dirtySub),x0+dnw+4,y);}

        doc.text(mnAsc(it.origin),x0,y);y+=META_LH;}
      if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(FS_DESC+0.5);doc.setTextColor(INK[0],INK[1],INK[2]);

  function buildMenuPDF(info4,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});

  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid — fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;

  function mnHexRgb(hex){hex=String(hex||'').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var n=parseInt(hex,16);if(isNaN(n))return null;return [(n>>16)&255,(n>>8)&255,n&255];}
  /* draw text on ONE line, shrinking the font until it fits maxW (no wrapping). Font family/style/colour must be set by caller. */
  function mnFit(doc,text,x,yy,maxW,base,min,align){
    text=mnAsc(text);var s=base;doc.setFontSize(s);
    while(s>min&&doc.getTextWidth(text)>maxW){s-=0.5;doc.setFontSize(s);}
    doc.text(text,x,yy,align?{align:align}:undefined);
    return s;
  }
  /* five-axis cupping-strength radar \u2014 centre=no data, ring1=Light, ring2=Medium, ring3=Strong (outer) */
  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a), cy-r*Math.cos(a)];}
    function segsOf(pts){var s=[];for(var i=1;i<pts.length;i++)s.push([pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]]);return s;}
    /* grid rings: Light / Medium / Strong */
    doc.setLineWidth(0.5);doc.setDrawColor(30,26,25);
    [1,2,3].forEach(function(lvl){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,R*lvl/3));doc.lines(segsOf(pts),pts[0][0],pts[0][1],[1,1],'S',true);});
    /* spokes */
    doc.setDrawColor(30,26,25);
    for(var i=0;i<n;i++){var sp=pt(i,R);doc.line(cx,cy,sp[0],sp[1]);}
    /* data polygon (0 = centre when a bean has no reading on that axis) */
    var dpts=scores.map(function(o,i){var v=(o.n==null?0:o.n);return pt(i,R*(v/3));});
    var dseg=segsOf(dpts);
    var TINT=[Math.round(255-(255-BERRY[0])*0.20),Math.round(255-(255-BERRY[1])*0.20),Math.round(255-(255-BERRY[2])*0.20)];
    doc.setFillColor(TINT[0],TINT[1],TINT[2]);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'F',true);
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1.1);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'S',true);
    doc.setFillColor(BERRY[0],BERRY[1],BERRY[2]);
    dpts.forEach(function(p){doc.circle(p[0],p[1],1,'F');});
    /* axis labels, anchored just outside each vertex */
    doc.setFont('helvetica','bold');doc.setFontSize(5.6);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    scores.forEach(function(o,i){
      var lp=pt(i,R+7);
      var align=(lp[0]<cx-2)?'right':(lp[0]>cx+2?'left':'center');
      doc.text(o.label,lp[0],lp[1]+2,{align:align});
    });
  }
  function drawCell(doc,x,y,w,h,info,INK,BROWN,BERRY,MUTE){
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    var px=x+15, pw=w-30;
    if(!info||!info.name){
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('— empty —',x+w/2,y+h/2,{align:'center'});
      return;
    }
    /* ---- coloured banner header (name highlighted in its assigned colour) ---- */
    var band=mnHexRgb(info.color)||BROWN;
    var bandH=38;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE — small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR — primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  ·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE — primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength — radar chart (secondary, muted) — inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  var BL_SEP='\u0001'; /* invisible separator encoding "name<sep>process" in a blend option value */
  function blendPartVal(name,process){return String(name||'').trim()+BL_SEP+String(process||'').trim();}
  function blendBeanOptions(selName,selProc){
    var o='<option value="">— Single Origin —</option>';
    var selVal=blendPartVal(selName,selProc);
    var matched=false;
    (BEANS||[]).slice().sort(function(a,b){
      var n=(a.name||'').localeCompare(b.name||'');return n!==0?n:(a.process||'').localeCompare(b.process||'');
    }).forEach(function(b){
      var nm=(b.name||'').trim();if(!nm)return;
      var proc=(b.process||'').trim();
      var val=blendPartVal(nm,proc);
      var sel=(val===selVal)?' selected':'';
      if(sel)matched=true;
      o+='<option value="'+esc(val)+'"'+sel+'>'+esc(nm)+(proc?' \u00b7 '+esc(proc):'')+'</option>';
    });
    /* keep an unknown saved bean visible even if it's no longer in BEANS */
    if(selName&&!matched){var v=blendPartVal(selName,selProc);o+='<option value="'+esc(v)+'" selected>'+esc(selName)+(selProc?' \u00b7 '+esc(selProc):'')+'</option>';}
    return o;
  }
  function blendTotal(bl){return bl.parts.reduce(function(s,p){var v=parseFloat(p.pct);return s+(isNaN(v)?0:v);},0);}
  function blendCostPerKg(bl){
    var parts=(bl&&bl.parts)||[],sum=0,any=false;
    parts.forEach(function(p){
      var nm=(p.bean||'').trim();if(!nm)return;
      var pct=parseFloat(p.pct);if(isNaN(pct))return;
      var b=beanByNameProcess(nm,p.process||'');
      if(!b||b.cost_per_kg==null||b.cost_per_kg==='')return;
      var c=parseFloat(b.cost_per_kg);if(isNaN(c))return;
      sum+=c*(pct/100);any=true;
    });
    return any?sum:null;
  }
  function blendCostHTML(bl){var ck=blendCostPerKg(bl);return 'Cost/KG '+(ck==null?'<b>&mdash;</b>':'<b>$'+ck.toFixed(2)+'</b>');}
  function openBlending(){

  function renderBlending(){
    var el=document.getElementById('blend-content');if(!el)return;
    var defs=loadBlendDefs();
    var trash='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';
    var cards=defs.map(function(bl,bi){

      return '<div class="bl-card">'
        +'<div class="bl-head"><button class="bl-toggle'+(open?' open':'')+'" data-bo="'+bi+'">'+chev+'</button><input class="bl-name" data-bi="'+bi+'" value="'+esc(bl.name||'')+'" placeholder="Blend name" />'
        +'<button class="bl-del" data-bi="'+bi+'" aria-label="delete blend">'+trash+'</button></div>'
        +(open?('<div class="bl-body">'
          +rows
          +'<label class="bl-notewrap"><span class="bl-notelab">Note:</span><input class="bl-note" data-bi="'+bi+'" value="'+esc(bl.note||'')+'" placeholder="Note" /></label>'
          +'<input class="bl-cmt" data-bi="'+bi+'" value="'+esc(bl.comment||'')+'" placeholder="Special comment \u00b7 e.g. V3.0 Competition Blend" />'
          +'<div class="bl-foot"><div class="bl-cost">'+blendCostHTML(bl)+'</div><div class="bl-tot '+totCls+'">Total <b>'+tot+'%</b>'+(tot===100?'':' \u00b7 should be 100%')+'</div></div>'
          +'</div>'):'')
        +'</div>';
    }).join('');
    el.innerHTML='<div class="gsec" style="padding:14px 18px 2px">Blends \u00b7 pick 3 single origins &amp; set %</div>'
      +'<div class="bl-list">'+cards+'</div>'
      +'<div class="bl-addwrap"><button class="gbtn ghost" id="bl-add">+ New blend</button>'
      +'<button class="gbtn" id="bl-save">Save recipe</button>'
      +'<div class="bl-saved" id="bl-saved">\u2713 Saved</div></div>';
    el.querySelectorAll('.bl-toggle[data-bo]').forEach(function(b){b.addEventListener('click',function(){var bi=+b.dataset.bo;blOpen[bi]=!blOpen[bi];renderBlending();});});
    el.querySelectorAll('.bl-name').forEach(function(inp){inp.addEventListener('input',function(){var d=loadBlendDefs();d[+inp.dataset.bi].name=inp.value;saveBlendDefs(d);markBlendDups(el);});});

    el.querySelectorAll('.bl-note').forEach(function(inp){inp.addEventListener('input',function(){var d=loadBlendDefs();d[+inp.dataset.bi].note=inp.value;saveBlendDefs(d);});});

    el.querySelectorAll('.bl-pctin').forEach(function(i){i.addEventListener('input',function(){var d=loadBlendDefs();d[+i.dataset.bi].parts[+i.dataset.pi].pct=i.value;saveBlendDefs(d);
      var card=i.closest('.bl-card'),t=card&&card.querySelector('.bl-tot');if(t){var tt=blendTotal(d[+i.dataset.bi]);t.className='bl-tot '+(tt===100?'ok':(tt>100?'over':''));t.innerHTML='Total <b>'+tt+'%</b>'+(tt===100?'':' \u00b7 should be 100%');}
      var ce=card&&card.querySelector('.bl-cost');if(ce)ce.innerHTML=blendCostHTML(d[+i.dataset.bi]);});});
    el.querySelectorAll('.bl-del').forEach(function(b){b.addEventListener('click',function(){var d=loadBlendDefs();d.splice(+b.dataset.bi,1);saveBlendDefs(d);renderBlending();});});
    var add=document.getElementById('bl-add');if(add)add.addEventListener('click',function(){var d=loadBlendDefs();d.push(blankBlend(''));blOpen[d.length-1]=true;saveBlendDefs(d);renderBlending();el.scrollTop=el.scrollHeight;});
    var save=document.getElementById('bl-save');if(save)save.addEventListener('click',function(){

    else if(greenView==='add'){greenView=greenAddCountry?'beans':'countries';if(greenAddCountry)greenCountry=greenAddCountry;greenAddCountry=null;renderGreen();}

        const list='<div class="gd-list">'+rows.map(function(r){return '<div class="grow"><span class="gk">'+r[0]+'</span><span class="gv'+(r[2]?' mono':'')+'">'+esc(r[1])+'</span></div>';}).join('')+'</div>';
        box.innerHTML='<div class="gdetail"><button class="gbtn ghost" id="green-edit" style="margin-top:14px">Edit</button>'+list+'</div>';

        +'<div class="gform-msg" id="green-msg"></div>'
        +'<div class="gform-actions"><button class="gbtn ghost" id="green-cancel">Cancel</button><button class="gbtn savegate" id="green-save">Save</button></div>'

            :'<button class="gbtn dghost" id="gdel">Delete this bean</button>')

    else if(greenView==='add'){

  async function saveNewBean(){
    const msg=document.getElementById('green-msg');
    const btn=document.getElementById('green-save');
    const rec={};
    document.querySelectorAll('#green-content [data-f]').forEach(function(inp){
      const f=inp.dataset.f; let v=inp.value.trim();
      if(f==='quantity'||f==='cost_per_kg'){rec[f]=(v===''||isNaN(parseFloat(v)))?null:parseFloat(v);}
      else{rec[f]=v===''?null:v;}
    });
    if(!rec.name){msg.textContent='Name cannot be empty';msg.className='gform-msg err';return;}
    rec.id='bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {data,error}=await sb.from('beans').insert(rec).select();
    btn.disabled=false;
    if(error){msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    const nb=(data&&data[0])?data[0]:rec;
    BEANS.push(nb);
    greenAddCountry=null;
    greenBeanId=nb.id;greenCountry=nb.country||'—';greenView=nb.id?'detail':'beans';greenEdit=false;
    renderGreen();
  }
  async function saveBean(){
    const msg=document.getElementById('green-msg');
    const btn=document.getElementById('green-save');
    const upd={};
    document.querySelectorAll('#green-content [data-f]').forEach(function(inp){
      const f=inp.dataset.f; let v=inp.value.trim();
      if(f==='quantity'||f==='cost_per_kg'){upd[f]=(v===''||isNaN(parseFloat(v)))?null:parseFloat(v);}
      else{upd[f]=v===''?null:v;}
    });
    if(!upd.name){msg.textContent='Name cannot be empty';msg.className='gform-msg err';return;}
    var _bi=BEANS.findIndex(function(x){return String(x.id)===String(greenBeanId);});
    var oldName=(_bi>-1?(BEANS[_bi].name||''):'').trim();
    var newName=(upd.name||'').trim();
    var renamed=oldName&&newName&&oldName!==newName;
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {error}=await sb.from('beans').update(upd).eq('id',greenBeanId);
    if(error){btn.disabled=false;msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    /* rename cascade: keep cupping (samples) + roasts in sync with Green info */
    if(renamed){
      msg.textContent='Saving\u2026 relinking cupping records';
      var e1=(await sb.from('samples').update({sample_id:newName}).eq('sample_id',oldName)).error;
      var e2=(await sb.from('roasts').update({bean_name:newName}).eq('bean_name',oldName)).error;
      if(e1||e2){btn.disabled=false;msg.textContent='Renamed the bean, but relinking failed: '+((e1||e2).message)+' \u2014 please retry';msg.className='gform-msg err';return;}
      /* sync in-memory arrays so the UI shows the new name immediately */
      (SAMPLES||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      (RETAIL_BEANS||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      (RTL_ROWS||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      (ROASTS||[]).forEach(function(r){if((r.bean_name||'')===oldName)r.bean_name=newName;});
    }
    btn.disabled=false;
    if(_bi>-1)BEANS[_bi]=Object.assign({},BEANS[_bi],upd);
    greenEdit=false;renderGreen();
  }
  async function deleteBean(){
    const id=greenBeanId;
    const {error}=await sb.from('beans').delete().eq('id',id);
    if(error){var m=document.getElementById('green-msg');if(m){m.textContent='Delete failed: '+error.message;m.className='gform-msg err';}greenDelConfirm=false;renderGreen();return;}
    BEANS=BEANS.filter(function(x){return String(x.id)!==String(id);});
    greenEdit=false;greenDelConfirm=false;greenBeanId=null;
    var stillHas=BEANS.some(function(x){return (x.country||'—')===greenCountry;});
    greenView=stillHas?'beans':'countries';
    renderGreen();
  }

  async function saveRoast(){
    const btn=document.getElementById('ro-save');
    var rows=ROAST_CART.map(function(r){return {r:r,kg:parseFloat(r.kg)};}).filter(function(x){return x.kg>0;});
    if(!rows.length){roastBanner='Enter a quantity for at least one bean';roastBannerErr=true;renderRoast();return;}
    btn.disabled=true;btn.textContent='Logging…';
    var ok=0,fail=0,failMsg='';
    for(var i=0;i<rows.length;i++){
      var r=rows[i].r,kg=rows[i].kg;
      var bean=BEANS.find(function(b){return String(b.id)===String(r.id);});
      var rec={bean_id:r.id,bean_name:r.name,country:r.country,green_kg:kg,status:'pending_cupping'};
      if(roastDate)rec.roast_date=roastDate;
      var ins=await sb.from('roasts').insert(rec).select();
      if(ins.error){fail++;failMsg=ins.error.message;continue;}
      var newQty=Math.max(0,(Number(bean&&bean.quantity)||0)-kg);
      await sb.from('beans').update({quantity:newQty}).eq('id',r.id);
      if(bean)bean.quantity=newQty;
      if(ins.data&&ins.data[0])ROASTS.unshift(ins.data[0]);
      ok++;
    }
    ROAST_CART=[];
    roastBanner=ok+' logged and deducted from stock'+(fail?(', '+fail+' failed: '+failMsg):'');
    roastBannerErr=fail>0;
    renderRoast();
  }

        if(sx==null)return;var dx=e.changedTouches[0].clientX-sx;sx=null;handled=true;
        var out=el.classList.contains('out');

        else if(dx<-28){if(out)setState(false);}    /* swipe left -> Available */
        else toggle();                              /* tap */
        setTimeout(function(){handled=false;},400);
      },{passive:true});
      el.addEventListener('click',function(){if(handled)return;toggle();});
    });

      /* sync in-memory arrays so the UI shows the new name immediately */
      (SAMPLES||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      if(typeof RETAIL_BEANS!=='undefined'&&RETAIL_BEANS)RETAIL_BEANS.forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});

      [[loadDots,saveDots],[loadGrams,saveGrams],[loadSold,saveSold]].forEach(function(pair){

        var r=rail.getBoundingClientRect(),frac=(clientX-r.left)/r.width;
        if(frac<0)frac=0;if(frac>1)frac=1;
        var v=Math.min(3,Math.max(1,Math.round(frac*2)+1));

    const {error}=await sb.from('samples').delete().eq('id',id);
    if(error){alert('Delete failed: '+error.message);return;}
    SAMPLES=SAMPLES.filter(function(x){return String(x.id)!==String(id);});
    smpDelHist=null;delete sampleOpen[id];
    if(after)after();
  }
  var sampleOpen={};
  /* inline SVG radar for the History screen — 5 axes, inner=Light, outer=Strong */
  function sampleRadarSVG(s,force){
    var axes=[['fragrance','Fragrance'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
    if(!force&&!axes.some(function(a){return s[a[0]]!=null;}))return '';
    var W=232,H=176,cx=W/2,cy=H/2+4,R=46,n=axes.length;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
    function poly(r){return axes.map(function(_,i){var p=pt(i,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
    var grid='';[1,2,3].forEach(function(l){grid+='<polygon points="'+poly(R*l/3)+'" fill="none" stroke="rgba(50,43,42,0.12)" stroke-width="1"/>';});
    var spokes='';for(var i=0;i<n;i++){var p=pt(i,R);spokes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(50,43,42,0.10)" stroke-width="1"/>';}
    var dpts=axes.map(function(a,i){var v=(s[a[0]]==null?0:s[a[0]]);return pt(i,R*(v/3));});
    var dpoly=dpts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    var dots=dpts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2" fill="#B25E6A"/>';}).join('');
    var labels='';axes.forEach(function(a,i){
      var lp=pt(i,R+15),anc=(lp[0]<cx-2?'end':(lp[0]>cx+2?'start':'middle'));
      labels+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+3).toFixed(1)+'" font-size="9" font-weight="700" fill="#8C8079" text-anchor="'+anc+'">'+a[1]+'</text>';
    });
    return '<div class="smp-radar"><svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">'
      +grid+spokes
      +'<polygon points="'+dpoly+'" fill="rgba(178,94,106,0.18)" stroke="#B25E6A" stroke-width="1.6" stroke-linejoin="round"/>'
      +dots+labels+'</svg></div>';
  }
  function sampleCard(s){
    var open=!!sampleOpen[s.id];
    var radar=sampleRadarSVG(s);
    var dec=s.decision==='buy'?'<span class="smp-badge buy">Buy</span>':(s.decision==='maybe'?'<span class="smp-badge maybe">Maybe</span>':(s.decision==='skip'?'<span class="smp-badge skip">Skip</span>':''));
    var nm=esc(s.sample_id||s.supplier||'Sample')+((s.process||'').trim()?' <span class="smp-proc">'+esc(s.process.trim())+'</span>':'');
    var noTag=(s.no!=null?'<span class="smp-no">No.'+s.no+'</span>':'');
    var FEAT={fragrance:'Fragrance',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
    var feats=(s.features&&s.features.length)?('<div class="smp-feats">'+s.features.map(function(k){return '<span class="feat-chip">'+esc(FEAT[k]||k)+'</span>';}).join('')+'</div>'):'';
    function metaRow(lab,val){return val?'<div class="smp-meta"><span class="smp-meta-l">'+lab+'</span><span class="smp-meta-v">'+esc(val)+'</span></div>':'';}
    var meta=metaRow('Supplier',s.supplier)
      +metaRow('Analysed by',s.cupper)
      +metaRow('Analysed date',fmtDate(s.cupping_date));
    var chev='<span class="rd-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
    var head='<button class="smp-head'+(open?' open':'')+'" data-toggle="'+esc(s.id)+'">'+chev+'<span class="bean-nm">'+nm+'</span><span class="smp-head-right">'+dec+noTag+'</span></button>';
    var binSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13M10 11v6M14 11v6"/></svg>';
    var footer;
    if(smpDelHist===s.id){
      footer='<div class="smp-delbar"><span>Delete this sample? This can\u2019t be undone.</span>'
        +'<div class="smp-delact"><button class="gbtn ghost" data-delcancel="1">Cancel</button>'
        +'<button class="gbtn danger" data-delok="'+esc(s.id)+'">Delete</button></div></div>';
    }else{
      var isProdRoast=(s.supplier==='Ratio Coffee');
      footer='<div class="smp-foot">'
        +(isProdRoast?'':(
          '<button class="decopt skip'+(s.decision==='skip'?' on':'')+'" data-dec="skip" data-id="'+esc(s.id)+'">Skip</button>'
          +'<button class="decopt maybe'+(s.decision==='maybe'?' on':'')+'" data-dec="maybe" data-id="'+esc(s.id)+'">Maybe</button>'
          +'<button class="decopt buy'+(s.decision==='buy'?' on':'')+'" data-dec="buy" data-id="'+esc(s.id)+'">Buy</button>'
        ))
        +'<button class="smp-del'+(isProdRoast?' solo':'')+'" data-del="'+esc(s.id)+'" aria-label="delete">'+binSVG+'</button></div>';
    }
    var body=open?('<div class="smp-body">'
      +'<div class="smp-tap" data-edit="'+esc(s.id)+'">'
      +radar
      +feats
      +(s.comment?'<div class="smp-cmt">'+esc(s.comment)+'</div>':'')
      +meta
      +'</div>'
      +footer
      +'</div>'):'';
    return '<div class="smp-item">'+head+body+'</div>';
  }
  async function setSampleDecision(id,dec,after){
    var s=SAMPLES.find(function(x){return String(x.id)===String(id);});
    var newDec=(s&&s.decision===dec)?null:dec;
    const {error}=await sb.from('samples').update({decision:newDec}).eq('id',id);
    if(error){alert('Update failed: '+error.message);return;}
    if(s)s.decision=newDec;
    if(after)after();
  }
  async function openCupping(roastId){
    var r=ROASTS.find(function(x){return String(x.id)===String(roastId);});
    if(!r)return;
    var proc='';
    var bean=BEANS.find(function(b){return String(b.id)===String(r.bean_id);});
    if(bean){proc=bean.process||'';}
    openPage('green');
    document.getElementById('green-title').textContent='Analyse';
    document.getElementById('green-count').textContent='';
    document.getElementById('green-content').innerHTML='<div class="sempty">Loading…</div>';
    if(!bean&&r.bean_id){try{var bq=await sb.from('beans').select('process').eq('id',r.bean_id).single();if(bq&&bq.data)proc=bq.data.process||'';}catch(e){}}
    var res=await sb.from('samples').select('*').order('cupping_date',{ascending:false}).order('no',{ascending:false}).order('created_at',{ascending:false});
    SAMPLES=res.error?[]:(res.data||[]);
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;
    smpCuppingRoast=r.id;
    var prev=SAMPLES.find(function(x){return x.supplier==='Ratio Coffee'&&String(x.sample_id||'')===String(r.bean_name||'');});
    var page=Object.assign(blankSmp(),{supplier:'Ratio Coffee',sample_id:r.bean_name||'',process:proc});
    if(prev){
      page.fragrance=prev.fragrance;page.acidity=prev.acidity;page.sweetness=prev.sweetness;page.body=prev.body;page.aftertaste=prev.aftertaste;
      page.features=(prev.features||[]).slice();
      page.comment=prev.comment||'';
      if(prev.process&&!page.process)page.process=prev.process;
    }
    smpPages=[page];
    smpIdx=0;greenView='sample';
    renderSample(res.error?res.error.message:'');
  }
  async function openBlendCupping(name){
    name=String(name||'').trim();if(!name)return;
    openPage('green');
    document.getElementById('green-title').textContent='Analyse';
    document.getElementById('green-count').textContent='';
    document.getElementById('green-content').innerHTML='<div class="sempty">Loading\u2026</div>';
    var res=await sb.from('samples').select('*').order('cupping_date',{ascending:false}).order('no',{ascending:false}).order('created_at',{ascending:false});
    SAMPLES=res.error?[]:(res.data||[]);
    smpEdit=null;smpEditObj=null;smpDelConfirm=false;
    smpCuppingRoast=null;blendCupping={name:name};
    var prev=SAMPLES.find(function(x){return x.supplier==='Ratio Coffee'&&String(x.sample_id||'')===name;});
    var page=Object.assign(blankSmp(),{supplier:'Ratio Coffee',sample_id:name,process:''});
    if(prev){
      page.fragrance=prev.fragrance;page.acidity=prev.acidity;page.sweetness=prev.sweetness;page.body=prev.body;page.aftertaste=prev.aftertaste;
      page.features=(prev.features||[]).slice();
      page.comment=prev.comment||'';
      if(prev.process)page.process=prev.process;
    }
    smpPages=[page];
    smpIdx=0;greenView='sample';
    renderSample(res.error?res.error.message:'');
  }
  async function submitCupping(){
    captureSmp();
    var p=smpPages[smpIdx];
    var msg=document.getElementById('smp-msg');
    var btn=document.getElementById('smp-submit');
    var rid=smpCuppingRoast;
    var hasInfo=(p.fragrance!=null||p.acidity!=null||p.sweetness!=null||p.body!=null||p.aftertaste!=null)||((p.features||[]).length>0)||((p.comment||'').trim()!=='');
    if(btn)btn.disabled=true;if(msg){msg.textContent='Saving…';msg.className='gform-msg';}
    if(!hasInfo){
      if(rid){
        var lp=ROASTS.find(function(x){return String(x.id)===String(rid);});
        var bn=lp?lp.bean_name:null;
        var upp=await sb.from('roasts').update({status:'pending_cupping'}).eq('id',rid);
        if(upp&&upp.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Update failed: '+upp.error.message;msg.className='gform-msg err';}return;}
        if(lp)lp.status='pending_cupping';
        if(bn){
          try{await sb.from('samples').delete().eq('supplier','Ratio Coffee').eq('sample_id',bn);}catch(e){}
          SAMPLES=SAMPLES.filter(function(x){return !(x.supplier==='Ratio Coffee'&&x.sample_id===bn);});
        }
      }
      smpCuppingRoast=null;blendCupping=null;blendSamplesLoaded=false;smpPages=[blankSmp()];smpIdx=0;
      roastedTitle='Pending';beansView='production';openPage('beans');renderRoasted();return;
    }
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||'Ratio Coffee',sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:null,cupper:(window.CURRENT_USER||null)};
    if(!rec.sample_id){if(btn)btn.disabled=false;if(msg){msg.textContent='Missing coffee name (ID)';msg.className='gform-msg err';}return;}
    let ins=await sb.from('samples').insert(rec).select();
    if(ins.error&&rec.features!==undefined){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error&&rec.cupper!==undefined){var r3=Object.assign({},rec);delete r3.cupper;delete r3.features;ins=await sb.from('samples').insert(r3).select();}
    if(ins.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';}return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    if(rid){
      var up=await sb.from('roasts').update({status:'cupped'}).eq('id',rid);
      if(up&&up.error){if(btn)btn.disabled=false;if(msg){msg.textContent='Saved sample, but status update failed: '+up.error.message;msg.className='gform-msg err';}return;}
      var lr=ROASTS.find(function(x){return String(x.id)===String(rid);});
      if(lr)lr.status='cupped';
    }
    smpCuppingRoast=null;blendCupping=null;blendSamplesLoaded=false;
    smpPages=[blankSmp()];smpIdx=0;
    roastedTitle='Pending';beansView='production';
    openPage('beans');
    renderRoasted();
  }
  async function saveSample(){
    captureSmp();
    const msg=document.getElementById('smp-msg');
    const saveBtn=document.getElementById('smp-save');
    var p=smpPages[smpIdx];
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||null,sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:p.decision||null,cupper:(window.CURRENT_USER||null)};
    if(!rec.supplier&&!rec.sample_id){msg.textContent='Enter at least Supplier or ID';msg.className='gform-msg err';return;}
    var dupKey=(rec.sample_id||'').trim().toLowerCase();
    var isDup=dupKey&&SAMPLES.some(function(x){return x.cupping_date===rec.cupping_date&&(x.sample_id||'').trim().toLowerCase()===dupKey;});
    if(isDup&&!smpDupConfirm){
      smpDupConfirm=true;
      msg.textContent='⚠️ 同一天已有「'+rec.sample_id+'」的紀錄，再按一次 Submit 確認新增';
      msg.className='gform-msg err';
      return;
    }
    smpDupConfirm=false;
    if(saveBtn)saveBtn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    let ins=await sb.from('samples').insert(rec).select();
    if(ins.error&&rec.features!==undefined){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error&&rec.cupper!==undefined){var r3=Object.assign({},rec);delete r3.cupper;delete r3.features;ins=await sb.from('samples').insert(r3).select();}
    if(ins.error){if(saveBtn)saveBtn.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    smpPages.splice(smpIdx,1);
    if(!smpPages.length)smpPages=[blankSmp()];
    if(smpIdx>=smpPages.length)smpIdx=smpPages.length-1;
    renderSample('','Saved — set Skip / Maybe / Buy on the card below');
    document.getElementById('green-content').scrollTop=0;
  }
  function swapSides(){var pdfS=document.getElementById('screen-pdf');if(pdfS&&pdfS.classList.contains('open')){pdfBack();return;}const pg=document.querySelector('.screen.open');if(pg){if(pg.id==='screen-green'&&typeof greenBack==='function'){greenBack();return;}if(pg.id==='screen-beans'&&typeof beansBack==='function'){beansBack();return;}if(pg.id==='screen-contacts'&&typeof contactsBack==='function'){contactsBack();return;}if(pg.id==='screen-menu'&&typeof menuBack==='function'){menuBack();return;}closePage();return;}if(dockStack.length){dockBack();return;}const lp=document.querySelector('.pill[data-side="shop"]');const rp=document.querySelector('.pill[data-side="roastery"]');const cl=document.querySelectorAll('.cluster');document.getElementById('swap').classList.toggle('spin');cl.forEach(c=>{c.style.opacity='0';c.style.transform='scale(.94)';});setTimeout(()=>{const t=lp.innerHTML;lp.innerHTML=rp.innerHTML;rp.innerHTML=t;const n=document.querySelectorAll('.cname');if(n.length>=2){const tn=n[0].textContent;n[0].textContent=n[1].textContent;n[1].textContent=tn;}cl.forEach(c=>{c.style.opacity='1';c.style.transform='scale(1)';});},160);}
  function openFolder(){closeFloatingPopups();var ov=document.getElementById('ov');if(ov)ov.classList.add('open');}
  function closeFolder(){document.getElementById('ov').classList.remove('open');}

  const pad=n=>n<10?'0'+n:n;
  function tick(){const d=new Date(),h=d.getHours(),h12=h%12===0?12:h%12;
    document.getElementById('clock').textContent=h12+':'+pad(d.getMinutes());}
  tick();setInterval(tick,10000);
</script>
