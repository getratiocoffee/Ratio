<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1a1336" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Home</title>
<style>
  :root {
    --bg-top: #2a1f52;
    --bg-mid: #1c1740;
    --bg-bot: #0f0c24;
    --glow: #6a4dff;
    --ink: #f3f0ff;
    --ink-soft: #b9b2e0;
    --dock-glass: rgba(255, 255, 255, 0.10);
    --dock-stroke: rgba(255, 255, 255, 0.18);
    --tile: rgba(255, 255, 255, 0.06);
    --tile-stroke: rgba(255, 255, 255, 0.12);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(106,77,255,0.35), transparent 60%),
      radial-gradient(100% 60% at 0% 110%, rgba(255,110,180,0.18), transparent 55%),
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bot) 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Top zone: glanceable, not interactive (out of thumb reach) ---------- */
  .glance {
    padding: calc(var(--safe-top) + 28px) 28px 0;
    text-align: center;
    flex: 0 0 auto;
    user-select: none;
  }
  .clock {
    font-size: 64px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    text-shadow: 0 2px 30px rgba(106,77,255,0.45);
  }
  .date {
    margin-top: 8px;
    font-size: 15px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }

  /* spacer pushes the interactive grid into the lower half */
  .spacer { flex: 1 1 auto; min-height: 12px; }

  /* ---------- App grid: lives in the thumb-friendly lower region ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px 12px;
    padding: 0 22px 18px;
    flex: 0 0 auto;
  }

  .app {
    appearance: none;
    border: 0;
    background: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font: inherit;
  }
  .app .icon {
    width: 60px;
    height: 60px;
    border-radius: 17px;
    background: var(--tile);
    border: 1px solid var(--tile-stroke);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10);
    transition: transform 0.18s ease;
  }
  .app .icon svg { width: 28px; height: 28px; }
  .app .label {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .app:active .icon { transform: scale(0.90); }
  .app:focus-visible .icon { outline: 2px solid var(--glow); outline-offset: 3px; }

  /* page dots */
  .dots {
    display: flex;
    justify-content: center;
    gap: 7px;
    padding: 4px 0 16px;
    flex: 0 0 auto;
  }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dots span.on { background: rgba(255,255,255,0.85); }

  /* ---------- Frosted glass dock: 4 across, pinned bottom ---------- */
  .dock-wrap {
    flex: 0 0 auto;
    padding: 0 14px calc(var(--safe-bottom) + 14px);
  }
  .dock {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 12px;
    border-radius: 30px;
    background: var(--dock-glass);
    border: 1px solid var(--dock-stroke);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow: 0 12px 40px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .dock .app .icon {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.10);
    border-color: rgba(255,255,255,0.16);
  }

  @media (prefers-reduced-motion: reduce) {
    .app .icon { transition: none; }
  }
  @media (min-width: 520px) {
    body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 80px rgba(0,0,0,0.5); }
  }
</style>
</head>
<body>
  <header class="glance">
    <div class="clock" id="clock">9:41</div>
    <div class="date" id="date">Monday, June 1</div>
  </header>

  <div class="spacer"></div>

  <main class="grid" id="grid" aria-label="Apps"></main>

  <nav class="dots" aria-hidden="true">
    <span class="on"></span><span></span>
  </nav>

  <div class="dock-wrap">
    <div class="dock" id="dock" aria-label="Dock"></div>
  </div>

<script>
  // ---- Icon set (inline, no external deps) ----
  const I = {
    grid:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>',
    chart:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19V9M12 19V5M19 19v-6"/></svg>',
    chat:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8 8 0 0 1-11.6 7L4 19l1.5-5.4A8 8 0 1 1 21 11.5Z"/></svg>',
    note:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14v11l-5 5H5z"/><path d="M14 20v-5h5"/></svg>',
    photo:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2"/><path d="M21 17l-5-5L5 21"/></svg>',
    music:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M9 18V5l12-2v13"/></svg>',
    calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
    wallet:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10h18M16 14h2"/></svg>',
    phone:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h3l2 5-2 1a11 11 0 0 0 5 5l1-2 5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg>',
    mail:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m4 7 8 6 8-6"/></svg>',
    compass: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-2 5-4 1 2-5 4-1Z"/></svg>',
    settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5L9 5.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5L5 10.5a7 7 0 0 0 0 3l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.5 2.5h5l.5-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5c.1-.3.1-.7.1-1Z"/></svg>',
  };

  // ---- App config: edit this list to add/remove apps later ----
  const apps = [
    { id: 'home',     label: 'Home',     icon: 'grid'     },
    { id: 'stats',    label: 'Stats',    icon: 'chart'    },
    { id: 'notes',    label: 'Notes',    icon: 'note'     },
    { id: 'photos',   label: 'Photos',   icon: 'photo'    },
    { id: 'music',    label: 'Music',    icon: 'music'    },
    { id: 'calendar', label: 'Calendar', icon: 'calendar' },
    { id: 'wallet',   label: 'Wallet',   icon: 'wallet'   },
    { id: 'explore',  label: 'Explore',  icon: 'compass'  },
  ];

  const dock = [
    { id: 'phone',    label: 'Phone',    icon: 'phone' },
    { id: 'messages', label: 'Messages', icon: 'chat'  },
    { id: 'mail',     label: 'Mail',     icon: 'mail'  },
    { id: 'settings', label: 'Settings', icon: 'settings' },
  ];

  function tile(app) {
    const b = document.createElement('button');
    b.className = 'app';
    b.dataset.id = app.id;
    b.setAttribute('aria-label', app.label);
    b.innerHTML = `<span class="icon">${I[app.icon] || ''}</span><span class="label">${app.label}</span>`;
    b.addEventListener('click', () => onOpen(app.id));
    return b;
  }

  function render(el, list) { list.forEach(a => el.appendChild(tile(a))); }
  render(document.getElementById('grid'), apps);
  render(document.getElementById('dock'), dock);

  // hook for features later
  function onOpen(id) {
    console.log('open:', id);
    // TODO: route to the app's screen here
  }

  // ---- Live clock ----
  function pad(n){ return n < 10 ? '0'+n : n; }
  function tick() {
    const d = new Date();
    let h = d.getHours();
    const ampm = h >= 12 ? '' : '';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    document.getElementById('clock').textContent = h12 + ':' + pad(d.getMinutes());
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date').textContent = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
  }
  tick();
  setInterval(tick, 10000);
</script>
</body>
</html>
