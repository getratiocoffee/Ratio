<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#F4ECEA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Ratio</title>
<style>
  :root{--bg:#F4ECEA;--surface:#FCF6F4;--ink:#322B2A;--muted:#8C8079;--accent:#B25E6A;--tint:#F3DDE0;--line:rgba(50,43,42,0.10)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column}
  .board{flex:1;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
  .bhead{background:#49423A;display:flex;align-items:center;justify-content:space-between;padding:9px 18px;color:#F4ECEA}
  .bhead svg path{fill:#F4ECEA}
  .bhead .logo{width:40px;height:40px;display:block}
  .bhead .logo svg{width:100%;height:100%;display:block}
  .htime{text-align:right;line-height:1}
  .htime .clock{font-size:30px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;color:#F4ECEA}
  .feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .msg{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .msg:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
  .mbody{flex:1;min-width:0;text-align:left}
  .mtitle{font-size:13px;font-weight:600;color:var(--ink)}
  .mtext{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtime{font-size:11px;color:var(--muted);flex:0 0 auto;margin-top:1px}
  .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:0;padding:0 16px calc(env(safe-area-inset-bottom,0px) - 18px)}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .16s ease,transform .16s ease}
  .cname{font-size:12px;font-weight:600;color:var(--muted)}
  .pill{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;border-radius:30px;background:var(--surface);border:.5px solid var(--line)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;cursor:pointer;transition:transform .12s ease}
  .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;color:var(--ink);overflow:hidden}
  .ic svg{width:40px;height:40px}
  .lbl{font-size:10px;color:var(--muted)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:0}
  .swap{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:transform .3s ease}
  .swap.spin{transform:rotate(180deg)}
  .swap svg{width:23px;height:23px}
  .folder{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .fgrid{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:5px}
  .fgrid span{background:var(--accent);border-radius:2px;opacity:.85}
  #power{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#5FA45C;cursor:pointer;padding:0;transition:color .2s ease}
  @keyframes press-pf{0%{transform:scale(1)}30%{transform:scale(.84);background:var(--tint)}60%{transform:scale(1.1);background:var(--tint)}100%{transform:scale(1)}}
  .pressing{animation:press-pf .42s ease}
  .item[data-id="beans"] .ic svg{transform:scale(.7)}
  .item[data-id="roast"] .ic svg{transform:translateY(3px) scale(1.2)}
  .item[data-id="tools"] .ic svg{transform:scale(1.2)}
  .ov{position:fixed;inset:0;background:rgba(50,43,42,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}
  .ov.open{display:flex}
  .panel{background:var(--surface);border-radius:26px;padding:20px 18px 22px;width:100%;max-width:330px;transform:scale(.85);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .ov.open .panel{transform:scale(1);opacity:1}
  /* ---- full-screen module page (Timesheet, etc.) ---- */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);visibility:hidden}
  .screen.open{transform:none;visibility:visible}
  .shead{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 13px;background:#49423A;color:#F4ECEA}
  .shead .back{width:34px;height:34px;border-radius:10px;border:none;background:rgba(244,236,234,.12);color:#F4ECEA;display:grid;place-items:center;cursor:pointer;padding:0;transition:background .15s ease}
  .shead .back:active{background:rgba(244,236,234,.22)}
  .shead .back svg{width:20px;height:20px}
  .shead h1{font-size:18px;font-weight:600;margin:0;flex:1}
  .shead .wk{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:rgba(244,236,234,.7)}
  .sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}
  .dayhd{position:sticky;top:0;background:var(--bg);font-size:12px;font-weight:600;color:var(--muted);padding:14px 18px 6px;letter-spacing:.02em;z-index:1}
  .shift{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
  .shift .who{flex:1;min-width:0}
  .shift .nm{font-size:14px;font-weight:600;color:var(--ink)}
  .shift .role{font-size:11px;color:var(--muted);margin-top:2px}
  .shift .rt{text-align:right;white-space:nowrap}
  .shift .tm{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;color:var(--ink)}
  .shift .hrs{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--accent);margin-top:2px}
  .sempty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
  .ptitle{font-size:15px;font-weight:600;text-align:center;margin:0 0 16px}
  .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 8px}
  .pgrid .item{width:auto}
  .pgrid .ic{width:48px;height:48px;border-radius:13px}
  .pgrid .ic svg{width:26px;height:26px}
  .composer{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--line);background:var(--surface)}
  .composer input{flex:1;min-width:0;border:1px solid var(--line);border-radius:18px;padding:9px 14px;font-size:13px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit}
  .composer input::placeholder{color:var(--muted)}
  .composer button{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:grid;place-items:center;cursor:pointer;padding:0;transition:opacity .15s ease}
  .composer button:active{opacity:.7}
  .composer button svg{width:18px;height:18px}
  @media(min-width:520px){body{max-width:430px;margin:0 auto;border-left:.5px solid var(--line);border-right:.5px solid var(--line)}}
</style>
</head>

  function togglePower(){const p=document.getElementById('power');const on=p.dataset.on!=='0';p.dataset.on=on?'0':'1';p.style.color=on?'#49423A':'#5FA45C';}
  function alignCenter(){const pill=document.querySelector('.pill');const c=document.querySelector('.center');if(pill&&c)c.style.height=Math.round(pill.getBoundingClientRect().height)+'px';}
  alignCenter();window.addEventListener('resize',alignCenter);setTimeout(alignCenter,300);
  function press(el){el.classList.remove('pressing');void el.offsetWidth;el.classList.add('pressing');}
  document.querySelector('.bar').addEventListener('pointerdown',e=>{const t=e.target.closest('.ic,.fgrid,#power');if(t)press(t);});
  document.querySelector('.bar').addEventListener('click',e=>{const it=e.target.closest('.item');if(it&&it.dataset.id)onOpen(it.dataset.id);});

  /* ---- Supabase live message feed ---- */
  const SUPABASE_URL='https://kjhudxzvidhynpabnalp.supabase.co';
  const SUPABASE_KEY='sb_publishable_vt7hUK07u-veHOb4mXGGhQ_wX06qDeQ';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  const feedEl=document.getElementById('feed');
  let rows=[];

  /* flexible column lookup so the feed survives small schema differences */
  const pick=(r,keys,def)=>{for(const k of keys){if(r&&r[k]!=null)return r[k];}return def;};
  const titleOf=r=>pick(r,['title','name'],'');
  const textOf =r=>pick(r,['preview','body','text','message'],'');
  const unreadOf=r=>pick(r,['unread','is_unread'],false);
  const tsOf  =r=>pick(r,['created_at','inserted_at'],null);
  const idOf  =r=>pick(r,['id'],null);

  const esc=v=>String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function relTime(iso){
    if(!iso)return '';
    const t=new Date(iso).getTime();
    if(isNaN(t))return '';
    let sec=Math.floor((Date.now()-t)/1000); if(sec<0)sec=0;
    if(sec<60)return 'now';
    const m=Math.floor(sec/60); if(m<60)return m+'m';
    const h=Math.floor(m/60);   if(h<24)return h+'h';
    const d=Math.floor(h/24);   if(d<7) return d+'d';
    const w=Math.floor(d/7);    if(w<5) return w+'w';
    return Math.floor(d/30)+'mo';
  }

  function sortRows(){rows.sort((a,b)=>(new Date(tsOf(b)).getTime()||0)-(new Date(tsOf(a)).getTime()||0));}

  function renderFeed(){
    if(!rows.length){feedEl.innerHTML='<div class="msg" style="justify-content:center;border-bottom:none;color:var(--muted);font-size:12px">No messages yet</div>';return;}
    feedEl.innerHTML=rows.map(r=>{
      const u=unreadOf(r);
      return `<div class="msg"><span class="dot" style="background:${u?'var(--accent)':'var(--line)'}"></span><div class="mbody"><div class="mtitle">${esc(titleOf(r))}</div><div class="mtext">${esc(textOf(r))}</div></div><div class="mtime">${relTime(tsOf(r))}</div></div>`;
    }).join('');
  }
  renderFeed();

  async function loadMessages(){
    const {data,error}=await sb.from('messages').select('*').order('created_at',{ascending:false});
    if(error){console.error('[Ratio] load error:',error.message||error);return;}
    rows=data||[];sortRows();renderFeed();
  }
  loadMessages();

  /* realtime: INSERT / UPDATE / DELETE keep the local list in sync */
  sb.channel('messages-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},payload=>{
      const ev=payload.eventType, nu=payload.new, od=payload.old;
      if(ev==='INSERT'){rows.push(nu);}
      else if(ev==='UPDATE'){const i=rows.findIndex(r=>idOf(r)===idOf(nu));i>-1?rows[i]=nu:rows.push(nu);}
      else if(ev==='DELETE'){const did=idOf(od);rows=rows.filter(r=>idOf(r)!==did);}
      sortRows();renderFeed();
    })
    .subscribe(st=>{if(st==='SUBSCRIBED')console.log('[Ratio] realtime subscribed');});

  /* refresh the relative timestamps once a minute */
  setInterval(renderFeed,60000);

  /* ---- composer: type a message, write it to Supabase ---- */
  async function sendMessage(){
    const inp=document.getElementById('composer-input');
    const text=inp.value.trim();
    if(!text)return;
    inp.value='';
    const {error}=await sb.from('messages').insert({title:text,unread:true});
    if(error){console.error('[Ratio] send error:',error.message||error);inp.value=text;}
    /* the realtime subscription adds the new row to the feed automatically */
  }
  document.getElementById('composer-send').addEventListener('click',sendMessage);
  document.getElementById('composer-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});

  /* ---- module pages ---- */
  function openPage(id){const el=document.getElementById('screen-'+id);if(el)el.classList.add('open');}
  function closePage(){document.querySelectorAll('.screen.open').forEach(s=>s.classList.remove('open'));}
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePage();closeFolder();}});

  /* placeholder roster — replace with live Supabase `shifts` data later */
  const TIMESHEET_SAMPLE=[
    {day:'Mon · Jun 30',rows:[
      {nm:'Mei',role:'Barista · Open',tm:'07:00–15:00',hrs:'8h'},
      {nm:'Daniel',role:'Roaster',tm:'09:00–17:00',hrs:'8h'},
    ]},
    {day:'Tue · Jul 1',rows:[
      {nm:'Mei',role:'Barista',tm:'08:00–16:00',hrs:'8h'},
      {nm:'Jun',role:'Counter',tm:'12:00–20:00',hrs:'8h'},
    ]},
    {day:'Wed · Jul 2',rows:[
      {nm:'Daniel',role:'Roaster',tm:'09:00–17:00',hrs:'8h'},
    ]},
    {day:'Thu · Jul 3',rows:[
      {nm:'Jun',role:'Barista · Open',tm:'07:00–15:00',hrs:'8h'},
      {nm:'Mei',role:'Counter',tm:'13:00–21:00',hrs:'8h'},
    ]},
    {day:'Fri · Jul 4',rows:[
      {nm:'Mei',role:'Barista',tm:'08:00–16:00',hrs:'8h'},
      {nm:'Daniel',role:'Roaster · Close',tm:'13:00–21:00',hrs:'8h'},
    ]},
  ];

  function renderTimesheet(groups){
    const body=document.getElementById('timesheet-body');
    if(!groups||!groups.length){body.innerHTML='<div class="sempty">No shifts scheduled yet</div>';return;}
    body.innerHTML=groups.map(g=>{
      const rows=g.rows.map(r=>`<div class="shift"><div class="who"><div class="nm">${esc(r.nm)}</div><div class="role">${esc(r.role)}</div></div><div class="rt"><div class="tm">${esc(r.tm)}</div><div class="hrs">${esc(r.hrs)}</div></div></div>`).join('');
      return `<div class="dayhd">${esc(g.day)}</div>${rows}`;
    }).join('');
  }
  document.getElementById('ts-week').textContent='Jun 30 – Jul 4';
  renderTimesheet(TIMESHEET_SAMPLE);

  function onOpen(id){
    if(id==='timesheet'){openPage('timesheet');return;}
    console.log('open:',id);/* TODO: route other modules */
  }
  function swapSides(){const lp=document.querySelector('.pill[data-side="shop"]');const rp=document.querySelector('.pill[data-side="roastery"]');const cl=document.querySelectorAll('.cluster');document.getElementById('swap').classList.toggle('spin');cl.forEach(c=>{c.style.opacity='0';c.style.transform='scale(.94)';});setTimeout(()=>{const t=lp.innerHTML;lp.innerHTML=rp.innerHTML;rp.innerHTML=t;const n=document.querySelectorAll('.cname');if(n.length>=2){const tn=n[0].textContent;n[0].textContent=n[1].textContent;n[1].textContent=tn;}cl.forEach(c=>{c.style.opacity='1';c.style.transform='scale(1)';});},160);}
  function openFolder(){document.getElementById('ov').classList.add('open');}
  function closeFolder(){document.getElementById('ov').classList.remove('open');}

  const pad=n=>n<10?'0'+n:n;
  function tick(){const d=new Date(),h=d.getHours(),h12=h%12===0?12:h%12;
    document.getElementById('clock').textContent=h12+':'+pad(d.getMinutes());}
  tick();setInterval(tick,10000);
</script>
