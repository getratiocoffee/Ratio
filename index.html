  async function adjustStock(beanId,deltaKg,note){
    if(!beanId||!deltaKg)return;
    const {data}=await sb.from('beans').select('quantity').eq('id',beanId).single();
    if(!data)return;
    var nq=Math.max(0,(Number(data.quantity)||0)+deltaKg);
    await sb.from('beans').update({quantity:nq}).eq('id',beanId);
    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'adjust',delta_kg:deltaKg,after_kg:nq,note:note||null});}catch(e){}
    var lb=BEANS.find(function(x){return String(x.id)===String(beanId);});
    if(lb)lb.quantity=nq;
  }
  async function saveRoastEdit(){
    const msg=document.getElementById('re-msg');
    const btn=document.getElementById('re-save');
    const r=ROASTS.find(function(x){return String(x.id)===String(roastEdit);});
    if(!r)return;
    var nmEl=document.getElementById('re-name');
    var newName=(nmEl?nmEl.value:'').trim();
    var oldName=(r.bean_name||'').trim();
    var renamed=!!newName&&newName!==oldName;
    if(nmEl&&!newName){msg.textContent='Coffee name cannot be empty';msg.className='gform-msg err';return;}
    var kgRaw=document.getElementById('re-kg').value.trim();
    var newKg;
    if(kgRaw===''){
      /* Add Coffee 列本來就沒有生豆量 → 允許留空、只改烘焙記錄等其他欄位；
         有生豆量的列留空仍擋，防止誤清掉庫存連動 */
      if(r.green_kg!=null){msg.textContent='Enter a valid quantity';msg.className='gform-msg err';return;}
      newKg=null;
    }else{
      newKg=parseFloat(kgRaw);
      if(isNaN(newKg)||newKg<0){msg.textContent='Enter a valid quantity';msg.className='gform-msg err';return;}
    }
    var newDate=document.getElementById('re-date').value;
    var outEl=document.getElementById('re-out');
    var outRaw=outEl?outEl.value.trim():'';
    var newOut=outRaw===''?null:parseFloat(outRaw);
    if(newOut!=null&&(isNaN(newOut)||newOut<0)){msg.textContent='Enter a valid roasted output';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    var oldKg=Number(r.green_kg)||0;
    var delta=(newKg!=null?newKg:0)-oldKg; // extra amount → deduct from stock
    if(delta!==0 && newKg!=null && r.kind!=='single' && r.kind!=='blend' && r.green_kg!=null)await adjustStock(r.bean_id, -delta, 'Roast edit');
    /* T1: 烘焙記錄欄位（全部選填） */
    var _gv=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
    var _num=function(v){var n=parseFloat(v);return (v===''||isNaN(n))?null:n;};
    var upd={green_kg:newKg,roasted_kg:newOut,
      charge_temp:_num(_gv('re-charge')),first_crack:_gv('re-fc')||null,
      drop_temp:_num(_gv('re-drop')),duration:_gv('re-dur')||null,
      profile_note:_gv('re-pnote')||null};
    /* G3: 產出改了 → 連動剩餘量（扣掉已消耗的部分）；清空產出就清空剩餘 */
    if(newOut==null){upd.remaining_kg=null;}
    else{
      var _oldOut=(r.roasted_kg!=null)?Number(r.roasted_kg):null;
      var _consumed=(_oldOut!=null&&r.remaining_kg!=null)?Math.max(0,_oldOut-Number(r.remaining_kg)):0;
      upd.remaining_kg=Math.max(0,Math.round((newOut-_consumed)*1000)/1000);
    }
    if(newDate)upd.roast_date=newDate;
    if(renamed)upd.bean_name=newName;
    const {error}=await sb.from('roasts').update(upd).eq('id',r.id);
    if(error){btn.disabled=false;msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    /* rename cascade: keep Retail Info (samples) + other roasts in sync */
    if(renamed){
      msg.textContent='Saving\u2026 relinking Retail records';
      var e1=(await sb.from('samples').update({sample_id:newName}).eq('sample_id',oldName)).error;
      var e2=(await sb.from('roasts').update({bean_name:newName}).eq('bean_name',oldName)).error;
      if(e1||e2){btn.disabled=false;msg.textContent='Renamed the roast, but relinking failed: '+((e1||e2).message)+' \u2014 please retry';msg.className='gform-msg err';return;}
      /* sync in-memory arrays so the UI shows the new name immediately */
      (SAMPLES||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      if(typeof RETAIL_BEANS!=='undefined'&&RETAIL_BEANS)RETAIL_BEANS.forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      (RTL_ROWS||[]).forEach(function(s){if((s.sample_id||'')===oldName)s.sample_id=newName;});
      (ROASTS||[]).forEach(function(x){if((x.bean_name||'')===oldName)x.bean_name=newName;});
      /* carry Retail dot colour / gram / sold-out status to the new name */
      [[loadDots,saveDots],[loadGrams,saveGrams],[loadSold,saveSold]].forEach(function(pair){
        try{var m=pair[0]();if(oldName in m){if(!(newName in m))m[newName]=m[oldName];delete m[oldName];pair[1](m);}}catch(e){}
      });
    }
    r.green_kg=newKg;r.roasted_kg=newOut;r.remaining_kg=upd.remaining_kg;
    r.charge_temp=upd.charge_temp;r.first_crack=upd.first_crack;r.drop_temp=upd.drop_temp;r.duration=upd.duration;r.profile_note=upd.profile_note;
    if(newDate)r.roast_date=newDate;if(renamed)r.bean_name=newName;
    roastEdit=null;roastDelConfirm=false;renderRoasted();
  }

  var STRENGTH=[[1,'Light'],[2,'Medium'],[3,'Strong']];
  function strLabel(v){return v>=3?'Strong':(v===2?'Medium':(v===1?'Light':''));}

  function strengthRow(p,name){
    var v=p[name]||0;
    var thumb='<span class="str-thumb" style="'+(v?('left:'+strThumbPos(v)+';opacity:1'):'opacity:0')+'"></span>';
    var dots=STRENGTH.map(function(o){return '<span class="str-dot" style="left:'+strThumbPos(o[0])+'"></span>';}).join('');

  }
  /* tap or drag anywhere on the bar to set Light/Medium/Strong; live radar updates */
  function bindStrengthSliders(box,p){
    box.querySelectorAll('.str-slider').forEach(function(dr){
      var name=dr.dataset.name, rail=dr.querySelector('.str-rail');
      function setFromX(clientX){
        var r=rail.getBoundingClientRect(),frac=(clientX-r.left)/r.width;
        if(frac<0)frac=0;if(frac>1)frac=1;
        var v=Math.min(3,Math.max(1,Math.round(frac*2)+1));
        p[name]=v;dr.dataset.v=v;
        var th=dr.querySelector('.str-thumb');if(th){th.style.left=strThumbPos(v);th.style.opacity='1';}
        var c=box.querySelector('#smp-live-radar');if(c)c.innerHTML=sampleRadarSVG(p,true);
      }
      var dragging=false;
      rail.addEventListener('pointerdown',function(e){dragging=true;try{rail.setPointerCapture(e.pointerId);}catch(_){}setFromX(e.clientX);e.preventDefault();});
      rail.addEventListener('pointermove',function(e){if(dragging)setFromX(e.clientX);});
      rail.addEventListener('pointerup',function(){dragging=false;});
      rail.addEventListener('pointercancel',function(){dragging=false;});
    });
  }

  /* inline SVG radar for the History screen — 5 axes, inner=Light, outer=Strong */
  function sampleRadarSVG(s,force){
    var axes=[['fragrance','Fragrance'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
    if(!force&&!axes.some(function(a){return s[a[0]]!=null;}))return '';
    var W=232,H=176,cx=W/2,cy=H/2+4,R=46,n=axes.length;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
    function poly(r){return axes.map(function(_,i){var p=pt(i,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
    var grid='';[1,2,3].forEach(function(l){grid+='<polygon points="'+poly(R*l/3)+'" fill="none" stroke="rgba(50,43,42,0.12)" stroke-width="1"/>';});
    var spokes='';for(var i=0;i<n;i++){var p=pt(i,R);spokes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(50,43,42,0.10)" stroke-width="1"/>';}
    var dpts=axes.map(function(a,i){var v=(s[a[0]]==null?0:s[a[0]]);return pt(i,R*(v/3));});
    var dpoly=dpts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    var dots=dpts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2" fill="#B25E6A"/>';}).join('');
    var labels='';axes.forEach(function(a,i){
      var lp=pt(i,R+15),anc=(lp[0]<cx-2?'end':(lp[0]>cx+2?'start':'middle'));
      labels+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+3).toFixed(1)+'" font-size="9" font-weight="700" fill="#8C8079" text-anchor="'+anc+'">'+a[1]+'</text>';
    });
    return '<div class="smp-radar"><svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">'
      +grid+spokes
      +'<polygon points="'+dpoly+'" fill="rgba(178,94,106,0.18)" stroke="#B25E6A" stroke-width="1.6" stroke-linejoin="round"/>'
      +dots+labels+'</svg></div>';
  }

    captureSmp();
    const msg=document.getElementById('smp-msg');
    const btn=document.getElementById('smp-saveall');
    var perDate={},recs=[],skipped=0;
    smpPages.forEach(function(p){
      var sid=(p.sample_id||'').trim(),sup=(p.supplier||'').trim();
      if(!sid&&!sup){skipped++;return;}
      var d=p.cupping_date||todayStr();
      if(perDate[d]==null)perDate[d]=nextNo(d);else perDate[d]++;
      recs.push({no:perDate[d],cupping_date:d,supplier:sup||null,sample_id:sid||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:p.decision||null,cupper:(window.CURRENT_USER||null)});
    });
    if(!recs.length){msg.textContent='No filled samples to save — each needs at least Supplier or ID';msg.className='gform-msg err';return;}
    if(btn)btn.disabled=true;msg.textContent='Saving '+recs.length+' samples…';msg.className='gform-msg';
    var ins=await sb.from('samples').insert(recs).select();
    if(ins.error){if(btn)btn.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
    (ins.data||[]).forEach(function(x){SAMPLES.unshift(x);});
    smpPages=[blankSmp()];smpIdx=0;smpDupConfirm=false;
    renderSample('','Saved '+recs.length+' samples'+(skipped?(' · '+skipped+' empty pages skipped'):''));
    document.getElementById('green-content').scrollTop=0;
  }
  async function saveSample(){
    captureSmp();
    const msg=document.getElementById('smp-msg');
    const saveBtn=document.getElementById('smp-save');
    var p=smpPages[smpIdx];
    var rec={no:nextNo(p.cupping_date||todayStr()),cupping_date:p.cupping_date||todayStr(),supplier:(p.supplier||'').trim()||null,sample_id:(p.sample_id||'').trim()||null,process:(p.process||'').trim()||null,fragrance:p.fragrance,acidity:p.acidity,sweetness:p.sweetness,body:p.body,aftertaste:p.aftertaste,features:(p.features||[]),comment:(p.comment||'').trim()||null,decision:p.decision||null,cupper:(window.CURRENT_USER||null)};
    if(!rec.supplier&&!rec.sample_id){msg.textContent='Enter at least Supplier or ID';msg.className='gform-msg err';return;}
    var dupKey=(rec.sample_id||'').trim().toLowerCase();
    var isDup=dupKey&&SAMPLES.some(function(x){return x.cupping_date===rec.cupping_date&&(x.sample_id||'').trim().toLowerCase()===dupKey;});
    if(isDup&&!smpDupConfirm){
      smpDupConfirm=true;
      msg.textContent='⚠️ "'+rec.sample_id+'" already has a record today — press Submit again to confirm';
      msg.className='gform-msg err';
      return;
    }
    smpDupConfirm=false;
    if(saveBtn)saveBtn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    let ins=await sb.from('samples').insert(rec).select();
    if(ins.error&&rec.features!==undefined){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error&&rec.cupper!==undefined){var r3=Object.assign({},rec);delete r3.cupper;delete r3.features;ins=await sb.from('samples').insert(r3).select();}
    if(ins.error){if(saveBtn)saveBtn.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
    if(ins.data&&ins.data[0])SAMPLES.unshift(ins.data[0]);
    smpPages.splice(smpIdx,1);
    if(!smpPages.length)smpPages=[blankSmp()];
    if(smpIdx>=smpPages.length)smpIdx=smpPages.length-1;
    renderSample('','Saved — set Skip / Maybe / Buy on the card below');
    document.getElementById('green-content').scrollTop=0;
  }
  function swapSides(){var pdfS=document.getElementById('screen-pdf');if(pdfS&&pdfS.classList.contains('open')){pdfBack();return;}const pg=document.querySelector('.screen.open');if(pg){if(pg.id==='screen-green'&&typeof greenBack==='function'){greenBack();return;}if(pg.id==='screen-beans'&&typeof beansBack==='function'){beansBack();return;}if(pg.id==='screen-contacts'&&typeof contactsBack==='function'){contactsBack();return;}if(pg.id==='screen-menu'&&typeof menuBack==='function'){menuBack();return;}if(pg.id==='screen-label'||pg.id==='screen-tinlabel'||pg.id==='screen-invoice'){openPrint();return;}closePage();return;}if(dockStack.length){dockBack();return;}const lp=document.querySelector('.pill[data-side="shop"]');const rp=document.querySelector('.pill[data-side="roastery"]');const cl=document.querySelectorAll('.cluster');document.getElementById('swap').classList.toggle('spin');cl.forEach(c=>{c.style.opacity='0';c.style.transform='scale(.94)';});setTimeout(()=>{const t=lp.innerHTML;lp.innerHTML=rp.innerHTML;rp.innerHTML=t;const n=document.querySelectorAll('.cname');if(n.length>=2){const tn=n[0].textContent;n[0].textContent=n[1].textContent;n[1].textContent=tn;}cl.forEach(c=>{c.style.opacity='1';c.style.transform='scale(1)';});},160);}
  function openFolder(){closeFloatingPopups();var ov=document.getElementById('ov');if(ov)ov.classList.add('open');}
  function closeFolder(){document.getElementById('ov').classList.remove('open');}

  const pad=n=>n<10?'0'+n:n;
  function tick(){const d=new Date(),h=d.getHours(),h12=h%12===0?12:h%12;
    document.getElementById('clock').textContent=h12+':'+pad(d.getMinutes());}
  tick();setInterval(tick,10000);
</script>
