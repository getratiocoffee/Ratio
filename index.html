<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#F4ECEA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ratio" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Ratio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#F4ECEA;--surface:#FCF6F4;--ink:#322B2A;--muted:#8C8079;--accent:#B25E6A;--tint:#F3DDE0;--line:rgba(50,43,42,0.10);--line-strong:rgba(50,43,42,.22);--accent-ink:#6E2F39;--accent-tint:#F3DDE0;--success:#5E8C61;--success-tint:#E2EADD;--success-ink:#3C5236;--danger:#C0392B;--danger-ink:#8E2A22;--brand:#49423A;--on-brand:#F4ECEA;--on-brand-dim:rgba(244,236,234,.7);--font-ui:'Inter',-apple-system,"Segoe UI",system-ui,sans-serif;--font-display:'Fraunces',Georgia,serif;--font-mono:'Space Mono',ui-monospace,"SF Mono",Menlo,monospace}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);position:fixed;top:0;left:0;right:0;height:100dvh;display:flex;flex-direction:column}
  .board{flex:1;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
  .bhead{background:var(--brand);display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:var(--on-brand);min-height:60px}
  .bhead svg path{fill:var(--on-brand)}
  .bhead .logo{width:38px;height:38px;display:block}
  .bhead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .hright{display:flex;flex-direction:column;align-items:flex-end;gap:1px;line-height:1}
  #who{font-size:11px;color:var(--on-brand);opacity:.7;font-weight:500}
  #who:empty{display:none}
  .clock{font-size:26px;font-weight:700;font-family:var(--font-mono);color:var(--on-brand);letter-spacing:0}
  .hend{display:flex;align-items:center;gap:12px}
  .logout-door{-webkit-appearance:none;appearance:none;background:transparent;border:none;margin:0;padding:7px;cursor:pointer;color:var(--on-brand);display:flex;align-items:center;justify-content:center;border-radius:10px;line-height:0;opacity:.85;transition:opacity .15s ease,background .15s ease}
  .logout-door:hover,.logout-door:active{opacity:1;background:rgba(244,236,234,.14)}
  .logout-door svg{width:23px;height:23px;display:block}
  .bhead .logout-door svg path,.bhead .logout-door svg polyline,.bhead .logout-door svg line{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .feed{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .ctitle{display:none;padding:11px 16px 10px;font-size:15px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--line);font-family:var(--font-display)}
  .ctitle .ct-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ctitle .ct-week{font-size:15px;font-weight:700;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ctitle .ct-sub{font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
  .ct-hist{display:flex;align-items:center;gap:3px;flex:0 0 auto;border:none;background:var(--accent-tint,#F3DDE0);color:var(--accent-ink,#6E2F39);font-family:inherit;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .ct-hist{font-family:var(--font-ui)}
  .ct-hist:active{opacity:.75}
  .ct-hist .ct-hist-arr{font-size:15px;line-height:1;margin-left:1px}
  .ctitle .ct-rt{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .ct-na{display:flex;align-items:center;flex:0 0 auto;border:1.5px solid var(--accent);background:var(--surface);color:var(--accent);font-family:var(--font-ui);font-size:11.5px;font-weight:700;padding:5px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;letter-spacing:.02em}
  .ct-na:active{background:var(--tint)}
  .ctitle.show{display:block}
  .plan-done{display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 28px 40px}
  .plan-done .pd-ic{width:64px;height:64px;border-radius:50%;background:var(--success-tint,#E2EADD);color:var(--success,#5E8C61);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .plan-done .pd-ic svg{width:34px;height:34px}
  .plan-done .pd-t{font-size:20px;font-weight:700;color:var(--ink);font-family:var(--font-display)}
  .plan-done .pd-s{font-size:13px;color:var(--muted);margin:8px 0 26px;line-height:1.6}
  .plan-done .gbtn{width:100%;max-width:280px}
  .plan-done .gbtn.ghost{margin-top:10px}
  .cpanel{display:none}
  .cpanel.show{display:block;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
  .msg{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .msg:last-child{border-bottom:none}
  .msg.read .mtitle{font-weight:500;color:#6B5E50}
  .mdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .mbody{flex:1;min-width:0;text-align:left}
  .mtitle{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .mtext{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .mtext:empty{display:none}
  .mright{flex:0 0 auto;display:flex;align-items:center;gap:2px;align-self:flex-start;padding-top:1px}
  .mtime{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap;letter-spacing:-.03em}
  .mdel{flex:0 0 auto;border:none;background:none;color:rgba(50,43,42,0.22);cursor:pointer;padding:5px;margin:-3px -5px -3px 0;display:flex;align-items:center;border-radius:8px}
  .mdel svg{width:14px;height:14px}
  .mdel:active{color:var(--accent);background:var(--tint)}
  .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:0;padding:0 16px calc(env(safe-area-inset-bottom,0px) - 18px)}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .16s ease,transform .16s ease}
  .cname{font-size:12px;font-weight:600;color:var(--muted)}
  .pill{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;border-radius:30px;background:var(--surface);border:.5px solid var(--line)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;cursor:pointer;transition:transform .12s ease}
  .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;color:var(--ink);overflow:hidden}
  .ic svg{width:40px;height:40px}
  .lbl{font-size:10px;color:var(--muted)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:0}
  .swap{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:transform .3s ease}
  .swap.spin{transform:rotate(180deg)}
  .swap svg{width:23px;height:23px}
  .folder{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .fgrid{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:5px}
  .fgrid span{background:var(--accent);border-radius:2px;opacity:.85}
  #power{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:color .2s ease}
  /* dock-morph: module dock = SAME size as the dashboard dock. Pill keeps its app-mode box;
     JS locks each pill's measured width/height on enter, and the single button fills it 100%. */
  .bar.module .pill{background:transparent;border:none;padding:0;display:block}
  .bar.module .cname{visibility:hidden}
  .dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;width:100%;height:100%;border:.5px solid var(--line);border-radius:30px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .12s ease}
  .dock-btn:active{transform:scale(.96)}
  .dock-btn .db-ic{width:52px;height:52px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .dock-btn .db-ic svg{width:27px;height:27px;color:var(--accent)}
  .dock-btn .db-lab{font-size:14px;font-weight:600;color:var(--ink);line-height:1.15;text-align:center;padding:0 6px}
  .dock-btn .db-zh{font-size:10px;color:var(--muted);margin-top:-4px}
  .dock-btn.on{background:var(--accent-tint,#F3DDE0);border-color:var(--accent)}
  .dock-btn.on .db-ic{background:var(--accent)}
  .dock-btn.on .db-ic svg{color:#fff}
  .dock-btn.on .db-lab{color:var(--accent-ink,#6E2F39)}
  .dock-btn.on .db-zh{color:var(--accent)}
  .dock-btn.db-timebtn .db-lab{font-family:var(--font-mono);font-size:12.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .dock-btn.db-timebtn .db-zh{font-size:11px;margin-top:-2px}
  .swap.back{color:var(--accent)}
  .dock-soon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border:1.5px dashed #CBBEB7;border-radius:30px;background:var(--bg);color:var(--muted);font-size:13px;font-weight:600}
  @keyframes press-pf{0%{transform:scale(1)}30%{transform:scale(.84);background:var(--tint)}60%{transform:scale(1.1);background:var(--tint)}100%{transform:scale(1)}}
  @keyframes cp-rowup{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:none}}
  .pressing{animation:press-pf .42s ease}
  .item[data-id="beans"] .ic svg{transform:scale(.7)}
  .item[data-id="roast"] .ic svg{transform:translateY(3px) scale(1.2)}
  .item[data-id="recipe"] .ic svg{transform:scale(.82)}
  .ov{position:fixed;inset:0;background:rgba(50,43,42,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:30}
  .ov.open{display:flex}
  .panel{background:var(--surface);border-radius:26px;padding:20px 18px 22px;width:100%;max-width:330px;transform:scale(.85);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .ov.open .panel{transform:scale(1);opacity:1}
  /* ---- full-screen module page (Timesheet, etc.) ---- */
  .screen{position:fixed;inset:0;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 16px);background:var(--bg);border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);visibility:hidden}
  .screen.open{transform:none;visibility:visible}
  .shead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 18px;min-height:60px;background:var(--brand);color:var(--on-brand);flex:0 0 auto}
  .shead .back{width:36px;height:36px;border-radius:11px;border:none;background:rgba(244,236,234,.14);color:var(--on-brand);display:grid;place-items:center;cursor:pointer;padding:0;transition:background .15s ease}
  .shead .logo{width:38px;height:38px;display:block;flex:0 0 auto}
  .shead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .shead .back:active{background:rgba(244,236,234,.24)}
  .shead .back svg{width:20px;height:20px}
  .shead .hkey{font-size:13px;font-weight:500;color:var(--on-brand);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .shead .hkey:empty{display:none}
  .stitle{padding:11px 18px;font-size:15px;font-weight:700;color:var(--ink);background:var(--surface);border-bottom:1px solid var(--line);flex:0 0 auto;font-family:var(--font-display)}
  .stitle:empty{display:none}
  .sbody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
  .dayhd{position:sticky;top:0;background:var(--bg);padding:15px 18px 7px;z-index:1;display:flex;align-items:baseline;gap:9px}
  .dayhd .dh-dow{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.07em}
  .dayhd .dh-date{font-size:12px;font-weight:600;color:var(--muted)}
  .shift{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
  .shift .who{flex:1;min-width:0}
  .shift .nm{font-size:15px;font-weight:600;color:var(--ink)}
  .shift .role{font-size:11px;color:var(--muted);margin-top:2px}
  .shift .rt{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
  .shift .tm{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--ink)}
  .shift .hrs{font-family:var(--font-mono);font-size:12px;color:var(--accent)}
  .sempty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
  /* timesheet History: collapsible week + PDF + cash select */
  .thw-head{display:flex;align-items:stretch;border-bottom:1px solid var(--line);background:var(--surface)}
  .thw-head .rdate{flex:1;border-bottom:none;background:none}
  .ts-pdf{flex:0 0 auto;display:flex;align-items:center;gap:6px;border:none;border-left:1px solid var(--line);background:none;color:var(--accent);font-family:inherit;font-size:12px;font-weight:600;padding:0 14px;cursor:pointer}
  .ts-pdf:active{background:var(--accent-tint,#F3DDE0)}
  .ts-pdf svg{width:16px;height:16px}
  .ts-pdf[disabled]{color:var(--muted);opacity:.6}
  .cash-sec{padding:12px 16px 6px}
  .cash-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
  .cash-list{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cashrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-top:1px solid var(--line)}
  .cashrow:first-child{border-top:none}
  .cashrow .cn{font-size:14px;font-weight:600;color:var(--ink)}
  .cashrow .ch{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:1px}
  .cash-toggle{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:999px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;min-width:64px}
  .cash-toggle.on{background:#5E8C61;border-color:#5E8C61;color:#fff}
  .dayhd.today{background:var(--accent-tint,#F3DDE0);box-shadow:inset 3px 0 0 var(--accent)}
  .dayhd.today .dh-dow,.dayhd.today .dh-date{color:var(--accent)}
  .shift.today{background:var(--accent-tint,#F3DDE0);box-shadow:inset 3px 0 0 var(--accent)}
  .shift.today .tm,.shift.today .nm{color:var(--accent-ink,#6E2F39)}
  .shift.solo{display:grid;grid-template-columns:42px 56px 1fr auto;align-items:baseline;column-gap:12px;padding:13px 18px}
  .shift.solo .sl-dow{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:.04em}
  .shift.solo .sl-date{font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap}
  .shift.solo .tm{font-size:16px;font-weight:700;color:var(--ink)}
  .shift.solo .hrs{font-size:12px;font-weight:600;text-align:right}
  .shift.solo.today .sl-dow,.shift.solo.today .tm{color:var(--accent-ink,#6E2F39)}
  .rdate.today .rd-date{color:var(--accent)}
  .dayhd .td-now{font-size:10px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:1px 7px;margin-left:8px;vertical-align:middle}
  .ts-filter{display:flex;gap:6px;padding:12px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tf-chip{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 13px;cursor:pointer;white-space:nowrap;letter-spacing:.01em}
  .tf-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ts-tophdr{display:flex;align-items:center;gap:11px;padding:12px 16px 4px}
  .na-pill{flex:0 0 auto;border:1.5px solid var(--accent);background:var(--surface);color:var(--accent);border-radius:999px;font-family:inherit;font-size:12px;font-weight:700;padding:6px 16px;cursor:pointer;letter-spacing:.03em}
  .na-pill:active{background:var(--tint)}
  .ts-tophint{font-size:11.5px;color:var(--muted);line-height:1.3}
  .na-wrap{padding:14px 16px 28px}
  .na-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-bottom:14px}
  .na-h{font-family:var(--font-display);font-size:21px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .na-sub{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:18px;line-height:1.4}
  .na-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin:0 0 9px}
  .na-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
  .na-dates{display:flex;gap:10px;margin-bottom:9px}
  .na-dates .smp-f{flex:1;min-width:0}
  .na-hint{font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:6px}
  .na-list{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .na-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .na-item .nai-nm{font-size:14px;font-weight:600;color:var(--ink)}
  .na-item .nai-rg{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-top:2px}
  .na-item .nai-del{flex:0 0 auto;background:none;border:none;color:#C0392B;cursor:pointer;padding:6px;display:flex}
  .na-item .nai-del svg{width:17px;height:17px}
  .na-empty{font-size:12.5px;color:var(--muted);text-align:center;padding:14px}
  .lbl-wrap{padding:14px 16px 28px}
  .lbl-intro{padding:30px 20px}
  .lbl-h{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .lbl-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:22px}
  .lbl-pick{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;font-size:14px;font-weight:600;padding:13px 20px;border-radius:13px;cursor:pointer}
  .lbl-pick:active{opacity:.85}
  .lbl-other{font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin:6px 0 2px;padding-top:11px;border-top:1px dashed var(--line)}
  .lbl-seg{display:flex;gap:8px;margin-bottom:18px}
  .lbl-tab{flex:1;padding:10px 8px;font-size:13px;font-weight:600;font-family:inherit;border-radius:11px;border:1.5px solid var(--line);background:var(--bg);color:var(--muted);cursor:pointer}
  .lbl-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .lbl-tab.soon{opacity:.55;cursor:default}
  .date-seg{gap:0;margin-bottom:14px;border-bottom:1px solid var(--line)}
  .date-seg .lbl-tab{flex:0 0 auto;margin-right:22px;margin-bottom:-1px;padding:8px 2px;border:none;border-radius:0;background:transparent;color:var(--muted);border-bottom:2px solid transparent}
  .date-seg .lbl-tab.on{background:transparent;color:var(--ink);border-bottom-color:var(--accent)}
  .pend-seg{padding:12px 14px 0;margin-bottom:6px}
  .blend-pick{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;font-family:inherit;text-align:left}

  /* ===== Supabase sync layer for the 5 local-only stores (additive · never throws) =====
     localStorage stays the synchronous source of truth + offline fallback; Supabase is
     layered on top as a cross-device mirror. Requires the `app_state` table (SQL supplied
     separately). Before that table exists the pull errors quietly and the app stays 100%
     local; after the SQL is run + a hard reload, sync turns on. Last-write-wins per key. */
  const APP_STATE_KEYS={
    'ratio_na':'na',
    'ratio_menu_slots':'menu_slots',
    'ratio_special_slots':'special_slots',
    'ratio_special_prices':'special_prices',
    'ratio_takeaway':'takeaway',
    'ratio_dinein':'dinein',
    'ratio_rtl_dot':'rtl_dot',
    'ratio_rtl_g':'rtl_g',
    'ratio_rtl_sold':'rtl_sold',
    'ratio_blends':'blends',
    'ratio_inv_seq':'inv_seq'
  };
  let _appStateReady=false;          /* true once the boot pull succeeds (table exists) */
  const _appStatePending={};         /* lsKeys that wanted to push before ready */
  const _appStatePushTimers={};      /* debounce timers per remote key */
  function appStatePush(lsKey){
    if(!sb)return;
    if(APP_STATE_KEYS[lsKey]===undefined)return;
    if(!_appStateReady){_appStatePending[lsKey]=true;return;} /* silent local-only pre-SQL */
    var remoteKey=APP_STATE_KEYS[lsKey];
    clearTimeout(_appStatePushTimers[remoteKey]);
    _appStatePushTimers[remoteKey]=setTimeout(function(){_appStatePushNow(lsKey);},500);
  }
  function _appStatePushNow(lsKey){
    var remoteKey=APP_STATE_KEYS[lsKey];if(!remoteKey)return;
    var raw;try{raw=localStorage.getItem(lsKey);}catch(e){return;}
    var val;try{val=raw==null?null:JSON.parse(raw);}catch(e){val=raw;}
    try{
      sb.from('app_state').upsert({key:remoteKey,value:val,updated_at:new Date().toISOString()},{onConflict:'key'})
        .then(function(r){if(r&&r.error)console.error('[Ratio] app_state push '+remoteKey+':',r.error.message||r.error);});
    }catch(e){console.error('[Ratio] app_state push '+remoteKey,e);}
  }
  function _lsKeyFor(remoteKey){for(var k in APP_STATE_KEYS){if(APP_STATE_KEYS[k]===remoteKey)return k;}return null;}
  function applyInvSeqToDayKeys(map){
    if(!map||typeof map!=='object')return;
    var merged={};try{merged=JSON.parse(localStorage.getItem('ratio_inv_seq')||'{}');}catch(e){merged={};}
    Object.keys(map).forEach(function(d){
      var remote=parseInt(map[d],10)||0;
      var per=0;try{per=parseInt(localStorage.getItem('ratio_inv_seq_'+d),10)||0;}catch(e){}
      var keep=Math.max(remote,parseInt(merged[d],10)||0,per); /* never let invoice numbers go backwards */
      merged[d]=keep;try{localStorage.setItem('ratio_inv_seq_'+d,String(keep));}catch(e){}
    });
    try{localStorage.setItem('ratio_inv_seq',JSON.stringify(merged));}catch(e){}
  }
  function appStateApply(remoteKey,val){
    var lsKey=_lsKeyFor(remoteKey);if(!lsKey)return;
    if(lsKey==='ratio_inv_seq'){applyInvSeqToDayKeys(val);return;}
    try{localStorage.setItem(lsKey,JSON.stringify(val));}catch(e){}

  async function appStatePull(){
    if(!sb)return;
    try{
      var r=await sb.from('app_state').select('key,value');
      if(r&&r.error)return; /* table missing pre-SQL → stay silent local-only */
      if(r&&r.data){r.data.forEach(function(row){if(row&&row.key)appStateApply(row.key,row.value);});}
      _appStateReady=true;
      Object.keys(_appStatePending).forEach(function(k){delete _appStatePending[k];appStatePush(k);});
      appStateRefreshOpenScreens();
    }catch(e){/* silent local-only */}
  }

  const FEED_PLACEHOLDER={beans:'Write a Beans note…',task:'Write a Task note…'};
  function setFeedChannel(ch){
    ch=ch||'general';
    var inp=document.getElementById('composer-input');
    if(inp)inp.placeholder=FEED_PLACEHOLDER[ch]||'Write a message…';
    if(feedChannel===ch){return;}

  /* flexible column lookup so the feed survives small schema differences */
  const pick=(r,keys,def)=>{for(const k of keys){if(r&&r[k]!=null)return r[k];}return def;};
  const titleOf=r=>pick(r,['title','name'],'');
  const textOf =r=>pick(r,['preview','body','text','message'],'');
  const unreadOf=r=>pick(r,['unread','is_unread'],false);
  const tsOf  =r=>pick(r,['created_at','inserted_at'],null);
  const idOf  =r=>pick(r,['id'],null);

  const esc=v=>String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function relTime(iso){
    if(!iso)return '';
    const t=new Date(iso).getTime();
    if(isNaN(t))return '';
    let sec=Math.floor((Date.now()-t)/1000); if(sec<0)sec=0;
    if(sec<60)return 'now';
    const m=Math.floor(sec/60); if(m<60)return m+'m';
    const h=Math.floor(m/60);   if(h<24)return h+'h';
    const d=Math.floor(h/24);   if(d<7) return d+'d';
    const w=Math.floor(d/7);    if(w<5) return w+'w';
    return Math.floor(d/30)+'mo';
  }

  function sortRows(){rows.sort((a,b)=>(new Date(tsOf(b)).getTime()||0)-(new Date(tsOf(a)).getTime()||0));}

  function renderFeed(){
    if(!rows.length){feedEl.innerHTML='<div class="msg" style="justify-content:center;border-bottom:none;color:var(--muted);font-size:12px">No messages yet</div>';return;}
    feedEl.innerHTML=rows.map(r=>{
      const u=unreadOf(r);const id=idOf(r);
      return `<div class="msg${u?'':' read'}"><span class="mdot" style="background:${u?'var(--accent)':'rgba(50,43,42,0.18)'}"></span><div class="mbody"><div class="mtitle">${esc(titleOf(r))}</div><div class="mtext">${esc(textOf(r))}</div></div><div class="mright"><span class="mtime">${relTime(tsOf(r))}</span><button class="mdel" data-id="${esc(String(id))}" aria-label="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div></div>`;
    }).join('');
    feedEl.querySelectorAll('.mdel').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delMessage(b.dataset.id);}));
  }
  async function delMessage(id){
    if(id==null||id==='null')return;
    const {data,error}=await sb.from('messages').delete().eq('id',id).select();
    if(error||!data||!data.length){
      console.error('[Ratio] Message delete failed (messages table likely missing a DELETE RLS policy): ',error&&(error.message||error));
      loadMessages();/* re-sync so the feed shows the true state */
      return;
    }
    rows=rows.filter(r=>String(idOf(r))!==String(id));renderFeed();
  }
  renderFeed();

  async function loadMessages(){
    var ch=feedChannel;
    var q=sb.from('messages').select('*').order('created_at',{ascending:false});
    q=(ch==='general')?q.or('channel.is.null,channel.eq.general'):q.eq('channel',ch);
    const {data,error}=await q;
    if(error){
      /* channel column not added yet → general falls back to the whole feed */
      if(ch==='general'){
        const r2=await sb.from('messages').select('*').order('created_at',{ascending:false});
        if(!r2.error){rows=r2.data||[];sortRows();renderFeed();return;}
      }
      console.error('[Ratio] load error:',error.message||error);rows=[];renderFeed();return;
    }
    rows=data||[];sortRows();renderFeed();
  }
  loadMessages();

  /* realtime: INSERT / UPDATE / DELETE keep the local list in sync */
  sb.channel('messages-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},payload=>{
      const ev=payload.eventType, nu=payload.new, od=payload.old;
      if(ev==='INSERT'){if(chOf(nu)!==feedChannel)return;rows.push(nu);}
      else if(ev==='UPDATE'){if(chOf(nu)!==feedChannel)return;const i=rows.findIndex(r=>idOf(r)===idOf(nu));i>-1?rows[i]=nu:rows.push(nu);}
      else if(ev==='DELETE'){const did=idOf(od);rows=rows.filter(r=>idOf(r)!==did);}
      sortRows();renderFeed();
    })
    .subscribe(st=>{if(st==='SUBSCRIBED')console.log('[Ratio] realtime subscribed');});

  /* refresh the relative timestamps once a minute */
  setInterval(renderFeed,60000);

  async function sendMessage(){
    const inp=document.getElementById('composer-input');
    const text=inp.value.trim();
    if(!text)return;
    inp.value='';
    const {error}=await sb.from('messages').insert({title:text,unread:true,channel:feedChannel});

      if(feedChannel==='general'){

        if(!r2.error)return;
      }
      console.error('[Ratio] send error:',error.message||error);inp.value=text;
    }
    /* the realtime subscription adds the new row to the feed automatically */
  }

  /* ============ Invoice generator (More → Generate Invoice) ============ */
  const INV_CATS=['Roasted Beans','Green Beans','Shipping','Catering'];
  const ROAST_PACKS=['100g','150g','200g','250g'];
  const HANDLE_FEE=5;   /* per green-bean line, GST inclusive */
  let INV={buyerName:'',buyerEmail:'',buyerAddr:'',items:[],notes:'',date:'',due:''};
  function invIsGreen(it){return it.cat==='Green Beans';}
  function invHasHandle(it){return invIsGreen(it)&&!!it.beanId;}
  function blankInvItem(cat){cat=cat||INV_CATS[0];return {cat:cat,desc:'',qty:'1',unit:'',gstMode:'plus',pack:'250g',beanId:'',beanName:'',country:''};}
  function openInvoice(){closeFolder();openPage('invoice');if(!INV.date)INV.date=todayStr();if(!INV.items.length)INV.items=[blankInvItem('Roasted Beans')];renderInvoice();ensureBeansForInvoice().then(function(){captureInv();renderInvoice();});}
  async function ensureBeansForInvoice(){if(BEANS&&BEANS.length)return;try{var r=await sb.from('beans').select('*').order('name');if(r&&r.data)BEANS=r.data;}catch(e){}}
  function invRaw(it){return (parseFloat(it.qty)||0)*(parseFloat(it.unit)||0);}
  function invGreenCost(it){return (parseFloat(it.qty)||0)*(parseFloat(it.unit)||0);}
  function invEx(it){
    if(invIsGreen(it)){var ex=invGreenCost(it);if(invHasHandle(it))ex+=HANDLE_FEE/1.1;return ex;}
    if(it.cat==='Roasted Beans')return invRaw(it);
    var amt=invRaw(it);return it.gstMode==='inc'?amt/1.1:amt;
  }
  function invGstLine(it){
    if(invIsGreen(it))return invHasHandle(it)?(HANDLE_FEE-HANDLE_FEE/1.1):0;
    if(it.cat==='Roasted Beans')return 0;
    var amt=invRaw(it);return it.gstMode==='inc'?(amt-amt/1.1):amt*0.1;
  }
  function invLineTotal(it){return invEx(it)+invGstLine(it);}
  function invSubtotal(){var t=0;INV.items.forEach(function(it){t+=invEx(it);});return t;}
  function invGstAmt(){var t=0;INV.items.forEach(function(it){t+=invGstLine(it);});return t;}
  function invTotal(){return invSubtotal()+invGstAmt();}
  function invMoney(n){return '$'+(Number(n)||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function invLineHTML(it){
    if(invIsGreen(it)){var gc=invGreenCost(it);var l='Green '+invMoney(gc)+' · GST-free'+(invHasHandle(it)?' + Handle $5.00':'');return '<span class="l">'+l+'</span><span>'+invMoney(invLineTotal(it))+'</span>';}
    if(it.cat==='Roasted Beans')return '<span class="l">GST-free</span><span>'+invMoney(invLineTotal(it))+'</span>';
    return '<span class="l">Ex '+invMoney(invEx(it))+' · GST '+invMoney(invGstLine(it))+'</span><span>'+invMoney(invLineTotal(it))+'</span>';
  }
  function invBeanOptions(it){
    var o='<option value="">— pick green bean —</option>';
    (BEANS||[]).forEach(function(b){
      var sel=String(b.id)===String(it.beanId)?' selected':'';
      var stock=(b.quantity!=null)?(' · '+gnum(b.quantity)+'kg in stock'):'';
      o+='<option value="'+esc(b.id)+'"'+sel+'>'+esc(b.name)+(b.process?' · '+esc(b.process):'')+' — $'+(b.cost_per_kg!=null?b.cost_per_kg:'?')+'/kg'+stock+'</option>';
    });
    return o;
  }

  const TS_MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function tsHM(s){var p=String(s).split(':');return (+p[0])*60+(+p[1]);}
  function tsHH(x){return (x===Math.round(x)?String(x):String(Math.round(x*10)/10))+'h';}
  function tsPaidBr(start,end,br){
    if(!start||!end)return 0;

    if(br)x-=0.5;

  const DAY_PRESETS={
    weekday:[['05:45','14:15',true],['08:15','14:15',false]],
    sat:[['06:15','15:15',false],['08:15','16:15',false],['08:15','16:15',false]],
    sun:[['06:15','08:15',false],['08:15','16:15',false],['08:15','16:15',false],['09:15','16:15',false]]
  };
  function dayPresetList(dk){return dk==='sat'?DAY_PRESETS.sat:(dk==='sun'?DAY_PRESETS.sun:DAY_PRESETS.weekday);}
  function presetFor(dk,n){var L=dayPresetList(dk);var p=L[Math.min(n,L.length-1)];return {start:p[0],end:p[1],br:p[2]};}

  function dayLabelOf(monIso,i){var a=new Date(monIso+'T00:00:00');a.setDate(a.getDate()+i);return TS_DAYLBL[TS_ORDER[i]]+' · '+TS_MON[a.getMonth()]+' '+a.getDate();}

  function staticWeek(ws){return TIMESHEET_WEEKS.find(function(w){return w.weekStart===ws;})||null;}

    var byDay={};shifts.forEach(function(s){(byDay[s.day]=byDay[s.day]||[]).push(s);});
    var groups=[],tot={},wd={},sat={},sun={};var r1=function(x){return Math.round(x*10)/10;};
    TS_ORDER.forEach(function(dk,i){
      var arr=byDay[dk];if(!arr||!arr.length)return;
      arr=arr.slice().sort(function(a,b){return tsHM(a.start)-tsHM(b.start);});
      var rows=arr.map(function(s){

    var ov=document.getElementById('admin-gate');
    if(!ov){
      ov=document.createElement('div');ov.id='admin-gate';
      ov.style.cssText='position:fixed;inset:0;z-index:1200;background:rgba(30,25,22,.45);display:flex;align-items:center;justify-content:center;padding:24px';
      ov.innerHTML='<div style="width:100%;max-width:320px;background:var(--surface);border-radius:18px;padding:22px 20px;text-align:center">'
        +'<div style="font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--ink);margin-bottom:4px">Admin</div>'
        +'<div style="font-size:13px;color:var(--muted);margin-bottom:16px">Enter password to continue</div>'
        +'<input id="admin-gate-pw" type="password" inputmode="numeric" placeholder="Password" autocomplete="off" style="width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit;margin-bottom:8px"/>'
        +'<div id="admin-gate-err" style="font-size:12px;color:var(--accent);min-height:16px;margin-bottom:8px"></div>'
        +'<button id="admin-gate-go" style="width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:600;color:#fff;background:var(--accent);cursor:pointer;font-family:inherit">Enter</button>'
        +'<button id="admin-gate-cancel" style="width:100%;border:none;background:none;color:var(--muted);font-size:13px;margin-top:10px;cursor:pointer;font-family:inherit">Cancel</button>'
        +'</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click',function(e){if(e.target===ov)closeAdminGate();});
      ov.querySelector('#admin-gate-cancel').addEventListener('click',closeAdminGate);
      ov.querySelector('#admin-gate-go').addEventListener('click',submitAdminGate);
      ov.querySelector('#admin-gate-pw').addEventListener('keydown',function(e){if(e.key==='Enter')submitAdminGate();});
    }
    ov.querySelector('#admin-gate-pw').value='';
    ov.querySelector('#admin-gate-err').textContent='';
    ov.style.display='flex';
    setTimeout(function(){var i=ov.querySelector('#admin-gate-pw');if(i)i.focus();},80);
  }
  function closeAdminGate(){var ov=document.getElementById('admin-gate');if(ov)ov.style.display='none';}
  async function submitAdminGate(){
    var ov=document.getElementById('admin-gate');if(!ov)return;
    var pw=ov.querySelector('#admin-gate-pw').value;
    var err=ov.querySelector('#admin-gate-err');
    var go=ov.querySelector('#admin-gate-go');
    if(!pw){err.textContent='Please enter the password';return;}
    go.disabled=true;go.textContent='Checking…';
    var ok=await verifyAdminPassword(pw);
    go.disabled=false;go.textContent='Enter';
    if(ok){adminUnlocked=true;closeAdminGate();reallyOpenAdmin();}
    else{err.textContent='Incorrect password';ov.querySelector('#admin-gate-pw').value='';}
  }
  function openAdmin(){ if(adminUnlocked){reallyOpenAdmin();return;} closeFolder(); openAdminGate(); }
  function reallyOpenAdmin(){closeFolder();openPage('admin');var box=document.getElementById('admin-content');if(box)box.innerHTML='<div class="sempty">Loading…</div>';loadMembers();}
  async function loadMembers(){
    var box=document.getElementById('admin-content');if(!box)return;
    try{
      var r=await sb.from('profiles').select('id,name,role').order('name');
      if(r.error){box.innerHTML='<div class="sempty">Load failed: '+esc(r.error.message)+'</div>';return;}
      MEMBERS=r.data||[];
    }catch(e){box.innerHTML='<div class="sempty">Load failed</div>';return;}
    renderAdmin();
  }
  /* 五個角色（代號 → 顯示名）。改這裡就能改 Admin 頁的選項。 */
  var ADMIN_ROLES=[['director','Director'],['roaster','Roaster'],['retail','Retail Manager'],['staff','Staff'],['customer','Customer']];
  function roleLabel(r){var f=ADMIN_ROLES.find(function(x){return x[0]===r;});return f?f[1]:'Customer';}
  function adminCard(m){
    var nm=esc(m.name||m.id||'—');
    var cur=m.role||'customer';
    var segs=ADMIN_ROLES.map(function(r){
      return '<button class="adm-seg'+(cur===r[0]?' on':'')+'" data-id="'+esc(String(m.id))+'" data-role="'+r[0]+'">'+r[1]+'</button>';
    }).join('');
    return '<div class="adm-card2"><div class="adm-head"><div class="adm-name">'+nm+'</div>'
      +'<div class="adm-role cur">'+roleLabel(cur)+'</div></div>'
      +'<div class="adm-toggle wrap">'+segs+'</div></div>';
  }
  function renderAdmin(){
    var box=document.getElementById('admin-content');if(!box)return;
    var cnt=document.getElementById('admin-count');
    if(cnt)cnt.textContent=MEMBERS.length?(MEMBERS.length+(MEMBERS.length===1?' member':' members')):'';
    if(!MEMBERS.length){box.innerHTML='<div class="sempty">No members yet</div>';return;}
    var html='<div class="gsec" style="padding:12px 18px 2px">Members · '+MEMBERS.length+'</div>'
      +'<div class="adm-list">'+MEMBERS.map(adminCard).join('')+'</div>';
    box.innerHTML=html;
    box.querySelectorAll('.adm-seg').forEach(function(b){b.addEventListener('click',function(){setMemberRole(b.dataset.id,b.dataset.role);});});
  }
  async function setMemberRole(id,role){
    var m=MEMBERS.find(function(x){return String(x.id)===String(id);});
    if(!m||m.role===role)return;
    var prev=m.role;m.role=role;renderAdmin();
    try{
      var r=await sb.from('profiles').update({role:role}).eq('id',id);
      if(r.error){m.role=prev;renderAdmin();alert('Update failed: '+r.error.message);}
    }catch(e){m.role=prev;renderAdmin();alert('Update failed');}
  }

  var LBL_MM2PT=72/25.4;            // 1mm = 2.834645669pt
  var LBL_LEFT_PT=7*LBL_MM2PT;      // 左邊界 7mm ≈ 19.84pt
  var LBL_RIGHT_PT=62*LBL_MM2PT;    // 右邊界 62mm ≈ 175.75pt

  function lblFitBlock(block,origLen){
    var os=block.match(/<pt:objectStyle x="([\d.]+)pt" y="([\d.]+)pt" width="([\d.]+)pt" height="([\d.]+)pt"/);
    if(!os)return block;
    var ow=parseFloat(os[3]);
    var fe=block.match(/size="([\d.]+)pt"/);var origSize=fe?parseFloat(fe[1]):0;
    var nx=LBL_LEFT_PT,nw=LBL_WIDTH_PT;
    block=block.replace(os[0],'<pt:objectStyle x="'+nx.toFixed(2)+'pt" y="'+os[2]+'pt" width="'+nw.toFixed(2)+'pt" height="'+os[4]+'pt"');
    block=block.replace(/control="AUTOLEN"/,'control="LONGTEXTFIXED"');
    block=block.replace(/(<text:textControl[^>]*?shrink=")\w+(")/,'$1true$2');
    block=block.replace(/(<text:textControl[^>]*?autoLF=")\w+(")/,'$1false$2');
    block=block.replace(/(<text:textControl[^>]*?clipFrame=")\w+(")/,'$1false$2');
    var dm=block.match(/<pt:data>([\s\S]*?)<\/pt:data>/);
    var newLen=((dm?dm[1]:'')||'').length||1;
    if(origSize>0&&origLen>0&&ow>0){
      var cw=ow/(origLen*origSize);
      if(cw>0){
        var maxSize=(nw*0.97)/(newLen*cw);
        var ns=Math.min(origSize,maxSize);if(ns<3)ns=3;
        block=block.replace(/size="([\d.]+)pt"/g,'size="'+(Math.round(ns*10)/10)+'pt"');
      }
    }
    return block;
  }

        if(newText!==f.orig){
          nb=nb.replace(/<pt:data>[\s\S]*?<\/pt:data>/,'<pt:data>'+xmlEsc(newText)+'</pt:data>')
               .replace(/(<text:stringItem charLen=")\d+(")/,'$1'+newText.length+'$2');
        }
        if(f.fit&&!empty){nb=lblFitBlock(nb,f.orig.length);}

"color:#1a1a1a;\">\u7e3d\u6536\u5165\uff08232 \u5305 \u00d7 $25\uff09<\/span><span class=\"val\">  $5800.00<\/span><\/div><div class=\"brow\"><span class=\"lbl\" style=\"color:#1a1a1a;\">\u5229\u6f64<\/span><span class=\"val\" style=\"color:#2e7d32;\">  + $4159.00<\/span><\/div><\/div>\n    <\/div>\n    <div class=\"result-grid\">\n      <div class=\"result-card highlight\">\n        <p class=\"result-label\">\u7576\u65e5\u5229\u6f64<\/p>\n        <p class=\"result-val\" id=\"r-profit\" style=\"color: rgb(46, 125, 50);\">+ $4159.00<\/p>\n      <\/div>\n      <div class=\"result-card\">\n        <p class=\"result-label\">\u5229\u6f64\u7387<\/p>\n        <p class=\"result-val\" id=\"r-margin\" style=\"color: rgb(46, 125, 50);\">71.7%<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- WHOLESALE -->\n  <div id=\"mode-wholesale\" style=\"display:none;\">\n    <div class=\"section\">\n      <p class=\"section-title\">\u6279\u767c\u8a2d\u5b9a<\/p>\n      <div class=\"ws-row\">\n        <span class=\"ws-label\">\u5305\u88dd\u898f\u683c<\/span>\n        <div class=\"pkg-grid\" id=\"ws-pkg-grid\" style=\"flex:1;\"><div class=\"pkg-btn active\" onclick=\"selectWsPkg(0)\">150g<\/div><div class=\"pkg-btn\" onclick=\"selectWsPkg(1)\">250g<\/div><\/div>\n      <\/div>\n      <div class=\"ws-row\" style=\"margin-top:8px;\">\n        <span class=\"ws-label\">\u6279\u767c\u55ae\u50f9<\/span>\n        <input type=\"number\" class=\"ws-input\" id=\"ws-price\" placeholder=\"12.00\" min=\"1\" step=\"0.50\" value=\"12\">\n        <span class=\"ws-unit\">$ / \u5305<\/span>\n      <\/div>\n      <div class=\"moq-info\">\n        <div class=\"moq-row\"><span style=\"color:#666;\">MOQ<\/span><span style=\"font-weight:600;\">$150<\/span><\/div>\n        <div class=\"moq-row\"><span style=\"color:#666;\">\u8a02\u55ae \u2265 $150<\/span><span class=\"green\">\u514d\u904b\u8cbb<\/span><\/div>\n        <div class=\"moq-row\"><span style=\"color:#666;\">\u8a02\u55ae &lt; $150<\/span><span class=\"yellow\">\u52a0\u6536\u904b\u8cbb $20<\/span><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"section\">\n      <p class=\"section-title\">\u6a21\u64ec\u8a02\u55ae<\/p>\n      <div class=\"ws-row\">\n        <span class=\"ws-label\">\u8a02\u8cfc\u5305\u6578<\/span>\n        <div class=\"stepper\">\n          <button id=\"ws-qty-dn\">\u2212<\/button>\n          <span id=\"ws-qty-val\">20<\/span>\n          <button id=\"ws-qty-up\">+<\/button>\n        <\/div>\n        <span style=\"font-size:13px;color:#888;\">\u5305<\/span>\n      <\/div>\n      <div id=\"ws-order-status\" style=\"margin-top:8px;\"><\/div>\n    <\/div>\n    <div class=\"metric-grid\">\n      <div class=\"metric\"><p class=\"metric-label\">\u5546\u54c1\u91d1\u984d<\/p><p class=\"metric-val\" id=\"ws-order-subtotal\">\u2014<\/p><\/div>\n      <div class=\"metric\"><p class=\"metric-label\">\u904b\u8cbb<\/p><p class=\"metric-val\" id=\"ws-shipping\">\u2014<\/p><\/div>\n      <div class=\"metric\"><p class=\"metric-label\">\u8a02\u55ae\u7e3d\u984d<\/p><p class=\"metric-val\" id=\"ws-order-total\">\u2014<\/p><\/div>\n      <div class=\"metric\"><p class=\"metric-label\">\u6bcf\u5305\u5229\u6f64<\/p><p class=\"metric-val\" id=\"ws-profit-per-bag\">\u2014<\/p><\/div>\n    <\/div>\n    <div class=\"section\">\n      <p class=\"section-title\">\u8a02\u55ae\u62c6\u89e3<\/p>\n      <div id=\"ws-breakdown\"><\/div>\n    <\/div>\n    <div class=\"result-grid\">\n      <div class=\"result-card highlight\">\n        <p class=\"result-label\">\u8a02\u55ae\u5229\u6f64<\/p>\n        <p class=\"result-val\" id=\"ws-profit\">\u2014<\/p>\n      <\/div>\n      <div class=\"result-card\">\n        <p class=\"result-label\">\u5229\u6f64\u7387<\/p>\n        <p class=\"result-val\" id=\"ws-margin\">\u2014<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <p style=\"text-align:center;font-size:11px;color:#bbb;margin-top:20px;\">Ratio Coffee Pty Ltd \u00b7 ABN 57 658 829 899<\/p>\n<\/div>\n\n<script>\nconst packages=[{g:150,price:25},{g:250,price:25}];\nlet activePkg=0,wsActivePkg=0,pots=4,wsQty=20,currentTab='retail';\n\nfunction renderPkgGrid(){\n  document.getElementById('pkg-grid').innerHTML=packages.map((p,i)=>\n    `<div class=\"pkg-btn${i===activePkg?' active':''}\" onclick=\"selectPkg(${i})\">${p.g}g \u2014 $${p.price}<\/div>`).join('');\n  document.getElementById('ws-pkg-grid').innerHTML=packages.map((p,i)=>\n    `<div class=\"pkg-btn${i===wsActivePkg?' active':''}\" onclick=\"selectWsPkg(${i})\">${p.g}g<\/div>`).join('');\n}\nfunction selectPkg(i){activePkg=i;renderPkgGrid();calc();}\nfunction selectWsPkg(i){wsActivePkg=i;renderPkgGrid();calc();}\nfunction addCustomPkg(){\n  const g=parseInt(document.getElementById('custom-g').value);\n  const price=parseFloat(document.getElementById('custom-price').value);\n  if(!g||!price||g<50||price<1)return;\n  packages.push({g,price});activePkg=packages.length-1;\n  document.getElementById('custom-g').value='';document.getElementById('custom-price').value='';\n  renderPkgGrid();calc();\n}\nfunction getNum(id){const v=parseFloat(document.getElementById(id).value);return isNaN(v)?0:v;}\nfunction brow(label,val,bold,color){\n  return `<div class=\"brow\"><span class=\"lbl\"${bold?' style=\"color:#1a1a1a;\"':''}>${label}<\/span><span class=\"val\"${color?` style=\"color:${color};\"`:''}>  ${val}<\/span><\/div>`;\n}\nfunction fmtMin(m){const h=Math.floor(m/60),r=m%60;return r?(h?h+'h ':'')+r+'min':h+'h';}\nfunction getBase(){\n  const beanPrice=parseInt(document.getElementById('bean-price-val').textContent);\n  const greenKg=parseInt(document.getElementById('green-kg-val').textContent);\n  const shrink=parseInt(document.getElementById('shrink-val').textContent)/100;\n  const venueRate=parseInt(document.getElementById('venue-rate-val').textContent);\n  const staffRate=parseInt(document.getElementById('staff-rate-val').textContent);\n  const transport=parseInt(document.getElementById('transport-val').textContent);\n  const packRate=parseInt(document.getElementById('pack-rate-val').textContent);\n  const packSpeed=parseInt(document.getElementById('pack-speed-val').textContent);\n  const costBag=getNum('cost-bag'),costSticker=getNum('cost-sticker'),costBox=getNum('cost-box');\n  const packLaborPerBag=packRate/packSpeed;\n  const matCostPerBag=costBag+costSticker+costBox;\n  const roastedKg=pots*greenKg*(1-shrink);\n  const totalGreenKg=pots*greenKg;\n  const roastMin=pots*15,totalMin=30+roastMin+30;\n  const venueHrs=roastMin/60,staffHrs=totalMin/60;\n  const venueCost=venueHrs*venueRate,staffCost=staffHrs*staffRate,beanCost=totalGreenKg*beanPrice;\n  document.getElementById('pack-cost-hint').textContent='\u6bcf\u5305\u5305\u88dd\u4eba\u4e8b\u6210\u672c\uff1a$'+packLaborPerBag.toFixed(2);\n  return{beanPrice,greenKg,shrink,venueRate,staffRate,transport,packRate,packSpeed,packLaborPerBag,matCostPerBag,costBag,costSticker,costBox,roastedKg,totalGreenKg,roastMin,totalMin,venueHrs,staffHrs,venueCost,staffCost,beanCost};\n}\nfunction calcRetail(){\n  const b=getBase();const pkg=packages[activePkg];\n  const bags=Math.floor(b.roastedKg/(pkg.g/1000));\n  const matTotal=bags*b.matCostPerBag,packLaborTotal=bags*b.packLaborPerBag;\n  const packTimeHrs=bags/b.packSpeed;\n  const totalCost=b.venueCost+b.staffCost+b.transport+b.beanCost+matTotal+packLaborTotal;\n  const revenue=bags*pkg.price,profit=revenue-totalCost,margin=revenue>0?(profit/revenue*100):0;\n  document.getElementById('r-kg').textContent=b.roastedKg.toFixed(1)+' kg';\n  document.getElementById('r-bags').textContent=bags+' \u5305';\n  document.getElementById('r-pack-time').textContent=packTimeHrs<1?(packTimeHrs*60).toFixed(0)+'min':packTimeHrs.toFixed(1)+'hr';\n  document.getElementById('r-cost-kg').textContent='$'+(b.roastedKg>0?totalCost/b.roastedKg:0).toFixed(2);\n  let bd=brow('\u4ea4\u901a\u8cbb\uff08\u542b\u4eba\u4e8b\uff09','$'+b.transport.toFixed(2))+\n    brow('\u5834\u5730\u8cbb \u00d7 '+b.venueHrs.toFixed(2)+' hr','$'+b.venueCost.toFixed(2))+\n    brow('\u70d8\u7119\u4eba\u4e8b \u00d7 '+b.staffHrs.toFixed(2)+' hr\uff08'+fmtMin(b.totalMin)+'\uff09','$'+b.staffCost.toFixed(2))+\n    brow('\u751f\u8c46\u6210\u672c\uff08'+b.totalGreenKg+' kg \u00d7 $'+b.beanPrice+'\uff09','$'+b.beanCost.toFixed(2));\n  if(b.costBag>0)bd+=brow('\u5496\u5561\u888b\uff08'+bags+' \u00d7 $'+b.costBag.toFixed(2)+'\uff09','$'+(bags*b.costBag).toFixed(2));\n  if(b.costSticker>0)bd+=brow('\u8cbc\u7d19\uff08'+bags+' \u00d7 $'+b.costSticker.toFixed(2)+'\uff09','$'+(bags*b.costSticker).toFixed(2));\n  if(b.costBox>0)bd+=brow('\u76d2\u5b50\uff08'+bags+' \u00d7 $'+b.costBox.toFixed(2)+'\uff09','$'+(bags*b.costBox).toFixed(2));\n  bd+=brow('\u5305\u88dd\u4eba\u4e8b\uff08'+bags+' \u5305 \u00d7 $'+b.packLaborPerBag.toFixed(2)+'\uff09','$'+packLaborTotal.toFixed(2))+\n    brow('\u7e3d\u6210\u672c','$'+totalCost.toFixed(2),true)+\n    brow('\u7e3d\u6536\u5165\uff08'+bags+' \u5305 \u00d7 $'+pkg.price+'\uff09','$'+revenue.toFixed(2),true)+\n    brow('\u5229\u6f64',(profit>=0?'+':'')+' $'+profit.toFixed(2),true,profit>=0?'#2e7d32':'#c62828');\n  document.getElementById('r-breakdown').innerHTML=bd;\n  const pe=document.getElementById('r-profit');pe.textContent=(profit>=0?'+':'')+' $'+profit.toFixed(2);pe.style.color=profit>=0?'#2e7d32':'#c62828';\n  const me=document.getElementById('r-margin');me.textContent=margin.toFixed(1)+'%';me.style.color=margin>=0?'#2e7d32':'#c62828';\n}\nfunction calcWholesale(){\n  const b=getBase();const pkg=packages[wsActivePkg];\n  const wsPrice=parseFloat(document.getElementById('ws-price').value)||0;\n  const MOQ=150,SHIPPING=20;\n  const totalBags=Math.floor(b.roastedKg/(pkg.g/1000));\n  const roastCostPerBag=totalBags>0?(b.venueCost+b.staffCost+b.transport+b.beanCost)/totalBags:0;\n  const totalCostPerBag=roastCostPerBag+b.matCostPerBag+b.packLaborPerBag;\n  const subtotal=wsQty*wsPrice,moqMet=subtotal>=MOQ,shipping=moqMet?0:SHIPPING;\n  const orderTotal=subtotal+shipping,orderCost=wsQty*totalCostPerBag;\n  const orderProfit=orderTotal-orderCost,orderMargin=orderTotal>0?(orderProfit/orderTotal*100):0;\n  const profitPerBag=wsPrice-totalCostPerBag;\n  document.getElementById('ws-order-status').innerHTML=moqMet\n    ?`<span class=\"badge badge-green\">\u2713 \u9054\u5230 MOQ $150 \u00b7 \u514d\u904b\u8cbb<\/span>`\n    :`<span class=\"badge badge-yellow\">\u672a\u9054 MOQ \u00b7 \u52a0\u6536\u904b\u8cbb $20\uff08\u9084\u5dee $${(MOQ-subtotal).toFixed(2)}\uff09<\/span>`;\n  document.getElementById('ws-order-subtotal').textContent='$'+subtotal.toFixed(2);\n  document.getElementById('ws-shipping').textContent=moqMet?'\u514d\u904b':'$'+SHIPPING;\n  document.getElementById('ws-order-total').textContent='$'+orderTotal.toFixed(2);\n  const ppbEl=document.getElementById('ws-profit-per-bag');\n  ppbEl.textContent=(profitPerBag>=0?'+':'')+' $'+profitPerBag.toFixed(2);\n  ppbEl.style.color=profitPerBag>=0?'#2e7d32':'#c62828';\n  let bd=brow('\u6bcf\u5305\u70d8\u7119\u6210\u672c\uff08\u6524\u5206\uff09','$'+roastCostPerBag.toFixed(2));\n  if(b.matCostPerBag>0)bd+=brow('\u6bcf\u5305\u5305\u88dd\u6750\u6599','$'+b.matCostPerBag.toFixed(2));\n  bd+=brow('\u6bcf\u5305\u5305\u88dd\u4eba\u4e8b','$'+b.packLaborPerBag.toFixed(2))+\n    brow('\u6bcf\u5305\u7e3d\u6210\u672c','$'+totalCostPerBag.toFixed(2),true)+\n    brow('\u5546\u54c1\u91d1\u984d\uff08'+wsQty+' \u5305 \u00d7 $'+wsPrice.toFixed(2)+'\uff09','$'+subtotal.toFixed(2))+\n    brow('\u904b\u8cbb',moqMet?'$0 (\u514d\u904b)':'$'+SHIPPING,false,moqMet?'#2e7d32':'#f57f17')+\n    brow('\u8a02\u55ae\u7e3d\u984d','$'+orderTotal.toFixed(2),true)+\n    brow('\u8a02\u55ae\u6210\u672c','$'+orderCost.toFixed(2))+\n    brow('\u8a02\u55ae\u5229\u6f64',(orderProfit>=0?'+':'')+' $'+orderProfit.toFixed(2),true,orderProfit>=0?'#2e7d32':'#c62828');\n  document.getElementById('ws-breakdown').innerHTML=bd;\n  const pe=document.getElementById('ws-profit');pe.textContent=(orderProfit>=0?'+':'')+' $'+orderProfit.toFixed(2);pe.style.color=orderProfit>=0?'#2e7d32':'#c62828';\n  const me=document.getElementById('ws-margin');me.textContent=orderMargin.toFixed(1)+'%';me.style.color=orderMargin>=0?'#2e7d32':'#c62828';\n}\nfunction calc(){if(currentTab==='retail')calcRetail();else calcWholesale();}\nfunction switchTab(tab){\n  currentTab=tab;\n  document.getElementById('mode-retail').style.display=tab==='retail'?'':'none';\n  document.getElementById('mode-wholesale').style.display=tab==='wholesale'?'':'none';\n  document.getElementById('tab-retail').classList.toggle('active',tab==='retail');\n  document.getElementById('tab-wholesale').classList.toggle('active',tab==='wholesale');\n  calc();\n}\nfunction bindSlider(id,outId){\n  document.getElementById(id).addEventListener('input',()=>{document.getElementById(outId).textContent=document.getElementById(id).value;calc();});\n}\nbindSlider('bean-price','bean-price-val');bindSlider('green-kg','green-kg-val');bindSlider('shrink','shrink-val');\nbindSlider('venue-rate','venue-rate-val');bindSlider('staff-rate','staff-rate-val');bindSlider('transport','transport-val');\nbindSlider('pack-rate','pack-rate-val');bindSlider('pack-speed','pack-speed-val');\ndocument.getElementById('pots-dn').onclick=()=>{if(pots>1){pots--;document.getElementById('pots-val').textContent=pots;calc();}};\ndocument.getElementById('pots-up').onclick=()=>{if(pots<20){pots++;document.getElementById('pots-val').textContent=pots;calc();}};\ndocument.getElementById('ws-qty-dn').onclick=()=>{if(wsQty>1){wsQty--;document.getElementById('ws-qty-val').textContent=wsQty;calc();}};\ndocument.getElementById('ws-qty-up').onclick=()=>{wsQty++;document.getElementById('ws-qty-val').textContent=wsQty;calc();};\n['cost-bag','cost-sticker','cost-box','ws-price'].forEach(id=>document.getElementById(id).addEventListener('input',calc));\nrenderPkgGrid();calc();\n<\/script>\n\n\n<\/body><\/html>";

      doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(178,94,106);
      doc.text('\u2014 empty \u2014',x+w/2,y+h/2,{align:'center'});
      return;
    }
    var leftW=Math.min(232,w*0.56);
    /* "Ratio" wordmark · centered above the right (offer) column */
    {var lcx=x+leftW+(w-leftW)/2;doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);doc.text('Ratio Crows Nest',lcx,y+22.5,{align:'center'});}
    var band=mnHexRgb(bean.color)||BROWN;
    /* ---- TAB header (top-left, rounded top corners only) ---- */
    var tabH=34,r=10;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,leftW,tabH,r,r,'F');else doc.rect(x,y,leftW,tabH,'F');
    doc.rect(x,y+tabH-r,leftW,r,'F');           /* square off the tab's bottom */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var nm=mnAsc(String(bean.name||'').toUpperCase()),ns=15;doc.setFontSize(ns);
    while(ns>9&&doc.getTextWidth(nm)>leftW-24){ns-=0.5;doc.setFontSize(ns);}
    doc.text(nm,x+14,y+tabH/2+ns*0.34);
    /* column divider (continues down from the tab edge) */
    doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.8);
    doc.line(x+leftW,y+tabH,x+leftW,y+h-14);

    /* ================= LEFT · bean info ================= */
    var lx=x+15,lw=leftW-30,cy=y+tabH+22;
    function lab(t){doc.setFont('helvetica','bold');doc.setFontSize(6.6);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);doc.text(t,lx,cy,{charSpace:1.1});cy+=13;}
    var o=bean.origin||{},orows=[];
    if(o.process)orows.push(['Process',o.process]);
    if(o.variety)orows.push(['Variety',o.variety]);
    if(o.altitude)orows.push(['Altitude',o.altitude+' MASL']);
    if(o.region)orows.push(['Region',o.region]);
    if(bean.recipe&&bean.recipe.length){
      /* blend → pull its recipe (component beans + %) from Blending */
      lab('RECIPE');
      bean.recipe.forEach(function(cpt){
        var pct=cpt.pct?(cpt.pct+'%'):'';
        var ctry=(cpt.country||'').trim();
        var proc=(cpt.process||'').trim();
        var line=cpt.bean+[ctry,proc].filter(Boolean).map(function(v){return '  \u00b7  '+v;}).join('');
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,line,lx,cy,lw-30,8.5,6.5);
        if(pct){doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);doc.setFontSize(8.5);doc.text(pct,lx+lw,cy,{align:'right'});}
        cy+=12;
      });
      cy+=15;
    }else if(orows.length){
      lab('ORIGIN');
      orows.forEach(function(rr){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
        doc.text(rr[0],lx,cy);
        doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,rr[1],lx+lw,cy,lw-58,8.5,7,'right');cy+=12;
      });
      cy+=15;
    }
    if(bean.cupScores&&bean.cupScores.some(function(o){return o.n!=null;})){
      lab('CUPPING');
      var rR=26,rCx=lx+lw/2,rCy=cy+9+rR;
      drawCuppingRadar(doc,rCx,rCy,rR,bean.cupScores,band,[124,58,68]);
      cy=rCy+rR+9+15;
    }
    /* FLAVOUR — one line, no wrap, font grown to fill the column width */
    if(bean.flavour&&bean.flavour.length){
      var flText=mnAsc(bean.flavour.join('  \u00b7  '));
      doc.setFont('helvetica','bold');
      var fs=24;doc.setFontSize(fs);
      while(fs>9&&doc.getTextWidth(flText)>lw){fs-=0.5;doc.setFontSize(fs);}
      var baseY=y+h-16,labY=baseY-fs*0.9-8;
      doc.setFont('helvetica','bold');doc.setFontSize(6.6);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
      doc.text('FLAVOUR',lx,labY,{charSpace:1.1});
      doc.setFont('helvetica','bold');doc.setFontSize(fs);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(flText,lx,baseY);
    }

    /* ================= RIGHT · weekly offer ================= */
    var rx0=x+leftW+16,rEnd=x+w-15,rw=rEnd-rx0,ry=y+tabH+16;
    function money(v){v=String(v==null?'':v).trim().replace(/^\$+/,'');return '$'+(v||'\u2014');}
    function rule(){doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);doc.line(rx0,ry,rEnd,ry);}
    var PSZ=12.5;      /* price size — matched to the item name for a flat, even look */
    var ITEMSZ=12.5;   /* one item-name size for every drink */
    var SUBSZ=9;       /* sub-line size (e.g. "Black and White") */
    var SECGAP=18;     /* gap after a section's rule, before next category title */
    var TITLEGAP=18;   /* baseline-to-baseline from a category title down to its first item
                          (must exceed the price cap-height so the tall price never overlaps up into the title) */
    function catTitle(t){doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(178,94,106);doc.text(t.toUpperCase(),rx0,ry,{charSpace:1});ry+=TITLEGAP;}
    /* Draw one drink row with the item name (left) and price (right) sharing a
       common baseline. The price is vertically centred to the item cap-height so
       the two never look mismatched regardless of their differing font sizes. */
    function drinkRow(label,labelCol,priceVal){
      doc.setFont('helvetica','bold');doc.setFontSize(ITEMSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      mnFit(doc,label,rx0,ry,rw-58,ITEMSZ,9);
      doc.setFont('helvetica','bold');doc.setFontSize(PSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      doc.text(money(priceVal),rEnd,ry-(PSZ-ITEMSZ)*0.34,{align:'right'});
    }
    /* Special of the Week — plain heading, aligned to the banner bottom */
    doc.setFont('helvetica','bolditalic');doc.setFontSize(13);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Special of the Week',rx0,ry);ry+=28;
    /* Espresso Based · 1+1 Combo */
    catTitle('Espresso Based');
    drinkRow('1+1 Combo',RED,off.combo);ry+=15;
    doc.setFont('helvetica','italic');doc.setFontSize(SUBSZ);doc.setTextColor(0,0,0);
    doc.text('Black and White',rx0,ry);ry+=16;
    rule();ry+=SECGAP;
    /* Signature · Dirty Ratio */
    catTitle('Signature');
    drinkRow('Dirty Ratio',BLUE,off.dirty);ry+=16;
    rule();ry+=SECGAP;
    /* Hand Pour - Filter Coffee · Hot / Cold */
    catTitle('Hand Pour - Filter Coffee');
    drinkRow('Hot',RED,off.hot);ry+=22;
    drinkRow('Cold',BLUE,off.cold);
  }
  /* ============ Take Away Menu (More -> Generate Menu -> Take Away) ============
     Reproduces the dine-in cup menu: a fixed Blend Selection block up top (static
     for now) + an editable Pour Over Selection grid (4 beans, hot/cold prices).
     Two identical copies print on A4 landscape with a centre cut line. */
  var TAKEAWAY_DEFAULT=[
    {bean:'',name:'Danche vol.2',     origin:'Anaerobic Washed',  flavour:'Peach, Grapes, Bergamont',       hot:'10', cold:'11'},
    {bean:'',name:'Alo Bona Village', origin:'Classic Natural',   flavour:'Floral, Mango, Berry',           hot:'10', cold:'11'},
    {bean:'',name:'El Vergel',        origin:'Washed',            flavour:'Floral, Melon, Honey',           hot:'10', cold:'11'},
    {bean:'',name:'Alo Village',      origin:'Cold Fermentation', flavour:'Winy, Grape Candy, Dried Fruit', hot:'15', cold:'16'}
  ];
  function tkBlank(){return {bean:'',name:'',origin:'',flavour:'',hot:'',cold:''};}
  function loadTakeaway(){
    try{var a=JSON.parse(localStorage.getItem('ratio_takeaway')||'null');
      if(Array.isArray(a)&&a.length===4)return a.map(function(o){o=o||{};return {bean:o.bean||'',name:o.name||'',origin:o.origin||'',flavour:o.flavour||'',hot:o.hot||'',cold:o.cold||''};});}catch(e){}
    return TAKEAWAY_DEFAULT.map(function(o){var n={};for(var k in o)n[k]=o[k];return n;});
  }
  function saveTakeaway(a){try{localStorage.setItem('ratio_takeaway',JSON.stringify(a));}catch(e){}appStatePush('ratio_takeaway');}
  var TAKEAWAY=loadTakeaway();
  /* single-origin beans available to auto-fill a pour-over slot (BEANS + Retail, minus blends) */
  function takeawayOptionList(){
    var seen={},out=[],blendSet={};
    try{blendNames().forEach(function(n){blendSet[String(n).trim().toLowerCase()]=true;});}catch(e){}
    (BEANS||[]).forEach(function(b){var nm=(b.name||'').trim();var k=nm.toLowerCase();if(!nm||seen[k]||blendSet[k])return;seen[k]=true;out.push(nm);});
    (RETAIL_BEANS||[]).forEach(function(s){var nm=(s.sample_id||'').trim();var k=nm.toLowerCase();if(!nm||seen[k]||blendSet[k])return;seen[k]=true;out.push(nm);});
    return out;
  }
  /* pull process (no country) and flavour notes for a chosen bean */
  function takeawayAutofill(name){
    name=String(name||'').trim();var key=name.toLowerCase();
    var b=(BEANS||[]).filter(function(x){return (x.name||'').trim().toLowerCase()===key;})[0]||null;
    var origin=b?String(b.process||'').trim():'';
    if(!origin){var proc=beanProcessFor(name);origin=proc?String(proc).trim():'';}
    var s=(RETAIL_BEANS||[]).filter(function(x){return (x.sample_id||'').trim().toLowerCase()===key;})[0]||null;
    var flav=s?(s.features||[]).filter(Boolean).slice(0,3).join(', '):'';
    return {name:name, origin:origin, flavour:flav};
  }
  function openTakeawayMenu(){
    menuView='takeaway';
    var c=document.getElementById('menu-content');
    if(c)c.innerHTML='<div class="sempty">Loading beans\u2026</div>';
    Promise.all([ensureBeansForInvoice(),ensureRetailForLabel()]).then(function(){renderTakeaway();}).catch(function(){renderTakeaway();});
  }
  function renderTakeaway(){
    var c=document.getElementById('menu-content');if(!c)return;
    var opts=takeawayOptionList();
    var pos=['Top left','Top right','Bottom left','Bottom right'];
    function optsHtml(cur){
      return '<option value="">\u2014 pick a bean to auto-fill \u2014</option>'
        +opts.map(function(n){return '<option value="'+esc(n)+'"'+(n===cur?' selected':'')+'>'+esc(n)+'</option>';}).join('');
    }
    function card(i){
      var v=TAKEAWAY[i]||tkBlank();
      return '<div class="sp-card" data-i="'+i+'">'
        +'<div class="sp-cardhd"><span class="sp-badge">'+esc(pos[i].toUpperCase())+'</span><span class="sp-cardsub">Pour Over</span></div>'
        +'<label class="sp-field"><span class="sp-flab">Auto-fill from bean</span>'
          +'<select class="tk-auto tk-ti" data-i="'+i+'">'+optsHtml(v.bean)+'</select></label>'
        +'<label class="sp-field"><span class="sp-flab">Name</span>'
          +'<input type="text" class="tk-ti tk-f" data-k="name" data-i="'+i+'" value="'+esc(v.name)+'" placeholder="e.g. Danche vol.2"></label>'
        +'<label class="sp-field"><span class="sp-flab">Process</span>'
          +'<input type="text" class="tk-ti tk-f" data-k="origin" data-i="'+i+'" value="'+esc(v.origin)+'" placeholder="e.g. Anaerobic Washed"></label>'
        +'<label class="sp-field"><span class="sp-flab">Flavour</span>'
          +'<input type="text" class="tk-ti tk-f" data-k="flavour" data-i="'+i+'" value="'+esc(v.flavour)+'" placeholder="e.g. Peach, Grapes, Bergamont"></label>'
        +'<div class="sp-hc">'
          +'<span class="sp-price tk-price hot"><em>Hot</em> $<input type="text" inputmode="decimal" class="sp-pi tk-p" data-k="hot" data-i="'+i+'" value="'+esc(v.hot)+'" placeholder="0"></span>'
          +'<span class="sp-price tk-price cold"><em>Cold</em> $<input type="text" inputmode="decimal" class="sp-pi tk-p" data-k="cold" data-i="'+i+'" value="'+esc(v.cold)+'" placeholder="0"></span>'
        +'</div></div>';
    }
    c.innerHTML='<div class="mn-wrap">'
      +'<p class="gsec" style="padding-left:0">Pour Over Selection \u00b7 4 cups, hot / cold price each</p>'
      +card(0)+card(1)+card(2)+card(3)
      +'<p class="mn-note">The Blend Selection block at the top is fixed for now. These four pour-over beans and their hot / cold prices print in a 2\u00d72 grid below it. The PDF prints two identical copies on A4 with a centre cut line.</p>'
      +'<button class="gbtn" id="tk-gen">Generate Menu PDF</button>'
      +'</div>';
    c.querySelectorAll('.tk-auto').forEach(function(sel){sel.addEventListener('change',function(){
      var i=+sel.dataset.i;var nm=sel.value;
      TAKEAWAY[i].bean=nm;
      if(nm){var a=takeawayAutofill(nm);TAKEAWAY[i].name=a.name;if(a.origin)TAKEAWAY[i].origin=a.origin;if(a.flavour)TAKEAWAY[i].flavour=a.flavour;}
      saveTakeaway(TAKEAWAY);renderTakeaway();
    });});
    c.querySelectorAll('.tk-f,.tk-p').forEach(function(inp){inp.addEventListener('input',function(){
      var i=+inp.dataset.i;if(!TAKEAWAY[i])TAKEAWAY[i]=tkBlank();TAKEAWAY[i][inp.dataset.k]=inp.value;saveTakeaway(TAKEAWAY);
    });});
    var gen=document.getElementById('tk-gen');
    if(gen)gen.addEventListener('click',function(){generateTakeawayPDF();});
  }
  function generateTakeawayPDF(){
    var JS=window.jspdf&&window.jspdf.jsPDF;
    if(!JS){alert('PDF tool still loading, please try again');return;}
    var data=TAKEAWAY.map(function(o){o=o||{};return {name:o.name||'',origin:o.origin||'',flavour:o.flavour||'',hot:o.hot||'',cold:o.cold||''};});
    var img=new Image();
    img.onload=function(){buildTakeawayPDF(data,img);};
    img.onerror=function(){buildTakeawayPDF(data,null);};
    img.src='logo.png';
  }
  function buildTakeawayPDF(data,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    drawTakeawayMenu(doc,0,W/2,H,data,logo);
    drawTakeawayMenu(doc,W/2,W/2,H,data,logo);
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_TakeAway_Menu.pdf');
  }
  function drawTakeawayMenu(doc,ox,w,h,data,logo){
    var INK=[0,0,0], SUB=[0,0,0], MUTE=[124,58,68], LINE=[30,26,25];
    var HOT=[214,0,108], COLD=[42,143,216];
    var padX=24, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;

    /* ---------- header ---------- */
    var hy=42;
    if(logo){try{doc.addImage(logo,'PNG',x0,hy-26,26,26);}catch(e){}}
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
    doc.text('Ratio',x0+32,hy-13);doc.text('Coffee',x0+32,hy-4);
    doc.setFont('helvetica','bold');doc.setFontSize(15);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Blend Selection',x0+76,hy-6);
    doc.setDrawColor(INK[0],INK[1],INK[2]);doc.setLineWidth(1);
    doc.line(x0+76,hy+3,xEnd,hy+3);

    /* ---------- two blends ---------- */
    var by=hy+36, colCx=[x0+innerW*0.27, x0+innerW*0.74];
    var blends=[
      {name:'DARK KNIGHT 3', sub:'complex flavour', notes:'Plum, Walnut, Dark Choc'},
      {name:'DANCER',        sub:'smooth flavour',  notes:'Floral, Red Apple, Toffee'}
    ];
    blends.forEach(function(bl,ci){
      var cx=colCx[ci];
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(bl.name,cx,by,{align:'center'});
      doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(bl.sub,cx,by+12,{align:'center'});
      doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(bl.notes,cx,by+25,{align:'center'});
    });
    var midX=x0+innerW*0.5;
    doc.setDrawColor(MUTE[0],MUTE[1],MUTE[2]);doc.setLineWidth(1);
    doc.line(midX+7,by-11,midX-7,by+27);

    /* ---------- espresso price list ---------- */
    var py=by+52, rowH=23;
    var rows=[
      {main:'Espresso',    size:'',      price:'5'},
      {main:'Small',       size:'6oz',   price:'5'},
      {main:'Large',       size:'10 oz', price:'6'},
      {main:'Fresh Batch', size:'10oz',  price:'6'},
      {main:'On Ice',      size:'10oz',  price:'7'},
      {main:'Cold Batch',  size:'10oz',  price:'7', note:'(Barista choice of the day)'}
    ];
    rows.forEach(function(r){
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(r.main,x0,py);
      var mw=doc.getTextWidth(r.main);
      if(r.size){doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        doc.text('  |  '+r.size,x0+mw+3,py);}
      doc.setFont('helvetica','normal');doc.setFontSize(12);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(r.price,xEnd,py,{align:'right'});
      if(r.note){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        doc.text(r.note,x0,py+11);py+=11;}
      py+=rowH;
    });
    py+=2;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    doc.text('alternative milk, extra shot',x0,py);doc.text('50 cents',xEnd,py,{align:'right'});py+=11;
    doc.text('decaf',x0,py);doc.text('1 dollar',xEnd,py,{align:'right'});

    /* ---------- Dirty Ratio dashed box ---------- */
    var dy=py+16, dh=26;
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.setLineDashPattern)doc.setLineDashPattern([3,3],0);
    if(doc.roundedRect)doc.roundedRect(x0,dy,innerW,dh,13,13,'S');else doc.rect(x0,dy,innerW,dh,'S');
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Dirty Ratio',x0+14,dy+dh/2+4);
    doc.text('9',xEnd-14,dy+dh/2+4,{align:'right'});

    /* ---------- Pour Over Selection ---------- */
    var poHeadY=dy+dh+34, cx=ox+w/2;
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Pour Over Selection',cx,poHeadY,{align:'center'});
    var thw=doc.getTextWidth('Pour Over Selection');
    doc.setDrawColor(INK[0],INK[1],INK[2]);doc.setLineWidth(0.8);
    doc.line(cx-thw/2-8,poHeadY+6,cx+thw/2+8,poHeadY+6);

    /* 2x2 grid */
    var gTop=poHeadY+22, gBot=h-24, colGap=18, rowGap=16;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.8);
    if(doc.setLineDashPattern)doc.setLineDashPattern([2,3],0);
    doc.line(x0+cw+colGap/2,gTop,x0+cw+colGap/2,gBot);
    doc.line(x0,gTop+ch+rowGap/2,x0+innerW,gTop+ch+rowGap/2);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    for(var i=0;i<4;i++){drawPourCell(doc,cellX[i],cellY[i],cw,data[i]||{},INK,SUB,HOT,COLD);}
  }
  function drawPourCell(doc,x,y,w,it,INK,SUB,HOT,COLD){
    var name=mnAsc(it.name||'');
    if(!name)return;
    var hot=String(it.hot==null?'':it.hot).trim(), cold=String(it.cold==null?'':it.cold).trim();
    /* reserve room for the price pair on the right */
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    var pw=doc.getTextWidth((hot||'-')+'  /  '+(cold||'-'));
    /* name */
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(INK[0],INK[1],INK[2]);
    mnFit(doc,name,x,y+11,w-pw-14,12,8.5);
    /* prices right-aligned: hot (pink) / cold (blue) */
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    var rx=x+w;
    doc.setTextColor(COLD[0],COLD[1],COLD[2]);doc.text(cold||'-',rx,y+11,{align:'right'});
    var cwid=doc.getTextWidth(cold||'-');
    doc.setTextColor(SUB[0],SUB[1],SUB[2]);doc.text('  /  ',rx-cwid,y+11,{align:'right'});
    var swid=doc.getTextWidth('  /  ');
    doc.setTextColor(HOT[0],HOT[1],HOT[2]);doc.text(hot||'-',rx-cwid-swid,y+11,{align:'right'});
    /* origin */
    if(it.origin){doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
      mnFit(doc,it.origin,x,y+25,w,8.5,7);}
    /* flavour */
    if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,it.flavour,x,y+40,w,10,8);}
  }
  function mnAsc(t){return String(t==null?'':t).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/[\u2013\u2014]/g,'-').replace(/\u2026/g,'...');}

  function loadDinein(){

      if(a&&a.blends&&a.prices&&a.pours){
        var d=diClone(DINEIN_DEFAULT);
        for(var i=0;i<2;i++){for(var k in d.blends[i]){if(a.blends[i]&&a.blends[i][k]!=null)d.blends[i][k]=a.blends[i][k];}}

        DINEIN_TXTKEYS.forEach(function(tk){if(a[tk]!=null)d[tk]=a[tk];});

  /* blend picker -> pull flavour notes from blend definition + retail features */
  function dineinBlendAutofill(name){

  /* Live lookup of a bean's retail dot colour \u2014 not cached, so it always reflects the current Retail Info assignment.
     Falls back to a prefix match (either direction) when the exact name isn't a key in the dots map, since
     retail sample_id names (e.g. "Danche") are sometimes shorter than the descriptive dot-map keys
     (e.g. "Danche Anaerobic Washed" / "Danche Red Honey"). */
  function beanColorFor(name){
    name=String(name||'').trim();if(!name)return '';
    try{
      var dm=loadDots();
      var dotKey='';
      if(dm[name])dotKey=dm[name];
      if(!dotKey){
        var lk=name.toLowerCase();
        Object.keys(dm).forEach(function(k){if(!dotKey&&String(k).trim().toLowerCase()===lk)dotKey=dm[k];});
      }
      if(!dotKey){
        var lk2=name.toLowerCase();
        Object.keys(dm).forEach(function(k){
          if(dotKey)return;
          var kk=String(k).trim().toLowerCase();
          if(kk&&(kk.indexOf(lk2)===0||lk2.indexOf(kk)===0))dotKey=dm[k];
        });
      }
      return (dotKey&&RTL_DOTCOL[dotKey])||'';
    }catch(e){return '';}
  }
  function beanProcessFor(name){
    var key=String(name||'').trim().toLowerCase();if(!key)return '';
    var s=(RETAIL_BEANS||[]).filter(function(x){return (x.sample_id||'').trim().toLowerCase()===key;})[0];
    if(s&&s.process)return s.process;
    var b=(BEANS||[]).filter(function(x){return (x.name||'').trim().toLowerCase()===key;})[0];
    if(b&&b.process)return b.process;
    return '';
  }
  /* Match a green bean in BEANS by name + process together (falls back to name-only
     if no process given or no exact name+process match exists). Prevents same-name,
     different-process beans (e.g. two "Danche" batches) from resolving to the wrong lot. */
  function beanByNameProcess(name,process){
    var nk=String(name||'').trim().toLowerCase();if(!nk)return null;
    var pk=String(process||'').trim().toLowerCase();
    var pool=(BEANS||[]).filter(function(x){return (x.name||'').trim().toLowerCase()===nk;});
    if(!pool.length)return null;
    if(pk){var exact=pool.filter(function(x){return (x.process||'').trim().toLowerCase()===pk;})[0];if(exact)return exact;}
    return pool[0];
  }
  /* Dine In pour-over picker: only beans that exist in Retail Info (not the full green-bean roastery list) */
  function retailOnlyBeanList(){
    var seen={},out=[];
    var src=(RTL_ROWS&&RTL_ROWS.length)?RTL_ROWS:(RETAIL_BEANS||[]);
    src.forEach(function(s){
      var nm=(s.sample_id||'').trim();var k=nm.toLowerCase();if(!nm||seen[k])return;
      var isBlend=false;try{isBlend=!!blendDefByName(nm);}catch(e){}
      if(isBlend)return;
      seen[k]=true;out.push(nm);
    });
    return out;
  }

  function generateDineinPDF(){
    var JS=window.jspdf&&window.jspdf.jsPDF;
    if(!JS){alert('PDF tool still loading, please try again');return;}
    var cfg=diClone(DINEIN);
    var img=new Image();
    img.onload=function(){buildDineinPDF(cfg,img);};
    img.onerror=function(){buildDineinPDF(cfg,null);};
    img.src='logo.png';
  }
  function buildDineinPDF(cfg,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    drawDineInMenu(doc,0,W/2,H,cfg,logo);
    drawDineInMenu(doc,W/2,W/2,H,cfg,logo);
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_DineIn_Menu.pdf');
  }
  function drawDineInMenu(doc,ox,w,h,cfg,logo){
    var INK=[0,0,0], BERRY=[124,58,68], LINE=[30,26,25], MUTE=[120,112,108];
    var HOT=[214,0,108], COLD=[42,143,216];
    var padX=26, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;
    var P=cfg.prices||{};
    function pv(k,d){var s=String(P[k]==null?'':P[k]).trim();return s||d||'';}

    /* ---- unified type scale ---- */
    var FS_TITLE=20, FS_KICKER=8, FS_SECTION=9.5, FS_ITEM=11, FS_PRICE=12, FS_META=8.5, FS_DESC=8.5;
    /* ---- unified spacing ---- */
    var ROW=17.5;      /* baseline-to-baseline for a standard priced item */
    var META_LH=10;    /* line height for a meta/description line under an item */
    var SEC_TOP=15;    /* space above a section rule */
    var SEC_GAP=15;    /* space from section rule down to its first item */

    var y=38;

    /* ---------- title block ---------- */
    doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
