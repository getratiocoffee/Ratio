  function generateDineinPDF(){
    var JS=window.jspdf&&window.jspdf.jsPDF;
    if(!JS){alert('PDF tool still loading, please try again');return;}
    var cfg=diClone(DINEIN);
    var img=new Image();
    img.onload=function(){buildDineinPDF(cfg,img);};
    img.onerror=function(){buildDineinPDF(cfg,null);};
    img.src='logo.png';
  }
  function buildDineinPDF(cfg,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    drawDineInMenu(doc,0,W/2,H,cfg,logo);
    drawDineInMenu(doc,W/2,W/2,H,cfg,logo);
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_DineIn_Menu.pdf');
  }
  function drawDineInMenu(doc,ox,w,h,cfg,logo){
    var INK=[0,0,0], BERRY=[124,58,68], LINE=[30,26,25], MUTE=[120,112,108];
    var HOT=[214,0,108], COLD=[42,143,216];
    var padX=26, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;
    var P=cfg.prices||{};
    function pv(k,d){var s=String(P[k]==null?'':P[k]).trim();return s||d||'';}

    /* ---- unified type scale ---- */
    var FS_TITLE=20, FS_KICKER=8, FS_SECTION=9.5, FS_ITEM=11, FS_PRICE=12, FS_META=8.5, FS_DESC=8.5;
    /* ---- unified spacing ---- */
    var ROW=17.5;      /* baseline-to-baseline for a standard priced item */
    var META_LH=10;    /* line height for a meta/description line under an item */
    var SEC_TOP=15;    /* space above a section rule */
    var SEC_GAP=18;    /* space from section rule down to its first item */

    var y=38;

    /* ---------- title block ---------- */
    doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
    doc.text('DINE IN MENU',ox+w/2,y,{align:'center',charSpace:3});
    doc.setFont('helvetica','bold');doc.setFontSize(FS_TITLE);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Ratio Crows Nest',ox+w/2,y+21,{align:'center'});
    y+=21;

    /* ---------- section header ---------- */
    function section(label,sub){
      y+=SEC_TOP;
      doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
      doc.text(label.toUpperCase(),x0,y,{charSpace:1.8});
      if(sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(sub),xEnd,y,{align:'right'});}
      doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.6);
      doc.line(x0,y+6,xEnd,y+6);
      y+=SEC_GAP;
    }
    /* ---------- price row (name | size .... price) ---------- */
    function priceRow(name,size,price,note){
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(mnAsc(name),x0,y);
      var nw=doc.getTextWidth(mnAsc(name));
      if(size){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text('  |  '+size,x0+nw+3,y);}
      if(price){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(price,xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
      if(note){y+=META_LH;doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(note),x0,y);}
      y+=ROW;
    }
    /* ---------- a plain meta line: label left, value right ---------- */
    function metaRow(label,value){
      doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(mnAsc(label),x0,y);
      if(value)doc.text(mnAsc(value),xEnd,y,{align:'right'});
      y+=META_LH+2;
    }

    /* ---------- two espresso blends ---------- */
    var bl=cfg.blends||[], colCx=[x0+innerW*0.27, x0+innerW*0.73], by=y+30;
    [0,1].forEach(function(ci){
      var b=bl[ci]||{}, cx=colCx[ci], hl=!!b.highlight;
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',cx,by-12,{align:'center',charSpace:1.2});}
      doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      doc.text(mnAsc((b.name||'').toUpperCase()),cx,by,{align:'center'});
      if(b.sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(b.sub),cx,by+12,{align:'center'});}
      if(b.notes){doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(mnAsc(b.notes),cx,by+25,{align:'center'});}
    });
    var midX=x0+innerW*0.5;
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1);
    doc.line(midX+6,by-11,midX-6,by+27);
    y=by+37;

    /* ---------- ESPRESSO BASED ---------- */
    section('Espresso Based');
    priceRow('Espresso','',pv('espresso'));
    priceRow('Small','6oz',pv('small'));
    priceRow('Large','10oz',pv('large'));
    priceRow('On Ice','10oz',pv('ice'));
    metaRow('extra shot \u00b7 alternative milk',pv('altmilk','50 cents'));
    metaRow('decaf',pv('decaf','1 dollar'));

    /* ---------- SIGNATURE ---------- */
    section('Signature');
    doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Dirty Ratio',x0,y);
    var dnw=doc.getTextWidth('Dirty Ratio');
    if(cfg.dirtySub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('  '+mnAsc(cfg.dirtySub),x0+dnw+4,y);}
    if(pv('dirty')){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(pv('dirty'),xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
    y+=META_LH+2;
    if(cfg.dirtyDesc){doc.setFont('helvetica','normal');doc.setFontSize(FS_DESC);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.splitTextToSize(mnAsc(cfg.dirtyDesc),innerW).slice(0,2).forEach(function(ln){doc.text(ln,x0,y);y+=META_LH;});}
    y+=4;

    /* ---------- AUTOMATED BREWING ---------- */
    section('Automated Brewing');
    priceRow('Fresh Batch','10oz',pv('fresh'),cfg.freshNote);
    priceRow('Cold Batch','10oz',pv('cold'),cfg.coldNote);

    /* ---------- HAND POUR FILTER COFFEE ---------- */
    section('Hand Pour Filter Coffee','hot or iced');
    (cfg.pours||[]).slice(0,4).forEach(function(it){
      var name=mnAsc(it.name||'');if(!name)return;
      var hl=!!it.highlight;
      var beanCol=mnHexRgb(beanColorFor(it.bean||it.name))||null;
      var hot=String(it.hot==null?'':it.hot).trim(), cold=String(it.cold==null?'':it.cold).trim();
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1.5);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',x0,y,{charSpace:1.2});y+=10;}
      /* right-aligned hot (pink) / cold (blue), vertically centred to the item name */
      doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);
      var py=y-(FS_PRICE-FS_ITEM)*0.34, rx=xEnd;
      doc.setTextColor(COLD[0],COLD[1],COLD[2]);doc.text(cold||'-',rx,py,{align:'right'});
      var cwid=doc.getTextWidth(cold||'-');
      doc.setTextColor(INK[0],INK[1],INK[2]);doc.text(' / ',rx-cwid,py,{align:'right'});
      var swid=doc.getTextWidth(' / ');
      doc.setTextColor(HOT[0],HOT[1],HOT[2]);doc.text(hot||'-',rx-cwid-swid,py,{align:'right'});
      var priceW=cwid+swid+doc.getTextWidth(hot||'-');
      /* name — bean's own retail colour shown as a small dot marker, not text tint */
      var dotGap=11, nameX=x0+dotGap;
      if(beanCol){doc.setFillColor(beanCol[0],beanCol[1],beanCol[2]);doc.circle(x0+3,y-3.5,3,'F');}
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      mnFit(doc,name,nameX,y,innerW-priceW-14-dotGap,FS_ITEM,8.5);
      y+=META_LH+1.5;
      if(it.origin){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(it.origin),x0,y);y+=META_LH;}
      if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(FS_DESC+0.5);doc.setTextColor(INK[0],INK[1],INK[2]);
        mnFit(doc,it.flavour,x0,y,innerW,FS_DESC+0.5,8);y+=META_LH;}
      y+=6;
    });
  }

    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_Menu.pdf');
  }
  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid — fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    for(var i=0;i<4;i++){drawCell(doc,cellX[i],cellY[i],cw,ch,info4[i],INK,BROWN,BERRY,MUTE);}
  }
  function mnHexRgb(hex){hex=String(hex||'').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var n=parseInt(hex,16);if(isNaN(n))return null;return [(n>>16)&255,(n>>8)&255,n&255];}
  /* draw text on ONE line, shrinking the font until it fits maxW (no wrapping). Font family/style/colour must be set by caller. */
  function mnFit(doc,text,x,yy,maxW,base,min,align){
    text=mnAsc(text);var s=base;doc.setFontSize(s);
    while(s>min&&doc.getTextWidth(text)>maxW){s-=0.5;doc.setFontSize(s);}
    doc.text(text,x,yy,align?{align:align}:undefined);
    return s;
  }
  /* five-axis cupping-strength radar \u2014 centre=no data, ring1=Light, ring2=Medium, ring3=Strong (outer) */
  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a), cy-r*Math.cos(a)];}
    function segsOf(pts){var s=[];for(var i=1;i<pts.length;i++)s.push([pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]]);return s;}
    /* grid rings: Light / Medium / Strong */
    doc.setLineWidth(0.5);doc.setDrawColor(30,26,25);
    [1,2,3].forEach(function(lvl){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,R*lvl/3));doc.lines(segsOf(pts),pts[0][0],pts[0][1],[1,1],'S',true);});
    /* spokes */
    doc.setDrawColor(30,26,25);
    for(var i=0;i<n;i++){var sp=pt(i,R);doc.line(cx,cy,sp[0],sp[1]);}
    /* data polygon (0 = centre when a bean has no reading on that axis) */
    var dpts=scores.map(function(o,i){var v=(o.n==null?0:o.n);return pt(i,R*(v/3));});
    var dseg=segsOf(dpts);
    var TINT=[Math.round(255-(255-BERRY[0])*0.20),Math.round(255-(255-BERRY[1])*0.20),Math.round(255-(255-BERRY[2])*0.20)];
    doc.setFillColor(TINT[0],TINT[1],TINT[2]);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'F',true);
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1.1);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'S',true);
    doc.setFillColor(BERRY[0],BERRY[1],BERRY[2]);
    dpts.forEach(function(p){doc.circle(p[0],p[1],1,'F');});
    /* axis labels, anchored just outside each vertex */
    doc.setFont('helvetica','bold');doc.setFontSize(5.6);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    scores.forEach(function(o,i){
      var lp=pt(i,R+7);
      var align=(lp[0]<cx-2)?'right':(lp[0]>cx+2?'left':'center');
      doc.text(o.label,lp[0],lp[1]+2,{align:align});
    });
  }
  function drawCell(doc,x,y,w,h,info,INK,BROWN,BERRY,MUTE){
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    var px=x+15, pw=w-30;
    if(!info||!info.name){
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('— empty —',x+w/2,y+h/2,{align:'center'});
      return;
    }
    /* ---- coloured banner header (name highlighted in its assigned colour) ---- */
    var band=mnHexRgb(info.color)||BROWN;
    var bandH=38;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE — small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR — primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  ·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE — primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength — radar chart (secondary, muted) — inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  var BL_SEP='\u0001'; /* invisible separator encoding "name<sep>process" in a blend option value */
  function blendPartVal(name,process){return String(name||'').trim()+BL_SEP+String(process||'').trim();}
  function blendBeanOptions(selName,selProc){
    var o='<option value="">— Single Origin —</option>';
    var selVal=blendPartVal(selName,selProc);
    var matched=false;
    (BEANS||[]).slice().sort(function(a,b){
      var n=(a.name||'').localeCompare(b.name||'');return n!==0?n:(a.process||'').localeCompare(b.process||'');
    }).forEach(function(b){
      var nm=(b.name||'').trim();if(!nm)return;
      var proc=(b.process||'').trim();
      var val=blendPartVal(nm,proc);
      var sel=(val===selVal)?' selected':'';
      if(sel)matched=true;
      o+='<option value="'+esc(val)+'"'+sel+'>'+esc(nm)+(proc?' \u00b7 '+esc(proc):'')+'</option>';
    });
    /* keep an unknown saved bean visible even if it's no longer in BEANS */
    if(selName&&!matched){var v=blendPartVal(selName,selProc);o+='<option value="'+esc(v)+'" selected>'+esc(selName)+(selProc?' \u00b7 '+esc(selProc):'')+'</option>';}
    return o;
  }
  function blendTotal(bl){return bl.parts.reduce(function(s,p){var v=parseFloat(p.pct);return s+(isNaN(v)?0:v);},0);}
  function blendCostPerKg(bl){
    var parts=(bl&&bl.parts)||[],sum=0,any=false;
    parts.forEach(function(p){
      var nm=(p.bean||'').trim();if(!nm)return;
      var pct=parseFloat(p.pct);if(isNaN(pct))return;
      var b=beanByNameProcess(nm,p.process||'');
      if(!b||b.cost_per_kg==null||b.cost_per_kg==='')return;
      var c=parseFloat(b.cost_per_kg);if(isNaN(c))return;
      sum+=c*(pct/100);any=true;
    });
    return any?sum:null;
  }
  function blendCostHTML(bl){var ck=blendCostPerKg(bl);return 'Cost/KG '+(ck==null?'<b>&mdash;</b>':'<b>$'+ck.toFixed(2)+'</b>');}

  /* ---- list + filters ---- */
  function ordFilterPass(o){
    if(ordFilters.status!=='all' && (o.status||'New')!==ordFilters.status)return false;
    if(ordFilters.channel!=='all' && (o.channel||'manual')!==ordFilters.channel)return false;

  /* ---- Orders 2.0: role tabs ---- */

  function ordTabCount(t){
    if(t==='all')return ORDERS.length;
    var n=0;
    ORDERS.forEach(function(o){
      var s=o.status||'New';
      if(t==='accept'&&s==='New')n++;
      else if((t==='roast'||t==='pack')&&(s==='Confirmed'||s==='Roasting'))n++;
      else if(t==='ship'&&s==='Ready')n++;
      else if(t==='pay'&&s!=='Cancelled'&&(o.payment_status==='pending_payment'||o.payment_status==='overdue'))n++;
      else if(t==='history'&&(s==='Dispatched'||s==='Cancelled'))n++;
    });

  /* accept-tab card: summary + Accept / Decline */

  /* Accept: payment link -> Confirmed -> confirmation email (with pay button) */
  async function ordAccept(id,btn){
    var o=ORDERS.filter(function(x){return x.id===id;})[0];if(!o)return;
    btn.disabled=true;btn.textContent='Accepting\u2026';
    try{
      if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
        try{
          var lk=await callSquareFn({action:'payment_link',order_id:id});
          if(lk&&lk.url)o.payment_link=lk.url;
        }catch(e){console.error('[Ratio] payment link:',e&&e.message||e);}
      }
      o.status='Confirmed';
      var r=await sb.from('orders').update({status:'Confirmed'}).eq('id',id);
      if(r&&r.error)throw new Error(r.error.message);
      try{await checkOrderStock(id,true);}catch(e){}

  /* \u70d8\u8c46 tab: read-only demand roll-up across accepted orders \u2014 never touches status */
  function ordRoastView(list){
    var agg={},order=[];
    list.forEach(function(o){
      (Array.isArray(o.items)?o.items:[]).forEach(function(it){
        var name=String(it.name||'').trim();if(!name)return;
        var key=name.toLowerCase();
        var g=(Number(it.grams)||0)*(Number(it.qty)||1);
        if(!agg[key]){agg[key]={name:name,g:0,lines:0};order.push(key);}
        agg[key].g+=g;agg[key].lines++;
      });
    });
    if(!order.length)return '<div class="sempty">Nothing to roast.</div>';
    order.sort(function(a,b){return agg[b].g-agg[a].g;});
    var totR=0,totG=0;
    var h='<div class="ord-card"><div class="ord-head"><div><div class="ord-no">Roast demand</div><div class="ord-sub">Accepted, not yet packed \u00b7 read-only \u00b7 green = roasted \u00d71.15</div></div></div>';
    order.forEach(function(k){
      var a=agg[k];var green=Math.ceil(a.g*ORDER_GREEN_FACTOR);
      totR+=a.g;totG+=green;
      h+='<div class="ord-line"><span class="ol-l">'+esc(a.name)+'</span><span>Roasted <b>'+a.g+'g</b> \u00b7 Green <b>'+green+'g</b>'+(a.lines>1?' \u00b7 '+a.lines+' lines':'')+'</span></div>';
    });
    h+='<div class="ord-line"><span class="ol-l"><b>Total</b></span><span><b>'+totR+'g</b> \u00b7 Green <b>'+totG+'g</b></span></div>';
    h+='</div>';
    return h;
  }

  /* ---- Phase 3: dispatch modal (tracking no + dispatch email) ---- */
  function ordCloseDispatch(){var m=document.getElementById('ord-dispatch');if(m)m.remove();}
  function ordDispatchAsk(id){
    var o=ORDERS.filter(function(x){return x.id===id;})[0];if(!o)return;
    ordCloseDispatch();
    var no=o.order_no!=null?('#'+String(o.order_no).padStart(4,'0')):'';
    var wrap=document.createElement('div');
    wrap.id='ord-dispatch';wrap.className='ord-modal';
    wrap.innerHTML='<div class="ord-modal-card">'
      +'<div class="ord-modal-t">Dispatch order '+esc(no)+'</div>'
      +(o.payment_status!=='paid'?'<div class="ord-modal-msg err">\u26a0 This order is unpaid</div>':'')
      +'<label class="ord-modal-l">Tracking number (optional)</label>'
      +'<input class="ord-modal-in" id="ord-track" placeholder="e.g. AusPost tracking" value="'+esc(o.tracking_no||'')+'">'
      +'<div class="ord-modal-msg" id="ord-dmsg"></div>'
      +'<button class="gbtn" id="ord-d-send">Dispatch &amp; send email</button>'
      +'<button class="gbtn ghost" id="ord-d-silent">Dispatch without email</button>'
      +'<button class="gbtn ghost" id="ord-d-cancel">Cancel</button>'
      +'</div>';
    document.body.appendChild(wrap);
    wrap.addEventListener('click',function(e){if(e.target===wrap){ordCloseDispatch();renderOrders();}});
    document.getElementById('ord-d-cancel').addEventListener('click',function(){ordCloseDispatch();renderOrders();});
    async function doDispatch(sendMail){
      var track=(document.getElementById('ord-track').value||'').trim();
      var msg=document.getElementById('ord-dmsg');
      var b1=document.getElementById('ord-d-send'),b2=document.getElementById('ord-d-silent');
      b1.disabled=true;b2.disabled=true;msg.textContent=sendMail?'Dispatching \u2014 sending email\u2026':'Dispatching\u2026';msg.className='ord-modal-msg';
      var patch={status:'Dispatched',dispatched_at:new Date().toISOString(),tracking_no:track||null};
      try{var r=await sb.from('orders').update(patch).eq('id',id);if(r&&r.error)throw new Error(r.error.message);}
      catch(e){msg.textContent='Save failed: '+(e&&e.message||e);msg.className='ord-modal-msg err';b1.disabled=false;b2.disabled=false;return;}
      o.status='Dispatched';o.dispatched_at=patch.dispatched_at;o.tracking_no=patch.tracking_no;
      if(sendMail){
        try{
          var cards={};try{cards=await ordUploadCards(o);}catch(e2){}
          await callEmailFn({action:'dispatch_notice',order_id:id,cards:cards});
          o.dispatch_email_at=new Date().toISOString();
        }catch(e){
          msg.textContent='Dispatched, but email failed: '+(e&&e.message||e)+' \u2014 use "Send dispatch email" on the card to retry.';
          msg.className='ord-modal-msg err';
          b1.style.display='none';b2.style.display='none';
          var cb=document.getElementById('ord-d-cancel');if(cb)cb.textContent='Close';
          return;
        }
      }
      ordCloseDispatch();renderOrders();
    }
    document.getElementById('ord-d-send').addEventListener('click',function(){doDispatch(true);});
    document.getElementById('ord-d-silent').addEventListener('click',function(){doDispatch(false);});
  }

  /* ---- stock check ---- */
  function ordMatchBean(name,process){
    return beanByNameProcess(name,process||'');
  }
  function ordMatchBlend(name){
    var defs=loadBlendDefs();var nk=String(name||'').trim().toLowerCase();
    for(var i=0;i<defs.length;i++){if((defs[i].name||'').trim().toLowerCase()===nk)return defs[i];}
    return null;
  }
  /* returns map bean-key -> {name,process,greenKg} of green needed for an order */
  function ordGreenNeeds(o){
    var need={};
    (Array.isArray(o.items)?o.items:[]).forEach(function(it){
      var roastedKg=((Number(it.grams)||0)*(Number(it.qty)||1))/1000;
      if(!roastedKg)return;
      var greenKg=roastedKg/ORD_LOSS;
      var blend=ordMatchBlend(it.name);
      if(blend){
        var total=blendTotal(blend)||0;
        (blend.parts||[]).forEach(function(p){
          var pct=parseFloat(p.pct);if(isNaN(pct)||pct<=0||!p.bean)return;
          var share=total>0?(pct/total):0;
          var key=(p.bean||'').toLowerCase()+'\u0001'+(p.process||'').toLowerCase();
          if(!need[key])need[key]={name:p.bean,process:p.process||'',greenKg:0};
          need[key].greenKg+=greenKg*share;
        });
      }else{
        var key2=(it.name||'').toLowerCase()+'\u0001'+((it.process||'')+'').toLowerCase();
        if(!need[key2])need[key2]={name:it.name,process:it.process||'',greenKg:0};
        need[key2].greenKg+=greenKg;
      }
    });
    return need;
  }
  async function checkOrderStock(id,silent){
    var o=ORDERS.filter(function(x){return x.id===id;})[0];if(!o)return;
    if(!BEANS||!BEANS.length){try{await ensureBeansForInvoice();}catch(e){}}
    var needs=ordGreenNeeds(o);
    var rows=[],anyShort=false,unmatched=[];
    Object.keys(needs).forEach(function(k){
      var n=needs[k];
      var bean=ordMatchBean(n.name,n.process);
      var have=bean?(Number(bean.quantity)||0):0;
      if(!bean)unmatched.push(n.name);
      var short=n.greenKg>have+0.0001;
      if(short)anyShort=true;
      rows.push({name:n.name,process:n.process,need:n.greenKg,have:have,short:short});
    });
    rows.sort(function(a,b){return (b.short?1:0)-(a.short?1:0);});
    var warn=unmatched.length?('Not found in green stock: '+unmatched.join(', ')):'';
    ordStockCache[id]={rows:rows,warn:warn};
    if(anyShort && o.transfer_state!=='requested' && o.transfer_state!=='confirmed'){
      o.transfer_state='requested';
      try{await sb.from('orders').update({transfer_state:'requested'}).eq('id',id);}catch(e){}
    }
    if(!silent){ordExpanded[id]=true;}
    renderOrders();
  }

  /* dropdown options: every bean + blend name (typos impossible; free text was breaking dispatch-email brew matching) */
  function ordBeanSelectOptions(sel){
    var names=[],seen={};
    (BEANS||[]).forEach(function(b){var nm=(b.name||'').trim();if(nm&&!seen[nm]){seen[nm]=1;names.push(nm);}});
    blendNames().forEach(function(nm){if(nm&&!seen[nm]){seen[nm]=1;names.push(nm);}});
    var cur=(sel||'').trim();
    if(cur&&!seen[cur])names.push(cur); /* keep an unknown value from an older draft visible */
    var h='<option value="">Select bean / blend…</option>';
    names.forEach(function(nm){h+='<option value="'+esc(nm)+'"'+(nm===cur?' selected':'')+'>'+esc(nm)+'</option>';});
    return h;
  }
  function ordReadForm(){

  function ordBindForm(box){
    box.querySelector('#of-additem').addEventListener('click',function(){ordReadForm();ordDraft.items.push(ordBlankItem());renderOrderForm();});
    box.querySelectorAll('[data-irm]').forEach(function(b){
      b.addEventListener('click',function(){ordReadForm();var i=+b.dataset.irm;if(ordDraft.items.length>1)ordDraft.items.splice(i,1);renderOrderForm();});
    });

  function ordItemPriced(it){
    return {name:(it.name||'').trim(),grams:Number(it.grams)||null,qty:Number(it.qty)||1,price:Number(it.price)||0,
      process:(function(){var b=ordMatchBean(it.name,'');return b?(b.process||''):'';})()};
  }
  async function saveOrder(){
    ordReadForm();var d=ordDraft;
    var items=d.items.map(ordItemPriced).filter(function(it){return it.name;});
    if(!items.length){alert('Add at least one item.');return;}
    var total=items.reduce(function(s,it){return s+it.price*(it.qty||1);},0);
    /* customer */
    var custId=null;
    if(d.cust.name){
      try{
        var addr={line1:d.cust.line1,suburb:d.cust.suburb,postcode:d.cust.postcode};
        var cr=await sb.from('customers').insert({name:d.cust.name,type:d.cust.type,phone:d.cust.phone||null,email:d.cust.email||null,address:addr}).select().single();
        if(cr&&cr.data){custId=cr.data.id;ORD_CUST.unshift(cr.data);}
      }catch(e){}
    }
    /* order_no = max+1 */
    var maxNo=0;ORDERS.forEach(function(o){if(o.order_no!=null&&o.order_no>maxNo)maxNo=o.order_no;});
    var row={order_no:maxNo+1,channel:d.channel,status:'New',customer_id:custId,items:items,total:total,
      currency:d.cust.type==='overseas'?'AUD':'AUD',payment_method:d.payment_method||null,
      payment_status:'pending_payment',notes:d.notes||null};
    try{
      var r=await sb.from('orders').insert(row).select().single();
      if(r&&r.data){
        ORDERS.unshift(r.data);ordExpanded[r.data.id]=true;
        /* confirmation email is sent when the order is Accepted (\u63a5\u55ae tab), not on save */
      }
    }catch(e){alert('Save failed: '+(e&&e.message?e.message:e));return;}
    ordDraft=null;
    document.getElementById('order-title').textContent='Orders';
    renderOrders();
  }

  var blOpen={};
  function blendDupNames(){
    var d=loadBlendDefs(),cnt={},dups={};
    d.forEach(function(b){var k=String(b&&b.name||'').trim().toLowerCase();if(!k)return;cnt[k]=(cnt[k]||0)+1;if(cnt[k]>1)dups[k]=true;});

  function markBlendDups(el){
    var dups=blendDupNames();
    el.querySelectorAll('.bl-name').forEach(function(inp){

  function renderBlending(){
    var el=document.getElementById('blend-content');if(!el)return;
    var defs=loadBlendDefs();
    var trash='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';
    var cards=defs.map(function(bl,bi){
      var tot=blendTotal(bl),totCls=tot===100?'ok':(tot>100?'over':'');
      var rows=bl.parts.map(function(p,pi){
        return '<div class="bl-part">'
          +'<select class="bl-bean" data-bi="'+bi+'" data-pi="'+pi+'">'+blendBeanOptions(p.bean||'',p.process||'')+'</select>'
          +'<div class="bl-pct"><input type="number" inputmode="numeric" class="bl-pctin" data-bi="'+bi+'" data-pi="'+pi+'" value="'+esc((p.pct===0||p.pct)?String(p.pct):'')+'" placeholder="0" min="0" max="100" /><span>%</span></div>'
          +'</div>';
      }).join('');
      var open=!!blOpen[bi];
      var chev='<span class="rd-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>';
      return '<div class="bl-card">'
        +'<div class="bl-head"><button class="bl-toggle'+(open?' open':'')+'" data-bo="'+bi+'">'+chev+'</button><input class="bl-name" data-bi="'+bi+'" data-orig="'+esc(bl.name||'')+'" value="'+esc(bl.name||'')+'" placeholder="Blend name" />'
        +'<button class="bl-del" data-bi="'+bi+'" aria-label="delete blend">'+trash+'</button></div>'
        +(open?('<div class="bl-body">'
          +rows
          +'<label class="bl-notewrap"><span class="bl-notelab">Note:</span><input class="bl-note" data-bi="'+bi+'" value="'+esc(bl.note||'')+'" placeholder="Note" /></label>'
          +'<input class="bl-cmt" data-bi="'+bi+'" value="'+esc(bl.comment||'')+'" placeholder="Special comment \u00b7 e.g. V3.0 Competition Blend" />'
          +'<div class="bl-foot"><div class="bl-cost">'+blendCostHTML(bl)+'</div><div class="bl-tot '+totCls+'">Total <b>'+tot+'%</b>'+(tot===100?'':' \u00b7 should be 100%')+'</div></div>'
          +'</div>'):'')
        +'</div>';
    }).join('');
    el.innerHTML='<div class="gsec" style="padding:14px 18px 2px">Blends \u00b7 pick 3 single origins &amp; set %</div>'
      +'<div class="bl-list">'+cards+'</div>'
      +'<div class="bl-addwrap"><button class="gbtn ghost" id="bl-add">+ New blend</button>'
      +'<button class="gbtn" id="bl-save">Save recipe</button>'
      +'<div class="bl-saved" id="bl-saved">\u2713 Saved</div></div>';
    el.querySelectorAll('.bl-toggle[data-bo]').forEach(function(b){b.addEventListener('click',function(){var bi=+b.dataset.bo;blOpen[bi]=!blOpen[bi];renderBlending();});});
    el.querySelectorAll('.bl-name').forEach(function(inp){inp.addEventListener('input',function(){var d=loadBlendDefs();d[+inp.dataset.bi].name=inp.value;saveBlendDefs(d);markBlendDups(el);});});
    el.querySelectorAll('.bl-bean').forEach(function(s){s.addEventListener('change',function(){var d=loadBlendDefs();var parsed=String(s.value||'').split(BL_SEP);var pt=d[+s.dataset.bi].parts[+s.dataset.pi];pt.bean=parsed[0]||'';pt.process=parsed[1]||'';saveBlendDefs(d);var card=s.closest('.bl-card'),ce=card&&card.querySelector('.bl-cost');if(ce)ce.innerHTML=blendCostHTML(d[+s.dataset.bi]);});});
    el.querySelectorAll('.bl-note').forEach(function(inp){inp.addEventListener('input',function(){var d=loadBlendDefs();d[+inp.dataset.bi].note=inp.value;saveBlendDefs(d);});});
    el.querySelectorAll('.bl-cmt').forEach(function(inp){inp.addEventListener('input',function(){var d=loadBlendDefs();d[+inp.dataset.bi].comment=inp.value;saveBlendDefs(d);});});
    el.querySelectorAll('.bl-pctin').forEach(function(i){i.addEventListener('input',function(){var d=loadBlendDefs();d[+i.dataset.bi].parts[+i.dataset.pi].pct=i.value;saveBlendDefs(d);
      var card=i.closest('.bl-card'),t=card&&card.querySelector('.bl-tot');if(t){var tt=blendTotal(d[+i.dataset.bi]);t.className='bl-tot '+(tt===100?'ok':(tt>100?'over':''));t.innerHTML='Total <b>'+tt+'%</b>'+(tt===100?'':' \u00b7 should be 100%');}
      var ce=card&&card.querySelector('.bl-cost');if(ce)ce.innerHTML=blendCostHTML(d[+i.dataset.bi]);});});
    el.querySelectorAll('.bl-del').forEach(function(b){b.addEventListener('click',function(){var d=loadBlendDefs();d.splice(+b.dataset.bi,1);saveBlendDefs(d);renderBlending();});});
    var add=document.getElementById('bl-add');if(add)add.addEventListener('click',function(){var d=loadBlendDefs();d.push(blankBlend(''));blOpen[d.length-1]=true;saveBlendDefs(d);renderBlending();el.scrollTop=el.scrollHeight;});
    var save=document.getElementById('bl-save');if(save)save.addEventListener('click',async function(){
      var d=loadBlendDefs();
      el.querySelectorAll('.bl-name').forEach(function(inp){if(d[+inp.dataset.bi])d[+inp.dataset.bi].name=inp.value;});
      el.querySelectorAll('.bl-bean').forEach(function(s){if(d[+s.dataset.bi]&&d[+s.dataset.bi].parts[+s.dataset.pi]){var parsed=String(s.value||'').split(BL_SEP);var pt=d[+s.dataset.bi].parts[+s.dataset.pi];pt.bean=parsed[0]||'';pt.process=parsed[1]||'';}});
      el.querySelectorAll('.bl-pctin').forEach(function(i){if(d[+i.dataset.bi]&&d[+i.dataset.bi].parts[+i.dataset.pi])d[+i.dataset.bi].parts[+i.dataset.pi].pct=i.value;});
      el.querySelectorAll('.bl-note').forEach(function(inp){if(d[+inp.dataset.bi])d[+inp.dataset.bi].note=inp.value;});
      el.querySelectorAll('.bl-cmt').forEach(function(inp){if(d[+inp.dataset.bi])d[+inp.dataset.bi].comment=inp.value;});
      var sv=document.getElementById('bl-saved');
      var dups=markBlendDups(el);
      if(Object.keys(dups).length){
        if(sv){sv.classList.add('err','show');sv.textContent='\u26a0\ufe0f Blend names must be unique';clearTimeout(window._blSaveT);window._blSaveT=setTimeout(function(){sv.classList.remove('show');},2600);}
        return;
      }
      /* rename cascade: hname = the name history records (roasts/samples/product_sync) currently use.
         Detected from data, not DOM — survives re-renders and works across devices. */
      var renames=[];
      d.forEach(function(bl){
        var newName=(bl.name||'').trim(), oldName=(bl.hname||'').trim();
        if(!newName)return;
        if(!oldName){bl.hname=newName;return;} /* first naming — nothing to relink */
        if(oldName!==newName)renames.push({bl:bl,oldName:oldName,newName:newName});
      });
      saveBlendDefs(d);
      if(renames.length){
        if(sv){sv.classList.remove('err');sv.textContent='Saving\u2026 relinking roast history';sv.classList.add('show');}
        save.disabled=true;
        var relinkErr='';
        for(var ri=0;ri<renames.length;ri++){
          var rn=renames[ri];
          var e1=(await sb.from('roasts').update({bean_name:rn.newName}).eq('bean_name',rn.oldName)).error;
          var e2=(await sb.from('samples').update({sample_id:rn.newName}).eq('sample_id',rn.oldName)).error;
          var e3=(await sb.from('product_sync').update({bean_id:rn.newName}).eq('bean_id',rn.oldName)).error;
          if(e1||e2||e3){relinkErr=(e1||e2||e3).message;break;}
          (ROASTS||[]).forEach(function(r){if((r.bean_name||'')===rn.oldName)r.bean_name=rn.newName;});
          (SAMPLES||[]).forEach(function(s){if((s.sample_id||'')===rn.oldName)s.sample_id=rn.newName;});
          rn.bl.hname=rn.newName;
        }
        saveBlendDefs(d); /* persist updated hname */
        save.disabled=false;
        if(relinkErr){
          if(sv){sv.classList.add('err');sv.textContent='Saved, but relinking failed: '+relinkErr+' \u2014 please retry';clearTimeout(window._blSaveT);window._blSaveT=setTimeout(function(){sv.classList.remove('show');},3400);}
          return;
        }
        el.querySelectorAll('.bl-name').forEach(function(inp){inp.dataset.orig=inp.value;});
      }
      if(sv){sv.classList.remove('err');sv.textContent='\u2713 Saved';sv.classList.add('show');clearTimeout(window._blSaveT);window._blSaveT=setTimeout(function(){sv.classList.remove('show');},1800);}
    });
    markBlendDups(el);
  }

  const CONTACT_TYPES=['Supplier','Customer','Roaster','Service'];

  async function saveContact(){
    var msg=document.getElementById('ct-msg');var btn=document.getElementById('ct-save');
    var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
    var rec={type:g('ct-type'),name:g('ct-name'),company:g('ct-company')||null,address:g('ct-address')||null,email:g('ct-email')||null,phone:g('ct-phone')||null,notes:g('ct-notes')||null};
    if(!rec.name){msg.textContent='Name is required';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    if(contactEdit==='new'){
      var ins=await sb.from('contacts').insert(rec).select();
      if(ins.error){btn.disabled=false;msg.textContent='Save failed: '+ins.error.message;msg.className='gform-msg err';return;}
      if(ins.data&&ins.data[0])CONTACTS.push(ins.data[0]);
    }else{
      var up=await sb.from('contacts').update(rec).eq('id',contactEdit);
      if(up.error){btn.disabled=false;msg.textContent='Save failed: '+up.error.message;msg.className='gform-msg err';return;}
      var i=CONTACTS.findIndex(function(x){return String(x.id)===String(contactEdit);});if(i>-1)CONTACTS[i]=Object.assign({},CONTACTS[i],rec);
    }
    contactEdit=null;contactObj=null;contactDelConfirm=false;renderContacts();
  }
  async function deleteContact(){
    var up=await sb.from('contacts').delete().eq('id',contactEdit);
    if(up.error){var m=document.getElementById('ct-msg');if(m){m.textContent='Delete failed: '+up.error.message;m.className='gform-msg err';}contactDelConfirm=false;renderContactEdit();return;}
    CONTACTS=CONTACTS.filter(function(x){return String(x.id)!==String(contactEdit);});
    contactEdit=null;contactObj=null;contactDelConfirm=false;renderContacts();
  }

  /* ---- Green module: country → bean → detail drill-down ---- */
  let BEANS=[], ROASTS=[], greenView='home', greenCountry=null, greenBeanId=null, greenEdit=false, greenSoon='', greenDelConfirm=false, greenAddCountry=null, greenStocktake=false, stkDraft=null;
  const GFIELDS=[['name','Name','text'],['country','Country','text'],['region','Region','text'],['station','Station','text'],['process','Process','text'],['variety','Variety','text'],['harvest','Harvest','text'],['altitude','Altitude','text'],['quantity','Quantity (kg)','number'],['cost_per_kg','Cost per kg','number'],['low_stock_kg','Low stock alert (kg)','number'],['supplier','Supplier','text']];
  const gnum=n=>{const x=Number(n);return isNaN(x)?n:(x%1===0?x:Math.round(x*10)/10);};
  const gmoney=n=>'$'+Math.round(Number(n)||0).toLocaleString('en-US');
  const GREEN_LOW_KG=5; /* 預設低庫存警戒線 kg；beans.low_stock_kg 可逐豆覆蓋 */
  function beanLowTh(b){var t=Number(b.low_stock_kg);return (b.low_stock_kg!=null&&!isNaN(t))?t:GREEN_LOW_KG;}
  function beanIsLow(b){var t=beanLowTh(b);if(t<=0)return false;/* 設 0 = 這支不警示 */return (Number(b.quantity)||0)<=t;}

  async function loadBeans(view){
    const box=document.getElementById('green-content');
    box.innerHTML='<div class="sempty">Loading…</div>';
    const {data,error}=await sb.from('beans').select('*').order('name');
    if(error){box.innerHTML='<div class="sempty">Load failed: '+esc(error.message)+'</div>';return;}
    BEANS=data||[];
    await loadRoasts();
    greenView=view||'home';greenCountry=null;greenBeanId=null;greenEdit=false;
    if(greenView==='roast')loadRoastDemand(); /* 撈完自己會重畫 */
    renderGreen();
  }
  function totals(arr){let kg=0,val=0;arr.forEach(b=>{const q=Number(b.quantity)||0,c=Number(b.cost_per_kg)||0;kg+=q;val+=q*c;});return {kg,val};}
  function countryList(){const m={};BEANS.forEach(b=>{const c=b.country||'—';m[c]=(m[c]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}

  function greenBack(){
    if(greenView==='detail'){greenView='beans';greenBeanId=null;greenEdit=false;greenDelConfirm=false;greenStocktake=false;renderGreen();}
    else if(greenView==='beans'){greenView='countries';greenCountry=null;renderGreen();}
    else if(greenView==='roast'){closePage();}
    else if(greenView==='sample'){if(smpEdit){smpEdit=null;smpDelConfirm=false;renderSample();}else if(smpCuppingRoast||blendCupping){smpCuppingRoast=null;blendCupping=null;smpPages=[blankSmp()];smpIdx=0;roastedTitle='Pending';beansView='production';openPage('beans');renderRoasted();}else{closePage();}}
    else if(greenView==='history'){if(smpEdit){smpEdit=null;smpDelConfirm=false;renderHistory();}else{closePage();}}
    else if(greenView==='add'){greenView=greenAddCountry?'beans':'countries';if(greenAddCountry)greenCountry=greenAddCountry;greenAddCountry=null;renderGreen();}
    else if(greenView==='stocktake'){stkDraft=null;greenView='countries';renderGreen();}
    else if(greenView==='buy'){if(buyNew||buyRecv){buyNew=null;buyRecv=null;renderGreen();}else{closePage();}}
    else if(greenView==='countries'||greenView==='soon'){closePage();}
    else{closePage();}
  }

  function renderGreen(){

    const title=document.getElementById('green-title');

      title.textContent='Inventory';
      count.textContent=BEANS.length+' beans';

      const lows=BEANS.filter(beanIsLow);
      const lowWarn=lows.length?'<div class="green-lowwarn">⚠ Low stock: '+lows.map(function(b){return esc(b.name)+' ('+gnum(Number(b.quantity)||0)+' kg)';}).join(', ')+'</div>':'';
      const grid='<div class="gcountries">'+countryList().map(function(e){var c=e[0],n=e[1];var ct=totals(BEANS.filter(function(b){return (b.country||'—')===c;}));return '<div class="gcard" data-c="'+esc(c)+'"><div class="gc-name">'+esc(c)+'</div><div class="gc-sub"><span class="gc-n">'+n+' beans</span><br>'+gnum(ct.kg)+' kg · '+gmoney(ct.val)+'</div></div>';}).join('')+'</div>';
      box.innerHTML=summary+lowWarn+'<div class="gsec">Choose origin</div>'+grid
        +'<button class="gbtn" id="green-add" style="margin-top:16px">+ Add Bean</button>'
        +'<button class="gbtn ghost" id="green-stkall" style="margin-top:8px">Stocktake all beans</button>';
      box.querySelectorAll('.gcard').forEach(function(el){el.addEventListener('click',function(){greenCountry=el.dataset.c;greenView='beans';renderGreen();box.scrollTop=0;});});
      var gAdd=document.getElementById('green-add');if(gAdd)gAdd.addEventListener('click',function(){greenAddCountry=null;greenView='add';renderGreen();box.scrollTop=0;});
      var gStk=document.getElementById('green-stkall');if(gStk)gStk.addEventListener('click',function(){
        stkDraft={};BEANS.forEach(function(b){stkDraft[b.id]=(b.quantity!=null?String(gnum(b.quantity)):'');});
        greenView='stocktake';renderGreen();box.scrollTop=0;
      });
    }
    else if(greenView==='beans'){
      const items=BEANS.filter(function(b){return (b.country||'—')===greenCountry;});
      const t=totals(items);
      title.textContent=greenCountry;
      count.textContent=items.length+' beans';
      const head='<div class="gsec">'+esc(greenCountry)+' · '+gnum(t.kg)+' kg · '+gmoney(t.val)+'</div>';
      const list='<div class="gbeans">'+items.map(function(b){var pc=(b.process||'').trim();var vr=(b.variety||'').trim();var nm=esc(b.name)+(pc?' <span class="gb-proc">'+esc(pc)+'</span>':'');var attrs=vr?'<div class="gb-attrs"><div class="gb-attr"><span class="gb-lab">Variety</span>'+esc(vr)+'</div></div>':'';return '<div class="gbean" data-id="'+esc(b.id)+'"><div class="gb-main"><div class="gb-name">'+nm+'</div>'+attrs+'</div><div class="gb-right"><span class="gb-stock'+(beanIsLow(b)?' low':'')+'">'+gnum(Number(b.quantity)||0)+' kg</span><span class="gb-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div></div>';}).join('')+'</div>';
      box.innerHTML=head+list+'<button class="gbtn" id="green-add" style="margin-top:16px">+ Add Bean</button>';
      box.querySelectorAll('.gbean').forEach(function(el){el.addEventListener('click',function(){greenBeanId=el.dataset.id;greenView='detail';greenEdit=false;greenStocktake=false;renderGreen();box.scrollTop=0;});});
      var gAdd2=document.getElementById('green-add');if(gAdd2)gAdd2.addEventListener('click',function(){greenAddCountry=greenCountry;greenView='add';renderGreen();box.scrollTop=0;});
    }
    else if(greenView==='detail'){
      const b=BEANS.find(function(x){return String(x.id)===String(greenBeanId);});
      if(!b){greenBack();return;}
      if(!greenEdit){
        title.textContent=b.name;count.textContent=b.country||'';
        const val=(Number(b.quantity)||0)*(Number(b.cost_per_kg)||0);
        const rows=[['Country',b.country],['Region',b.region],['Station',b.station],['Process',b.process],['Variety',b.variety],['Harvest',b.harvest],['Altitude',b.altitude?b.altitude+' m':''],['Quantity',b.quantity!=null?gnum(b.quantity)+' kg':'',true],['Cost',b.cost_per_kg!=null?'$'+b.cost_per_kg+' /kg':'',true],['Value',val?gmoney(val):'',true],['Low stock alert',b.low_stock_kg!=null?gnum(b.low_stock_kg)+' kg':'',true],['Supplier',b.supplier]].filter(function(r){return r[1];});
        const list='<div class="gd-list">'+rows.map(function(r){return '<div class="grow"><span class="gk">'+r[0]+'</span><span class="gv'+(r[2]?' mono':'')+'">'+esc(r[1])+'</span></div>';}).join('')+'</div>';
        const lowNote=beanIsLow(b)?'<div class="green-lowwarn" style="margin:12px 0 0">⚠ Below the low stock line ('+gnum(beanLowTh(b))+' kg) — time to reorder</div>':'';
        const stForm=greenStocktake
          ?'<div class="gform" style="margin-top:12px">'
           +'<label class="gfield"><span class="gl">Counted stock (kg) — book says '+gnum(Number(b.quantity)||0)+' kg</span><input id="gst-kg" type="text" inputmode="decimal" value="" /></label>'
           +'<label class="gfield"><span class="gl">Note (optional)</span><input id="gst-note" type="text" value="" /></label>'
           +'<div class="gform-msg" id="gst-msg"></div>'
           +'<div class="gform-actions"><button class="gbtn ghost" id="gst-cancel">Cancel</button><button class="gbtn" id="gst-save">Save count</button></div></div>'
          :'';
        box.innerHTML='<div class="gdetail"><div class="gform-actions" style="margin-top:14px"><button class="gbtn ghost" id="green-edit">Edit</button><button class="gbtn ghost" id="green-stocktake">Stocktake</button></div>'+lowNote+stForm+list+'<div class="gmoves" id="gmoves"></div></div>';
        document.getElementById('green-edit').addEventListener('click',function(){greenEdit=true;greenDelConfirm=false;greenStocktake=false;renderGreen();box.scrollTop=0;});
        document.getElementById('green-stocktake').addEventListener('click',function(){greenStocktake=!greenStocktake;renderGreen();});
        var gstC=document.getElementById('gst-cancel');if(gstC)gstC.addEventListener('click',function(){greenStocktake=false;renderGreen();});
        var gstS=document.getElementById('gst-save');if(gstS)gstS.addEventListener('click',saveStocktake);
        loadBeanMoves(b.id);
      }else{
        const form='<div class="gform">'+GFIELDS.map(function(f){
          var v=b[f[0]]==null?'':String(b[f[0]]);
          var im=f[2]==='number'?' inputmode="decimal"':'';
          return '<label class="gfield"><span class="gl">'+f[1]+'</span><input data-f="'+f[0]+'" type="text"'+im+' value="'+esc(v)+'" /></label>';
        }).join('')
        +'<div class="gform-msg" id="green-msg"></div>'
        +'<div class="gform-actions"><button class="gbtn ghost" id="green-cancel">Cancel</button><button class="gbtn savegate" id="green-save">Save</button></div>'
        +'<div class="gdel">'+(greenDelConfirm
            ?'<div class="gdel-msg">Delete "'+esc(b.name)+'"? This cannot be undone.</div><div class="gform-actions"><button class="gbtn ghost" id="gdel-cancel">Cancel</button><button class="gbtn danger" id="gdel-yes">Delete</button></div>'
            :'<button class="gbtn dghost" id="gdel">Delete this bean</button>')
        +'</div></div>';
        title.textContent=b.name;count.textContent=b.country||'';
        box.innerHTML='<div class="gdetail" style="padding-top:8px">'+form+'</div>';
        document.getElementById('green-cancel').addEventListener('click',function(){greenEdit=false;greenDelConfirm=false;renderGreen();box.scrollTop=0;});
        document.getElementById('green-save').addEventListener('click',saveBean);
        var gd=document.getElementById('gdel');if(gd)gd.addEventListener('click',function(){greenDelConfirm=true;renderGreen();});
        var gdc=document.getElementById('gdel-cancel');if(gdc)gdc.addEventListener('click',function(){greenDelConfirm=false;renderGreen();});
        var gdy=document.getElementById('gdel-yes');if(gdy)gdy.addEventListener('click',deleteBean);
      }
    }
    else if(greenView==='stocktake'){
      /* T8 盤點快錄：一頁盤完全部生豆，只存有改動的，差異記進流水帳 */
      title.textContent='Stocktake';count.textContent=BEANS.length+' beans';
      var sgroups={},sorder=[];
      BEANS.slice().sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));}).forEach(function(b){var c=b.country||'—';if(!sgroups[c]){sgroups[c]=[];sorder.push(c);}sgroups[c].push(b);});
      sorder.sort();
      var sh='<div class="bat-hint">Type the counted kg for each bean. Only changed numbers are saved — every difference is logged to stock history.</div>';
      sorder.forEach(function(c){
        sh+='<div class="gsec">'+esc(c)+'</div>';
        sgroups[c].forEach(function(b){
          var v=(stkDraft&&stkDraft[b.id]!=null)?stkDraft[b.id]:(b.quantity!=null?String(gnum(b.quantity)):'');
          sh+='<div class="stk-row"><div class="stk-l"><div class="stk-n">'+esc(b.name)+(b.process?' <span class="gb-proc">'+esc(b.process)+'</span>':'')+'</div><div class="stk-b">book '+gnum(b.quantity!=null?b.quantity:0)+' kg</div></div><input class="stk-in" data-stk="'+esc(b.id)+'" type="text" inputmode="decimal" value="'+esc(v)+'" /><span class="ro-unit">kg</span></div>';
        });
      });
      sh+='<div class="gform-msg" id="stk-msg" style="padding:8px 16px 0"></div><div style="padding:8px 16px 20px"><button class="gbtn" id="stk-save">Save stocktake</button></div>';
      box.innerHTML=sh;
      box.querySelectorAll('.stk-in').forEach(function(el){el.addEventListener('input',function(){stkDraft[el.dataset.stk]=el.value;});});
      var stkS=document.getElementById('stk-save');if(stkS)stkS.addEventListener('click',saveStocktakeAll);
    }
    else if(greenView==='add'){
      title.textContent='Add Bean';count.textContent=greenAddCountry||'';
      const form='<div class="gform">'+GFIELDS.map(function(f){
        var v=(f[0]==='country'&&greenAddCountry)?greenAddCountry:'';
        var im=f[2]==='number'?' inputmode="decimal"':'';
        return '<label class="gfield"><span class="gl">'+f[1]+'</span><input data-f="'+f[0]+'" type="text"'+im+' value="'+esc(v)+'" /></label>';
      }).join('')
      +'<div class="gform-msg" id="green-msg"></div>'
      +'<div class="gform-actions"><button class="gbtn ghost" id="green-cancel">Cancel</button><button class="gbtn savegate" id="green-save">Save</button></div>'
      +'</div>';
      box.innerHTML='<div class="gdetail" style="padding-top:8px">'+form+'</div>';
      document.getElementById('green-cancel').addEventListener('click',function(){greenView=greenAddCountry?'beans':'countries';if(greenAddCountry)greenCountry=greenAddCountry;greenAddCountry=null;renderGreen();box.scrollTop=0;});
      document.getElementById('green-save').addEventListener('click',saveNewBean);
    }
  }
  async function saveNewBean(){
    const msg=document.getElementById('green-msg');
    const btn=document.getElementById('green-save');
    const rec={};
    document.querySelectorAll('#green-content [data-f]').forEach(function(inp){
      const f=inp.dataset.f; let v=inp.value.trim();
      if(f==='quantity'||f==='cost_per_kg'||f==='low_stock_kg'){rec[f]=(v===''||isNaN(parseFloat(v)))?null:parseFloat(v);}
      else{rec[f]=v===''?null:v;}
    });
    if(!rec.name){msg.textContent='Name cannot be empty';msg.className='gform-msg err';return;}
    if(beanDupExists(rec.name,rec.process,null)){msg.textContent='"'+rec.name+'" + "'+(rec.process||'—')+'" already exists — use a different process name for the same farm';msg.className='gform-msg err';return;}
    rec.id='bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {data,error}=await sb.from('beans').insert(rec).select();
    btn.disabled=false;
    if(error){msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    const nb=(data&&data[0])?data[0]:rec;
    BEANS.push(nb);
    greenAddCountry=null;
    greenBeanId=nb.id;greenCountry=nb.country||'—';greenView=nb.id?'detail':'beans';greenEdit=false;
    renderGreen();
  }
  async function saveBean(){
    const msg=document.getElementById('green-msg');
    const btn=document.getElementById('green-save');
    const upd={};
    document.querySelectorAll('#green-content [data-f]').forEach(function(inp){
      const f=inp.dataset.f; let v=inp.value.trim();
      if(f==='quantity'||f==='cost_per_kg'||f==='low_stock_kg'){upd[f]=(v===''||isNaN(parseFloat(v)))?null:parseFloat(v);}
      else{upd[f]=v===''?null:v;}
    });
    if(!upd.name){msg.textContent='Name cannot be empty';msg.className='gform-msg err';return;}
    if(beanDupExists(upd.name,upd.process,greenBeanId)){msg.textContent='"'+upd.name+'" + "'+(upd.process||'—')+'" already exists — use a different process name for the same farm';msg.className='gform-msg err';return;}
    var _bi=BEANS.findIndex(function(x){return String(x.id)===String(greenBeanId);});
    var oldName=(_bi>-1?(BEANS[_bi].name||''):'').trim();
    var newName=(upd.name||'').trim();
    var renamed=oldName&&newName&&oldName!==newName;
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {error}=await sb.from('beans').update(upd).eq('id',greenBeanId);
    if(error){btn.disabled=false;msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    /* rename cascade: keep cupping (samples) + roasts in sync with Green info */
    if(renamed){
      msg.textContent='Saving\u2026 relinking cupping records';
      /* relink by bean_id first (exact lot), then legacy rows that have no bean_id by old name */
      var e1=(await sb.from('samples').update({sample_id:newName}).eq('bean_id',greenBeanId)).error;
      var e1b=(await sb.from('samples').update({sample_id:newName}).is('bean_id',null).eq('sample_id',oldName)).error;
      var e2=(await sb.from('roasts').update({bean_name:newName}).eq('bean_id',greenBeanId)).error;
      var e2b=(await sb.from('roasts').update({bean_name:newName}).is('bean_id',null).eq('bean_name',oldName)).error;
      var eAny=e1||e1b||e2||e2b;
      if(eAny){btn.disabled=false;msg.textContent='Renamed the bean, but relinking failed: '+(eAny.message)+' \u2014 please retry';msg.className='gform-msg err';return;}
      /* sync in-memory arrays so the UI shows the new name immediately */
      var _sm=function(s){if(String(s.bean_id||'')===String(greenBeanId)||(!s.bean_id&&(s.sample_id||'')===oldName))s.sample_id=newName;};
      (SAMPLES||[]).forEach(_sm);
      (RETAIL_BEANS||[]).forEach(_sm);
      (RTL_ROWS||[]).forEach(_sm);
      (ROASTS||[]).forEach(function(r){if(String(r.bean_id||'')===String(greenBeanId)||(!r.bean_id&&(r.bean_name||'')===oldName))r.bean_name=newName;});
    }
    btn.disabled=false;
    if(_bi>-1)BEANS[_bi]=Object.assign({},BEANS[_bi],upd);
    greenEdit=false;renderGreen();
  }
  async function deleteBean(){
    const id=greenBeanId;
    const {error}=await sb.from('beans').delete().eq('id',id);
    if(error){var m=document.getElementById('green-msg');if(m){m.textContent='Delete failed: '+error.message;m.className='gform-msg err';}greenDelConfirm=false;renderGreen();return;}
    BEANS=BEANS.filter(function(x){return String(x.id)!==String(id);});
    greenEdit=false;greenDelConfirm=false;greenBeanId=null;
    var stillHas=BEANS.some(function(x){return (x.country||'—')===greenCountry;});
    greenView=stillHas?'beans':'countries';
    renderGreen();
  }
  async function loadRoasts(){
    const {data,error}=await sb.from('roasts').select('*').order('roast_date',{ascending:false}).order('created_at',{ascending:false});
    if(!error)ROASTS=data||[];
  }
  /* ---- G1 生豆帳：盤點 + 流水帳 ---- */
  async function saveStocktake(){
    const b=BEANS.find(function(x){return String(x.id)===String(greenBeanId);});
    const msg=document.getElementById('gst-msg');
    const btn=document.getElementById('gst-save');
    if(!b||!msg||!btn)return;
    var v=parseFloat((document.getElementById('gst-kg').value||'').trim());
    if(isNaN(v)||v<0){msg.textContent='Enter the counted kg';msg.className='gform-msg err';return;}
    var note=(document.getElementById('gst-note').value||'').trim();
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {error}=await sb.from('beans').update({quantity:v}).eq('id',b.id);
    if(error){btn.disabled=false;msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    try{await sb.from('stock_moves').insert({bean_id:b.id,kind:'stocktake',delta_kg:delta,after_kg:v,note:note||null});}catch(e){}
    b.quantity=v;
    greenStocktake=false;
    renderGreen();
  }
  /* T8 盤點快錄存檔：只動有差異的豆，逐筆更新 + 記流水帳 */
  async function saveStocktakeAll(){
    var msg=document.getElementById('stk-msg'),btn=document.getElementById('stk-save');
    if(!btn||!msg)return;
    var changes=[];
    BEANS.forEach(function(b){
      var raw=stkDraft?stkDraft[b.id]:null;
      if(raw==null)return;
      var s=String(raw).trim();
      if(s==='')return;
      var v=parseFloat(s);
      if(isNaN(v)||v<0)return;
      var cur=Number(b.quantity)||0;
      var delta=Math.round((v-cur)*1000)/1000;
      if(Math.abs(delta)<0.0005)return;
      changes.push({b:b,v:v,delta:delta});
    });
    if(!changes.length){msg.textContent='No changes to save';msg.className='gform-msg';return;}
    btn.disabled=true;msg.textContent='Saving '+changes.length+' adjustment'+(changes.length>1?'s':'')+'…';msg.className='gform-msg';
    var ok=0,fail=0,failMsg='';
    for(var i=0;i<changes.length;i++){
      var c=changes[i];
      var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
      if(u.error){fail++;failMsg=u.error.message;continue;}
      try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
      c.b.quantity=c.v;ok++;
    }
    btn.disabled=false;
    if(fail){msg.textContent=ok+' saved, '+fail+' failed: '+failMsg;msg.className='gform-msg err';return;}
    stkDraft=null;
    greenView='countries';renderGreen();
    alert('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted.');
  }
  async function loadBeanMoves(beanId){
    const el=document.getElementById('gmoves');

  async function savePurchase(){
    const msg=document.getElementById('po-msg');
    const btn=document.getElementById('po-save');
    var rec={status:'ordered',sample_ref:(buyNew&&buyNew.sample_ref)||null};
    document.querySelectorAll('#green-content [data-pf]').forEach(function(inp){
      var f=inp.dataset.pf, v=inp.value.trim();
      if(f==='kg'||f==='cost_per_kg'){rec[f]=(v===''||isNaN(parseFloat(v)))?null:parseFloat(v);}
      else{rec[f]=v===''?null:v;}
    });
    if(!rec.name){msg.textContent='Bean name cannot be empty';msg.className='gform-msg err';return;}
    if(!(rec.kg>0)){msg.textContent='Enter the ordered quantity in kg';msg.className='gform-msg err';return;}
    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    const {data,error}=await sb.from('purchases').insert(rec).select();
    btn.disabled=false;
    if(error){msg.textContent='Save failed: '+error.message;msg.className='gform-msg err';return;}
    if(data&&data[0])PURCHASES.unshift(data[0]);
    if(rec.sample_ref)BUY_SHORTLIST=BUY_SHORTLIST.filter(function(s){return String(s.id)!==String(rec.sample_ref);});

  async function receivePurchase(){
    const p=PURCHASES.find(function(x){return String(x.id)===String(buyRecv);});

    btn.disabled=true;msg.textContent='Saving…';msg.className='gform-msg';
    /* merge into the matching green-bean lot (name+process), or create a new lot */
    var n=String(p.name||'').trim().toLowerCase(), pr=String(p.process||'').trim().toLowerCase();
    var bean=BEANS.find(function(b){return String(b.name||'').trim().toLowerCase()===n&&String(b.process||'').trim().toLowerCase()===pr;});
    var beanId, after;
    if(bean){
      var nq=(Number(bean.quantity)||0)+kg;
      var upd={quantity:nq};
      if(p.cost_per_kg!=null)upd.cost_per_kg=p.cost_per_kg;
      if(p.supplier)upd.supplier=p.supplier;
      const u=await sb.from('beans').update(upd).eq('id',bean.id);
      if(u.error){btn.disabled=false;msg.textContent='Stock update failed: '+u.error.message;msg.className='gform-msg err';return;}
      Object.assign(bean,upd);
      beanId=bean.id;after=nq;
    }else{
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),name:p.name,process:p.process||null,country:p.country||null,quantity:kg,cost_per_kg:p.cost_per_kg,supplier:p.supplier||null};

    p.status='received';p.received_at=today;p.bean_id=beanId;p.kg=kg;p.lot_no=lot||null;
    buyRecv=null;
    renderGreen();

  let ROAST_CART=[], roastDate='', roastTime='', roastBanner='', roastBannerErr=false, roastAddOpen={};

  async function loadRoastDemand(){

  async function saveRoast(){
    const btn=document.getElementById('ro-save');
    var rows=ROAST_CART.map(function(r){return {r:r,kg:parseFloat(r.kg)};}).filter(function(x){return x.kg>0;});
    if(!rows.length){roastBanner='Enter a quantity for at least one bean';roastBannerErr=true;renderRoast();return;}
    /* G2 開烘前庫存檢查：超過帳面庫存要先確認 */
    var overs=rows.filter(function(x){
      var b=BEANS.find(function(bb){return String(bb.id)===String(x.r.id);});
      return b&&x.kg>((Number(b.quantity)||0)+0.0001);
    });
    if(overs.length){
      var lines=overs.map(function(x){
        var b=BEANS.find(function(bb){return String(bb.id)===String(x.r.id);});
        return x.r.name+': '+x.kg+' kg entered, '+gnum(b?(Number(b.quantity)||0):0)+' kg in stock';
      }).join('\n');
      if(!confirm('Stock check:\n'+lines+'\n\nLog anyway? Stock will stop at 0 — fix the numbers later with Stocktake.'))return;
    }
    btn.disabled=true;btn.textContent='Logging…';
    var ok=0,fail=0,failMsg='';
    for(var i=0;i<rows.length;i++){
      var r=rows[i].r,kg=rows[i].kg;
      var bean=BEANS.find(function(b){return String(b.id)===String(r.id);});
      var rec={bean_id:r.id,bean_name:r.name,country:r.country,green_kg:kg,status:'pending_cupping'};
      var outKg=parseFloat(r.out);
      if(!isNaN(outKg)&&outKg>0){rec.roasted_kg=outKg;rec.remaining_kg=outKg;/* G3: 新批次全額入熟豆倉 */}
      if(roastDate)rec.roast_date=roastDate;
      var ins=await sb.from('roasts').insert(rec).select();
      if(ins.error){fail++;failMsg=ins.error.message;continue;}
      var newQty=Math.max(0,(Number(bean&&bean.quantity)||0)-kg);
      await sb.from('beans').update({quantity:newQty}).eq('id',r.id);
      if(bean)bean.quantity=newQty;
      try{await sb.from('stock_moves').insert({bean_id:r.id,kind:'roast',delta_kg:-kg,after_kg:newQty,note:'Roast'+(roastDate?' '+roastDate:'')});}catch(e){}
      if(ins.data&&ins.data[0])ROASTS.unshift(ins.data[0]);
      ok++;
    }
    ROAST_CART=[];
    roastBanner=ok+' logged and deducted from stock'+(fail?(', '+fail+' failed: '+failMsg):'');
    roastBannerErr=fail>0;
    renderRoast();
  }

        if(sx==null)return;var dx=e.changedTouches[0].clientX-sx;sx=null;handled=true;
        if(dx>28)askRemove();               /* swipe right -> Sold Out => remove */
        else if(dx<-28){}                   /* swipe left -> stays Available */
        else askRemove();                   /* tap => mark Sold Out => remove */
        setTimeout(function(){handled=false;},400);
      },{passive:true});
      el.addEventListener('click',function(){if(handled)return;askRemove();});
    });

  function _rrPath(x,X,Y,W,H,R){x.beginPath();x.moveTo(X+R,Y);x.arcTo(X+W,Y,X+W,Y+H,R);x.arcTo(X+W,Y+H,X,Y+H,R);x.arcTo(X,Y+H,X,Y,R);x.arcTo(X,Y,X+W,Y,R);x.closePath();}
  function _cardFit(x,text,weight,start,min,maxW,fam){var s=start;x.font=weight+' '+s+'px '+fam;while(s>min&&x.measureText(text).width>maxW){s-=2;x.font=weight+' '+s+'px '+fam;}return s;}
  /* canvas port of drawCuppingRadar — rings, spokes, band-coloured polygon, labels */
  function _cardRadar(x,cx,cy,R,scores,band){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
    x.lineWidth=2;x.strokeStyle='#1E1A19';
    [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=n;i++){var p=pt(i%n,R*l/3);if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);}x.stroke();});
    for(var i=0;i<n;i++){var sp=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(sp[0],sp[1]);x.stroke();}
    var dpts=scores.map(function(o,i){return pt(i,R*((o.n==null?0:o.n)/3));});
    x.beginPath();dpts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
    x.fillStyle='rgb('+band.map(function(v){return Math.round(255-(255-v)*0.20);}).join(',')+')';x.fill();
    x.strokeStyle='rgb('+band.join(',')+')';x.lineWidth=4;x.stroke();
    x.fillStyle='rgb('+band.join(',')+')';
    dpts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],5,0,6.3);x.fill();});
    x.fillStyle='#7C3A44';x.font='600 24px Inter, sans-serif';
    scores.forEach(function(o,i){
      var lp=pt(i,R+24);
      x.textAlign=lp[0]<cx-4?'right':(lp[0]>cx+4?'left':'center');
      x.fillText(o.label,lp[0],lp[1]+8);
    });

  var _cardIcons=null;
  function _loadCardIcons(){
    if(_cardIcons)return Promise.resolve(_cardIcons);
    function li(src){return new Promise(function(res){var i=new Image();i.onload=function(){res(i);};i.onerror=function(){res(null);};i.src=src;});}
    return Promise.all([li(CARD_ICON_BEAN),li(CARD_ICON_DROP)]).then(function(a){_cardIcons={bean:a[0],drop:a[1]};return _cardIcons;});
  }
  function _tintIcon(img,color,h){
    var w=Math.round(h*(img.width/img.height));
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var g=c.getContext('2d');
    g.drawImage(img,0,0,w,h);
    g.globalCompositeOperation='source-in';
    g.fillStyle=color;g.fillRect(0,0,w,h);
    return c;
  }
  async function makeSquareCard(card){
    try{await document.fonts.ready;}catch(e){}
    var icons=null;try{icons=await _loadCardIcons();}catch(e){}
    var W=1200,H=1200,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var x=cv.getContext('2d');
    var INK='#1E1A19',BERRY='#B25E6A';
    /* square card with asymmetric safe margins — Square Online portrait hero
       crops ~150px off each side, so sides get 150px margin, top/bottom 64px */
    var CX=217,CY=64,CW=W-434,CH=H-128,CR=28;
    /* text-safe zone: mobile portrait hero crops ~200px+ per side, so all text lives in the centre 760px */
    var TSX=275,TEX=W-275,TW2=TEX-TSX;
    x.fillStyle='#ffffff';x.fillRect(0,0,W,H);
    var band=mnHexRgb(card.color)||[73,66,58];
    var lum=.299*band[0]+.587*band[1]+.114*band[2];
    var bandCss='rgb('+band.join(',')+')';
    var tc=lum>165?'#282220':'#ffffff';
    var lt='rgb('+band.map(function(v){return Math.round(v+(255-v)*.85);}).join(',')+')';
    var dk='rgb('+band.map(function(v){return Math.round(v*.5);}).join(',')+')';
    x.save();_rrPath(x,CX,CY,CW,CH,CR);x.clip();
    x.textBaseline='alphabetic';x.textAlign='left';
    /* ===== header banner: bean icon + name (left), Roasted / date two lines (right) ===== */
    var headH=150;
    x.fillStyle=bandCss;x.fillRect(CX,CY,CW,headH);
    x.font='600 24px Inter, sans-serif';
    var hrW=card.roasted?Math.max(x.measureText('Roasted').width,x.measureText(card.roasted).width):0;
    var nameX=TSX;
    if(icons&&icons.bean){
      var bs=50,bw=bs*(icons.bean.width/icons.bean.height);
      x.drawImage(_tintIcon(icons.bean,tc,600),nameX,CY+(headH-bs)/2,bw,bs);
      nameX+=bw+24;
    }
    var ns=_cardFit(x,card.name,'700',62,34,TEX-nameX-(hrW?hrW+40:0),'Inter, sans-serif');
    x.fillStyle=tc;x.fillText(card.name,nameX,CY+headH/2+ns*.36);
    if(card.roasted){
      x.globalAlpha=.85;x.font='600 24px Inter, sans-serif';x.textAlign='right';
      x.fillText('Roasted',TEX,CY+headH/2-10);
      x.fillText(card.roasted,TEX,CY+headH/2+24);
      x.textAlign='left';x.globalAlpha=1;
    }
    var cy=CY+headH;
    /* ===== sub header: comment / blend note ===== */
    if(card.comment){
      var subH=76;
      x.fillStyle=lt;x.fillRect(CX,cy,CW,subH);
      var cs=_cardFit(x,card.comment,'600',30,20,TW2,'Inter, sans-serif');
      x.textAlign='center';x.fillStyle=dk;x.fillText(card.comment,CX+CW/2,cy+subH/2+cs*.36);
      x.textAlign='left';
      cy+=subH;
    }
    /* ===== footer banner: drop icon + flavour, centred as a group ===== */
    var footH=150,footY=CY+CH-footH;
    if(card.flavour&&card.flavour.length){
      x.fillStyle=bandCss;x.fillRect(CX,footY,CW,footH);
      var fl=card.flavour.join('  \u00b7  ');
      var dw=0,ds=48,gap=22;
      if(icons&&icons.drop){dw=ds*(icons.drop.width/icons.drop.height);}
      var fsz=_cardFit(x,fl,'700',48,26,TW2-(dw?dw+gap:0),'Inter, sans-serif');
      var sx=TSX;
      if(icons&&icons.drop){
        x.drawImage(_tintIcon(icons.drop,tc,600),sx,footY+(footH-ds)/2,dw,ds);
        sx+=dw+gap;
      }
      x.fillStyle=tc;x.fillText(fl,sx,footY+footH/2+fsz*.36);
    }
    /* ===== content: full-width rows, radar on its own centred row ===== */
    var zoneTop=cy,zoneBot=footY;
    var Lx=TSX,Rv=TEX;
    var ry=zoneTop+64;
    if(card.kind==='blend'){
      /* one common font size across every content row */
      var csz=34;
      (card.recipe||[]).forEach(function(p){
        var hasPct=(p.pct||p.pct===0);
        csz=Math.min(csz,_cardFit(x,p.bean,'700',34,24,TW2*0.55-(hasPct?115:0),'Inter, sans-serif'));
        if(p.process)csz=Math.min(csz,_cardFit(x,p.process,'400',34,20,TW2*0.42,'Inter, sans-serif'));
      });
      (card.recipe||[]).forEach(function(p){
        var pct=(p.pct||p.pct===0)?String(p.pct)+'%':'';
        if(pct){x.fillStyle=BERRY;x.font='700 '+csz+'px Inter, sans-serif';x.fillText(pct,Lx,ry);}
        x.fillStyle=INK;x.font='700 '+csz+'px Inter, sans-serif';
        x.fillText(p.bean,Lx+(pct?115:0),ry);
        var meta=p.process||'';
        if(meta){
          x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz+'px Inter, sans-serif';
          x.fillText(meta,Rv,ry);x.textAlign='left';
        }
        ry+=66;
      });
    }else{
      var o=card.origin||{},rows=[];
      if(o.process)rows.push(['Process',o.process]);
      if(o.variety)rows.push(['Variety',o.variety]);
      if(o.altitude)rows.push(['Altitude',o.altitude+' MASL']);
      if(o.region)rows.push(['Region',o.region]);
      var csz2=34;
      rows.forEach(function(r){csz2=Math.min(csz2,_cardFit(x,String(r[1]),'400',34,20,TW2-290,'Inter, sans-serif'));});
      rows.forEach(function(r){
        x.fillStyle=INK;x.font='700 '+csz2+'px Inter, sans-serif';x.fillText(r[0],Lx,ry);
        x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz2+'px Inter, sans-serif';
        x.fillText(String(r[1]),Rv,ry);
        x.textAlign='left';ry+=66;
      });
      ry-=20;
    }
    var hasCup=!!(card.cupScores&&card.cupScores.some(function(o){return o.n!=null;}));
    if(hasCup){
      var radarTop=ry+26,avail=zoneBot-radarTop-16;
      var R=Math.min(150,Math.floor(avail/2-36));
      _cardRadar(x,W/2,radarTop+avail/2+4,R,card.cupScores,band);
    }
    x.restore();
    _rrPath(x,CX,CY,CW,CH,CR);x.lineWidth=3;x.strokeStyle=INK;x.stroke();
    return cv.toDataURL('image/png').split(',')[1];
  }
  /* G5 上架閘門：Re-roast/Downgrade 直接擋；沒 QC 或風味未鎖只提醒 */
  function listingGate(row){
    var qr=null;try{qr=qcRoastForSample(row);}catch(e){}
    if(qr&&qr.qc==='reroast')return {block:'QC verdict for the latest batch is Re-roast — fix the batch before listing.'};
    if(qr&&qr.qc==='downgrade')return {block:'The latest batch is downgraded — not retail grade.'};
    var warns=[];
    if(!qr||!qr.qc)warns.push('no QC pass recorded for the latest batch');
    if(!row.flavour_locked)warns.push('flavour description not locked');
    return {block:null,warns:warns};
  }
  /* 生成資訊卡並上傳 mail-assets，回傳 public URL（新豆通知信用） */
  async function uploadCardFor(row){
    try{
      if(!BEANS||!BEANS.length){try{await ensureBeansForInvoice();}catch(e){}}
      if(!ROASTS||!ROASTS.length){try{await loadRoasts();}catch(e){}}
      var b64=await makeSquareCard(squareCardDataFor(row));
      if(!b64)return '';
      var path='card-'+ordCardSlug(row.sample_id||'')+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error)return '';
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var u=pub&&pub.data&&pub.data.publicUrl;
      return u?(u+'?v='+Date.now()):'';
    }catch(e){return '';}
  }
  /* G5 新豆通知信群發 */
  async function announceCoffee(sqKey,sid){
    var row=RTL_ROWS.filter(function(x){return (x.sample_id||('id:'+String(x.id||'')))===sqKey||String(x.sample_id||'')===sid;})[0];
    if(!row){alert('Bean not found.');return;}
    if(!ROASTS||!ROASTS.length){try{await loadRoasts();}catch(e){}}
    var gate=listingGate(row);
    if(gate.block){alert(gate.block);return;}
    if(gate.warns.length&&!confirm('Heads up: '+gate.warns.join('; ')+'.\nAnnounce anyway?'))return;
    var res=null;
    try{res=await sb.from('customers').select('id,email').not('email','is',null);}catch(e){}

  /* G3: FIFO 消耗成分批次 — 回傳不夠扣的清單 */
  async function consumeBlendComponents(parts,totalKg){
    var short=[];
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      var need=totalKg*(parseFloat(p.pct)||0)/100;
      if(!(need>0))continue;
      var key=String(p.bean||'').trim().toLowerCase();
      var pool=(ROASTS||[]).filter(function(r){
        return r.kind!=='blend'&&Number(r.remaining_kg)>0&&String(r.bean_name||'').trim().toLowerCase()===key;
      }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
      var left=need;
      for(var j=0;j<pool.length&&left>0.0001;j++){
        var b=pool[j];
        var take=Math.min(Number(b.remaining_kg)||0,left);
        var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
        try{
          var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
          if(u.error)continue;
          b.remaining_kg=nr;left-=take;
        }catch(e){}
      }
      if(left>0.0001)short.push(p.bean+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
    }
    return short;
  }

  function roastStockHTML(){

    var groups={},order=[];
    batches.forEach(function(r){var k=String(r.bean_name||'—').trim();var lk=k.toLowerCase();if(!groups[lk]){groups[lk]={name:k,rows:[]};order.push(lk);}groups[lk].rows.push(r);});
    order.sort(function(a,b){return groups[a].name.localeCompare(groups[b].name);});

    var h='<div class="bat-hint">Oldest batch first — use it first (FIFO). Tap a batch to log usage. Red = roasted over 30 days ago.</div>';
    order.forEach(function(k){

      var tot=0;g.rows.forEach(function(r){tot+=Number(r.remaining_kg)||0;});

        var old=age!=null&&age>30;
        var badges=(idx===0&&g.rows.length>1?'<span class="bat-fifo">use first</span>':'')+(old?'<span class="bat-oldb">&gt;30d</span>':'')
          +(r.qc==='pass'?'<span class="bat-fifo">QC ✓</span>':'')
          +(r.qc==='reroast'?'<span class="bat-oldb">re-roast</span>':'')
          +(r.qc==='downgrade'?'<span class="bat-oldb" style="background:var(--line);color:var(--muted)">downgraded</span>':'');
        var meta=(age!=null?age+' days old':'no roast date')+(r.roasted_kg!=null?' · roasted '+gnum(r.roasted_kg)+' kg':'')+(r.kind==='blend'?' · blend':'');
        h+='<div class="bat-row'+(old?' old':'')+'" data-bat="'+esc(r.id)+'"><div class="bat-l"><div class="d">'+(r.roast_date?fmtDate(r.roast_date):'—')+badges+'</div><div class="m">'+meta+'</div></div><span class="bat-kg">'+gnum(r.remaining_kg)+' kg</span></div>';

        }
