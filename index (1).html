<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#F4ECEA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Ratio</title>
<style>
  :root{--bg:#F4ECEA;--surface:#FCF6F4;--ink:#322B2A;--muted:#8C8079;--accent:#B25E6A;--tint:#F3DDE0;--line:rgba(50,43,42,0.10)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column}
  .board{flex:1;margin:calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;border:1px solid rgba(50,43,42,0.16);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
  .bhead{background:#49423A;display:flex;align-items:center;justify-content:space-between;padding:9px 18px;color:#F4ECEA}
  .bhead svg path{fill:#F4ECEA}
  .bhead .logo{width:40px;height:40px;display:block}
  .bhead .logo img{width:100%;height:100%;display:block;filter:brightness(0) invert(1)}
  .htime{text-align:right;line-height:1}
  .htime .clock{font-size:30px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;color:#F4ECEA}
  .feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .msg{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .msg:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
  .mbody{flex:1;min-width:0;text-align:left}
  .mtitle{font-size:13px;font-weight:600;color:var(--ink)}
  .mtext{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtime{font-size:11px;color:var(--muted);flex:0 0 auto;margin-top:1px}
  .mdel{flex:0 0 auto;border:none;background:none;color:var(--line);cursor:pointer;padding:2px;margin:-2px -4px 0 -2px;display:flex;align-items:center}
  .mdel svg{width:15px;height:15px}
  .mdel:active{color:var(--accent)}
  .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:0;padding:0 16px calc(env(safe-area-inset-bottom,0px) - 18px)}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .16s ease,transform .16s ease}
  .cname{font-size:12px;font-weight:600;color:var(--muted)}
  .pill{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;border-radius:30px;background:var(--surface);border:.5px solid var(--line)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;cursor:pointer;transition:transform .12s ease}
  .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;color:var(--ink);overflow:hidden}
  .ic svg{width:40px;height:40px}
  .lbl{font-size:10px;color:var(--muted)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:0}
  .swap{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#49423A;cursor:pointer;padding:0;transition:transform .3s ease}
  .swap.spin{transform:rotate(180deg)}
  .swap svg{width:23px;height:23px}
  .folder{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .fgrid{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:5px}
  .fgrid span{background:var(--accent);border-radius:2px;opacity:.85}
  #power{width:44px;height:44px;border-radius:13px;background:var(--surface);border:.5px solid var(--line);display:grid;place-items:center;color:#5FA45C;cursor:pointer;padding:0;transition:color .2s ease}
  @keyframes press-pf{0%{transform:scale(1)}30%{transform:scale(.84);background:var(--tint)}60%{transform:scale(1.1);background:var(--tint)}100%{transform:scale(1)}}
  .pressing{animation:press-pf .42s ease}
  .item[data-id="beans"] .ic svg{transform:scale(.7)}
  .item[data-id="roast"] .ic svg{transform:translateY(3px) scale(1.2)}
  .item[data-id="tools"] .ic svg{transform:scale(1.2)}
  .ov{position:fixed;inset:0;background:rgba(50,43,42,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}
  .ov.open{display:flex}
  .panel{background:var(--surface);border-radius:26px;padding:20px 18px 22px;width:100%;max-width:330px;transform:scale(.85);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .ov.open .panel{transform:scale(1);opacity:1}
  /* ---- full-screen module page (Timesheet, etc.) ---- */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);visibility:hidden}
  .screen.open{transform:none;visibility:visible}
  .shead{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 13px;background:#49423A;color:#F4ECEA}
  .shead .back{width:34px;height:34px;border-radius:10px;border:none;background:rgba(244,236,234,.12);color:#F4ECEA;display:grid;place-items:center;cursor:pointer;padding:0;transition:background .15s ease}
  .shead .back:active{background:rgba(244,236,234,.22)}
  .shead .back svg{width:20px;height:20px}
  .shead h1{font-size:18px;font-weight:600;margin:0;flex:1}
  .shead .wk{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:rgba(244,236,234,.7)}
  .sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}
  .dayhd{position:sticky;top:0;background:var(--bg);font-size:12px;font-weight:600;color:var(--muted);padding:14px 18px 6px;letter-spacing:.02em;z-index:1}
  .shift{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
  .shift .who{flex:1;min-width:0}
  .shift .nm{font-size:14px;font-weight:600;color:var(--ink)}
  .shift .role{font-size:11px;color:var(--muted);margin-top:2px}
  .shift .rt{text-align:right;white-space:nowrap}
  .shift .tm{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;color:var(--ink)}
  .shift .hrs{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--accent);margin-top:2px}
  .sempty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
  .beans-search{padding:12px 16px 6px;position:sticky;top:0;background:var(--bg);z-index:2}
  .green-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 4px}
  .green-stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
  .green-stat .lab{font-size:11px;color:var(--muted)}
  .green-stat .val{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:19px;font-weight:600;color:var(--ink);margin-top:3px;line-height:1.1}
  .green-stat .val small{font-size:11px;font-weight:500;color:var(--muted);margin-left:2px}
  .gsec{font-size:12px;font-weight:600;color:var(--muted);padding:14px 18px 2px;letter-spacing:.02em}
  /* level 1: country tiles */
  .gcountries{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:8px 16px 16px}
  .gcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 15px;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .12s ease,border-color .12s ease}
  .gcard:active{transform:scale(.97)}
  .gcard .gc-name{font-size:17px;font-weight:600;color:var(--ink)}
  .gcard .gc-sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--muted);margin-top:8px}
  .gcard .gc-n{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:600;border-radius:8px;padding:1px 8px;align-self:flex-start}
  /* level 2: bean tiles */
  .gbeans{display:flex;flex-direction:column;gap:10px;padding:8px 16px 16px}
  .gbean{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:transform .12s ease}
  .gbean:active{transform:scale(.98)}
  .gbean .gb-main{min-width:0}
  .gbean .gb-name{font-size:16px;font-weight:600;color:var(--ink)}
  .gbean .gb-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .gbean .gb-arrow{color:var(--muted);flex:0 0 auto}
  .gbean .gb-arrow svg{width:18px;height:18px;display:block}
  /* level 3: detail rows */
  .gdetail{padding:6px 16px 20px}
  .gd-hero{padding:16px 4px 12px}
  .gd-hero .gd-nm{font-size:22px;font-weight:600;color:var(--ink);line-height:1.15}
  .gd-hero .gd-ct{font-size:13px;color:var(--accent);font-weight:600;margin-top:4px}
  .gd-list{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .grow{display:flex;justify-content:space-between;gap:14px;padding:12px 15px;border-top:1px solid var(--line)}
  .grow:first-child{border-top:none}
  .grow .gk{font-size:13px;color:var(--muted);flex:0 0 auto}
  .grow .gv{font-size:13px;color:var(--ink);text-align:right;font-weight:500}
  .grow .gv.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  /* edit button + form */
  .gbtn{display:block;width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .15s ease}
  .gbtn:active{opacity:.8}
  .gbtn[disabled]{opacity:.5}
  .gbtn.ghost{background:var(--surface);color:var(--accent);border:1px solid var(--line);margin-bottom:12px}
  .gform{display:flex;flex-direction:column;gap:11px;padding-top:4px}
  .gfield{display:flex;flex-direction:column;gap:5px}
  .gfield .gl{font-size:12px;color:var(--muted);padding-left:2px}
  .gfield input{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit}
  .gfield input:focus{border-color:var(--accent)}
  .gform-actions{display:flex;gap:10px;margin-top:6px}
  .gform-actions .gbtn{margin-bottom:0}
  .gform-msg{font-size:12px;color:var(--muted);min-height:14px}
  .gform-msg.err{color:var(--accent)}
  .gform-msg.ok{color:#5b7a57}
  .gbtn.danger{background:#C0392B;color:#fff}
  .gbtn.dghost{background:var(--surface);color:#C0392B;border:1px solid #E6BBB5}
  .gdel{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
  .gdel-msg{font-size:13px;color:var(--ink);margin-bottom:11px;text-align:center;line-height:1.5}
  .re-seg{display:flex;gap:8px}
  .re-opt{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:12px;padding:11px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
  .re-opt.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .gta{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;resize:vertical;width:100%}
  .gta:focus{border-color:var(--accent)}
  /* sample form (redesigned) */
  .smp-pager{display:flex;align-items:center;gap:8px;padding:12px 16px 2px}
  .smp-nav{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:inherit}
  .smp-nav:active{background:#EDE3DF}
  .smp-pos{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--ink)}
  .smp-add{border:1px solid var(--accent);background:var(--surface);color:var(--accent);border-radius:11px;padding:0 14px;height:40px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:0 0 auto}
  .smp-add:active{background:#F4E4E0}
  .smp-nohdr{font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:700;color:var(--accent);padding:6px 18px 2px}
  .smp-no{font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:1px 7px;margin-right:2px}
  .smp-item{cursor:pointer}
  .smp-item:active{background:#FAF2EF}
  .smp-hint{font-size:12px;color:var(--muted);text-align:center;padding:10px 4px 0}
  .smp-sec{margin:0 16px 14px}
  .smp-sec:first-child{margin-top:14px}
  .smp-sec-h{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
  .smp-fields{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px;display:flex;flex-direction:column;gap:12px}
  .smp-f{display:flex;flex-direction:column;gap:5px}
  .smp-f span{font-size:12px;color:var(--muted);padding-left:2px}
  .smp-f input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit;width:100%}
  .smp-f input:focus{border-color:var(--accent);background:var(--surface)}
  .smp-f2{display:flex;gap:10px}
  .smp-f2 .smp-f{flex:1;min-width:0}
  .smp-scores{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .smp-score{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border-top:1px solid var(--line)}
  .smp-score:first-child{border-top:none}
  .smp-sname{font-size:14px;color:var(--ink);font-weight:500}
  .dots{display:flex;gap:9px;align-items:center}
  .dot{width:23px;height:23px;border-radius:50%;border:1.7px solid #D6C8C1;background:transparent;cursor:pointer;padding:0;transition:transform .12s ease,background .12s ease,border-color .12s ease}
  .dot.fill{background:var(--accent);border-color:var(--accent)}
  .dot:active{transform:scale(.85)}
  .smp-msg-wrap{padding:0 18px}
  .smp-decide-wrap{position:sticky;bottom:0;padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 14px);background:linear-gradient(to top,var(--bg) 72%,rgba(244,236,234,0))}
  .smp-decide{display:flex;gap:11px}
  .smp-decide .gbtn{padding:15px;font-size:15px;border-radius:14px}
  .gbtn.buy{background:#5E8C61;color:#fff}
  .gbtn.skip{background:var(--surface);color:#6B5E50;border:1px solid var(--line)}
  .smp-list{display:flex;flex-direction:column;gap:10px}
  .smp-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .smp-scoreline{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .sc-chip{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px 8px}
  .sc-chip b{color:var(--ink);margin-left:4px;font-family:ui-monospace,Menlo,monospace}
  .smp-chars{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .smp-char{font-size:12px;font-weight:600;color:var(--accent);background:var(--tint);border-radius:999px;padding:4px 12px}
  .smp-cmt{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.5}
  .smp-badge{font-size:11px;font-weight:600;border-radius:8px;padding:3px 11px;color:#fff}
  .smp-badge.buy{background:#5E8C61}
  .smp-badge.skip{background:#9A8B82}
  /* green home 2x2 */
  .ghome{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:16px}
  .ghome-tile{background:var(--surface);border:1px solid var(--line);border-radius:20px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:transform .12s ease}
  .ghome-tile:active{transform:scale(.97)}
  .gh-ic{width:52px;height:52px;border-radius:50%;background:#F4E4E0;display:flex;align-items:center;justify-content:center}
  .gh-ic svg{width:26px;height:26px;color:var(--accent)}
  .gh-lab{font-size:18px;font-weight:600;color:var(--ink)}
  .gh-zh{font-size:11px;color:var(--muted);margin-top:-6px}
  .ghome-tile.soon{background:var(--bg);border:1.5px dashed #CBBEB7}
  .ghome-tile.soon .gh-ic{background:#EDE3DF}
  .ghome-tile.soon .gh-ic svg{color:var(--muted)}
  .ghome-tile.soon .gh-lab{color:#6B5E50}
  .ghome-tile.wide{grid-column:1 / -1;min-height:84px}
  .gsel{border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
  .gsel:focus{border-color:var(--accent)}
  .rbadge{font-size:11px;font-weight:600;color:#fff;background:var(--accent);border-radius:8px;padding:2px 9px;white-space:nowrap}
  .rbadge.done{background:#7E9B7A}
  .rcard{cursor:pointer}
  /* roasted by-date collapsible (Beans) */
  .rdate{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 18px;cursor:pointer;font-family:inherit}
  .rd-chev{color:var(--muted);display:flex;transition:transform .15s ease}
  .rd-chev svg{width:18px;height:18px}
  .rdate.open .rd-chev{transform:rotate(90deg)}
  .rd-date{font-size:15px;font-weight:600;color:var(--ink);flex:1;font-family:ui-monospace,Menlo,monospace}
  .rd-meta{font-size:12px;color:var(--muted)}
  .rd-meta b{color:var(--accent)}
  .rd-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:10px;background:#FAF2EF}
  .rd-body .bean{margin:0}
  /* roasting cart UI */
  .ro-banner{margin:12px 16px 0;font-size:13px;font-weight:500;color:#5b7a57}
  .ro-banner.err{color:var(--accent)}
  .ro-banner:empty{display:none}
  .ro-top{display:flex;gap:10px;padding:12px 16px 2px}
  .ro-dt{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
  .ro-dt span{font-size:11px;color:var(--muted);padding-left:2px}
  .ro-dt input{border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface);outline:none;font-family:inherit;width:100%}
  .ro-dt input:focus{border-color:var(--accent)}
  .ro-cart{padding:2px 16px 6px;display:flex;flex-direction:column;gap:10px}
  .ro-row{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:12px 14px}
  .ro-rh{display:flex;justify-content:space-between;align-items:center}
  .ro-nm{font-size:15px;font-weight:600;color:var(--ink)}
  .ro-x{border:none;background:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 6px;line-height:1}
  .ro-rem{font-size:11px;color:var(--muted);margin-top:2px}
  .ro-qty{display:flex;align-items:center;gap:10px;margin-top:11px}
  .ro-step{width:46px;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:inherit}
  .ro-step:active{background:#EDE3DF}
  .ro-in{flex:1;min-width:0;text-align:center;border:1px solid var(--line);border-radius:13px;padding:11px;font-size:19px;font-weight:600;color:var(--ink);background:var(--bg);outline:none;font-family:ui-monospace,Menlo,monospace}
  .ro-in:focus{border-color:var(--accent)}
  .ro-unit{font-size:13px;color:var(--muted);flex:0 0 auto}
  .ro-add{padding:2px 16px 16px;display:flex;flex-direction:column;gap:8px}
  .ro-aitem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;cursor:pointer;font-family:inherit}
  .ro-aitem:active{background:#FAF2EF}
  .ro-an{font-size:15px;font-weight:600;color:var(--ink)}
  .ro-as{font-size:12px;color:var(--muted);margin-top:2px}
  .ro-plus{width:32px;height:32px;border-radius:50%;background:#F4E4E0;color:var(--accent);font-size:19px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
