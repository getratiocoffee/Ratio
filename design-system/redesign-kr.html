<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ratio — 韓系定案原型 v2</title>
<style>
/* ===== 韓系色票（大圓角＋粉彩＋膨脹）＋ 10 分類色 ===== */
:root{
  --bg:#F1EEF8; --card:#FFFFFF; --ink:#2C2740; --muted:#9691AC;
  --line:#EFEAF6; --line2:#E6DFF3; --accent:#DB8BA1; --tint:#F6EBEF; --danger:#D8756C;
  --green:#84B57C; --roast:#DE9670; --qc:#7FA1CE; --mkt:#AB92CE; --orders:#DD8CA4;
  --cust:#63AFAA; --fin:#CDAC66; --day:#9299AE; --team:#8B90CC; --set:#9BA0B0; --ws:#7FA1CE; --print:#8290A4;
  --shadow:0 22px 60px rgba(90,70,140,.24);
}
:root[data-theme="dark"]{
  --bg:#100E18; --card:#211E2C; --ink:#F1EEFA; --muted:#928DA8;
  --line:#2C2838; --line2:#3A3450; --accent:#DC9CB0; --tint:#33283A; --danger:#DE8579;
  --green:#92C489; --roast:#E2A57F; --qc:#93ABD4; --mkt:#B7A2D8; --orders:#DE9CB1;
  --cust:#72BEB8; --fin:#D8B679; --day:#A6AEC8; --team:#9CA1D6; --set:#AAB0C8; --ws:#93ABD4; --print:#A2AEC4;
  --shadow:0 22px 60px rgba(0,0,0,.6);
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#100E18; --card:#211E2C; --ink:#F1EEFA; --muted:#928DA8;
  --line:#2C2838; --line2:#3A3450; --accent:#DC9CB0; --tint:#33283A; --danger:#DE8579;
  --green:#92C489; --roast:#E2A57F; --qc:#93ABD4; --mkt:#B7A2D8; --orders:#DE9CB1;
  --cust:#72BEB8; --fin:#D8B679; --day:#A6AEC8; --team:#9CA1D6; --set:#AAB0C8; --ws:#93ABD4; --print:#A2AEC4;
  --shadow:0 22px 60px rgba(0,0,0,.6);
}}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:radial-gradient(1000px 500px at 50% -8%, color-mix(in srgb,var(--accent) 16%,transparent),transparent),var(--bg);
  color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:26px 14px 60px;-webkit-font-smoothing:antialiased}
.tabnum{font-variant-numeric:tabular-nums}

.control{width:100%;max-width:820px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;
  justify-content:space-between;margin-bottom:22px}
.control h1{font-size:18px;margin:0;letter-spacing:-.01em;font-weight:800}
.control h1 span{color:var(--accent)}
.control p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line2);border-radius:16px;
  padding:5px;gap:3px;box-shadow:0 6px 16px rgba(120,90,160,.12)}
.seg button{font:inherit;font-size:13px;font-weight:700;border:0;cursor:pointer;background:transparent;
  color:var(--muted);padding:9px 15px;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;gap:2px;line-height:1.1}
.seg button small{font-size:10px;font-weight:600;opacity:.75}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 6px 14px color-mix(in srgb,var(--accent) 45%,transparent)}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.themebtn{font:inherit;font-size:12px;font-weight:700;cursor:pointer;background:var(--card);
  border:1px solid var(--line2);color:var(--ink);padding:10px 14px;border-radius:14px}
.themebtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.phone{width:390px;max-width:94vw;height:800px;max-height:86vh;background:var(--card);
  border-radius:48px;box-shadow:var(--shadow);border:1px solid var(--line2);position:relative;
  overflow:hidden;display:flex;flex-direction:column}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:26px;
  background:#000;border-radius:16px;z-index:40}
.statusbar{height:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;font-size:13px;font-weight:700}
.statusbar .dots{display:flex;gap:5px;align-items:center}
.statusbar svg{width:16px;height:16px;fill:currentColor}

.screen{flex:1;overflow-y:auto;overflow-x:hidden}
.screen::-webkit-scrollbar{width:0}
.view{display:none;padding:6px 16px 100px}
.view.on{display:block;animation:fade .3s cubic-bezier(.2,.7,.2,1)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.view.on{animation:none}.fill{transition:none}
  .tile:active,.crow:active,.add:active{transform:none}}

.appbar{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 12px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand .mark{width:32px;height:32px;border-radius:11px;background:var(--accent);display:grid;
  place-items:center;box-shadow:0 8px 16px color-mix(in srgb,var(--accent) 45%,transparent)}
.brand .mark svg{width:18px;height:18px;fill:#fff}
.hbtn{position:relative;width:42px;height:42px;border-radius:14px;border:1px solid var(--line2);
  background:var(--card);color:var(--ink);display:grid;place-items:center;cursor:pointer}
.hbtn svg{width:20px;height:20px;fill:currentColor}
.hbtn .rd{position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:50%;
  background:var(--danger);border:2px solid var(--card)}
.hello{font-size:13px;color:var(--muted);font-weight:600;margin:0 2px 2px}
.hello b{color:var(--ink);font-weight:800}

.progress{background:var(--card);border:1px solid var(--line2);border-radius:22px;padding:16px 18px;
  margin:8px 0 16px;box-shadow:0 10px 24px rgba(120,90,160,.10)}
.progress .pt{display:flex;justify-content:space-between;align-items:baseline}
.progress .pt span{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.progress .pt b{font-size:15px;color:var(--ink)}
.bar{height:12px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:11px}
.fill{height:100%;border-radius:99px;width:0;
  background:linear-gradient(90deg,var(--accent),#E0B08C);transition:width 1s cubic-bezier(.2,.7,.2,1)}

.sec{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
  margin:20px 4px 11px;display:flex;align-items:center;gap:7px}
.sec .gdot{width:8px;height:8px;border-radius:50%;background:currentColor}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tile{position:relative;border:1px solid var(--line2);background:var(--card);border-radius:24px;
  padding:16px 6px 14px;cursor:pointer;text-align:center;color:var(--ink);font:inherit;display:flex;
  flex-direction:column;align-items:center;box-shadow:0 8px 18px rgba(120,90,160,.10);
  transition:transform .14s ease}
.tile:active{transform:scale(.94)}
.tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tile .ic{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;margin-bottom:10px;
  background:var(--c);box-shadow:0 8px 16px color-mix(in srgb,var(--c) 42%,transparent)}
.tile .ic svg{width:27px;height:27px;fill:#fff}
.tile .num{font-size:24px;font-weight:800;line-height:1;color:var(--ink)}
.tile .num.small{font-size:14px;margin-top:8px;color:var(--muted);font-weight:700}
.tile .num.zero{color:var(--muted);font-weight:700}
.tile .lab{font-size:11px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.tile .rd{position:absolute;top:11px;right:11px;min-width:13px;height:13px;padding:0 3px;border-radius:99px;
  background:var(--danger);border:3px solid var(--card);color:#fff;font-size:8px;font-weight:800;
  display:grid;place-items:center;line-height:1}
.tile.wide{grid-column:span 3;flex-direction:row;justify-content:flex-start;gap:14px;
  padding:15px 18px;text-align:left;margin-top:12px}
.tile.wide .ic{margin-bottom:0;width:46px;height:46px;border-radius:15px}
.tile.wide .ic svg{width:23px;height:23px}
.tile.wide .lab{font-size:13px;color:var(--ink);text-transform:none;letter-spacing:0;margin-top:0}
.tile.wide .lab small{display:block;color:var(--muted);font-weight:600;font-size:11px;margin-top:2px}

.tabbar{position:absolute;left:0;right:0;bottom:0;height:76px;
  background:color-mix(in srgb,var(--card) 86%,transparent);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);display:flex;padding:8px 8px 22px;z-index:30}
.tabbar button{flex:1;border:0;background:transparent;cursor:pointer;color:var(--muted);font:inherit;
  font-size:10.5px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 0;border-radius:14px}
.tabbar button svg{width:23px;height:23px;fill:currentColor}
.tabbar button.on{color:var(--accent)}
.tabbar button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* 分類內頁 */
.cathead{display:flex;align-items:center;gap:13px;margin:6px 2px 4px}
.cathead .ci{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:var(--c);
  box-shadow:0 8px 16px color-mix(in srgb,var(--c) 42%,transparent);flex:0 0 52px}
.cathead .ci svg{width:27px;height:27px;fill:#fff}
.cathead h2{margin:0;font-size:23px;font-weight:800;letter-spacing:-.02em}
.cathead p{margin:2px 0 0;font-size:12px;color:var(--muted);font-weight:600}
.tback{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:14px;font-weight:800;
  background:transparent;border:0;color:var(--accent);cursor:pointer;padding:8px 2px;margin:2px 0}
.tback svg{width:18px;height:18px;fill:currentColor}
.clist{background:var(--card);border:1px solid var(--line2);border-radius:22px;padding:0 16px;margin-top:14px;
  box-shadow:0 8px 18px rgba(120,90,160,.08)}
.crow{display:flex;align-items:center;gap:13px;padding:15px 2px;border-bottom:1px solid var(--line);
  cursor:pointer;transition:transform .12s ease}
.crow:last-child{border-bottom:0}
.crow:active{transform:scale(.985)}
.crow .cd{width:36px;height:36px;border-radius:12px;background:color-mix(in srgb,var(--c) 15%,transparent);
  display:grid;place-items:center;flex:0 0 36px}
.crow .cd svg{width:18px;height:18px;fill:var(--c)}
.crow .cn{flex:1;font-size:15px;font-weight:700}
.crow.mk .cn{color:var(--c);font-weight:800}
.crow .tagw{font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--c);
  background:color-mix(in srgb,var(--c) 15%,transparent);padding:3px 8px;border-radius:7px;margin-right:2px}
.crow .cx{width:18px;height:18px;fill:var(--muted);opacity:.45;flex:0 0 18px}

/* today feed */
.feed{display:flex;flex-direction:column;gap:0}
.frow{display:flex;gap:13px;padding:14px 2px;border-bottom:1px solid var(--line);align-items:flex-start}
.frow:last-child{border-bottom:0}
.frow .ft{font-size:12px;font-weight:800;color:var(--muted);width:42px;flex:0 0 42px;padding-top:9px;text-align:right}
.frow .fc{flex:1;background:var(--card);border:1px solid var(--line2);border-radius:18px;padding:13px 14px;
  display:flex;gap:12px;align-items:center;box-shadow:0 6px 14px rgba(120,90,160,.08)}
.frow .fi{width:40px;height:40px;border-radius:13px;background:var(--c);display:grid;place-items:center;flex:0 0 40px;
  box-shadow:0 6px 12px color-mix(in srgb,var(--c) 40%,transparent)}
.frow .fi svg{width:21px;height:21px;fill:#fff}
.frow .fb b{font-size:14px;font-weight:800;display:block}
.frow .fb small{font-size:12px;color:var(--muted);font-weight:600}

/* shop */
.hero{border-radius:26px;padding:22px 20px;margin:6px 0 16px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--accent),#C97C90)}
.hero h2{margin:0;font-size:23px;font-weight:800;letter-spacing:-.02em}
.hero p{margin:7px 0 0;font-size:13px;opacity:.92;max-width:24ch}
.hero .bloom{position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.16)}
.chips{display:flex;gap:9px;overflow-x:auto;padding:2px 0 14px;margin:0 -2px}
.chips button{white-space:nowrap;font:inherit;font-size:12.5px;font-weight:700;border:1px solid var(--line2);
  background:var(--card);color:var(--ink);padding:9px 16px;border-radius:20px;cursor:pointer}
.chips button.on{background:var(--ink);color:var(--card);border-color:var(--ink)}
.bean{display:flex;gap:14px;background:var(--card);border:1px solid var(--line2);border-radius:24px;
  padding:14px;margin-bottom:13px;box-shadow:0 8px 18px rgba(120,90,160,.09)}
.bean .ph{width:78px;height:78px;flex:0 0 78px;border-radius:20px;display:grid;place-items:center;background:var(--c);
  box-shadow:0 8px 16px color-mix(in srgb,var(--c) 40%,transparent)}
.bean .ph svg{width:36px;height:36px;fill:#fff}
.bean .body{flex:1;min-width:0}
.bean .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  color:var(--c);background:color-mix(in srgb,var(--c) 16%,transparent);padding:3px 9px;border-radius:8px;margin-bottom:5px}
.bean h3{margin:0;font-size:16px;font-weight:800;letter-spacing:-.01em}
.bean .flav{margin:3px 0 0;font-size:12.5px;color:var(--muted);line-height:1.4}
.bean .row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.bean .price{font-size:17px;font-weight:800}
.bean .price small{font-size:11px;color:var(--muted);font-weight:600}
.add{font:inherit;font-size:13px;font-weight:800;border:0;cursor:pointer;background:var(--accent);color:#fff;
  padding:9px 18px;border-radius:14px;box-shadow:0 6px 14px color-mix(in srgb,var(--accent) 42%,transparent)}
.add:active{transform:scale(.96)}
.add:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* wholesale */
.wsacct{background:linear-gradient(135deg,var(--ws),#6484B0);color:#fff;border-radius:26px;padding:20px;
  margin:6px 0 16px;position:relative;overflow:hidden}
.wsacct .who{font-size:12px;opacity:.85;font-weight:600}
.wsacct h2{margin:3px 0 0;font-size:22px;font-weight:800}
.wsacct .stats{display:flex;gap:24px;margin-top:16px}
.wsacct .stats div span{display:block;font-size:11px;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.wsacct .stats div b{font-size:19px;font-weight:800}
.wsacct .bloom{position:absolute;right:-40px;bottom:-50px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.12)}
.quad{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.qbtn{border:1px solid var(--line2);background:var(--card);border-radius:22px;padding:17px 15px;cursor:pointer;
  text-align:left;color:var(--ink);font:inherit;display:flex;flex-direction:column;gap:10px;
  box-shadow:0 8px 18px rgba(120,90,160,.09);transition:transform .14s ease}
.qbtn:active{transform:scale(.96)}
.qbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.qbtn .ic{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:var(--c);
  box-shadow:0 8px 16px color-mix(in srgb,var(--c) 42%,transparent)}
.qbtn .ic svg{width:23px;height:23px;fill:#fff}
.qbtn b{font-size:14.5px;font-weight:800}
.qbtn small{color:var(--muted);font-weight:600;font-size:11.5px}
.olist{background:var(--card);border:1px solid var(--line2);border-radius:22px;overflow:hidden}
.orow{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}
.orow:last-child{border-bottom:0}
.orow .od{flex:1;min-width:0}
.orow .od b{font-size:14px;font-weight:800}
.orow .od small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:1px}
.pill{font-size:10.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.pill.ok{color:var(--green);background:color-mix(in srgb,var(--green) 16%,transparent)}
.pill.wait{color:var(--roast);background:color-mix(in srgb,var(--roast) 18%,transparent)}

/* ===== 手勢：拖曳交換（只首頁磁貼）===== */
#v-staff .grid .tile{touch-action:none}
.tile.drag{z-index:30;box-shadow:0 20px 38px rgba(90,60,140,.34);opacity:.97;cursor:grabbing;transition:none}
/* ===== 分類內頁：圖示磁貼（跟首頁同語言，小顆無數字）===== */
.catgrid{margin-top:16px}
.tile.mini{padding:16px 6px 13px}
.tile.mini .ic{width:48px;height:48px;border-radius:16px;margin-bottom:10px}
.tile.mini .ic svg{width:25px;height:25px}
.tile.mini .lab{color:var(--ink);font-size:11.5px;font-weight:700;text-transform:none;letter-spacing:0;margin-top:0;line-height:1.25}
.tile.mini .mkdot{position:absolute;top:11px;right:11px;width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 0 2px var(--card)}
/* ===== 手勢：橫滑選豆（零售）===== */
.carousel{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 2px 12px;margin:0 -4px;scrollbar-width:none}
.carousel::-webkit-scrollbar{display:none}
.slide{scroll-snap-align:center;flex:0 0 80%;background:var(--card);border:1px solid var(--line2);border-radius:24px;padding:16px;box-shadow:0 8px 18px rgba(120,90,160,.10)}
.slide .ph{height:104px;border-radius:18px;display:grid;place-items:center;background:var(--c);box-shadow:0 8px 16px color-mix(in srgb,var(--c) 40%,transparent)}
.slide .ph svg{width:46px;height:46px;fill:#fff}
.slide .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--c);background:color-mix(in srgb,var(--c) 15%,transparent);padding:3px 9px;border-radius:8px;margin:14px 0 6px}
.slide h3{margin:0;font-size:17px;font-weight:800}
.slide .flav{margin:4px 0 0;font-size:12.5px;color:var(--muted)}
.slide .row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.slide .price{font-size:17px;font-weight:800}
.dots{display:flex;gap:7px;justify-content:center;margin-top:4px}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line2);transition:all .25s}
.dots i.on{width:20px;border-radius:4px;background:var(--accent)}
/* ===== 手勢：雙向滑（今日流）右滑 Start · 左滑 Later ===== */
.frow .swipe{flex:1;position:relative;border-radius:18px;overflow:hidden;background:transparent}
.swipe .act{position:absolute;top:0;bottom:0;width:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#fff;font-size:12px;font-weight:800}
.swipe .act svg{width:22px;height:22px;fill:#fff}
.swipe .act.start{left:0;background:var(--green)}
.swipe .act.later{right:0;background:var(--roast)}
.swipe .front{position:relative;z-index:1;touch-action:pan-y;transition:transform .28s cubic-bezier(.2,.8,.2,1)}
.swipe.doing .front{box-shadow:inset 4px 0 0 var(--green)}
.swipe.doing .fb b::before{content:"▶  ";color:var(--green);font-size:11px}
.swipe.later{opacity:.6}
.swipe.later .fb small::after{content:"  · snoozed to later";color:var(--roast);font-weight:700}
.note{font-size:11.5px;color:var(--muted);text-align:center;margin:16px 4px 0;line-height:1.55}
.caption{width:390px;max-width:94vw;text-align:center;font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.6}
.caption b{color:var(--ink)}
/* ===== 底部抽屜（popup 上滑）===== */
.sheet-back{position:absolute;inset:0;background:rgba(25,15,35,.42);opacity:0;pointer-events:none;transition:opacity .3s;z-index:50}
.sheet-back.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:28px 28px 0 0;z-index:60;
  transform:translateY(110%);transition:transform .36s cubic-bezier(.2,.8,.2,1),max-height .36s ease;
  max-height:64%;display:flex;flex-direction:column;box-shadow:0 -12px 44px rgba(30,15,40,.3);will-change:transform}
.sheet.on{transform:translateY(0)}
.sheet.full{max-height:94%}
.sheet-head{flex:0 0 auto;cursor:grab;touch-action:none}
.sheet-head .grab{width:42px;height:5px;border-radius:3px;background:var(--line2);margin:11px auto 4px}
.sheet-body{padding:4px 20px 26px;overflow-y:auto}
.sh-h{display:flex;gap:13px;align-items:center;margin:2px 0 16px}
.sh-h .sh-ic{width:50px;height:50px;border-radius:16px;background:var(--c);display:grid;place-items:center;flex:0 0 50px;box-shadow:0 8px 16px color-mix(in srgb,var(--c) 40%,transparent)}
.sh-h .sh-ic svg{width:26px;height:26px;fill:#fff}
.sh-h h2{margin:0;font-size:21px;font-weight:800;letter-spacing:-.01em}
.sh-h p{margin:2px 0 0;font-size:12px;color:var(--muted);font-weight:600}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid var(--line);font-size:14px}
.sh-row span{color:var(--muted);font-weight:600}
.sh-row b{font-weight:800}
.sh-btn{width:100%;margin-top:18px;padding:15px;border:0;border-radius:16px;background:var(--c);color:#fff;font:inherit;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 10px 22px color-mix(in srgb,var(--c) 40%,transparent)}
.sh-btn:active{transform:scale(.98)}
</style>
</head>
<body>

<div class="control">
  <div>
    <h1><span>Ratio</span> · 韓系定案原型 v2</h1>
    <p>員工首頁＝10 分類主選單 · 點磁貼進內頁 · 切身份／日夜</p>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="seg" role="tablist" aria-label="Identity">
      <button class="on" data-v="staff">Staff<small>員工</small></button>
      <button data-v="ws">Wholesale<small>批發</small></button>
      <button data-v="shop">Retail<small>零售</small></button>
    </div>
    <button class="themebtn" id="theme">☀︎ / ☾</button>
  </div>
</div>

<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <span class="tabnum">8:42</span>
    <span class="dots">
      <svg viewBox="0 0 24 24"><path d="M2 22h3v-6H2zM8 22h3V10H8zM14 22h3V6h-3zM20 22h3V2h-3z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 4C7 4 3 8 2 10l10 12L22 10c-1-2-5-6-10-6z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M2 8h16v8H2zM20 11v2"/></svg>
    </span>
  </div>

  <div class="screen">
    <section class="view on" id="v-staff"></section>
    <section class="view" id="v-cat"></section>
    <section class="view" id="v-today"></section>
    <section class="view" id="v-ws"></section>
    <section class="view" id="v-shop"></section>
  </div>

  <nav class="tabbar" id="tabbar"></nav>

  <div class="sheet-back" id="sheetBack"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-head" id="sheetHead"><div class="grab"></div></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<p class="caption">這是<b>韓系定案原型 v2</b>——確認就是這個樣子，我照它去改真正的 app（功能、資料、金流都不動）。</p>

/* ===== 10 分類（生產線流動順序）===== */

var CATBY={}; CATS.forEach(function(c){CATBY[c.key]=c;});

function tileNum(c){
  if(c.num)return '<span class="num tabnum'+(c.num==='0'?' zero':'')+'">'+c.num+'</span>';
  if(c.stat)return '<span class="num small">'+c.stat+'</span>';
  return '<span class="num small">—</span>';
}
function catTile(c){
  var wide=c.wide;
  return '<button class="tile'+(wide?' wide':'')+'" data-cat="'+c.key+'" style="--c:var(--'+c.c+')">'
    +(c.dot!==undefined?'<span class="rd">'+(c.dot||'')+'</span>':'')
    +'<span class="ic">'+svg(c.ic)+'</span>'
    +(wide?'<span class="lab">'+c.title+'<small>'+c.items.map(function(x){return x[0];}).join(' · ')+'</small></span>'
          :tileNum(c)+'<span class="lab">'+c.lab+'</span>')
    +'</button>';
}

function renderStaff(){
  var main=CATS.filter(function(c){return !c.wide;});

      +'<span class="lab">'+it[0]+'</span></button>';
  }).join('');

    +'<div class="cathead" style="--c:var(--'+c.c+')"><span class="ci">'+svg(c.ic)+'</span>'
    +'<div><h2>'+c.title+'</h2><p>'+c.items.length+' tools</p></div></div>'
    +'<div class="grid catgrid">'+tiles+'</div>'
    +'<p class="note">角落有<b style="color:var(--'+c.c+')"> 色點</b> ＝會改資料（收貨、開單…），其餘只是查看。</p>';

    +'<div class="carousel" id="shopcar">'+beans.map(function(b){
      return '<div class="slide" style="--c:var(--'+b.c+')"><div class="ph">'+brandMark()+'</div>'
        +'<span class="tag">'+b.tag+'</span><h3>'+b.h+'</h3><p class="flav">'+b.f+'</p>'
        +'<div class="row"><span class="price">$'+b.p+'</span><button class="add">Add</button></div></div>';
    }).join('')+'</div><div class="dots" id="shopdots"></div>'
    +'<p class="note">豆子<b>左右滑</b>一張一張看（會自動貼齊）。<br>沒登入就是零售客人：滑豆子、加購物車、結帳。</p>';
}

document.getElementById('v-staff').innerHTML=renderStaff();
document.getElementById('v-today').innerHTML=renderToday();

/* tab bar */
var TABS=[['home','Home'],['today','Today'],['refresh','Refresh']];
document.getElementById('tabbar').innerHTML=TABS.map(function(t,i){
  return '<button class="'+(i===0?'on':'')+'" data-tab="'+t[0]+'">'+svg(t[0])+t[1]+'</button>';
}).join('');

/* ===== 切換 ===== */
var segs=document.querySelectorAll('.seg button');
var views={staff:'v-staff',cat:'v-cat',today:'v-today',ws:'v-ws',shop:'v-shop'};
var tabbar=document.getElementById('tabbar');
var tabBtns=tabbar.querySelectorAll('button');
function animateBar(){var f=document.querySelector('#v-staff .fill');if(!f)return;f.style.width='0';
  requestAnimationFrame(function(){requestAnimationFrame(function(){f.style.width=f.dataset.w;});});}
/* 首頁磁貼：短按＝開分類，長按拖曳＝交換位置 */
function bindStaff(){
  var grid=document.querySelector('#v-staff .grid');
  var drag=null,sx=0,sy=0,moved=false;
  grid.querySelectorAll('.tile').forEach(function(tile){
    tile.addEventListener('pointerdown',function(e){
      drag=tile;sx=e.clientX;sy=e.clientY;moved=false;
      try{tile.setPointerCapture(e.pointerId);}catch(_){}
    });
    tile.addEventListener('pointermove',function(e){
      if(drag!==tile)return;
      var dx=e.clientX-sx,dy=e.clientY-sy;
      if(!moved&&Math.hypot(dx,dy)<8)return;
      moved=true;tile.classList.add('drag');
      tile.style.transform='translate('+dx+'px,'+dy+'px) scale(1.06)';
      tile.style.pointerEvents='none';
      var under=document.elementFromPoint(e.clientX,e.clientY);
      tile.style.pointerEvents='';
      var tgt=under&&under.closest('.tile');
      if(tgt&&tgt!==tile&&tgt.parentElement===grid){
        var r=tgt.getBoundingClientRect();
        var after=(e.clientY>r.bottom)||(e.clientY>=r.top&&e.clientX>r.left+r.width/2);
        grid.insertBefore(tile,after?tgt.nextSibling:tgt);
        sx=e.clientX;sy=e.clientY;tile.style.transform='scale(1.06)';
      }
    });
    function end(){
      if(drag!==tile)return;
      var wasMoved=moved;drag=null;
      tile.classList.remove('drag');tile.style.transform='';
      if(!wasMoved)openCat(tile.dataset.cat);
    }
    tile.addEventListener('pointerup',end);
    tile.addEventListener('pointercancel',end);
  });
  var setTile=document.querySelector('#v-staff .tile.wide[data-cat]');
  if(setTile)setTile.addEventListener('click',function(){openCat(setTile.dataset.cat);});
}
/* 今日流：雙向滑——右滑 Start（現在做）· 左滑 Later（待會做）*/
function bindTodaySwipe(){
  document.querySelectorAll('#v-today .swipe').forEach(function(sw){
    var front=sw.querySelector('.front'),cur=0,startX=0,base=0,active=false;
    function setState(s){
      sw.classList.remove('doing','later');if(s)sw.classList.add(s);
      front.style.transform='translateX(0)';cur=0;
    }
    front.addEventListener('pointerdown',function(e){
      active=true;startX=e.clientX;base=cur;front.style.transition='none';
      try{front.setPointerCapture(e.pointerId);}catch(_){}
    });
    front.addEventListener('pointermove',function(e){
      if(!active)return;
      cur=Math.max(-104,Math.min(104,base+(e.clientX-startX)));
      front.style.transform='translateX('+cur+'px)';
    });
    function settle(){
      if(!active)return;active=false;front.style.transition='';
      if(cur>70)setState('doing');
      else if(cur<-70)setState('later');
      else{front.style.transform='translateX(0)';cur=0;}
    }
    front.addEventListener('pointerup',settle);
    front.addEventListener('pointercancel',settle);
    sw.querySelector('.act.start').addEventListener('click',function(){setState('doing');});
    sw.querySelector('.act.later').addEventListener('click',function(){setState('later');});
  });
}
/* 零售：豆子橫滑 dots 跟隨 */
function bindShopCarousel(){
  var car=document.getElementById('shopcar'),dw=document.getElementById('shopdots');
  if(!car||!dw)return;
  var slides=car.querySelectorAll('.slide');
  dw.innerHTML=Array.prototype.map.call(slides,function(_,i){return '<i'+(i===0?' class="on"':'')+'></i>';}).join('');
  var dEls=dw.querySelectorAll('i');
  car.addEventListener('scroll',function(){
    var idx=Math.round(car.scrollLeft/(slides[0].offsetWidth+12));
    dEls.forEach(function(d,i){d.classList.toggle('on',i===Math.min(idx,dEls.length-1));});
  });
}
function openCat(key){
  document.getElementById('v-cat').innerHTML=renderCat(key);
  document.getElementById('cat-back').addEventListener('click',function(){show('staff');});
  show('cat');
}
function show(v){
  closeSheet();
  for(var k in views){document.getElementById(views[k]).classList.toggle('on',k===v);}
  var seg=(v==='ws'||v==='shop')?v:'staff';
  segs.forEach(function(b){b.classList.toggle('on',b.dataset.v===seg);});
  var staffSide=(v==='staff'||v==='cat'||v==='today');
  tabbar.style.display=staffSide?'flex':'none';
  tabBtns.forEach(function(b){b.classList.toggle('on',
    (v==='today')?b.dataset.tab==='today':b.dataset.tab==='home');});
  document.querySelector('.screen').scrollTop=0;
  if(v==='staff')animateBar();
}
segs.forEach(function(b){b.addEventListener('click',function(){show(b.dataset.v);});});
tabBtns.forEach(function(b){b.addEventListener('click',function(){
  if(b.dataset.tab==='today')show('today');
  else if(b.dataset.tab==='home')show('staff');
  else if(b.dataset.tab==='refresh')animateBar();
});});
bindStaff();
bindTodaySwipe();
bindShopCarousel();
animateBar();

/* 點擊回饋 */
document.addEventListener('click',function(e){
  var el=e.target.closest('.tile,.qbtn,.add,.crow');
  if(el)el.animate([{transform:'scale(.94)'},{transform:'scale(1)'}],{duration:170,easing:'ease'});
});

/* ===== 底部抽屜（popup）：點內頁工具磁貼彈出，往上滑展開、往下滑關 ===== */
var sheet=document.getElementById('sheet'),sback=document.getElementById('sheetBack'),
    shead=document.getElementById('sheetHead'),sbody=document.getElementById('sheetBody');
function closeSheet(){sheet.classList.remove('on','full');sback.classList.remove('on');sheet.style.transform='';}
function openSheet(html){sbody.innerHTML=html;sheet.classList.remove('full');sheet.style.transform='';
  sheet.classList.add('on');sback.classList.add('on');sbody.scrollTop=0;}
sback.addEventListener('click',closeSheet);
document.addEventListener('click',function(e){
  var t=e.target.closest('.tile.mini');if(!t)return;
  var label=(t.querySelector('.lab')||{}).textContent||'Tool';
  var col=t.style.getPropertyValue('--c')||'var(--accent)';
  var icon=(t.querySelector('.ic')||{}).innerHTML||'';
  var rows=[['Coffee','Ethiopia Guji'],['Batch','#12 · 12 kg'],['Roast date','Wed 12 Jul'],
            ['Logged by','Sam'],['Notes','—']];
  openSheet('<div class="sh-h" style="--c:'+col+'"><span class="sh-ic">'+icon+'</span>'
    +'<div><h2>'+label+'</h2><p>往上滑看更多 · 往下滑關掉</p></div></div>'
    +rows.map(function(r){return '<div class="sh-row"><span>'+r[0]+'</span><b>'+r[1]+'</b></div>';}).join('')
    +'<button class="sh-btn" style="--c:'+col+'">Save</button>');
});
(function(){
  var sy=0,dy=0,dragging=false;
  shead.addEventListener('pointerdown',function(e){
    dragging=true;sy=e.clientY;dy=0;sheet.style.transition='none';
    try{shead.setPointerCapture(e.pointerId);}catch(_){}
  });
  shead.addEventListener('pointermove',function(e){
    if(!dragging)return;dy=e.clientY-sy;
    if(dy>0)sheet.style.transform='translateY('+dy+'px)';
    else if(!sheet.classList.contains('full'))sheet.style.transform='translateY('+Math.max(dy,-46)+'px)';
  });
  function up(){
    if(!dragging)return;dragging=false;sheet.style.transition='';
    if(dy>110)closeSheet();
    else if(dy<-40&&!sheet.classList.contains('full')){sheet.classList.add('full');sheet.style.transform='';}
    else sheet.style.transform='';
  }
  shead.addEventListener('pointerup',up);
  shead.addEventListener('pointercancel',up);
})();

/* 主題 */
var root=document.documentElement;
document.getElementById('theme').addEventListener('click',function(){
  var cur=root.getAttribute('data-theme');
  var next=cur==='dark'?'light':(cur==='light'?'dark':(matchMedia('(prefers-color-scheme:dark)').matches?'light':'dark'));
  root.setAttribute('data-theme',next);
});
</script>
