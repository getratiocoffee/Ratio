<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ratio · Today</title>
<link rel="manifest" href="/new/manifest.webmanifest">
<link rel="apple-touch-icon" href="/new/icon-192.png">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--surface:#FFFFFF;--ink:#1A1A1A;--muted:#8A8A8A;--accent:#B25E6A;--tint:#F7EBED;--danger:#C0392B;--line:#ECECEC;--line2:#DADADA;--inv:#1A1A1A;--inv-t:#FFFFFF}
@media(prefers-color-scheme:dark){:root:not(.light){--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#C97783;--tint:#33272A;--danger:#E0685A;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C}}
:root.dark{--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#C97783;--tint:#33272A;--danger:#E0685A;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{margin:0;background:transparent;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding-bottom:170px}
/* iOS standalone 怪癖：頁面捲不動時 innerHeight 縮一截→固定底部 bar 往上跳。強制內部 app 頁永遠可捲，innerHeight 才穩定，bar 貼底不跳（多出的高度藏在固定面板後） */
body.appview{min-height:calc(100vh + 1px);min-height:calc(100lvh + 1px)}
.bglogo{position:fixed;inset:0;z-index:-1;pointer-events:none;background:var(--ink);opacity:.055;transform:rotate(-12deg);
  -webkit-mask:url(/logo.png) no-repeat center 40% / min(96vw,440px);
  mask:url(/logo.png) no-repeat center 40% / min(96vw,440px)}
@media(prefers-color-scheme:dark){:root:not(.light) .bglogo{opacity:.09}}
:root.dark .bglogo{opacity:.09}
header{background:var(--bg);color:var(--ink);border-bottom:1.5px solid var(--ink);padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 8px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
/* logo 置中：左右兩欄各 flex:1 平分，中間 logo 恆在正中（右邊不管是購物車或員工狀態字都不影響） */
header .hspace{flex:1}
/* logo mask 上色（跟 .bglogo 同招），夜版自動跟 --ink 變色 */
.brandlogo{width:61px;height:61px;display:block;background:var(--ink);-webkit-mask:url(/logo.png) no-repeat center/contain;mask:url(/logo.png) no-repeat center/contain}
.sbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top,0px);background:#1A1A1A;z-index:100;pointer-events:none}
header .brand{font-family:'Fraunces',serif;font-size:21px;font-weight:700}
header .cnt{flex:1;text-align:right;font-size:14px;color:var(--muted)}
/* 晨報入口：喇叭＝隨時重開 briefing 抽屜；紅點＝有還沒看過的新公告 */
#hbell{position:relative;background:none;border:none;color:var(--muted);padding:6px 4px;margin-left:2px;cursor:pointer;line-height:0;display:none}
#hbell svg{width:19px;height:19px}
#hbdot{position:absolute;top:3px;right:0;width:7px;height:7px;border-radius:50%;background:var(--accent);display:none}
.wrap{padding:14px 22px 0;max-width:520px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;transition:transform .25s,opacity .25s;touch-action:pan-y;user-select:none;-webkit-user-select:none}
/* Today 流卡片 v2（老闆 manager 視角評審）：類別色條＋右上角分類＋小膠囊鈕；.feed 限定不波及商店卡 */
.card.feed{position:relative;border-left:4px solid var(--line);padding:14px 16px;margin-bottom:10px}
/* 兩段式滑卡：wrap 墊底層 Later 鈕，卡片滑開 88px 停住、再點才貪睡（防誤滑） */
.swipewrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:10px}
.swipewrap .card.feed{margin-bottom:0}
.swipeact{position:absolute;top:0;right:0;bottom:0;width:88px;border:none;background:var(--line);color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:0 12px 12px 0}
/* 站別分組組頭：色點＋站名＋張數，點擊摺疊 */
.grphead{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:9px 4px 7px;cursor:pointer;user-select:none;-webkit-user-select:none}
.grphead .garr{font-size:10px;width:12px}
.grphead .gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tundo{background:none;border:none;color:var(--inv-t);font-family:inherit;font-size:14px;font-weight:700;text-decoration:underline;margin-left:10px;cursor:pointer;padding:0}
/* ===== 公開頁（免登入，蓋在最上層）：?fb 回饋表單＋?bean 豆頁——2026-07-10 從 classic 移植，根網址換新殼後由這裡接手實體 QR/email 連結 ===== */
#fb-ov{position:fixed;inset:0;z-index:9999;background:var(--bg);overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:34px 16px}
.fb-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px 22px}
.fb-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.fb-sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.fb-stars{display:flex;gap:8px;margin:4px 0 14px}
.fb-star{font-size:30px;background:none;border:none;cursor:pointer;color:var(--line2);padding:2px;line-height:1}
.fb-star.on{color:#E0B341}
.fb-card textarea,.fb-card input{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:11px;padding:11px 12px;font-size:14px;color:var(--ink);outline:none;font-family:inherit;margin-bottom:10px}
.fb-card textarea{min-height:90px;resize:vertical}
.fb-thanks{text-align:center;padding:30px 0;font-size:15px;line-height:1.7}
.fb-send{display:block;width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.fb-send[disabled]{opacity:.5}
.fb-msg{font-size:12px;color:var(--muted);min-height:14px;margin-bottom:8px}
.fb-msg.err{color:var(--accent)}
#pb-ov{position:fixed;inset:0;z-index:9998;background:var(--bg);overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px 50px}
.pb-card{width:100%;max-width:460px}
.pb-brand{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:14px}
.pb-name{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--ink);line-height:1.2}
.pb-sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.55}
.pb-sec{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
.pb-sec-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.pb-flav{display:flex;gap:8px;flex-wrap:wrap}
.pb-chip{background:var(--tint);color:var(--ink);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600}
.pb-radar svg{display:block;margin:0 auto;max-width:260px;width:100%;height:auto}
.pb-brew-m{margin-top:10px}
.pb-brew-m:first-child{margin-top:0}
.pb-brew-h{font-weight:700;color:var(--accent);font-size:13px;margin-bottom:3px}
.pb-brew-l{font-size:13px;line-height:1.7}
.pb-brew-l b{font-family:ui-monospace,monospace;font-weight:600}
.pb-foot{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;line-height:1.7}
.pb-foot a{color:var(--accent);font-weight:600}
.pb-empty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
.cattag{position:absolute;top:13px;right:14px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.actsm{border:none;border-radius:999px;padding:10px 20px;min-height:44px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;cursor:pointer}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.moresm{background:none;border:none;font-size:13.5px;color:var(--muted);padding:8px 0;font-family:inherit;cursor:pointer}
.qlink{background:none;border:none;color:var(--accent);font-size:inherit;font-family:inherit;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
.s1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.brief{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.card.brief .t{color:var(--inv-t)}
.card.brief .s{color:var(--inv-t);opacity:.72}
.card.brief .tag{color:var(--inv-t);opacity:.65}
.card.brief .more{color:var(--inv-t);opacity:.55}
/* 急件不再整圈紅框：左色條變 accent（renderFeed inline）＋右上角「· now」 */
.card.brief .cattag{color:var(--inv-t);opacity:.65}
.card.brief .moresm{color:var(--inv-t);opacity:.55}
.card.gone{transform:translateX(70%);opacity:0}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;color:var(--muted)}
.tag.warn{color:var(--accent)}
.t{font-size:19px;font-weight:700;line-height:1.3;font-family:'Fraunces',serif}
.s{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.5}
.red{color:var(--danger);font-weight:600}
.fr-red{color:var(--danger);font-weight:600}
.shopc{padding:0;overflow:hidden}
.shopwrap{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:14px;margin:0 -22px;padding:0 22px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.shopwrap::-webkit-scrollbar{display:none}
.shopwrap .shopc{flex:0 0 92%;scroll-snap-align:center;touch-action:pan-x pan-y}
/* 購物車＝右上角小 icon（取代浮動 cartbar，老闆指定）；徽章顯示件數 */
.hcart{position:relative;background:none;border:none;cursor:pointer;padding:6px;color:var(--ink);display:inline-flex;vertical-align:middle}
.hcart b{position:absolute;top:0;right:-2px;background:var(--accent);color:#fff;font-size:10.5px;border-radius:999px;min-width:16px;height:16px;line-height:16px;text-align:center;font-weight:700;font-style:normal;display:none;padding:0 3px;box-sizing:border-box}
/* 毛玻璃導滑箭頭：貼螢幕左右緣、垂直置中在圖片區；到頭的那側自動藏 */
.shoparr{position:fixed;top:42%;z-index:25;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.4);background:rgba(128,128,128,.22);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);color:var(--ink);display:none;align-items:center;justify-content:center;cursor:pointer;padding:0;box-shadow:0 2px 10px rgba(0,0,0,.10)}
.shoparr.l{left:7px}.shoparr.r{right:7px}
.shoparr svg{display:block}
.shopdots{display:flex;justify-content:center;gap:7px;margin:12px 0 6px}
.shopdots span{width:7px;height:7px;border-radius:50%;background:var(--line2)}
.shopdots span.on{background:var(--accent)}
.shoptabs{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px max(env(safe-area-inset-bottom,0px) - 16px,12px);z-index:30}
.shoptabs button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:9px 2px;min-height:44px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.shoptabs button.on{background:var(--inv);color:var(--inv-t);border-color:var(--inv)}
/* 資訊卡圖滿版：CSS 裁掉 Square 安全白邊——內容框在 1200×1200 佔 x217-983/y64-1136，
   裁切盒各留 12px 呼吸邊＝x0 205 w790 / y0 52 h1096。⚠ 數字綁 classic makeSquareCard 預設邊距，改邊距要跟著改 */
.shopimghold{width:100%;aspect-ratio:790/1096;overflow:hidden;position:relative;border-bottom:1px solid var(--line)}
/* 舊的品牌卡帶 Square 安全白邊，放大裁掉 */
.shopimghold .shopimg{position:absolute;width:151.9%;left:-25.95%;top:-4.74%;height:auto;display:block}
/* 照片版四連圖：正方框（直式框會把產區那張的標題裁掉）＋卡上就能左右滑四張
   內描邊界定圖片邊緣——深色下 --surface 與 --bg 同色，深色照片會讓整張卡沉進背景。
   ⚠ 是 inset 不是 border：.card 已有一圈 1px --line，再加外框會變雙框 */
.shopimghold.sq{aspect-ratio:1;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.shopc.photo{border-color:var(--line2)}
.shopimghold.sq .shopimg{position:static;width:100%;height:100%;left:auto;top:auto;object-fit:cover}
.shopslide{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y}
.shopslide::-webkit-scrollbar{display:none}
.shopslide .shopimg{flex:0 0 100%;min-width:0;scroll-snap-align:center}
.shopimgdots{position:absolute;left:0;right:0;bottom:9px;display:flex;justify-content:center;gap:6px;pointer-events:none}
.shopimgdots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);box-shadow:0 0 2px rgba(0,0,0,.35)}
.shopimgdots span.on{background:#fff}
/* 夜版的內描邊要是亮的（深色照片配深色卡） */
@media(prefers-color-scheme:dark){:root:not(.light) .shopimghold.sq{box-shadow:inset 0 0 0 1px rgba(255,255,255,.10)}}
:root.dark .shopimghold.sq{box-shadow:inset 0 0 0 1px rgba(255,255,255,.10)}
/* 商品明細的四連圖：橫向滑，一次一張 */
.shopgal{display:flex;align-items:flex-start;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-top:12px;padding-bottom:2px}
.shopgal::-webkit-scrollbar{display:none}
/* min-width:0 不可拿掉——flex item 預設 min-width:auto，圖會撐成原始 1080px 不肯縮 */
.shopgal img{flex:0 0 82%;min-width:0;width:82%;height:auto;aspect-ratio:1;scroll-snap-align:center;border-radius:12px;border:1px solid var(--line);display:block}
.shopc .shopin{padding:14px 18px 18px}
.shop-chip{background:var(--tint);color:var(--accent);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;display:inline-block;margin:0 6px 6px 0}
.shopc .sl{flex:0 0 84px;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;padding-top:2px}
.fr-green{color:#3F9A66;font-weight:600}
.fr-yellow{color:#C29036;font-weight:600}
.act{display:block;width:100%;border:none;border-radius:12px;padding:13px 16px;min-height:48px;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;margin-top:12px;cursor:pointer}
.act:active{opacity:.8}
.act[disabled]{opacity:.45}
.more{display:block;width:100%;text-align:center;font-size:13.5px;color:var(--muted);padding:10px 0 2px;background:none;border:none;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:15px;line-height:1.7}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:999px;padding:8px 14px;min-height:40px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.chip.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px max(env(safe-area-inset-bottom,0px) - 16px,12px);z-index:30}
nav button{flex:1;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:10px 6px;min-height:44px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
nav button.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.deck{position:fixed;left:0;right:0;bottom:calc(max(env(safe-area-inset-bottom,0px) - 16px,12px) + 64px);background:var(--surface);border-top:1px solid var(--line);padding:12px 22px 10px;z-index:20}
.deck .who{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px}
.deck .who b{color:var(--ink)}
/* judging → decision 區重排（老闆點名）：底線連結改四顆等寬小鍵，觸控目標大、不換行擠壓 */
.qacts{display:flex;gap:8px;max-width:520px;margin:0 auto 8px}
.qact{flex:1;border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:9px 4px;min-height:40px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.qtoggle{display:block;margin:2px auto 8px;background:none;border:1px solid var(--line2);color:var(--muted);border-radius:999px;padding:8px 16px;min-height:36px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.qtoggle.on{border-color:var(--accent);color:var(--accent)}
.deck-btns{display:grid;gap:8px;max-width:520px;margin:0 auto}
.big{border:none;border-radius:12px;padding:13px 16px;min-height:48px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pair button{border-radius:12px;padding:13px;min-height:48px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface)}
.pair .rr{border:1.5px solid var(--ink);color:var(--ink)}
.pair .dn{border:1.5px solid var(--danger);color:var(--danger)}
.qrow{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:10px;cursor:pointer}
.qrow.sel{border:2px solid var(--accent)}
.qrow .t{font-size:18px}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;touch-action:none}
.drawer-bg.show{display:block}
.drawer{position:fixed;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);max-width:476px;margin:0 auto;background:var(--surface);border:1.5px solid var(--ink);border-radius:16px;padding:12px 20px 20px;z-index:50;visibility:hidden;transform:translateY(calc(100% + 120px));transition:transform .28s ease,visibility 0s linear .3s;max-height:78vh;overflow-y:auto;overscroll-behavior:contain}
.drawer.show{visibility:visible;transform:translateY(0);transition:transform .28s ease}
.grab{display:flex;justify-content:center;padding:12px 0 14px;margin:-6px 0 2px;touch-action:none;cursor:grab}
.grab::after{content:'';width:52px;height:5px;border-radius:99px;background:var(--line2)}
.dl{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
.dl span:first-child{color:var(--muted)}
.dl span.red{color:var(--danger)}
.dclose{display:block;width:100%;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px 14px;min-height:44px;font-size:15px;font-weight:700;font-family:inherit;margin-top:16px;cursor:pointer}
.pk-row{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:11px 14px;min-height:44px;font-size:15px;font-weight:600;font-family:inherit;margin-top:9px;cursor:pointer}
.pk-row.on{border-color:var(--accent);color:var(--accent)}
.dta{width:100%;min-height:110px;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;resize:vertical}

function dPlus(n){var t=new Date();t.setDate(t.getDate()+n);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function mondayStr(){
  var t=new Date();t.setDate(t.getDate()-((t.getDay()+6)%7));
  return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}
function todayShifts(){
  var dk=['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  var sh=(DB.roster&&Array.isArray(DB.roster.shifts))?DB.roster.shifts:[];
  return sh.filter(function(s){return s.day===dk&&s.name&&String(s.name).trim();}).sort(function(a,b){return String(a.start||'')<String(b.start||'')?-1:1;});
}
/* 手上的豆（待杯測）：pending_cupping、沒判定、不在 QC 佇列——Today Cup 卡與 QC 頁 to-cup 區共用 */
function toCupList(){
  var inQC={};QCQ.forEach(function(x){inQC[String(x.r.id)]=1;});
  return (DB.roasts||[]).filter(function(r){return r.status==='pending_cupping'&&!r.qc&&!inQC[String(r.id)];});
}
function matchRoast(s){
  var nm=String(s.sample_id||'').trim().toLowerCase();if(!nm&&!s.bean_id)return null;
  var cands=DB.roasts.filter(function(r){
    if(s.bean_id&&r.bean_id)return String(r.bean_id)===String(s.bean_id);
    return String(r.bean_name||'').trim().toLowerCase()===nm;});
  if(!cands.length)return null;
  if(s.roast_date){var ex=cands.find(function(r){return (r.roast_date||'')===s.roast_date;});if(ex)return ex;}
  return cands[0];
}

  /* 晨報卡退役（2026-07）：改為每日自動彈出的 briefing 抽屜（openBriefSheet）——班表摘要收進 BRIEF 全域；
     統計數字不再重複播報（分組組頭已有計數） */

  /* finance 常駐導向卡：finance 的今日流沒有營運卡（設計如此），這張帶她直達薪務；不進 snooze（pin） */

  /* 烘豆需求卡：Confirmed/Roasting 品項同名合併，**先看熟豆貨架只提差額**（老闆的生產線：接單→看熟豆庫存→沒貨才烘）；
     貨架＝roasts.remaining_kg 同名加總（QC 打槍的 reroast/downgrade 批不算可賣）；全夠貨＝不出卡 */

  if(demOrder.length){

    var qcHot=tocup.some(function(r){return daysSince(r.roast_date)>2;})||QCQ.some(function(x){return daysSince(x.r.roast_date)>2;});
    var bits=[];
    if(tocup.length)bits.push(tocup.length+' in hand');

      act:'Open QC →',
      det:tocup.map(function(r){return [r.bean_name||'—','to cup · roasted '+(fmtD(r.roast_date)||'—')];})
        .concat(QCQ.map(function(x){return [x.s.sample_id||'—','awaiting verdict · roasted '+(fmtD(x.r.roast_date)||'—')];})),
      det2:'Later',roles:['director','roaster'],kind:'qcnav'});

      act:'List on Square…',det:[['Flavour',f||'—'],['Process',s.process||'—'],['Flavour locked',s.flavour_locked?'yes':'not yet']],
      det2:'Later',roles:['director'],kind:'list',ref:s});
  });
  /* 鎖風味聚合卡：已上架但風味沒鎖（鎖定的紀錄才會優先上資訊卡） */
  if(LOCKQ.length){
    out.push({id:'locks',st:'Shelf',hot:0,t:'Lock flavours — '+LOCKQ.length+' coffee'+(LOCKQ.length>1?'s':''),
      s:LOCKQ.slice(0,3).map(function(x){return esc(x.sample_id);}).join(' · ')+(LOCKQ.length>3?' · +'+(LOCKQ.length-3)+' more':''),
      act:'Lock…',det:LOCKQ.map(function(x){return [x.sample_id,(x.features||[]).slice(0,3).join(', ')||'no flavour notes'];}),
      det2:'Later',roles:['director'],kind:'locks',ref:LOCKQ});

  shipQ.forEach(function(o){

    out.push({id:'ship:'+o.id,st:whOrd(o,c)?'Wholesale':'Orders',hot:1,t:'Ship #'+String(o.order_no||'—').padStart(4,'0')+' · '+((c&&c.name)||'Walk-in'),
      s:esc(itemsLine(o))+(o.payment_status!=='paid'?' · <span class=red>unpaid</span>':''),
      act:'Dispatch…',det:[['Items',itemsLine(o)||'—'],['Payment',o.payment_status==='paid'?'paid':'awaiting']],
      det2:'Cancel order',roles:['director','retail','staff'],kind:'ship',ref:o});
  });
  payQ.forEach(function(o){
    var c=custById(o.customer_id);var od=o.payment_status==='overdue';
    out.push({id:'pay:'+o.id,st:whOrd(o,c)?'Wholesale':'Transaction',hot:od?1:0,u:1,t:money(o.total)+' · '+((c&&c.name)||'Walk-in'),

     全勾完＝收工，卡片自己消失。清單空時只給 lead 一張引導卡 */
  if(new Date().getHours()>=CLOSING_HOUR){
    var ckm2=closingMap(),ckDone=CLOSING_ITEMS.filter(function(x){return ckm2[x.id];}).length;

  /* 回購提醒卡（社群曝光 Phase 4：回購提醒附評論連結）：零售客最後一單 28–120 天前 → 提醒卡；
     一天最多 2 張（最久沒買的優先）；送過記 NUDGE_LOG（app_state），同一輪（沒有新單）60 天內不再出；
     批發單/shop 客戶/沒 email 的不算 */
  var lastOrd={};
  DB.orders.forEach(function(o){
    if(!o.customer_id||o.channel==='wholesale')return;
    var d=String(o.created_at||'').slice(0,10);if(!d)return;
    var k=String(o.customer_id);
    if(!lastOrd[k]||d>lastOrd[k].d)lastOrd[k]={d:d,o:o};
  });
  var nudges=[];
  DB.customers.forEach(function(c){
    if(!c.email||c.type==='shop')return;
    var le=lastOrd[String(c.id)];if(!le)return;
    var days=Math.floor((Date.now()-new Date(le.d+'T00:00:00'))/864e5);
    if(days<28||days>120)return;
    var ng=NUDGE_LOG[String(c.id)];
    if(ng&&ng>=le.d&&Math.floor((Date.now()-new Date(ng+'T00:00:00'))/864e5)<60)return;
    nudges.push({c:c,days:days,o:le.o,d:le.d});
  });
  nudges.sort(function(a,b){return b.days-a.days;}).slice(0,2).forEach(function(n){
    var wk=Math.round(n.days/7);
    /* 「上次買了什麼」不列 Delivery fee 假品項（信裡 edge 也同樣排除） */
    var goods={items:(Array.isArray(n.o.items)?n.o.items:[]).filter(function(it){return !(!it.grams&&/^delivery fee$/i.test(String(it.name||'').trim()));})};
    out.push({id:'ng:'+n.c.id,st:'Customers',hot:0,t:'Fresh batch nudge — '+esc(n.c.name||'customer'),
      s:'last order '+wk+'w ago · '+esc(itemsLine(goods).slice(0,60)||'—'),
      act:'Send reminder',

      det2:'Later',roles:['director'],kind:'nudge',ref:n});
  });
  ITEMS=out.filter(function(i){return !sn[i.id];});

    var folded=FOLDED.has(st);

    if(!folded)h+=grp.map(cardHTML).join('');
  }
  if(grabs.length){
    var gf=FOLDED.has('__grabs');
    h+='<button class="grphead" data-grp="__grabs"><span class="garr">'+(gf?'▸':'▾')+'</span>'
      +'<span class="gdot" style="background:var(--line2)"></span>Up for grabs · '+grabs.length+'</button>';
    if(!gf)h+=grabs.map(cardHTML).join('');
  }
  h+=(SNOOZED_SESSION?'<button class="more" id="unsnooze">'+SNOOZED_SESSION+' snoozed until tomorrow · undo</button>':'')
    +'<div class="note" id="ctxline">'+CTXS[ctxIdx].label+' · swipe right = do · left = later</div>';
  m.innerHTML=h;
  bindBars(m);
  var un=$('unsnooze');if(un)un.addEventListener('click',undoSnooze);
  m.querySelectorAll('[data-do]').forEach(function(b){b.addEventListener('click',function(){if(Date.now()-_drag<300)return;runAction(b.dataset.do,b);});});
  m.querySelectorAll('[data-more]').forEach(function(b){b.addEventListener('click',function(){if(Date.now()-_drag<300)return;openDetails(b.dataset.more);});});
  m.querySelectorAll('[data-snz]').forEach(function(b){b.addEventListener('click',function(){snoozeCard(b.dataset.snz);});});
  m.querySelectorAll('.grphead').forEach(function(g){g.addEventListener('click',function(){

  /* 派工膠囊：點一下輪到下一個人（anyone → 班表順序 → 回 anyone），存 app_state 全店同步 */
  m.querySelectorAll('[data-asg]').forEach(function(b){b.addEventListener('click',function(){
    if(b.disabled)return;
    var id=b.dataset.asg,cyc=[null].concat(assignCycle());
    var cur=am[id]||null,ix=cyc.indexOf(cur),next=cyc[(ix+1)%cyc.length];
    if(next)am[id]=next;else delete am[id];

  if(!ASSIGN_MODE)list.concat(grabs).forEach(function(i){var el=document.getElementById('c-'+i.id);if(el)attachSwipe(el,i.id);});
  var cl=$('ctxline');if(cl)cl.addEventListener('click',function(){ctxIdx=(ctxIdx+1)%CTXS.length;render();toast(CTXS[ctxIdx].label);});
  /* 每天第一次進 app：自動彈 briefing（今天看過就不吵；本次啟動只彈一次） */

/* 貪睡統一入口：點 Later 鈕（或抽屜 det2）走這裡——toast 直接給 Undo */

/* ===== 真動作 ===== */
async function runAction(id,btn){
  if(!canWrite()){roToast();return;}
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      logAct('task done',i.t);
      dropCard(id);toast('Task done ✓');return;
    }
    if(i.kind==='qcnav'){view='qc';render();return;}
    if(i.kind==='closing'){if(CLOSING_ITEMS.length)openClosingSheet();else openClosingEdit();return;}
    if(i.kind==='paynav'){openPayrollSheet();return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted — no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      logAct('marked paid',i.t,money(i.ref.total));
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid ✓ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid ✓ receipt sent');return;
    }
    if(i.kind==='nudge'){
      var nc=i.ref.c;
      if(!confirm('Email a fresh-batch reminder to '+(nc.name||'this customer')+' ('+nc.email+')?\nIt carries the shop link and the Google review link.'))return;
      if(btn){btn.disabled=true;btn.textContent='Sending…';}
      await callFn('send-email',{action:'repurchase_nudge',customer_id:nc.id});
      /* 提醒紀錄 read-modify-write 進 app_state（照 rtl_dot 慣例）；寫失敗不擋——頂多明天再看到卡 */
      try{
        var ngq=await sb.from('app_state').select('value').eq('key','nudge_log').maybeSingle();
        var ngm=(ngq.data&&ngq.data.value&&typeof ngq.data.value==='object')?ngq.data.value:{};
        ngm[String(nc.id)]=todayKey();
        await sb.from('app_state').upsert({key:'nudge_log',value:ngm,updated_at:new Date().toISOString()},{onConflict:'key'});
        NUDGE_LOG=ngm;
      }catch(e){}
      dropCard(id);toast('Reminder sent ✓');return;
    }
    if(i.kind==='dialin'){openDialinForm(i);return;}
    if(i.kind==='roastlog'){openRoastSheet(Array.isArray(i.ref)?i.ref:null);return;}
    if(i.kind==='list'){await openListSheet(i);return;}
    if(i.kind==='locks'){openLocksSheet(i);return;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=i.act;}
    alert((i.act||'Action')+' failed: '+(e&&e.message||e));
  }
}
async function acceptOrder(i,btn){
  var o=i.ref;
  if(btn){btn.disabled=true;btn.textContent='Accepting…';}
  try{
    if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
      try{await callFn('sync-to-square',{action:'payment_link',order_id:o.id});}catch(e){console.error('payment link',e);}
    }
    var u=await sb.from('orders').update({status:'Confirmed'}).eq('id',o.id);
    if(u.error)throw new Error(u.error.message);
    o.status='Confirmed';
    logAct('accepted order',i.t);
    try{await callFn('send-email',{action:'order_confirmation',order_id:o.id});toast('Accepted ✓ confirmation sent');}
    catch(e){toast('Accepted ✓ but email failed');}
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Accept';}
    alert('Accept failed: '+(e&&e.message||e));
  }
}
async function qcVerdict(r,v,btn,cardId,s){

  if(u.error){if(btn){btn.disabled=false;}alert('QC failed: '+u.error.message);return;}

  var locked=false,lockFail=false;

/* ===== 抽屜 ===== */
/* 彈窗開著時鎖住背景（iOS 的 overflow:hidden 靠不住 → body 釘住＋記捲動位置，關閉時復原）；
   openDrawerHTML 會被重畫連呼，鎖要冪等——只在第一次開時記位置 */
var _bgLockY=null;
function lockBg(){
  if(_bgLockY!=null)return;
  _bgLockY=window.scrollY||0;
  document.body.style.position='fixed';
  document.body.style.top=(-_bgLockY)+'px';
  document.body.style.left='0';document.body.style.right='0';document.body.style.width='100%';
}
function unlockBg(){
  if(_bgLockY==null)return;
  document.body.style.position='';document.body.style.top='';
  document.body.style.left='';document.body.style.right='';document.body.style.width='';
  window.scrollTo(0,_bgLockY);
  _bgLockY=null;
}
function openDrawerHTML(h){var d=$('drawer');d.innerHTML='<div class="grab"></div>'+h;d.classList.add('show');$('dbg').classList.add('show');lockBg();attachDrawerDrag();}
/* 把手往下拉＝關閉（拉過 90px 放手才關，不足彈回；把手 touch-action:none 不搶內容捲動） */
function attachDrawerDrag(){
  var d=$('drawer'),g=d.querySelector('.grab');if(!g)return;
  var y0=null,dy=0;
  /* iOS Safari 對捲動容器內的 touch-action:none 不一定買帳——手指一動就當捲動、pointercancel 把拖曳殺掉。
     非 passive 的 touchmove preventDefault 硬擋捲動，讓 pointermove 一路活著 */
  g.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  g.addEventListener('pointerdown',function(e){
    y0=e.clientY;dy=0;
    try{g.setPointerCapture(e.pointerId);}catch(err){}
    d.style.transition='none';
  });
  g.addEventListener('pointermove',function(e){
    if(y0==null)return;
    dy=Math.max(0,e.clientY-y0);
    d.style.transform='translateY('+dy+'px)';
  });
  function fin(){
    if(y0==null)return;
    d.style.transition='';d.style.transform='';

/* 掃描 tracking：iOS Safari 無 BarcodeDetector → 按需載 html5-qrcode（QR＋一維條碼皆可），
   相機掃到就填回輸入框；不寫 DB。相機需 https＋授權；不支援時走防呆保留手動輸入。 */
async function openTrackScan(onResult){
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){alert('This browser cannot use the camera here — please type the tracking number in.');return;}
  try{if(!window.Html5Qrcode)await loadScriptOnce('https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js');}
  catch(e){alert('Scanner could not load — check the connection, or type the number in.');return;}
  var ov=document.createElement('div');ov.id='scanov';
  ov.innerHTML='<div class="scanbox"><div id="scanview"></div></div><div class="scannote">Point the camera at the barcode or QR on the label</div><button class="scancancel" id="scancancel">Cancel</button>';
  document.body.appendChild(ov);
  var qr=new Html5Qrcode('scanview');var done=false;
  function cleanup(){try{qr.stop().then(function(){try{qr.clear();}catch(e){}}).catch(function(){});}catch(e){}if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);}
  var cx=document.getElementById('scancancel');if(cx)cx.addEventListener('click',cleanup);
  try{
    await qr.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:260}},function(txt){
      if(done)return;done=true;cleanup();
      if(onResult)onResult(String(txt||'').trim());
      toast('Scanned ✓');
    },function(){});
  }catch(e){cleanup();alert('Cannot open the camera — allow camera access in your browser, or type the number in.');}
}

        if(p.process)csz=Math.min(csz,_cardFit(x,p.process,'400',34,20,TW2*0.42,'Inter, sans-serif'));
      });

        var pct=(p.pct||p.pct===0)?String(p.pct)+'%':'';
        if(pct){x.fillStyle=BERRY;x.font='700 '+csz+'px Inter, sans-serif';x.fillText(pct,Lx,ry);}

        }

      });
    }else{
      var o=card.origin||{},rows=[];

      if(o.altitude)rows.push(['Altitude',o.altitude+' MASL']);
      if(o.region)rows.push(['Region',o.region]);
      var csz2=34;
      rows.forEach(function(r){csz2=Math.min(csz2,_cardFit(x,String(r[1]),'400',34,20,TW2-290,'Inter, sans-serif'));});
      rows.forEach(function(r){

        x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz2+'px Inter, sans-serif';
        x.fillText(String(r[1]),Rv,ry);

      });

    }
    var hasCup=!!(card.cupScores&&card.cupScores.some(function(o){return o.n!=null;}));
    if(hasCup){
      var radarTop=ry+26,avail=zoneBot-radarTop-16;
      var R=Math.min(150,Math.floor(avail/2-36));
      _cardRadar(x,W/2,radarTop+avail/2+4,R,card.cupScores,band);
    }
    x.restore();
    _rrPath(x,CX,CY,CW,CH,CR);x.lineWidth=3;x.strokeStyle=INK;x.stroke();
    return cv.toDataURL('image/png').split(',')[1];
  }
  
var RTL_DOTCOL={y:'#E0B341',b:'#3D7DBF',d:'#22386B',r:'#C0392B'};
function cardSlug(n){return String(n||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function _b64ToBlob(b64,type){var bin=atob(b64),len=bin.length,arr=new Uint8Array(len);for(var i=0;i<len;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:type||'image/png'});}
var _dotsMap=null;
async function cardDots(){
  if(_dotsMap)return _dotsMap;
  _dotsMap={};
  try{var r=await sb.from('app_state').select('value').eq('key','rtl_dot').maybeSingle();
    var v=r&&r.data&&r.data.value;
    if(typeof v==='string')v=JSON.parse(v);
    if(v&&typeof v==='object')_dotsMap=v;}catch(e){}
  return _dotsMap;
}
function dotColorFor(name,dots){
  return (dotKeyFor(name,dots)&&RTL_DOTCOL[dotKeyFor(name,dots)])||'';
}
function dotKeyFor(name,dots){
  var nm=String(name||'').trim();if(!nm||!dots)return '';
  if(dots[nm])return dots[nm];
  var lk=nm.toLowerCase(),key='';
  Object.keys(dots).forEach(function(k){if(!key&&String(k).trim().toLowerCase()===lk)key=dots[k];});
  return key||'';
}
/* 杯測時上色：read-modify-write app_state rtl_dot（值形狀＝扁平 {豆名:'y|b|r|d'}，同 classic appStatePush） */
async function saveDotFor(name,key){
  var nm=String(name||'').trim();if(!nm)return;
  var r=await sb.from('app_state').select('value').eq('key','rtl_dot').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  /* 同名不同大小寫的舊鍵一併清掉，避免雙鍵打架 */
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===nm.toLowerCase()&&k!==nm)delete v[k];});
  if(key)v[nm]=key;else delete v[nm];
  var u=await sb.from('app_state').upsert({key:'rtl_dot',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
  _dotsMap=v; /* 快取跟上，畫卡立即吃新色 */
}
async function cardDataFor(s,blendMap,dots){
  var SMAP={fragrance:'Aroma',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
  var cup=['fragrance','acidity','sweetness','body','aftertaste'].map(function(k){return {key:k,label:SMAP[k],n:(s&&s[k]!=null)?s[k]:null};});
  var rdate=s.roast_date||null;
  if(!rdate){
    var hit=null;
    (DB.roasts||[]).forEach(function(r){if(!hit&&s.bean_id&&r.bean_id&&String(r.bean_id)===String(s.bean_id))hit=r.roast_date;});
    (DB.roasts||[]).forEach(function(r){if(!hit&&String(r.bean_name||'')===(s.sample_id||''))hit=r.roast_date;});
    rdate=hit;
  }
  var data={name:s.sample_id||'',color:dotColorFor(s.sample_id,dots),
    flavour:(s.features||[]).filter(Boolean).slice(0,3),cupScores:cup,
    comment:(s.comment||'').trim(),roasted:rdate?fmtD(rdate):''};
  var bd=blendMap[String(s.sample_id||'').trim().toLowerCase()];
  if(bd){
    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    try{
      var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
      var pool=q.data||[];
      var proc=String(s.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* 每支豆現場重畫卡片 → 上傳 mail-assets（upsert + cache-bust）→ 回傳 {小寫名: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

/* ===== Pack 逐項打勾（每勾一項即存 pack_state；全勾才能按 Ready）===== */
function openPackSheet(i){
  var o=i.ref;var items=Array.isArray(o.items)?o.items:[];
  /* 批發單的 Delivery fee 是 items 假品項（grams:null，金額對帳用）——不用裝箱，打勾清單與全勾判定都跳過；
     pack_state 照舊用原始 index 當鍵，跳過不影響舊資料 */
  var packIdx=[];items.forEach(function(it,ix){
    if(!it.grams&&/^delivery fee$/i.test(String(it.name||'').trim()))return;
    packIdx.push(ix);
  });
  var ps=(o.pack_state&&typeof o.pack_state==='object')?Object.assign({},o.pack_state):{};
  function allOn(){return packIdx.length>0&&packIdx.every(function(ix){return !!ps[String(ix)];});}
  function paint(){
    openDrawerHTML('<div class="t" style="font-size:19px">'+i.t.replace('Pack ','Packing ')+'</div>'
      +'<div class="s" style="margin-top:2px">tap each item as it goes in the box</div>'
      +packIdx.map(function(ix){
        var it=items[ix],on=!!ps[String(ix)];
        return '<button class="pk-row'+(on?' on':'')+'" data-pk="'+ix+'">'+(on?'✓ ':'')+esc((it.grams?it.grams+'g ':'')+(it.name||'')+(it.qty>1?' ×'+it.qty:''))+'</button>';
      }).join('')
      +'<button class="act" id="pk-ready"'+(allOn()?'':' disabled')+'>All packed — move to Ready</button>'
      +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
    document.querySelectorAll('#drawer [data-pk]').forEach(function(el){el.addEventListener('click',async function(){
      var k=String(el.dataset.pk);
      if(ps[k])delete ps[k];else ps[k]=true;
      o.pack_state=ps;
      paint();
      var u=await sb.from('orders').update({pack_state:ps}).eq('id',o.id);
      if(u.error){alert('Save failed: '+u.error.message);}
    });});
    var pr=$('pk-ready');if(pr)pr.addEventListener('click',async function(){
      pr.disabled=true;pr.textContent='Saving…';
      var u=await sb.from('orders').update({pack_state:ps,status:'Ready'}).eq('id',o.id);
      if(u.error){pr.disabled=false;pr.textContent='All packed — move to Ready';alert('Save failed: '+u.error.message);return;}
      logAct('packed',i.t);
      closeDrawer();toast('Ready to ship ✓');await reload();
    });
    var cl=$('d-cl');if(cl)cl.addEventListener('click',closeDrawer);
  }
  paint();
}

var ACT_ROWS=[],ACT_PAGE=0;
async function openActivitySheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Activity</div><div class="empty">Loading…</div>');
  ACT_ROWS=[];ACT_PAGE=0;

async function actLoadMore(){
  var q=await sb.from('activity_log').select('*').order('ts',{ascending:false}).range(ACT_PAGE*50,ACT_PAGE*50+49);
  if(q.error){
    openDrawerHTML('<div class="t" style="font-size:19px">Activity</div><div class="empty">Load failed: '+esc(q.error.message)+'</div>'
      +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
    $('d-cl').addEventListener('click',closeDrawer);return;

  ACT_ROWS=ACT_ROWS.concat(q.data||[]);

  paintActivity((q.data||[]).length===50);

function paintActivity(more){
  var days={},order=[];
  ACT_ROWS.forEach(function(r){var d=String(r.ts).slice(0,10);if(!days[d]){days[d]=[];order.push(d);}days[d].push(r);});
  var today=todayKey();
  var h='<div class="t" style="font-size:19px">Activity</div>'
    +'<div class="s" style="margin-top:2px">who did what — newest first</div>';
  if(!ACT_ROWS.length)h+='<div class="empty">Nothing logged yet — actions appear here as the team works</div>';
  order.forEach(function(d){
    h+='<div class="dlab">'+(d===today?'Today':fmtD(d))+'</div>';
    days[d].forEach(function(r){
      var t=new Date(r.ts),hm=t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');

        +'<span style="flex:1;text-align:left"><b>'+esc(r.who||'—')+'</b> '+esc(r.action)+(r.ref?' · '+esc(r.ref):'')
        +(r.note?' <span style="color:var(--muted)">· '+esc(r.note)+'</span>':'')+'</span></div>';
    });

  h+='<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>';

async function saveNewOrder(){
  var rows=NO.items.filter(function(it){return (it.name||'').trim();});
  if(!rows.length){toast('Pick at least one coffee');return;}
  if(rows.some(function(it){return !(Number(it.price)>0);})){toast('Set a price for each item');return;}
  var b=$('no-save');b.disabled=true;b.textContent='Creating…';
  try{
    /* order_no = 全表 max+1（含已取消的，避免撞號） */
    var mx=await sb.from('orders').select('order_no').order('order_no',{ascending:false}).limit(1);
    var maxNo=(mx.data&&mx.data[0]&&mx.data[0].order_no)||0;
    var items=rows.map(function(it){return {name:it.name,grams:it.grams,qty:it.qty,price:Number(it.price)};});
    var total=0;items.forEach(function(it){total+=it.price*it.qty;});
    var ins=await sb.from('orders').insert({order_no:maxNo+1,channel:'manual',status:'New',
      customer_id:NO.cust||null,items:items,total:total,currency:'AUD',
      payment_method:NO.pm,payment_status:'pending_payment'});
    if(ins.error)throw new Error(ins.error.message);
    closeDrawer();toast('Order #'+String(maxNo+1).padStart(4,'0')+' created ✓');
    await reload();view='feed';render();
  }catch(e){b.disabled=false;b.textContent='Create order';alert('Create failed: '+(e&&e.message||e));}
}

/* 新鮮度規則（老闆定，2026-07-07）：<14 天紅（還在養豆）、14–28 天綠（最佳）、>28 天黃（老化）；>60 天晨報推警示 */
/* 新鮮度三段（老闆定，與 Labels 的 ready brew date 一致）：
   烘後 <3週(21d)=aging（還沒好）｜3–6週(21–42d)=ready（最佳）｜>6週(42d)=fading（走下坡）。
   一個門檻餵整個 app（貨架＋客戶店面）；>60 天再加「re-roast?」提示。 */
var SHELF_FRESH_REST=21, SHELF_FRESH_PRIME=42, SHELF_STALE_DAYS=60;
/* 上架代表樣品：鎖定的優先（同名多處理法時＝實際在賣的那個處理法，例如三個 Danche） */
function shelfSampleFor(nm){
  var k=String(nm||'').trim().toLowerCase();
  var pool=(DB.samples||[]).filter(function(s){return String(s.sample_id||'').trim().toLowerCase()===k;});
  return pool.find(function(s){return s.flavour_locked;})||pool[0]||null;
}
function shelfLatestRoast(nm){
  var best=null;
  /* 先照上架樣品的 bean_id 找同一支生豆批的烘豆（同名不同處理法不再互相污染） */
  var s=shelfSampleFor(nm);
  if(s&&s.bean_id){
    (DB.roasts||[]).forEach(function(r){
      if(String(r.bean_id||'')!==String(s.bean_id)||!r.roast_date)return;
      if(!best||r.roast_date>best)best=r.roast_date;
    });
    if(best)return best;
  }
  var k=String(nm||'').trim().toLowerCase();
  (DB.roasts||[]).forEach(function(r){
    if(String(r.bean_name||'').trim().toLowerCase()!==k||!r.roast_date)return;
    if(!best||r.roast_date>best)best=r.roast_date;
  });
  return best;
}
function shelfFreshness(nm){
  var d=shelfLatestRoast(nm);
  if(!d)return {txt:'no roast date',cls:'',days:null};
  var age=daysSince(d);
  if(age<SHELF_FRESH_REST)return {txt:'roasted '+age+'d — aging',cls:'fr-yellow',days:age};
  if(age<=SHELF_FRESH_PRIME)return {txt:'roasted '+age+'d — ready',cls:'fr-green',days:age};
  return {txt:'roasted '+age+'d — fading'+(age>SHELF_STALE_DAYS?' · re-roast?':''),cls:'fr-red',days:age};
}

     QC 閘門濾掉，掛著 Live 客人卻看不到，且沒有任何流程會去處理它——整顆泡泡標紅提醒去鎖風味 */

    var sold=!!m.rtl_sold[nm]||x.status==='paused';if(sold)soldN++;
    var fr=shelfFreshness(nm);
    var rep=shelfSampleFor(nm);
    var col=uiDot(dotColorFor(nm,dots));
    var inQC=!!inQCSet[nm.toLowerCase()];
    var unlocked=!inQC&&!(rep&&rep.flavour_locked);if(unlocked)hidN++;
    return '<div class="hit" data-shelf="'+esc(nm)+'"><span><div class="t" style="font-size:16px">'
      +(col?'<span style="color:'+col+';font-size:12px">●</span> ':'')+esc(nm)
      +(rep&&rep.process?' <span style="color:var(--muted);font-weight:400;font-size:12.5px;font-family:Inter,sans-serif">'+esc(rep.process)+'</span>':'')+'</div>'
      +'<div class="s">'+(price!=null?g+'g '+money(price):'<span class="red">no price</span>')
      +' · <span class="'+fr.cls+'"'+(fr.cls?'':' style="color:var(--muted)"')+'>'+esc(fr.txt)+'</span>'
      +(inQC?' · <span class="fr-yellow">re-checking in QC</span>':'')
      +(unlocked?' · <span class="red">not in shop — flavour unlocked</span>':'')+'</div></span>'
      /* 膠囊：售罄＝紅；否則 Live，但有附屬狀態（QC 重審／風味沒鎖）就熄燈 */

  }).join('');
  var errs=(DB.syncs||[]).filter(function(x){return x.status&&x.status!=='synced'&&x.status!=='paused';});
  var toList=ITEMS.filter(function(i){return i.kind==='list';});
  openDrawerHTML('<div class="t" style="font-size:19px">Coffee Info</div>'
    +'<div class="s" style="margin-top:2px">'+live.length+' live on Square'+(soldN?' · <span class="red">'+soldN+' sold out</span>':'')
    +(hidN?' · <span class="red">'+hidN+' not in shop — flavour unlocked</span>':'')+' · tap a coffee for flavour and dossier</div>'
    +(rows||'<div class="empty">Nothing on the shelf yet</div>')
    +(errs.length?'<div class="dlab">Sync problems</div>'+errs.map(function(x){return '<div class="dl"><span>'+esc(x.bean_id||'—')+'</span><span class="red">'+esc(x.status)+'</span></div>';}).join(''):'')
    +(toList.length?'<div class="dlab">Ready to list</div>'+toList.map(function(i,ix){
        return '<div class="dl" data-tolist="'+ix+'" style="cursor:pointer"><span>'+esc(i.ref.sample_id||'—')+'</span><span style="color:var(--accent)">QC passed · tap to list ›</span></div>';}).join(''):'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  document.querySelectorAll('#drawer [data-shelf]').forEach(function(el){el.addEventListener('click',function(){openShelfBeanDetail(el.dataset.shelf,m);});});
  document.querySelectorAll('#drawer [data-tolist]').forEach(function(el){el.addEventListener('click',function(){var it=toList[+el.dataset.tolist];if(it)openListSheet(it);});});

  var recipe=bd?(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){
    var g=greenForPart(p);
    return {pct:parseFloat(p.pct),bean:p.bean,

  var sc={fragrance:s.fragrance,acidity:s.acidity,sweetness:s.sweetness,body:s.body,aftertaste:s.aftertaste};
  var fr=shelfFreshness(nm);
  var syncRow=(DB.syncs||[]).find(function(x){return String(x.bean_id||'').trim().toLowerCase()===nm.toLowerCase();});
  var price=m.rtl_price[nm],g=m.rtl_g[nm]||250,szc=m.rtl_sizes[nm]||{},

  var rdate=null;try{rdate=shelfLatestRoast(nm);}catch(e){}
  /* 順序照老闆定：名字 → 烘豆日＋天數/熟成 → 規格價格 → 雷達 → 風味 → 履歷 */

    +(s.flavour_locked?'':' · flavour unlocked')
    +((QCQ||[]).some(function(q){return String(q.s.sample_id||'').trim().toLowerCase()===nm.toLowerCase();})?' · <span class="fr-yellow">re-checking in QC</span>':'')+'</div>'
    +'<div style="margin-top:10px">'

    +(szc.g1000?'<div class="dl"><span>1kg</span><span>'+money(szc.g1000)+'</span></div>':'')
    +'</div>'

    +'<div class="dlab" style="color:'+col+'">Tasting notes</div>'
    +(feats.length?'<div style="margin-top:2px">'+feats.map(function(f){return '<span class="shop-chip">'+esc(f)+'</span>';}).join('')+'</div>':'')
    /* 拼配沒杯測評語時退回配方的 note（同 cardDataFor 的品牌卡邏輯） */
    +(s.comment||(bd&&bd.note)?'<div class="s" style="font-style:italic;margin-top:6px">“'+esc(s.comment||bd.note)+'”</div>':'')

  $('sb-requeue').addEventListener('click',async function(){

    var btn=this;btn.disabled=true;btn.textContent='Sending…';

var PROC_ZH={washed:'水洗',natural:'日曬',honey:'蜜處理',anaerobic:'厭氧',
  'anaerobic natural':'厭氧日曬','anaerobic washed':'厭氧水洗','wet hulled':'濕刨','carbonic maceration':'二氧化碳浸漬'};
function promoCaptions(nm,info,feats,comment,price,g,proc){
  function get(lab){var r=(info||[]).find(function(x){return x[0]===lab;});return r?String(r[1]):'';}
  var origin=get('Origin'),variety=get('Variety');

  var priceLine=(price!=null)?('$'+centAmt(price)+' / '+g+'g'):'';
  var en='On the shelf — '+nm+'\n';
  var line2=[origin,proc?proc+' process':'',variety].filter(Boolean).join(' · ');
  if(line2)en+=line2+'\n';
  if(feats.length)en+='Cupping notes: '+feats.join(', ')+'\n';
  if(comment)en+='“'+comment+'”\n';
  en+='\n'+(priceLine?priceLine+'\n':'')+'Roasted fresh in Crows Nest, Sydney.\n\n'
    +'#specialtycoffee #sydneycoffee #crowsnest';
  var zh='☕ 新豆上架｜'+nm+'\n';
  var zp=[];
  if(origin)zp.push('產地 '+origin);

  if(zp.length)zh+=zp.join('，')+'\n';

    +'#雪梨咖啡 #精品咖啡 #北岸咖啡';
  return {en:en,zh:zh};
}

/* ===== 豆子背景照：存 Storage mail-assets 的 photo-<slug>.jpg，靠檔名對應豆子（同 card-<slug>.png 慣例）
   不查 DB——豆名算得出檔名就找得到圖。⚠ 豆子改名要一起搬（saveGreenBean 有接） ===== */
function beanPhotoPath(nm){return 'photo-'+beanSlug(nm)+'.jpg';}
function beanPhotoUrl(nm){var p=sb.storage.from('mail-assets').getPublicUrl(beanPhotoPath(nm));return (p&&p.data&&p.data.publicUrl)||'';}
/* 一次列出所有已存照片 → {slug:true}，給清單標「有沒有照片」 */
async function listBeanPhotos(){
  try{
    var r=await sb.storage.from('mail-assets').list('',{limit:300,search:'photo-'});
    var m={};(r.data||[]).forEach(function(o){var g=/^photo-(.+)\.jpg$/.exec(o.name||'');if(g)m[g[1]]=true;});
    return m;
  }catch(e){return {};}
}
/* 拉成 dataURL 再交給 html2canvas（省一次跨網域抓圖；沒照片回 null） */
async function loadBeanPhotoData(nm){
  try{
    var r=await fetch(beanPhotoUrl(nm)+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return null;
    var b=await r.blob();
    if(!b||!b.size)return null;
    return await new Promise(function(ok){var fr=new FileReader();fr.onload=function(){ok(fr.result);};fr.onerror=function(){ok(null);};fr.readAsDataURL(b);});
  }catch(e){return null;}
}
/* 選檔（手機＝相簿或相機） */
function pickPhotoFile(){
  return new Promise(function(ok){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';
    inp.addEventListener('change',function(){ok((inp.files&&inp.files[0])||null);});
    inp.click();
  });
}
/* 置中裁成 1080 見方 JPEG——不管拍的是直是橫是 HEIC，存進去都同一規格 */
function _cropSquare1080(file){
  return new Promise(function(ok,bad){
    var fr=new FileReader();
    fr.onload=function(){
      var im=new Image();
      im.onload=function(){
        var s=Math.min(im.naturalWidth,im.naturalHeight);
        if(!s)return bad(new Error('That image looks empty'));
        var c=document.createElement('canvas');c.width=1080;c.height=1080;
        c.getContext('2d').drawImage(im,(im.naturalWidth-s)/2,(im.naturalHeight-s)/2,s,s,0,0,1080,1080);
        c.toBlob(function(b){b?ok(b):bad(new Error('Could not process that image'));},'image/jpeg',0.86);
      };
      im.onerror=function(){bad(new Error('Could not read that image — try a JPEG or PNG'));};
      im.src=fr.result;
    };
    fr.onerror=function(){bad(new Error('Could not read that file'));};
    fr.readAsDataURL(file);
  });
}
async function uploadBeanPhoto(nm,file){
  var blob=await _cropSquare1080(file);
  var up=await sb.storage.from('mail-assets').upload(beanPhotoPath(nm),blob,{upsert:true,contentType:'image/jpeg'});
  if(up&&up.error)throw new Error(up.error.message||'Upload failed');
  return true;
}
/* 照片偏暗就把字翻成淺色（不然深咖啡色標題會沉進照片裡） */
async function photoIsDark(dataUrl){
  try{
    var im=new Image();im.src=dataUrl;
    await new Promise(function(r,b){im.onload=r;im.onerror=b;});
    var c=document.createElement('canvas');c.width=32;c.height=32;
    c.getContext('2d').drawImage(im,0,0,32,32);
    var d=c.getContext('2d').getImageData(0,0,32,32).data,sum=0;
    for(var i=0;i<d.length;i+=4)sum+=0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2];
    return sum/1024<140;
  }catch(e){return false;}
}
/* 螢幕 UI 上的豆子點色（QC 色鈕、貨架圓點、抽屜裡的雷達）：夜版要提亮，
   不然深藍 #22386B 對 #1C1C1C 的 WCAG 對比只有 1.50（圖形元素最低要 3），紅也只有 3.13。
   走的是跟社群圖深底照片同一條規則——你在 QC 選的藍，就是圖上那個藍。
   ⚠ 只給螢幕用；產出的圖片/標籤自己決定明暗（renderSocialImages 看照片亮度，不看 app 主題） */
function isDarkUI(){
  var el=document.documentElement;
  if(el.classList.contains('dark'))return true;
  if(el.classList.contains('light'))return false;
  try{return window.matchMedia('(prefers-color-scheme: dark)').matches;}catch(e){return false;}
}
/* 0.30 是掃出來的甜蜜點：四色全過 3:1（深藍 3.45），四色兩兩的最小色差還留 78（原色 112 的七成）。
   提到 0.45 對比更好，但色差掉到 62——亮藍與深藍就開始糊在一起，而點色的用途正是分辨豆子。
   社群圖那邊仍用 0.45：它壓在雜亂的照片上，需要更多亮度；螢幕背景是純色，不必。 */
function uiDot(hex){return hex?(isDarkUI()?_liftColour(hex,0.30):hex):hex;}
/* 深色照片上把豆子的點色往米白提亮：深藍 #22386B 直接畫在暗底上對比只剩 9（看不見），
   紅色也只有 17。混白後保住色相、拉開亮度，還是認得出是哪一支豆 */
function _liftColour(hex,amt){
  var m=/^#?([0-9a-f]{6})$/i.exec(String(hex||''));
  if(!m)return hex;
  var n=parseInt(m[1],16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  function mix(c,t){return Math.round(c+(t-c)*amt);}
  return 'rgb('+mix(r,247)+','+mix(g,242)+','+mix(b,237)+')';
}
function _socTheme(dark){
  return dark
    ?{ink:'#F7F2ED',muted:'#C6BEB6',soft:'#DED6CE',line:'rgba(247,242,237,.26)',orn:'rgba(247,242,237,.34)'}
    :{ink:'#241E1B',muted:'#8C857E',soft:'#5A534C',line:'#E8E2DB',orn:'#E4DDD5'};
}
/* ===== Ratio 符號系統 =====
   logo＝「豆 ／ 水滴」，中間那道斜線是分數線：豆是分子、水是分母，那就是 ratio。
   拆出來的兩個元素本來就帶語義，是一組乾/濕的對立：
     豆   ＝ 水碰到豆「之前」：產地、品種、處理法、烘焙
     水滴 ＝ 水碰到豆「之後」：沖煮、萃取、風味、杯測
   規則：只掛在區塊標題上方、單色、不加外框（框住就變成 logo 了）。
   ⚠ 豆是實心、水滴是細線輪廓（同高時墨水量是 2.6 倍）——豆要畫成水滴的 0.78 倍才等重。
   logo.png / drop.svg / bean.svg 都是深色線稿，深底上會看不見。用 canvas 就地上色成 dataURL
   （不能用 CSS mask——html2canvas 不吃 mask，會畫成一塊實心方塊）

var SOC_BEAN_RATIO=0.78; /* 實心的豆對細線水滴的光學尺寸校正 */
async function _tintArt(src,col,w,h){
  try{
    var im=new Image();im.crossOrigin='anonymous';im.src=src;
    await new Promise(function(r,b){im.onload=r;im.onerror=b;});
    var c=document.createElement('canvas');
    c.width=im.naturalWidth||w;c.height=im.naturalHeight||h;
    var g=c.getContext('2d');
    g.drawImage(im,0,0,c.width,c.height);
    g.globalCompositeOperation='source-in';
    g.fillStyle=col;g.fillRect(0,0,c.width,c.height);
    return c.toDataURL('image/png');
  }catch(e){return src;}
}

/* Daily task 快速入口（暫放）：列 QC 通過的豆 → 選一支就地產四張社群圖，不用繞進 Social post kit */

var SOC_BG='#FAF8F4';  /* white 模式的底色（老闆可換色）；預設米白＝原本的固定值 */
/* 底色色票：貼紙白玫瑰語言——米白（預設）/亞麻/淡玫瑰/鼠尾草/深棕/墨黑；自訂色盤在最後 */
var SOC_SWATCHES=['#FAF8F4','#EFE6D8','#E9D5D0','#D8DFD3','#3E322B','#241E1B'];
/* 底色深淺（luma 公式同 photoIsDark）：深底自動沿用 photo 深照片那套翻淺字機制 */
function socBgIsDark(hex){
  var m=/^#?([0-9a-f]{6})$/i.exec(String(hex||''));
  if(!m)return false;
  var n=parseInt(m[1],16);
  return (0.2126*((n>>16)&255)+0.7152*((n>>8)&255)+0.0722*(n&255))<140;
}
function socScrim(dark){return SOC_SCRIM==null?(dark?0.48:0.72):SOC_SCRIM;}
var SOC_PHOTOS={};     /* {slug:true} 哪些豆子已經有照片 */

  function wireRows(){
    document.querySelectorAll('#soc-rows [data-ph]').forEach(function(b){b.addEventListener('click',async function(e){

/* 選一張照片存給這支豆（覆蓋舊的）。上傳走 storage，唯讀護欄的 sb.from Proxy 管不到，自己擋 */
async function changeBeanPhoto(nm,btn){
  if(!canWrite()){roToast();return false;}
  var f=await pickPhotoFile();
  if(!f)return false;
  var orig=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    await uploadBeanPhoto(nm,f);
    SOC_PHOTOS[beanSlug(nm)]=true;
    toast('Photo saved for '+nm);
    return true;
  }catch(e){
    toast(e&&e.message||'Upload failed');
    if(btn){btn.disabled=false;btn.textContent=orig;}
    return false;
  }
}
async function socialSplitPick(s){
  var nm=String(s.sample_id||'').trim();
  /* photo 模式但這支豆還沒照片 → 先選照片，選完才產圖 */
  if(SOC_MODE==='photo'&&!SOC_PHOTOS[beanSlug(nm)]){
    if(!canWrite()){roToast();return;}
    toast('Pick a background photo for '+nm);
    var ok=await changeBeanPhoto(nm,null);
    if(!ok)return;
    var rows=$('soc-rows');if(rows)rows.querySelectorAll('[data-ph="'+nm.replace(/"/g,'')+'"]').forEach(function(b){b.textContent='Replace';});
  }
  var full=s;
  try{var fq=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm)
    .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
    if(fq.data&&fq.data[0])full=fq.data[0];}catch(e){}
  var dots={};try{dots=await cardDots();}catch(e){}
  var col=dotColorFor(nm,dots)||'#B25E6A';
  var info=[];try{info=await beanInfoRows(full,{omit:['Roasted','Harvest']});}catch(e){}
  var feats=(full.features||[]).filter(Boolean).slice(0,3);
  await exportSocialImages(full,info,feats,nm,col,null,SOC_MODE);
}
/* 透明縮圖的棋盤格襯底——不然抽屜裡看不出哪張是透明的 */
var _SOC_CHK='background-image:linear-gradient(45deg,#c9c4be 25%,transparent 25%),linear-gradient(-45deg,#c9c4be 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#c9c4be 75%),linear-gradient(-45deg,transparent 75%,#c9c4be 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;background-color:#fff';
/* 保底：截圖尺寸不是 1080 見方就縮放補正（IG 要正方形）。透明版不補底色也不能轉 JPEG */
function _soc1080(cv,mode,fmt,q,bg){
  fmt=fmt||'image/png';
  if(cv.width===1080&&cv.height===1080)return cv.toDataURL(fmt,q);
  var o=document.createElement('canvas');o.width=1080;o.height=1080;
  var g=o.getContext('2d');
  if(mode!=='clear'){g.fillStyle=bg||'#FAF8F4';g.fillRect(0,0,1080,1080);}
  g.drawImage(cv,0,0,1080,1080);
  return o.toDataURL(fmt,q);
}
/* 產四張圖的核心（社群下載與 Square 商品圖共用這一份）
   mode: 'white'｜'clear' 透明｜'photo' 該豆的背景照
   opts: {fmt,quality,onStep} — Square 要 JPEG（四張 PNG 太肥，edge 的請求體塞不下） */
async function renderSocialImages(full,info,feats,nm,col,mode,opts){
  opts=opts||{};
  var step=opts.onStep||function(){};
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  var photo=null;
  if(mode==='photo'){
    step('Loading photo…');
    photo=await loadBeanPhotoData(nm);
    if(!photo)throw new Error('No photo saved for '+nm+' yet — tap Photo to choose one');
  }
  /* white 模式的底色：opts.bg（上架 per-bean 記憶）優先，否則全域 SOC_BG（Social Images 抽屜）；
     photo/clear 不吃底色。深底色沿用 photo 深照片那套：字翻米白、雷達 grid 翻淺、點色提亮 */
  var bg=mode==='white'?(opts.bg||SOC_BG||'#FAF8F4'):'#FAF8F4';
  var dark=photo?await photoIsDark(photo):(mode==='white'?socBgIsDark(bg):false);
  var T=_socTheme(dark);
  var scrim=socScrim(dark);
  /* 版面固定黑白：呼叫端傳進來的 col 是 dotColorFor() 的罐標色（黃/藍/紅），那是店裡貨架
     辨識用的管理色，不可拿來當版面主色——不然同一支豆換個點色，整張圖就變全黃或全紅。
     用 T.ink：淺底是墨黑，深照片上自動翻成米白，明暗天生對稱。
     ⚠ 例外＝雷達多邊形與封面菱形：那是這支豆的識別色，用來一眼認出是哪一支（老闆定案）。
     深色照片上要先提亮，否則深藍/紅點色會整個沉進暗底。 */
  var radarCol=col||'#B25E6A';
  if(dark)radarCol=_liftColour(radarCol,0.45);
  col=T.ink;
  var o={mode:mode,photo:photo,scrim:scrim,dark:dark,T:T,dot:radarCol,bg:bg,
    logo:await _socLogo(T.ink), drop:await _socDrop(col), bean:await _socBean(col)};
  var sc={fragrance:full.fragrance,acidity:full.acidity,sweetness:full.sweetness,body:full.body,aftertaste:full.aftertaste};
  var radar=printRadarPNG(sc,radarCol,dark?{grid:'rgba(247,242,237,.32)',label:T.muted}:{});
  var comment=String(full.comment||'').trim();
  var qrSrc=cardQrSrc(nm);
  /* 順序固定：封面 → 雷達 → 產區 → QR（Square 商品圖的輪播順序照這個） */
  var defs=[['cover',socialCoverHTML(nm,feats,comment,col,o)],['radar',socialRadarHTML(radar,feats,col,o)],['origin',socialOriginHTML(nm,info,col,o)],['qr',socialQrHTML(qrSrc,col,o)]];
  var out=[];
  for(var i=0;i<defs.length;i++){
    step('Rendering image '+(i+1)+' of 4…');
    var host=document.createElement('div');
    host.style.cssText='position:absolute;left:-9999px;top:0';
    host.innerHTML=defs[i][1];
    document.body.appendChild(host);
    await Promise.all(Array.prototype.map.call(host.querySelectorAll('img'),function(im){
      if(im.src.slice(0,5)!=='data:')im.crossOrigin='anonymous';
      return (im.complete&&im.naturalWidth)?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r;});
    }));
    var canvas=await html2canvas(host.firstChild,{scale:1,useCORS:true,backgroundColor:mode==='clear'?null:bg});
    out.push([defs[i][0],_soc1080(canvas,mode,opts.fmt,opts.quality,bg)]);
    host.remove();
  }
  return {images:out,dark:dark,scrim:scrim,bg:bg};
}
/* mode: 'white'（預設）｜'clear' 透明｜'photo' 該豆的背景照鋪四張 */
async function exportSocialImages(full,info,feats,nm,col,btn,mode){
  if(mode===true)mode='white';if(mode===false)mode='clear';   /* 舊的布林呼叫仍相容 */
  mode=mode||'white';
  var orig=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Rendering 4 images…';}
  var box=$('pk-social');if(box)box.innerHTML='<div class="s" style="margin-top:8px;color:var(--muted)">Rendering four square images…</div>';
  try{
    var r=await renderSocialImages(full,info,feats,nm,col,mode,{onStep:function(m){
      if(box)box.innerHTML='<div class="s" style="margin-top:8px;color:var(--muted)">'+esc(m)+'</div>';
    }});
    var out=r.images,dark=r.dark,scrim=r.scrim,bg=r.bg||'#FAF8F4';
    var bghex=bg.replace('#','').toUpperCase();
    /* 設定描述 tag：每張縮圖下標一行、檔名帶後綴——以後回頭看檔案就知道那批用了什麼設定（老闆點名） */
    var tag=mode==='clear'?'transparent':(mode==='photo'?'photo · fade '+Math.round(scrim*100)+'%':'colour #'+bghex);
    var sfx=mode==='clear'?'-transparent':(mode==='photo'?'-photo-fade'+Math.round(scrim*100):(bghex==='FAF8F4'?'':'-bg-'+bghex));
    var thumbBg=mode==='clear'?_SOC_CHK:'';
    var lbl=' · '+tag+((mode==='photo'||dark)?' · '+(dark?'light text':'dark text'):'');
    if(box)box.innerHTML='<div class="dlab">Four images'+lbl+' — tap each to save</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">'
      +out.map(function(r,ix){return '<a download="ratio-'+beanSlug(nm)+'-'+(ix+1)+'-'+r[0]+sfx+'.png" href="'+r[1]+'" style="text-decoration:none"><img src="'+r[1]+'" style="width:100%;display:block;border:1px solid var(--line);border-radius:10px;'+thumbBg+'"><div style="text-align:center;font-size:12.5px;color:var(--accent);margin:4px 0 0">'+(ix+1)+' · '+r[0]+' ↓</div><div style="text-align:center;font-size:11.5px;color:var(--muted);margin:0 0 2px">'+esc(tag)+'</div></a>';}).join('')
      +'</div>';
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }catch(e){
    if(box)box.innerHTML='<div class="s" style="color:var(--danger)">Export failed: '+esc(e&&e.message||String(e))+'</div>';
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }
}
/* ===== Marketing → IG asset 直接入口：列上架中的豆 → 點一支開現成的 Social post kit（openPromoSheet）=====
   清單建置照 openRetailSheet（載 rtl_* 記憶＋DB.syncs 上架豆），但 IG 用最新烘焙排最上（先介紹新鮮的） */
async function openIGSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">IG asset</div><div class="empty" style="margin-top:16px">Loading…</div>');
  var m={rtl_price:{},rtl_g:{},rtl_sizes:{},rtl_sold:{}};
  try{var r=await sb.from('app_state').select('key,value').in('key',['rtl_price','rtl_g','rtl_sizes','rtl_sold']);
    (r.data||[]).forEach(function(x){var v=x.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
      if(v&&typeof v==='object')m[x.key]=v;});
  }catch(e){}
  var live=(DB.syncs||[]).filter(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim();})
    .map(function(x){var nm=String(x.bean_id).trim();var d=null;try{d=shelfLatestRoast(nm);}catch(e){}return {nm:nm,d:d};})
    .sort(function(a,b){if(!!a.d!==!!b.d)return a.d?-1:1;return String(b.d||'').localeCompare(String(a.d||''))||a.nm.localeCompare(b.nm);});
  var seen={},rows='';
  live.forEach(function(e){
    var nm=e.nm,k=nm.toLowerCase();if(seen[k])return;seen[k]=true;
    var rep=null;try{rep=shelfSampleFor(nm);}catch(e2){}
    var fr;try{fr=shelfFreshness(nm);}catch(e2){fr={txt:'',cls:''};}

      +(rep&&rep.process?' <span style="color:var(--muted);font-weight:400;font-size:12.5px;font-family:Inter,sans-serif">'+esc(rep.process)+'</span>':'')+'</div>'
      +'<div class="s"><span class="'+fr.cls+'">'+esc(fr.txt)+'</span></div></span><span class="k">post ›</span></div>';
  });
  openDrawerHTML('<div class="t" style="font-size:19px">IG asset</div>'
    +'<div class="s" style="margin-top:2px">pick a coffee → post card and caption for Instagram and RED</div>'
    +(rows||'<div class="empty">Nothing on the shelf to feature yet</div>')

  document.querySelectorAll('#drawer [data-ig]').forEach(function(el){el.addEventListener('click',function(){

  });});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* ===== 新豆通知信群發（社群曝光 Phase 4：一份內容三發的「信」——IG/小紅書在 Social post kit）=====
   照抄 classic announceCoffee/uploadCardFor：QC 閘門→客戶人數確認→畫卡上傳 mail-assets（Square 安全白邊版，
   不是 IG tight 版）→ send-email announce_coffee 群發 */
async function uploadCardForBean(nm){
  try{
    var fq=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm)
      .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
    var full=fq&&fq.data&&fq.data[0];if(!full)return '';
    var dots={};try{dots=await cardDots();}catch(e){}
    var blendMap={};
    try{var bq=await sb.from('blends').select('name,parts,note');
      (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
    var b64=await makeSquareCard(await cardDataFor(full,blendMap,dots));
    if(!b64)return '';
    var path='card-'+cardSlug(nm)+'.png';
    var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
    if(up&&up.error)return '';
    var pub=sb.storage.from('mail-assets').getPublicUrl(path);
    var u=pub&&pub.data&&pub.data.publicUrl;
    return u?(u+'?v='+Date.now()):'';
  }catch(e){return '';}
}
async function announceShelfBean(s,nm,btn){
  /* QC 閘門同 classic listingGate：打槍批擋死，沒 pass/沒鎖風味只警告 */
  var qr=null;try{qr=matchRoast(s);}catch(e){}
  if(qr&&qr.qc==='reroast'){alert('QC verdict for the latest batch is Re-roast — fix the batch before announcing.');return;}
  if(qr&&qr.qc==='downgrade'){alert('The latest batch is downgraded — not retail grade.');return;}
  var warns=[];
  if(!qr||!qr.qc)warns.push('no QC pass recorded for the latest batch');
  if(!s.flavour_locked)warns.push('flavour description not locked');

/* ===== 刪除咖啡豆（老闆點名：清打錯名/重複的零售豆）=====
   刪 samples（Ratio Coffee 杯測紀錄）＋roasts（烘豆批次）＋product_sync＋app_state 記憶鍵；
   **生豆庫存（beans）永遠不碰**；Square 目錄上的商品本身留著（要移除去 Square 後台），但清掉 product_sync 後店面菜單就不再列它 */
function allRetailCoffees(){
  var seen={},out=[];
  (DB.samples||[]).forEach(function(s){
    var nm=String(s.sample_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].cups++;
  });
  (DB.roasts||[]).forEach(function(r){
    var nm=String(r.bean_name||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].roasts++;
  });
  /* 純上架孤兒也要列（只在 product_sync、0 杯測 0 烘豆——老闆的 Danche 殘留就是這種漏網魚） */
  (DB.syncs||[]).forEach(function(x){
    var nm=String(x.bean_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
  });
  /* synced 含 paused（售罄也是上架中）——刪除時才會連 Square 商品一起拆 */
  out.forEach(function(e){e.synced=!!(DB.syncs||[]).find(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim().toLowerCase()===e.name.toLowerCase();});});
  return out.sort(function(a,b){return a.name.localeCompare(b.name);});
}

async function confirmDeleteCoffee(e){
  var msg='Delete "'+e.name+'"?\n\nThis removes:\n· '+e.cups+' cupping record'+(e.cups===1?'':'s')+'\n· '+e.roasts+' roast batch'+(e.roasts===1?'':'es')+'\n· shelf price / colour memories'
    +(e.synced?'\n· the Square listing (item deleted from the Square catalogue too)':'')
    +'\n\nGreen bean stock is NOT touched. This cannot be undone.';
  if(!confirm(msg))return;
  if(!confirm('Really delete "'+e.name+'"? Last chance.'))return;
  toast('Deleting…');
  try{
    /* 已上架＝先拆 Square（edge 內建 delete：刪目錄商品＋product_sync）；失敗就先停，別半刪 */
    if(e.synced){
      try{await callFn('sync-to-square',{action:'delete',sample_id:e.name});}
      catch(err){
        if(!confirm('Square removal failed: '+(err&&err.message||err)+'\n\nDelete the local records anyway? The Square item will stay until you remove it in the Square dashboard.'))return;
      }
    }
    var d1=await sb.from('samples').delete().eq('supplier','Ratio Coffee').ilike('sample_id',e.name);
    if(d1.error)throw new Error(d1.error.message);
    var d2=await sb.from('roasts').delete().ilike('bean_name',e.name);
    if(d2.error)throw new Error(d2.error.message);
    try{await sb.from('product_sync').delete().ilike('bean_id',e.name);}catch(err){}
    /* app_state 記憶鍵大掃除（價/克/規格/售罄/顏色） */
    var keys=['rtl_price','rtl_g','rtl_sizes','rtl_sold','rtl_dot'];
    for(var i=0;i<keys.length;i++){
      try{
        var r=await sb.from('app_state').select('value').eq('key',keys[i]).maybeSingle();
        var v=r&&r.data&&r.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(err){v=null;}}
        if(!v||typeof v!=='object')continue;
        var hit=false;
        Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===e.name.toLowerCase()){delete v[k];hit=true;}});
        if(hit)await sb.from('app_state').upsert({key:keys[i],value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
      }catch(err){}
    }
    _dotsMap=null;

    await reload();
  }catch(err){
    alert('Delete failed: '+(err&&err.message||err));
  }
}

  if(greenDupExists(upd.name,upd.process,b.id)){if(msg)msg.textContent='"'+upd.name+'" + "'+(upd.process||'—')+'" already exists — use a different process for the same farm';return;}

    if(renamed){

      var e1b=(await sb.from('samples').update({sample_id:newName}).is('bean_id',null).eq('sample_id',oldName)).error;
      var e2=(await sb.from('roasts').update({bean_name:newName}).eq('bean_id',b.id)).error;
      var e2b=(await sb.from('roasts').update({bean_name:newName}).is('bean_id',null).eq('bean_name',oldName)).error;
      var eAny=e1||e1b||e2||e2b;

/* ===== 熟豆批次清單（照 classic Batch stock：remaining>0、FIFO 最舊先用、>30 天紅、點批次記用量）===== */
function openBatchesSheet(){
  var bats=(DB.roasts||[]).filter(function(r){return Number(r.remaining_kg)>0;});
  var groups={},order=[];
  bats.forEach(function(r){var k=String(r.bean_name||'—').trim(),lk=k.toLowerCase();if(!groups[lk]){groups[lk]={name:k,rows:[]};order.push(lk);}groups[lk].rows.push(r);});
  order.sort(function(a,b){return groups[a].name.localeCompare(groups[b].name);});
  var totKg=0;bats.forEach(function(r){totKg+=Number(r.remaining_kg)||0;});
  var h='';
  order.forEach(function(k){
    var g=groups[k];
    g.rows.sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var tot=0;g.rows.forEach(function(r){tot+=Number(r.remaining_kg)||0;});
    h+='<div class="dlab">'+esc(g.name)+' · '+(Math.round(tot*100)/100)+' kg</div>';
    g.rows.forEach(function(r,idx){
      var age=daysSince(r.roast_date);
      var old=r.roast_date&&age>30;
      var tags=[];
      if(idx===0&&g.rows.length>1)tags.push('use first');
      if(old)tags.push('<span class="red">&gt;30d</span>');
      if(r.qc==='pass')tags.push('QC ✓');else if(r.qc==='reroast')tags.push('<span class="red">re-roast</span>');else if(r.qc==='downgrade')tags.push('downgraded');
      if(r.kind==='blend')tags.push('blend');
      h+='<div class="hit" data-b="'+esc(r.id)+'"><span><div class="t">'+(r.roast_date?fmtD(r.roast_date):'—')+'</div>'
        +'<div class="s">'+(r.roast_date?age+' days old':'no roast date')+(tags.length?' · '+tags.join(' · '):'')+'</div></span>'
        +'<span class="k'+(old?' red':'')+'" style="font-size:15px">'+(Number(r.remaining_kg)||0)+' kg</span></div>';
    });
  });
  openDrawerHTML('<div class="t" style="font-size:19px">Roasted Stock</div>'
    +'<div class="s" style="margin-top:2px">'+(bats.length?bats.length+' batches · '+(Math.round(totKg*100)/100)+' kg · oldest first — use it first · tap to log usage':'')+'</div>'
    +(h||'<div class="empty">No roasted batches in stock<br>Log the roasted-out kg when roasting — batches land here</div>')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  document.querySelectorAll('#drawer [data-b]').forEach(function(el){el.addEventListener('click',function(){
    var r=bats.find(function(x){return String(x.id)===String(el.dataset.b);});
    if(r)openBatchUse(r);
  });});
  $('d-cl').addEventListener('click',closeDrawer);
}

    +'<div class="s" style="margin-top:2px">remaining '+(Number(r.remaining_kg)||0)+' kg</div>'
    +'<div class="dlab">Used / sold (kg)</div><input class="din" id="bu-kg" inputmode="decimal" placeholder="e.g. 0.5">'

async function saveReceiveSheet(){
  var kg=parseFloat(String(RCV.kg).trim());
  if(isNaN(kg)||kg<=0){toast('Enter the received kg');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');
  var beanId,after;
  try{
    if(RCV.mode==='existing'){
      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;
      if(sup)upd.supplier=sup;
      var u=await sb.from('beans').update(upd).eq('id',b.id);
      if(u.error)throw new Error(u.error.message);
      Object.assign(b,upd);
      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* 防重複：同名同處理法已有批次 → 提醒改用 Existing lot 併批 */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;
    }
    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' — '+sup:'')+(lot?' · lot '+lot:'')});}catch(e){}
    logAct('received green','+'+kg+' kg',sup||null);
    closeDrawer();toast('Received ✓ +'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to stock';}
    alert('Receive failed: '+(e&&e.message||e));
  }
}

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  logAct('stocktake',ok+' bean'+(ok>1?'s':'')+' adjusted');
  closeDrawer();toast('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted ✓');
  await reload();
}
