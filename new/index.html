html{background:var(--bg)}
body{margin:0;background:transparent;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding-bottom:170px}

header{background:var(--bg);color:var(--ink);border-bottom:1.5px solid var(--ink);padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 8px;display:flex;align-items:center;position:sticky;top:0;z-index:10}

nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 12px);z-index:30}

.qacts{display:flex;gap:8px;max-width:520px;margin:0 auto 8px}

.deck-btns{display:grid;gap:8px;max-width:520px;margin:0 auto}

.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;touch-action:none}

.dl{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}

.dl span.red{color:var(--danger)}
.dclose{display:block;width:100%;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;margin-top:16px;cursor:pointer}
.pk-row{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:15px 16px;font-size:16px;font-weight:600;font-family:inherit;margin-top:9px;cursor:pointer}

.dta{width:100%;min-height:110px;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;resize:vertical}
.dta:focus{border-color:var(--ink)}
.no-line{display:flex;gap:8px;align-items:center;margin-top:8px}

.no-line .qty{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.no-line .qty button{width:38px;height:44px;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;font-size:19px;font-weight:700;font-family:inherit;cursor:pointer}
.no-line .qty span{min-width:20px;text-align:center;font-weight:700}
.no-price{width:86px;flex:0 0 auto;border:1.5px solid var(--line2);border-radius:10px;padding:12px 10px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none}
.pm-seg{display:flex;gap:8px;margin-top:8px}
.pm-seg button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:13px 6px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.pm-seg button.on{border-color:var(--ink);color:var(--ink)}
.din{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:14px;font-size:17px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px}
.din:focus{border-color:var(--ink)}
.dlab{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:14px}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:150px;background:var(--inv);color:var(--inv-t);border-radius:999px;padding:11px 22px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;z-index:60;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin:6px 14px 0;line-height:1.6}
.search{width:100%;border:1.5px solid var(--line2);border-radius:12px;padding:15px 16px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-bottom:6px}
.search:focus{border-color:var(--ink)}
.gsec{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:18px 2px 8px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tool{border:1px solid var(--line2);background:var(--surface);border-radius:12px;padding:17px 12px;font-size:15px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer;text-align:center}
.tool:active{background:var(--tint)}
.tool small{display:block;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:3px}
.hit{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hit .t{font-size:17px}
.hit .k{flex:0 0 auto;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent)}
</style></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== Ratio 新殼 v1（/new）：真資料版今日流＋QC 工作台＋Tools =====
   舊 app（/index.html）完全不動；同網域共用登入 session。 */
const SUPABASE_URL='https://kjhudxzvidhynpabnalp.supabase.co';
const SUPABASE_KEY='sb_publishable_vt7hUK07u-veHOb4mXGGhQ_wX06qDeQ';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CLASSIC='/index.html';
const ESP_STALE_DAYS=7, GREEN_LOW_KG=5, ORD_OVERDUE_DAYS=7;
const VAPID_PUBLIC='BFPC3UdlUFbYeowrMvVn-eJWjES_PHYuy34_7v7XbgPSb88CRdG5pjyT30Ht-1Ok4C0dj25Ut-ahokw-9STRY9o';
var view='feed', filter='all', selQC=null, ITEMS=[], QCQ=[], ROLE='director', WHO='';
var QCLOCK=true; /* 鎖風味的決定在 QC 當下（老闆定調）：pass＝判定＋鎖風味，判定板可關 */
/* 黑白頁手動切換：auto=跟系統、light/dark=強制；記在本機（顯示偏好本來就該一台一台設） */
function themeGet(){try{return localStorage.getItem('r2_theme')||'auto';}catch(e){return 'auto';}}
function applyTheme(t){
  var el=document.documentElement;
  el.classList.remove('light','dark');
  if(t==='light'||t==='dark')el.classList.add(t);
  try{localStorage.setItem('r2_theme',t);}catch(e){}
}
applyTheme(themeGet());
var DB={orders:[],customers:[],tasks:[],dialins:[],syncs:[],samples:[],roasts:[],beans:[]};
var _drag=0;
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2000);}
function money(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function daysSince(ts){if(!ts)return 0;var d=new Date(ts);return isNaN(d)?0:Math.floor((Date.now()-d)/86400000);}
function fmtD(s){if(!s)return '';var p=String(s).slice(0,10).split('-');return p.length===3?(p[2]+'/'+p[1]):s;}
/* 本地日（雪梨）——跟 todayStr 同步；舊版用 UTC 會讓「明天回來」變成早上 10 點才回來 */
function todayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* 貪睡與晨報收起：存 localStorage，到明天自動失效 */
/* 貪睡改存 app_state（key: new_snooze）＝跨裝置同步：手機睡掉的卡，電腦也不再冒出來；到明天自動失效（只認今天的 key）。全店共用——誰睡掉就是大家都先不看 */
var SNOOZE_ALL={};
var NUDGE_LOG={}; /* 回購提醒紀錄（app_state 'nudge_log'，扁平 {customer_id:'YYYY-MM-DD'}）——送過就記，這輪不再出卡 */
function snoozeMap(){return SNOOZE_ALL[todayKey()]||{};}
var SNOOZED_SESSION=0;
function snoozePush(){
  try{sb.from('app_state').upsert({key:'new_snooze',value:SNOOZE_ALL,updated_at:new Date().toISOString()},{onConflict:'key'})
    .then(function(r){if(r&&r.error)console.error('snooze push:',r.error.message||r.error);});}catch(e){}
}
function addSnooze(id){
  var today=todayKey(),m=snoozeMap();m[id]=1;
  SNOOZE_ALL={};SNOOZE_ALL[today]=m; /* 只留今天＝順手清掉舊日期 */
  SNOOZED_SESSION++;
  snoozePush();
}
function undoSnooze(){SNOOZE_ALL={};SNOOZED_SESSION=0;snoozePush();buildItems();render();toast('Brought back');}

async function callFn(name,payload){
  var g=await sb.auth.getSession();var sess=g&&g.data&&g.data.session;
  if(!sess)throw new Error('Signed out');

    body:JSON.stringify(payload)});

}

function matchRoast(s){

    return String(r.bean_name||'').trim().toLowerCase()===nm;});
  if(!cands.length)return null;

function item(id){return ITEMS.find(function(x){return x.id===id;});}
function dropCard(id,left){

/* ===== 真動作 ===== */
async function runAction(id,btn){
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      dropCard(id);toast('Task done ✓');return;
    }
    if(i.kind==='qcnav'){view='qc';render();return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted — no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid ✓ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid ✓ receipt sent');return;
    }
    if(i.kind==='nudge'){
      var nc=i.ref.c;
      if(!confirm('Email a fresh-batch reminder to '+(nc.name||'this customer')+' ('+nc.email+')?\nIt carries the shop link and the Google review link.'))return;
      if(btn){btn.disabled=true;btn.textContent='Sending…';}
      await callFn('send-email',{action:'repurchase_nudge',customer_id:nc.id});
      /* 提醒紀錄 read-modify-write 進 app_state（照 rtl_dot 慣例）；寫失敗不擋——頂多明天再看到卡 */
      try{
        var ngq=await sb.from('app_state').select('value').eq('key','nudge_log').maybeSingle();
        var ngm=(ngq.data&&ngq.data.value&&typeof ngq.data.value==='object')?ngq.data.value:{};
        ngm[String(nc.id)]=todayKey();
        await sb.from('app_state').upsert({key:'nudge_log',value:ngm,updated_at:new Date().toISOString()},{onConflict:'key'});
        NUDGE_LOG=ngm;
      }catch(e){}
      dropCard(id);toast('Reminder sent ✓');return;
    }
    if(i.kind==='dialin'){openDialinForm(i);return;}
    if(i.kind==='roastlog'){openRoastSheet(Array.isArray(i.ref)?i.ref:null);return;}
    if(i.kind==='list'){await openListSheet(i);return;}
    if(i.kind==='locks'){openLocksSheet(i);return;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=i.act;}
    alert((i.act||'Action')+' failed: '+(e&&e.message||e));
  }
}
async function acceptOrder(i,btn){
  var o=i.ref;
  if(btn){btn.disabled=true;btn.textContent='Accepting…';}
  try{
    if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
      try{await callFn('sync-to-square',{action:'payment_link',order_id:o.id});}catch(e){console.error('payment link',e);}
    }
    var u=await sb.from('orders').update({status:'Confirmed'}).eq('id',o.id);
    if(u.error)throw new Error(u.error.message);
    o.status='Confirmed';
    try{await callFn('send-email',{action:'order_confirmation',order_id:o.id});toast('Accepted ✓ confirmation sent');}
    catch(e){toast('Accepted ✓ but email failed');}
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Accept';}
    alert('Accept failed: '+(e&&e.message||e));
  }
}
async function qcVerdict(r,v,btn,cardId,s){
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var u=await sb.from('roasts').update({qc:v}).eq('id',r.id);
  if(u.error){if(btn){btn.disabled=false;}alert('QC failed: '+u.error.message);return;}
  r.qc=v;
  /* pass＋開關開＝杯測紀錄就地鎖風味（資訊卡/上架直接用這筆）；鎖失敗不擋判定但要說出來（曾靜默吞掉害老闆以為鎖了） */
  var locked=false,lockFail=false;
  if(v==='pass'&&s&&QCLOCK&&!s.flavour_locked){
    try{var lu=await sb.from('samples').update({flavour_locked:true}).eq('id',s.id);if(!lu.error){s.flavour_locked=true;locked=true;}else lockFail=true;}catch(e){lockFail=true;}
  }
  /* 開關關著 pass＝沒鎖要講明（老闆踩過：以為壞掉，其實是膠囊被切掉了） */
  var lockNote=locked?' · flavours locked'
    :lockFail?' · ⚠ flavour lock failed — lock it from Retail Info'
    :(v==='pass'&&s&&!s.flavour_locked&&!QCLOCK)?' · flavours not locked (toggle off)':'';
  toast('QC '+v+' ✓'+lockNote);
  if(cardId)dropCard(cardId);
  /* 全量重算：pass 完 List 卡要立刻長出來（原本只濾 QCQ，Today 流舊資料害 List 卡等下次刷新才出現） */
  buildItems();
  if(view==='qc')renderQC();
}

/* 彈窗開著時鎖住背景（iOS 的 overflow:hidden 靠不住 → body 釘住＋記捲動位置，關閉時復原）；
   openDrawerHTML 會被重畫連呼，鎖要冪等——只在第一次開時記位置 */
var _bgLockY=null;
function lockBg(){
  if(_bgLockY!=null)return;
  _bgLockY=window.scrollY||0;
  document.body.style.position='fixed';
  document.body.style.top=(-_bgLockY)+'px';
  document.body.style.left='0';document.body.style.right='0';document.body.style.width='100%';
}
function unlockBg(){
  if(_bgLockY==null)return;
  document.body.style.position='';document.body.style.top='';
  document.body.style.left='';document.body.style.right='';document.body.style.width='';
  window.scrollTo(0,_bgLockY);
  _bgLockY=null;
}
function openDrawerHTML(h){var d=$('drawer');d.innerHTML='<div class="grab"></div>'+h;d.classList.add('show');$('dbg').classList.add('show');lockBg();attachDrawerDrag();}
/* 把手往下拉＝關閉（拉過 90px 放手才關，不足彈回；把手 touch-action:none 不搶內容捲動） */
function attachDrawerDrag(){
  var d=$('drawer'),g=d.querySelector('.grab');if(!g)return;
  var y0=null,dy=0;
  /* iOS Safari 對捲動容器內的 touch-action:none 不一定買帳——手指一動就當捲動、pointercancel 把拖曳殺掉。
     非 passive 的 touchmove preventDefault 硬擋捲動，讓 pointermove 一路活著 */
  g.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  g.addEventListener('pointerdown',function(e){
    y0=e.clientY;dy=0;
    try{g.setPointerCapture(e.pointerId);}catch(err){}
    d.style.transition='none';
  });
  g.addEventListener('pointermove',function(e){
    if(y0==null)return;
    dy=Math.max(0,e.clientY-y0);
    d.style.transform='translateY('+dy+'px)';
  });
  function fin(){
    if(y0==null)return;
    d.style.transition='';d.style.transform='';
    if(dy>90)closeDrawer();
    y0=null;dy=0;
  }
  g.addEventListener('pointerup',fin);
  g.addEventListener('pointercancel',fin);
}
function closeDrawer(){$('drawer').classList.remove('show');$('dbg').classList.remove('show');unlockBg();}

  var _cardIcons=null;
  function _loadCardIcons(){
    if(_cardIcons)return Promise.resolve(_cardIcons);
    function li(src){return new Promise(function(res){var i=new Image();i.onload=function(){res(i);};i.onerror=function(){res(null);};i.src=src;});}
    return Promise.all([li(CARD_ICON_BEAN),li(CARD_ICON_DROP)]).then(function(a){_cardIcons={bean:a[0],drop:a[1]};return _cardIcons;});
  }
  function _tintIcon(img,color,h){
    var w=Math.round(h*(img.width/img.height));
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var g=c.getContext('2d');
    g.drawImage(img,0,0,w,h);
    g.globalCompositeOperation='source-in';
    g.fillStyle=color;g.fillRect(0,0,w,h);
    return c;
  }
  async function makeSquareCard(card,opts){
    try{await document.fonts.ready;}catch(e){}
    var icons=null;try{icons=await _loadCardIcons();}catch(e){}
    var W=1200,H=1200,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var x=cv.getContext('2d');
    var INK='#1E1A19',BERRY='#B25E6A';
    var CX,CY,CW,CH,CR=28,TSX,TEX;
    if(opts&&opts.tight){
      /* tight mode（同 classic Print Centre 下載版——IG/小紅書貼文用）：沒有平台裁切，四邊留窄框即可 */
      CX=40;CY=40;CW=W-80;CH=H-80;
      TSX=CX+58;TEX=W-CX-58;
    }else{
      /* square card with asymmetric safe margins — Square Online portrait hero
         crops ~150px off each side, so sides get 150px margin, top/bottom 64px */
      CX=217;CY=64;CW=W-434;CH=H-128;
      /* text-safe zone: mobile portrait hero crops ~200px+ per side, so all text lives in the centre 760px */
      TSX=275;TEX=W-275;
    }
    var TW2=TEX-TSX;
    x.fillStyle='#ffffff';x.fillRect(0,0,W,H);
    var band=mnHexRgb(card.color)||[73,66,58];
    var lum=.299*band[0]+.587*band[1]+.114*band[2];
    var bandCss='rgb('+band.join(',')+')';
    var tc=lum>165?'#282220':'#ffffff';
    var lt='rgb('+band.map(function(v){return Math.round(v+(255-v)*.85);}).join(',')+')';
    var dk='rgb('+band.map(function(v){return Math.round(v*.5);}).join(',')+')';
    x.save();_rrPath(x,CX,CY,CW,CH,CR);x.clip();
    x.textBaseline='alphabetic';x.textAlign='left';
    /* ===== header banner: bean icon + name (left), Roasted / date two lines (right) ===== */
    var headH=150;
    x.fillStyle=bandCss;x.fillRect(CX,CY,CW,headH);
    x.font='600 24px Inter, sans-serif';
    var hrW=card.roasted?Math.max(x.measureText('Roasted').width,x.measureText(card.roasted).width):0;
    var nameX=TSX;
    if(icons&&icons.bean){
      var bs=50,bw=bs*(icons.bean.width/icons.bean.height);
      x.drawImage(_tintIcon(icons.bean,tc,600),nameX,CY+(headH-bs)/2,bw,bs);
      nameX+=bw+24;
    }
    var ns=_cardFit(x,card.name,'700',62,34,TEX-nameX-(hrW?hrW+40:0),'Inter, sans-serif');
    x.fillStyle=tc;x.fillText(card.name,nameX,CY+headH/2+ns*.36);
    if(card.roasted){
      x.globalAlpha=.85;x.font='600 24px Inter, sans-serif';x.textAlign='right';
      x.fillText('Roasted',TEX,CY+headH/2-10);
      x.fillText(card.roasted,TEX,CY+headH/2+24);
      x.textAlign='left';x.globalAlpha=1;
    }
    var cy=CY+headH;
    /* ===== sub header: comment / blend note ===== */
    if(card.comment){
      var subH=76;
      x.fillStyle=lt;x.fillRect(CX,cy,CW,subH);
      var cs=_cardFit(x,card.comment,'600',30,20,TW2,'Inter, sans-serif');
      x.textAlign='center';x.fillStyle=dk;x.fillText(card.comment,CX+CW/2,cy+subH/2+cs*.36);
      x.textAlign='left';
      cy+=subH;
    }
    /* ===== footer banner: drop icon + flavour, centred as a group ===== */
    var footH=150,footY=CY+CH-footH;
    if(card.flavour&&card.flavour.length){
      x.fillStyle=bandCss;x.fillRect(CX,footY,CW,footH);
      var fl=card.flavour.join('  \u00b7  ');
      var dw=0,ds=48,gap=22;
      if(icons&&icons.drop){dw=ds*(icons.drop.width/icons.drop.height);}
      var fsz=_cardFit(x,fl,'700',48,26,TW2-(dw?dw+gap:0),'Inter, sans-serif');
      var sx=TSX;
      if(icons&&icons.drop){
        x.drawImage(_tintIcon(icons.drop,tc,600),sx,footY+(footH-ds)/2,dw,ds);
        sx+=dw+gap;
      }
      x.fillStyle=tc;x.fillText(fl,sx,footY+footH/2+fsz*.36);
    }
    /* ===== content: full-width rows, radar on its own centred row ===== */
    var zoneTop=cy,zoneBot=footY;
    var Lx=TSX,Rv=TEX;
    var ry=zoneTop+64;
    if(card.kind==='blend'){
      /* one common font size across every content row */
      var csz=34;
      (card.recipe||[]).forEach(function(p){
        var hasPct=(p.pct||p.pct===0);
        csz=Math.min(csz,_cardFit(x,p.bean,'700',34,24,TW2*0.55-(hasPct?115:0),'Inter, sans-serif'));
        if(p.process)csz=Math.min(csz,_cardFit(x,p.process,'400',34,20,TW2*0.42,'Inter, sans-serif'));
      });
      (card.recipe||[]).forEach(function(p){
        var pct=(p.pct||p.pct===0)?String(p.pct)+'%':'';
        if(pct){x.fillStyle=BERRY;x.font='700 '+csz+'px Inter, sans-serif';x.fillText(pct,Lx,ry);}
        x.fillStyle=INK;x.font='700 '+csz+'px Inter, sans-serif';
        x.fillText(p.bean,Lx+(pct?115:0),ry);
        var meta=p.process||'';
        if(meta){
          x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz+'px Inter, sans-serif';
          x.fillText(meta,Rv,ry);x.textAlign='left';
        }
        ry+=66;
      });
    }else{
      var o=card.origin||{},rows=[];
      if(o.process)rows.push(['Process',o.process]);
      if(o.variety)rows.push(['Variety',o.variety]);
      if(o.altitude)rows.push(['Altitude',o.altitude+' MASL']);
      if(o.region)rows.push(['Region',o.region]);
      var csz2=34;
      rows.forEach(function(r){csz2=Math.min(csz2,_cardFit(x,String(r[1]),'400',34,20,TW2-290,'Inter, sans-serif'));});
      rows.forEach(function(r){
        x.fillStyle=INK;x.font='700 '+csz2+'px Inter, sans-serif';x.fillText(r[0],Lx,ry);
        x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz2+'px Inter, sans-serif';
        x.fillText(String(r[1]),Rv,ry);
        x.textAlign='left';ry+=66;
      });
      ry-=20;
    }
    var hasCup=!!(card.cupScores&&card.cupScores.some(function(o){return o.n!=null;}));
    if(hasCup){
      var radarTop=ry+26,avail=zoneBot-radarTop-16;
      var R=Math.min(150,Math.floor(avail/2-36));
      _cardRadar(x,W/2,radarTop+avail/2+4,R,card.cupScores,band);
    }
    x.restore();
    _rrPath(x,CX,CY,CW,CH,CR);x.lineWidth=3;x.strokeStyle=INK;x.stroke();
    return cv.toDataURL('image/png').split(',')[1];
  }

function dotKeyFor(name,dots){

  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  /* 同名不同大小寫的舊鍵一併清掉，避免雙鍵打架 */
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===nm.toLowerCase()&&k!==nm)delete v[k];});
  if(key)v[nm]=key;else delete v[nm];
  var u=await sb.from('app_state').upsert({key:'rtl_dot',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
  _dotsMap=v; /* 快取跟上，畫卡立即吃新色 */
}
async function cardDataFor(s,blendMap,dots){
  var SMAP={fragrance:'Aroma',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
  var cup=['fragrance','acidity','sweetness','body','aftertaste'].map(function(k){return {key:k,label:SMAP[k],n:(s&&s[k]!=null)?s[k]:null};});
  var rdate=s.roast_date||null;
  if(!rdate){
    var hit=null;
    (DB.roasts||[]).forEach(function(r){if(!hit&&s.bean_id&&r.bean_id&&String(r.bean_id)===String(s.bean_id))hit=r.roast_date;});
    (DB.roasts||[]).forEach(function(r){if(!hit&&String(r.bean_name||'')===(s.sample_id||''))hit=r.roast_date;});
    rdate=hit;
  }
  var data={name:s.sample_id||'',color:dotColorFor(s.sample_id,dots),
    flavour:(s.features||[]).filter(Boolean).slice(0,3),cupScores:cup,
    comment:(s.comment||'').trim(),roasted:rdate?fmtD(rdate):''};
  var bd=blendMap[String(s.sample_id||'').trim().toLowerCase()];
  if(bd){
    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    try{
      var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
      var pool=q.data||[];
      var proc=String(s.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* 每支豆現場重畫卡片 → 上傳 mail-assets（upsert + cache-bust）→ 回傳 {小寫名: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

/* ===== Pack 逐項打勾（每勾一項即存 pack_state；全勾才能按 Ready）===== */
function openPackSheet(i){
  var o=i.ref;var items=Array.isArray(o.items)?o.items:[];
  /* 批發單的 Delivery fee 是 items 假品項（grams:null，金額對帳用）——不用裝箱，打勾清單與全勾判定都跳過；
     pack_state 照舊用原始 index 當鍵，跳過不影響舊資料 */
  var packIdx=[];items.forEach(function(it,ix){
    if(!it.grams&&/^delivery fee$/i.test(String(it.name||'').trim()))return;
    packIdx.push(ix);
  });
  var ps=(o.pack_state&&typeof o.pack_state==='object')?Object.assign({},o.pack_state):{};
  function allOn(){return packIdx.length>0&&packIdx.every(function(ix){return !!ps[String(ix)];});}
  function paint(){
    openDrawerHTML('<div class="t" style="font-size:19px">'+i.t.replace('Pack ','Packing ')+'</div>'
      +'<div class="s" style="margin-top:2px">tap each item as it goes in the box</div>'
      +packIdx.map(function(ix){
        var it=items[ix],on=!!ps[String(ix)];
        return '<button class="pk-row'+(on?' on':'')+'" data-pk="'+ix+'">'+(on?'✓ ':'')+esc((it.grams?it.grams+'g ':'')+(it.name||'')+(it.qty>1?' ×'+it.qty:''))+'</button>';
      }).join('')
      +'<button class="act" id="pk-ready"'+(allOn()?'':' disabled')+'>All packed — move to Ready</button>'
      +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
    document.querySelectorAll('#drawer [data-pk]').forEach(function(el){el.addEventListener('click',async function(){
      var k=String(el.dataset.pk);
      if(ps[k])delete ps[k];else ps[k]=true;
      o.pack_state=ps;
      paint();
      var u=await sb.from('orders').update({pack_state:ps}).eq('id',o.id);
      if(u.error){alert('Save failed: '+u.error.message);}
    });});
    var pr=$('pk-ready');if(pr)pr.addEventListener('click',async function(){
      pr.disabled=true;pr.textContent='Saving…';
      var u=await sb.from('orders').update({pack_state:ps,status:'Ready'}).eq('id',o.id);
      if(u.error){pr.disabled=false;pr.textContent='All packed — move to Ready';alert('Save failed: '+u.error.message);return;}
      closeDrawer();toast('Ready to ship ✓');await reload();
    });
    var cl=$('d-cl');if(cl)cl.addEventListener('click',closeDrawer);
  }
  paint();
}

/* ===== 貨架清單（在賣的豆：價格規格/售罄/鎖風味/烘焙新鮮度＋待上架佇列；唯讀）===== */
/* 新鮮度規則（老闆定，2026-07-07）：<14 天紅（還在養豆）、14–28 天綠（最佳）、>28 天黃（老化）；>60 天晨報推警示 */
var SHELF_FRESH_REST=14, SHELF_FRESH_PRIME=28, SHELF_STALE_DAYS=60;
/* 上架代表樣品：鎖定的優先（同名多處理法時＝實際在賣的那個處理法，例如三個 Danche） */
function shelfSampleFor(nm){
  var k=String(nm||'').trim().toLowerCase();
  var pool=(DB.samples||[]).filter(function(s){return String(s.sample_id||'').trim().toLowerCase()===k;});
  return pool.find(function(s){return s.flavour_locked;})||pool[0]||null;
}
function shelfLatestRoast(nm){
  var best=null;
  /* 先照上架樣品的 bean_id 找同一支生豆批的烘豆（同名不同處理法不再互相污染） */
  var s=shelfSampleFor(nm);
  if(s&&s.bean_id){
    (DB.roasts||[]).forEach(function(r){
      if(String(r.bean_id||'')!==String(s.bean_id)||!r.roast_date)return;
      if(!best||r.roast_date>best)best=r.roast_date;
    });
    if(best)return best;
  }
  var k=String(nm||'').trim().toLowerCase();
  (DB.roasts||[]).forEach(function(r){
    if(String(r.bean_name||'').trim().toLowerCase()!==k||!r.roast_date)return;
    if(!best||r.roast_date>best)best=r.roast_date;
  });
  return best;
}
function shelfFreshness(nm){
  var d=shelfLatestRoast(nm);
  if(!d)return {txt:'no roast date',cls:'',days:null};
  var age=daysSince(d);
  if(age<SHELF_FRESH_REST)return {txt:'roasted '+age+'d — resting',cls:'fr-red',days:age};
  if(age<=SHELF_FRESH_PRIME)return {txt:'roasted '+age+'d — prime',cls:'fr-green',days:age};
  return {txt:'roasted '+age+'d — ageing'+(age>SHELF_STALE_DAYS?' · re-roast?':''),cls:'fr-yellow',days:age};
}

  }catch(e){}
  var dots={};try{dots=await cardDots();}catch(e){}
  /* 排序照老闆定：烘豆日從舊到新（最老的在上＝先賣先清）；沒烘豆日的沉底按名字排 */
  /* paused＝售罄不是故障（sync-to-square 的 availability 把 status 設成 paused）——照樣上架列表，別丟去 Sync problems */
  var live=(DB.syncs||[]).filter(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim();})
    .map(function(x){var nm=String(x.bean_id).trim();var d=null;try{d=shelfLatestRoast(nm);}catch(e){}return {x:x,nm:nm,d:d};})
    .sort(function(a,b){
      if(!!a.d!==!!b.d)return a.d?-1:1;
      return String(a.d||'').localeCompare(String(b.d||''))||a.nm.localeCompare(b.nm);
    })
    .map(function(e){return e.x;});
  var soldN=0;
  /* 可點列（同客戶名冊 .hit 樣式）：點豆 → 明細抽屜（烘焙風味＋豆子履歷，老闆點名） */
  /* 回爐標示：豆同時在 QC 佇列/待杯（send back 之後）＝內部重審中、對外照賣——標出來免得像重複 */
  var inQCSet={};
  (QCQ||[]).forEach(function(q){inQCSet[String(q.s.sample_id||'').trim().toLowerCase()]=1;});
  toCupList().forEach(function(r){inQCSet[String(r.bean_name||'').trim().toLowerCase()]=1;});
  var rows=live.map(function(x){
    var nm=String(x.bean_id).trim();
    var price=m.rtl_price[nm],g=m.rtl_g[nm]||250;
    var sold=!!m.rtl_sold[nm]||x.status==='paused';if(sold)soldN++;
    var fr=shelfFreshness(nm);
    var rep=shelfSampleFor(nm);
    var col=dotColorFor(nm,dots);
    var inQC=!!inQCSet[nm.toLowerCase()];
    return '<div class="hit" data-shelf="'+esc(nm)+'"><span><div class="t" style="font-size:16px">'
      +(col?'<span style="color:'+col+';font-size:12px">●</span> ':'')+esc(nm)
      +(rep&&rep.process?' <span style="color:var(--muted);font-weight:400;font-size:12.5px;font-family:Inter,sans-serif">'+esc(rep.process)+'</span>':'')+'</div>'
      +'<div class="s">'+(price!=null?g+'g '+money(price):'<span class="red">no price</span>')
      +' · <span class="'+fr.cls+'"'+(fr.cls?'':' style="color:var(--muted)"')+'>'+esc(fr.txt)+'</span>'
      +(inQC?' · <span class="fr-yellow">re-checking in QC</span>':'')+'</div></span>'
      +'<span class="k'+(sold?' red':'')+'">'+(sold?'Sold out':'On sale')+'</span></div>';
  }).join('');
  var errs=(DB.syncs||[]).filter(function(x){return x.status&&x.status!=='synced'&&x.status!=='paused';});
  var toList=ITEMS.filter(function(i){return i.kind==='list';});
  openDrawerHTML('<div class="t" style="font-size:19px">Retail Info</div>'
    +'<div class="s" style="margin-top:2px">'+live.length+' live on Square'+(soldN?' · <span class="red">'+soldN+' sold out</span>':'')+' · tap a coffee for flavour and dossier</div>'
    +(rows||'<div class="empty">Nothing on the shelf yet</div>')
    +(errs.length?'<div class="dlab">Sync problems</div>'+errs.map(function(x){return '<div class="dl"><span>'+esc(x.bean_id||'—')+'</span><span class="red">'+esc(x.status)+'</span></div>';}).join(''):'')
    +(toList.length?'<div class="dlab">Ready to list</div>'+toList.map(function(i){
        return '<div class="dl"><span>'+esc(i.ref.sample_id||'—')+'</span><span>QC passed · use the List card in Today</span></div>';}).join(''):'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  document.querySelectorAll('#drawer [data-shelf]').forEach(function(el){el.addEventListener('click',function(){openShelfBeanDetail(el.dataset.shelf,m);});});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* Retail shelf 豆子明細：售價/新鮮度＋烘焙風味（風味詞、comment、雷達）＋豆子履歷＋一鍵資訊卡 */
async function openShelfBeanDetail(nm,m){

  openDrawerHTML('<div class="t" style="font-size:19px">'+esc(nm)+'</div><div class="empty">Loading…</div>');

  var feats=(s.features||[]).filter(Boolean).slice(0,3);
  var hasScores=['fragrance','acidity','sweetness','body','aftertaste'].some(function(k){return s[k]!=null;});
  var sc={fragrance:s.fragrance,acidity:s.acidity,sweetness:s.sweetness,body:s.body,aftertaste:s.aftertaste};
  var fr=shelfFreshness(nm);
  var syncRow=(DB.syncs||[]).find(function(x){return String(x.bean_id||'').trim().toLowerCase()===nm.toLowerCase();});
  var price=m.rtl_price[nm],g=m.rtl_g[nm]||250,szc=m.rtl_sizes[nm]||{},

  var rdate=null;try{rdate=shelfLatestRoast(nm);}catch(e){}
  /* 順序照老闆定：名字 → 烘豆日＋天數/熟成 → 規格價格 → 雷達 → 風味 → 履歷 */
  openDrawerHTML('<span class="tag" style="color:'+col+'">● Shelf'+(sold?' · <span class="red">sold out</span>':'')+'</span>'
    +'<div class="t" style="font-size:19px">'+esc(nm)
    +(s.process?' <span style="font-size:13px;color:var(--muted);font-family:Inter,sans-serif;font-weight:400">'+esc(s.process)+'</span>':'')+'</div>'
    +'<div class="s" style="margin-top:2px">'+(rdate?'roasted '+fmtD(rdate)+' · ':'')
    +'<span class="'+fr.cls+'"'+(fr.cls?'':' style="color:var(--muted)"')+'>'+esc(fr.days!=null?fr.days+'d — '+fr.txt.split('— ')[1]:fr.txt)+'</span>'
    +(s.flavour_locked?'':' · flavour unlocked')
    +((QCQ||[]).some(function(q){return String(q.s.sample_id||'').trim().toLowerCase()===nm.toLowerCase();})?' · <span class="fr-yellow">re-checking in QC</span>':'')+'</div>'
    +'<div style="margin-top:10px">'
    +(price!=null?'<div class="dl"><span>'+g+'g</span><span>'+money(price)+'</span></div>':'<div class="dl"><span>Price</span><span class="red">not recorded</span></div>')
    +(szc.g500?'<div class="dl"><span>500g</span><span>'+money(szc.g500)+'</span></div>':'')
    +(szc.g1000?'<div class="dl"><span>1kg</span><span>'+money(szc.g1000)+'</span></div>':'')
    +'</div>'
    +(hasScores?'<img src="'+printRadarPNG(sc,col)+'" style="width:72%;max-width:250px;display:block;margin:12px auto 0" alt="cup profile">':'')
    +'<div class="dlab" style="color:'+col+'">Tasting notes</div>'
    +(feats.length?'<div style="margin-top:2px">'+feats.map(function(f){return '<span class="shop-chip">'+esc(f)+'</span>';}).join('')+'</div>':'')
    +(s.comment?'<div class="s" style="font-style:italic;margin-top:6px">“'+esc(s.comment)+'”</div>':'')
    +(s.cupper?'<div class="s" style="margin-top:4px">Analysed by '+esc(s.cupper)+'</div>':'')
    +(!feats.length&&!s.comment&&!hasScores?'<div class="s" style="margin-top:4px">No cupping record yet — cup it in QC first</div>':'')
    +(info.length?'<div class="dlab" style="color:'+col+'">The coffee</div>'
      +info.map(function(r){return '<div class="dl"><span>'+esc(r[0])+'</span><span style="text-align:right">'+esc(String(r[1]))+'</span></div>';}).join(''):'')
    +'<button class="act" id="sb-edit">Edit listing…</button>'
    +'<button class="dclose" id="sb-sold">'+(sold?'Put back on sale':'Mark sold out')+'</button>'
    +'<button class="dclose" id="sb-requeue">Send back to QC…</button>'
    +'<button class="dclose" id="sb-card">Info card PDF</button>'
    +'<button class="dclose" id="sb-promo">Social post kit — IG &amp; RED</button>'
    +'<button class="dclose" id="sb-ann">Announce by email — new coffee</button>'

  $('sb-edit').addEventListener('click',function(){openListSheet({ref:s});});
  /* 放錯資訊退回 QC 重審（老闆點名）：清最近判定＋解鎖風味 → 重杯修正 → Pass 重鎖；Square 上架不動 */
  $('sb-requeue').addEventListener('click',async function(){
    var r=(DB.roasts||[]).find(function(x){
      if(!x.qc)return false;
      if(s.bean_id&&x.bean_id)return String(x.bean_id)===String(s.bean_id);
      return String(x.bean_name||'').trim().toLowerCase()===nm.toLowerCase();
    });
    if(!r){alert('No judged batch found for "'+nm+'".');return;}
    if(!confirm('Send "'+nm+'" back to the QC queue?\n\nThe batch verdict ('+r.qc+') is cleared and the flavour unlocks — re-cup to fix the notes, then Pass it again.\nThe Square listing stays live meanwhile.'))return;
    var btn=this;btn.disabled=true;btn.textContent='Sending…';
    try{
      var u=await sb.from('roasts').update({qc:null}).eq('id',r.id);
      if(u.error)throw new Error(u.error.message);
      if(s.id){try{await sb.from('samples').update({flavour_locked:false}).eq('id',s.id);}catch(e){}}

      btn.disabled=false;btn.textContent='Send back to QC…';

      openRetailSheet();
    }catch(e){
      btn.disabled=false;btn.textContent=sold?'Put back on sale':'Mark sold out';
      alert('Update failed: '+(e&&e.message||e));
    }
  });
  $('sb-card').addEventListener('click',function(){openInfoCardPrint(s);});
  $('sb-promo').addEventListener('click',function(){openPromoSheet(s,m);});
  $('sb-ann').addEventListener('click',function(){announceShelfBean(s,nm,this);});
  $('sb-back').addEventListener('click',openRetailSheet);
  $('d-cl').addEventListener('click',closeDrawer);

/* ===== Social post kit（社群曝光 Phase 4 第一刀：貨架豆一鍵出 IG/小紅書素材）=====
   卡片＝同 Square/信件設計但走 tight 白邊（IG 貼文沒有平台裁切，同 classic Print Centre 下載版）；
   文案照 cupAutoComment 慣例本機模板組句（不呼叫 AI），是草稿——老闆貼上前自行修 */
var PROC_ZH={washed:'水洗',natural:'日曬',honey:'蜜處理',anaerobic:'厭氧',
  'anaerobic natural':'厭氧日曬','anaerobic washed':'厭氧水洗','wet hulled':'濕刨','carbonic maceration':'二氧化碳浸漬'};
function promoCaptions(nm,info,feats,comment,price,g,proc){
  function get(lab){var r=(info||[]).find(function(x){return x[0]===lab;});return r?String(r[1]):'';}
  var origin=get('Origin'),variety=get('Variety');
  proc=String(proc||'').trim();
  var procZh=PROC_ZH[proc.toLowerCase()]||'';
  var priceLine=(price!=null)?('$'+centAmt(price)+' / '+g+'g'):'';
  var en='NEW ON THE SHELF — '+nm+'\n';
  var line2=[origin,proc?proc+' process':'',variety].filter(Boolean).join(' · ');
  if(line2)en+=line2+'\n';
  if(feats.length)en+='Cupping notes: '+feats.join(', ')+'\n';
  if(comment)en+='“'+comment+'”\n';
  en+='\n'+(priceLine?priceLine+' · ':'')+'roasted fresh in Crows Nest, Sydney.\n'
    +'Order through the link in bio, or come say hi at the lab.\n\n'
    +'#specialtycoffee #sydneycoffee #crowsnest #coffeeroaster #freshlyroasted';
  var zh='☕ 新豆上架｜'+nm+'\n';
  var zp=[];
  if(origin)zp.push('產地 '+origin);
  if(proc)zp.push(procZh?procZh+'處理':proc+' process');
  if(zp.length)zh+=zp.join('，')+'\n';
  if(feats.length)zh+='杯測風味：'+feats.join('、')+'\n';
  if(comment)zh+='「'+comment+'」\n';
  zh+='\n'+(priceLine?priceLine+'，':'')+'雪梨 Crows Nest 本地新鮮烘焙。\n'
    +'歡迎私訊訂購，或來店裡喝一杯 🤎\n\n'
    +'#雪梨咖啡 #悉尼咖啡 #精品咖啡 #咖啡豆推薦 #北岸咖啡';
  return {en:en,zh:zh};
}

    var b64=await makeSquareCard(await cardDataFor(full,blendMap,dots),{tight:true});
    var feats=(full.features||[]).filter(Boolean).slice(0,3);
    var cap=promoCaptions(nm,info,feats,full.comment||'',m.rtl_price[nm],m.rtl_g[nm]||250,full.process||'');

    var body=$('pk-body');

/* ===== 新豆通知信群發（社群曝光 Phase 4：一份內容三發的「信」——IG/小紅書在 Social post kit）=====
   照抄 classic announceCoffee/uploadCardFor：QC 閘門→客戶人數確認→畫卡上傳 mail-assets（Square 安全白邊版，
   不是 IG tight 版）→ send-email announce_coffee 群發 */
async function uploadCardForBean(nm){
  try{
    var fq=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm)
      .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
    var full=fq&&fq.data&&fq.data[0];if(!full)return '';
    var dots={};try{dots=await cardDots();}catch(e){}
    var blendMap={};
    try{var bq=await sb.from('blends').select('name,parts,note');
      (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
    var b64=await makeSquareCard(await cardDataFor(full,blendMap,dots));
    if(!b64)return '';
    var path='card-'+cardSlug(nm)+'.png';
    var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
    if(up&&up.error)return '';
    var pub=sb.storage.from('mail-assets').getPublicUrl(path);
    var u=pub&&pub.data&&pub.data.publicUrl;
    return u?(u+'?v='+Date.now()):'';
  }catch(e){return '';}
}
async function announceShelfBean(s,nm,btn){
  /* QC 閘門同 classic listingGate：打槍批擋死，沒 pass/沒鎖風味只警告 */
  var qr=null;try{qr=matchRoast(s);}catch(e){}
  if(qr&&qr.qc==='reroast'){alert('QC verdict for the latest batch is Re-roast — fix the batch before announcing.');return;}
  if(qr&&qr.qc==='downgrade'){alert('The latest batch is downgraded — not retail grade.');return;}
  var warns=[];
  if(!qr||!qr.qc)warns.push('no QC pass recorded for the latest batch');
  if(!s.flavour_locked)warns.push('flavour description not locked');
  if(warns.length&&!confirm('Heads up: '+warns.join('; ')+'.\nAnnounce anyway?'))return;
  var res=null;
  try{res=await sb.from('customers').select('id,email').not('email','is',null);}catch(e){}
  var n=(res&&res.data)?res.data.filter(function(c){return c.email;}).length:0;
  if(!n){alert('No customers with an email address yet.');return;}
  if(!confirm('Email "New coffee: '+nm+'" to '+n+' customer'+(n>1?'s':'')+'?'))return;
  var orig=btn.textContent;btn.disabled=true;btn.textContent='Sending…';
  try{
    var cardUrl=await uploadCardForBean(nm);
    var flav=(s.features&&s.features.length)?s.features.slice(0,3).join(', '):'';
    var r=await callFn('send-email',{action:'announce_coffee',name:nm,card_url:cardUrl,flavour:flav,note:(s.comment||'').trim()});
    toast('Sent to '+(r.sent||0)+' of '+(r.total||n)+' customers'+(r.failed?(' · '+r.failed+' failed'):'')+' ✓');
  }catch(e){alert('Announce failed: '+(e&&e.message||e));}
  btn.disabled=false;btn.textContent=orig;
}
/* ===== 刪除咖啡豆（老闆點名：清打錯名/重複的零售豆）=====
   刪 samples（Ratio Coffee 杯測紀錄）＋roasts（烘豆批次）＋product_sync＋app_state 記憶鍵；
   **生豆庫存（beans）永遠不碰**；Square 目錄上的商品本身留著（要移除去 Square 後台），但清掉 product_sync 後店面菜單就不再列它 */
function allRetailCoffees(){
  var seen={},out=[];
  (DB.samples||[]).forEach(function(s){
    var nm=String(s.sample_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].cups++;
  });
  (DB.roasts||[]).forEach(function(r){
    var nm=String(r.bean_name||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].roasts++;
  });
  /* 純上架孤兒也要列（只在 product_sync、0 杯測 0 烘豆——老闆的 Danche 殘留就是這種漏網魚） */
  (DB.syncs||[]).forEach(function(x){
    var nm=String(x.bean_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
  });
  /* synced 含 paused（售罄也是上架中）——刪除時才會連 Square 商品一起拆 */
  out.forEach(function(e){e.synced=!!(DB.syncs||[]).find(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim().toLowerCase()===e.name.toLowerCase();});});
  return out.sort(function(a,b){return a.name.localeCompare(b.name);});
}
function openDeleteCoffeeSheet(){
  var list=allRetailCoffees();
  openDrawerHTML('<div class="t" style="font-size:19px">Delete a coffee</div>'
    +'<div class="s" style="margin-top:2px">removes cupping records and roast batches — green bean stock is never touched</div>'

async function confirmDeleteCoffee(e){
  var msg='Delete "'+e.name+'"?\n\nThis removes:\n· '+e.cups+' cupping record'+(e.cups===1?'':'s')+'\n· '+e.roasts+' roast batch'+(e.roasts===1?'':'es')+'\n· shelf price / colour memories'
    +(e.synced?'\n· the Square listing (item deleted from the Square catalogue too)':'')
    +'\n\nGreen bean stock is NOT touched. This cannot be undone.';
  if(!confirm(msg))return;
  if(!confirm('Really delete "'+e.name+'"? Last chance.'))return;
  toast('Deleting…');
  try{
    /* 已上架＝先拆 Square（edge 內建 delete：刪目錄商品＋product_sync）；失敗就先停，別半刪 */
    if(e.synced){
      try{await callFn('sync-to-square',{action:'delete',sample_id:e.name});}
      catch(err){
        if(!confirm('Square removal failed: '+(err&&err.message||err)+'\n\nDelete the local records anyway? The Square item will stay until you remove it in the Square dashboard.'))return;
      }
    }
    var d1=await sb.from('samples').delete().eq('supplier','Ratio Coffee').ilike('sample_id',e.name);
    if(d1.error)throw new Error(d1.error.message);
    var d2=await sb.from('roasts').delete().ilike('bean_name',e.name);
    if(d2.error)throw new Error(d2.error.message);
    try{await sb.from('product_sync').delete().ilike('bean_id',e.name);}catch(err){}
    /* app_state 記憶鍵大掃除（價/克/規格/售罄/顏色） */
    var keys=['rtl_price','rtl_g','rtl_sizes','rtl_sold','rtl_dot'];
    for(var i=0;i<keys.length;i++){
      try{
        var r=await sb.from('app_state').select('value').eq('key',keys[i]).maybeSingle();
        var v=r&&r.data&&r.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(err){v=null;}}
        if(!v||typeof v!=='object')continue;
        var hit=false;
        Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===e.name.toLowerCase()){delete v[k];hit=true;}});
        if(hit)await sb.from('app_state').upsert({key:keys[i],value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
      }catch(err){}
    }
    _dotsMap=null;
    closeDrawer();toast('"'+e.name+'" deleted ✓');
    await reload();
  }catch(err){
    alert('Delete failed: '+(err&&err.message||err));
  }
}

async function setShelfSold(nm,sold){

  var r=await sb.from('app_state').select('value').eq('key','rtl_sold').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===nm.toLowerCase()&&k!==nm)delete v[k];});
  if(sold)v[nm]=true;else delete v[nm];
  var u=await sb.from('app_state').upsert({key:'rtl_sold',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
}

function openBatchesSheet(){

  var groups={},order=[];
  bats.forEach(function(r){var k=String(r.bean_name||'—').trim(),lk=k.toLowerCase();if(!groups[lk]){groups[lk]={name:k,rows:[]};order.push(lk);}groups[lk].rows.push(r);});
  order.sort(function(a,b){return groups[a].name.localeCompare(groups[b].name);});
  var totKg=0;bats.forEach(function(r){totKg+=Number(r.remaining_kg)||0;});
  var h='';
  order.forEach(function(k){
    var g=groups[k];
    g.rows.sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var tot=0;g.rows.forEach(function(r){tot+=Number(r.remaining_kg)||0;});

      if(old)tags.push('<span class="red">&gt;30d</span>');
      if(r.qc==='pass')tags.push('QC ✓');else if(r.qc==='reroast')tags.push('<span class="red">re-roast</span>');else if(r.qc==='downgrade')tags.push('downgraded');
      if(r.kind==='blend')tags.push('blend');
      h+='<div class="hit" data-b="'+esc(r.id)+'"><span><div class="t">'+(r.roast_date?fmtD(r.roast_date):'—')+'</div>'
        +'<div class="s">'+(r.roast_date?age+' days old':'no roast date')+(tags.length?' · '+tags.join(' · '):'')+'</div></span>'
        +'<span class="k'+(old?' red':'')+'" style="font-size:15px">'+(Number(r.remaining_kg)||0)+' kg</span></div>';

    +'<div class="s" style="margin-top:2px">'+(bats.length?bats.length+' batches · '+(Math.round(totKg*100)/100)+' kg · oldest first — use it first · tap to log usage':'')+'</div>'

    if(b){if(!RCV.supplier)RCV.supplier=b.supplier||'';if(!RCV.cost&&b.cost_per_kg!=null)RCV.cost=String(b.cost_per_kg);}
    paintReceiveSheet();
  });

async function saveReceiveSheet(){
  var kg=parseFloat(String(RCV.kg).trim());
  if(isNaN(kg)||kg<=0){toast('Enter the received kg');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');
  var beanId,after;
  try{
    if(RCV.mode==='existing'){
      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;
      if(sup)upd.supplier=sup;
      var u=await sb.from('beans').update(upd).eq('id',b.id);
      if(u.error)throw new Error(u.error.message);
      Object.assign(b,upd);
      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* 防重複：同名同處理法已有批次 → 提醒改用 Existing lot 併批 */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;
    }
    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' — '+sup:'')+(lot?' · lot '+lot:'')});}catch(e){}
    closeDrawer();toast('Received ✓ +'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to stock';}
    alert('Receive failed: '+(e&&e.message||e));
  }
}

      +'</div>';
  });
  openDrawerHTML('<div class="t" style="font-size:19px">Stocktake</div>'

    +(rows||'<div class="empty">No green beans on the books</div>')

  document.querySelectorAll('#drawer [data-stk]').forEach(function(el){el.addEventListener('input',function(){STK.vals[el.dataset.stk]=el.value;});});
  $('stk-save').addEventListener('click',saveStocktakeSheet);
  $('d-cl').addEventListener('click',closeDrawer);

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  closeDrawer();toast('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted ✓');
  await reload();
}

async function pushListToSquare(){
  var s=LST.s,nm=LST.name;
  var price=Number(String(LST.price).replace(/[^0-9.]/g,''));
  if(!price||price<=0){toast('Enter a price first');return;}
  var p500=Number(String(LST.p500).replace(/[^0-9.]/g,''))||0;
  var p1k=Number(String(LST.p1k).replace(/[^0-9.]/g,''))||0;
  /* 重審中 push 不再彈「沒鎖要推嗎」——抽屜黃字已講明鎖定等 QC Pass */
  if(!s.flavour_locked&&!LST.lock&&!LST.requeue&&!confirm('Flavour description is not locked — push anyway?'))return;
  var btn=$('ls-push');if(btn){btn.disabled=true;btn.textContent='Drawing card…';}
  try{
    /* 資訊卡：同出貨信管線（flavour_locked 紀錄優先） */
    var img64=null;
    try{
      var fq=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var full=fq&&fq.data&&fq.data[0];
      if(full){
        var dots=await cardDots();
        var blendMap={};
        try{var bq=await sb.from('blends').select('name,parts,note');
          (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
        img64=await makeSquareCard(await cardDataFor(full,blendMap,dots));
      }
    }catch(e){console.error('card',e);}
    if(btn)btn.textContent='Pushing…';
    var variations=[{grams:LST.grams,price:price}];
    if(p500>0)variations.push({grams:500,price:p500});
    if(p1k>0)variations.push({grams:1000,price:p1k});
    var desc=[s.process||'',(s.features||[]).slice(0,3).join(', ')].filter(Boolean).join(' · ');
    await callFn('sync-to-square',{action:'push',sample_id:nm,name:nm,description:desc,grams:LST.grams,price:price,variations:variations,image_b64:img64});
    /* 價格記憶寫回 app_state（讀回最新再改，避免蓋掉別台改的） */
    try{
      var mem=await sb.from('app_state').select('key,value').in('key',['rtl_price','rtl_g','rtl_sizes']);
      var m={rtl_price:{},rtl_g:{},rtl_sizes:{}};
      (mem.data||[]).forEach(function(x){var v=x.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}if(v&&typeof v==='object')m[x.key]=v;});
      m.rtl_price[nm]=price;m.rtl_g[nm]=LST.grams;
      var sc={};if(p500>0)sc.g500=p500;if(p1k>0)sc.g1000=p1k;m.rtl_sizes[nm]=sc;
      for(var k in m)await sb.from('app_state').upsert({key:k,value:m[k],updated_at:new Date().toISOString()},{onConflict:'key'});
    }catch(e){console.error('price memory',e);}
    if(!s.flavour_locked&&LST.lock){try{await sb.from('samples').update({flavour_locked:true}).eq('id',s.id);}catch(e){}}
    closeDrawer();toast(LST.upd?'Updated on Square ✓':'Live on Square ✓');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=LST.upd?'Push update to Square':'Push to Square';}
    alert('Push failed: '+(e&&e.message||e));
  }
}

/* ===== 杯測快錄（照 classic submitCupping 規則：samples insert＋批次標 cupped → 進 QC 佇列）===== */
var CUP=null;
var CUP_FIELDS=[['fragrance','Aroma'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
async function openCupSheet(i){
  var r=i.ref;
  /* 帶上一次同豆紀錄的風味（DB.samples 已篩 Ratio Coffee、新→舊） */
  var prev=null;
  (DB.samples||[]).forEach(function(s){
    if(prev)return;
    if(r.bean_id&&s.bean_id){if(String(s.bean_id)===String(r.bean_id))prev=s;return;}
    if(String(s.sample_id||'').trim().toLowerCase()===String(r.bean_name||'').trim().toLowerCase())prev=s;
  });
  var bean=(DB.beans||[]).find(function(b){return String(b.id)===String(r.bean_id);});
  /* 拉霸永遠有值：上次同豆分數帶入（clamp 1–3），沒有全 2＝Medium */
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(prev?prev[f[0]]:null);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(r.bean_name,dots);
  CUP={r:r,editId:null,scores:sc,dot:dk,dot0:dk,
    feats:(prev&&prev.features?prev.features.slice(0,3):[]),comment:'',
    process:(bean&&bean.process)||(prev&&prev.process)||''};
  paintCupSheet();
}
function cupClamp(v){v=Number(v);if(isNaN(v)||v<=0)return 2;return Math.min(3,Math.max(1,v));}
/* Re-cup（老闆點名「杯測需要 re-analysed」）：QC 佇列裡的批次重開杯測抽屜，帶原紀錄、存檔＝update 同一筆 */
async function openRecupSheet(q){
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(q.s[f[0]]);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(q.r.bean_name||q.s.sample_id,dots);
  CUP={r:q.r,editId:q.s.id,scores:sc,dot:dk,dot0:dk,
    feats:(q.s.features||[]).slice(0,3),comment:String(q.s.comment||''),
    process:q.s.process||''};
  paintCupSheet();
}
/* comment 留白時的規則組句（老闆拍板：本機組句不呼叫 AI）：風味詞＋高分感官，總長 ≤30 字元 */
function cupAutoComment(sc,feats){
  sc=sc||{};
  var fl=(feats||[]).filter(Boolean);
  var out=fl.slice(0,2).join(', ');
  if(out.length>22)out=fl[0]||'';
  var cand=[];
  if((sc.acidity||0)>=2.5)cand.push([sc.acidity,'bright']);
  if((sc.sweetness||0)>=2.5)cand.push([sc.sweetness,'sweet']);
  if((sc.body||0)>=2.5)cand.push([sc.body,'syrupy']);
  else if(sc.body&&sc.body<=1.5)cand.push([2,'silky']);
  if((sc.aftertaste||0)>=2.5)cand.push([sc.aftertaste,'long finish']);
  if((sc.fragrance||0)>=2.5)cand.push([sc.fragrance,'perfumed']);
  cand.sort(function(a,b){return b[0]-a[0];});
  var first=true;
  for(var i=0;i<cand.length;i++){
    var sep=out?(first?' · ':', '):'';
    if((out+sep+cand[i][1]).length>30)continue;
    out+=sep+cand[i][1];first=false;
  }
  return out;
}
/* Cup v2（杯測師視角設計評審）：成品預覽卡（雷達＋風味＋comment 合一）＋五條拉霸即時驅動 */
function paintCupSheet(){
  var r=CUP.r,K=CUP_FIELDS;
  var cx=150,cy=118,R=84;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  var rings=[1,2,3].map(function(l){

      features:feats,comment:(CUP.comment||cupAutoComment(sc,feats))||null,decision:null,cupper:WHO||null};

    if(ins.error){var r3=Object.assign({},rec);delete r3.features;delete r3.cupper;ins=await sb.from('samples').insert(r3).select();}
    if(ins.error){var r4=Object.assign({},rec);delete r4.features;delete r4.cupper;delete r4.bean_id;ins=await sb.from('samples').insert(r4).select();}

/* 拼配批次存檔（照 classic addCoffeeSubmit blend 路徑：快照配方→insert→FIFO 扣成分）*/
async function saveBlendBatch(){

  if(isDup&&!confirm('"'+bl.name+'" already has a batch dated '+date+'. Add another?'))return;
  var parts=(bl.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;})
    .map(function(p){return {bean:p.bean,process:p.process||'',pct:parseFloat(p.pct)};});
  var btn=$('ro-save');if(btn){btn.disabled=true;btn.textContent='Logging…';}
  try{

      recipe:{blend_id:bl.id||null,parts:parts}};

/* FIFO 消耗成分批次（照 classic consumeBlendComponents）——回傳不夠扣的清單 */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    var pool=(DB.roasts||[]).filter(function(r){
      return r.kind!=='blend'&&Number(r.remaining_kg)>0&&String(r.bean_name||'').trim().toLowerCase()===key;
    }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}
async function saveRoastSheet(){

  var out=String(RO.out).trim()===''?null:parseFloat(RO.out);
  if(out!=null&&(isNaN(out)||out<0)){toast('Roasted out must be a number');return;}
  if(out!=null&&out>kg&&!confirm('Roasted out ('+out+' kg) is more than green in ('+kg+' kg). Save anyway?'))return;
  var stock=Number(b.quantity)||0;
  if(kg>stock+0.0001&&!confirm('Stock check:\n'+b.name+': '+kg+' kg entered, '+stock+' kg in stock\n\nLog anyway? Stock will stop at 0 — fix the numbers later with Stocktake.'))return;
  var btn=$('ro-save');if(btn){btn.disabled=true;btn.textContent='Logging…';}
  try{
    var rec={bean_id:b.id,bean_name:b.name,country:b.country||null,green_kg:kg,status:'pending_cupping'};
    if(out!=null&&out>0){rec.roasted_kg=out;rec.remaining_kg=out;}
    if(RO.date)rec.roast_date=RO.date;
    var num=function(v){var n=parseFloat(v);return (String(v).trim()===''||isNaN(n))?null:n;};
    if(num(RO.charge)!=null)rec.charge_temp=num(RO.charge);
    if(String(RO.fc).trim())rec.first_crack=String(RO.fc).trim();
    if(num(RO.drop)!=null)rec.drop_temp=num(RO.drop);
    if(String(RO.dur).trim())rec.duration=String(RO.dur).trim();
    var ins=await sb.from('roasts').insert(rec).select();
    if(ins.error)throw new Error(ins.error.message);
    var newQty=Math.max(0,Math.round((stock-kg)*1000)/1000);
    var u=await sb.from('beans').update({quantity:newQty}).eq('id',b.id);
    if(u.error)throw new Error('batch saved but stock update failed: '+u.error.message);
    b.quantity=newQty;
    try{await sb.from('stock_moves').insert({bean_id:b.id,kind:'roast',delta_kg:-kg,after_kg:newQty,note:'Roast'+(RO.date?' '+RO.date:'')});}catch(e){}
    if(ins.data&&ins.data[0])DB.roasts.unshift(ins.data[0]);
    closeDrawer();toast('Roast logged ✓ stock −'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Log roast';}
    alert('Log failed: '+(e&&e.message||e));
  }
}
/* ===== 滑卡 ===== */
function attachSwipe(el,id){
  /* 誤觸防護：①方向鎖——先確認是「明確的橫向」才開始滑（斜滑/直捲直接放棄）
     ②門檻加大——要滑過卡片寬度的 35%（做）/ 45%（貪睡）才觸發 */
  var x0=null,y0=0,dx=0,locked=false,dead=false;
  var barC=el.style.borderLeftColor; /* 類別色條：borderColor 清空會連左條一起洗掉，回彈時補回 */
  function reset(anim){el.style.transition=anim?'transform .25s':'none';el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;x0=null;dx=0;locked=false;dead=false;}
  el.addEventListener('pointerdown',function(e){if(e.target.closest('button'))return;x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;try{el.setPointerCapture(e.pointerId);}catch(err){}el.style.transition='none';});
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;return;}
      if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.6)locked=true;
      else return;
    }
    el.style.transform='translateX('+dx*0.9+'px)';
    var w=el.offsetWidth;
    var bc=dx>w*0.25?'var(--accent)':(dx<-w*0.3?'var(--muted)':'');
    el.style.borderColor=bc;
    el.style.borderLeftColor=bc||barC; /* 沒過門檻時左條維持類別色 */
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth;
    if(locked&&dx>w*0.35){var i=item(id);reset(true);if(i)runAction(id,null);}
    else if(locked&&dx<-w*0.45){addSnooze(id);dropCard(id,true);toast('Snoozed — back tomorrow');x0=null;dx=0;locked=false;}
    else reset(true);
  });
}

async function saveBackfill(){

/* 印刷卡雷達：html2canvas **不畫行內 SVG**（老闆真機 PDF 雷達整個消失的破圖根因）
   → 用 canvas 畫成 PNG 嵌 <img>，4 倍超取樣夠印刷 */
function printRadarPNG(sc,color){
  var S=4;
  var cv=document.createElement('canvas');cv.width=412*S;cv.height=246*S;
  var x=cv.getContext('2d');x.scale(S,S);x.translate(62,-2); /* 對齊定稿 viewBox -62 2 412 246（大寫標籤要寬邊） */
  var K=[['fragrance','AROMA'],['acidity','ACIDITY'],['sweetness','SWEETNESS'],['body','BODY'],['aftertaste','AFTERTASTE']];
  var cx=150,cy=128,R=88;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  x.lineWidth=1;x.strokeStyle='#D9D2CB';
  [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);if(i)x.lineTo(q[0],q[1]);else x.moveTo(q[0],q[1]);}x.stroke();});
  for(var i=0;i<5;i++){var q=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(q[0],q[1]);x.stroke();}
  var pts=K.map(function(k,i){return pt(i,R*(Number(sc[k[0]])||0)/3);});
  x.beginPath();pts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
  x.globalAlpha=.14;x.fillStyle=color;x.fill();x.globalAlpha=1;
  x.lineWidth=2.5;x.strokeStyle=color;x.lineJoin='round';x.stroke();
  x.fillStyle=color;
  pts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],4.5,0,6.3);x.fill();});
  x.fillStyle='#8A837C';x.font='600 13.5px Inter, sans-serif';
  try{x.letterSpacing='1px';}catch(e){}
  K.forEach(function(k,i){
    var q=pt(i,R+21);
    x.textAlign=q[0]<cx-4?'right':(q[0]>cx+4?'left':'center');
    x.fillText(k[1],q[0],q[1]+4);
  });
  return cv.toDataURL('image/png');
}

var _loadedScripts={};
function loadScriptOnce(url){
  if(_loadedScripts[url])return _loadedScripts[url];
  _loadedScripts[url]=new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src=url;s.onload=res;s.onerror=function(){delete _loadedScripts[url];rej(new Error('script load failed — check the connection'));};
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}

  function blendReady(def){

  function menuInfoFor(name){

    var color=(dotKey&&RTL_DOTCOL[dotKey])||'';

    var origin={process:'',variety:'',altitude:'',region:''};

  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a), cy-r*Math.cos(a)];}
    function segsOf(pts){var s=[];for(var i=1;i<pts.length;i++)s.push([pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]]);return s;}
    /* grid rings: Light / Medium / Strong */
    doc.setLineWidth(0.5);doc.setDrawColor(30,26,25);
    [1,2,3].forEach(function(lvl){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,R*lvl/3));doc.lines(segsOf(pts),pts[0][0],pts[0][1],[1,1],'S',true);});
    /* spokes */
    doc.setDrawColor(30,26,25);
    for(var i=0;i<n;i++){var sp=pt(i,R);doc.line(cx,cy,sp[0],sp[1]);}
    /* data polygon (0 = centre when a bean has no reading on that axis) */
    var dpts=scores.map(function(o,i){var v=(o.n==null?0:o.n);return pt(i,R*(v/3));});
    var dseg=segsOf(dpts);
    var TINT=[Math.round(255-(255-BERRY[0])*0.20),Math.round(255-(255-BERRY[1])*0.20),Math.round(255-(255-BERRY[2])*0.20)];
    doc.setFillColor(TINT[0],TINT[1],TINT[2]);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'F',true);
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1.1);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'S',true);
    doc.setFillColor(BERRY[0],BERRY[1],BERRY[2]);
    dpts.forEach(function(p){doc.circle(p[0],p[1],1,'F');});
    /* axis labels, anchored just outside each vertex */
    doc.setFont('helvetica','bold');doc.setFontSize(5.6);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    scores.forEach(function(o,i){
      var lp=pt(i,R+7);
      var align=(lp[0]<cx-2)?'right':(lp[0]>cx+2?'left':'center');
      doc.text(o.label,lp[0],lp[1]+2,{align:align});
    });
  }

  function drawCell(doc,x,y,w,h,info,INK,BROWN,BERRY,MUTE){
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    var px=x+15, pw=w-30;
    if(!info||!info.name){
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('— empty —',x+w/2,y+h/2,{align:'center'});
      return;
    }
    /* ---- coloured banner header (name highlighted in its assigned colour) ---- */
    var band=mnHexRgb(info.color)||BROWN;
    var bandH=38;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE — small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR — primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  ·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE — primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength — radar chart (secondary, muted) — inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid — fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    for(var i=0;i<4;i++){drawCell(doc,cellX[i],cellY[i],cw,ch,info4[i],INK,BROWN,BERRY,MUTE);}
  }

/* PDF 引擎與 logo（jsPDF 同 classic 2.5.1；首次用才載） */
async function menusPDF(buildFn){
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  if(!(window.jspdf&&window.jspdf.jsPDF))throw new Error('PDF engine failed to load');
  return new Promise(function(res){
    var img=new Image();
    img.onload=function(){res(buildFn(img));};
    img.onerror=function(){res(buildFn(null));};
    img.src='/logo.png';
  });
}

function vapidBytes(){
  var s=VAPID_PUBLIC, pad='='.repeat((4-s.length%4)%4);
  var b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  return a;
}
async function enablePush(btn){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){alert('This browser does not support push. On iPhone: add to Home Screen first, then open from the icon.');return;}
    var reg=await navigator.serviceWorker.register('/new/sw.js');
    await navigator.serviceWorker.ready;
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Permission not granted');return;}
    var sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidBytes()});
    var j=sub.toJSON();
    var u=await sb.from('push_subs').upsert({endpoint:j.endpoint,keys:{p256dh:j.keys.p256dh,auth:j.keys.auth},who:WHO||null},{onConflict:'endpoint'});
    if(u.error)throw new Error(u.error.message);
    toast('Notifications on ✓');
    if(btn){var s=btn.querySelector('small');if(s)s.textContent='enabled on this phone ✓';}
  }catch(e){alert('Enable failed: '+(e&&e.message||e));}
}

/* ===== 購物車（匿名客人也能用：localStorage 保留；同規格再加＝數量累加；付款完成 ?checkout=done 清車）
   批發模式（WS_MODE）：獨立車 r2_wcart（共用裝置不混零售車）＋數量上限 40；結帳走 wholesale edge ===== */
var WS_MODE=false, WS_INFO=null, WS_WELCOME_SEEN=false; /* WS_INFO={pct,moq:{threshold,delivery_fee},bank} 來自 wholesale menu */
/* 價格顯示：有小數才補到兩位（$12.50），整數保持乾淨（$25）——批發折扣價常有角分 */
function centAmt(n){n=Number(n)||0;return n%1===0?String(n):n.toFixed(2);}
function cartKey(){return WS_MODE?'r2_wcart':'r2_cart';}
function cartMaxQty(){return WS_MODE?40:9;}
function cartGet(){try{return JSON.parse(localStorage.getItem(cartKey())||'[]');}catch(e){return [];}}
function cartSet(c){try{localStorage.setItem(cartKey(),JSON.stringify(c));}catch(e){}paintCartBar();}
function cartAdd(item){
  var c=cartGet();
  var ex=c.find(function(x){return x.vid===item.vid;});
  if(ex)ex.qty=Math.min(cartMaxQty(),(ex.qty||1)+(item.qty||1));
  else c.push(item);
  cartSet(c);
}
function cartCount(){return cartGet().reduce(function(a,x){return a+(x.qty||1);},0);}
function cartTotal(){return cartGet().reduce(function(a,x){return a+(x.qty||1)*(Number(x.price)||0);},0);}

/* 分類（老闆定的四格）：Blend＝有配方；Co-ferment＝culturing/co-ferment 類；Innovation＝實驗處理法；其餘 Classic */
var SHOP_CATS=[['blend','Blend'],['classic','Classic'],['innovation','Innovation'],['coferment','Co-ferment']];
var SHOP_CAT='blend', SHOP_BEANS=[];
function shopCategory(b){
  if(b.recipe&&b.recipe.length)return 'blend';
  var p=String(b.process||'').toLowerCase();
  if(/co.?ferment|culturing/.test(p))return 'coferment';
  if(/anaerobic|hydro|nitro|carbonic|thermal|cold ferment|yeast|lactic|maceration/.test(p))return 'innovation';
  return 'classic';
}
/* 店面主體：左右滑輪播（scroll-snap，一頁一支豆）＋圓點指示；tab 切分類重畫 */
function renderShopTabs(){
  var el=$('shoptabs');
  var counts={};SHOP_BEANS.forEach(function(b){var c=shopCategory(b);counts[c]=(counts[c]||0)+1;});
  var visible=SHOP_CATS.filter(function(c){return counts[c[0]];});
  if(!counts[SHOP_CAT])SHOP_CAT=visible.length?visible[0][0]:SHOP_CAT;
  /* 空分類不渲染（死路移除）；只剩一類＝整條藏 */
  if(visible.length<=1){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=visible.map(function(c){return '<button data-sct="'+c[0]+'" class="'+(SHOP_CAT===c[0]?'on':'')+'">'+c[1]+'</button>';}).join('');
  el.querySelectorAll('[data-sct]').forEach(function(b){b.addEventListener('click',function(){SHOP_CAT=b.dataset.sct;paintShopBody();});});
}
function paintShopBody(){
  var host=$('shopbody');if(!host)return;
  document.querySelectorAll('#shoptabs [data-sct]').forEach(function(b){b.classList.toggle('on',b.dataset.sct===SHOP_CAT);});
  var list=SHOP_BEANS.filter(function(b){return shopCategory(b)===SHOP_CAT;});
  if(!list.length){host.innerHTML='<div class="empty">Nothing in this corner right now ☕</div>';return;}
  host.innerHTML='<div class="shopwrap" id="shopwrap">'+shopCardsHTML(list)+'</div>'
    /* 玻璃箭頭放 shopbody 裡：離開商店畫面（innerHTML 換掉）就自動消失 */
    +(list.length>1
      ?'<button class="shoparr l" id="sharr-l" aria-label="Previous coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'
      +'<button class="shoparr r" id="sharr-r" aria-label="Next coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'
      :'');
  wireShopCards(host);
  paintCartBar();
  var w=$('shopwrap');
  if(w&&list.length>1){
    var slideW=function(){return w.children[0]?(w.children[0].offsetWidth+14):w.clientWidth;};
    var arrPaint=function(){
      var i=Math.round(w.scrollLeft/slideW());
      var l=$('sharr-l'),r=$('sharr-r');if(!l||!r)return;
      l.style.display=i>0?'flex':'none';
      r.style.display=i<list.length-1?'flex':'none';
    };
    /* smooth scrollBy 在 scroll-snap 容器會被吃掉（實測不動）→ rAF 手動滑，結尾 snap 自己吸正 */
    var glide=function(dx){
      var from=w.scrollLeft,t0=null;
      var step=function(ts){
        if(t0==null)t0=ts;
        var p=Math.min(1,(ts-t0)/260);p=1-Math.pow(1-p,3);
        w.scrollLeft=from+dx*p;
        if(p<1)requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    };
    $('sharr-l').addEventListener('click',function(){glide(-slideW());});
    $('sharr-r').addEventListener('click',function(){glide(slideW());});
    w.addEventListener('scroll',arrPaint,{passive:true});
    arrPaint();
  }
}
/* 規格明細列（Blend 或 Process/Origin/Variety/Cup/Bag/Roasted）——主卡瘦身後只在明細抽屜用 */
function shopSpecsFor(b){
  var specs=[];
  if(b.recipe&&b.recipe.length)specs.push(['Blend',b.recipe.map(function(p){return esc(p.bean)+' '+p.pct+'%';}).join(' · ')]);
  else if(b.process)specs.push(['Process',esc(b.process)]);
  if(b.origin)specs.push(['Origin',esc(b.origin)]);
  if(b.variety)specs.push(['Variety',esc(b.variety)]);
  if(b.comment)specs.push(['Cup',esc(b.comment)]);
  specs.push(['Bag',(b.grams||250)+'g whole beans']);
  if(b.roast_date){
    var age=daysSince(b.roast_date);
    /* 對客人講人話：<14 剛烘好、14–28 最佳賞味、>28 醒好豆（店內的紅綠黃是營運視角） */
    var band=age<SHELF_FRESH_REST?'freshly roasted':(age<=SHELF_FRESH_PRIME?'prime window':'well rested');
    specs.push(['Roasted',(fmtD(b.roast_date)||'')+' — '+band]);
  }
  return specs;
}
