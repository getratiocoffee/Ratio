<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ratio Coffee</title>
<link rel="icon" type="image/png" sizes="192x192" href="/favicon.png">
<link rel="manifest" href="/new/manifest.webmanifest">
<link rel="apple-touch-icon" href="/new/icon-192.png">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--surface:#FFFFFF;--ink:#1A1A1A;--muted:#8A8A8A;--accent:#C87E8E;--tint:#F6EBEE;--danger:#D8756C;--line:#ECECEC;--line2:#DADADA;--inv:#1A1A1A;--inv-t:#FFFFFF;--green:#84B57C;--roast:#DE9670;--qc:#7FA1CE;--mkt:#AB92CE;--orders:#DD8CA4;--cust:#63AFAA;--fin:#CDAC66;--day:#9299AE;--team:#8B90CC;--set:#9BA0B0;--ws:#6E8FB8;--print:#8290A4}
@media(prefers-color-scheme:dark){:root:not(.light){--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#D69AA6;--tint:#33272A;--danger:#DE8579;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C;--green:#92C489;--roast:#E2A57F;--qc:#93ABD4;--mkt:#B7A2D8;--orders:#DE9CB1;--cust:#72BEB8;--fin:#D8B679;--day:#A6AEC8;--team:#9CA1D6;--set:#AAB0C8;--ws:#8CA9D2;--print:#A2AEC4}}
:root.dark{--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#D69AA6;--tint:#33272A;--danger:#DE8579;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C;--green:#92C489;--roast:#E2A57F;--qc:#93ABD4;--mkt:#B7A2D8;--orders:#DE9CB1;--cust:#72BEB8;--fin:#D8B679;--day:#A6AEC8;--team:#9CA1D6;--set:#AAB0C8;--ws:#8CA9D2;--print:#A2AEC4}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{margin:0;background:transparent;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding-bottom:170px}
/* iOS standalone 怪癖：頁面捲不動時 innerHeight 縮一截→固定底部 bar 往上跳。強制內部 app 頁永遠可捲，innerHeight 才穩定，bar 貼底不跳（多出的高度藏在固定面板後） */
body.appview{min-height:calc(100vh + 1px);min-height:calc(100lvh + 1px)}
.bglogo{position:fixed;inset:0;z-index:-1;pointer-events:none;background:var(--ink);opacity:.055;transform:rotate(-12deg);
  -webkit-mask:url(/logo.png) no-repeat center 40% / min(96vw,440px);
  mask:url(/logo.png) no-repeat center 40% / min(96vw,440px)}
@media(prefers-color-scheme:dark){:root:not(.light) .bglogo{opacity:.09}}
:root.dark .bglogo{opacity:.09}
header{background:var(--bg);color:var(--ink);border-bottom:1.5px solid var(--ink);padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 8px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
/* logo 置中：左右兩欄各 flex:1 平分，中間 logo 恆在正中（右邊不管是購物車或員工狀態字都不影響） */
header .hspace{flex:1}
/* logo mask 上色（跟 .bglogo 同招），夜版自動跟 --ink 變色 */
.brandlogo{width:61px;height:61px;display:block;background:var(--ink);-webkit-mask:url(/logo.png) no-repeat center/contain;mask:url(/logo.png) no-repeat center/contain}
.sbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top,0px);background:#1A1A1A;z-index:100;pointer-events:none}
header .brand{font-family:'Fraunces',serif;font-size:21px;font-weight:700}
header .cnt{flex:1;text-align:right;font-size:14px;color:var(--muted)}
/* 晨報入口：喇叭＝隨時重開 briefing 抽屜；紅點＝有還沒看過的新公告 */
#hbell{position:relative;background:none;border:none;color:var(--muted);padding:6px 4px;margin-left:2px;cursor:pointer;line-height:0;display:none}
#hbell svg{width:19px;height:19px}
#hbdot{position:absolute;top:3px;right:0;width:7px;height:7px;border-radius:50%;background:var(--accent);display:none}
.wrap{padding:14px 22px 0;max-width:520px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;transition:transform .25s,opacity .25s;touch-action:pan-y;user-select:none;-webkit-user-select:none}
/* Today 流卡片 v2（老闆 manager 視角評審）：類別色條＋右上角分類＋小膠囊鈕；.feed 限定不波及商店卡 */
.card.feed{position:relative;border-left:4px solid var(--line);padding:14px 16px;margin-bottom:10px}
/* 兩段式滑卡：wrap 墊底層 Later 鈕，卡片滑開 88px 停住、再點才貪睡（防誤滑） */
.swipewrap{position:relative;border-radius:18px;overflow:hidden;margin-bottom:10px}
.swipewrap .card.feed{margin-bottom:0}
.swipeact{position:absolute;top:0;right:0;bottom:0;width:88px;border:none;background:var(--roast);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;cursor:pointer;border-radius:0 18px 18px 0}
/* 站別分組組頭：色點＋站名＋張數，點擊摺疊 */
.grphead{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:9px 4px 7px;cursor:pointer;user-select:none;-webkit-user-select:none}
.grphead .garr{font-size:10px;width:12px}
.grphead .gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tundo{background:none;border:none;color:var(--inv-t);font-family:inherit;font-size:14px;font-weight:700;text-decoration:underline;margin-left:10px;cursor:pointer;padding:0}
/* ===== 公開頁（免登入，蓋在最上層）：?fb 回饋表單＋?bean 豆頁——2026-07-10 從 classic 移植，根網址換新殼後由這裡接手實體 QR/email 連結 ===== */
#fb-ov{position:fixed;inset:0;z-index:9999;background:var(--bg);overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:34px 16px}
.fb-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px 22px}
.fb-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.fb-sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.fb-stars{display:flex;gap:8px;margin:4px 0 14px}
.fb-star{font-size:30px;background:none;border:none;cursor:pointer;color:var(--line2);padding:2px;line-height:1}
.fb-star.on{color:#E0B341}
.fb-card textarea,.fb-card input{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:11px;padding:11px 12px;font-size:14px;color:var(--ink);outline:none;font-family:inherit;margin-bottom:10px}
.fb-card textarea{min-height:90px;resize:vertical}
.fb-thanks{text-align:center;padding:30px 0;font-size:15px;line-height:1.7}
.fb-send{display:block;width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.fb-send[disabled]{opacity:.5}
.fb-msg{font-size:12px;color:var(--muted);min-height:14px;margin-bottom:8px}
.fb-msg.err{color:var(--accent)}
#pb-ov{position:fixed;inset:0;z-index:9998;background:var(--bg);overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px 50px}
.pb-card{width:100%;max-width:460px}
.pb-brand{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:14px}
.pb-name{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--ink);line-height:1.2}
/* 評語升格：豆名正下方的 serif 斜體引言——整頁最人話的一句要第一眼看到 */
.pb-quote{font-family:'Fraunces',serif;font-style:italic;font-size:16.5px;color:var(--ink);margin-top:10px;line-height:1.55}
.pb-sec{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
.pb-sec-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.pb-flav{display:flex;gap:8px;flex-wrap:wrap}
.pb-chip{background:var(--tint);color:var(--ink);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600}
/* 關鍵事實兩欄行（配方/產區/品種/海拔/烘焙日）：左標籤右值，一行一件事好掃 */
.pb-row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--line);align-items:baseline}
.pb-row:last-child{border-bottom:none;padding-bottom:0}
.pb-row:first-child{padding-top:0}
.pb-row span{color:var(--muted);flex:0 0 auto;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.pb-row b{font-weight:600;font-size:13.5px;text-align:right;color:var(--ink);overflow-wrap:anywhere}
.pb-radar svg{display:block;margin:0 auto;max-width:260px;width:100%;height:auto}
.pb-brew-m{margin-top:14px}
.pb-brew-m:first-child{margin-top:0}
.pb-brew-h{font-weight:700;color:var(--accent);font-size:13px;margin-bottom:6px}
/* 沖煮參數格狀兩欄（原本全擠一行讀不動）：每格＝灰標籤＋mono 數值 */
.pb-brew-g{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px}
.pb-brew-g div{font-size:13px}
.pb-brew-g span{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:block}
.pb-brew-g b{font-family:ui-monospace,monospace;font-weight:600;font-size:14px}
/* Brew card 網頁版（通用手沖指南）：編號步驟＋左問題右解法的診斷行 */
.pb-step{display:flex;gap:10px;padding:6px 0;font-size:13.5px;line-height:1.5;align-items:flex-start}
.pb-step .n{flex:0 0 20px;height:20px;border-radius:50%;background:var(--tint);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
/* 行內圈圈數字（fine-tune 用）＝與 The pour 步驟同款圓號碼，客人一眼連得回上面第幾步 */
.pb-num{display:inline-flex;width:18px;height:18px;border-radius:50%;background:var(--tint);color:var(--accent);font-size:10.5px;font-weight:700;align-items:center;justify-content:center;vertical-align:-4px}
.pb-step i{display:block;font-style:normal;color:var(--muted);font-size:12.5px}
.pb-fix{display:flex;justify-content:space-between;gap:14px;padding:6px 0;font-size:13px;align-items:baseline;border-bottom:1px solid var(--line)}
.pb-fix:last-child{border-bottom:none}
.pb-fix span{color:var(--muted)}
.pb-fix b{font-weight:600;text-align:right;flex:0 0 auto}
.pb-note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.pb-foot{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;line-height:1.7}
.pb-foot a{color:var(--accent);font-weight:600}
.pb-empty{text-align:center;color:var(--muted);font-size:13px;padding:56px 24px}
.cattag{position:absolute;top:13px;right:14px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.actsm{border:none;border-radius:999px;padding:10px 20px;min-height:44px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;cursor:pointer}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.moresm{background:none;border:none;font-size:13.5px;color:var(--muted);padding:8px 0;font-family:inherit;cursor:pointer}
.s1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.brief{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.card.brief .t{color:var(--inv-t)}
.card.brief .s{color:var(--inv-t);opacity:.72}
.card.brief .tag{color:var(--inv-t);opacity:.65}
.card.brief .more{color:var(--inv-t);opacity:.55}
/* 急件不再整圈紅框：左色條變 accent（renderFeed inline）＋右上角「· now」 */
.card.brief .cattag{color:var(--inv-t);opacity:.65}
.card.brief .moresm{color:var(--inv-t);opacity:.55}
.card.gone{transform:translateX(70%);opacity:0}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;color:var(--muted)}
.tag.warn{color:var(--accent)}
.t{font-size:19px;font-weight:700;line-height:1.3;font-family:'Fraunces',serif}
.s{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.5}
.red{color:var(--danger);font-weight:600}
.fr-red{color:var(--danger);font-weight:600}
.shopc{padding:0;overflow:hidden}
.shopwrap{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:14px;margin:0 -22px;padding:0 22px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.shopwrap::-webkit-scrollbar{display:none}
.shopwrap .shopc{flex:0 0 92%;scroll-snap-align:center;touch-action:pan-x pan-y}
/* 購物車＝右上角小 icon（取代浮動 cartbar，老闆指定）；徽章顯示件數 */
.hcart{position:relative;background:none;border:none;cursor:pointer;padding:6px;color:var(--ink);display:inline-flex;vertical-align:middle}
.hcart b{position:absolute;top:0;right:-2px;background:var(--accent);color:#fff;font-size:10.5px;border-radius:999px;min-width:16px;height:16px;line-height:16px;text-align:center;font-weight:700;font-style:normal;display:none;padding:0 3px;box-sizing:border-box}
/* 毛玻璃導滑箭頭：貼螢幕左右緣、垂直置中在圖片區；到頭的那側自動藏 */
.shoparr{position:fixed;top:42%;z-index:25;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.4);background:rgba(128,128,128,.22);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);color:var(--ink);display:none;align-items:center;justify-content:center;cursor:pointer;padding:0;box-shadow:0 2px 10px rgba(0,0,0,.10)}
.shoparr.l{left:7px}.shoparr.r{right:7px}
.shoparr svg{display:block}
.shopdots{display:flex;justify-content:center;gap:7px;margin:12px 0 6px}
.shopdots span{width:7px;height:7px;border-radius:50%;background:var(--line2)}
.shopdots span.on{background:var(--accent)}
.shoptabs{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px max(env(safe-area-inset-bottom,0px) - 16px,12px);z-index:30}
.shoptabs button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:9px 2px;min-height:44px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.shoptabs button.on{background:var(--inv);color:var(--inv-t);border-color:var(--inv)}
/* 資訊卡圖滿版：CSS 裁掉 Square 安全白邊——內容框在 1200×1200 佔 x217-983/y64-1136，
   裁切盒各留 12px 呼吸邊＝x0 205 w790 / y0 52 h1096。⚠ 數字綁 classic makeSquareCard 預設邊距，改邊距要跟著改 */
.shopimghold{width:100%;aspect-ratio:790/1096;overflow:hidden;position:relative;border-bottom:1px solid var(--line)}
/* 舊的品牌卡帶 Square 安全白邊，放大裁掉 */
.shopimghold .shopimg{position:absolute;width:151.9%;left:-25.95%;top:-4.74%;height:auto;display:block}
/* 照片版四連圖：正方框（直式框會把產區那張的標題裁掉）＋卡上就能左右滑四張
   內描邊界定圖片邊緣——深色下 --surface 與 --bg 同色，深色照片會讓整張卡沉進背景。
   ⚠ 是 inset 不是 border：.card 已有一圈 1px --line，再加外框會變雙框 */
.shopimghold.sq{aspect-ratio:1;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.shopc.photo{border-color:var(--line2)}
.shopimghold.sq .shopimg{position:static;width:100%;height:100%;left:auto;top:auto;object-fit:cover}
.shopslide{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y}
.shopslide::-webkit-scrollbar{display:none}
.shopslide .shopimg{flex:0 0 100%;min-width:0;scroll-snap-align:center}
.shopimgdots{position:absolute;left:0;right:0;bottom:9px;display:flex;justify-content:center;gap:6px;pointer-events:none}
.shopimgdots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);box-shadow:0 0 2px rgba(0,0,0,.35)}
.shopimgdots span.on{background:#fff}
/* 夜版的內描邊要是亮的（深色照片配深色卡） */
@media(prefers-color-scheme:dark){:root:not(.light) .shopimghold.sq{box-shadow:inset 0 0 0 1px rgba(255,255,255,.10)}}
:root.dark .shopimghold.sq{box-shadow:inset 0 0 0 1px rgba(255,255,255,.10)}
/* 商品明細的四連圖：橫向滑，一次一張 */
.shopgal{display:flex;align-items:flex-start;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-top:12px;padding-bottom:2px}
.shopgal::-webkit-scrollbar{display:none}
/* min-width:0 不可拿掉——flex item 預設 min-width:auto，圖會撐成原始 1080px 不肯縮 */
.shopgal img{flex:0 0 82%;min-width:0;width:82%;height:auto;aspect-ratio:1;scroll-snap-align:center;border-radius:12px;border:1px solid var(--line);display:block}
.shopc .shopin{padding:14px 18px 18px}
.shop-chip{background:var(--tint);color:var(--accent);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;display:inline-block;margin:0 6px 6px 0}
.shopc .sl{flex:0 0 84px;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;padding-top:2px}
.fr-green{color:#3F9A66;font-weight:600}
.fr-yellow{color:#C29036;font-weight:600}
.act{display:block;width:100%;border:none;border-radius:16px;padding:13px 16px;min-height:48px;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;margin-top:12px;cursor:pointer}
.act:active{opacity:.8}
.act[disabled]{opacity:.45}
.more{display:block;width:100%;text-align:center;font-size:13.5px;color:var(--muted);padding:10px 0 2px;background:none;border:none;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:15px;line-height:1.7}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:999px;padding:8px 14px;min-height:40px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.chip.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px max(env(safe-area-inset-bottom,0px) - 16px,12px);z-index:30}
nav button{flex:1;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:10px 6px;min-height:44px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
nav button.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.deck{position:fixed;left:0;right:0;bottom:calc(max(env(safe-area-inset-bottom,0px) - 16px,12px) + 64px);background:var(--surface);border-top:1px solid var(--line);padding:12px 22px 10px;z-index:20}
.deck .who{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px}
.deck .who b{color:var(--ink)}
/* judging → decision 區重排（老闆點名）：底線連結改四顆等寬小鍵，觸控目標大、不換行擠壓 */
.qact{flex:1;border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:13px;padding:10px 4px;min-height:42px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.big{border:none;border-radius:12px;padding:13px 16px;min-height:48px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pair button{border-radius:12px;padding:13px;min-height:48px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface)}
/* 判定鈕＝紅綠燈（老闆定案）：Pass 綠、Downgrade 紅，兩顆都實心白字。
   色票固定不隨主題翻——實心色塊自帶對比，翻色反而讓深色版的紅太亮、白字讀不清。
   綠沿用新鮮度的 .fr-green；紅沿用淺色主題的 --danger */
.pair .big{border:none;background:#3F9A66;color:#fff}
.pair .dn{border:none;background:#C0392B;color:#fff}
.qc-new{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--accent);padding:2px 9px;border-radius:999px;margin-left:5px;vertical-align:2px}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;touch-action:none}
.drawer-bg.show{display:block}
.drawer{position:fixed;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);max-width:476px;margin:0 auto;background:var(--surface);border:1px solid var(--line2);border-radius:24px;padding:6px 20px 20px;z-index:50;visibility:hidden;transform:translateY(calc(100% + 120px));transition:transform .28s ease,visibility 0s linear .3s;max-height:78vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;box-shadow:0 18px 50px rgba(60,40,80,.28)}
.drawer.show{visibility:visible;transform:translateY(0);transition:transform .28s ease}
.grab{display:flex;justify-content:center;padding:12px 0 14px;margin:0 0 2px;touch-action:none;cursor:grab}
.grab::before{content:'';width:42px;height:5px;border-radius:3px;background:var(--line2)}
.grab::after{content:'';width:52px;height:5px;border-radius:99px;background:var(--line2)}
.dl{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
.dl span:first-child{color:var(--muted)}
.dl span.red{color:var(--danger)}
.dclose{display:block;width:100%;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px 14px;min-height:44px;font-size:15px;font-weight:700;font-family:inherit;margin-top:16px;cursor:pointer}
.pk-row{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:11px 14px;min-height:44px;font-size:15px;font-weight:600;font-family:inherit;margin-top:9px;cursor:pointer}
.pk-row.on{border-color:var(--accent);color:var(--accent)}
.dta{width:100%;min-height:110px;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;resize:vertical}
.dta:focus{border-color:var(--ink)}
.no-line{display:flex;gap:8px;align-items:center;margin-top:8px}
.no-line select{flex:1;min-width:0;border:1.5px solid var(--line2);border-radius:10px;padding:12px 8px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink)}
.no-line .qty{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.no-line .qty button{width:38px;height:44px;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;font-size:19px;font-weight:700;font-family:inherit;cursor:pointer}
.no-line .qty span{min-width:20px;text-align:center;font-weight:700}
.no-price{width:86px;flex:0 0 auto;border:1.5px solid var(--line2);border-radius:10px;padding:12px 10px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none}
.pm-seg{display:flex;gap:8px;margin-top:8px}
.pm-seg button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:11px 6px;min-height:44px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.pm-seg button.on{border-color:var(--ink);color:var(--ink)}
.din{width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:14px 15px;font-size:17px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;transition:border-color .15s,box-shadow .15s}
.din:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
/* Log roast 2026-07-16 改版：一鍋一卡（粉底對比分鍋）＋頂部三格總計＋綠/琥珀色數字框 */
.ro-sum{display:flex;gap:8px;margin-top:10px}
.ro-sum>div{flex:1;background:var(--tint);border-radius:12px;padding:8px 6px;text-align:center}
.ro-sum .s1{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ro-sum b{display:block;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:1px}
.ro-batch{background:var(--tint);border-radius:14px;padding:11px 12px;margin-top:10px}
.ro-batch .din{background:var(--surface);margin-top:5px}
.ro-bhead{display:flex;justify-content:space-between;align-items:center;gap:8px}
.ro-bhead b{font-size:13px;letter-spacing:.03em}
.ro-bbtn{border:none;background:var(--surface);border-radius:8px;width:34px;height:30px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit;padding:0}
.ro-bbtn:disabled{opacity:.3}
.ro-cols{display:flex;gap:9px;align-items:flex-end;margin-top:9px}
.ro-blab{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.ro-num{text-align:right;font-weight:700;font-size:17px;font-variant-numeric:tabular-nums;margin-top:4px;padding:10px 12px}
.ro-num.g{background:color-mix(in srgb,var(--green) 15%,var(--surface));border-color:color-mix(in srgb,var(--green) 55%,var(--line2))}
.ro-num.o{background:color-mix(in srgb,var(--roast) 15%,var(--surface));border-color:color-mix(in srgb,var(--roast) 55%,var(--line2))}
.ro-bloss{flex:0 0 58px;text-align:right;padding-bottom:9px}
.ro-bloss .s1{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ro-bloss b{font-size:14.5px;font-weight:800;font-variant-numeric:tabular-nums}
.ro-berr{font-size:12.5px;color:var(--danger);font-weight:600;margin-top:7px}
.ro-addrow{width:100%;border:1.5px dashed var(--line2);background:none;border-radius:13px;padding:12px;margin-top:10px;font-size:15px;font-weight:700;color:var(--muted);font-family:inherit;cursor:pointer}
.ro-wx{display:none;justify-content:space-between;align-items:center;gap:8px;background:var(--tint);border-radius:12px;padding:9px 13px;margin-top:10px;font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.ro-wx .s1{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-right:3px}
/* Labels（袋標／罐標）表單樣式 */
.lbl-seg{display:flex;gap:8px;margin-bottom:12px}
.lbl-tab{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:11px 6px;min-height:44px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.lbl-tab.on{border-color:var(--ink);color:var(--ink)}
.smp-sec-h{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.smp-fields{display:flex;flex-direction:column;gap:10px}
.smp-f{display:flex;flex-direction:column}
.smp-f>span{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
.smp-f input{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:12px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none}
.smp-f input:focus{border-color:var(--ink)}
.smp-f2{display:flex;gap:8px}
.lbl-namewrap{position:relative;display:flex;gap:6px;align-items:stretch}
.lbl-namewrap>input{flex:1;min-width:0}
.lbl-namebtn{flex:0 0 46px;border:1.5px solid var(--line2);border-radius:10px;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbl-namebtn svg{width:20px;height:20px}
.lbl-namebtn.on{border-color:var(--ink);color:var(--ink)}
.lbl-namemenu{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:var(--surface);border:1.5px solid var(--line2);border-radius:10px;max-height:240px;overflow:auto;box-shadow:0 10px 28px rgba(0,0,0,.16)}
.lbl-namemenu.open{display:block}
.lbl-nameopt{display:block;width:100%;text-align:left;border:none;background:none;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--line)}
.lbl-nameopt:active{background:var(--tint)}
.sempty{padding:12px 2px;color:var(--muted);font-size:14px}
.gbtn{width:100%;border:none;border-radius:12px;background:var(--accent);color:#fff;padding:13px 16px;min-height:48px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.gbtn:disabled{opacity:.5}
.gform-msg{font-size:14px;color:var(--muted);min-height:18px}
.gform-msg.err{color:var(--danger)}
.gform-msg.ok{color:var(--accent)}
.rtl-recipe{display:flex;flex-wrap:wrap;gap:6px}
.rtl-rchip{border:1.5px solid var(--line2);border-radius:999px;padding:6px 12px;font-size:14px;color:var(--ink)}
.rtl-noflav{color:var(--muted);font-size:14px}
/* tracking 掃描全螢幕層 */
#scanov{position:fixed;inset:0;z-index:80;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#scanov .scanbox{width:min(92vw,420px);border-radius:14px;overflow:hidden}
#scanov #scanview{width:100%}
#scanov .scannote{color:#fff;opacity:.85;font-size:14px;text-align:center;margin-top:16px;max-width:420px}
#scanov .scancancel{margin-top:16px;border:1.5px solid rgba(255,255,255,.6);background:rgba(255,255,255,.08);color:#fff;border-radius:12px;padding:13px 28px;min-height:48px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.dlab{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:14px}
.cx-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.cx-lab{flex:1;min-width:0;font-size:14px;color:var(--ink)}
.cx-in{width:96px;flex:0 0 auto;border:1.5px solid var(--line2);border-radius:10px;padding:10px 10px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;text-align:right}
.cx-in:focus{border-color:var(--ink)}
.cx-unit{width:52px;flex:0 0 auto;font-size:12.5px;color:var(--muted)}
.cx-add{display:flex;gap:8px;align-items:center;margin-top:8px}
/* min-width:0 不可拿掉：input 的 flex 最小寬預設是內容寬（~190px），兩顆就把抽屜撐出水平捲動（老闆回報左右滑） */
.cx-add .cx-in{flex:1;width:auto;min-width:0;text-align:left}
.cx-mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
.cx-metric{background:var(--tint);border-radius:10px;padding:11px 13px}
.cx-metric span{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cx-metric b{display:block;font-size:20px;color:var(--ink);margin-top:3px}
.cx-metric.hi{outline:1.5px solid var(--accent);outline-offset:-1.5px}
.cx-note{margin-top:10px;font-size:13px;font-weight:600;color:var(--danger);background:var(--surface);border:1px solid var(--line2);border-radius:10px;padding:9px 12px}
.cx-note.ok{color:var(--accent);border-color:var(--accent)}
.cmk-chart{position:relative;height:46vh;min-height:260px;border:1px solid var(--line2);border-radius:18px;overflow:hidden;background:var(--surface);margin-top:12px;box-shadow:0 6px 16px rgba(120,90,160,.07)}
.cmk-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
.cmk-total{background:linear-gradient(135deg,var(--accent),#B36C7C);color:#fff;border-radius:20px;padding:18px;margin-top:14px;box-shadow:0 12px 28px color-mix(in srgb,var(--accent) 34%,transparent)}
.cmk-total .l{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;opacity:.9;margin-bottom:2px}
.cmk-total .v{font-size:32px;font-weight:800;color:#fff;line-height:1.05}
.cmk-total .s2{font-size:12.5px;color:#fff;opacity:.9;margin-top:4px}
.cmk-break{display:flex;gap:10px;margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.28)}
.cmk-break div{flex:1}
.cmk-break span{display:block;font-size:11px;opacity:.85;font-weight:600}
.cmk-break b{font-size:17px;font-weight:800}
.gs-sum{display:flex;gap:9px;margin:12px 0 4px}
.gs-sum .box{flex:1;background:var(--tint);border-radius:16px;padding:12px 13px;text-align:center}
.gs-sum .box .n{font-size:22px;font-weight:800;line-height:1;color:var(--ink)}
.gs-sum .box .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-top:5px}
.gs-sum .box.warn{background:color-mix(in srgb,var(--danger) 14%,transparent)}
.gs-sum .box.warn .n{color:var(--danger)}
.rsum{display:flex;gap:9px;margin:14px 0 4px}
.rsum .box{flex:1;color:#fff;border-radius:16px;padding:12px 13px;box-shadow:0 7px 16px rgba(0,0,0,.10)}
.rsum .box .n{font-size:21px;font-weight:800;line-height:1}
.rsum .box .l{font-size:10px;font-weight:700;opacity:.92;text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
.rs-day{border:1px solid var(--line2);border-radius:16px;margin-top:10px;overflow:hidden;box-shadow:0 4px 11px rgba(120,90,160,.05)}
.rs-day.rs-today{border-color:var(--accent);box-shadow:0 8px 20px color-mix(in srgb,var(--accent) 22%,transparent)}
.rs-day.rs-today .rs-day-h{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
.rs-day-h{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:color-mix(in srgb,var(--tint) 55%,transparent);font-size:13.5px;font-weight:800;color:var(--ink)}
.rs-day-h .hh{font-size:11.5px;font-weight:800;color:var(--accent);background:var(--surface);padding:2px 9px;border-radius:20px;margin-left:6px}
.rs-add{border:none;background:none;color:var(--accent);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;padding:3px 4px}
.rs-shift{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;border-top:1px solid var(--line);background:var(--surface);color:var(--ink);padding:11px 14px;font-family:inherit;cursor:pointer}
.rs-dot{width:10px;height:10px;border-radius:50%;flex:0 0 10px;background:var(--pc,var(--muted));box-shadow:0 0 0 3px color-mix(in srgb,var(--pc,var(--muted)) 20%,transparent)}
.rs-shift .rs-nm{flex:1;font-size:14.5px;font-weight:700;color:var(--ink)}

.rs-shift.rs-empty .rs-dot{box-shadow:none;background:var(--line2)}
.rs-shift .rs-tm{font-size:12px;font-weight:700;color:var(--pc,var(--muted));background:color-mix(in srgb,var(--pc,var(--muted)) 13%,transparent);padding:4px 10px;border-radius:20px;white-space:nowrap}
.rs-none{padding:10px 13px;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}
/* 不可上班日曆（Who's off）*/
.na-mhead{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 10px}

.na-nav{border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:11px;width:36px;height:36px;font-size:16px;cursor:pointer;font-family:inherit}

.na-dow span{text-align:center;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase}
.na-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.na-cell{aspect-ratio:.82;border:1px solid var(--line);border-radius:12px;padding:5px 4px 4px;display:flex;flex-direction:column;align-items:center;cursor:pointer;background:var(--surface);font-family:inherit}

.na-cell.off{background:color-mix(in srgb,var(--tint) 70%,transparent);border-color:var(--line2)}

.na-cell.sel{border-color:var(--ink);border-width:1.5px}
.na-cell .dn{font-size:12.5px;font-weight:700;color:var(--ink)}

.na-pips{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:auto}
.na-pips i{width:8px;height:8px;border-radius:50%}
.na-pips .more{font-size:8px;font-weight:800;color:var(--muted)}
.na-sel{margin-top:12px;background:var(--tint);border-radius:16px;padding:13px 15px;font-size:13.5px;font-weight:700;min-height:50px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;color:var(--ink)}
.na-leg{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}

.na-leg i{width:9px;height:9px;border-radius:50%}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:150px;background:var(--inv);color:var(--inv-t);border-radius:999px;padding:11px 22px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;z-index:60;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.act{pointer-events:auto}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin:6px 14px 0;line-height:1.6}
.search{width:100%;border:1.5px solid var(--line2);border-radius:16px;padding:15px 16px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-bottom:6px}
.search:focus{border-color:var(--ink)}
.gsec{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:18px 2px 8px;display:flex;align-items:center}
.gdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-right:8px;flex:0 0 auto}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool{display:flex;align-items:center;gap:11px;border:1px solid var(--line2);background:var(--surface);border-radius:16px;padding:11px 12px;font-size:14px;font-weight:800;font-family:inherit;color:var(--ink);cursor:pointer;text-align:left;box-shadow:0 6px 14px rgba(120,90,160,.07);transition:transform .13s ease}
.tool:active{transform:scale(.97)}
.tool .tic{width:38px;height:38px;border-radius:12px;background:var(--dept,var(--muted));display:grid;place-items:center;flex:0 0 38px;box-shadow:0 5px 11px color-mix(in srgb,var(--dept,#8A8A8A) 38%,transparent)}
.tool .tic svg{width:20px;height:20px;fill:#fff;display:block}

.tool .tl.tool-done small{color:#E53935;opacity:.7}
.tool small{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
.hit{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}

function matchRoast(s){
  var nm=String(s.sample_id||'').trim().toLowerCase();if(!nm&&!s.bean_id)return null;
  var cands=DB.roasts.filter(function(r){
    /* ID 優先（2026-07-15 老闆定調 QC 只認 ID）：兩邊都有 bean_id＝只比 ID，不看名字 */
    if(s.bean_id&&r.bean_id)return String(r.bean_id)===String(s.bean_id);
    if(String(r.bean_name||'').trim().toLowerCase()!==nm)return false;
    /* 名字退路加雙鍵：兩邊都記了處理法就必須相同（同名多處理法不互相污染）；舊資料沒記 process 容忍 */
    if(s.process&&r.process&&procKey(r.process)!==procKey(s.process))return false;
    return true;});
  if(!cands.length)return null;
  /* 有貨的批次優先配（同名一批吃光一批有貨 → sample 掛到有貨那批判定）；全沒貨才退回原候選，交給 QCQ 的 >0 擋掉 */
  var withStock=cands.filter(function(r){return Number(r.remaining_kg)>0;});
  var pool=withStock.length?withStock:cands;
  if(s.roast_date){var ex=pool.find(function(r){return (r.roast_date||'')===s.roast_date;});if(ex)return ex;}
  return pool[0];
}

      out.push({id:'closing',st:'Daily Task',t:'Closing checklist',s:ckDone+' of '+CLOSING_ITEMS.length+' done',
        act:'Open',det:CLOSING_ITEMS.map(function(x){return [x.txt,ckm2[x.id]?('✓ '+ckm2[x.id]):'—'];}),
        roles:['director','roaster','retail','staff'],kind:'closing',sink:1,nosnooze:1});
    }else if(!CLOSING_ITEMS.length&&isLead()){
      out.push({id:'closing',st:'Daily Task',t:'Closing checklist',s:'set up the daily closing routine',
        act:'Set up',det:[],roles:['director'],kind:'closing',sink:1,nosnooze:1});
    }
  }
  (DB.feedback||[]).forEach(function(f){
    var stars='★★★★★'.slice(0,Math.max(0,Math.min(5,Number(f.rating)||0)))||'☆';
    out.push({id:'fb:'+f.id,st:'Customers',hot:0,t:stars+' · '+esc(f.name||'Anonymous'),
      s:esc(String(f.comment||'').slice(0,90))||'no comment',
      act:f.email?'Reply…':'Got it',
      det:[['Rating',stars],['Comment',String(f.comment||'—').slice(0,200)],['From',f.name||'Anonymous'],['Email',f.email||'—'],['When',fmtD(f.created_at)||'—']],
      det2:'Later',roles:['director','staff'],kind:'fb',ref:f});
  });
  /* 回購提醒卡（社群曝光 Phase 4：回購提醒附評論連結）：零售客最後一單 28–120 天前 → 提醒卡；
     一天最多 2 張（最久沒買的優先）；送過記 NUDGE_LOG（app_state），同一輪（沒有新單）60 天內不再出；
     批發單/shop 客戶/沒 email 的不算 */
  var lastOrd={};
  DB.orders.forEach(function(o){
    if(!o.customer_id||o.channel==='wholesale')return;
    var d=String(o.created_at||'').slice(0,10);if(!d)return;
    var k=String(o.customer_id);
    if(!lastOrd[k]||d>lastOrd[k].d)lastOrd[k]={d:d,o:o};
  });
  var nudges=[];
  DB.customers.forEach(function(c){
    if(!c.email||c.type==='shop')return;
    var le=lastOrd[String(c.id)];if(!le)return;
    var days=Math.floor((Date.now()-new Date(le.d+'T00:00:00'))/864e5);
    if(days<28||days>120)return;
    var ng=NUDGE_LOG[String(c.id)];
    if(ng&&ng>=le.d&&Math.floor((Date.now()-new Date(ng+'T00:00:00'))/864e5)<60)return;
    nudges.push({c:c,days:days,o:le.o,d:le.d});
  });
  nudges.sort(function(a,b){return b.days-a.days;}).slice(0,2).forEach(function(n){
    var wk=Math.round(n.days/7);
    /* 「上次買了什麼」不列 Delivery fee 假品項（信裡 edge 也同樣排除） */
    var goods={items:(Array.isArray(n.o.items)?n.o.items:[]).filter(function(it){return !(!it.grams&&/^delivery fee$/i.test(String(it.name||'').trim()));})};
    out.push({id:'ng:'+n.c.id,st:'Customers',hot:0,t:'Fresh batch nudge — '+esc(n.c.name||'customer'),
      s:'last order '+wk+'w ago · '+esc(itemsLine(goods).slice(0,60)||'—'),
      act:'Send reminder',
      det:[['Customer',n.c.name||'—'],['Email',n.c.email],['Last order',(fmtD(n.d)||'—')+' · '+wk+'w ago'],['They had',itemsLine(goods)||'—'],['Email carries','shop link + Google review link']],
      det2:'Later',roles:['director'],kind:'nudge',ref:n});
  });
  ITEMS=out.filter(function(i){return !sn[i.id];});
}

    if(!folded)h+=grp.map(cardHTML).join('');
  }
  if(grabs.length){
    var gf=FOLDED.has('__grabs');
    h+='<button class="grphead" data-grp="__grabs"><span class="garr">'+(gf?'▸':'▾')+'</span>'
      +'<span class="gdot" style="background:var(--line2)"></span>Up for grabs · '+grabs.length+'</button>';

  h+=(SNOOZED_SESSION?'<button class="more" id="unsnooze">'+SNOOZED_SESSION+' snoozed until tomorrow · undo</button>':'')
    +'<div class="note" id="ctxline">'+CTXS[ctxIdx].label+' · swipe right = do · left = later</div>';
  m.innerHTML=h;

  m.querySelectorAll('[data-do]').forEach(function(b){b.addEventListener('click',function(){if(Date.now()-_drag<300)return;runAction(b.dataset.do,b);});});

  m.querySelectorAll('.grphead').forEach(function(g){g.addEventListener('click',function(){

  /* 派工膠囊：點一下輪到下一個人（anyone → 班表順序 → 回 anyone），存 app_state 全店同步 */
  m.querySelectorAll('[data-asg]').forEach(function(b){b.addEventListener('click',function(){

  if(!ASSIGN_MODE)list.concat(grabs).forEach(function(i){var el=document.getElementById('c-'+i.id);if(el)attachSwipe(el,i.id);});

/* 視角列/進度行/派工模式的共用綁定 */

/* 貪睡統一入口：點 Later 鈕（或抽屜 det2）走這裡——toast 直接給 Undo */
function snoozeCard(id){addSnooze(id);dropCard(id,true);toast('Snoozed — back tomorrow','Undo',undoSnooze);}
function item(id){return ITEMS.find(function(x){return x.id===id;});}
function dropCard(id,left){

/* ===== 真動作 ===== */
async function runAction(id,btn){
  if(!canWrite()){roToast();return;}
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      logAct('task done',i.t);
      dropCard(id);toast('Task done ✓');return;
    }
    if(i.kind==='rstlow'){RST.seg=(i.ref||[]).some(function(x){return x.isBlend;})?'blend':'single';RST.open=null;openBatchesSheet();return;} /* 2026-07-16 Roastery 移除，改回 Coffee Stock */
    if(i.kind==='qcnav'){openQCSheet();return;} /* 2026-07-16 Roastery 移除，改回 QC 抽屜 */
    if(i.kind==='closing'){if(CLOSING_ITEMS.length)openClosingSheet();else openClosingEdit();return;}
    if(i.kind==='paynav'){openPayrollSheet();return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted — no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      logAct('marked paid',i.t,money(i.ref.total));
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid ✓ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid ✓ receipt sent');return;
    }
    if(i.kind==='nudge'){
      var nc=i.ref.c;
      if(!confirm('Email a fresh-batch reminder to '+(nc.name||'this customer')+' ('+nc.email+')?\nIt carries the shop link and the Google review link.'))return;
      if(btn){btn.disabled=true;btn.textContent='Sending…';}
      await callFn('send-email',{action:'repurchase_nudge',customer_id:nc.id});
      /* 提醒紀錄 read-modify-write 進 app_state（照 rtl_dot 慣例）；寫失敗不擋——頂多明天再看到卡 */
      try{
        var ngq=await sb.from('app_state').select('value').eq('key','nudge_log').maybeSingle();
        var ngm=(ngq.data&&ngq.data.value&&typeof ngq.data.value==='object')?ngq.data.value:{};
        ngm[String(nc.id)]=todayKey();
        await sb.from('app_state').upsert({key:'nudge_log',value:ngm,updated_at:new Date().toISOString()},{onConflict:'key'});
        NUDGE_LOG=ngm;
      }catch(e){}
      dropCard(id);toast('Reminder sent ✓');return;
    }
    if(i.kind==='dialin'){openDialinForm(i);return;}
    if(i.kind==='subrun'){openSubRunSheet();return;}
    if(i.kind==='roastlog'){openRoastSheet(Array.isArray(i.ref)?i.ref:null);return;}
    if(i.kind==='list'){await openListSheet(i);return;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=i.act;}
    alert((i.act||'Action')+' failed: '+(e&&e.message||e));
  }
}
async function acceptOrder(i,btn){
  var o=i.ref;
  if(btn){btn.disabled=true;btn.textContent='Accepting…';}
  try{
    if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
      try{await callFn('sync-to-square',{action:'payment_link',order_id:o.id});}catch(e){console.error('payment link',e);}
    }
    var u=await sb.from('orders').update({status:'Confirmed'}).eq('id',o.id);
    if(u.error)throw new Error(u.error.message);
    o.status='Confirmed';
    logAct('accepted order',i.t);
    try{await callFn('send-email',{action:'order_confirmation',order_id:o.id});toast('Accepted ✓ confirmation sent');}
    catch(e){toast('Accepted ✓ but email failed');}
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Accept';}
    alert('Accept failed: '+(e&&e.message||e));

}
/* 處理法 key（2026-07-13 處理法分開下半場）：null/undefined/空白全折成 ''——
   全鏈「同名同處理法」比對都用它，別再裸比 process 字串 */
function procKey(p){return String(p||'').trim().toLowerCase();}
/* 生豆身分證（2026-07-15 老闆定案，之八改前綴 G→S）：每支生豆一個 S#00001 人類可讀編號——
   DB green_no 自動發號（sequence default），這裡只負責顯示。同名多處理法從此一眼分清（Alo Village S#00012/S#00013） */
function gNo(b){return (b&&b.green_no!=null)?('S#'+String(b.green_no).padStart(5,'0')):'';}
/* 熟豆編號 B#（2026-07-15 老闆改版，之八改前綴 R→B）：一豆一號終身不變——號碼跟「豆」走，S/B 只是生熟狀態。
   單品承生豆同號（S#00013 烘出來＝B#00013）、拼配用 blends.blend_no（同一個號碼池，全域唯一）。
   批次之分＝B# ＋ 烘焙日（行內本來就顯示日期）；每鍋跳號的 roasts.roast_no 已廢除 */
function rNo(r){
  if(!r)return '';
  var n=null;
  if(r.kind==='blend'){
    var nm=String(r.bean_name||'').trim().toLowerCase();
    var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm;});
    n=bl?bl.blend_no:null;
  }else{
    /* 雙路慣例：有 bean_id 精準比對，否則豆名＋處理法備援（legacy 批次），再退名字級 */
    var b=r.bean_id?(DB.beans||[]).find(function(x){return String(x.id)===String(r.bean_id);}):null;
    if(!b){
      var bn=String(r.bean_name||'').trim().toLowerCase(),pk=procKey(r.process);
      b=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===bn&&procKey(x.process)===pk;})
        ||(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===bn;});
    }
    n=b?b.green_no:null;
  }
  return n!=null?('B#'+String(n).padStart(5,'0')):'';
}
/* 一組批次的 B# 清單（同組同豆＝同號，去重後通常就一個） */
function rNos(batches){
  var seen={},out=[];
  (batches||[]).forEach(function(r){var k=rNo(r);if(k&&!seen[k]){seen[k]=1;out.push(k);}});
  return out.join(' ');
}
/* 名字＋處理法 → 命中的豆/配方 {kind:'blend'|'bean',obj}（認 ID 的統一解析器；beanIdFor/bNoFor 都用它）。
   拼配名先命中 blends；單品照 procKey 找 beans（proc undefined／空字串＝名字級，同名唯一才回）。回 null＝認不出 */
function resolveCoffee(nm,proc){
  var k=String(nm||'').trim().toLowerCase();
  if(!k)return null;
  if(proc==='')proc=undefined; /* 空字串折成名字級——避免誤配 process 為空的特定豆（原 beanIdFor/bNoFor 的隱藏陷阱） */
  var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  if(bl)return {kind:'blend',obj:bl};
  var pool=(DB.beans||[]).filter(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  var b;
  if(proc!==undefined){var pk=procKey(proc);b=pool.find(function(x){return procKey(x.process)===pk;})||(pool.length===1?pool[0]:null);}
  else b=(pool.length===1?pool[0]:null);
  return b?{kind:'bean',obj:b}:null;
}
/* 名字＋處理法 → 底層 id（beans.id 或 blends.id）；回空＝認不出（走名字級退路） */
function beanIdFor(nm,proc){var r=resolveCoffee(nm,proc);return r?String(r.obj.id):'';}
/* 統一取號口（2026-07-15 全 app 掛號）：豆名＋處理法 → 'B#00013'（拼配用 blend_no、單品用 green_no） */
function bNoFor(nm,proc){
  var r=resolveCoffee(nm,proc);if(!r)return '';
  var no=r.kind==='blend'?r.obj.blend_no:r.obj.green_no;
  return no!=null?('B#'+String(no).padStart(5,'0')):'';
}
/* 同名下所有號（Delete a coffee 名字級聚合用；同名多處理法列全部＝提醒這名字下有幾支） */
function bNosForName(nm){
  var k=String(nm||'').trim().toLowerCase();
  if(!k)return '';
  var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  if(bl)return bl.blend_no!=null?('B#'+String(bl.blend_no).padStart(5,'0')):'';
  return (DB.beans||[]).filter(function(x){return String(x.name||'').trim().toLowerCase()===k&&x.green_no!=null;})
    .map(function(x){return 'S#'+String(x.green_no).padStart(5,'0');}).join(' ');
}
/* 鎖風味＝單選（2026-07-12 老闆定調）：鎖＝「在賣的版本」。
   2026-07-13 收緊成「同名＋同處理法」互斥（Alo Village White Honey / Cold Fermentation 事件）——
   不同處理法是不同商品，鎖互不干涉；同名同處理法（重複豆/re-cup）仍只能一筆鎖著。
   解鎖走前端過濾 id 清單再 .in() update——避開 PostgREST 對 null process 的比對麻煩。
   Coffee Info/資訊卡/公開豆頁/出貨信全跟鎖的這筆走。回傳 false＝鎖寫入失敗。 */
async function lockFlavourSolo(s){
  if(!s||!s.id)return false;
  if(!s.flavour_locked){
    var lu=await sb.from('samples').update({flavour_locked:true}).eq('id',s.id);
    if(lu.error)return false;
    s.flavour_locked=true;
  }
  var nm=String(s.sample_id||'').trim();
  if(nm){
    try{
      var ids=(DB.samples||[]).filter(function(x){
        return String(x.id)!==String(s.id)
          &&String(x.sample_id||'').trim().toLowerCase()===nm.toLowerCase()
          &&procKey(x.process)===procKey(s.process);
      }).map(function(x){return x.id;});
      if(ids.length){
        var un=await sb.from('samples').update({flavour_locked:false}).in('id',ids);
        if(!un.error)(DB.samples||[]).forEach(function(x){if(ids.indexOf(x.id)>-1)x.flavour_locked=false;});
      }
    }catch(e){}
  }
  return true;
}
/* 同名同處理法另一筆已鎖的杯測（＝現在在賣的版本）——換鎖警訊用；比對照 lockFlavourSolo 同範圍 */
function lockedMate(s){
  var nm=String(s&&s.sample_id||'').trim().toLowerCase();if(!nm)return null;
  return (DB.samples||[]).find(function(x){
    return String(x.id)!==String(s.id)&&x.flavour_locked
      &&String(x.sample_id||'').trim().toLowerCase()===nm
      &&procKey(x.process)===procKey(s.process);
  })||null;
}
/* ===== 三態豆況（2026-07-16 老闆拍板簡化）=====
   qc 欄三態：null=Pending／'pass'=Pass／其餘=Downgrade（legacy 'reroast' 一律視同降級、永不再寫入）。
   「排除不可賣批」的判斷統一走這裡，別再散寫 !=='reroast'&&!=='downgrade' */
function qcState(r){
  if(!r||!r.qc)return 'pending';
  return r.qc==='pass'?'pass':'downgrade';
}
/* 手動加星（★＝flavour_locked 重塑：「在賣的版本」，同名同處理法互斥單選）。
   加星唯一入口——換星 confirm 在此把關（原 qcVerdict pass 自動鎖的警訊搬來）；
   quiet=true＝不問直接換（上架 push 用：push 本身就是宣告這批在賣）。
   回傳 {ok,swapped}：swapped＝從已上架批手上換來的星，呼叫端該接開 List Update 抽屜 push 新資訊 */
async function starSample(s,quiet){
  if(!s||!s.id)return {ok:false,swapped:false};
  var swapped=false;
  if(!s.flavour_locked&&lockedMate(s)){
    var nm=String(s.sample_id||'').trim();
    var sy=syncFor(nm,s.process);
    swapped=!!(sy&&sy.status==='synced');
    if(!quiet){
      var msg=swapped
        ?nm+' already has a ★ batch on the shelf.\nMove the ★ to this batch? Shop info (flavours, roast date) will switch to this one.'
        :nm+' already has a ★ batch.\nMove the ★ to this batch?';
      if(!confirm(msg))return {ok:false,swapped:false};
    }
  }
  var ok=false;
  try{ok=await lockFlavourSolo(s);}catch(e){}
  return {ok:ok,swapped:swapped&&ok};
}
/* 上架顯示名（2026-07-13 階段二）：同名有多個處理法的杯測 → Square 商品名帶後綴「名 — 處理法」
   （後台/收據/店面才分得清）；單一處理法豆照舊純名＝既有商品不會被改名 */
function listNameFor(nm,s){
  var k=String(nm||'').trim().toLowerCase(),procs={};
  (DB.samples||[]).forEach(function(x){
    if(String(x.sample_id||'').trim().toLowerCase()===k)procs[procKey(x.process)]=1;
  });
  return (Object.keys(procs).length>1&&s&&s.process)?(nm+' — '+String(s.process).trim()):nm;
}
/* 上架列查找（統一比對點）：proc===undefined＝名字級（呼叫端沒 process 在手／拼配）；
   列的 process 為 null＝階段二前的舊列，名字級照舊配——向前向後都相容 */
function syncFor(nm,proc){
  /* ID 優先（2026-07-15）：name+proc 解析成 target_id，比 product_sync.target_id；
     訂閱商品/認不出 id 才退名字＋處理法（tid 空或該列無 target_id） */
  var tid=beanIdFor(nm,proc),k=String(nm||'').trim().toLowerCase();
  return (DB.syncs||[]).find(function(x){
    if(!(x.status==='synced'||x.status==='paused'))return false;
    if(tid&&x.target_id)return String(x.target_id)===tid;
    if(String(x.bean_id||'').trim().toLowerCase()!==k)return false;
    return x.process==null||proc===undefined||procKey(x.process)===procKey(proc);
  })||null;
}

/* 彈窗開著時鎖住背景（iOS 的 overflow:hidden 靠不住 → body 釘住＋記捲動位置，關閉時復原）；
   openDrawerHTML 會被重畫連呼，鎖要冪等——只在第一次開時記位置 */
var _bgLockY=null;

function openDrawerHTML(h){var d=$('drawer');d.innerHTML='<div class="grab"></div>'+h;d.classList.add('show');$('dbg').classList.add('show');lockBg();attachDrawerDrag();}
/* 把手往下拉＝關閉（拉過 90px 放手才關，不足彈回；把手 touch-action:none 不搶內容捲動） */
function attachDrawerDrag(){
  var d=$('drawer'),g=d.querySelector('.grab');if(!g)return;
  var y0=null,dy=0;
  /* iOS Safari 對捲動容器內的 touch-action:none 不一定買帳——手指一動就當捲動、pointercancel 把拖曳殺掉。
     非 passive 的 touchmove preventDefault 硬擋捲動，讓 pointermove 一路活著 */
  g.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  g.addEventListener('pointerdown',function(e){
    y0=e.clientY;dy=0;
    try{g.setPointerCapture(e.pointerId);}catch(err){}
    d.style.transition='none';
  });
  g.addEventListener('pointermove',function(e){
    if(y0==null)return;
    dy=Math.max(0,e.clientY-y0);
    d.style.transform='translateY('+dy+'px)';
  });
  function fin(){
    if(y0==null)return;
    d.style.transition='';d.style.transform='';
    if(dy>90)closeDrawer();
    y0=null;dy=0;
  }
  g.addEventListener('pointerup',fin);
  g.addEventListener('pointercancel',fin);
}

/* ===== 出貨自動扣熟豆批次（2026-07-12）＝血條全自動 =====
   唯一插入點：openDispatch 的 go()——全部通道（manual/訂閱/批發/Square）都走這裡出貨。
   規則：每品項 grams×qty 依名字 FIFO 扣同名批次（配方吃 kind='blend'、單品吃非 blend；
   排除 QC 打退——同 rstBatches）；跳過無 grams 假品項（Delivery fee）與 Subscription 商品行；
   批次不夠照扣到 0 並回報短缺（不擋出貨——出貨是事實，帳目短缺提醒人工調）；
   orders.stock_deducted_at 蓋章防重複扣（再開同單不會扣第二次）。 */
/* 訂單品項 → coffee stock 的批次身份 {name,proc,isBlend}（2026-07-15 老闆定調：烘豆需求／出貨都看 coffee stock 的 B#）。
   process 優先 it.process；沒有就從商品名的「名 — 處理法」後綴拆（同名多處理法上架時 listNameFor 加的），
   拆出的 name+proc 要能在熟豆批次對到才採用（訂閱行呼叫端已擋）。單一處理法豆＝proc undefined 名字級照舊 */
function itemBeanRef(it){
  var nm=String(it&&it.name||'').trim();
  var isBlend=(DB.blends||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
  var proc=(it&&it.process!=null&&String(it.process).trim()!=='')?String(it.process).trim():undefined;
  /* 對得到＝生豆主檔（beans）或熟豆批（roasts）任一有這支——要烘的豆沒熟豆批但有生豆，不能只驗熟豆 */
  var hit=function(n,p){
    var k=String(n||'').trim().toLowerCase(),pk=procKey(p);
    return (DB.beans||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===k&&(p==null||procKey(b.process)===pk);})
      ||rstBatches(n,false,p).length>0;
  };
  /* 商品名帶「名 — 處理法」後綴（同名多處理法上架時 listNameFor 加的）：用現有 name＋proc 對不到
     就把後綴拆進 process——roasts/beans 都不帶後綴，全名會對空。不管 proc 原本有沒有值都試拆 */
  if(!isBlend&&nm.indexOf(' — ')>-1&&!hit(nm,proc)){
    var cutAt=nm.lastIndexOf(' — ');
    var nm2=nm.slice(0,cutAt).trim(),pr2=nm.slice(cutAt+3).trim();
    if(nm2&&pr2&&hit(nm2,pr2)){nm=nm2;proc=pr2;isBlend=false;}
  }
  return {name:nm,proc:proc,isBlend:isBlend};
}
async function deductOrderStock(o){
  if(o.stock_deducted_at)return {skipped:true,short:[]};
  var short=[],tookAny=false;
  var items=Array.isArray(o.items)?o.items:[];
  for(var ii=0;ii<items.length;ii++){
    var it=items[ii];
    var nm0=String(it&&it.name||'').trim();
    if(!nm0||!it.grams)continue; /* 假品項（運費行等）不扣 */
    if(typeof isSubName==='function'&&isSubName(nm0))continue; /* 網店訂閱商品行不是豆名 */
    var kg=(Number(it.grams)||0)*(Number(it.qty)||1)/1000;
    if(!(kg>0))continue;
    /* 2026-07-15 統一走 itemBeanRef（同烘豆需求卡）＝品項→coffee stock 批次身份，
       process 優先 it.process、否則拆「名 — 處理法」後綴，同名多處理法認對批 */
    var ref=itemBeanRef(it),nm=ref.name;
    var pool=rstBatches(ref.name,ref.isBlend,ref.isBlend?undefined:ref.proc);
    var left=kg;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);

  try{var m=await sb.from('orders').update({stock_deducted_at:now}).eq('id',o.id);if(!m.error)o.stock_deducted_at=now;}catch(e){}
  if(tookAny||short.length)logAct('stock deducted','#'+(o.order_no||o.id),short.length?('short: '+short.length+' item(s)'):null);

async function openTrackScan(onResult){
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){alert('This browser cannot use the camera here — please type the tracking number in.');return;}
  try{if(!window.Html5Qrcode)await loadScriptOnce('https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js');}
  catch(e){alert('Scanner could not load — check the connection, or type the number in.');return;}
  var ov=document.createElement('div');ov.id='scanov';
  ov.innerHTML='<div class="scanbox"><div id="scanview"></div></div><div class="scannote">Point the camera at the barcode or QR on the label</div><button class="scancancel" id="scancancel">Cancel</button>';
  document.body.appendChild(ov);
  var qr=new Html5Qrcode('scanview');var done=false;
  function cleanup(){try{qr.stop().then(function(){try{qr.clear();}catch(e){}}).catch(function(){});}catch(e){}if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);}
  var cx=document.getElementById('scancancel');if(cx)cx.addEventListener('click',cleanup);
  try{
    await qr.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:260}},function(txt){
      if(done)return;done=true;cleanup();
      if(onResult)onResult(String(txt||'').trim());
      toast('Scanned ✓');
    },function(){});
  }catch(e){cleanup();alert('Cannot open the camera — allow camera access in your browser, or type the number in.');}
}

var RTL_DOTCOL={y:'#E0B341',b:'#3D7DBF',d:'#22386B',r:'#C0392B'};

function _b64ToBlob(b64,type){var bin=atob(b64),len=bin.length,arr=new Uint8Array(len);for(var i=0;i<len;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:type||'image/png'});}

/* 2026-07-15 雙鍵化（老闆回報改 S#00012 顏色 S#00013 跟著變）：先查「豆名 @ 處理法」，
   退名字級（舊資料/拼配/沒帶 proc 的呼叫端）——同名多處理法從此各自有色 */
function dotKeyFor(name,dots,proc){
  var nm=String(name||'').trim();if(!nm||!dots)return '';
  var tries=[];
  if(proc!=null&&String(proc).trim()!=='')tries.push(nm+' @ '+String(proc).trim());
  tries.push(nm);
  for(var i=0;i<tries.length;i++){
    var t=tries[i];
    if(dots[t])return dots[t];
    var lk=t.toLowerCase(),key='';
    Object.keys(dots).forEach(function(k){if(!key&&String(k).trim().toLowerCase()===lk)key=dots[k];});
    if(key)return key;
  }
  return '';
}
/* 杯測時上色：read-modify-write app_state rtl_dot（值形狀＝扁平 {鍵:'y|b|r|d'}，同 classic appStatePush）。
   proc 有值＝寫雙鍵「豆名 @ 處理法」；名字級舊值不清（同名另一支還靠它 fallback） */
async function saveDotFor(name,key,proc){
  var nm=String(name||'').trim();if(!nm)return;
  if(proc!=null&&String(proc).trim()!=='')nm=nm+' @ '+String(proc).trim();
  var r=await sb.from('app_state').select('value').eq('key','rtl_dot').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  /* 同鍵不同大小寫的舊鍵一併清掉，避免雙鍵打架 */
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===nm.toLowerCase()&&k!==nm)delete v[k];});
  if(key)v[nm]=key;else delete v[nm];
  var u=await sb.from('app_state').upsert({key:'rtl_dot',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
  _dotsMap=v; /* 快取跟上，畫卡立即吃新色 */
}
async function cardDataFor(s,blendMap,dots){
  var SMAP={fragrance:'Aroma',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
  var cup=['fragrance','acidity','sweetness','body','aftertaste'].map(function(k){return {key:k,label:SMAP[k],n:(s&&s[k]!=null)?s[k]:null};});
  var rdate=s.roast_date||null;
  if(!rdate){
    var hit=null;
    (DB.roasts||[]).forEach(function(r){if(!hit&&s.bean_id&&r.bean_id&&String(r.bean_id)===String(s.bean_id))hit=r.roast_date;});
    (DB.roasts||[]).forEach(function(r){if(!hit&&String(r.bean_name||'')===(s.sample_id||''))hit=r.roast_date;});
    rdate=hit;
  }
  var data={name:s.sample_id||'',color:dotColorFor(s.sample_id,dots,s.process),
    flavour:(s.features||[]).filter(Boolean).slice(0,3),cupScores:cup,
    comment:(s.comment||'').trim(),roasted:rdate?fmtD(rdate):''};
  var bd=blendMap[String(s.sample_id||'').trim().toLowerCase()];
  if(bd){
    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    /* 2026-07-15 ID 優先（同 beanInfoRows）：s.bean_id → DB.beans 記憶體命中，消滅同名多支歧義 */
    if(s.bean_id)gb=(DB.beans||[]).find(function(b){return String(b.id)===String(s.bean_id);})||null;
    if(!gb){
      try{
        var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
        var pool=q.data||[];
        var proc=String(s.process||'').trim().toLowerCase();
        gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
      }catch(e){}
    }
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* 每支豆現場重畫卡片 → 上傳 mail-assets（upsert + cache-bust）→ 回傳 {小寫名: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

function openPackSheet(i){

async function actLoadMore(){
  var q=await sb.from('activity_log').select('*').order('ts',{ascending:false}).range(ACT_PAGE*50,ACT_PAGE*50+49);

async function saveNewOrder(){
  var rows=NO.items.filter(function(it){return (it.name||'').trim();});
  if(!rows.length){toast('Pick at least one coffee');return;}
  if(rows.some(function(it){return !(Number(it.price)>0);})){toast('Set a price for each item');return;}
  var b=$('no-save');b.disabled=true;b.textContent='Creating…';
  try{
    /* order_no = 全表 max+1（含已取消的，避免撞號） */
    var mx=await sb.from('orders').select('order_no').order('order_no',{ascending:false}).limit(1);
    var maxNo=(mx.data&&mx.data[0]&&mx.data[0].order_no)||0;
    var items=rows.map(function(it){return {name:it.name,grams:it.grams,qty:it.qty,price:Number(it.price)};});
    var total=0;items.forEach(function(it){total+=it.price*it.qty;});
    var ins=await sb.from('orders').insert({order_no:maxNo+1,channel:'manual',status:'New',
      customer_id:NO.cust||null,items:items,total:total,currency:'AUD',
      payment_method:NO.pm,payment_status:'pending_payment'});
    if(ins.error)throw new Error(ins.error.message);
    closeDrawer();toast('Order #'+String(maxNo+1).padStart(4,'0')+' created ✓');
    await reload();view='feed';render();
  }catch(e){b.disabled=false;b.textContent='Create order';alert('Create failed: '+(e&&e.message||e));}
}

/* Apply to brew guide（照 classic applyDialin）：只寫有填的欄位進 brew.espresso、其他 method 不動。

   配方→update blends.brew（直接寫，不走 classic 的 localStorage sync）；單品→update beans.brew。 */
async function applyDialinBrew(id){
  var d=(DB.dialins||[]).find(function(x){return String(x.id)===String(id);});
  if(!d)return;
  if(!confirm('Write these numbers into the espresso brew guide for "'+d.coffee+'"?'))return;
  var esp={};
  if(d.grind)esp.grind=String(d.grind);
  if(d.dose!=null)esp.dose=String(d.dose);
  if(d.yield!=null)esp.yield=String(d.yield);
  if(d.time_s!=null)esp.time=String(d.time_s)+'s';
  if(!Object.keys(esp).length){toast('This dial-in has no numbers to apply');return;}
  /* 認 target_id（2026-07-15）：直接命中那支豆/配方；舊紀錄無 target_id 才退名字級（同名取第一支） */
  var key=String(d.coffee||'').trim().toLowerCase(),tid=d.target_id?String(d.target_id):'';
  var bl=tid?((DB.blends||[]).find(function(b){return String(b.id)===tid;})||null):(DB.blends||[]).find(function(b){return String(b.name||'').trim().toLowerCase()===key;});
  var beanHit=(tid&&!bl)?((DB.beans||[]).find(function(b){return String(b.id)===tid;})||null):null;
  try{
    if(bl){
      var q=await sb.from('blends').select('brew').eq('id',bl.id).maybeSingle();
      if(q.error)throw new Error(q.error.message);
      var br=(q.data&&q.data.brew&&typeof q.data.brew==='object')?q.data.brew:{};
      br.espresso=Object.assign({},br.espresso||{},esp);
      var u=await sb.from('blends').update({brew:br,updated_at:new Date().toISOString()}).eq('id',bl.id);
      if(u.error)throw new Error(u.error.message);
    }else{
      /* target_id 命中的 bean 優先；沒有（舊紀錄）才名字級取第一支 */
      var bean=beanHit||(DB.beans||[]).find(function(b){return String(b.name||'').trim().toLowerCase()===key;});
      if(!bean){toast('No matching bean for "'+d.coffee+'"');return;}
      var q2=await sb.from('beans').select('brew').eq('id',bean.id).maybeSingle();
      if(q2.error)throw new Error(q2.error.message);
      var br2=(q2.data&&q2.data.brew&&typeof q2.data.brew==='object')?q2.data.brew:{};
      br2.espresso=Object.assign({},br2.espresso||{},esp);
      var u2=await sb.from('beans').update({brew:br2}).eq('id',bean.id);
      if(u2.error)throw new Error(u2.error.message);
    }
    logAct('brew guide updated',d.coffee,dlMeta(d));
    toast('Brew guide updated ✓');
  }catch(e){alert('Update failed: '+(e&&e.message||e));}
}

/* ===== 貨架清單（在賣的豆：價格規格/售罄/鎖風味/烘焙新鮮度＋待上架佇列；唯讀）===== */
/* 新鮮度規則（老闆定，2026-07-07）：<14 天紅（還在養豆）、14–28 天綠（最佳）、>28 天黃（老化）；>60 天晨報推警示 */
/* 新鮮度三段（老闆定，與 Labels 的 ready brew date 一致）：
   烘後 <3週(21d)=aging（還沒好）｜3–6週(21–42d)=ready（最佳）｜>6週(42d)=fading（走下坡）。
   一個門檻餵整個 app（貨架＋客戶店面）；>60 天再加「re-roast?」提示。 */
var SHELF_FRESH_REST=21, SHELF_FRESH_PRIME=42, SHELF_STALE_DAYS=60;
/* 上架代表樣品：鎖定的優先（同名多處理法時＝實際在賣的那個處理法，例如三個 Danche） */
function shelfSampleFor(nm,proc){
  /* proc 可選（2026-07-13）：undefined＝名字級照舊（舊呼叫點零改動）；
     給值（含 ''）＝只在同 procKey 池找——同名多處理法各找各的鎖 */
  var k=String(nm||'').trim().toLowerCase();
  var pool=(DB.samples||[]).filter(function(s){
    return String(s.sample_id||'').trim().toLowerCase()===k
      &&(proc===undefined||procKey(s.process)===procKey(proc));
  });
  return pool.find(function(s){return s.flavour_locked;})||pool[0]||null;
}
/* proc（2026-07-14）：undefined＝名字級照舊（舊呼叫點零改動）；給值（含 ''）＝只算同處理法的烘豆——
   同名多處理法（Alo Village White Honey vs Cold Fermentation）烘豆日不再互相污染 */
function shelfLatestRoast(nm,proc){
  var best=null;
  /* 先照上架樣品的 bean_id 找同一支生豆批的烘豆 */
  var s=shelfSampleFor(nm,proc);
  if(s&&s.bean_id){
    (DB.roasts||[]).forEach(function(r){
      if(String(r.bean_id||'')!==String(s.bean_id)||!r.roast_date)return;
      if(proc!==undefined&&!rstProcMatch(r,proc))return;
      if(!best||r.roast_date>best)best=r.roast_date;
    });
    if(best)return best;
  }
  var k=String(nm||'').trim().toLowerCase();
  (DB.roasts||[]).forEach(function(r){
    if(String(r.bean_name||'').trim().toLowerCase()!==k||!r.roast_date)return;
    if(proc!==undefined&&!rstProcMatch(r,proc))return;
    if(!best||r.roast_date>best)best=r.roast_date;
  });
  return best;
}
function shelfFreshness(nm,proc){
  var d=shelfLatestRoast(nm,proc);
  if(!d)return {txt:'no roast date',cls:'',days:null};
  var age=daysSince(d);
  if(age<SHELF_FRESH_REST)return {txt:'roasted '+age+'d — aging',cls:'fr-yellow',days:age};
  if(age<=SHELF_FRESH_PRIME)return {txt:'roasted '+age+'d — ready',cls:'fr-green',days:age};
  return {txt:'roasted '+age+'d — fading'+(age>SHELF_STALE_DAYS?' · re-roast?':''),cls:'fr-red',days:age};
}
/* Coffee Info 分頁（2026-07-13 老闆點名：配方豆/單品用 tab 分開）——預設同 Coffee Stock（blend 先） */
var RTL_SEG='blend';
/* 拼配判定＝名字命中 blends 主檔（同 cardDataFor 慣例）或有 kind='blend' 批次（漏網之魚拼配不在主檔也認得） */
function rtlIsBlend(nm){
  var k=String(nm||'').trim().toLowerCase();
  return (DB.blends||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===k;})
    ||(DB.roasts||[]).some(function(r){return r.kind==='blend'&&String(r.bean_name||'').trim().toLowerCase()===k;});
}
async function openRetailSheet(){
  NAV_SRC=null; /* 親自進 Coffee Info＝子抽屜返回照舊回這裡 */
  openDrawerHTML('<div class="t" style="font-size:19px">Coffee Info</div><div class="empty">Loading…</div>');
  /* 價格/規格/售罄記憶（classic 同款 app_state 鑰匙） */
  var m={rtl_price:{},rtl_g:{},rtl_sizes:{},rtl_sold:{}};
  try{var r=await sb.from('app_state').select('key,value').in('key',['rtl_price','rtl_g','rtl_sizes','rtl_sold']);
    (r.data||[]).forEach(function(x){var v=x.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
      if(v&&typeof v==='object')m[x.key]=v;});
  }catch(e){}
  var dots={};try{dots=await cardDots();}catch(e){}
  /* 2026-07-13 重構：四象限（庫存 × 有沒有鎖風味）——資料源＝QC 杯測 ∪ Coffee Stock 現有庫存。
     現貨 In stock＝鎖了＋有可賣庫存（正在賣的版本）；Pending＝有貨＋還沒鎖（待鎖上架）；
     History＝鎖了＋賣完（存檔查履歷）；沒鎖＋沒貨＝不顯示（沒鎖是同支豆次要批次、無存檔價值）。
     判定到處理法級：同名多處理法各自分區（Alo Village White Honey 有貨→現貨、Cold Ferm 賣完→History）。 */
  var blendSeg=(RTL_SEG==='blend');
  /* 候選枚舉（process 級去重）：杯測筆 ∪ Coffee Stock 有庫存列——有貨沒杯測的也收（進 Pending） */
  var cand=[],cseen={};
  function pushCand(nm,proc){
    nm=String(nm||'').trim();if(!nm||isSubName(nm))return;
    var isB=rtlIsBlend(nm);if(isB!==blendSeg)return; /* 分頁過濾 */
    var pr=isB?'':String(proc||'').trim();
    var k=nm.toLowerCase()+'|'+(isB?'':procKey(pr));
    if(cseen[k])return;cseen[k]=1;
    cand.push({nm:nm,proc:pr,isBlend:isB});
  }
  (DB.samples||[]).forEach(function(s){if((s.supplier||'')==='Ratio Coffee')pushCand(s.sample_id,s.process);});
  [false,true].forEach(function(ib){rstRows(ib).forEach(function(r){pushCand(r.name,r.proc);});});
  /* 每支豆分區（process 級代表 sample、可賣庫存 kg 排除 downgrade） */
  var inStock=[],pending=[],history=[];
  cand.forEach(function(c){
    c.rep=shelfSampleFor(c.nm,c.isBlend?undefined:c.proc);
    var locked=!!(c.rep&&c.rep.flavour_locked);
    c.kg=c.isBlend?rstStockKg(c.nm,true):rstStockKg(c.nm,false,c.proc);
    var has=c.kg>0;
    if(locked&&has)inStock.push(c);
    else if(locked&&!has)history.push(c);
    else if(!locked&&has)pending.push(c);
    /* 沒鎖＋沒貨＝skip（老闆定調：無存檔價值，以後會刪） */
  });
  /* 排序：現貨/Pending 烘豆日舊→新（先賣先清）；History 新→舊（最近賣完先看） */
  function byRoast(asc){return function(a,b){
    var da=null,db=null;try{da=shelfLatestRoast(a.nm,a.isBlend?undefined:a.proc);}catch(e){}try{db=shelfLatestRoast(b.nm,b.isBlend?undefined:b.proc);}catch(e){}
    if(!!da!==!!db)return da?-1:1;
    var c=String(da||'').localeCompare(String(db||''));
    return (asc?c:-c)||a.nm.localeCompare(b.nm);
  };}
  inStock.sort(byRoast(true));pending.sort(byRoast(true));history.sort(byRoast(false));
  /* 重審中標記（send back 後）：同名同處理法在 QC 佇列/待杯＝內部重審、對外照賣 */
  var inQCSet={};
  (QCQ||[]).forEach(function(q){inQCSet[String(q.s.sample_id||'').trim().toLowerCase()+'|'+procKey(q.s.process)]=1;});
  toCupList().forEach(function(r){inQCSet[String(r.bean_name||'').trim().toLowerCase()+'|'+procKey(r.process)]=1;});
  function rowHTML(c,zone){
    /* 2026-07-16 老闆點名精簡：B# ID、On/Off shelf 膠囊、roasted Nd 新鮮度字樣都不顯示——
       列上剩 色點＋豆名＋處理法＋風味/警示；新鮮度仍在 Coffee Stock 血條與詳情頁看 */
    var nm=c.nm,rep=c.rep;
    var col=uiDot(dotColorFor(nm,dots,c.isBlend?undefined:((rep&&rep.process)||c.proc)));
    var feats=(rep&&Array.isArray(rep.features)?rep.features.slice(0,3).join(' · '):'');
    var sy=syncFor(nm,c.isBlend?undefined:c.proc);
    var mkey=listNameFor(nm,rep||{process:c.proc});
    var price=m.rtl_price[mkey]!=null?m.rtl_price[mkey]:m.rtl_price[nm];
    var inQC=!!inQCSet[nm.toLowerCase()+'|'+procKey(c.proc)];
    var bits=[];
    if(feats)bits.push(esc(feats));
    if(zone==='stock'&&sy&&price==null)bits.push('<span class="red">no price</span>');
    if(inQC)bits.push('<span class="fr-yellow">re-checking in QC</span>');
    if(zone==='history')bits.push('<span style="color:var(--muted)">sold through</span>');
    var sub=rep?bits.join(' · '):'<span class="red">no info — cup it in QC</span>';
    var procTxt=(rep&&rep.process)||c.proc||'';
    return '<div class="hit" data-shelf="'+esc(nm)+'" data-shelfp="'+esc(c.proc)+'" data-shelfb="'+(c.isBlend?'1':'0')+'"><span style="min-width:0"><div class="t" style="font-size:16px">'
      +(col?'<span style="color:'+col+';font-size:12px">●</span> ':'')+esc(nm)
      +(procTxt?' <span style="color:var(--muted);font-weight:400;font-size:12.5px;font-family:Inter,sans-serif">'+esc(procTxt)+'</span>':'')+'</div>'
      +(sub?'<div class="s">'+sub+'</div>':'')+'</span></div>';
  }
  function section(title,arr,zone){return arr.length?'<div class="dlab">'+title+'</div>'+arr.map(function(c){return rowHTML(c,zone);}).join(''):'';}
  /* 區名避開豆況 Pending 撞名（老闆定調 Pending＝還沒 QC 的豆；這區＝有貨但還沒選在賣版本） */
  var body=section('In stock',inStock,'stock')+section('Not listed yet',pending,'pending')+section('History — sold through',history,'history');
  var errs=(DB.syncs||[]).filter(function(x){return x.status&&x.status!=='synced'&&x.status!=='paused';});
  openDrawerHTML('<div class="t" style="font-size:19px">Coffee Info</div>'
    +'<div class="s" style="margin-top:2px">in stock now · waiting to list · sold-through history</div>'
    +'<div class="pm-seg" style="margin-top:10px"><button id="rtl-b" class="'+(RTL_SEG==='blend'?'on':'')+'">Blends</button><button id="rtl-s" class="'+(RTL_SEG==='blend'?'':'on')+'">Single origins</button></div>'
    +(body||'<div class="empty">Nothing here yet — cup a roast in QC first</div>')
    +(errs.length?'<div class="dlab">Sync problems</div>'+errs.map(function(x){return '<div class="dl"><span>'+esc(x.bean_id||'—')+'</span><span class="red">'+esc(x.status)+'</span></div>';}).join(''):'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  document.querySelectorAll('#drawer [data-shelf]').forEach(function(el){el.addEventListener('click',function(){
    var proc=el.dataset.shelfb==='1'?undefined:(el.dataset.shelfp||''); /* 拼配名字級、單品帶 process（含空字串） */
    openShelfBeanDetail(el.dataset.shelf,m,proc);
  });});
  $('rtl-b').addEventListener('click',function(){if(RTL_SEG!=='blend'){RTL_SEG='blend';openRetailSheet();}});
  $('rtl-s').addEventListener('click',function(){if(RTL_SEG!=='single'){RTL_SEG='single';openRetailSheet();}});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* Retail shelf 豆子明細：售價/新鮮度＋烘焙風味（風味詞、comment、雷達）＋豆子履歷＋一鍵資訊卡 */

    /* 詳情頁動作全移除（2026-07-16 老闆點名：Coffee Info 只讀不動手——★ Star/售罄切換/Send back to QC 都拿掉；

    +'<button class="dclose" id="sb-back">‹ Back to Coffee Info</button>'

/* 雙鍵查杯測 full row（flavour_locked 優先）：豆名必帶、處理法有值才加（ilike 寬鬆比對）。
   ⚠ 規則：同名多處理法是不同商品——只比名字會抓到別支處理法的鎖定風味。
   所有產出物（摺卡/社群圖/商品卡/信件卡）的資料源統一走這裡 */
function fullSampleQuery(nm,proc){
  var q=sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm);
  if(proc!=null&&String(proc).trim()!=='')q=q.ilike('process',String(proc).trim());
  return q.order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
}
/* ===== Social post kit（社群曝光 Phase 4 第一刀：貨架豆一鍵出 IG/小紅書素材）=====
   卡片＝同 Square/信件設計但走 tight 白邊（IG 貼文沒有平台裁切，同 classic Print Centre 下載版）；
   文案照 cupAutoComment 慣例本機模板組句（不呼叫 AI），是草稿——老闆貼上前自行修 */
var PROC_ZH={washed:'水洗',natural:'日曬',honey:'蜜處理',anaerobic:'厭氧',
  'anaerobic natural':'厭氧日曬','anaerobic washed':'厭氧水洗','wet hulled':'濕刨','carbonic maceration':'二氧化碳浸漬'};
function promoCaptions(nm,info,feats,comment,price,g,proc){
  function get(lab){var r=(info||[]).find(function(x){return x[0]===lab;});return r?String(r[1]):'';}
  var origin=get('Origin'),variety=get('Variety');
  proc=String(proc||'').trim();
  var procZh=PROC_ZH[proc.toLowerCase()]||'';
  var priceLine=(price!=null)?('$'+centAmt(price)+' / '+g+'g'):'';
  var en='On the shelf — '+nm+'\n';
  var line2=[origin,proc?proc+' process':'',variety].filter(Boolean).join(' · ');
  if(line2)en+=line2+'\n';
  if(feats.length)en+='Cupping notes: '+feats.join(', ')+'\n';
  if(comment)en+='“'+comment+'”\n';
  en+='\n'+(priceLine?priceLine+'\n':'')+'Roasted fresh in Crows Nest, Sydney.\n\n'
    +'#specialtycoffee #sydneycoffee #crowsnest';
  var zh='☕ 新豆上架｜'+nm+'\n';
  var zp=[];
  if(origin)zp.push('產地 '+origin);
  if(proc)zp.push(procZh?procZh+'處理':proc+' process');
  if(zp.length)zh+=zp.join('，')+'\n';
  if(feats.length)zh+='杯測風味：'+feats.join('、')+'\n';
  if(comment)zh+='「'+comment+'」\n';
  zh+='\n'+(priceLine?priceLine+'\n':'')+'雪梨 Crows Nest 本地新鮮烘焙。\n\n'
    +'#雪梨咖啡 #精品咖啡 #北岸咖啡';
  return {en:en,zh:zh};
}

/* ===== 豆子背景照：存 Storage mail-assets 的 photo-<slug>.jpg，靠檔名對應豆子（同 card-<slug>.png 慣例）
   不查 DB——豆名算得出檔名就找得到圖。⚠ 豆子改名要一起搬（saveGreenBean 有接） ===== */
function beanPhotoPath(nm){return 'photo-'+beanSlug(nm)+'.jpg';}
function beanPhotoUrl(nm){var p=sb.storage.from('mail-assets').getPublicUrl(beanPhotoPath(nm));return (p&&p.data&&p.data.publicUrl)||'';}
/* 一次列出所有已存照片 → {slug:true}，給清單標「有沒有照片」 */
async function listBeanPhotos(){
  try{
    var r=await sb.storage.from('mail-assets').list('',{limit:300,search:'photo-'});
    var m={};(r.data||[]).forEach(function(o){var g=/^photo-(.+)\.jpg$/.exec(o.name||'');if(g)m[g[1]]=true;});
    return m;
  }catch(e){return {};}
}
/* 拉成 dataURL 再交給 html2canvas（省一次跨網域抓圖；沒照片回 null） */
async function loadBeanPhotoData(nm){
  try{
    var r=await fetch(beanPhotoUrl(nm)+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return null;
    var b=await r.blob();
    if(!b||!b.size)return null;
    return await new Promise(function(ok){var fr=new FileReader();fr.onload=function(){ok(fr.result);};fr.onerror=function(){ok(null);};fr.readAsDataURL(b);});
  }catch(e){return null;}
}
/* 選檔（手機＝相簿或相機） */
function pickPhotoFile(){
  return new Promise(function(ok){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';
    inp.addEventListener('change',function(){ok((inp.files&&inp.files[0])||null);});
    inp.click();
  });
}
/* 置中裁成 1080 見方 JPEG——不管拍的是直是橫是 HEIC，存進去都同一規格 */
function _cropSquare1080(file){
  return new Promise(function(ok,bad){
    var fr=new FileReader();
    fr.onload=function(){
      var im=new Image();
      im.onload=function(){
        var s=Math.min(im.naturalWidth,im.naturalHeight);
        if(!s)return bad(new Error('That image looks empty'));
