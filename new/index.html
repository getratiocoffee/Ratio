/* 卡片互動：規格段選、數量步進、加入購物車（狀態記在卡片 data-*，不重畫不打斷輪播） */
function wireShopCards(root){
  root.querySelectorAll('.shopc').forEach(function(card){
    function price(){return parseFloat(card.dataset.price)||0;}
    function qty(){return parseInt(card.querySelector('.shopqty')?card.querySelector('.shopqty').textContent:'1',10)||1;}
    function paintBtn(){
      var b=card.querySelector('[data-addcart]');if(!b)return;
      var p=price()*qty();
      b.textContent='Add to cart'+(p?' · $'+centAmt(p):'');
    }
    card.querySelectorAll('[data-sz]').forEach(function(el){el.addEventListener('click',function(){
      card.querySelectorAll('[data-sz]').forEach(function(x){x.classList.toggle('on',x===el);});
      card.dataset.vid=el.dataset.vid;card.dataset.price=el.dataset.price;card.dataset.label=el.dataset.label;
      var pp=card.querySelector('.shopprice');
      if(pp&&el.dataset.price)pp.innerHTML=shopPriceHTML(el.dataset.price,el.dataset.label,el.dataset.retail!==''?el.dataset.retail:null);
      paintBtn();
    });});
    card.querySelectorAll('[data-shopq]').forEach(function(el){el.addEventListener('click',function(){
      var q=Math.max(1,Math.min(cartMaxQty(),qty()+(+el.dataset.shopq)));
      card.querySelector('.shopqty').textContent=q;
      paintBtn();
    });});
    var add=card.querySelector('[data-addcart]');
    if(add)add.addEventListener('click',function(){
      if(!card.dataset.vid){alert('This coffee is not available right now.');return;}
      cartAdd({bean:card.dataset.bean,label:card.dataset.label,vid:card.dataset.vid,price:parseFloat(card.dataset.price)||0,qty:qty()});
      toast('Added to cart ✓');
    });
    var det=card.querySelector('[data-shopdetail]');
    if(det)det.addEventListener('click',function(){openShopDetailSheet(card.dataset.bean);});
  });
}
/* ===== 登入抽屜（帳號＝打開其他功能的鑰匙；照 classic submit 的 signInWithPassword，只登入不註冊）===== */
function openSignInSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Sign in</div>'
    +'<div class="s" style="margin-top:2px">staff and account holders — unlocks your view of the app</div>'
    +'<div class="dlab">Email</div><input class="din" id="si-email" type="email" autocomplete="email" placeholder="you@example.com">'
    +'<div class="dlab">Password</div><input class="din" id="si-pass" type="password" autocomplete="current-password" placeholder="••••••••">'
    +'<div class="s" id="si-msg" style="margin-top:8px"></div>'
    +'<button class="act" id="si-go">Sign in</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  async function go(){
    var email=($('si-email').value||'').trim();
    var pass=$('si-pass').value||'';
    var msg=$('si-msg');
    if(!email||!pass){msg.innerHTML='<span class="red">Enter email and password</span>';return;}
    var b=$('si-go');b.disabled=true;b.textContent='Signing in…';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){
      b.disabled=false;b.textContent='Sign in';
      msg.innerHTML='<span class="red">'+esc(r.error.message||'Sign in failed')+'</span>';
      return;
    }
    closeDrawer();toast('Signed in ✓');
    await boot();
  }
  $('si-go').addEventListener('click',go);
  $('si-pass').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('si-email').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* 沒登入＝店面：豆單直接開門見山（員工從底部小連結登入） */
async function renderPublicMenu(){
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  $('chips').innerHTML='';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  SHOP_BEANS=await loadShopMenu();
  m.innerHTML='<div id="shopbody"></div>'
    +'<div class="note" style="margin-top:16px"><a href="/?fb=store" style="color:var(--accent)">Tried it? Tell us what you think →</a></div>'
    +'<button class="more" id="pm-staff">Wholesale &amp; staff sign in</button>';
  renderShopTabs();
  paintShopBody();
  var st=$('pm-staff');if(st)st.addEventListener('click',openSignInSheet);
}
/* 客戶登入＝豆單在上、自己的訂單在下＋切員工登入鍵；wholesale 角色＝同門戶換批發菜單＋付款抽屜 */
async function renderCustomerPortal(sess){
  WS_MODE=(ROLE==='wholesale');
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  $('chips').innerHTML='';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  var email=(sess&&sess.user&&sess.user.email)||'';
  var orders=[],custName='';
  var beansP=WS_MODE?loadWholesaleMenu():loadShopMenu();
  try{
    var cq=await sb.from('customers').select('id,name').ilike('email',email);
    var ids=(cq.data||[]).map(function(c){return c.id;});
    if(cq.data&&cq.data[0])custName=cq.data[0].name||'';
    if(ids.length){
      var oq=await sb.from('orders').select('order_no,status,items,total,payment_status,tracking_no,created_at,payment_link').in('customer_id',ids).neq('status','Cancelled').order('order_no',{ascending:false}).limit(20);
      orders=oq.data||[];
    }
  }catch(e){}
  SHOP_BEANS=await beansP;
  m.innerHTML='<div class="card brief"><span class="tag">'+(WS_MODE?'Wholesale':'Welcome')+'</span>'
    +'<div class="t">'+esc(custName||'Hello')+'</div>'
    +'<div class="s">'+(WS_MODE
      ?'Wholesale account'
      :('Ratio Coffee · on the shelf today'+(email?' · '+esc(email):'')))+'</div>'
    +'<button class="more" id="cp-fb" style="color:var(--inv-t)">Leave feedback</button></div>'
    +'<div id="shopbody"></div>'
    +(orders.length?'<div class="note" style="margin-top:16px">Your orders</div>'+orders.map(function(o,ox){
      var paid=o.payment_status==='paid';
      return '<div class="card"><span class="tag'+(o.status==='Dispatched'?'':' warn')+'">'+esc(o.status||'—')+'</span>'
        +'<div class="t">#'+String(o.order_no||'—').padStart(4,'0')+' · '+money(o.total)+'</div>'
        +'<div class="s">'+esc(itemsLine(o)||'—')+(paid?'':' · awaiting payment')+(o.tracking_no?' · tracking '+esc(o.tracking_no):'')+'</div>'
        +(WS_MODE&&!paid?'<button class="more" data-wspay="'+ox+'">Payment details →</button>':'')
        +'</div>';
    }).join(''):'')
    +'<button class="more" id="cp-staff" style="margin-top:18px">Sign in with another account</button>';
  renderShopTabs();
  paintShopBody();
  m.querySelectorAll('[data-wspay]').forEach(function(b){b.addEventListener('click',function(){openWsPaySheet(orders[+b.dataset.wspay]);});});
  $('cp-fb').addEventListener('click',function(){location.href='/?fb=store';});
  /* 登入/開 app 後彈一次批發條款提示（抽屜沒開著才彈，避免蓋掉別的） */
  if(WS_MODE&&!WS_WELCOME_SEEN){WS_WELCOME_SEEN=true;setTimeout(function(){var dr=$('drawer');if(!(dr&&dr.classList.contains('show')))openWsWelcomeSheet(custName);},500);}
  /* 更高權限入口：登出這個客戶 → 原地開登入抽屜換帳號，全程不離開 /new */
  $('cp-staff').addEventListener('click',async function(){
    if(!confirm('Sign out and sign in with another account?'))return;
    try{await sb.auth.signOut();}catch(e){}
    await boot();
    openSignInSheet();
  });
}
/* 三層路由：沒登入＝豆單店面／customer＝客戶門戶／員工四角色＝操作台。
   登入、登出後都重呼叫一次即可換視角（nav/chips 先復位，因為店面與門戶會藏 nav） */
async function boot(){
  /* 付款完成回店面：清購物車＋致謝（Square redirect_url 帶 ?checkout=done 回來） */
  if(/[?&]checkout=done/.test(location.search)){
    try{localStorage.setItem('r2_cart','[]');}catch(e){}
    try{history.replaceState(null,'',location.pathname);}catch(e){}
    setTimeout(function(){toast('Thanks! Your order is on its way to the roastery ☕');},600);
  }
  var nav=document.querySelector('nav');if(nav)nav.style.display='';
  $('shoptabs').style.display='none';
  $('chips').innerHTML='';
  WS_MODE=false;WS_INFO=null;WS_WELCOME_SEEN=false; /* 批發模式只在 wholesale 門戶內開；員工/店面一律零售車；歡迎彈窗每次登入/開 app 重置 */
  paintCartBar();
  var g=await sb.auth.getSession();
  if(!(g&&g.data&&g.data.session)){
    await renderPublicMenu();
    return;
  }
  /* 沒 profile 或沒角色＝客戶（開放客戶登入前的安全預設） */
  ROLE='customer';WHO='';
  try{
    var p=await sb.from('profiles').select('name,role').eq('id',g.data.session.user.id).single();
    if(p&&p.data){ROLE=p.data.role||'customer';WHO=p.data.name||'';}
  }catch(e){}
  if(myRole()==='customer'||myRole()==='wholesale'){await renderCustomerPortal(g.data.session);return;}
  view='feed';filter='all';
  await reload();
}
(async function init(){await boot();})();
</script></body></html>
