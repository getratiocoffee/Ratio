var _SOC_CHK='background-image:linear-gradient(45deg,#c9c4be 25%,transparent 25%),linear-gradient(-45deg,#c9c4be 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#c9c4be 75%),linear-gradient(-45deg,transparent 75%,#c9c4be 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;background-color:#fff';
/* 保底：截圖尺寸不是 1080 見方就縮放補正（IG 要正方形）。透明版不補底色也不能轉 JPEG */
function _soc1080(cv,mode,fmt,q,bg){
  fmt=fmt||'image/png';
  if(cv.width===1080&&cv.height===1080)return cv.toDataURL(fmt,q);
  var o=document.createElement('canvas');o.width=1080;o.height=1080;
  var g=o.getContext('2d');
  if(mode!=='clear'){g.fillStyle=bg||'#FAF8F4';g.fillRect(0,0,1080,1080);}
  g.drawImage(cv,0,0,1080,1080);
  return o.toDataURL(fmt,q);
}
/* 產四張圖的核心（社群下載與 Square 商品圖共用這一份）
   mode: 'white'｜'clear' 透明｜'photo' 該豆的背景照
   opts: {fmt,quality,onStep} — Square 要 JPEG（四張 PNG 太肥，edge 的請求體塞不下） */
async function renderSocialImages(full,info,feats,nm,col,mode,opts){
  opts=opts||{};
  var step=opts.onStep||function(){};
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  var photo=null;
  if(mode==='photo'){
    step('Loading photo…');
    photo=await loadBeanPhotoData(nm);
    if(!photo)throw new Error('No photo saved for '+nm+' yet — tap Photo to choose one');
  }
  /* white 模式的底色：opts.bg（上架 per-bean 記憶）優先，否則全域 SOC_BG（Social Images 抽屜）；
     photo/clear 不吃底色。深底色沿用 photo 深照片那套：字翻米白、雷達 grid 翻淺、點色提亮 */
  var bg=mode==='white'?(opts.bg||SOC_BG||'#FAF8F4'):'#FAF8F4';
  var dark=photo?await photoIsDark(photo):(mode==='white'?socBgIsDark(bg):false);
  var T=_socTheme(dark);
  /* 紗濃度：opts.scrim（上架 per-bean 記憶）優先，否則全域 socScrim（Social Images 抽屜／自動） */
  var scrim=(opts.scrim!=null?opts.scrim:socScrim(dark));
  /* 版面固定黑白：呼叫端傳進來的 col 是 dotColorFor() 的罐標色（黃/藍/紅），那是店裡貨架
     辨識用的管理色，不可拿來當版面主色——不然同一支豆換個點色，整張圖就變全黃或全紅。
     用 T.ink：淺底是墨黑，深照片上自動翻成米白，明暗天生對稱。
     ⚠ 例外＝雷達多邊形與封面菱形：那是這支豆的識別色，用來一眼認出是哪一支（老闆定案）。
     深色照片上要先提亮，否則深藍/紅點色會整個沉進暗底。 */
  var radarCol=col||'#C87E8E';
  if(dark)radarCol=_liftColour(radarCol,0.45);
  col=T.ink;
  var o={mode:mode,photo:photo,scrim:scrim,dark:dark,T:T,dot:radarCol,bg:bg,
    logo:await _socLogo(T.ink), drop:await _socDrop(col), bean:await _socBean(col)};
  var sc={fragrance:full.fragrance,acidity:full.acidity,sweetness:full.sweetness,body:full.body,aftertaste:full.aftertaste};
  var radar=printRadarPNG(sc,radarCol,dark?{grid:'rgba(247,242,237,.32)',label:T.muted}:{});
  var comment=String(full.comment||'').trim();
  var qrSrc=cardQrSrc(nm);
  /* 順序固定：封面 → 雷達 → 產區 → QR（Square 商品圖的輪播順序照這個） */
  var defs=[['cover',socialCoverHTML(nm,feats,comment,col,o)],['radar',socialRadarHTML(radar,feats,col,o)],['origin',socialOriginHTML(nm,info,col,o)],['qr',socialQrHTML(qrSrc,col,o)]];
  var out=[];
  for(var i=0;i<defs.length;i++){
    step('Rendering image '+(i+1)+' of 4…');
    var host=document.createElement('div');
    host.style.cssText='position:absolute;left:-9999px;top:0';
    host.innerHTML=defs[i][1];
    document.body.appendChild(host);
    await Promise.all(Array.prototype.map.call(host.querySelectorAll('img'),function(im){
      if(im.src.slice(0,5)!=='data:')im.crossOrigin='anonymous';
      return (im.complete&&im.naturalWidth)?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r;});
    }));
    var canvas=await html2canvas(host.firstChild,{scale:1,useCORS:true,backgroundColor:mode==='clear'?null:bg});
    out.push([defs[i][0],_soc1080(canvas,mode,opts.fmt,opts.quality,bg)]);
    host.remove();
  }
  return {images:out,dark:dark,scrim:scrim,bg:bg};
}

async function runSocialPost(){

      .map(function(t){return '<a class="dclose" style="display:block;text-align:center;text-decoration:none" target="_blank" rel="noopener" href="'+esc(res[t].permalink)+'">Open the '+SP_LABEL[t]+' post ›</a>';}).join('');

    if(r&&r.ok){S.postedToday=true;b.textContent='Posted ✓';toast(lines.join(' · '));}
    else{b.disabled=false;b.textContent='Post now';alert('Post failed:\n'+lines.join('\n'));}

}

async function announceShelfBean(s,nm,btn){

  var qr=null;try{qr=matchRoast(s);}catch(e){}

  var warns=[];

  if(!s.flavour_locked){alert('Only ★ on-shelf coffees can be announced — add a ★ first.');return;}

  try{
    var cardUrl=await uploadCardForBean(nm,s&&s.process);

    var r=await callFn('send-email',{action:'announce_coffee',name:nm,card_url:cardUrl,flavour:flav,note:(s.comment||'').trim()});
    logAct('announced coffee',nm,(r.sent||0)+' customers'); /* Publish 面板的 Email 狀態靠這筆 */
    toast('Sent to '+(r.sent||0)+' of '+(r.total||n)+' customers'+(r.failed?(' · '+r.failed+' failed'):'')+' ✓');

  btn.disabled=false;btn.textContent=orig;

/* ===== 刪除咖啡豆（老闆點名：清打錯名/重複的零售豆）=====
   刪 samples（Ratio Coffee 杯測紀錄）＋roasts（烘豆批次）＋product_sync＋app_state 記憶鍵；
   **生豆庫存（beans）永遠不碰**；Square 目錄上的商品本身留著（要移除去 Square 後台），但清掉 product_sync 後店面菜單就不再列它 */
function allRetailCoffees(){
  var seen={},out=[];
  (DB.samples||[]).forEach(function(s){
    var nm=String(s.sample_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].cups++;
  });
  (DB.roasts||[]).forEach(function(r){
    var nm=String(r.bean_name||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].roasts++;
  });
  /* 純上架孤兒也要列（只在 product_sync、0 杯測 0 烘豆——老闆的 Danche 殘留就是這種漏網魚） */
  (DB.syncs||[]).forEach(function(x){
    var nm=String(x.bean_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
  });
  /* synced 含 paused（售罄也是上架中）——刪除時才會連 Square 商品一起拆 */
  out.forEach(function(e){e.synced=!!(DB.syncs||[]).find(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim().toLowerCase()===e.name.toLowerCase();});});
  return out.sort(function(a,b){return a.name.localeCompare(b.name);});
}
/* ===== Clean up 清潔按鈕（2026-07-14 老闆點名）＝一鍵掃孤兒、分類清理 =====
   五類：A Square 死連結（edge v28 reconcile）／B 舊杯測（沒鎖＋沒貨＝無存檔價值）／
   C 待秤超期（>2 天沒 weigh in）／D 降級滯留（>30 天，純提醒）／E 下架記憶殘留（rtl_sold vs 實際）。
   掃描條件全遵守雙鍵規則（名字＋處理法）。 */
async function openCleanupSheet(){
  if(!isLead()){roToast();return;} /* Green/敏感操作：staff 不開放（2026-07-14 權限矩陣） */
  openDrawerHTML('<div class="t" style="font-size:19px">Clean up</div><div class="empty">Scanning…</div>');
  /* B 舊杯測：沒鎖＋該豆（名＋procKey）沒庫存沒待秤沒降級＋不在 QC 佇列（重審中的不碰） */
  var inQ={};(QCQ||[]).forEach(function(q){inQ[String(q.s.id)]=1;});
  var oldCups=(DB.samples||[]).filter(function(s){
    if((s.supplier||'')!=='Ratio Coffee'||s.flavour_locked||inQ[String(s.id)])return false;
    var nm=String(s.sample_id||'').trim();if(!nm)return false;
    var isB=rtlIsBlend(nm),proc=isB?undefined:(s.process||'');
    return rstStockKg(nm,isB,proc)<=0&&!rstPendingBatches(nm,isB,proc).length&&!rstDgBatches(nm,isB,proc).length;
  });
  /* C 待秤超期 >2 天 */
  var pend=(DB.roasts||[]).filter(function(r){
    return Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'&&r.roast_date&&daysSince(r.roast_date)>2;
  });
  /* D 降級滯留 >30 天 */

  });
  /* E rtl_sold 殘留：記憶說下架、product_sync 說在賣＝殘留（歷史 key 名字級比對） */
  var soldKeys=[];
  try{

    var v=rs&&rs.data&&rs.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
    if(v&&typeof v==='object')Object.keys(v).forEach(function(k){
      if(!v[k])return;
      var lk=String(k).trim().toLowerCase();
      if((DB.syncs||[]).some(function(x){return x.status==='synced'&&String(x.bean_id||'').trim().toLowerCase()===lk;}))soldKeys.push(k);
    });
  }catch(e){}
  /* A 死連結：edge 乾跑（需要登入態；失敗不擋其他區） */
  var dead=null,deadErr=null;

  catch(e){deadErr=String(e&&e.message||e);}
  paintCleanup({dead:dead,deadErr:deadErr,oldCups:oldCups,pend:pend,dgOld:dgOld,soldKeys:soldKeys});
}

function lcSub(){
  lcCleanup();
  LC.chan=sb.channel('cup-'+LC.sid)
    .on('postgres_changes',{event:'*',schema:'public',table:'cupping_notes',filter:'session_id=eq.'+LC.sid},function(p){
      var row=p&&p.new;if(!row||!row.id)return;
      var i=LC.notes.findIndex(function(n){return n.id===row.id;});
      if(i>-1)LC.notes[i]=row;else LC.notes.push(row);
      lcLiveUpdate();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'cupping_sessions',filter:'id=eq.'+LC.sid},function(p){
      if(p&&p.new){LC.session=p.new;lcPaint();} /* 有人揭曉＝所有人自動翻牌 */
    })

async function lcSaveOfficial(){

async function confirmDeleteCoffee(e){
  /* 拼配＝Coffee Stock 的列名靠 blends 配方——不連配方一起刪就會殘留 0 kg 幽靈行（老闆點名同步） */
  var hasBlend=(DB.blends||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===e.name.toLowerCase();});
  var msg='Delete "'+e.name+'"?\n\nThis removes:\n· '+e.cups+' cupping record'+(e.cups===1?'':'s')+'\n· '+e.roasts+' roast batch'+(e.roasts===1?'':'es')+'\n· shelf price / colour memories'
    +(hasBlend?'\n· the blend recipe (and its brew guide)':'')
    +(e.synced?'\n· the Square listing (item deleted from the Square catalogue too)':'')
    +'\n\nGreen bean stock is NOT touched. This cannot be undone.';
  if(!confirm(msg))return;
  if(!confirm('Really delete "'+e.name+'"? Last chance.'))return;
  toast('Deleting…');
  try{
    /* 已上架＝先拆 Square（edge 內建 delete：刪目錄商品＋product_sync）；失敗就先停，別半刪 */
    if(e.synced){
      try{await callFn('sync-to-square',{action:'delete',sample_id:e.name});}
      catch(err){
        if(!confirm('Square removal failed: '+(err&&err.message||err)+'\n\nDelete the local records anyway? The Square item will stay until you remove it in the Square dashboard.'))return;
      }
    }
    var d1=await sb.from('samples').delete().eq('supplier','Ratio Coffee').ilike('sample_id',e.name);
    if(d1.error)throw new Error(d1.error.message);
    var d2=await sb.from('roasts').delete().ilike('bean_name',e.name);
    if(d2.error)throw new Error(d2.error.message);
    try{await sb.from('product_sync').delete().ilike('bean_id',e.name);}catch(err){}
    /* Coffee Stock 同步（2026-07-12 老闆點名）：豆刪了就別再列——
       單品的列名靠 beans.roast_target_kg/roast_low_kg（熟豆閾值，非生豆庫存）→ 清 null；
       拼配的列名靠 blends 配方 → 整列刪（confirm 訊息已列明；成分豆本身不動） */
    try{await sb.from('beans').update({roast_target_kg:null,roast_low_kg:null}).ilike('name',e.name);}catch(err){}
    if(hasBlend){try{await sb.from('blends').delete().ilike('name',e.name);}catch(err){}}
    /* app_state 記憶鍵大掃除（價/克/規格/售罄/顏色） */
    var keys=['rtl_price','rtl_g','rtl_sizes','rtl_sold','rtl_dot'];
    for(var i=0;i<keys.length;i++){
      try{
        var r=await sb.from('app_state').select('value').eq('key',keys[i]).maybeSingle();
        var v=r&&r.data&&r.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(err){v=null;}}
        if(!v||typeof v!=='object')continue;
        var hit=false;
        Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===e.name.toLowerCase()){delete v[k];hit=true;}});
        if(hit)await sb.from('app_state').upsert({key:keys[i],value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
      }catch(err){}
    }
    _dotsMap=null;
    closeDrawer();toast('"'+e.name+'" deleted ✓');
    await reload();
  }catch(err){
    alert('Delete failed: '+(err&&err.message||err));
  }
}
/* 售罄切換：Square availability（照 classic syncSquareAvailability）＋ rtl_sold 記憶 read-modify-write */
async function setShelfSold(nm,sold,proc){
  /* proc 可選（2026-07-13）：同名多處理法豆帶 process 精準定位那一列；沒帶＝名字級照舊 */
  await callFn('sync-to-square',{action:'availability',sample_id:nm,sold_out:!!sold,process:(proc!=null&&String(proc).trim()!=='')?String(proc).trim():null,target_id:beanIdFor(nm,proc)||null});
  var r=await sb.from('app_state').select('value').eq('key','rtl_sold').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  var key=(proc!=null&&String(proc).trim()!=='')?(nm+' @ '+String(proc).trim()):nm;
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===key.toLowerCase()&&k!==key)delete v[k];});
  if(sold)v[key]=true;else delete v[key];
  var u=await sb.from('app_state').upsert({key:'rtl_sold',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
}

/* ===== 訂閱出貨執行（run sheet）：到期卡按進來 → 挑這期的豆（單品一支/配方一批，全員套用）→ 一鍵批次建單。
   逐筆處理：insert 失敗＝該筆跳過、日期不推進，明天卡片只剩失敗者再按一次即可；
   連結/email 失敗只當 warning（payment_link 冪等可重呼，催款信會帶連結補救） ===== */
var SUBRUN=null;
function subDueList(){return (DB.subs||[]).filter(function(s){return s.status==='active'&&String(s.next_ship_date||'').slice(0,10)<=todayKey();});}
/* 下次出貨＝原日期＋週期，但至少明天（積欠多期不會推完又立刻到期） */
function subBump(s){
  var d=new Date(String(s.next_ship_date||'').slice(0,10)+'T00:00:00');
  if(isNaN(d.getTime()))d=new Date();
  d.setDate(d.getDate()+(Number(s.interval_days)||14));
  var t=new Date();t.setDate(t.getDate()+1);t.setHours(0,0,0,0);
  if(d<t)d=t;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
/* 收款抽象點（訂閱）：全 app 只有這個函式知道錢怎麼收。日後換 Stripe／存卡扣款只改這裡，
   回寫同一批 orders 欄位（payment_link 等），下游（確認信付款鈕、webhook 對帳）介面不變。
   冪等：sync-to-square payment_link 對已有連結的單會 reuse。 */
async function subCollectPayment(order,sub){
  if(sub.source==='square')return {ok:true};  /* Square 端訂閱已自動扣款 */
  var r=await callFn('sync-to-square',{action:'payment_link',order_id:order.id});
  return {ok:true,url:r&&r.url};
}

async function runSubShipment(due,needSingle,needBlend){
  var singleName=needSingle?($('sr-single')?$('sr-single').value:''):'';
  var blendName='';
  if(needBlend){
    var bf=$('sr-blendfree'),bs=$('sr-blend');
    blendName=((bf&&bf.value.trim())||(bs&&bs.value)||'').trim();
  }
  if(needSingle&&!singleName){toast('Pick the single origin first');return;}
  if(needBlend&&!blendName){toast('Pick or name the blend first');return;}
  if(!confirm('Create '+due.length+' subscription order'+(due.length>1?'s':'')+'?'
    +(singleName?'\nSingle origin: '+singleName:'')+(blendName?'\nBlend: '+blendName:'')))return;
  var b=$('sr-go');b.disabled=true;b.textContent='Creating…';
  var made=0,fails=[],warns=[];
  try{
    /* order_no 迴圈外查一次 max（照 saveNewOrder），成功一筆 ++ 一次 */
    var mx=await sb.from('orders').select('order_no').order('order_no',{ascending:false}).limit(1);
    var nextNo=((mx.data&&mx.data[0]&&mx.data[0].order_no)||0)+1;
    for(var ix=0;ix<due.length;ix++){
      var s=due[ix],c=custById(s.customer_id),nm=(c&&c.name)||'—';
      b.textContent='Creating… '+(ix+1)+'/'+due.length;
      try{
        var bean=(s.plan==='blend')?blendName:singleName;
        var ins=await sb.from('orders').insert({order_no:nextNo,channel:'subscription',status:'Confirmed',
          customer_id:s.customer_id,items:[{name:bean,grams:Number(s.grams)||150,qty:1,price:Number(s.price)||0}],
          total:Number(s.price)||0,currency:'AUD',payment_method:'platform',
          payment_status:(s.source==='square')?'paid':'pending_payment',
          notes:'Subscription — '+s.plan+(s.notes?' · '+s.notes:'')}).select().single();
        if(ins.error)throw new Error(ins.error.message);
        nextNo++;made++;
        var uo=await sb.from('subscriptions').update({next_ship_date:subBump(s),last_order_id:ins.data.id,
          updated_at:new Date().toISOString()}).eq('id',s.id);
        if(uo.error)warns.push(nm+': order #'+String(ins.data.order_no).padStart(4,'0')+' created but the next-ship date did not move — fix the date in Subscriptions or this box ships twice');
        try{await subCollectPayment(ins.data,s);}
        catch(e1){warns.push(nm+': payment link failed — resend from the unpaid card later');}
        try{await callFn('send-email',{action:'order_confirmation',order_id:ins.data.id});}
        catch(e2){warns.push(nm+': confirmation email failed');}
      }catch(e){fails.push(nm+': '+(e&&e.message||e));}
    }
    logAct('subscription run',made+' orders',singleName||blendName||'');
    closeDrawer();
    if(fails.length||warns.length){
      alert(made+' order'+(made===1?'':'s')+' created.'
        +(fails.length?'\n\nFailed (still due, run again tomorrow):\n· '+fails.join('\n· '):'')
        +(warns.length?'\n\nWarnings:\n· '+warns.join('\n· '):''));

      (DB.roasts||[]).forEach(function(r){if(String(r.bean_id||'')===String(b.id)||(!r.bean_id&&String(r.bean_name||'')===oldName))r.bean_name=newName;});

/* ===== 熟豆批次清單（照 classic Batch stock：remaining>0、FIFO 最舊先用、>30 天紅、點批次記用量）===== */
/* ===== Roasted Stock 血條總覽（2026-07-11 升級）=====
   每豆一行：名＋分段血條（每批一段舊深新淺）＋kg 標籤；Blends｜Singles 分檔（老闆拍板分開看）；
   低血/超量排前＋轉紅；點行展開＝批次明細＋Target/Low 設定＋Blend/Roast this；
   「−」快速扣血＝選批＋原因（Defect/Transfer 含去向/Other），記 activity_log。
   烘完加血零操作（Log roast 寫 remaining_kg 即進）。舊 openBatchUse 已收編進扣血表單。 */
var RST={seg:'blend',open:null};
function rstRows(isBlend){
  /* 名單：拼配＝DB.blends 全列（0 血低量最該看到）；單品＝beans（有血或有設閾值）∪ 批次孤兒名 */
  var rows=[],seen={};
  if(isBlend){
    (DB.blends||[]).forEach(function(b){
      if(!b.name)return;seen[String(b.name).trim().toLowerCase()]=1;
      rows.push({name:b.name,isBlend:true,target:b.target_kg,low:b.low_stock_kg,ref:b});
    });
  }else{
    /* 2026-07-12 處理法分開：同名不同 process 是不同商品（Finca Milan ×6 culturing）——
       一支 bean（name+process 唯一）一行，血條/批次/扣豆全按 process 過濾 */
    (DB.beans||[]).forEach(function(b){
      var nm=String(b.name||'').trim();if(!nm)return;
      var proc=String(b.process||'').trim();
      var lk=nm.toLowerCase()+'|'+proc.toLowerCase();if(seen[lk])return;
      /* 2026-07-14 老闆定調：0kg 的單品不列——只有可賣/降級/待入庫（Log roast 出來的）才現身。
         原「設了 target/low 就算 0kg 也列」規則收掉（賣光的豆去 Coffee Info History 看） */
      var has=rstStockKg(nm,false,proc)>0||rstDgBatches(nm,false,proc).length>0||rstPendingBatches(nm,false,proc).length>0;
      if(!has)return;seen[lk]=1;
      rows.push({name:nm,proc:proc,isBlend:false,target:b.roast_target_kg,low:b.roast_low_kg,ref:b});
    });
  }
  /* 批次孤兒（主檔已刪/process 對不上，但批次有血或待秤）也要列，不能憑空消失；單品孤兒按 name+process 分桶 */
  (DB.roasts||[]).forEach(function(r){
    if((isBlend?r.kind==='blend':r.kind!=='blend')&&(Number(r.remaining_kg)>0||(Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'))){
      var nm=String(r.bean_name||'').trim();if(!nm)return;
      var proc=isBlend?'':String(r.process||'').trim();
      var lk=isBlend?nm.toLowerCase():(nm.toLowerCase()+'|'+proc.toLowerCase());
      if(!seen[lk]){seen[lk]=1;rows.push({name:nm,proc:proc,isBlend:isBlend,target:null,low:null,ref:null});}
    }
  });
  rows.forEach(function(x){
    x.batches=rstBatches(x.name,x.isBlend,x.isBlend?undefined:(x.proc||''));
    /* downgrade 池分開掛（不進血條/總量——那些只算可賣豆）；有量就在列表帶紅標顯示 */
    x.dg=rstDgBatches(x.name,x.isBlend,x.isBlend?undefined:(x.proc||''));
    x.dgKg=0;x.dg.forEach(function(r){x.dgKg+=Number(r.remaining_kg)||0;});
    x.dgKg=Math.round(x.dgKg*100)/100;
    /* 待入庫池（烘了沒秤熟豆）分開掛：不進血條/總量，展開列表帶琥珀標＋點行補熟豆 */
    x.pending=rstPendingBatches(x.name,x.isBlend,x.isBlend?undefined:(x.proc||''));
    x.pendKg=0;x.pending.forEach(function(r){x.pendKg+=Number(r.green_kg)||0;});
    x.pendKg=Math.round(x.pendKg*100)/100;
    x.hp=rstBarHTML(x.batches,x.target,x.low);
    /* 上架狀態：product_sync 列 → Live / Sold out 膠囊（2026-07-13 起 process 級：單品帶 proc 比對，

function openRstDeduct(x,preGroup,pool){ /* preGroup＝從批次列表點行進來、預選那一天（v3）；pool＝指定批次池（降級池用），

  $('rd-back').addEventListener('click',backToStock);

      }
      if(ferr){fbtn.disabled=false;fbtn.textContent='Save correction';alert('Fix failed: '+ferr);buildItems();backToStock();return;}
      logAct('corrected roasted kg',x.name,g.kg+' → '+cv+' kg · '+(g.date?fmtD(g.date):'no date'));
      toast('Fixed ✓ batch is now '+cv+' kg');
      buildItems();backToStock();return;
    }
    /* 整批全清（2026-07-16 老闆點名：選批＝該批全部刪除）——remaining 歸零、烘焙紀錄與 QC 歷史保留（Fix kg 可救回） */
    var have=g.kg;
    if(!confirm('Remove the whole '+(g.date?fmtD(g.date):'no date')+' batch?\n\n'+have+' kg comes off stock. The roast record stays (use Fix kg to restore).'))return;
    var btn=$('rd-save');btn.disabled=true;btn.textContent='Saving…';
    var done=0;
    for(var i=0;i<g.batches.length;i++){
      var r=g.batches[i];
      var bh=Number(r.remaining_kg)||0;if(!(bh>0))continue;
      var u=await sb.from('roasts').update({remaining_kg:0}).eq('id',r.id);
      if(u.error){
        btn.disabled=false;btn.textContent='Deduct';
        alert('Failed'+(done>0?' after removing '+(Math.round(done*1000)/1000)+' kg':'')+': '+u.error.message);
        buildItems();backToStock();return;
      }
      r.remaining_kg=0;done+=bh;
    }
    logAct('deducted roasted',x.name,'whole batch · '+have+' kg · '+(g.date?fmtD(g.date):'no date'));
    toast('Batch removed ✓ −'+have+' kg');
    buildItems();backToStock();
  });
}

async function saveReceiveSheet(){
  /* kg 可 0（2026-07-17 老闆點名）：豆還沒到先建檔佔位——空白＝0；0 kg 不寫流水帳 */
  var kg=String(RCV.kg).trim()===''?0:parseFloat(String(RCV.kg).trim());
  if(isNaN(kg)||kg<0){toast('Received kg must be 0 or more');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');
  var beanId,after;
  try{
    if(RCV.mode==='existing'){
      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;
      if(sup)upd.supplier=sup;
      var u=await sb.from('beans').update(upd).eq('id',b.id);
      if(u.error)throw new Error(u.error.message);
      Object.assign(b,upd);
      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* 防重複：同名同處理法已有批次 → 提醒改用 Existing lot 併批 */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        region:String(RCV.region||'').trim()||null,station:String(RCV.station||'').trim()||null,
        variety:String(RCV.variety||'').trim()||null,harvest:String(RCV.harvest||'').trim()||null,
        altitude:String(RCV.altitude||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;
    }
    if(kg>0){ /* 0 kg 佔位＝不進流水帳（帳上沒有量的變動） */
      try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' — '+sup:'')+(lot?' · lot '+lot:'')});}catch(e){}
      logAct('received green','+'+kg+' kg',sup||null);
    }else logAct('booked green placeholder',RCV.mode==='existing'?'existing lot':String(RCV.name||'').trim(),sup||null);
    closeDrawer();toast(kg>0?('Received ✓ +'+kg+' kg'):'Booked ✓ placeholder — 0 kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to stock';}
    alert('Receive failed: '+(e&&e.message||e));
  }
}

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  logAct('stocktake',ok+' bean'+(ok>1?'s':'')+' adjusted');
  closeDrawer();toast('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted ✓');
  await reload();
}

/* ===== 杯測快錄（照 classic submitCupping 規則：samples insert＋批次標 cupped → 進 QC 佇列）===== */
var CUP=null;
var CUP_FIELDS=[['fragrance','Aroma'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
async function openCupSheet(i){
  var r=i.ref;
  /* 帶上一次同豆紀錄的風味（DB.samples 已篩 Ratio Coffee、新→舊） */
  var prev=null;
  (DB.samples||[]).forEach(function(s){
    if(prev)return;
    if(r.bean_id&&s.bean_id){if(String(s.bean_id)===String(r.bean_id))prev=s;return;}
    if(String(s.sample_id||'').trim().toLowerCase()===String(r.bean_name||'').trim().toLowerCase())prev=s;
  });
  var bean=(DB.beans||[]).find(function(b){return String(b.id)===String(r.bean_id);});
  /* 拉霸永遠有值：上次同豆分數帶入（clamp 1–3），沒有全 2＝Medium */
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(prev?prev[f[0]]:null);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(r.bean_name,dots,r.process);
  CUP={r:r,editId:null,scores:sc,dot:dk,dot0:dk,
    feats:(prev&&prev.features?prev.features.slice(0,3):[]),comment:'',
    process:(bean&&bean.process)||(prev&&prev.process)||''};
  paintCupSheet();
}
function cupClamp(v){v=Number(v);if(isNaN(v)||v<=0)return 2;return Math.min(3,Math.max(1,v));}
/* Re-cup（老闆點名「杯測需要 re-analysed」）：QC 佇列裡的批次重開杯測抽屜，帶原紀錄、存檔＝update 同一筆 */
async function openRecupSheet(q){
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(q.s[f[0]]);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(q.r.bean_name||q.s.sample_id,dots,q.r.process||q.s.process);
  CUP={r:q.r,editId:q.s.id,scores:sc,dot:dk,dot0:dk,
    feats:(q.s.features||[]).slice(0,3),comment:String(q.s.comment||''),
    process:q.s.process||''};
  paintCupSheet();
}
/* comment 留白時的規則組句（老闆拍板：本機組句不呼叫 AI）：風味詞＋高分感官，總長 ≤30 字元 */
function cupAutoComment(sc,feats){
  sc=sc||{};
  var fl=(feats||[]).filter(Boolean);
  var out=fl.slice(0,2).join(', ');
  if(out.length>22)out=fl[0]||'';
  var cand=[];
  if((sc.acidity||0)>=2.5)cand.push([sc.acidity,'bright']);
  if((sc.sweetness||0)>=2.5)cand.push([sc.sweetness,'sweet']);
  if((sc.body||0)>=2.5)cand.push([sc.body,'syrupy']);
  else if(sc.body&&sc.body<=1.5)cand.push([2,'silky']);
  if((sc.aftertaste||0)>=2.5)cand.push([sc.aftertaste,'long finish']);
  if((sc.fragrance||0)>=2.5)cand.push([sc.fragrance,'perfumed']);
  cand.sort(function(a,b){return b[0]-a[0];});
  var first=true;
  for(var i=0;i<cand.length;i++){
    var sep=out?(first?' · ':', '):'';
    if((out+sep+cand[i][1]).length>30)continue;
    out+=sep+cand[i][1];first=false;
  }
  return out;
}
/* Cup v2（杯測師視角設計評審）：成品預覽卡（雷達＋風味＋comment 合一）＋五條拉霸即時驅動 */
function paintCupSheet(){

  var spokes=K.map(function(_,i){var q=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="var(--line2)" stroke-width="1"/>';}).join('');

    +'<div class="s" style="margin-top:2px">'+(r.roast_date?'roasted '+fmtD(r.roast_date)+' · ':'')+(CUP.editId?'updates the existing cupping record':'saves a cupping record and queues it for QC')+'</div>'
    +'<div style="border:1.5px solid var(--ink);border-radius:14px;padding:12px 10px;margin-top:12px;background:var(--surface)">'
    +'<svg viewBox="0 0 300 236" style="width:100%;max-width:300px;display:block;margin:0 auto">'+rings+spokes
    +'<polygon id="cup-poly" points="" fill="var(--accent)" fill-opacity=".18" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>'
    +dots+labels+'</svg>'
    +'<div id="cup-flprev" style="text-align:center;margin-top:4px;font-family:\'Fraunces\',serif;font-weight:700;font-size:17px"></div>'
    +'<div id="cup-cprev" style="text-align:center;margin-top:3px;font-size:13px;color:var(--muted);font-style:italic"></div>'

    +['y','b','r','d'].map(function(k){
      return '<button data-cupdot="'+k+'" aria-label="'+k+'" style="width:28px;height:28px;border-radius:50%;cursor:pointer;background:'+uiDot(RTL_DOTCOL[k])+';border:2px solid '+(CUP.dot===k?'var(--ink)':'transparent')+';box-shadow:'+(CUP.dot===k?'0 0 0 2px var(--surface) inset':'none')+'"></button>';
    }).join('')
    +'<button data-cupdot="" aria-label="none" style="width:28px;height:28px;border-radius:50%;cursor:pointer;background:none;border:2px '+(CUP.dot===''?'solid var(--ink)':'dashed var(--line2)')+';color:var(--muted);font-size:13px;line-height:1">✕</button>'

        +'<span style="font-size:10.5px;color:var(--muted)">heavy</span></div>';
    }).join('')

    +[0,1,2].map(function(ix){return '<input class="din" id="cup-f'+ix+'" maxlength="22" placeholder="e.g. Blueberry" value="'+esc(CUP.feats[ix]||'')+'">';}).join('')
    +'<div class="dlab">Comment · 30 chars · blank = auto</div>'

  function grab(){

async function saveCupSheet(){

function paintSampleForm(){

      return '<div style="display:flex;align-items:center;gap:10px;margin-top:13px">'

        +'<span style="font-size:10.5px;color:var(--muted)">light</span>'

      var beanId,after;

/* ===== 記烘豆（2026-07-16 改版：Roast today / Intake 雙模式、一鍋一卡就地編輯、全填完一次 Submit）

function roEmptyBatch(){return {beanId:'',green:'',out:'',date:''};}

/* 成分熟豆批次可用量：非 blend、同名、remaining_kg>0 */
function blendPartPool(name,process,beanId){
  /* 成分可用熟豆量：part.bean_id 與 roast.bean_id 兩邊都有就比 ID（同名多處理法精準）；否則名字＋處理法 */
  var key=String(name||'').trim().toLowerCase(),pid=(beanId!=null&&String(beanId).trim()!=='')?String(beanId):'',sum=0;
  (DB.roasts||[]).forEach(function(r){
    if(r.kind==='blend'||!(Number(r.remaining_kg)>0))return;
    var m=(pid&&r.bean_id)?(String(r.bean_id)===pid):(String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process));
    if(m)sum+=Number(r.remaining_kg)||0;
  });
  return Math.round(sum*1000)/1000;
}
/* ===== 熟豆血條 helper（Roasted Stock 總覽用）=====
   血＝同名批次 remaining_kg；拼配看 kind='blend'、單品看非 blend；批次依 roast_date 舊→新（同血條段序）。
   QC 打退（reroast/downgrade）不算血——跟 shelfG 上架差額同規則，血條＝可正常出貨的豆 */
/* process 第三參數（2026-07-12 處理法分開）：undefined＝不過濾（名字級，向後相容）；
   給字串（含空字串）＝精準過濾——同名不同處理法是不同商品（Finca Milan 有 6 種 culturing） */
function rstProcMatch(r,process){
  if(process===undefined)return true;
  return String(r.process||'').trim().toLowerCase()===String(process||'').trim().toLowerCase();
}
function rstBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.remaining_kg)>0&&qcState(r)!=='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
function rstStockKg(name,isBlend,process){
  var s=0;rstBatches(name,isBlend,process).forEach(function(r){s+=Number(r.remaining_kg)||0;});
  return Math.round(s*1000)/1000;
}
/* downgrade 批次池（2026-07-13 老闆定調：降級豆不隱形——Coffee Stock 帶標記顯示、拼配優先吃）。
   與 rstBatches 同形狀但只撈 qc='downgrade'；刻意分池＝不進血條/總量/出貨 FIFO（那些只算可正常出貨的豆） */
function rstDgBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.remaining_kg)>0&&qcState(r)==='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
/* 待入庫批次（2026-07-13 老闆點名：連結 roast log→coffee stock）＝烘了但還沒秤熟豆的批次
   （green_kg>0 但 remaining_kg 空/0）。刻意分池：不進血條/總量/出貨，Coffee Stock 帶琥珀標「待秤」、
   點行 openWeighIn 補熟豆＝入庫。qc 打退的不算（那是另一回事）。 */
function rstPendingBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
/* 分段血條（2026-07-12 v3 定稿：顏色＝該批新鮮度，跨豆一致）：黃=aging(<21d 養豆) 綠=ready(21-42d)
   紅=fading(>42d) 灰=無日期；閾值同 shelfFreshness；段間 1px 縫。低/超量不再整條轉紅（紅已有新意義），
   警示留在 label 的 low!/over! 紅字。target 沒設＝以現量畫滿版。回傳 {bar,label,state} */
function rstFreshColor(rd){
  if(!rd)return 'var(--line2)';
  var age=daysSince(rd);
  if(age<SHELF_FRESH_REST)return '#C29036';   /* aging — 同 .fr-yellow */
  if(age<=SHELF_FRESH_PRIME)return '#3F9A66'; /* ready — 同 .fr-green */
  return 'var(--danger)';                     /* fading */
}
/* 同日期批次合併成一組（2026-07-12 老闆點名：同一天烘幾鍋在 Coffee Stock 就是同一批）——
   資料層各筆保留（QC 判定/流水帳不動），只有顯示與扣豆按組；組內維持原 FIFO 順序 */
function rstGroupByDate(batches){
  var out=[],idx={};
  batches.forEach(function(r){
    var k=String(r.roast_date||'');
    if(idx[k]==null){idx[k]=out.length;out.push({date:r.roast_date||null,key:k,kg:0,batches:[]});}
    var g=out[idx[k]];
    g.kg+=Number(r.remaining_kg)||0;
    g.batches.push(r);
  });
  out.forEach(function(g){g.kg=Math.round(g.kg*1000)/1000;});
  return out;
}
function rstBarHTML(batches,target,low){
  var tot=0;batches.forEach(function(r){tot+=Number(r.remaining_kg)||0;});
  tot=Math.round(tot*1000)/1000;
  var t=Number(target)||0,l=Number(low)||0;
  var state=(l>0&&tot<=l)?'low':((t>0&&tot>t)?'over':'ok');
  var denom=t>0?Math.max(t,tot):tot; /* 超量時分母撐大到現量＝畫滿不爆框 */
  var segs='';
  rstGroupByDate(batches).forEach(function(g){
    var w=denom>0?(g.kg/denom*100):0;
    if(w<=0)return;
    segs+='<div style="width:'+w+'%;background:'+rstFreshColor(g.date)+';border-right:1px solid var(--surface)"></div>';
  });
  var label=t>0?(tot+' / '+t+' kg'):(tot+' kg');
  if(state==='low')label+=' · low!';else if(state==='over')label+=' · over!';
  return {bar:'<div class="hm-bar" style="display:flex">'+segs+'</div>',label:label,state:state};
}
/* ===== Log roast 卡片模式 helpers（2026-07-16 改版）===== */
function roFmt1(n){return (Math.round(n*10)/10).toFixed(1);}
/* 填錯（卡上紅字）：green=0 擋、roasted>=green 擋——硬性規則，不用 confirm 放行 */
function roBatchWrong(bt){
  var hasG=String(bt.green||'').trim()!=='',hasO=String(bt.out||'').trim()!=='';
  var g=parseFloat(bt.green),o=parseFloat(bt.out);
  if(hasG&&!(g>0))return 'green must be more than 0';
  if(hasO&&!(o>0))return 'roasted must be more than 0';
  if(hasG&&hasO&&g>0&&o>0&&o>=g)return 'roasted must be less than green';
  return null;
}
/* 填完＝這鍋可送：豆＋熟豆必填；roast 生豆必填、intake 生豆選填但要日期 */
function roBatchDone(bt){
  if(roBatchWrong(bt))return false;
  if(!bt.beanId)return false;
  if(!(parseFloat(bt.out)>0))return false;
  if(RO.entry==='roast'&&!(parseFloat(bt.green)>0))return false;
  if(RO.entry==='intake'&&!bt.date)return false;

}

/* ===== 烘豆環境窗口（2026-07-16 老闆點名）：抽屜頂顯示目前位置天氣/氣壓/濕度 =====
   Open-Meteo 免金鑰；geolocation 拒絕/逾時退雪梨座標；15 分鐘快取；抓不到就整條隱藏不佔位 */
var ROWX={t:0,data:null};
async function roWeather(){
  if(ROWX.data&&Date.now()-ROWX.t<15*60*1000)return ROWX.data;
  var pos=null;
  try{pos=await new Promise(function(res){
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(function(p){res(p);},function(){res(null);},{timeout:3000,maximumAge:600000});
  });}catch(e){}
  var lat=(pos&&pos.coords)?pos.coords.latitude:-33.87,lon=(pos&&pos.coords)?pos.coords.longitude:151.21;
  var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,surface_pressure,weather_code');
  var j=await r.json();
  if(!j||!j.current)return null;
  ROWX={t:Date.now(),data:j.current};
  return j.current;
}
function roWxIcon(code){
  var c=Number(code)||0;
  if(c>=95)return '⛈';
  if(c>=80)return '🌦';
  if(c>=71)return '🌨';
  if(c>=51)return '🌧';
  if(c>=45)return '🌫';
  if(c>=1)return '⛅';
  return '☀️';
}
async function roWxFill(){
  if(!$('ro-wx'))return;
  try{
    var c=await roWeather();
    var el=$('ro-wx');if(!el||!c)return; /* await 後重查——期間可能重繪或關抽屜 */
    el.innerHTML='<span>'+roWxIcon(c.weather_code)+' '+Math.round(Number(c.temperature_2m))+'°C</span>'
      +'<span>'+Math.round(Number(c.relative_humidity_2m))+'% RH</span>'
      +'<span>'+Math.round(Number(c.surface_pressure))+' hPa</span>';
    el.style.display='flex';
  }catch(e){}
}
/* ===== Blend 分頁卡片化（2026-07-16 老闆點名跟 single 同格式）：一鍋一卡＋總計＋並排 Add/Submit =====
   資料行為照舊：insert kind='blend'＋recipe 快照＋consumeBlendParts FIFO 扣成分（降級豆優先）；日期整個 session 一個 */
function roBlendDone(bb){
  var bl=RO.blends.find(function(b){return b.name===bb.name;});
  if(!bl)return false;
  return parseFloat(bb.out)>0;
}
function roBlendSummary(){
  var o=0;RO.bb.forEach(function(b){var v=parseFloat(b.out);if(v>0)o+=v;});
  return {n:RO.bb.length,o:o>0?roFmt1(o):'—'};
}
function roFillBlendBatch(name,out){
  var row=RO.bb.find(function(b){return !b.name;});
  if(!row){row=roEmptyBlendBatch();RO.bb.push(row);}
  row.name=name;
  if(out!=null&&String(out).trim()!=='')row.out=String(out);
}
function roRefreshBlend(){
  var s=roBlendSummary();
  var n=$('ro-bsum-n');if(n)n.textContent=s.n;
  var o=$('ro-bsum-o');if(o)o.textContent=s.o;
  var btn=$('ro-submit');
  if(btn){var ok=RO.bb.length>0&&RO.bb.every(roBlendDone);
    btn.disabled=!ok;btn.style.opacity=ok?'':'.5';btn.textContent=roSubmitLabel();}
}
function roBlendCard(bb,ix){
  var bl=RO.blends.find(function(b){return b.name===bb.name;})||null;

  +'<div class="ro-bhead"><b>Batch '+(ix+1)+'</b><span style="display:flex;gap:6px">'

  +'<button class="ro-bbtn" data-bmvdn="'+ix+'" aria-label="move down"'+(ix===last?' disabled':'')+'>▼</button>'
  +'<button class="ro-bbtn" data-bbdel="'+ix+'" aria-label="remove">✕</button></span></div>'
  +'<select class="din" data-bbsel="'+ix+'" style="padding:11px 12px;font-size:15px"><option value="">— pick a blend —</option>'
  +RO.blends.map(function(b){return '<option'+(bb.name===b.name?' selected':'')+'>'+esc(b.name)+'</option>';}).join('')
  +'</select>'
  +(bl?(parts.map(function(p,pi){
      var have=blendPartPool(p.bean,(p.process!=null&&String(p.process).trim()!=='')?p.process:undefined,p.bean_id);
      return '<div style="display:flex;gap:8px;align-items:center;margin-top:7px">'
        +'<span class="s" style="flex:1">'+esc(p.pct+'% '+p.bean)+(p.process?' <span style="color:var(--muted);font-size:11px">'+esc(p.process)+'</span>':'')+'</span>'
        +'<input class="din" data-bc="'+ix+'" data-bp="'+pi+'" data-pct="'+parseFloat(p.pct)+'" data-bn="'+esc(p.bean)+'" data-bproc="'+esc(p.process||'')+'" inputmode="decimal" placeholder="kg" value="'+esc(bb.amt[pi]!=null?String(bb.amt[pi]):'')+'" style="width:80px;margin:0;text-align:right">'
        +'<span class="s" id="ro-bps-'+ix+'-'+pi+'" style="flex:0 0 104px;text-align:right;'+(have<=0?'color:var(--danger)':'color:var(--muted)')+'">stock '+have+' kg</span></div>';
    }).join('')||'<div class="s" style="margin-top:6px"><span class="red">recipe has no parts — add them in Recipe</span></div>'):'')
  +'<div class="ro-cols"><div style="flex:1"><div class="ro-blab" style="color:color-mix(in srgb,var(--roast) 65%,var(--ink))">Roasted · total <span style="color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400">syncs with parts</span></div><input class="din ro-num o" data-bbo="'+ix+'" inputmode="decimal" placeholder="0.0" value="'+esc(bb.out)+'"></div></div>'
  +'</div>';
}
function paintRoastSheet(){
  var beans=(DB.beans||[]).slice().sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});

    +'<div class="ro-sum"><div><div class="s1">Batches</div><b id="ro-sum-n">'+sum.n+'</b></div>'
    +'<div><div class="s1">Green</div><b id="ro-sum-g">'+sum.g+'</b></div>'
    +'<div><div class="s1">Roasted</div><b id="ro-sum-o">'+sum.o+'</b></div></div>'
    +RO.batches.map(function(bt,ix){return roBatchCard(bt,ix,beans);}).join('');
  }else{
    /* 拼配卡片化（2026-07-16）：比例聯動/成分 stock hint 邏輯照舊，只是搬進 per-card（roBlendCard/roSpreadCard） */
    var bsum=roBlendSummary();
    body='<div class="ro-sum"><div><div class="s1">Batches</div><b id="ro-bsum-n">'+bsum.n+'</b></div>'
    +'<div><div class="s1">Roasted</div><b id="ro-bsum-o">'+bsum.o+'</b></div></div>'
    +RO.bb.map(function(bb,ix){return roBlendCard(bb,ix);}).join('');
  }
  var allDone=single?(RO.batches.length>0&&RO.batches.every(roBatchDone)):(RO.bb.length>0&&RO.bb.every(roBlendDone));
  openDrawerHTML('<div class="t" style="font-size:19px">Log roast</div>'
    +'<div class="s" style="margin-top:2px">'+(single
      ?(RO.entry==='roast'?'one card per kettle · one submit deducts green and logs all':'backfill past roasts · green stock untouched')
      :'one card per blend batch · consumes component batches (oldest first)')+'</div>'
    +'<div class="ro-wx" id="ro-wx"></div>'
    +chips
    +'<div class="pm-seg"><button id="ro-m-s" class="'+(single?'on':'')+'">Single origin</button><button id="ro-m-b" class="'+(single?'':'on')+'">Blend</button></div>'
    +body
    +(single?'':'<div class="dlab" style="margin-top:14px">Roast date · whole session</div><input class="din" id="ro-date" type="date" value="'+esc(RO.date)+'">')
    +'<div style="display:flex;gap:8px;align-items:stretch;margin-top:12px">'
      +'<button class="ro-addrow" id="ro-addrow" style="flex:1;margin-top:0;white-space:nowrap">＋ Add</button>'
      +'<button class="act" id="ro-submit" style="flex:1.8;margin-top:0;white-space:nowrap'+(allDone?'':';opacity:.5')+'"'+(allDone?'':' disabled')+'>'+roSubmitLabel()+'</button>'
    +'</div>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  /* 重畫前先把已打的值收回 RO（兩分頁卡片值都由 input 事件即時寫回，這裡只收 session 日期） */
  function grab(){var el=$('ro-date');if(el)RO.date=el.value;}
  document.querySelectorAll('#drawer [data-lot]').forEach(function(el){el.addEventListener('click',function(){
    grab();RO.mode='single';RO.entry='roast';roFillBatch(el.dataset.lot,el.dataset.kg);saveRoastDraft();paintRoastSheet();
  });});
  document.querySelectorAll('#drawer [data-blend]').forEach(function(el){el.addEventListener('click',function(){
    grab();RO.mode='blend';roFillBlendBatch(el.dataset.blend,el.dataset.bkg);paintRoastSheet();
  });});
  $('ro-m-s').addEventListener('click',function(){grab();RO.mode='single';paintRoastSheet();});
  $('ro-m-b').addEventListener('click',function(){grab();RO.mode='blend';paintRoastSheet();});
  /* Roast today / Intake 切換：同一批卡片換規則（intake 出日期欄、生豆變選填），已打的值原地保留 */
  var er=$('ro-e-r');if(er)er.addEventListener('click',function(){if(RO.entry==='roast')return;RO.entry='roast';saveRoastDraft();paintRoastSheet();});
  var ei=$('ro-e-i');if(ei)ei.addEventListener('click',function(){if(RO.entry==='intake')return;RO.entry='intake';saveRoastDraft();paintRoastSheet();});
  /* batch 卡事件：input 即時寫回＋roRefresh（不重繪、免掉鍵盤焦點）；blur 整理成小數 1 位＋存草稿 */
  document.querySelectorAll('#drawer [data-bsel]').forEach(function(el){el.addEventListener('change',function(){
    var bt=RO.batches[+el.dataset.bsel];if(!bt)return;bt.beanId=el.value;saveRoastDraft();roRefresh();
  });});
  function roNumBind(attr,key){
    document.querySelectorAll('#drawer [data-'+attr+']').forEach(function(el){
      var bt=RO.batches[+el.dataset[attr]];if(!bt)return;
      el.addEventListener('input',function(){bt[key]=el.value;roRefresh();});
      el.addEventListener('change',function(){
        var n=parseFloat(el.value);
        if(!isNaN(n))el.value=roFmt1(n);
        bt[key]=el.value;saveRoastDraft();roRefresh();
      });

  }
  roNumBind('bg','green');roNumBind('bo','out');
  document.querySelectorAll('#drawer [data-bd]').forEach(function(el){el.addEventListener('change',function(){

  });});
  document.querySelectorAll('#drawer [data-mvup]').forEach(function(el){el.addEventListener('click',function(){
    var i=+el.dataset.mvup;if(i<=0)return;
    var t=RO.batches[i-1];RO.batches[i-1]=RO.batches[i];RO.batches[i]=t;saveRoastDraft();paintRoastSheet();
  });});
  document.querySelectorAll('#drawer [data-mvdn]').forEach(function(el){el.addEventListener('click',function(){
    var i=+el.dataset.mvdn;if(i>=RO.batches.length-1)return;
    var t=RO.batches[i+1];RO.batches[i+1]=RO.batches[i];RO.batches[i]=t;saveRoastDraft();paintRoastSheet();
  });});
  var ar=$('ro-addrow');if(ar)ar.addEventListener('click',function(){
    grab();
    if(single){RO.batches.push(roEmptyBatch());saveRoastDraft();}
    else RO.bb.push(roEmptyBlendBatch());
    paintRoastSheet();
  });
  /* ── blend 卡片綁定（比例聯動照舊邏輯、per-card scope；不重繪抽屜免掉鍵盤焦點）── */
  function roStockHint(el,val){
    var sp=$('ro-bps-'+el.dataset.bc+'-'+el.dataset.bp);if(!sp)return;
    var have=blendPartPool(el.dataset.bn,el.dataset.bproc?el.dataset.bproc:undefined);
    var need=parseFloat(val)||0;
    if(need>have+0.0001){sp.style.color='var(--danger)';sp.textContent='short '+(Math.round((need-have)*100)/100)+' · stock '+have;}
    else{sp.style.color=have<=0?'var(--danger)':'var(--muted)';sp.textContent='stock '+have+' kg';}
  }
  function roCardPartEls(ci){return document.querySelectorAll('#drawer [data-bc="'+ci+'"]');}
  function roSpreadCard(ci,total,skipPi){ /* 該卡總量 → 各成分照比例攤（跳過正在打字的那格） */
    var blTot=0;roCardPartEls(ci).forEach(function(el){blTot+=parseFloat(el.dataset.pct)||0;});
    roCardPartEls(ci).forEach(function(el){
      var share=blTot>0?((parseFloat(el.dataset.pct)||0)/blTot):0;
      var v=total>0?String(Math.round(total*share*1000)/1000):'';
      if(el.dataset.bp!==skipPi){el.value=v;RO.bb[ci].amt[+el.dataset.bp]=v;}
      roStockHint(el,el.dataset.bp===skipPi?el.value:v);
    });
  }
  document.querySelectorAll('#drawer [data-bbsel]').forEach(function(el){el.addEventListener('change',function(){
    var bb=RO.bb[+el.dataset.bbsel];if(!bb)return;

  });});
  document.querySelectorAll('#drawer [data-bp]').forEach(function(el){el.addEventListener('input',function(){
    var ci=+el.dataset.bc,bb=RO.bb[ci];if(!bb)return;

    var blTot=0;roCardPartEls(ci).forEach(function(x){blTot+=parseFloat(x.dataset.pct)||0;});
    var amt=parseFloat(el.value),share=blTot>0?((parseFloat(el.dataset.pct)||0)/blTot):0;
    if(isNaN(amt)||share<=0){roStockHint(el,el.value);return;}
    var total=Math.round(amt/share*1000)/1000;
    var bk=document.querySelector('#drawer [data-bbo="'+ci+'"]');if(bk){bk.value=total>0?String(total):'';bb.out=bk.value;}

  document.querySelectorAll('#drawer [data-bbo]').forEach(function(el){

  });

  document.querySelectorAll('#drawer [data-bp]').forEach(function(el){roStockHint(el,el.value);});
  var subB=$('ro-submit');if(subB)subB.addEventListener('click',function(){
    if(single)submitRoastSession();else{grab();submitBlendSession();}
  });
  document.querySelectorAll('#drawer [data-delbatch]').forEach(function(el){el.addEventListener('click',function(){roastDelBatch(+el.dataset.delbatch);});});
  $('d-cl').addEventListener('click',closeDrawer);
  roWxFill(); /* 環境窗口非同步填（快取 15 分鐘，抓不到整條隱藏） */
}
/* 拼配多鍋 Submit（2026-07-16 卡片化；單鍋寫入邏輯承 classic addCoffeeSubmit blend 路徑：快照配方→insert→FIFO 扣成分）*/
async function submitBlendSession(){
  if(!RO.bb.length||!RO.bb.every(roBlendDone)){toast('Fill every batch first');return;}
  var date=RO.date||todayStr();
  var dups=RO.bb.filter(function(bb){return (DB.roasts||[]).some(function(r){return (r.roast_date||'')===date&&String(r.bean_name||'').trim().toLowerCase()===String(bb.name).trim().toLowerCase();});})
    .map(function(bb){return bb.name;});
  if(dups.length&&!confirm('Already batches dated '+date+' for: '+dups.join(', ')+'. Add anyway?'))return;
  var btn=$('ro-submit');if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  try{
    var shortAll=[];
    for(var i=0;i<RO.bb.length;i++){ /* 依卡片順序 insert＝R#/B# 跟著 Batch 1..N */
      var bb=RO.bb[i];
      var bl=RO.blends.find(function(b){return b.name===bb.name;});
      var bkg=parseFloat(bb.out);
      var parts=(bl.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;})
        .map(function(p){return {bean:p.bean,process:p.process||'',pct:parseFloat(p.pct)};});
      var rec={bean_id:null,bean_name:bl.name,country:null,green_kg:null,status:'pending_cupping',roast_date:date,kind:'blend',
        recipe:{blend_id:bl.id||null,parts:parts}};
      if(bkg>0){rec.roasted_kg=bkg;rec.remaining_kg=bkg;}
      var ins=await sb.from('roasts').insert(rec).select();
      if(ins.error){var r2=Object.assign({},rec);delete r2.kind;delete r2.recipe;ins=await sb.from('roasts').insert(r2).select();}
      if(ins.error)throw new Error(ins.error.message);
      if(ins.data&&ins.data[0])DB.roasts.unshift(ins.data[0]);
      logAct('roasted blend',bl.name,bkg+' kg');
      if(bkg>0&&parts.length){
        var sh=await consumeBlendParts(parts,bkg);
        if(sh.length)shortAll=shortAll.concat(sh.map(function(x){return bl.name+' — '+x;}));
      }
    }
    var n=RO.bb.length;
    RO.bb=[roEmptyBlendBatch()];
    closeDrawer();

/* FIFO 消耗成分批次（照 classic consumeBlendComponents）——回傳不夠扣的清單 */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    /* ID 優先（2026-07-15）：part.bean_id 與 roast.bean_id 兩邊都有比 ID；否則名字＋處理法（舊配方/舊批） */
    var pProc=(p.process!=null&&String(p.process).trim()!=='')?p.process:undefined;
    var pid=(p.bean_id!=null&&String(p.bean_id).trim()!=='')?String(p.bean_id):'';
    var pool=(DB.roasts||[]).filter(function(r){
      if(r.kind==='blend'||!(Number(r.remaining_kg)>0))return false;
      return (pid&&r.bean_id)?(String(r.bean_id)===pid):(String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,pProc));
    }).sort(function(a,b){
      /* 降級豆優先進配方（2026-07-13 老闆定調：downgrade＝配方豆首選）；同級內照 roast_date 舊→新 FIFO */
      var da=qcState(a)==='downgrade'?0:1,db=qcState(b)==='downgrade'?0:1;
      if(da!==db)return da-db;
      return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;
    });
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+(p.process?' ('+p.process+')':'')+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}
/* ===== 單品多鍋 session（2026-07-16 改版：一鍋一卡就地編輯；roast＝今天烘＋扣生豆、intake＝補繳過去不碰生豆）=====
   卡片值由 input 事件即時寫回 RO.batches（暫存 app_state roast_draft 防手機鎖屏丟），全部填完一次 Submit。
   拼配也卡片化（同日 2026-07-16 老闆點名同格式）＝submitBlendSession 多鍋迴圈。 */
function roastLossPct(g,o){var gg=parseFloat(g),oo=parseFloat(o);if(!(gg>0)||o==null||String(o).trim()===''||isNaN(oo))return null;return Math.round((gg-oo)/gg*1000)/10;}

/* 單筆 roasts rec 組建（Submit 迴圈用）：豆快照從 DB.beans 取；roast_date＝roast 今天／intake 該鍋日期；
   intake 生豆選填——有填才寫 green_kg（只留紀錄算失重，不扣帳） */
function buildRoastRec(bt){
  var b=(DB.beans||[]).find(function(x){return String(x.id)===String(bt.beanId);})||{};
  var g=parseFloat(bt.green),o=parseFloat(bt.out);

  if(g>0)rec.green_kg=g;

async function submitRoastSession(){
  if(!RO.batches.length||!RO.batches.every(roBatchDone)){toast('Fill every batch first');return;}
  var intake=RO.entry==='intake';
  /* roast：生豆累加扣（同 beanId 加總）＋庫存不足 confirm；intake 不碰生豆、全跳過 */
  var byBean={};
  if(!intake){
    RO.batches.forEach(function(b){byBean[b.beanId]=(byBean[b.beanId]||0)+parseFloat(b.green);});
    var shorts=[];
    Object.keys(byBean).forEach(function(id){
      var bn=(DB.beans||[]).find(function(x){return String(x.id)===String(id);});
      var stock=bn?Number(bn.quantity)||0:0;
      if(byBean[id]>stock+0.0001)shorts.push((bn?bn.name:id)+': '+(Math.round(byBean[id]*100)/100)+' kg used, '+stock+' kg in stock');
    });
    if(shorts.length&&!confirm('Stock check:\n'+shorts.join('\n')+'\n\nSubmit anyway? Stock stops at 0 — fix later with Stocktake.'))return;
  }
  var btn=$('ro-submit');if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  try{
    for(var i=0;i<RO.batches.length;i++){ /* 依卡片順序 insert＝R# 序號跟著 Batch 1..N */
      var ins=await sb.from('roasts').insert(buildRoastRec(RO.batches[i])).select();
      if(ins.error)throw new Error(ins.error.message);
      if(ins.data&&ins.data[0])DB.roasts.unshift(ins.data[0]);
    }
    var n=RO.batches.length;
    if(intake){
      logAct('intake roasts',n+' past batch'+(n>1?'es':''),null);
      RO.batches=[];await saveRoastDraft();
      closeDrawer();toast(n+' past roast'+(n>1?'s':'')+' added ✓ green stock untouched');
    }else{
      var ids=Object.keys(byBean);
      for(var j=0;j<ids.length;j++){
        var bn=(DB.beans||[]).find(function(x){return String(x.id)===String(ids[j]);});
        if(!bn)continue;
        var newQty=Math.max(0,Math.round(((Number(bn.quantity)||0)-byBean[ids[j]])*1000)/1000);
        var u=await sb.from('beans').update({quantity:newQty}).eq('id',bn.id);
        if(u.error)throw new Error('roasts saved but green stock update failed: '+u.error.message);
        bn.quantity=newQty;
      }
      for(var k=0;k<RO.batches.length;k++){
        var bt=RO.batches[k],bn2=(DB.beans||[]).find(function(x){return String(x.id)===String(bt.beanId);});
        try{await sb.from('stock_moves').insert({bean_id:bt.beanId,kind:'roast',delta_kg:-parseFloat(bt.green),after_kg:bn2?bn2.quantity:null,note:'Roast '+todayStr()});}catch(e){}
      }
      var totGreen=ids.reduce(function(s,id){return s+byBean[id];},0);
      logAct('roasted',n+' batch'+(n>1?'es':''),(Math.round(totGreen*100)/100)+' kg green');
      RO.batches=[];await saveRoastDraft();
      closeDrawer();toast(n+' roast'+(n>1?'s':'')+' logged ✓ green −'+(Math.round(totGreen*100)/100)+' kg');
    }
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=roSubmitLabel(true);}
    alert('Submit failed: '+(e&&e.message||e));
  }
}
/* ===== 滑卡（兩段式）=====
   右滑 >35% 寬＝直接做（照舊）。左滑不再直接貪睡：過門檻放手 → 卡片停在 -88px
   露出底層 Later 鈕，要「再點 Later」才真的睡（防誤滑）；點卡片本體/滑開別張＝彈回 */
var SWIPE_OPEN=null; /* 目前滑開露出 Later 的卡 id——一次只開一張 */
function closeSwipe(){
  if(!SWIPE_OPEN)return;
  var el=document.getElementById('c-'+SWIPE_OPEN);
  if(el){el.style.transition='transform .2s';el.style.transform='';}
  SWIPE_OPEN=null;
}
function attachSwipe(el,id){
  if(!canWrite())return; /* read-only：不綁滑卡（右做左睡都是寫入/共用貪睡） */
  /* 誤觸防護：方向鎖——先確認是「明確的橫向」才開始滑（斜滑/直捲直接放棄） */
  var x0=null,y0=0,dx=0,locked=false,dead=false,wasOpen=false;
  var barC=el.style.borderLeftColor; /* 類別色條：borderColor 清空會連左條一起洗掉，回彈時補回 */
  function reset(anim){el.style.transition=anim?'transform .25s':'none';el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;x0=null;dx=0;locked=false;dead=false;if(SWIPE_OPEN===id)SWIPE_OPEN=null;}
  el.addEventListener('pointerdown',function(e){
    if(e.target.closest('button'))return;
    wasOpen=(SWIPE_OPEN===id);
    if(SWIPE_OPEN&&SWIPE_OPEN!==id)closeSwipe(); /* 滑開別張＝先收舊的 */
    x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;
    try{el.setPointerCapture(e.pointerId);}catch(err){}
    el.style.transition='none';
  });
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;el.style.transform=wasOpen?'translateX(-88px)':'';el.style.borderColor='';el.style.borderLeftColor=barC;return;}
      if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.6)locked=true;
      else return;
    }
    var base=wasOpen?-88:0;
    el.style.transform='translateX('+Math.max(-118,base+dx*0.9)+'px)';
    var w=el.offsetWidth;
    var bc=(base+dx)>w*0.25?'var(--green)':'';
    el.style.borderColor=bc;
    el.style.borderLeftColor=bc||barC; /* 沒過門檻時左條維持類別色 */
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth,end=(wasOpen?-88:0)+dx;
    if(locked&&end>w*0.35){var i=item(id);reset(true);if(i)runAction(id,null);return;}
    el.style.transition='transform .2s';el.style.borderColor='';el.style.borderLeftColor=barC;
    var itm=item(id);
    if(locked&&end<-60&&!(itm&&itm.nosnooze)){el.style.transform='translateX(-88px)';SWIPE_OPEN=id;} /* 停在滑開態，等點 Later（nosnooze 卡直接彈回） */
    else{el.style.transform='';if(SWIPE_OPEN===id)SWIPE_OPEN=null;}
    x0=null;dx=0;locked=false;dead=false;
  });
  /* 滑開態下點卡片本體＝收回（不觸發卡片動作；剛放手 300ms 內的 click 是拖曳尾勁，略過） */
  el.addEventListener('click',function(){if(SWIPE_OPEN===id&&Date.now()-_drag>300)closeSwipe();});
}
/* QC 待判定列左右滑＝判定（老闆點名 2026-07-12）：右滑＝鎖頭（pass＋鎖風味）、左滑＝downgrade。
   過 35% 寬才觸發、滑過 30% 變色回饋（右綠左紅）防誤觸；警訊（downgrade 確認/換鎖確認）統一在 qcVerdict。
   縱向讓抽屜捲動；設 _drag 讓滑完的 click 不誤觸展開。 */
function attachQcSwipe(el,q){
  if(!canWrite())return;

  /* 滑不動修正（2026-07-13 老闆點名）：QC 泡泡在抽屜（捲動容器）內、又沒設 touch-action——
     手指一動瀏覽器就當捲動、pointercancel 殺掉拖曳（今日流卡 .card 有 pan-y 所以好滑）。
     ①touch-action:pan-y＝縱捲照常、橫滑歸 JS ②iOS Safari 對捲動容器內不一定買帳（同 attachDrawerDrag
     的坑）——鎖定橫滑後用非 passive touchmove preventDefault 硬擋捲動，讓 pointermove 一路活著 */
  el.style.touchAction='pan-y';
  el.addEventListener('touchmove',function(e){if(locked)e.preventDefault();},{passive:false});
  function reset(anim){el.style.transition=anim?'transform .2s':'none';el.style.transform='';el.style.background='';x0=null;dx=0;locked=false;dead=false;}
  el.addEventListener('pointerdown',function(e){
    if(e.target.closest('button'))return;

    try{el.setPointerCapture(e.pointerId);}catch(err){}

  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;

    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;return;} /* 縱向＝讓抽屜捲動 */
      if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy)*1.3)locked=true; /* 橫滑鎖定放寬（18px/1.6→12px/1.3）＝更快接手 */

  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;

    if(locked&&dx<-w*0.35){reset(false);qcVerdict(q.r,'downgrade',null,'qc:'+q.r.id,q.s);return;}
    reset(true);
  });

async function saveBackfill(){
  var isBlend=BF.mode==='blend';
  var name,blendRef=null,sel=null,typed='';
  if(isBlend){
    blendRef=(DB.blends||[]).find(function(b){return b.name===BF.blendName;})||null;
    if(!blendRef){toast('Pick a blend first');return;}
    name=blendRef.name;
  }else{
    sel=(DB.beans||[]).find(function(b){return String(b.id)===String(BF.beanId||'');})||null;
    typed=String(BF.name||'').trim();
    name=typed||(sel?sel.name:'');
    if(!name){toast('Pick a bean or type a name');return;}
  }
  var outRaw=String(BF.out||'').trim();
  var out=outRaw===''?null:parseFloat(outRaw);
  if(out!=null&&(isNaN(out)||out<0)){toast('Roasted out must be a number');return;}
  var date=BF.date||todayStr();
  var isDup=(DB.roasts||[]).some(function(r){return (r.roast_date||'')===date&&String(r.bean_name||'').trim().toLowerCase()===name.toLowerCase();});
  if(isDup&&!confirm('"'+name+'" already has a batch dated '+date+'. Add another?'))return;
  var btn=$('bf-save');if(btn){btn.disabled=true;btn.textContent='Adding…';}
  try{
    var rec;
    if(isBlend){
      /* 純補一筆拼配熟豆：kind='blend' 進拼配貨架，但**不呼叫 consumeBlendParts**——補歷史不扣成分、不碰其他庫存 */
      var parts=(blendRef.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;})
        .map(function(p){return {bean:p.bean,process:p.process||'',pct:parseFloat(p.pct)};});
      rec={bean_id:null,bean_name:name,country:null,green_kg:null,status:'pending_cupping',roast_date:date,
        kind:'blend',recipe:{blend_id:blendRef.id||null,parts:parts}};
    }else{
      /* 打了字＝走純名字配對（不掛 bean_id）；green_kg null、不動 beans、不寫 stock_moves */
      rec={bean_id:(typed?null:(sel?sel.id:null)),bean_name:name,country:(!typed&&sel&&sel.country)?sel.country:null,
        process:(!typed&&sel&&sel.process)?sel.process:null,
        green_kg:null,status:'pending_cupping',roast_date:date};
    }
    if(out!=null&&out>0){rec.roasted_kg=out;rec.remaining_kg=out;}
    var ins=await sb.from('roasts').insert(rec).select();
    /* 舊庫沒有 kind/recipe 欄 → 去掉重試（同 saveBlendBatch fallback） */
    if(ins.error&&isBlend){var r2=Object.assign({},rec);delete r2.kind;delete r2.recipe;ins=await sb.from('roasts').insert(r2).select();}
    if(ins.error)throw new Error(ins.error.message);
    if(ins.data&&ins.data[0])DB.roasts.unshift(ins.data[0]);
    logAct('added to qc pipeline',name);
    closeDrawer();
    /* 清掉這筆的值、保留 mode 與 date（方便連續補同類、同一批日期） */
    BF.beanId='';BF.name='';BF.blendName='';BF.out='';
    var hasCup=(DB.samples||[]).some(function(s){
      if(rec.bean_id&&s.bean_id)return String(s.bean_id)===String(rec.bean_id);
      return String(s.sample_id||'').trim().toLowerCase()===name.toLowerCase();});
    /* v3：缺咖啡資訊講明白（批次照樣進 QC 佇列等杯測） */
    toast(hasCup?'In stock ✓ — in the QC queue':'In stock ✓ — no coffee info yet, cup it in QC');
    buildItems();render();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to QC pipeline';}
    alert('Add failed: '+(e&&e.message||e));
  }
}

/* 印刷卡雷達：html2canvas **不畫行內 SVG**（老闆真機 PDF 雷達整個消失的破圖根因）
   → 用 canvas 畫成 PNG 嵌 <img>，4 倍超取樣夠印刷 */
/* opts.grid/opts.label＝網格線與標籤色（深色照片底要翻亮，不給就用原本的淺底配色） */
function printRadarPNG(sc,color,opts){
  opts=opts||{};
  var S=4;
  var cv=document.createElement('canvas');cv.width=412*S;cv.height=246*S;
  var x=cv.getContext('2d');x.scale(S,S);x.translate(62,-2); /* 對齊定稿 viewBox -62 2 412 246（大寫標籤要寬邊） */
  var K=[['fragrance','AROMA'],['acidity','ACIDITY'],['sweetness','SWEETNESS'],['body','BODY'],['aftertaste','AFTERTASTE']];
  var cx=150,cy=128,R=88;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  x.lineWidth=1;x.strokeStyle=opts.grid||'#D9D2CB';
  [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);if(i)x.lineTo(q[0],q[1]);else x.moveTo(q[0],q[1]);}x.stroke();});
  for(var i=0;i<5;i++){var q=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(q[0],q[1]);x.stroke();}
  var pts=K.map(function(k,i){return pt(i,R*(Number(sc[k[0]])||0)/3);});
  x.beginPath();pts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
  x.globalAlpha=.14;x.fillStyle=color;x.fill();x.globalAlpha=1;
  x.lineWidth=2.5;x.strokeStyle=color;x.lineJoin='round';x.stroke();
  x.fillStyle=color;

  try{x.letterSpacing='1px';}catch(e){}
  K.forEach(function(k,i){
    var q=pt(i,R+21);

/* 豆子履歷全欄位（產區/處理廠/品種/海拔/處理法/產季/烘豆日/生豆商）——資訊卡與 Retail shelf 明細共用；生豆查法同 cardDataFor */
/* 拼配成分的身世：拿配方裡的成分豆去 green stock（DB.beans，記憶體現成的）對。
   ⚠ 處理法是消歧的關鍵，不能只比名字：
     · Finca Milan 生豆表有 6 支同名（不同 culturing）
     · Hakuna Matata 兩支——Honey 是 Sidra、Washed 是 Typica，比錯品種就寫錯
   ⚠ 配方寫泛稱、生豆帶版本號（配方 "Danche" ↔ 生豆 "Danche v1/v2/v3"），
     所以精確比對落空時再退一步用「前綴＋空白」比，仍以處理法挑對的那支 */
function greenForPart(p){
  /* ID 優先（2026-07-15）：配方成分帶 bean_id → 記憶體精準命中那支生豆；舊配方沒記才退名字＋處理法消歧 */
  if(p&&p.bean_id!=null&&String(p.bean_id).trim()!==''){
    var byId=(DB.beans||[]).find(function(b){return String(b.id)===String(p.bean_id);});
    if(byId)return byId;
  }
  var nm=String(p.bean||'').trim().toLowerCase();
  if(!nm)return null;
  var proc=String(p.process||'').trim().toLowerCase();
  var all=DB.beans||[];
  function pick(pool){
    if(!pool.length)return null;
    return (proc&&pool.filter(function(b){return String(b.process||'').trim().toLowerCase()===proc;})[0])||pool[0];
  }
  var exact=all.filter(function(b){return String(b.name||'').trim().toLowerCase()===nm;});
  return pick(exact)||pick(all.filter(function(b){return String(b.name||'').trim().toLowerCase().indexOf(nm+' ')===0;}));
}
/* opts.omit＝要略過的列名。對外素材（摺卡／社群圖／Square 商品圖）不印 Roasted 與 Harvest：
   烘焙日一印就過期，產季對客人也不是重點；店內的 Retail Info 抽屜照樣要看得到 */
async function beanInfoRows(full,opts){
  opts=opts||{};
  var omit={};(opts.omit||[]).forEach(function(k){omit[k]=1;});
  var nm=String(full.sample_id||'').trim();
  var info=[];
  function add(k,v){if(!omit[k]&&v!=null&&v!=='')info.push([k,v]);}
  /* 拼配豆：beans 表沒有同名生豆，身世＝blends 配方（判斷方式同 shelf 抽屜/cardDataFor：名字命中 blends 就是拼配）。
     明細改列配方成分：左欄比例、右欄「成分豆 · 處理法 · 產國」——處理法/產國用 greenForPart
     從 green stock 消歧（配方寫泛稱、生豆帶版本號，同名不同處理法要挑對那支）。
     這裡是摺卡/社群 origin 圖/Square 商品圖的共用資料源，改這一處全部生效 */
  var bd=null;
  try{var bq=await sb.from('blends').select('name,parts').ilike('name',nm);bd=(bq.data||[])[0]||null;}catch(e){}
  if(bd){
    (bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).forEach(function(p){
      var g=greenForPart(p);
      var v=[p.bean,(g&&g.process)||p.process||'',(g&&g.country)||''].filter(Boolean).join(' · ');
      add(parseFloat(p.pct)+'%',v);
    });
    var brd=full.roast_date||(matchRoast(full)||{}).roast_date;
    add('Roasted',brd?fmtD(brd):'');
    return info;
  }
  var gb=null;
  /* 2026-07-15 ID 優先：samples 帶 bean_id → 記憶體 DB.beans 精準命中（消滅同名多支的 pool[0] 猜測，
     且省一次 DB 查詢——DB.beans 已載全欄位）。沒 bean_id 的舊資料才退回名字＋處理法查 */
  if(full.bean_id)gb=(DB.beans||[]).find(function(b){return String(b.id)===String(full.bean_id);})||null;
  if(!gb){
    try{
      var gq=await sb.from('beans').select('process,variety,altitude,region,country,station,harvest,supplier').ilike('name',nm);
      var pool=gq.data||[];
      var proc=String(full.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
  }
  add('Origin',gb?[gb.region,gb.country].filter(Boolean).join(', '):'');
  add('Station',gb&&gb.station);
  add('Variety',gb&&gb.variety);
  add('Altitude',(gb&&gb.altitude!=null&&gb.altitude!=='')?gb.altitude+' MASL':'');
  add('Process',full.process||(gb&&gb.process)||'');
  add('Harvest',gb&&gb.harvest);
  var rd=full.roast_date||(matchRoast(full)||{}).roast_date;
  add('Roasted',rd?fmtD(rd):'');
  add('Sourced via',gb&&gb.supplier);
  return info;
}

async function applyPouroverToAll(btn){
  var list=passedBeans();
  if(!list.length){alert('No QC-passed coffees to apply to yet.');return;}
  if(!confirm('Add the house pour-over recipe to all '+list.length+' shelf coffee'+(list.length===1?'':'s')+'?\n\nIt then shows in dispatch emails and on the QR bean page. This overwrites any existing pour-over (infusion) notes on those coffees.'))return;
  if(btn){btn.disabled=true;btn.textContent='Applying…';}
  /* 解析不重複的 blend / bean target（blends 表同名優先，否則生豆表 bean_id → 名字+process 備援） */
  var blendIds={},beanIds={},blendRows=[];
  try{var bq=await sb.from('blends').select('id,name,brew');blendRows=bq.data||[];}catch(e){}
  for(var i=0;i<list.length;i++){
    var s=list[i],nm=String(s.sample_id||'').trim();
    var bl=blendRows.find(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
    if(bl){blendIds[bl.id]=1;continue;}
    var bean=null;
    if(s.bean_id)bean=(DB.beans||[]).find(function(b){return String(b.id)===String(s.bean_id);});
    if(!bean){
      var proc=String(s.process||'').trim().toLowerCase();
      var pool=(DB.beans||[]).filter(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
      bean=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }
    if(bean)beanIds[bean.id]=1;
  }
  var ok=0,fail=0;
  /* 只覆寫 infusion，其他沖煮方法原封不動 */
  for(var bid in blendIds){
    var row=blendRows.find(function(b){return String(b.id)===String(bid);});
    var brew=(row&&row.brew&&typeof row.brew==='object')?Object.assign({},row.brew):{};
    brew.infusion=POUROVER_INFUSION;
    try{var u=await sb.from('blends').update({brew:brew}).eq('id',bid);if(u.error)throw new Error(u.error.message);ok++;}catch(e){fail++;}
  }
  for(var beanid in beanIds){
    var cur={};
    try{var fr=await sb.from('beans').select('brew').eq('id',beanid).maybeSingle();var v=fr&&fr.data&&fr.data.brew;if(v&&typeof v==='object')cur=v;}catch(e){}
    var brew2=Object.assign({},cur);brew2.infusion=POUROVER_INFUSION;
    try{var u2=await sb.from('beans').update({brew:brew2}).eq('id',beanid);if(u2.error)throw new Error(u2.error.message);ok++;}catch(e){fail++;}
  }
  if(btn){btn.disabled=false;btn.textContent='Add it to every shelf coffee';}
  closeDrawer();
  toast(fail?('Applied to '+ok+', '+fail+' failed'):('Pour-over added to '+ok+' coffee'+(ok===1?'':'s')+' ✓'));
}
/* 外部腳本延遲載入（只載一次） */
var _loadedScripts={};
function loadScriptOnce(url){
  if(_loadedScripts[url])return _loadedScripts[url];
  _loadedScripts[url]=new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src=url;s.onload=res;s.onerror=function(){delete _loadedScripts[url];rej(new Error('script load failed — check the connection'));};
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}

    var color=(dotKey&&RTL_DOTCOL[dotKey])||'';
    var selfB=(s?beanForSample(s):null)||(BEANS||[]).filter(function(x){return (x.name||'').trim().toLowerCase()===key;})[0]||null;
    var origin={process:'',variety:'',altitude:'',region:''};
    if(selfB){
      origin.process=selfB.process||'';
      origin.variety=selfB.variety||'';
      origin.altitude=(selfB.altitude!=null&&selfB.altitude!=='')?String(selfB.altitude):'';
      origin.region=[selfB.region,selfB.country].filter(Boolean).join(', ');
    }
    var note=(def&&(def.note||'').trim())||'';
    return {name:name, flavour:feats.slice(0,3), recipe:recipe, strength:strength, cupScores:cupScores, ready:ready, net:(g?String(g):''), comment:cmt, note:note, color:color, origin:origin};
  }
  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a), cy-r*Math.cos(a)];}
    function segsOf(pts){var s=[];for(var i=1;i<pts.length;i++)s.push([pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]]);return s;}
    /* grid rings: Light / Medium / Strong */
    doc.setLineWidth(0.5);doc.setDrawColor(30,26,25);
    [1,2,3].forEach(function(lvl){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,R*lvl/3));doc.lines(segsOf(pts),pts[0][0],pts[0][1],[1,1],'S',true);});
    /* spokes */
    doc.setDrawColor(30,26,25);
    for(var i=0;i<n;i++){var sp=pt(i,R);doc.line(cx,cy,sp[0],sp[1]);}
    /* data polygon (0 = centre when a bean has no reading on that axis) */
    var dpts=scores.map(function(o,i){var v=(o.n==null?0:o.n);return pt(i,R*(v/3));});
    var dseg=segsOf(dpts);
    var TINT=[Math.round(255-(255-BERRY[0])*0.20),Math.round(255-(255-BERRY[1])*0.20),Math.round(255-(255-BERRY[2])*0.20)];
    doc.setFillColor(TINT[0],TINT[1],TINT[2]);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'F',true);
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1.1);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'S',true);
    doc.setFillColor(BERRY[0],BERRY[1],BERRY[2]);
    dpts.forEach(function(p){doc.circle(p[0],p[1],1,'F');});
    /* axis labels, anchored just outside each vertex */
    doc.setFont('helvetica','bold');doc.setFontSize(5.6);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    scores.forEach(function(o,i){
      var lp=pt(i,R+7);
      var align=(lp[0]<cx-2)?'right':(lp[0]>cx+2?'left':'center');
      doc.text(o.label,lp[0],lp[1]+2,{align:align});
    });
  }
  function drawSpecialBand(doc,x,y,w,h,row,logo){
    var INK=[0,0,0],BROWN=[73,66,58],BERRY=[178,94,106],LABEL=[0,0,0],LINE=[30,26,25],SUB=[0,0,0],RED=[192,57,43],BLUE=[42,101,158];
    row=row||{};var bean=row.bean||{},off=row.offer||{};
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,10,10,'S');else doc.rect(x,y,w,h,'S');
    if(!bean.name){
      doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(178,94,106);
      doc.text('\u2014 empty \u2014',x+w/2,y+h/2,{align:'center'});
      return;
    }
    var leftW=Math.min(232,w*0.56);
    /* "Ratio" wordmark · centered above the right (offer) column */
    {var lcx=x+leftW+(w-leftW)/2;doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);doc.text('Ratio Crows Nest',lcx,y+22.5,{align:'center'});}
    var band=mnHexRgb(bean.color)||BROWN;
    /* ---- TAB header (top-left, rounded top corners only) ---- */
    var tabH=34,r=10;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,leftW,tabH,r,r,'F');else doc.rect(x,y,leftW,tabH,'F');
    doc.rect(x,y+tabH-r,leftW,r,'F');           /* square off the tab's bottom */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var nm=mnAsc(String(bean.name||'').toUpperCase()),ns=15;doc.setFontSize(ns);
    while(ns>9&&doc.getTextWidth(nm)>leftW-24){ns-=0.5;doc.setFontSize(ns);}
    doc.text(nm,x+14,y+tabH/2+ns*0.34);
    /* column divider (continues down from the tab edge) */
    doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.8);
    doc.line(x+leftW,y+tabH,x+leftW,y+h-14);

    /* ================= LEFT · bean info ================= */
    var lx=x+15,lw=leftW-30,cy=y+tabH+22;
    function lab(t){doc.setFont('helvetica','bold');doc.setFontSize(6.6);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);doc.text(t,lx,cy,{charSpace:1.1});cy+=13;}
    var o=bean.origin||{},orows=[];
    if(o.process)orows.push(['Process',o.process]);
    if(o.variety)orows.push(['Variety',o.variety]);
    if(o.altitude)orows.push(['Altitude',o.altitude+' MASL']);
    if(o.region)orows.push(['Region',o.region]);
    if(bean.recipe&&bean.recipe.length){
      /* blend → pull its recipe (component beans + %) from Blending */
      lab('RECIPE');
      bean.recipe.forEach(function(cpt){
        var pct=cpt.pct?(cpt.pct+'%'):'';
        var ctry=(cpt.country||'').trim();
        var proc=(cpt.process||'').trim();
        var line=cpt.bean+[ctry,proc].filter(Boolean).map(function(v){return '  \u00b7  '+v;}).join('');
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,line,lx,cy,lw-30,8.5,6.5);
        if(pct){doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);doc.setFontSize(8.5);doc.text(pct,lx+lw,cy,{align:'right'});}
        cy+=12;
      });
      cy+=15;
    }else if(orows.length){
      lab('ORIGIN');
      orows.forEach(function(rr){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
        doc.text(rr[0],lx,cy);
        doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,rr[1],lx+lw,cy,lw-58,8.5,7,'right');cy+=12;
      });
      cy+=15;
    }
    if(bean.cupScores&&bean.cupScores.some(function(o){return o.n!=null;})){
      lab('CUPPING');
      var rR=26,rCx=lx+lw/2,rCy=cy+9+rR;
      drawCuppingRadar(doc,rCx,rCy,rR,bean.cupScores,band,[124,58,68]);
      cy=rCy+rR+9+15;
    }
    /* FLAVOUR — one line, no wrap, font grown to fill the column width */
    if(bean.flavour&&bean.flavour.length){
      var flText=mnAsc(bean.flavour.join('  \u00b7  '));
      doc.setFont('helvetica','bold');
      var fs=24;doc.setFontSize(fs);
      while(fs>9&&doc.getTextWidth(flText)>lw){fs-=0.5;doc.setFontSize(fs);}
      var baseY=y+h-16,labY=baseY-fs*0.9-8;
      doc.setFont('helvetica','bold');doc.setFontSize(6.6);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
      doc.text('FLAVOUR',lx,labY,{charSpace:1.1});
      doc.setFont('helvetica','bold');doc.setFontSize(fs);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(flText,lx,baseY);
    }

    /* ================= RIGHT · weekly offer ================= */
    var rx0=x+leftW+16,rEnd=x+w-15,rw=rEnd-rx0,ry=y+tabH+16;
    function money(v){v=String(v==null?'':v).trim().replace(/^\$+/,'');return '$'+(v||'\u2014');}
    function rule(){doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);doc.line(rx0,ry,rEnd,ry);}
    var PSZ=12.5;      /* price size — matched to the item name for a flat, even look */
    var ITEMSZ=12.5;   /* one item-name size for every drink */
    var SUBSZ=9;       /* sub-line size (e.g. "Black and White") */
    var SECGAP=18;     /* gap after a section's rule, before next category title */
    var TITLEGAP=18;   /* baseline-to-baseline from a category title down to its first item
                          (must exceed the price cap-height so the tall price never overlaps up into the title) */
    function catTitle(t){doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(178,94,106);doc.text(t.toUpperCase(),rx0,ry,{charSpace:1});ry+=TITLEGAP;}
    /* Draw one drink row with the item name (left) and price (right) sharing a
       common baseline. The price is vertically centred to the item cap-height so
       the two never look mismatched regardless of their differing font sizes. */
    function drinkRow(label,labelCol,priceVal){
      doc.setFont('helvetica','bold');doc.setFontSize(ITEMSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      mnFit(doc,label,rx0,ry,rw-58,ITEMSZ,9);
      doc.setFont('helvetica','bold');doc.setFontSize(PSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      doc.text(money(priceVal),rEnd,ry-(PSZ-ITEMSZ)*0.34,{align:'right'});
    }
    /* Special of the Week — plain heading, aligned to the banner bottom */
    doc.setFont('helvetica','bolditalic');doc.setFontSize(13);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Special of the Week',rx0,ry);ry+=28;
    /* Espresso Based · 1+1 Combo */
    catTitle('Espresso Based');
    drinkRow('1+1 Combo',RED,off.combo);ry+=15;
    doc.setFont('helvetica','italic');doc.setFontSize(SUBSZ);doc.setTextColor(0,0,0);
    doc.text('Black and White',rx0,ry);ry+=16;
    rule();ry+=SECGAP;
    /* Signature · Dirty Ratio */
    catTitle('Signature');
    drinkRow('Dirty Ratio',BLUE,off.dirty);ry+=16;
    rule();ry+=SECGAP;
    /* Hand Pour - Filter Coffee · Hot / Cold */
    catTitle('Hand Pour - Filter Coffee');
    drinkRow('Hot',RED,off.hot);ry+=22;
    drinkRow('Cold',BLUE,off.cold);
  }
