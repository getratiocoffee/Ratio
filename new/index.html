  function drawDineInMenu(doc,ox,w,h,cfg,logo){
    var INK=[0,0,0], BERRY=[124,58,68], LINE=[30,26,25], MUTE=[120,112,108];
    var HOT=[214,0,108], COLD=[42,143,216];
    var padX=26, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;
    var P=cfg.prices||{};
    function pv(k,d){var s=String(P[k]==null?'':P[k]).trim();return s||d||'';}

    /* ---- unified type scale ---- */
    var FS_TITLE=20, FS_KICKER=8, FS_SECTION=9.5, FS_ITEM=11, FS_PRICE=12, FS_META=8.5, FS_DESC=8.5;
    /* ---- unified spacing ---- */
    var ROW=17.5;      /* baseline-to-baseline for a standard priced item */
    var META_LH=10;    /* line height for a meta/description line under an item */
    var SEC_TOP=15;    /* space above a section rule */
    var SEC_GAP=18;    /* space from section rule down to its first item */

    var y=38;

    /* ---------- title block ---------- */
    doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
    doc.text('DINE IN MENU',ox+w/2,y,{align:'center',charSpace:3});
    doc.setFont('helvetica','bold');doc.setFontSize(FS_TITLE);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Ratio Crows Nest',ox+w/2,y+21,{align:'center'});
    y+=21;

    /* ---------- section header ---------- */
    function section(label,sub){
      y+=SEC_TOP;
      doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
      doc.text(label.toUpperCase(),x0,y,{charSpace:1.8});
      if(sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(sub),xEnd,y,{align:'right'});}
      doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.6);
      doc.line(x0,y+6,xEnd,y+6);
      y+=SEC_GAP;
    }
    /* ---------- price row (name | size .... price) ---------- */
    function priceRow(name,size,price,note){
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(mnAsc(name),x0,y);
      var nw=doc.getTextWidth(mnAsc(name));
      if(size){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text('  |  '+size,x0+nw+3,y);}
      if(price){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(price,xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
      if(note){y+=META_LH;doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(note),x0,y);}
      y+=ROW;
    }
    /* ---------- a plain meta line: label left, value right ---------- */
    function metaRow(label,value){
      doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(mnAsc(label),x0,y);
      if(value)doc.text(mnAsc(value),xEnd,y,{align:'right'});
      y+=META_LH+2;
    }

    /* ---------- two espresso blends ---------- */
    var bl=cfg.blends||[], colCx=[x0+innerW*0.27, x0+innerW*0.73], by=y+30;
    [0,1].forEach(function(ci){
      var b=bl[ci]||{}, cx=colCx[ci], hl=!!b.highlight;

      doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);

      if(b.sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(b.sub),cx,by+12,{align:'center'});}
      if(b.notes){doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(mnAsc(b.notes),cx,by+25,{align:'center'});}
    });
    var midX=x0+innerW*0.5;
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1);

    y=by+37;

    /* ---------- ESPRESSO BASED ---------- */
    section('Espresso Based');
    priceRow('Espresso','',pv('espresso'));
    priceRow('Small','6oz',pv('small'));
    priceRow('Large','10oz',pv('large'));
    priceRow('On Ice','10oz',pv('ice'));
    metaRow('extra shot \u00b7 alternative milk',pv('altmilk','50 cents'));
    metaRow('decaf',pv('decaf','1 dollar'));

    /* ---------- SIGNATURE ---------- */

    y+=4;

    /* ---------- AUTOMATED BREWING ---------- */

    priceRow('Fresh Batch','10oz',pv('fresh'),cfg.freshNote);
    priceRow('Cold Batch','10oz',pv('cold'),cfg.coldNote);

    /* ---------- HAND POUR FILTER COFFEE ---------- */
    section('Hand Pour Filter Coffee','hot or iced');
    (cfg.pours||[]).slice(0,4).forEach(function(it){
      var name=mnAsc(it.name||'');if(!name)return;
      var hl=!!it.highlight;

      /* right-aligned hot (pink) / cold (blue), vertically centred to the item name */
      doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);
      var py=y-(FS_PRICE-FS_ITEM)*0.34, rx=xEnd;
      doc.setTextColor(COLD[0],COLD[1],COLD[2]);doc.text(cold||'-',rx,py,{align:'right'});
      var cwid=doc.getTextWidth(cold||'-');
      doc.setTextColor(INK[0],INK[1],INK[2]);doc.text(' / ',rx-cwid,py,{align:'right'});
      var swid=doc.getTextWidth(' / ');
      doc.setTextColor(HOT[0],HOT[1],HOT[2]);doc.text(hot||'-',rx-cwid-swid,py,{align:'right'});
      var priceW=cwid+swid+doc.getTextWidth(hot||'-');

      y+=META_LH+1.5;
      if(it.origin){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(it.origin),x0,y);y+=META_LH;}
      if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(FS_DESC+0.5);doc.setTextColor(INK[0],INK[1],INK[2]);

    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE — small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR — primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  ·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE — primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength — radar chart (secondary, muted) — inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid — fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    for(var i=0;i<4;i++){drawCell(doc,cellX[i],cellY[i],cw,ch,info4[i],INK,BROWN,BERRY,MUTE);}
  }
  function buildMenuPDF(info4,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth();   /* ~841.89 */
    var H=doc.internal.pageSize.getHeight();  /* ~595.28 */
    drawMenu(doc,0,W/2,H,info4,logo);
    drawMenu(doc,W/2,W/2,H,info4,logo);
    /* centre dashed cut line */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_Menu.pdf');
  }

function lblFitBlock(block,origLen){

async function generateTinLbx(){
  var msg=document.getElementById('tinlbx-msg');var btn=document.getElementById('tinlbx-gen');
  try{
    if(!window.JSZip){if(msg){msg.textContent='Zip library still loading, try again';msg.className='gform-msg err';}return;}
    if(btn)btn.disabled=true;if(msg){msg.textContent='Building .lbx…';msg.className='gform-msg';}
    var zip=await JSZip.loadAsync(await fetchAsset('/tin-label.lbx'));
    var xml=await zip.file('label.xml').async('string');
    tinCompileEntries().forEach(function(f){
      var newText=(f.value==null)?'':f.value;
      var dataOld='<pt:data>'+xmlEsc(f.orig)+'</pt:data>';
      var idx=xml.indexOf(dataOld);if(idx<0)return;
      var bStart=xml.lastIndexOf('<text:text>',idx);var bEnd=xml.indexOf('</text:text>',idx)+12;
      var block=xml.slice(bStart,bEnd),nb=block;
      if(newText!==f.orig){
        nb=nb.replace(/<pt:data>[\s\S]*?<\/pt:data>/,'<pt:data>'+xmlEsc(newText)+'</pt:data>');
        var items=tinStringItems(block,newText);
        nb=nb.replace(/<text:stringItem charLen="\d+">[\s\S]*<\/text:stringItem>/,items);
      }
      if(nb!==block){xml=xml.slice(0,bStart)+nb+xml.slice(bEnd);}
    });
    var srcName=(tinMode==='blend'?tinBlend.name:(tinForm.name||tinForm.country))||'tin';
    var nm=srcName.replace(/[^A-Za-z0-9 _\-]/g,'').trim().replace(/\s+/g,'_')||'tin';
    try{var logoBmp=await tinLogoBmp();if(logoBmp)zip.file('Object0.bmp',logoBmp);}catch(e){}
    try{
      var rbmp=tinRadarBmp(tinSample);
      if(rbmp&&xml.indexOf('Object1.bmp')<0){
        zip.file('Object1.bmp',rbmp);
        xml=xml.replace('</pt:objects>',TIN_RADAR_OBJ+'</pt:objects>');
      }
    }catch(e){}
    try{
      var flav=(tinSample&&tinSample.features&&tinSample.features.length)
        ?tinSample.features.map(function(x){return String(x||'').trim();}).filter(Boolean).join(' · ').toUpperCase()
        :'';
      if(flav){
        var flavObj=TIN_FLAV_OBJ.replace('__DATA__',xmlEsc(flav)).replace('__LEN__',String(flav.length));
        xml=xml.replace('</pt:objects>',flavObj+'</pt:objects>');
      }
    }catch(e){}
    zip.file('label.xml',xml);
    var blob=await zip.generateAsync({type:'blob',mimeType:'application/octet-stream',compression:'DEFLATE'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nm+'.lbx';document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    if(btn)btn.disabled=false;if(msg){msg.textContent='Done — '+nm+'.lbx downloaded';msg.className='gform-msg ok';}
  }catch(e){if(btn)btn.disabled=false;if(msg){msg.textContent='Generate failed: '+(e&&e.message||e);msg.className='gform-msg err';}}
}

/* By person：同一週的班改按「人」分組（每人本週總時數＋逐班；未指派另列一格）。點班照樣進 openShiftEdit */
function rosterPersonHTML(ws,shifts){
  var canEdit=isLead();
  var byName={},order=[];
  shifts.forEach(function(s,idx){
    var nm=(s.name&&String(s.name).trim())?String(s.name).trim():'';
    if(!nm)return;
    if(!byName[nm]){byName[nm]={rows:[],total:0};order.push(nm);}
    byName[nm].rows.push({s:s,idx:idx});
    byName[nm].total+=rsHrs(s.start,s.end,s.br);
  });
  order.sort(function(a,b){var ia=RS_STAFF.indexOf(a),ib=RS_STAFF.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  var unassigned=shifts.filter(function(s){return !(s.name&&String(s.name).trim());}).length;
  if(!order.length&&!unassigned)return '<div class="rs-none" style="border:1px solid var(--line);border-radius:12px">No shifts yet — switch to By day to add them</div>';
  var dowKeys=RS_DOW.map(function(x){return x[0];});

    p.rows.sort(function(a,b){return dowKeys.indexOf(a.s.day)-dowKeys.indexOf(b.s.day)||(String(a.s.start)<String(b.s.start)?-1:1);});
    var rows=p.rows.map(function(o){
      var di=dowKeys.indexOf(o.s.day),dObj=rsDateFor(ws,di<0?0:di),warn=rsUnavailable(nm,dObj);
      var pin='<span class="rs-nm" style="font-weight:500;font-size:13px">'+((RS_DOW[di]||['','?'])[1])+' '+rsDMY(dObj)+(warn?' <span class="fr-yellow">⚠</span>':'')+'</span>'
        +'<span class="rs-tm">'+esc(o.s.start)+'–'+esc(o.s.end)+(o.s.br?' ·½':'')+' · '+rsHH(rsHrs(o.s.start,o.s.end,o.s.br))+'</span>';
      return canEdit?'<button class="rs-shift" data-rsedit="'+o.idx+'">'+pin+'</button>':'<div class="rs-shift" style="cursor:default">'+pin+'</div>';
    }).join('');

function applyStandardWeek(ws){

function addRosterShift(ws,dk){

async function saveRosterWeek(ws,btn){

/* ===== My unavailability：員工自己標休（staff_na）＝唯讀班表下唯一能寫的東西。
   RLS＝is_staff() 且 name=my_profile_name()（或 money）——只能動自己那筆，名字自動帶 WHO */
var NA_Y=null,NA_M=null,NA_SEL=null;
function openMyNA(){
  if(NA_Y==null){var now=new Date();NA_Y=now.getFullYear();NA_M=now.getMonth();}
  renderMyNA();
}
/* 每人穩定配色：先照員工名單順序給部門色，不在名單的用名字雜湊 */
/* 名字先正規化＋字母排序成固定順序，再按位置給色——各畫面同一人同色（同步），≤8 人不撞色。
   不在名單者退回雜湊 */
function naColor(name){
  var pal=['--roast','--qc','--green','--mkt','--orders','--fin','--team','--accent','--cust','--day','--print'];
  var key=String(name||'').trim().toLowerCase();
  var list=(RS_STAFF||[]).map(function(x){return String(x).trim().toLowerCase();}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  var i=list.indexOf(key);
  if(i<0){var h=0;for(var j=0;j<key.length;j++)h=(h*31+key.charCodeAt(j))|0;i=Math.abs(h);}
  return 'var('+pal[i%pal.length]+')';
}
/* staff_na 範圍展開成 {iso日: [人名…]}（同一天多人＝多筆）*/
function naOffMap(){
  var map={};
  (RS_NA||[]).forEach(function(n){
    var s=new Date(n.start_date+'T00:00'),e=new Date(n.end_date+'T00:00');
    if(isNaN(s.getTime())||isNaN(e.getTime()))return;
    for(var t=new Date(s);t<=e;t.setDate(t.getDate()+1)){var k=rsDIso(t);(map[k]=map[k]||[]).push(n.name);}
  });
  return map;
}

/* 標／清自己那天：新增用單日 staff_na；清除找涵蓋該日的自己那筆整筆刪（跨日會先確認）*/
async function naToggleSelf(day,btn){
  if(!WHO){alert('Your account has no name set yet — ask the owner to set it before marking days off.');return;}
  if(!day)return;
  var mine=(RS_NA||[]).find(function(n){return String(n.name)===String(WHO)&&String(n.start_date)<=day&&String(n.end_date)>=day;});
  if(mine&&String(mine.start_date)!==String(mine.end_date)&&!confirm('This clears your whole days-off block '+mine.start_date+' to '+mine.end_date+'. Continue?'))return;
  if(btn)btn.disabled=true;
  try{
    if(mine){
      var u=await sbRaw('staff_na').delete().eq('name',WHO).eq('start_date',mine.start_date).eq('end_date',mine.end_date);
      if(u.error)throw new Error(u.error.message);
      RS_NA=RS_NA.filter(function(n){return n!==mine;});toast('Cleared ✓');
    }else{
      var u2=await sbRaw('staff_na').insert({name:WHO,start_date:day,end_date:day});
      if(u2.error)throw new Error(u2.error.message);
      RS_NA.push({name:WHO,start_date:day,end_date:day});toast('Marked off ✓');
    }
    renderMyNA();

}

/* ===== Timesheet 2.0 Stage D：往週薪務（時數平日/週末拆分＋薪水＋Cash/Bank＋費率）=====
   錢的顯示只給 director/finance（rsMoney）——但真正的牆是 RLS：staff_rates/pay_weeks 資料庫層 money-only，

function rsWeekHours(shifts){
  var order=['mon','tue','wed','thu','fri','sat','sun'],wd={},we={},names=[];
  (shifts||[]).forEach(function(s){
    var nm=(s.name&&String(s.name).trim())?String(s.name).trim():'';if(!nm)return;
    var i=order.indexOf(s.day),h=rsHrs(s.start,s.end,s.br);
    if(names.indexOf(nm)<0)names.push(nm);
    if(i>=0&&i<5)wd[nm]=(wd[nm]||0)+h;else we[nm]=(we[nm]||0)+h;
  });
  names.sort(function(a,b){var ia=RS_STAFF.indexOf(a),ib=RS_STAFF.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  return names.map(function(nm){return {name:nm,wd:Math.round((wd[nm]||0)*10)/10,we:Math.round((we[nm]||0)*10)/10};});
}

/* ===== Invoice GST 發票（缺口 #5，自 classic openInvoice/generateInvoicePDF 移植）=====
   手填表單（不挑訂單/客戶，照 classic）：Bill To＋分類品項（Roasted/Green＝GST-free、
   Green 可掛 $5 handling inc GST、Shipping/Catering 10% 可切外加 plus/內含 inc＝total/11 反推）。
   PDF＝jsPDF A4（重用 menusPDF 按需載引擎＋logo）；公司常數（ABN/地址/BSB）照 classic 逐字。
   發票號 INV-YYYYMMDD-NNN：classic 走 localStorage 雙軌——新殼**直讀寫 app_state 'inv_seq'**
   （產生時當場查最新 map→當日 max+1→PDF 成功才 upsert 寫回＝跨裝置不倒退、格式相容 classic）。 */
var INV_CATS=['Roasted Beans','Green Beans','Shipping','Catering'];
var ROAST_PACKS=['100g','150g','200g','250g'];
var INV_HANDLE=5; /* per green-bean line, GST inclusive */
var INV={buyerName:'',buyerEmail:'',buyerAddr:'',items:[],notes:'',date:'',due:''};
function invIsGreen(it){return it.cat==='Green Beans';}
function invHasHandle(it){return invIsGreen(it)&&!!it.beanId;}
function blankInvItem(cat){return {cat:cat||INV_CATS[0],desc:'',qty:'1',unit:'',gstMode:'plus',pack:'250g',beanId:'',beanName:'',country:''};}
function invRaw(it){return (parseFloat(it.qty)||0)*(parseFloat(it.unit)||0);}
function invEx(it){
  if(invIsGreen(it)){var ex=invRaw(it);if(invHasHandle(it))ex+=INV_HANDLE/1.1;return ex;}
  if(it.cat==='Roasted Beans')return invRaw(it);
  var amt=invRaw(it);return it.gstMode==='inc'?amt/1.1:amt;
}
function invGstLine(it){
  if(invIsGreen(it))return invHasHandle(it)?(INV_HANDLE-INV_HANDLE/1.1):0;
  if(it.cat==='Roasted Beans')return 0;
  var amt=invRaw(it);return it.gstMode==='inc'?(amt-amt/1.1):amt*0.1;
}
function invLineTotal(it){return invEx(it)+invGstLine(it);}
function invSubtotal(){var t=0;INV.items.forEach(function(it){t+=invEx(it);});return t;}
function invGstAmt(){var t=0;INV.items.forEach(function(it){t+=invGstLine(it);});return t;}
function invTotal(){return invSubtotal()+invGstAmt();}
function invLineHTML(it){
  if(invIsGreen(it))return 'Green '+money(invRaw(it))+' · GST-free'+(invHasHandle(it)?' + Handle $5.00':'')+' — <b>'+money(invLineTotal(it))+'</b>';
  if(it.cat==='Roasted Beans')return 'GST-free — <b>'+money(invLineTotal(it))+'</b>';
  return 'Ex '+money(invEx(it))+' · GST '+money(invGstLine(it))+' — <b>'+money(invLineTotal(it))+'</b>';
}

  function totalsHTML(){

/* 發票號：app_state 'inv_seq' map {"YYYYMMDD":n}（格式相容 classic）——產生時查最新、成功才寫回＝跨裝置不倒退 */
async function invNextNo(dateStr){
  var d=(dateStr||todayKey()).replace(/-/g,'');
  var map={};
  try{
    var q=await sb.from('app_state').select('value').eq('key','inv_seq').maybeSingle();
    var v=q.data&&q.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
    if(v&&typeof v==='object')map=v;
  }catch(e){}
  var n=(parseInt(map[d],10)||0)+1;
  return {no:'INV-'+d+'-'+String(n).padStart(3,'0'),commit:async function(){
    map[d]=n;
    try{await sb.from('app_state').upsert({key:'inv_seq',value:map,updated_at:new Date().toISOString()},{onConflict:'key'});}catch(e){}
  }};
}

  var rows=[];

      if(invHasHandle(it))rows.push({desc:'Handling fee',cat:'GST inc $5.00 / item',qty:1,unit:INV_HANDLE/1.1,amt:INV_HANDLE/1.1});
    }else if(it.cat==='Roasted Beans'){
      if(invRaw(it)>0||it.desc)rows.push({desc:(it.desc||'Roasted beans')+(it.pack?' · '+it.pack:''),cat:'Roasted Beans  (GST-free)',qty:q,unit:(parseFloat(it.unit)||0),amt:invRaw(it)});
    }else{
      if(invRaw(it)>0||it.desc){var ex=invEx(it);rows.push({desc:it.desc||it.cat,cat:it.cat,qty:q,unit:(q?ex/q:ex),amt:ex});}

/* ===== Finance P&L 財務總覽（缺口 #4，自 classic openFinance/renderFinance 移植，口徑一模一樣）=====
   唯讀儀表板：本月/上月已收（paid 依 created_at 分桶，UTC YYYY-MM、上月用 15 號防跨月）、
   未收全累加（pending_payment/overdue，只讀持久化的 overdue 標記——轉換仍在 Orders 流程）、
   生豆庫存價值 Σ(quantity×cost_per_kg)（q>0 且有價；未定價另計提示）、本月買豆（ordered_at||created_at）。
   orders/beans 用記憶體（loadAll 已排除 Cancelled）；purchases 當場查。錢的 gate＝rsMoney（磁貼區已 gate，這裡再擋一次保險）。 */
async function openPnlSheet(){
  if(!rsMoney()){roToast();return;}
  openDrawerHTML('<div class="t" style="font-size:19px">P&L</div><div class="empty" style="margin-top:16px">Loading…</div>');
  var pos=[];
  try{var pq=await sb.from('purchases').select('name,kg,cost_per_kg,status,ordered_at,created_at');pos=pq.data||[];}catch(e){}
  var ym=function(d){return String(d||'').slice(0,7);};
  var now=new Date(),thisM=now.toISOString().slice(0,7);
  var lastD=new Date(now.getFullYear(),now.getMonth()-1,15),lastM=lastD.toISOString().slice(0,7);
  /* ① 收入：已收款訂單（照下單月份分桶）——DB.orders 已排除 Cancelled */
  var inThis=0,nThis=0,inLast=0,nLast=0,outSum=0,outRows=[];
  (DB.orders||[]).forEach(function(o){
    var m=ym(o.created_at),t=Number(o.total)||0;
    if(o.payment_status==='paid'){
      if(m===thisM){inThis+=t;nThis++;}else if(m===lastM){inLast+=t;nLast++;}
    }else if(o.payment_status==='pending_payment'||o.payment_status==='overdue'){
      outSum+=t;outRows.push(o);
    }
  });
  outRows.sort(function(a,b){return daysSince(b.created_at)-daysSince(a.created_at);});
  /* ② 庫存價值＋本月採購 */
  var stockVal=0,nPriced=0,nUnpriced=0;
  (DB.beans||[]).forEach(function(b){
    var q=Number(b.quantity)||0;if(q<=0)return;
    var c=parseFloat(b.cost_per_kg);
    if(isNaN(c)){nUnpriced++;return;}
    stockVal+=q*c;nPriced++;
  });
  var buyThis=0,nBuy=0;
  pos.forEach(function(p){
    if(p.status==='cancelled')return;
    if(ym(p.ordered_at||p.created_at)!==thisM)return;
    var v=(Number(p.kg)||0)*(parseFloat(p.cost_per_kg)||0);
    if(v>0){buyThis+=v;nBuy++;}
  });
  var card=function(title,badge,big,sub){
    return '<div style="border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-top:8px">'

/* ===== Payroll PDF（時數＋費率＋金額＋Cash/Bank＋總計；只有 director/finance 出鈕；jsPDF 引擎重用 menusPDF 載入器）===== */
async function genPayPDF(ws,btn){
  var w=null;PAY_WK.forEach(function(x){if(x.ws===ws)w=x;});
  if(!w)return;
  if(btn){btn.disabled=true;btn.textContent='Drawing…';}
  try{
    var doc=await menusPDF(function(logo){return buildPayPDF(w,logo);});
    doc.save('Ratio_Payroll_'+w.ws+'.pdf');
    toast('Payroll PDF ✓');
  }catch(e){alert('PDF failed: '+(e&&e.message||e));}
  if(btn){btn.disabled=false;btn.textContent='Download PDF';}

function buildPayPDF(w,logo){
  var JS=window.jspdf.jsPDF;
  var doc=new JS({orientation:'portrait',unit:'pt',format:'a4'});
  var W=doc.internal.pageSize.getWidth();   /* ~595 */
  var xR=W-48, x0=48;
  var INK=[30,26,25], MUTE=[120,116,112], LINE=[221,216,212], ACC=[150,52,70];
  /* 欄位錨點（數字欄右對齊到 right edge；欄距經 getTextWidth 校過不重疊，含四位數金額） */
  var cWd=x0+252, cWe=x0+307, cRate=x0+317, cWage=xR-77, cPaid=xR-62;
  var y=64;
  if(logo){try{var lw=30,lh=logo.height*(lw/logo.width);doc.addImage(logo,'PNG',x0,y-22,lw,lh);}catch(e){}}
  var tx=logo?x0+40:x0;
  doc.setTextColor.apply(doc,INK);doc.setFont('helvetica','bold');doc.setFontSize(17);doc.text('Ratio Coffee',tx,y);
  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor.apply(doc,MUTE);doc.text('Payroll',tx,y+15);
  var wsD=rsDMY(rsDateFor(w.ws,0))+' – '+rsDMY(rsDateFor(w.ws,6))+' '+String(w.ws).slice(0,4);
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor.apply(doc,INK);doc.text(wsD,xR,y,{align:'right'});
  var now=new Date();
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor.apply(doc,MUTE);
  doc.text('generated '+now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear(),xR,y+15,{align:'right'});
  y+=42;
  /* 表頭 */
  doc.setFontSize(8.5);doc.setTextColor.apply(doc,MUTE);doc.setFont('helvetica','bold');
  doc.text('STAFF',x0,y);doc.text('WEEKDAY',cWd,y,{align:'right'});doc.text('WEEKEND',cWe,y,{align:'right'});
  doc.text('RATE (wd / we)',cRate,y);doc.text('WAGE',cWage,y,{align:'right'});doc.text('PAID',cPaid,y);
  y+=6;doc.setDrawColor.apply(doc,INK);doc.setLineWidth(0.8);doc.line(x0,y,xR,y);y+=18;
  /* 每人一列 */
  var ppl=rsWeekHours(w.shifts),totWd=0,totWe=0,totWage=0;
  ppl.forEach(function(p){
    var r=PAY_RATES[p.name]||{},meta=PAY_META[w.ws]||{cash:[]};
    var hasRate=(r.wd!=null||r.we!=null),amt=p.wd*(Number(r.wd)||0)+p.we*(Number(r.we)||0);
    var isCash=(meta.cash||[]).indexOf(p.name)>-1;
    totWd+=p.wd;totWe+=p.we;if(hasRate)totWage+=amt;
    doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor.apply(doc,INK);
    doc.text(String(p.name),x0,y);
    doc.setFontSize(10.5);
    doc.text(rsHH(p.wd),cWd,y,{align:'right'});doc.text(rsHH(p.we),cWe,y,{align:'right'});
    doc.setTextColor.apply(doc,MUTE);doc.setFontSize(9.5);
    doc.text(hasRate?('$'+(r.wd!=null?r.wd:'—')+' / $'+(r.we!=null?r.we:'—')):'no rate',cRate,y);
    doc.setFontSize(11);
    if(hasRate){doc.setFont('helvetica','bold');doc.setTextColor.apply(doc,INK);doc.text('$'+amt.toFixed(2),cWage,y,{align:'right'});}
    else{doc.setTextColor.apply(doc,MUTE);doc.text('—',cWage,y,{align:'right'});}
    doc.setFont('helvetica','normal');doc.setFontSize(9.5);
    if(isCash){doc.setTextColor.apply(doc,ACC);doc.text('Cash',cPaid,y);}else{doc.setTextColor.apply(doc,MUTE);doc.text('Bank',cPaid,y);}
    y+=8;doc.setDrawColor.apply(doc,LINE);doc.setLineWidth(0.5);doc.line(x0,y,xR,y);y+=17;
  });
  /* 總計 */
  y+=4;doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor.apply(doc,INK);
  doc.text('Total',x0,y);
  doc.text(rsHH(Math.round(totWd*10)/10),cWd,y,{align:'right'});
  doc.text(rsHH(Math.round(totWe*10)/10),cWe,y,{align:'right'});
  doc.text('$'+totWage.toFixed(2),cWage,y,{align:'right'});
  return doc;
}
/* 週薪務加總（時數＋薪水＋人數；下載/寄信共用） */
function payTotals(w){
  var ppl=rsWeekHours(w.shifts),totWd=0,totWe=0,totWage=0;
  ppl.forEach(function(p){var r=PAY_RATES[p.name]||{};totWd+=p.wd;totWe+=p.we;if(r.wd!=null||r.we!=null)totWage+=p.wd*(Number(r.wd)||0)+p.we*(Number(r.we)||0);});
  return {staff:ppl.length,totWd:Math.round(totWd*10)/10,totWe:Math.round(totWe*10)/10,totWage:Math.round(totWage*100)/100};
}

var CX={mode:'retail',pots:4,bean:30,greenKg:10,shrink:13,cbag:0,cstick:0,cbox:0,packRate:30,packSpeed:60,venue:125,staff:50,transport:100,pkg:0,wsPrice:12,wsQty:20,pkgs:[{g:150,p:25},{g:250,p:25}],costsOpen:false};

var CX_LOADED=false,CX_SAVE_T=null;

function cxBase(){

function cxResults(){

    return '<div class="cx-note'+(moqMet?' ok':'')+'">'+(moqMet?'Meets $150 MOQ · free delivery':'Under $150 MOQ · +$20 delivery (needs $'+(MOQ-subtotal).toFixed(2)+' more)')+'</div>'

function openContactEdit(c){
  var isNew=!c;
  var p=c||{name:'',type:CTS.type||'Supplier',company:'',address:'',email:'',phone:'',notes:''};
  var typeOpts=CONTACT_TYPES.map(function(t){return '<option'+(t===p.type?' selected':'')+'>'+t+'</option>';}).join('');
  var ro=!canWrite();
  openDrawerHTML('<div class="t" style="font-size:19px">'+(isNew?'New contact':esc(p.name||'Contact'))+'</div>'
    +'<div class="dlab">Type</div><select class="din" id="cts-type"'+(ro?' disabled':'')+'>'+typeOpts+'</select>'
    +'<div class="dlab">Name</div><input class="din" id="cts-name" type="text" value="'+esc(p.name||'')+'" placeholder="Contact name"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Company</div><input class="din" id="cts-company" type="text" value="'+esc(p.company||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Address</div><input class="din" id="cts-address" type="text" value="'+esc(p.address||'')+'" placeholder="Street, suburb STATE postcode"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Email</div><input class="din" id="cts-email" type="email" value="'+esc(p.email||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Phone</div><input class="din" id="cts-phone" type="tel" value="'+esc(p.phone||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Notes</div><textarea class="din" id="cts-notes" rows="2"'+(ro?' readonly':'')+'>'+esc(p.notes||'')+'</textarea>'
    +'<div class="s" id="cts-msg" style="margin-top:8px"></div>'
    +(ro?'':'<button class="act" id="cts-save">Save</button>')
    +(isNew||ro?'':'<button class="dclose" id="cts-del" style="color:var(--danger)">Delete this contact</button>')
    +'<button class="dclose" id="cts-back" style="border:none;background:none;color:var(--muted)">‹ Back to Contacts</button>');
  var sv=$('cts-save');if(sv)sv.addEventListener('click',async function(){
    var g=function(id){return ($(id).value||'').trim();};
    var rec={type:$('cts-type').value,name:g('cts-name'),company:g('cts-company')||null,address:g('cts-address')||null,email:g('cts-email')||null,phone:g('cts-phone')||null,notes:g('cts-notes')||null};
    var msg=$('cts-msg');
    if(!rec.name){msg.innerHTML='<span class="red">Name is required</span>';return;}
    sv.disabled=true;sv.textContent='Saving…';
    if(isNew){
      var ins=await sb.from('contacts').insert(rec).select();
      if(ins.error){sv.disabled=false;sv.textContent='Save';msg.innerHTML='<span class="red">Save failed: '+esc(ins.error.message)+'</span>';return;}
      if(ins.data&&ins.data[0])CTS.list.push(ins.data[0]);
      logAct('added contact',rec.name);
    }else{
      var up=await sb.from('contacts').update(rec).eq('id',c.id);
      if(up.error){sv.disabled=false;sv.textContent='Save';msg.innerHTML='<span class="red">Save failed: '+esc(up.error.message)+'</span>';return;}
      var i=CTS.list.findIndex(function(x){return String(x.id)===String(c.id);});if(i>-1)CTS.list[i]=Object.assign({},CTS.list[i],rec);
      logAct('edited contact',rec.name);
    }
    CTS.list.sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});
    toast('Saved ✓');renderContactsList();
  });
  var del=$('cts-del');if(del)del.addEventListener('click',async function(){
    if(!confirm('Delete "'+(p.name||'')+'"? This cannot be undone.'))return;
    var r=await sb.from('contacts').delete().eq('id',c.id);

    logAct('deleted contact',p.name||'');
    toast('Deleted');renderContactsList();
  });

    }catch(e){b.disabled=false;b.textContent='Create account';msg.innerHTML='<span class="red">Failed: '+esc(e&&e.message||e)+'</span>';}

    var nm=(b.name||'').trim();if(!nm)return;var proc=(b.process||'').trim();var val=blPartVal(nm,proc);
    var sel=(val===selVal)?' selected':'';if(sel)matched=true;

  });

  return o;

function blTotal(bl){return ((bl&&bl.parts)||[]).reduce(function(s,p){var v=parseFloat(p.pct);return s+(isNaN(v)?0:v);},0);}

  parts.forEach(function(p){
    var nm=(p.bean||'').trim();if(!nm)return;var pct=parseFloat(p.pct);if(isNaN(pct))return;
    /* ID 優先（2026-07-15）：成分成本認 bean_id，退名字＋處理法 */
    var b=(p.bean_id!=null&&String(p.bean_id).trim()!=='')?(DB.beans||[]).find(function(x){return String(x.id)===String(p.bean_id);}):null;
    if(!b)b=(DB.beans||[]).find(function(x){return (x.name||'').trim()===nm&&(x.process||'').trim()===String(p.process||'').trim();})
        ||(DB.beans||[]).find(function(x){return (x.name||'').trim()===nm;});
    if(!b||b.cost_per_kg==null||b.cost_per_kg==='')return;

/* Save：重名擋存 → upsert blends → 刪本地移除的 → rename cascade relink 三張歷史表（照抄 classic renderBlending）*/
async function recipeSave(){
  var defs=RCP.defs,sv=$('rcp-saved');
  var dups=blDupNames(defs);
  if(Object.keys(dups).length){if(sv){sv.textContent='⚠️ Blend names must be unique';sv.style.color='var(--accent)';sv.style.opacity='1';}paintRecipe();return;}
  var btn=$('rcp-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var renames=[];
  defs.forEach(function(bl){var nn=(bl.name||'').trim(),on=(bl.hname||'').trim();if(!nn)return;if(!on){bl.hname=nn;return;}if(on!==nn)renames.push({bl:bl,o:on,n:nn});});
  var now=new Date().toISOString();
  var rows=defs.map(function(b,i){if(!b.id)b.id=blUid();return {id:b.id,name:b.name||'',hname:b.hname||null,parts:Array.isArray(b.parts)?b.parts:[],note:b.note||null,comment:b.comment||null,brew:(b.brew&&typeof b.brew==='object')?b.brew:null,pos:i,updated_at:now};}).filter(function(r){return !!r.id;});
  try{
    if(rows.length){var up=await sb.from('blends').upsert(rows,{onConflict:'id'});if(up.error)throw new Error(up.error.message);}
    var keep={};rows.forEach(function(r){keep[r.id]=1;});
    var gone=(RCP.knownIds||[]).filter(function(id){return !keep[id];});
    if(gone.length){var dl=await sb.from('blends').delete().in('id',gone);if(dl.error)throw new Error(dl.error.message);}
    for(var ri=0;ri<renames.length;ri++){
      var rn=renames[ri];
      var e1=(await sb.from('roasts').update({bean_name:rn.n}).eq('bean_name',rn.o)).error;
      var e2=(await sb.from('samples').update({sample_id:rn.n}).eq('sample_id',rn.o)).error;
      var e3=(await sb.from('product_sync').update({bean_id:rn.n}).eq('bean_id',rn.o)).error;
      if(e1||e2||e3)throw new Error((e1||e2||e3).message);
      (DB.roasts||[]).forEach(function(r){if((r.bean_name||'')===rn.o)r.bean_name=rn.n;});
      (DB.samples||[]).forEach(function(s){if((s.sample_id||'')===rn.o)s.sample_id=rn.n;});
      rn.bl.hname=rn.n;
    }
    RCP.knownIds=Object.keys(keep);
    logAct('edited blends',rows.length+' blends'+(renames.length?(', '+renames.length+' renamed'):''),null);
    if(btn){btn.disabled=false;btn.textContent='Save recipe';}
    if(sv){sv.textContent='✓ Saved';sv.style.color='var(--muted)';sv.style.opacity='1';setTimeout(function(){if(sv)sv.style.opacity='0';},1800);}
    toast('Saved ✓');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Save recipe';}
    alert('Save failed: '+(e&&e.message||e));
  }
}

function vapidBytes(){
  var s=VAPID_PUBLIC, pad='='.repeat((4-s.length%4)%4);
  var b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  return a;
}

   2026-07-10 從 classic 移植（classic 原 IIFE ~L2521/L2558）——根網址換由新殼服務後，
   實體 QR（罐標/袋標/資訊卡）與 email 連結由這裡接手。overlay 蓋在 app 上層，不擋 boot */
function sampleRadarSVG(s,force,col){
  /* col＝這支豆的罐標點色（Coffee Info 的 rtl_dot，public-bean 帶出）；沒有就退回玫瑰主色 */
  col=col||'#C87E8E';
  var m=/^#?([0-9a-f]{6})$/i.exec(String(col));
  var fillA=m?('rgba('+parseInt(m[1].slice(0,2),16)+','+parseInt(m[1].slice(2,4),16)+','+parseInt(m[1].slice(4,6),16)+',0.18)'):'rgba(178,94,106,0.18)';
  var axes=[['fragrance','Fragrance'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
  if(!force&&!axes.some(function(a){return s[a[0]]!=null;}))return '';
  var W=232,H=176,cx=W/2,cy=H/2+4,R=46,n=axes.length;
  function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
  function poly(r){return axes.map(function(_,i){var p=pt(i,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
  var grid='';[1,2,3].forEach(function(l){grid+='<polygon points="'+poly(R*l/3)+'" fill="none" stroke="rgba(128,120,115,0.22)" stroke-width="1"/>';});
  var spokes='';for(var i=0;i<n;i++){var p=pt(i,R);spokes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(128,120,115,0.18)" stroke-width="1"/>';}
  var dpts=axes.map(function(a,i){var v=(s[a[0]]==null?0:s[a[0]]);return pt(i,R*(v/3));});
  var dpoly=dpts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dots=dpts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2" fill="'+col+'"/>';}).join('');
  var labels='';axes.forEach(function(a,i){
    var lp=pt(i,R+15),anc=(lp[0]<cx-2?'end':(lp[0]>cx+2?'start':'middle'));
    labels+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+3).toFixed(1)+'" font-size="9" font-weight="700" fill="#8C8079" text-anchor="'+anc+'">'+a[1]+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">'
    +grid+spokes
    +'<polygon points="'+dpoly+'" fill="'+fillA+'" stroke="'+col+'" stroke-width="1.6" stroke-linejoin="round"/>'
    +dots+labels+'</svg>';
}

/* ── Beans 監控室：唯讀看板＋唯一寫入口 Log roast（開現成抽屜，零新寫入邏輯）。
   統計卡×2（生豆支數/kg/總價值、烘焙 pass/downgraded）＋生產線關卡燈（每活批次一列，燈序 Roast→QC→Shelf）。
   全部即時從 DB.* 記憶體算；上架比對照鐵律「豆名＋處理法」雙鍵（product_sync.bean_id 存豆名字串非 uuid） ── */
function renderBeans(){
  $('deck').style.display='none';
  $('hcnt').textContent='production line';
  var beans=DB.beans||[], roasts=DB.roasts||[], syncs=DB.syncs||[];
  /* 統計：生豆 */
  var inStock=beans.filter(function(b){return (+b.quantity||0)>0;});
  var greenKg=0, greenVal=0;
  inStock.forEach(function(b){var q=+b.quantity||0;greenKg+=q;if(b.cost_per_kg!=null&&b.cost_per_kg!=='')greenVal+=q*(+b.cost_per_kg||0);});
  /* 統計：熟豆（pass/downgraded 全歷史計數） */
  var passN=0, dgN=0;
  roasts.forEach(function(r){var s=qcState(r);if(s==='pass')passN++;else if(s==='downgrade')dgN++;});
  var valLine=rsMoney()?'<div class="beans-sub"><b>$'+Math.round(greenVal).toLocaleString('en-US')+'</b> stock value</div>':'';
  var cards='<div class="beans-stats">'
    +'<div class="beans-card"><div class="beans-ct">Green beans</div><div class="beans-big">'+inStock.length+'<small>coffees</small></div><div class="beans-sub"><b>'+(Math.round(greenKg*10)/10)+' kg</b> in stock</div>'+valLine+'</div>'
    +'<div class="beans-card"><div class="beans-ct">Roasted</div><div class="beans-big">'+roasts.length+'<small>roasts</small></div><div class="beans-sub"><span class="beans-dot" style="background:var(--green)"></span><b>'+passN+'</b> passed</div><div class="beans-sub"><span class="beans-dot" style="background:var(--fin)"></span><b>'+dgN+'</b> downgraded</div></div>'
    +'</div>';
  /* 生產線：活批次＝還有貨（remaining_kg null＝烘了未秤，也算在場） */
  var live=roasts.filter(function(r){return r.remaining_kg==null||+r.remaining_kg>0;});
  live.sort(function(a,b){return String(b.roast_date||'').localeCompare(String(a.roast_date||''));});
  var onShelf=function(r){var nm=String(r.bean_name||'').trim().toLowerCase(),pk=procKey(r.process);return syncs.some(function(s){return s.status==='synced'&&String(s.bean_id||'').trim().toLowerCase()===nm&&procKey(s.process)===pk;});};
  /* 燈重定義（2026-07-16 老闆定案）：左＝Cupping（紅＝還沒杯測）、中＝Shelf（紅＝還沒上架）、
     右＝全部完成才綠；三顆全紅＝downgraded（點擊行為晚點再議）。
     紅燈可點＝點卡跳到出問題的地方：左紅→QC、中紅→Publish。 */
  var row=function(r,l1,l2,l3,act){
    var kg=(r.remaining_kg==null)?'not weighed yet':((Math.round(+r.remaining_kg*100)/100)+' kg left');
    var sub=[(r.kind==='blend'?'blend':''),r.process,r.roast_date,kg].filter(Boolean).join(' · ');

  };
  var gQC=[], gReady=[], gShelf=[], gBlend=[];
  live.forEach(function(r){
    var st=qcState(r);
    if(st==='pending')gQC.push(row(r,'now','','','qc'));
    else if(st==='downgrade')gBlend.push(row(r,'now','now','now',''));
    else if(onShelf(r))gShelf.push(row(r,'ok','ok','ok',''));
    else gReady.push(row(r,'ok','now','','pub'));
  });
  var sec=function(t,arr){return '<div class="beans-sec">'+t+'<span class="n">'+arr.length+'</span></div>'+(arr.length?arr.join(''):'<div class="beans-none">Nothing here right now.</div>');};

    +'<div class="beans-legend">Lights: Cupping → Shelf → Done · all green = nothing to do · red = tap to fix · all red = downgraded</div>';
  $('main').innerHTML='<div class="beans-wrap">'+cards+lhead
    +sec('In QC',gQC)+sec('Ready to shelf',gReady)+sec('On shelf',gShelf)+sec('Blend pool',gBlend)+'</div>';
  var rb=$('beans-roast');
  if(rb)rb.addEventListener('click',function(){openRoastSheet(null);});
  /* 紅燈卡點擊：左紅（沒杯測）→ QC 抽屜（帶對 single/blend 分頁）；中紅（沒上架）→ Publish */
  document.querySelectorAll('#main [data-bact]').forEach(function(el){el.addEventListener('click',function(){

    if(el.dataset.bact==='pub'){openPublishSheet();return;}
  });});
}

/* 分類（老闆定的四格）：Blend＝有配方；Co-ferment＝culturing/co-ferment 類；Innovation＝實驗處理法；其餘 Classic */
/* 店面分類（2026-07-12 老闆定調）：拼配→Blend、其餘單品→Single origin、訂閱→自己的 tab。
   舊 Classic/Innovation/Co-ferment（靠 process 正則細分單品）合併成 Single origin——客人更好懂 */
var SHOP_CATS=[['blend','Blend'],['single','Single origin'],['subscription','Subscription']];
var SHOP_CAT='blend', SHOP_BEANS=[];
function shopCategory(b){

/* 店面主體：左右滑輪播（scroll-snap，一頁一支豆）＋圓點指示；tab 切分類重畫 */
function renderShopTabs(){
  var el=$('shoptabs');
  var counts={};SHOP_BEANS.forEach(function(b){var c=shopCategory(b);counts[c]=(counts[c]||0)+1;});
  /* 訂閱算成一個有貨分類（升級成獨立 tab）：有訂閱商品＋非批發模式才出現 */
  if(!WS_MODE&&SHOP_SUBS.length)counts['subscription']=SHOP_SUBS.length;
  var visible=SHOP_CATS.filter(function(c){return counts[c[0]];});
  if(!counts[SHOP_CAT])SHOP_CAT=visible.length?visible[0][0]:SHOP_CAT;

  el.innerHTML=visible.map(function(c){return '<button data-sct="'+c[0]+'" class="'+(SHOP_CAT===c[0]?'on':'')+'">'+c[1]+'</button>';}).join('');

function paintShopBody(){
  var host=$('shopbody');if(!host)return;
  document.querySelectorAll('#shoptabs [data-sct]').forEach(function(b){b.classList.toggle('on',b.dataset.sct===SHOP_CAT);});
  /* 訂閱分頁（獨立 tab）：只畫訂閱卡，不再掛在別的分類底下 */
  if(SHOP_CAT==='subscription'){
    host.innerHTML=shopSubCardHTML()||'<div class="empty">No subscriptions right now ☕</div>';
    wireSubCard(host);paintCartBar();return;
  }
  var list=SHOP_BEANS.filter(function(b){return shopCategory(b)===SHOP_CAT;});
  if(!list.length){
    host.innerHTML='<div class="empty">Nothing in this corner right now ☕</div>';
    paintCartBar();return;
  }
  host.innerHTML='<div class="shopwrap" id="shopwrap">'+shopCardsHTML(list)+'</div>'
    /* 玻璃箭頭放 shopbody 裡：離開商店畫面（innerHTML 換掉）就自動消失 */
    +(list.length>1
      ?'<button class="shoparr l" id="sharr-l" aria-label="Previous coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'
      +'<button class="shoparr r" id="sharr-r" aria-label="Next coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'
      :'')
  ;
  wireShopCards(host);
  paintCartBar();
  var w=$('shopwrap');
  if(w&&list.length>1){
    var slideW=function(){return w.children[0]?(w.children[0].offsetWidth+14):w.clientWidth;};
    var arrPaint=function(){
      var i=Math.round(w.scrollLeft/slideW());
      var l=$('sharr-l'),r=$('sharr-r');if(!l||!r)return;
      l.style.display=i>0?'flex':'none';
      r.style.display=i<list.length-1?'flex':'none';
    };
    /* smooth scrollBy 在 scroll-snap 容器會被吃掉（實測不動）→ rAF 手動滑，結尾 snap 自己吸正 */
    var glide=function(dx){
      var from=w.scrollLeft,t0=null;
      var step=function(ts){
        if(t0==null)t0=ts;
        var p=Math.min(1,(ts-t0)/260);p=1-Math.pow(1-p,3);
        w.scrollLeft=from+dx*p;
        if(p<1)requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    };
    $('sharr-l').addEventListener('click',function(){glide(-slideW());});
    $('sharr-r').addEventListener('click',function(){glide(slideW());});
    w.addEventListener('scroll',arrPaint,{passive:true});
    arrPaint();
  }
}
/* 規格明細列（Blend 或 Process/Origin/Variety/Cup/Bag/Roasted）——主卡瘦身後只在明細抽屜用 */
function shopSpecsFor(b){
  var specs=[];
  if(b.recipe&&b.recipe.length)specs.push(['Blend',b.recipe.map(function(p){return esc(p.bean)+' '+p.pct+'%';}).join(' · ')]);
  else if(b.process)specs.push(['Process',esc(b.process)]);
  if(b.origin)specs.push(['Origin',esc(b.origin)]);
  if(b.variety)specs.push(['Variety',esc(b.variety)]);
  if(b.comment)specs.push(['Cup',esc(b.comment)]);
  specs.push(['Bag',(b.grams||250)+'g whole beans']);
  if(b.roast_date){
    var age=daysSince(b.roast_date);
    /* 對客人講人話：<3週 aging（醒豆中）、3–6週 ready（最佳賞味）、>6週 fading（店內紅綠黃是營運視角） */
    var band=age<SHELF_FRESH_REST?'aging':(age<=SHELF_FRESH_PRIME?'ready':'fading');
    specs.push(['Roasted',(fmtD(b.roast_date)||'')+' — '+band]);
  }
  return specs;
}

/* 多於一張＝上架時推的社群四連圖（滿版無白邊）；單張＝舊的品牌卡（帶白邊） */
function shopIsPhotoSet(b){return !!(b&&b.images&&b.images.length>1);}
function openShopDetailSheet(name){
  var b=null;SHOP_BEANS.forEach(function(x){if(!b&&x.name===name)b=x;});
  if(!b)return;
  var chips=(b.flavour||[]).slice(0,3).map(function(f){return '<span class="shop-chip">'+esc(f)+'</span>';}).join('');
  var specs=shopSpecsFor(b);
  var gal=shopIsPhotoSet(b)
    ?'<div class="shopgal">'+b.images.map(function(u,i){return '<img src="'+esc(u)+'" alt="'+esc(b.name)+' '+(i+1)+'" loading="lazy">';}).join('')+'</div>'
    :'';
  openDrawerHTML('<div class="t" style="font-size:19px">'+esc(b.name)+'</div>'
    +(b.sold_out?'<div class="s" style="margin-top:4px;color:var(--danger)">Sold out — the next roast is on its way</div>':'')
    +gal
    +(chips?'<div style="margin-top:10px">'+chips+'</div>':'')
    +'<div style="margin-top:6px">'+specs.map(function(r,ix){
      return '<div class="dl"'+(ix===specs.length-1?' style="border-bottom:none"':'')+'><span class="sl" style="flex:0 0 84px;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;padding-top:2px">'+r[0]+'</span><span style="text-align:right">'+r[1]+'</span></div>';
    }).join('')+'</div>'
    +(b.slug?'<a class="more" style="text-decoration:none;display:block;text-align:center;margin-top:12px" href="/?bean='+encodeURIComponent(b.slug)+'">Brew guide →</a>':'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  $('d-cl').addEventListener('click',closeDrawer);
}
/* C 規格書版（老闆挑的）v2：資訊卡圖滿版（白邊 CSS 裁掉）＋價格＋Details 抽屜列＋購買列 */
/* 批發模式的價格行：批發價在前、零售價劃線在後（賣的就是那個折扣） */
function shopPriceHTML(price,label,retail){
  var strike=(WS_MODE&&retail!=null&&Number(retail)>Number(price))
    ?' <s style="color:var(--muted);font-size:14px;font-weight:400">$'+centAmt(retail)+'</s>':'';
  return '$'+centAmt(price)+strike+'<span style="font-size:13px;color:var(--muted);font-family:Inter,sans-serif"> /'+esc(label)+'</span>';
}
/* 卡片圖區：照片版＝四張橫滑（內層 scroll-snap，滑到底才換豆子）＋圓點；舊品牌卡＝單張 */
function shopImagesHTML(b,bx,so){
  var imgs=shopIsPhotoSet(b)?b.images:(b.image?[b.image]:[]);
  if(!imgs.length)return '';
  var dim=so?' style="opacity:.55;filter:grayscale(.35)"':'';
  var one=function(u,i){return '<img class="shopimg" src="'+esc(u)+'" alt="'+esc(b.name)+'" loading="'+(bx===0&&i===0?'eager':'lazy')+'"'+dim+'>';};
  if(imgs.length<2)return '<div class="shopimghold">'+one(imgs[0],0)+'</div>';
  return '<div class="shopimghold sq">'
    +'<div class="shopslide" data-slide>'+imgs.map(one).join('')+'</div>'
    +'<div class="shopimgdots">'+imgs.map(function(_,i){return '<span'+(i?'':' class="on"')+'></span>';}).join('')+'</div>'
    +'</div>';
}
function shopCardsHTML(beans){
  if(!beans.length)return '<div class="empty">The shelf is being restocked — check back soon ☕</div>';
  return beans.map(function(b,bx){
    var sizes=(b.sizes&&b.sizes.length)?b.sizes:(b.price!=null?[{id:'',label:(b.grams||250)+'g',price:b.price,retail:b.retail}]:[]);
    var s0=sizes[0]||{};
    /* 售罄豆留在菜單上（客人看得到貨在流動——老闆規則 2026-07-08）：圖降飽和＋Sold out 膠章，購買列收起 */
    var so=!!b.sold_out;
    var sizeSeg=(!so&&sizes.length>1)
      ?'<div class="pm-seg" style="margin-top:12px">'+sizes.map(function(s,si){
          return '<button data-sz="'+si+'" data-vid="'+esc(s.id)+'" data-price="'+(s.price!=null?s.price:'')+'" data-retail="'+(s.retail!=null?s.retail:'')+'" data-label="'+esc(s.label)+'"'+(si===0?' class="on"':'')+'>'+esc(s.label)+(s.price!=null?' $'+centAmt(s.price):'')+'</button>';
        }).join('')+'</div>'
      :'';
    return '<div class="card shopc'+(shopIsPhotoSet(b)?' photo':'')+'" data-bean="'+esc(b.name)+'" data-vid="'+esc(so?'':(s0.id||''))+'" data-price="'+(s0.price!=null?s0.price:'')+'" data-label="'+esc(s0.label||'')+'">'
      +shopImagesHTML(b,bx,so)
      +'<div class="shopin">'
      /* 翻頁圓點在圖與價之間：每張卡自帶一排、亮自己那顆（滑到哪張看到的就是哪張的點，不用捲動監聽） */
      +(beans.length>1?'<div class="shopdots" style="margin:0 0 12px">'+beans.map(function(_,i){return '<span'+(i===bx?' class="on"':'')+'></span>';}).join('')+'</div>':'')
      +(so?'<div style="margin:0 0 8px"><span style="display:inline-block;background:var(--tint);color:var(--danger);font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 11px;border-radius:999px">Sold out</span></div>':'')
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px">'
      +'<span class="t" style="font-size:22px">'+esc(b.name)+'</span>'
      +(s0.price!=null?'<span class="t shopprice" style="font-size:19px;white-space:nowrap'+(so?';color:var(--muted)':'')+'">'+shopPriceHTML(s0.price,s0.label||((b.grams||250)+'g'),s0.retail)+'</span>':'')
      +'</div>'
      +sizeSeg
      +(so
        ?'<div class="s" style="margin-top:12px;color:var(--muted)">Sold out — the next roast is on its way</div>'
        :'<div class="no-line" style="margin-top:12px;align-items:center">'
          +'<span class="qty"><button data-shopq="-1">−</button><span class="shopqty">1</span><button data-shopq="1">＋</button></span>'
          +'<button class="act" data-addcart style="flex:1;margin-top:0">Add to cart'+(s0.price!=null?' · $'+centAmt(s0.price):'')+'</button>'
          +'</div>')
      /* Details 放購買列之後：浮動購物車條蓋到的是次要資訊，不是消費動線 */
      +'<div class="dl" data-shopdetail style="margin-top:10px;cursor:pointer;border-bottom:none"><span>Details & brew guide</span><span style="text-align:right;color:var(--muted)">→</span></div>'
      +'</div></div>';
  }).join('');
}
/* 卡片互動：規格段選、數量步進、加入購物車（狀態記在卡片 data-*，不重畫不打斷輪播） */
function wireShopCards(root){
  root.querySelectorAll('.shopc').forEach(function(card){
    function price(){return parseFloat(card.dataset.price)||0;}
    function qty(){return parseInt(card.querySelector('.shopqty')?card.querySelector('.shopqty').textContent:'1',10)||1;}
    function paintBtn(){
      var b=card.querySelector('[data-addcart]');if(!b)return;
      var p=price()*qty();
      b.textContent='Add to cart'+(p?' · $'+centAmt(p):'');
    }
    card.querySelectorAll('[data-sz]').forEach(function(el){el.addEventListener('click',function(){
      card.querySelectorAll('[data-sz]').forEach(function(x){x.classList.toggle('on',x===el);});
      card.dataset.vid=el.dataset.vid;card.dataset.price=el.dataset.price;card.dataset.label=el.dataset.label;
      var pp=card.querySelector('.shopprice');
      if(pp&&el.dataset.price)pp.innerHTML=shopPriceHTML(el.dataset.price,el.dataset.label,el.dataset.retail!==''?el.dataset.retail:null);
      paintBtn();
    });});
    card.querySelectorAll('[data-shopq]').forEach(function(el){el.addEventListener('click',function(){
      var q=Math.max(1,Math.min(cartMaxQty(),qty()+(+el.dataset.shopq)));
      card.querySelector('.shopqty').textContent=q;
      paintBtn();
    });});
    var add=card.querySelector('[data-addcart]');
    if(add)add.addEventListener('click',function(){
      if(!card.dataset.vid){alert('This coffee is not available right now.');return;}
      cartAdd({bean:card.dataset.bean,label:card.dataset.label,vid:card.dataset.vid,price:parseFloat(card.dataset.price)||0,qty:qty()});
      toast('Added to cart ✓');
    });
    var det=card.querySelector('[data-shopdetail]');
    if(det)det.addEventListener('click',function(){openShopDetailSheet(card.dataset.bean);});
    /* 卡片圖的圓點跟著橫滑走。⚠ 別用 rAF 節流——頁面不畫影格時它不會跑，圓點就永遠不動 */
    var slide=card.querySelector('[data-slide]');
    if(slide){
      var dots=card.querySelectorAll('.shopimgdots span'),lastI=0;
      slide.addEventListener('scroll',function(){
        var i=Math.round(slide.scrollLeft/Math.max(1,slide.clientWidth));
        if(i===lastI)return;
        lastI=i;
        dots.forEach(function(d,di){d.classList.toggle('on',di===i);});
      },{passive:true});
    }
  });
}
/* ===== 登入抽屜（帳號＝打開其他功能的鑰匙；照 classic submit 的 signInWithPassword，只登入不註冊）===== */
function openSignInSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Sign in</div>'
    +'<div class="s" style="margin-top:2px">staff and account holders — unlocks your view of the app</div>'
    +'<div class="dlab">Email</div><input class="din" id="si-email" type="email" autocomplete="email" placeholder="you@example.com">'
    +'<div class="dlab">Password</div><input class="din" id="si-pass" type="password" autocomplete="current-password" placeholder="••••••••">'
    +'<div class="s" id="si-msg" style="margin-top:8px"></div>'
    +'<button class="act" id="si-go">Sign in</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  async function go(){
    var email=($('si-email').value||'').trim();
    var pass=$('si-pass').value||'';
    var msg=$('si-msg');
    if(!email||!pass){msg.innerHTML='<span class="red">Enter email and password</span>';return;}
    var b=$('si-go');b.disabled=true;b.textContent='Signing in…';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){
      b.disabled=false;b.textContent='Sign in';
      msg.innerHTML='<span class="red">'+esc(r.error.message||'Sign in failed')+'</span>';
      return;
    }
    closeDrawer();toast('Signed in ✓');
    await boot();
  }
  $('si-go').addEventListener('click',go);
  $('si-pass').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('si-email').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* 沒登入＝店面：豆單直接開門見山（員工從底部小連結登入） */
async function renderPublicMenu(){
  document.body.classList.remove('appview');
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  SHOP_BEANS=await loadShopMenu();
  m.innerHTML='<div id="shopbody"></div>'
    +'<div class="note" style="margin-top:16px"><a href="/?fb=store" style="color:var(--accent)">Tried it? Tell us what you think →</a></div>'
    +'<button class="more" id="pm-staff">Wholesale &amp; staff sign in</button>';
  renderShopTabs();
  paintShopBody();
  var st=$('pm-staff');if(st)st.addEventListener('click',openSignInSheet);
}
/* 客戶登入＝豆單在上、自己的訂單在下＋切員工登入鍵；wholesale 角色＝同門戶換批發菜單＋付款抽屜 */
async function renderCustomerPortal(sess){
  document.body.classList.remove('appview');
  WS_MODE=(ROLE==='wholesale');
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  var email=(sess&&sess.user&&sess.user.email)||'';
  var orders=[],custName='';
  var beansP=WS_MODE?loadWholesaleMenu():loadShopMenu();
  try{
    var cq=await sb.from('customers').select('id,name').ilike('email',email);
    var ids=(cq.data||[]).map(function(c){return c.id;});
    if(cq.data&&cq.data[0])custName=cq.data[0].name||'';
    if(ids.length){
      var oq=await sb.from('orders').select('order_no,status,items,total,payment_status,tracking_no,created_at,payment_link').in('customer_id',ids).neq('status','Cancelled').order('order_no',{ascending:false}).limit(20);
      orders=oq.data||[];
    }
  }catch(e){}
  SHOP_BEANS=await beansP;
  m.innerHTML='<div class="card brief"><span class="tag">'+(WS_MODE?'Wholesale':'Welcome')+'</span>'
    +'<div class="t">'+esc(custName||'Hello')+'</div>'
    +'<div class="s">'+(WS_MODE
      ?'Wholesale account'
      :('Ratio Coffee · on the shelf today'+(email?' · '+esc(email):'')))+'</div>'
    +'<button class="more" id="cp-fb" style="color:var(--inv-t)">Leave feedback</button></div>'
    +'<div id="shopbody"></div>'
    +(orders.length?'<div class="note" style="margin-top:16px">Your orders</div>'+orders.map(function(o,ox){
      var paid=o.payment_status==='paid';
      return '<div class="card"><span class="tag'+(o.status==='Dispatched'?'':' warn')+'">'+esc(o.status||'—')+'</span>'
        +'<div class="t">#'+String(o.order_no||'—').padStart(4,'0')+' · '+money(o.total)+'</div>'
        +'<div class="s">'+esc(itemsLine(o)||'—')+(paid?'':' · awaiting payment')+(o.tracking_no?' · tracking '+esc(o.tracking_no):'')+'</div>'
        +(WS_MODE&&!paid?'<button class="more" data-wspay="'+ox+'">Payment details →</button>':'')
        +'</div>';
    }).join(''):'')
    +'<button class="more" id="cp-staff" style="margin-top:18px">Sign in with another account</button>';
  renderShopTabs();
  paintShopBody();
  m.querySelectorAll('[data-wspay]').forEach(function(b){b.addEventListener('click',function(){openWsPaySheet(orders[+b.dataset.wspay]);});});
  $('cp-fb').addEventListener('click',function(){showFbOverlay('store');});
  /* 登入/開 app 後彈一次批發條款提示（抽屜沒開著才彈，避免蓋掉別的） */
  if(WS_MODE&&!WS_WELCOME_SEEN){WS_WELCOME_SEEN=true;setTimeout(function(){var dr=$('drawer');if(!(dr&&dr.classList.contains('show')))openWsWelcomeSheet(custName);},500);}
  /* 更高權限入口：登出這個客戶 → 原地開登入抽屜換帳號，全程不離開 /new */
  $('cp-staff').addEventListener('click',async function(){
    if(!confirm('Sign out and sign in with another account?'))return;
    try{await sb.auth.signOut();}catch(e){}
    await boot();
    openSignInSheet();
  });
}
/* 三層路由：沒登入＝豆單店面／customer＝客戶門戶／員工四角色＝操作台。
   登入、登出後都重呼叫一次即可換視角（nav/chips 先復位，因為店面與門戶會藏 nav） */
async function boot(){
  /* 付款完成回店面：清購物車＋致謝（Square redirect_url 帶 ?checkout=done 回來） */
  if(/[?&]checkout=done/.test(location.search)){
    try{localStorage.setItem('r2_cart','[]');}catch(e){}
    try{history.replaceState(null,'',location.pathname);}catch(e){}
    setTimeout(function(){toast('Thanks! Your order is on its way to the roastery ☕');},600);
  }
  var nav=document.querySelector('nav');if(nav)nav.style.display='';
  $('shoptabs').style.display='none';
  WS_MODE=false;WS_INFO=null;WS_WELCOME_SEEN=false; /* 批發模式只在 wholesale 門戶內開；員工/店面一律零售車；歡迎彈窗每次登入/開 app 重置 */
  paintCartBar();
  var g=await sb.auth.getSession();
  if(!(g&&g.data&&g.data.session)){
    document.title='Ratio Coffee - Shopping Cart';
    await renderPublicMenu();
    return;
  }
  /* 沒 profile 或沒角色＝客戶（開放客戶登入前的安全預設） */
  ROLE='customer';WHO='';LEAD=false;
  try{
    var p=await sb.from('profiles').select('name,role,lead').eq('id',g.data.session.user.id).single();
    if(p&&p.data){ROLE=p.data.role||'customer';WHO=p.data.name||'';LEAD=!!p.data.lead;}
  }catch(e){}
  if(myRole()==='customer'||myRole()==='wholesale'){document.title='Ratio Coffee - Shopping Cart';await renderCustomerPortal(g.data.session);return;}
  view='feed';filter='all';document.title='Ratio Coffee';
  await reload();
}
(async function init(){await boot();})();
</script></body></html>
