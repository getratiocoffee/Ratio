<style>
:root{--bg:#FFFFFF;--surface:#FFFFFF;--ink:#1A1A1A;--muted:#8A8A8A;--accent:#B25E6A;--tint:#F7EBED;--danger:#C0392B;--line:#ECECEC;--line2:#DADADA;--inv:#1A1A1A;--inv-t:#FFFFFF}
@media(prefers-color-scheme:dark){:root:not(.light){--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#C97783;--tint:#33272A;--danger:#E0685A;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C}}
:root.dark{--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#C97783;--tint:#33272A;--danger:#E0685A;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{margin:0;background:transparent;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding-bottom:170px}
.bglogo{position:fixed;inset:0;z-index:-1;pointer-events:none;background:var(--ink);opacity:.055;

  mask:url(/logo.png) no-repeat center 36% / min(110vw,500px)}
@media(prefers-color-scheme:dark){:root:not(.light) .bglogo{opacity:.09}}
:root.dark .bglogo{opacity:.09}
header{background:var(--bg);color:var(--ink);border-bottom:1.5px solid var(--ink);padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 8px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
/* logo 置中：左右兩欄各 flex:1 平分，中間 logo 恆在正中（右邊不管是購物車或員工狀態字都不影響） */

.wrap{padding:14px 22px 0;max-width:520px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;transition:transform .25s,opacity .25s;touch-action:pan-y;user-select:none;-webkit-user-select:none}

.card.feed{position:relative;border-left:4px solid var(--line);padding:14px 16px;margin-bottom:10px}
.cattag{position:absolute;top:13px;right:14px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.actsm{border:none;border-radius:999px;padding:12px 22px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;cursor:pointer}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.moresm{background:none;border:none;font-size:13.5px;color:var(--muted);padding:8px 0;font-family:inherit;cursor:pointer}
.qlink{background:none;border:none;color:var(--accent);font-size:inherit;font-family:inherit;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
.s1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.brief{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}

.card.brief .more{color:var(--inv-t);opacity:.55}

.card.brief .cattag{color:var(--inv-t);opacity:.65}
.card.brief .moresm{color:var(--inv-t);opacity:.55}
.card.gone{transform:translateX(70%);opacity:0}

.tag.warn{color:var(--accent)}
.t{font-size:19px;font-weight:700;line-height:1.3;font-family:'Fraunces',serif}
.s{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.5}
.red{color:var(--danger);font-weight:600}
.fr-red{color:var(--danger);font-weight:600}
.shopc{padding:0;overflow:hidden}
.shopwrap{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:14px;margin:0 -22px;padding:0 22px;scrollbar-width:none;-webkit-overflow-scrolling:touch}

   裁切盒各留 12px 呼吸邊＝x0 205 w790 / y0 52 h1096。⚠ 數字綁 classic makeSquareCard 預設邊距，改邊距要跟著改 */
.shopimghold{width:100%;aspect-ratio:790/1096;overflow:hidden;position:relative;border-bottom:1px solid var(--line)}

.shopc .shopin{padding:14px 18px 18px}
.shop-chip{background:var(--tint);color:var(--accent);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;display:inline-block;margin:0 6px 6px 0}
.shopc .sl{flex:0 0 84px;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;padding-top:2px}
.fr-green{color:#3F9A66;font-weight:600}
.fr-yellow{color:#C29036;font-weight:600}
.act{display:block;width:100%;border:none;border-radius:10px;padding:16px;font-size:17px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;margin-top:12px;cursor:pointer}
.act:active{opacity:.8}
.act[disabled]{opacity:.45}
.more{display:block;width:100%;text-align:center;font-size:13.5px;color:var(--muted);padding:10px 0 2px;background:none;border:none;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:15px;line-height:1.7}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 22px 2px;max-width:520px;margin:0 auto}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:999px;padding:9px 15px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.chip.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 12px);z-index:30}
nav button{flex:1;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:13px 6px;font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer}
nav button.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.deck{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 76px);background:var(--surface);border-top:1px solid var(--line);padding:12px 22px 10px;z-index:20}
.deck .who{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px}
.deck .who b{color:var(--ink)}
.deck-btns{display:grid;gap:8px;max-width:520px;margin:0 auto}
.big{border:none;border-radius:10px;padding:17px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pair button{border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface)}
.pair .rr{border:1.5px solid var(--ink);color:var(--ink)}
.pair .dn{border:1.5px solid var(--danger);color:var(--danger)}
.qrow{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:10px;cursor:pointer}
.qrow.sel{border:2px solid var(--accent)}
.qrow .t{font-size:18px}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;touch-action:none}
.drawer-bg.show{display:block}
.drawer{position:fixed;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);max-width:476px;margin:0 auto;background:var(--surface);border:1.5px solid var(--ink);border-radius:16px;padding:12px 20px 20px;z-index:50;visibility:hidden;transform:translateY(calc(100% + 120px));transition:transform .28s ease,visibility 0s linear .3s;max-height:78vh;overflow-y:auto;overscroll-behavior:contain}
.drawer.show{visibility:visible;transform:translateY(0);transition:transform .28s ease}
.grab{display:flex;justify-content:center;padding:12px 0 14px;margin:-6px 0 2px;touch-action:none;cursor:grab}
.grab::after{content:'';width:52px;height:5px;border-radius:99px;background:var(--line2)}
.dl{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
.dl span:first-child{color:var(--muted)}
.dl span.red{color:var(--danger)}
.dclose{display:block;width:100%;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;margin-top:16px;cursor:pointer}
.pk-row{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:15px 16px;font-size:16px;font-weight:600;font-family:inherit;margin-top:9px;cursor:pointer}
.pk-row.on{border-color:var(--accent);color:var(--accent)}
.dta{width:100%;min-height:110px;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;resize:vertical}
.dta:focus{border-color:var(--ink)}
.no-line{display:flex;gap:8px;align-items:center;margin-top:8px}
.no-line select{flex:1;min-width:0;border:1.5px solid var(--line2);border-radius:10px;padding:12px 8px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink)}
.no-line .qty{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.no-line .qty button{width:38px;height:44px;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;font-size:19px;font-weight:700;font-family:inherit;cursor:pointer}
.no-line .qty span{min-width:20px;text-align:center;font-weight:700}
.no-price{width:86px;flex:0 0 auto;border:1.5px solid var(--line2);border-radius:10px;padding:12px 10px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none}
.pm-seg{display:flex;gap:8px;margin-top:8px}
.pm-seg button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:13px 6px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.pm-seg button.on{border-color:var(--ink);color:var(--ink)}
.din{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:14px;font-size:17px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px}
.din:focus{border-color:var(--ink)}
.dlab{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:14px}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:150px;background:var(--inv);color:var(--inv-t);border-radius:999px;padding:11px 22px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;z-index:60;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin:6px 14px 0;line-height:1.6}
.search{width:100%;border:1.5px solid var(--line2);border-radius:12px;padding:15px 16px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-bottom:6px}
.search:focus{border-color:var(--ink)}
.gsec{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:18px 2px 8px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tool{border:1px solid var(--line2);background:var(--surface);border-radius:12px;padding:17px 12px;font-size:15px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer;text-align:center}
.tool:active{background:var(--tint)}
.tool small{display:block;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:3px}
.hit{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hit .t{font-size:17px}
.hit .k{flex:0 0 auto;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent)}
</style></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== Ratio 新殼 v1（/new）：真資料版今日流＋QC 工作台＋Tools =====
   舊 app（/index.html）完全不動；同網域共用登入 session。 */
const SUPABASE_URL='https://kjhudxzvidhynpabnalp.supabase.co';
const SUPABASE_KEY='sb_publishable_vt7hUK07u-veHOb4mXGGhQ_wX06qDeQ';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CLASSIC='/index.html';
const ESP_STALE_DAYS=7, GREEN_LOW_KG=5, ORD_OVERDUE_DAYS=7;
const VAPID_PUBLIC='BFPC3UdlUFbYeowrMvVn-eJWjES_PHYuy34_7v7XbgPSb88CRdG5pjyT30Ht-1Ok4C0dj25Ut-ahokw-9STRY9o';
var view='feed', filter='all', selQC=null, ITEMS=[], QCQ=[], ROLE='director', WHO='';
var QCLOCK=true; /* 鎖風味的決定在 QC 當下（老闆定調）：pass＝判定＋鎖風味，判定板可關 */
/* 黑白頁手動切換：auto=跟系統、light/dark=強制；記在本機（顯示偏好本來就該一台一台設） */
function themeGet(){try{return localStorage.getItem('r2_theme')||'auto';}catch(e){return 'auto';}}
function applyTheme(t){
  var el=document.documentElement;
  el.classList.remove('light','dark');
  if(t==='light'||t==='dark')el.classList.add(t);
  try{localStorage.setItem('r2_theme',t);}catch(e){}
}
applyTheme(themeGet());
var DB={orders:[],customers:[],tasks:[],dialins:[],syncs:[],samples:[],roasts:[],beans:[]};
var _drag=0;
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2000);}
function money(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function daysSince(ts){if(!ts)return 0;var d=new Date(ts);return isNaN(d)?0:Math.floor((Date.now()-d)/86400000);}
function fmtD(s){if(!s)return '';var p=String(s).slice(0,10).split('-');return p.length===3?(p[2]+'/'+p[1]):s;}
/* 本地日（雪梨）——跟 todayStr 同步；舊版用 UTC 會讓「明天回來」變成早上 10 點才回來 */
function todayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* 貪睡與晨報收起：存 localStorage，到明天自動失效 */
/* 貪睡改存 app_state（key: new_snooze）＝跨裝置同步：手機睡掉的卡，電腦也不再冒出來；到明天自動失效（只認今天的 key）。全店共用——誰睡掉就是大家都先不看 */
var SNOOZE_ALL={};
function snoozeMap(){return SNOOZE_ALL[todayKey()]||{};}
var SNOOZED_SESSION=0;
function snoozePush(){
  try{sb.from('app_state').upsert({key:'new_snooze',value:SNOOZE_ALL,updated_at:new Date().toISOString()},{onConflict:'key'})
    .then(function(r){if(r&&r.error)console.error('snooze push:',r.error.message||r.error);});}catch(e){}
}
function addSnooze(id){
  var today=todayKey(),m=snoozeMap();m[id]=1;
  SNOOZE_ALL={};SNOOZE_ALL[today]=m; /* 只留今天＝順手清掉舊日期 */
  SNOOZED_SESSION++;
  snoozePush();
}
function undoSnooze(){SNOOZE_ALL={};SNOOZED_SESSION=0;snoozePush();buildItems();render();toast('Brought back');}

async function callFn(name,payload){
  var g=await sb.auth.getSession();var sess=g&&g.data&&g.data.session;
  if(!sess)throw new Error('Signed out');
  var res=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token,'apikey':SUPABASE_KEY},
    body:JSON.stringify(payload)});
  var txt=await res.text();var data;try{data=JSON.parse(txt);}catch(e){data={raw:txt};}
  if(!res.ok)throw new Error((data&&(data.error||data.message))||('HTTP '+res.status));
  return data;
}
function custById(id){return DB.customers.find(function(c){return c.id===id;})||null;}

function mondayStr(){
  var t=new Date();t.setDate(t.getDate()-((t.getDay()+6)%7));
  return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}
function todayShifts(){
  var dk=['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  var sh=(DB.roster&&Array.isArray(DB.roster.shifts))?DB.roster.shifts:[];
  return sh.filter(function(s){return s.day===dk;}).sort(function(a,b){return String(a.start||'')<String(b.start||'')?-1:1;});
}
/* 手上的豆（待杯測）：pending_cupping、沒判定、不在 QC 佇列——Today Cup 卡與 QC 頁 to-cup 區共用 */
function toCupList(){
  var inQC={};QCQ.forEach(function(x){inQC[String(x.r.id)]=1;});
  return (DB.roasts||[]).filter(function(r){return r.status==='pending_cupping'&&!r.qc&&!inQC[String(r.id)];});
}
function matchRoast(s){
  var nm=String(s.sample_id||'').trim().toLowerCase();if(!nm&&!s.bean_id)return null;
  var cands=DB.roasts.filter(function(r){
    if(s.bean_id&&r.bean_id)return String(r.bean_id)===String(s.bean_id);
    return String(r.bean_name||'').trim().toLowerCase()===nm;});
  if(!cands.length)return null;
  if(s.roast_date){var ex=cands.find(function(r){return (r.roast_date||'')===s.roast_date;});if(ex)return ex;}
  return cands[0];
}
function buildItems(){

    var k=s.bean_id?('id:'+String(s.bean_id)):((s.sample_id||'')+'·'+(s.process||'')).toLowerCase();
    if(seen[k])return;seen[k]=1;
    var r=matchRoast(s);
    if(r&&!r.qc){QCQ.push({s:s,r:r});return;}
    /* 上架佇列：QC pass 後未上 Square → List 卡；已上架但風味沒鎖 → Lock 聚合卡 */
    if(r&&r.qc==='pass'){
      var nm=String(s.sample_id||'').trim();if(!nm)return;
      var sync=DB.syncs.find(function(x){return String(x.bean_id||'').trim().toLowerCase()===nm.toLowerCase();});

  /* 晨報 */
  var newQ=DB.orders.filter(function(o){return (o.status||'New')==='New';});
  var packQ=DB.orders.filter(function(o){return o.status==='Confirmed'||o.status==='Roasting';});
  var shipQ=DB.orders.filter(function(o){return o.status==='Ready';});

  var latest={};DB.dialins.forEach(function(d){var k=String(d.coffee||'').trim().toLowerCase();if(k&&!latest[k])latest[k]=d;});
  var stale=[];DB.syncs.forEach(function(x){
    if(x.status!=='synced')return;

  var low=DB.beans.filter(function(b){var t=(b.low_stock_kg==null?GREEN_LOW_KG:Number(b.low_stock_kg));return b.quantity!=null&&t>0&&Number(b.quantity)<=t;});
  var briefBits=[];
  if(newQ.length)briefBits.push(newQ.length+' to accept');

  if(QCQ.length)briefBits.push(QCQ.length+' QC');
  if(stale.length)briefBits.push(stale.length+' dial-in');

  var shifts=todayShifts();

  out.push({id:'brief',st:'Brief',pin:1,t:(new Date().getHours()<12?'Morning':'Today')+' brief',
    s:(rosterNames?'On: '+esc(rosterNames)+(briefBits.length?' · ':''):'')+(briefBits.length?briefBits.join(' · '):(rosterNames?'':'all clear')),act:'Got it',
    det:[['On shift',rosterLine||'no one rostered']].concat([['To accept',String(newQ.length)],['To pack',String(packQ.length)],['To ship',String(shipQ.length)],['QC waiting',String(QCQ.length)],['Dial-in stale',String(stale.length)],['Beans low',String(low.length)],['Open tasks',String(DB.tasks.length)]]),
    roles:['director','roaster','retail','staff'],kind:'dismiss'});
  /* 烘豆需求卡：Confirmed/Roasting 品項同名合併，**先看熟豆貨架只提差額**（老闆的生產線：接單→看熟豆庫存→沒貨才烘）；

  /* 杯測作業全住 QC 分頁（老闆定調：杯測師只在 QC 裡工作）——Today 只留一張導航卡看產能 */

      s:qcNames.slice(0,3).map(esc).join(' · ')+(qcNames.length>3?' · +'+(qcNames.length-3)+' more':''),
      act:'Open QC →',
      det:tocup.map(function(r){return [r.bean_name||'—','to cup · roasted '+(fmtD(r.roast_date)||'—')];})
        .concat(QCQ.map(function(x){return [x.s.sample_id||'—','awaiting verdict · roasted '+(fmtD(x.r.roast_date)||'—')];})),
      det2:'Later',roles:['director','roaster'],kind:'qcnav'});
  }
  /* 上架卡：QC pass、Square 還沒上 → 抽屜定價推上架 */
  LISTQ.forEach(function(s){
    var f=(s.features||[]).slice(0,3).join(', ');
    out.push({id:'list:'+s.id,st:'Shelf',hot:0,t:'List · '+esc(s.sample_id||'—'),

      det2:'Later',roles:['director'],kind:'list',ref:s});
  });
  /* 鎖風味聚合卡：已上架但風味沒鎖（鎖定的紀錄才會優先上資訊卡） */
  if(LOCKQ.length){
    out.push({id:'locks',st:'Shelf',hot:0,t:'Lock flavours — '+LOCKQ.length+' coffee'+(LOCKQ.length>1?'s':''),
      s:LOCKQ.slice(0,3).map(function(x){return esc(x.sample_id);}).join(' · ')+(LOCKQ.length>3?' · +'+(LOCKQ.length-3)+' more':''),
      act:'Lock…',det:LOCKQ.map(function(x){return [x.sample_id,(x.features||[]).slice(0,3).join(', ')||'no flavour notes'];}),

  ITEMS=out.filter(function(i){return !sn[i.id];});

/* 類別色表：低飽和塵彩配紙白玫瑰；色條＋右上角分類＋chips 色點共用 */

/* ===== 真動作 ===== */
async function runAction(id,btn){
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      dropCard(id);toast('Task done ✓');return;
    }
    if(i.kind==='qcnav'){view='qc';render();return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted — no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid ✓ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid ✓ receipt sent');return;
    }
    if(i.kind==='dialin'){openDialinForm(i);return;}
    if(i.kind==='roastlog'){openRoastSheet(Array.isArray(i.ref)?i.ref:null);return;}
    if(i.kind==='cup'){openCupSheet(i);return;}
    if(i.kind==='list'){await openListSheet(i);return;}
    if(i.kind==='locks'){openLocksSheet(i);return;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=i.act;}
    alert((i.act||'Action')+' failed: '+(e&&e.message||e));
  }
}
async function acceptOrder(i,btn){
  var o=i.ref;
  if(btn){btn.disabled=true;btn.textContent='Accepting…';}
  try{
    if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
      try{await callFn('sync-to-square',{action:'payment_link',order_id:o.id});}catch(e){console.error('payment link',e);}
    }
    var u=await sb.from('orders').update({status:'Confirmed'}).eq('id',o.id);
    if(u.error)throw new Error(u.error.message);
    o.status='Confirmed';
    try{await callFn('send-email',{action:'order_confirmation',order_id:o.id});toast('Accepted ✓ confirmation sent');}
    catch(e){toast('Accepted ✓ but email failed');}
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Accept';}
    alert('Accept failed: '+(e&&e.message||e));
  }
}
async function qcVerdict(r,v,btn,cardId,s){
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var u=await sb.from('roasts').update({qc:v}).eq('id',r.id);
  if(u.error){if(btn){btn.disabled=false;}alert('QC failed: '+u.error.message);return;}
  r.qc=v;
  /* pass＋開關開＝杯測紀錄就地鎖風味（資訊卡/上架直接用這筆）；鎖失敗不擋判定，Lock 卡會接住 */
  var locked=false;

/* ===== 抽屜 ===== */
/* 彈窗開著時鎖住背景（iOS 的 overflow:hidden 靠不住 → body 釘住＋記捲動位置，關閉時復原）；
   openDrawerHTML 會被重畫連呼，鎖要冪等——只在第一次開時記位置 */
var _bgLockY=null;
function lockBg(){
  if(_bgLockY!=null)return;
  _bgLockY=window.scrollY||0;
  document.body.style.position='fixed';
  document.body.style.top=(-_bgLockY)+'px';
  document.body.style.left='0';document.body.style.right='0';document.body.style.width='100%';
}
function unlockBg(){
  if(_bgLockY==null)return;
  document.body.style.position='';document.body.style.top='';
  document.body.style.left='';document.body.style.right='';document.body.style.width='';
  window.scrollTo(0,_bgLockY);
  _bgLockY=null;
}
function openDrawerHTML(h){var d=$('drawer');d.innerHTML='<div class="grab"></div>'+h;d.classList.add('show');$('dbg').classList.add('show');lockBg();attachDrawerDrag();}
/* 把手往下拉＝關閉（拉過 90px 放手才關，不足彈回；把手 touch-action:none 不搶內容捲動） */
function attachDrawerDrag(){
  var d=$('drawer'),g=d.querySelector('.grab');if(!g)return;
  var y0=null,dy=0;
  /* iOS Safari 對捲動容器內的 touch-action:none 不一定買帳——手指一動就當捲動、pointercancel 把拖曳殺掉。
     非 passive 的 touchmove preventDefault 硬擋捲動，讓 pointermove 一路活著 */
  g.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  g.addEventListener('pointerdown',function(e){
    y0=e.clientY;dy=0;
    try{g.setPointerCapture(e.pointerId);}catch(err){}
    d.style.transition='none';
  });
  g.addEventListener('pointermove',function(e){
    if(y0==null)return;
    dy=Math.max(0,e.clientY-y0);
    d.style.transform='translateY('+dy+'px)';
  });
  function fin(){
    if(y0==null)return;
    d.style.transition='';d.style.transform='';
    if(dy>90)closeDrawer();
    y0=null;dy=0;
  }
  g.addEventListener('pointerup',fin);
  g.addEventListener('pointercancel',fin);
}
function closeDrawer(){$('drawer').classList.remove('show');$('dbg').classList.remove('show');unlockBg();}
$('dbg').addEventListener('click',closeDrawer);

  function _loadCardIcons(){

    function li(src){return new Promise(function(res){var i=new Image();i.onload=function(){res(i);};i.onerror=function(){res(null);};i.src=src;});}

  }
  function _tintIcon(img,color,h){
    var w=Math.round(h*(img.width/img.height));
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var g=c.getContext('2d');
    g.drawImage(img,0,0,w,h);

  async function makeSquareCard(card){
    try{await document.fonts.ready;}catch(e){}
    var icons=null;try{icons=await _loadCardIcons();}catch(e){}

    var x=cv.getContext('2d');
    var INK='#1E1A19',BERRY='#B25E6A';

    var CX=217,CY=64,CW=W-434,CH=H-128,CR=28;
    /* text-safe zone: mobile portrait hero crops ~200px+ per side, so all text lives in the centre 760px */
    var TSX=275,TEX=W-275,TW2=TEX-TSX;

    var bandCss='rgb('+band.join(',')+')';
    var tc=lum>165?'#282220':'#ffffff';
    var lt='rgb('+band.map(function(v){return Math.round(v+(255-v)*.85);}).join(',')+')';
    var dk='rgb('+band.map(function(v){return Math.round(v*.5);}).join(',')+')';

    x.textBaseline='alphabetic';x.textAlign='left';

    var headH=150;
    x.fillStyle=bandCss;x.fillRect(CX,CY,CW,headH);
    x.font='600 24px Inter, sans-serif';
    var hrW=card.roasted?Math.max(x.measureText('Roasted').width,x.measureText(card.roasted).width):0;
    var nameX=TSX;
    if(icons&&icons.bean){
      var bs=50,bw=bs*(icons.bean.width/icons.bean.height);
      x.drawImage(_tintIcon(icons.bean,tc,600),nameX,CY+(headH-bs)/2,bw,bs);
      nameX+=bw+24;
    }
    var ns=_cardFit(x,card.name,'700',62,34,TEX-nameX-(hrW?hrW+40:0),'Inter, sans-serif');
    x.fillStyle=tc;x.fillText(card.name,nameX,CY+headH/2+ns*.36);
    if(card.roasted){
      x.globalAlpha=.85;x.font='600 24px Inter, sans-serif';x.textAlign='right';
      x.fillText('Roasted',TEX,CY+headH/2-10);

    if(card.comment){
      var subH=76;

      var cs=_cardFit(x,card.comment,'600',30,20,TW2,'Inter, sans-serif');
      x.textAlign='center';x.fillStyle=dk;x.fillText(card.comment,CX+CW/2,cy+subH/2+cs*.36);
      x.textAlign='left';
      cy+=subH;
    }
    /* ===== footer banner: drop icon + flavour, centred as a group ===== */
    var footH=150,footY=CY+CH-footH;
    if(card.flavour&&card.flavour.length){
      x.fillStyle=bandCss;x.fillRect(CX,footY,CW,footH);
      var fl=card.flavour.join('  \u00b7  ');

      if(icons&&icons.drop){dw=ds*(icons.drop.width/icons.drop.height);}

      var sx=TSX;

        var hasPct=(p.pct||p.pct===0);
        csz=Math.min(csz,_cardFit(x,p.bean,'700',34,24,TW2*0.55-(hasPct?115:0),'Inter, sans-serif'));
        if(p.process)csz=Math.min(csz,_cardFit(x,p.process,'400',34,20,TW2*0.42,'Inter, sans-serif'));
      });
      (card.recipe||[]).forEach(function(p){
        var pct=(p.pct||p.pct===0)?String(p.pct)+'%':'';
        if(pct){x.fillStyle=BERRY;x.font='700 '+csz+'px Inter, sans-serif';x.fillText(pct,Lx,ry);}
        x.fillStyle=INK;x.font='700 '+csz+'px Inter, sans-serif';
        x.fillText(p.bean,Lx+(pct?115:0),ry);
        var meta=p.process||'';

      if(o.region)rows.push(['Region',o.region]);
      var csz2=34;
      rows.forEach(function(r){csz2=Math.min(csz2,_cardFit(x,String(r[1]),'400',34,20,TW2-290,'Inter, sans-serif'));});
      rows.forEach(function(r){
        x.fillStyle=INK;x.font='700 '+csz2+'px Inter, sans-serif';x.fillText(r[0],Lx,ry);

async function cardDataFor(s,blendMap,dots){
  var SMAP={fragrance:'Aroma',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
  var cup=['fragrance','acidity','sweetness','body','aftertaste'].map(function(k){return {key:k,label:SMAP[k],n:(s&&s[k]!=null)?s[k]:null};});
  var rdate=s.roast_date||null;
  if(!rdate){
    var hit=null;
    (DB.roasts||[]).forEach(function(r){if(!hit&&s.bean_id&&r.bean_id&&String(r.bean_id)===String(s.bean_id))hit=r.roast_date;});
    (DB.roasts||[]).forEach(function(r){if(!hit&&String(r.bean_name||'')===(s.sample_id||''))hit=r.roast_date;});
    rdate=hit;
  }
  var data={name:s.sample_id||'',color:dotColorFor(s.sample_id,dots),
    flavour:(s.features||[]).filter(Boolean).slice(0,3),cupScores:cup,
    comment:(s.comment||'').trim(),roasted:rdate?fmtD(rdate):''};
  var bd=blendMap[String(s.sample_id||'').trim().toLowerCase()];
  if(bd){
    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    try{
      var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
      var pool=q.data||[];
      var proc=String(s.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* 每支豆現場重畫卡片 → 上傳 mail-assets（upsert + cache-bust）→ 回傳 {小寫名: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

/* ===== 貨架清單（在賣的豆：價格規格/售罄/鎖風味/烘焙新鮮度＋待上架佇列；唯讀）===== */
/* 新鮮度規則（老闆定，2026-07-07）：<14 天紅（還在養豆）、14–28 天綠（最佳）、>28 天黃（老化）；>60 天晨報推警示 */
var SHELF_FRESH_REST=14, SHELF_FRESH_PRIME=28, SHELF_STALE_DAYS=60;
/* 上架代表樣品：鎖定的優先（同名多處理法時＝實際在賣的那個處理法，例如三個 Danche） */
function shelfSampleFor(nm){
  var k=String(nm||'').trim().toLowerCase();
  var pool=(DB.samples||[]).filter(function(s){return String(s.sample_id||'').trim().toLowerCase()===k;});
  return pool.find(function(s){return s.flavour_locked;})||pool[0]||null;
}
function shelfLatestRoast(nm){
  var best=null;
  /* 先照上架樣品的 bean_id 找同一支生豆批的烘豆（同名不同處理法不再互相污染） */
  var s=shelfSampleFor(nm);
  if(s&&s.bean_id){
    (DB.roasts||[]).forEach(function(r){
      if(String(r.bean_id||'')!==String(s.bean_id)||!r.roast_date)return;
      if(!best||r.roast_date>best)best=r.roast_date;
    });
    if(best)return best;
  }
  var k=String(nm||'').trim().toLowerCase();
  (DB.roasts||[]).forEach(function(r){
    if(String(r.bean_name||'').trim().toLowerCase()!==k||!r.roast_date)return;
    if(!best||r.roast_date>best)best=r.roast_date;
  });
  return best;
}
function shelfFreshness(nm){
  var d=shelfLatestRoast(nm);
  if(!d)return {txt:'no roast date',cls:'',days:null};
  var age=daysSince(d);
  if(age<SHELF_FRESH_REST)return {txt:'roasted '+age+'d — resting',cls:'fr-red',days:age};
  if(age<=SHELF_FRESH_PRIME)return {txt:'roasted '+age+'d — prime',cls:'fr-green',days:age};
  return {txt:'roasted '+age+'d — ageing'+(age>SHELF_STALE_DAYS?' · re-roast?':''),cls:'fr-yellow',days:age};
}

/* ===== 熟豆批次清單（照 classic Batch stock：remaining>0、FIFO 最舊先用、>30 天紅、點批次記用量）===== */
function openBatchesSheet(){
  var bats=(DB.roasts||[]).filter(function(r){return Number(r.remaining_kg)>0;});
  var groups={},order=[];
  bats.forEach(function(r){var k=String(r.bean_name||'—').trim(),lk=k.toLowerCase();if(!groups[lk]){groups[lk]={name:k,rows:[]};order.push(lk);}groups[lk].rows.push(r);});
  order.sort(function(a,b){return groups[a].name.localeCompare(groups[b].name);});
  var totKg=0;bats.forEach(function(r){totKg+=Number(r.remaining_kg)||0;});
  var h='';
  order.forEach(function(k){
    var g=groups[k];
    g.rows.sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var tot=0;g.rows.forEach(function(r){tot+=Number(r.remaining_kg)||0;});
    h+='<div class="dlab">'+esc(g.name)+' · '+(Math.round(tot*100)/100)+' kg</div>';
    g.rows.forEach(function(r,idx){
      var age=daysSince(r.roast_date);
      var old=r.roast_date&&age>30;
      var tags=[];
      if(idx===0&&g.rows.length>1)tags.push('use first');
      if(old)tags.push('<span class="red">&gt;30d</span>');
      if(r.qc==='pass')tags.push('QC ✓');else if(r.qc==='reroast')tags.push('<span class="red">re-roast</span>');else if(r.qc==='downgrade')tags.push('downgraded');
      if(r.kind==='blend')tags.push('blend');
      h+='<div class="hit" data-b="'+esc(r.id)+'"><span><div class="t">'+(r.roast_date?fmtD(r.roast_date):'—')+'</div>'
        +'<div class="s">'+(r.roast_date?age+' days old':'no roast date')+(tags.length?' · '+tags.join(' · '):'')+'</div></span>'
        +'<span class="k'+(old?' red':'')+'" style="font-size:15px">'+(Number(r.remaining_kg)||0)+' kg</span></div>';
    });
  });
  openDrawerHTML('<div class="t" style="font-size:19px">Roast batches</div>'
    +'<div class="s" style="margin-top:2px">'+(bats.length?bats.length+' batches · '+(Math.round(totKg*100)/100)+' kg · oldest first — use it first · tap to log usage':'')+'</div>'
    +(h||'<div class="empty">No roasted batches in stock<br>Log the roasted-out kg when roasting — batches land here</div>')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  document.querySelectorAll('#drawer [data-b]').forEach(function(el){el.addEventListener('click',function(){
    var r=bats.find(function(x){return String(x.id)===String(el.dataset.b);});
    if(r)openBatchUse(r);
  });});
  $('d-cl').addEventListener('click',closeDrawer);
}
function openBatchUse(r){
  openDrawerHTML('<span class="tag">Batch</span><div class="t" style="font-size:19px">'+esc(r.bean_name||'—')+(r.roast_date?' · '+fmtD(r.roast_date):'')+'</div>'
    +'<div class="s" style="margin-top:2px">remaining '+(Number(r.remaining_kg)||0)+' kg</div>'
    +'<div class="dlab">Used / sold (kg)</div><input class="din" id="bu-kg" inputmode="decimal" placeholder="e.g. 0.5">'
    +'<button class="act" id="bu-save">Deduct</button>'
    +'<button class="dclose" id="bu-back">‹ Back to list</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  $('bu-save').addEventListener('click',async function(){
    var v=parseFloat(($('bu-kg').value||'').trim());
    if(isNaN(v)||v<=0){toast('Enter the kg used');return;}
    var btn=$('bu-save');btn.disabled=true;btn.textContent='Saving…';
    var nr=Math.max(0,Math.round(((Number(r.remaining_kg)||0)-v)*1000)/1000);

}

async function saveReceiveSheet(){

  if(isNaN(kg)||kg<=0){toast('Enter the received kg');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');

      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;

      if(u.error)throw new Error(u.error.message);

      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* 防重複：同名同處理法已有批次 → 提醒改用 Existing lot 併批 */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;

    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' — '+sup:'')+(lot?' · lot '+lot:'')});}catch(e){}

    alert('Receive failed: '+(e&&e.message||e));
  }
}

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  closeDrawer();toast('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted ✓');
  await reload();
}

async function openCupSheet(i){
  var r=i.ref;
  /* 帶上一次同豆紀錄的風味（DB.samples 已篩 Ratio Coffee、新→舊） */
  var prev=null;
  (DB.samples||[]).forEach(function(s){

  });
  var bean=(DB.beans||[]).find(function(b){return String(b.id)===String(r.bean_id);});
  /* 拉霸永遠有值：上次同豆分數帶入（clamp 1–3），沒有全 2＝Medium */
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(prev?prev[f[0]]:null);});

function cupClamp(v){v=Number(v);if(isNaN(v)||v<=0)return 2;return Math.min(3,Math.max(1,v));}

/* comment 留白時的規則組句（老闆拍板：本機組句不呼叫 AI）：風味詞＋高分感官，總長 ≤30 字元 */
function cupAutoComment(sc,feats){
  sc=sc||{};
  var fl=(feats||[]).filter(Boolean);
  var out=fl.slice(0,2).join(', ');
  if(out.length>22)out=fl[0]||'';
  var cand=[];
  if((sc.acidity||0)>=2.5)cand.push([sc.acidity,'bright']);
  if((sc.sweetness||0)>=2.5)cand.push([sc.sweetness,'sweet']);
  if((sc.body||0)>=2.5)cand.push([sc.body,'syrupy']);
  else if(sc.body&&sc.body<=1.5)cand.push([2,'silky']);
  if((sc.aftertaste||0)>=2.5)cand.push([sc.aftertaste,'long finish']);
  if((sc.fragrance||0)>=2.5)cand.push([sc.fragrance,'perfumed']);
  cand.sort(function(a,b){return b[0]-a[0];});
  var first=true;
  for(var i=0;i<cand.length;i++){
    var sep=out?(first?' · ':', '):'';
    if((out+sep+cand[i][1]).length>30)continue;
    out+=sep+cand[i][1];first=false;
  }
  return out;
}

/* FIFO 消耗成分批次（照 classic consumeBlendComponents）——回傳不夠扣的清單 */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    var pool=(DB.roasts||[]).filter(function(r){
      return r.kind!=='blend'&&Number(r.remaining_kg)>0&&String(r.bean_name||'').trim().toLowerCase()===key;
    }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}

/* ===== 滑卡 ===== */
function attachSwipe(el,id){
  /* 誤觸防護：①方向鎖——先確認是「明確的橫向」才開始滑（斜滑/直捲直接放棄）
     ②門檻加大——要滑過卡片寬度的 35%（做）/ 45%（貪睡）才觸發 */
  var x0=null,y0=0,dx=0,locked=false,dead=false;
  var barC=el.style.borderLeftColor; /* 類別色條：borderColor 清空會連左條一起洗掉，回彈時補回 */
  function reset(anim){el.style.transition=anim?'transform .25s':'none';el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;x0=null;dx=0;locked=false;dead=false;}
  el.addEventListener('pointerdown',function(e){if(e.target.closest('button'))return;x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;try{el.setPointerCapture(e.pointerId);}catch(err){}el.style.transition='none';});
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;return;}
      if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.6)locked=true;
      else return;
    }
    el.style.transform='translateX('+dx*0.9+'px)';
    var w=el.offsetWidth;
    var bc=dx>w*0.25?'var(--accent)':(dx<-w*0.3?'var(--muted)':'');
    el.style.borderColor=bc;
    el.style.borderLeftColor=bc||barC; /* 沒過門檻時左條維持類別色 */
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth;
    if(locked&&dx>w*0.35){var i=item(id);reset(true);if(i)runAction(id,null);}
    else if(locked&&dx<-w*0.45){addSnooze(id);dropCard(id,true);toast('Snoozed — back tomorrow');x0=null;dx=0;locked=false;}

async function saveBackfill(){

      if(rec.bean_id&&s.bean_id)return String(s.bean_id)===String(rec.bean_id);
      return String(s.sample_id||'').trim().toLowerCase()===name.toLowerCase();});

/* 印刷頁雷達：獨立文件用，純字串 SVG（實色不吃 CSS 變數） */
function printRadarSVG(sc,color,mm){
  var K=[['fragrance','Aroma'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
  var cx=150,cy=128,R=88;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  var rings=[1,2,3].map(function(l){
    var p='';for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);p+=(i?'L':'M')+q[0].toFixed(1)+','+q[1].toFixed(1);}
    return '<path d="'+p+'Z" fill="none" stroke="#D9D2CB" stroke-width="1"/>';
  }).join('');
  var spokes=K.map(function(_,i){var q=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="#D9D2CB" stroke-width="1"/>';}).join('');
  var pts=K.map(function(k,i){return pt(i,R*(Number(sc[k[0]])||0)/3);});
  var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dts=pts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="4" fill="'+color+'"/>';}).join('');
  var labels=K.map(function(k,i){
    var q=pt(i,R+20);var anch=q[0]<cx-4?'end':(q[0]>cx+4?'start':'middle');
    return '<text x="'+q[0].toFixed(1)+'" y="'+(q[1]+4).toFixed(1)+'" text-anchor="'+anch+'" font-size="13" font-weight="600" fill="#8A837C" font-family="Inter,sans-serif">'+k[1]+'</text>';
  }).join('');
  return '<svg viewBox="-32 0 364 250" style="width:'+mm+'mm;display:block">'+rings+spokes
    +'<polygon points="'+poly+'" fill="'+color+'" fill-opacity=".15" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round"/>'+dts+labels+'</svg>';
}

/* ===== 推播訂閱（iPhone 要先加入主畫面再啟用）===== */
function vapidBytes(){
  var s=VAPID_PUBLIC, pad='='.repeat((4-s.length%4)%4);
  var b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  return a;
}
async function enablePush(btn){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){alert('This browser does not support push. On iPhone: add to Home Screen first, then open from the icon.');return;}
    var reg=await navigator.serviceWorker.register('/new/sw.js');
    await navigator.serviceWorker.ready;
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Permission not granted');return;}
    var sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidBytes()});
    var j=sub.toJSON();
    var u=await sb.from('push_subs').upsert({endpoint:j.endpoint,keys:{p256dh:j.keys.p256dh,auth:j.keys.auth},who:WHO||null},{onConflict:'endpoint'});
    if(u.error)throw new Error(u.error.message);
    toast('Notifications on ✓');
    if(btn){var s=btn.querySelector('small');if(s)s.textContent='enabled on this phone ✓';}
  }catch(e){alert('Enable failed: '+(e&&e.message||e));}
}

  cartSet(c);
}

var SHOP_CATS=[['blend','Blend'],['classic','Classic'],['innovation','Innovation'],['coferment','Co-ferment']];
var SHOP_CAT='blend', SHOP_BEANS=[];
function shopCategory(b){
  if(b.recipe&&b.recipe.length)return 'blend';
  var p=String(b.process||'').toLowerCase();
  if(/co.?ferment|culturing/.test(p))return 'coferment';
  if(/anaerobic|hydro|nitro|carbonic|thermal|cold ferment|yeast|lactic|maceration/.test(p))return 'innovation';
  return 'classic';
}

  var counts={};SHOP_BEANS.forEach(function(b){var c=shopCategory(b);counts[c]=(counts[c]||0)+1;});
  var visible=SHOP_CATS.filter(function(c){return counts[c[0]];});
  if(!counts[SHOP_CAT])SHOP_CAT=visible.length?visible[0][0]:SHOP_CAT;
  /* 空分類不渲染（死路移除）；只剩一類＝整條藏 */
  if(visible.length<=1){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=visible.map(function(c){return '<button data-sct="'+c[0]+'" class="'+(SHOP_CAT===c[0]?'on':'')+'">'+c[1]+'</button>';}).join('');
  el.querySelectorAll('[data-sct]').forEach(function(b){b.addEventListener('click',function(){SHOP_CAT=b.dataset.sct;paintShopBody();});});
}

    /* 玻璃箭頭放 shopbody 裡：離開商店畫面（innerHTML 換掉）就自動消失 */
    +(list.length>1
      ?'<button class="shoparr l" id="sharr-l" aria-label="Previous coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'
      +'<button class="shoparr r" id="sharr-r" aria-label="Next coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'
      :'');
  wireShopCards(host);
  paintCartBar();
  var w=$('shopwrap');
  if(w&&list.length>1){
    var slideW=function(){return w.children[0]?(w.children[0].offsetWidth+14):w.clientWidth;};
    var arrPaint=function(){
      var i=Math.round(w.scrollLeft/slideW());
      var l=$('sharr-l'),r=$('sharr-r');if(!l||!r)return;
      l.style.display=i>0?'flex':'none';
      r.style.display=i<list.length-1?'flex':'none';
    };
    /* smooth scrollBy 在 scroll-snap 容器會被吃掉（實測不動）→ rAF 手動滑，結尾 snap 自己吸正 */
    var glide=function(dx){
      var from=w.scrollLeft,t0=null;
      var step=function(ts){
        if(t0==null)t0=ts;
        var p=Math.min(1,(ts-t0)/260);p=1-Math.pow(1-p,3);
        w.scrollLeft=from+dx*p;
        if(p<1)requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    };
    $('sharr-l').addEventListener('click',function(){glide(-slideW());});
    $('sharr-r').addEventListener('click',function(){glide(slideW());});
    w.addEventListener('scroll',arrPaint,{passive:true});
    arrPaint();
  }
}
/* 規格明細列（Blend 或 Process/Origin/Variety/Cup/Bag/Roasted）——主卡瘦身後只在明細抽屜用 */
function shopSpecsFor(b){
  var specs=[];
  if(b.recipe&&b.recipe.length)specs.push(['Blend',b.recipe.map(function(p){return esc(p.bean)+' '+p.pct+'%';}).join(' · ')]);
  else if(b.process)specs.push(['Process',esc(b.process)]);
  if(b.origin)specs.push(['Origin',esc(b.origin)]);
  if(b.variety)specs.push(['Variety',esc(b.variety)]);
  if(b.comment)specs.push(['Cup',esc(b.comment)]);
  specs.push(['Bag',(b.grams||250)+'g whole beans']);
  if(b.roast_date){
    var age=daysSince(b.roast_date);
    /* 對客人講人話：<14 剛烘好、14–28 最佳賞味、>28 醒好豆（店內的紅綠黃是營運視角） */
    var band=age<SHELF_FRESH_REST?'freshly roasted':(age<=SHELF_FRESH_PRIME?'prime window':'well rested');
    specs.push(['Roasted',(fmtD(b.roast_date)||'')+' — '+band]);
  }
  return specs;
}
/* 明細抽屜：主卡只留圖＋價＋購買列，膠囊與規格表收進來（照 openSignInSheet 的 openDrawerHTML 路數） */
function openShopDetailSheet(name){
  var b=null;SHOP_BEANS.forEach(function(x){if(!b&&x.name===name)b=x;});
  if(!b)return;
  var chips=(b.flavour||[]).slice(0,3).map(function(f){return '<span class="shop-chip">'+esc(f)+'</span>';}).join('');
  var specs=shopSpecsFor(b);
  openDrawerHTML('<div class="t" style="font-size:19px">'+esc(b.name)+'</div>'
    +(chips?'<div style="margin-top:10px">'+chips+'</div>':'')
    +'<div style="margin-top:6px">'+specs.map(function(r,ix){
      return '<div class="dl"'+(ix===specs.length-1?' style="border-bottom:none"':'')+'><span class="sl" style="flex:0 0 84px;text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;padding-top:2px">'+r[0]+'</span><span style="text-align:right">'+r[1]+'</span></div>';
    }).join('')+'</div>'
    +(b.slug?'<a class="more" style="text-decoration:none;display:block;text-align:center;margin-top:12px" href="/?bean='+encodeURIComponent(b.slug)+'">Brew guide →</a>':'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  $('d-cl').addEventListener('click',closeDrawer);
}
/* C 規格書版（老闆挑的）v2：資訊卡圖滿版（白邊 CSS 裁掉）＋價格＋Details 抽屜列＋購買列 */
function shopCardsHTML(beans){
  if(!beans.length)return '<div class="empty">The shelf is being restocked — check back soon ☕</div>';
  return beans.map(function(b,bx){
    var sizes=(b.sizes&&b.sizes.length)?b.sizes:(b.price!=null?[{id:'',label:(b.grams||250)+'g',price:b.price}]:[]);
    var s0=sizes[0]||{};
    var sizeSeg=sizes.length>1
      ?'<div class="pm-seg" style="margin-top:12px">'+sizes.map(function(s,si){
          return '<button data-sz="'+si+'" data-vid="'+esc(s.id)+'" data-price="'+(s.price!=null?s.price:'')+'" data-label="'+esc(s.label)+'"'+(si===0?' class="on"':'')+'>'+esc(s.label)+(s.price!=null?' $'+Number(s.price).toFixed(0):'')+'</button>';
        }).join('')+'</div>'
      :'';
    return '<div class="card shopc" data-bean="'+esc(b.name)+'" data-vid="'+esc(s0.id||'')+'" data-price="'+(s0.price!=null?s0.price:'')+'" data-label="'+esc(s0.label||'')+'">'
      +(b.image?'<div class="shopimghold"><img class="shopimg" src="'+esc(b.image)+'" alt="'+esc(b.name)+'" loading="'+(bx===0?'eager':'lazy')+'"></div>':'')
      +'<div class="shopin">'
      /* 翻頁圓點在圖與價之間：每張卡自帶一排、亮自己那顆（滑到哪張看到的就是哪張的點，不用捲動監聽） */
      +(beans.length>1?'<div class="shopdots" style="margin:0 0 12px">'+beans.map(function(_,i){return '<span'+(i===bx?' class="on"':'')+'></span>';}).join('')+'</div>':'')
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px">'
      +'<span class="t" style="font-size:22px">'+esc(b.name)+'</span>'
      +(s0.price!=null?'<span class="t shopprice" style="font-size:19px;white-space:nowrap">$'+Number(s0.price).toFixed(0)+'<span style="font-size:13px;color:var(--muted);font-family:Inter,sans-serif"> /'+esc(s0.label||((b.grams||250)+'g'))+'</span></span>':'')
      +'</div>'
      +sizeSeg
      +'<div class="no-line" style="margin-top:12px;align-items:center">'
      +'<span class="qty"><button data-shopq="-1">−</button><span class="shopqty">1</span><button data-shopq="1">＋</button></span>'
      +'<button class="act" data-addcart style="flex:1;margin-top:0">Add to cart'+(s0.price!=null?' · $'+Number(s0.price).toFixed(0):'')+'</button>'
      +'</div>'
      /* Details 放購買列之後：浮動購物車條蓋到的是次要資訊，不是消費動線 */
      +'<div class="dl" data-shopdetail style="margin-top:10px;cursor:pointer;border-bottom:none"><span>Details & brew guide</span><span style="text-align:right;color:var(--muted)">→</span></div>'
      +'</div></div>';
  }).join('');
}
/* 卡片互動：規格段選、數量步進、加入購物車（狀態記在卡片 data-*，不重畫不打斷輪播） */
function wireShopCards(root){
  root.querySelectorAll('.shopc').forEach(function(card){
    function price(){return parseFloat(card.dataset.price)||0;}
    function qty(){return parseInt(card.querySelector('.shopqty')?card.querySelector('.shopqty').textContent:'1',10)||1;}
    function paintBtn(){
      var b=card.querySelector('[data-addcart]');if(!b)return;
      var p=price()*qty();
      b.textContent='Add to cart'+(p?' · $'+(Math.round(p*100)/100):'');
    }
    card.querySelectorAll('[data-sz]').forEach(function(el){el.addEventListener('click',function(){
      card.querySelectorAll('[data-sz]').forEach(function(x){x.classList.toggle('on',x===el);});
      card.dataset.vid=el.dataset.vid;card.dataset.price=el.dataset.price;card.dataset.label=el.dataset.label;
      var pp=card.querySelector('.shopprice');
      if(pp&&el.dataset.price)pp.innerHTML='$'+Number(el.dataset.price).toFixed(0)+'<span style="font-size:13px;color:var(--muted);font-family:Inter,sans-serif"> /'+esc(el.dataset.label)+'</span>';
      paintBtn();
    });});
    card.querySelectorAll('[data-shopq]').forEach(function(el){el.addEventListener('click',function(){
      var q=Math.max(1,Math.min(9,qty()+(+el.dataset.shopq)));
      card.querySelector('.shopqty').textContent=q;
      paintBtn();
    });});
    var add=card.querySelector('[data-addcart]');
    if(add)add.addEventListener('click',function(){
      if(!card.dataset.vid){alert('This coffee is not available right now.');return;}
      cartAdd({bean:card.dataset.bean,label:card.dataset.label,vid:card.dataset.vid,price:parseFloat(card.dataset.price)||0,qty:qty()});
      toast('Added to cart ✓');
    });
    var det=card.querySelector('[data-shopdetail]');
    if(det)det.addEventListener('click',function(){openShopDetailSheet(card.dataset.bean);});
  });
}
/* ===== 登入抽屜（帳號＝打開其他功能的鑰匙；照 classic submit 的 signInWithPassword，只登入不註冊）===== */
function openSignInSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Sign in</div>'
    +'<div class="s" style="margin-top:2px">staff and account holders — unlocks your view of the app</div>'
    +'<div class="dlab">Email</div><input class="din" id="si-email" type="email" autocomplete="email" placeholder="you@example.com">'
    +'<div class="dlab">Password</div><input class="din" id="si-pass" type="password" autocomplete="current-password" placeholder="••••••••">'
    +'<div class="s" id="si-msg" style="margin-top:8px"></div>'
    +'<button class="act" id="si-go">Sign in</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  async function go(){
    var email=($('si-email').value||'').trim();
    var pass=$('si-pass').value||'';
    var msg=$('si-msg');
    if(!email||!pass){msg.innerHTML='<span class="red">Enter email and password</span>';return;}
    var b=$('si-go');b.disabled=true;b.textContent='Signing in…';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){
      b.disabled=false;b.textContent='Sign in';
      msg.innerHTML='<span class="red">'+esc(r.error.message||'Sign in failed')+'</span>';
      return;
    }
    closeDrawer();toast('Signed in ✓');
    await boot();
  }
  $('si-go').addEventListener('click',go);
  $('si-pass').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('si-email').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* 沒登入＝店面：豆單直接開門見山（員工從底部小連結登入） */
async function renderPublicMenu(){
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  $('chips').innerHTML='';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  SHOP_BEANS=await loadShopMenu();
  m.innerHTML='<div id="shopbody"></div>'
    +'<div class="note" style="margin-top:16px"><a href="/?fb=store" style="color:var(--accent)">Tried it? Tell us what you think →</a></div>'
    +'<button class="more" id="pm-staff">Staff sign in</button>';
  renderShopTabs();
  paintShopBody();
  var st=$('pm-staff');if(st)st.addEventListener('click',openSignInSheet);
}
/* 客戶登入＝豆單在上、自己的訂單在下＋切員工登入鍵 */
async function renderCustomerPortal(sess){
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  $('chips').innerHTML='';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelf…</div>';
  var email=(sess&&sess.user&&sess.user.email)||'';
  var orders=[],custName='';
  var beansP=loadShopMenu();
  try{
    var cq=await sb.from('customers').select('id,name').ilike('email',email);
    var ids=(cq.data||[]).map(function(c){return c.id;});
    if(cq.data&&cq.data[0])custName=cq.data[0].name||'';
    if(ids.length){
      var oq=await sb.from('orders').select('order_no,status,items,total,payment_status,tracking_no,created_at').in('customer_id',ids).neq('status','Cancelled').order('order_no',{ascending:false}).limit(20);
      orders=oq.data||[];
    }
  }catch(e){}
  SHOP_BEANS=await beansP;
  m.innerHTML='<div class="card brief"><span class="tag">Welcome</span>'
    +'<div class="t">'+esc(custName||'Hello')+'</div>'
    +'<div class="s">Ratio Coffee · on the shelf today'+(email?' · '+esc(email):'')+'</div>'
    +'<button class="more" id="cp-fb" style="color:var(--inv-t)">Leave feedback</button></div>'
    +'<div id="shopbody"></div>'
    +(orders.length?'<div class="note" style="margin-top:16px">Your orders</div>'+orders.map(function(o){
      var paid=o.payment_status==='paid';
      return '<div class="card"><span class="tag'+(o.status==='Dispatched'?'':' warn')+'">'+esc(o.status||'—')+'</span>'
        +'<div class="t">#'+String(o.order_no||'—').padStart(4,'0')+' · '+money(o.total)+'</div>'
        +'<div class="s">'+esc(itemsLine(o)||'—')+(paid?'':' · awaiting payment')+(o.tracking_no?' · tracking '+esc(o.tracking_no):'')+'</div></div>';
    }).join(''):'')
    +'<button class="more" id="cp-staff" style="margin-top:18px">Staff sign in — switch account</button>';
  renderShopTabs();
  paintShopBody();
  $('cp-fb').addEventListener('click',function(){location.href='/?fb=store';});
  /* 更高權限入口：登出這個客戶 → 原地開登入抽屜換帳號，全程不離開 /new */
  $('cp-staff').addEventListener('click',async function(){
    if(!confirm('Sign out of this account and switch to a staff sign-in?'))return;
    try{await sb.auth.signOut();}catch(e){}
    await boot();
    openSignInSheet();
  });
}
/* 三層路由：沒登入＝豆單店面／customer＝客戶門戶／員工四角色＝操作台。
   登入、登出後都重呼叫一次即可換視角（nav/chips 先復位，因為店面與門戶會藏 nav） */
async function boot(){
  /* 付款完成回店面：清購物車＋致謝（Square redirect_url 帶 ?checkout=done 回來） */
  if(/[?&]checkout=done/.test(location.search)){
    try{localStorage.setItem('r2_cart','[]');}catch(e){}
    try{history.replaceState(null,'',location.pathname);}catch(e){}
    setTimeout(function(){toast('Thanks! Your order is on its way to the roastery ☕');},600);
  }
  var nav=document.querySelector('nav');if(nav)nav.style.display='';
  $('shoptabs').style.display='none';
  $('chips').innerHTML='';
  paintCartBar();
  var g=await sb.auth.getSession();
  if(!(g&&g.data&&g.data.session)){
    await renderPublicMenu();
    return;
  }
  /* 沒 profile 或沒角色＝客戶（開放客戶登入前的安全預設） */
  ROLE='customer';WHO='';
  try{
    var p=await sb.from('profiles').select('name,role').eq('id',g.data.session.user.id).single();
    if(p&&p.data){ROLE=p.data.role||'customer';WHO=p.data.name||'';}
  }catch(e){}
  if(myRole()==='customer'){await renderCustomerPortal(g.data.session);return;}
  view='feed';filter='all';
  await reload();
}
(async function init(){await boot();})();
</script></body></html>
