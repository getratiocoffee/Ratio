<style>
:root{--bg:#FFFFFF;--surface:#FFFFFF;--ink:#1A1A1A;--muted:#8A8A8A;--accent:#B25E6A;--tint:#F7EBED;--danger:#C0392B;--line:#ECECEC;--line2:#DADADA;--inv:#1A1A1A;--inv-t:#FFFFFF}
@media(prefers-color-scheme:dark){:root{--bg:#1C1C1C;--surface:#1C1C1C;--ink:#F2F0EB;--muted:#8F8D87;--accent:#C97783;--tint:#33272A;--danger:#E0685A;--line:#333333;--line2:#4A4A4A;--inv:#F2F0EB;--inv-t:#1C1C1C}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{margin:0;background:transparent;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding-bottom:170px}

@media(prefers-color-scheme:dark){.bglogo{opacity:.09}}
header{background:var(--bg);color:var(--ink);border-bottom:1.5px solid var(--ink);padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 12px;display:flex;justify-content:space-between;align-items:baseline;position:sticky;top:0;z-index:10}

header .cnt{font-size:14px;color:var(--muted)}
.wrap{padding:14px 22px 0;max-width:520px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;transition:transform .25s,opacity .25s;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.card.brief{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.card.brief .t{color:var(--inv-t)}
.card.brief .s{color:var(--inv-t);opacity:.72}
.card.brief .tag{color:var(--inv-t);opacity:.65}
.card.brief .more{color:var(--inv-t);opacity:.55}
.card.hot{border:2px solid var(--accent)}
.card.gone{transform:translateX(70%);opacity:0}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;color:var(--muted)}
.tag.warn{color:var(--accent)}
.t{font-size:19px;font-weight:700;line-height:1.3;font-family:'Fraunces',serif}
.s{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.5}
.red{color:var(--danger);font-weight:600}
.act{display:block;width:100%;border:none;border-radius:10px;padding:16px;font-size:17px;font-weight:700;font-family:'Inter',sans-serif;background:var(--accent);color:#fff;margin-top:12px;cursor:pointer}
.act:active{opacity:.8}
.act[disabled]{opacity:.45}
.more{display:block;width:100%;text-align:center;font-size:13.5px;color:var(--muted);padding:10px 0 2px;background:none;border:none;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:15px;line-height:1.7}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 22px 2px;max-width:520px;margin:0 auto}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:999px;padding:9px 15px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.chip.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1.5px solid var(--ink);display:flex;gap:8px;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 12px);z-index:30}
nav button{flex:1;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:13px 6px;font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer}
nav button.on{background:var(--inv);border-color:var(--inv);color:var(--inv-t)}
.deck{position:fixed;left:0;right:0;bottom:76px;background:var(--surface);border-top:1px solid var(--line);padding:12px 22px 10px;z-index:20}
.deck .who{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px}
.deck .who b{color:var(--ink)}
.deck-btns{display:grid;gap:8px;max-width:520px;margin:0 auto}
.big{border:none;border-radius:10px;padding:17px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pair button{border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface)}
.pair .rr{border:1.5px solid var(--ink);color:var(--ink)}
.pair .dn{border:1.5px solid var(--danger);color:var(--danger)}

.qrow.sel{border:2px solid var(--accent)}
.qrow .t{font-size:18px}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none}
.drawer-bg.show{display:block}
.drawer{position:fixed;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);max-width:476px;margin:0 auto;background:var(--surface);border:1.5px solid var(--ink);border-radius:16px;padding:12px 20px 20px;z-index:50;visibility:hidden;transform:translateY(calc(100% + 120px));transition:transform .28s ease,visibility 0s linear .3s;max-height:78vh;overflow-y:auto}
.drawer.show{visibility:visible;transform:translateY(0);transition:transform .28s ease}
.grab{width:44px;height:5px;border-radius:99px;background:var(--line2);margin:4px auto 14px}
.dl{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
.dl span:first-child{color:var(--muted)}
.dclose{display:block;width:100%;border:1px solid var(--line2);background:var(--bg);color:var(--ink);border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;margin-top:16px;cursor:pointer}
.pk-row{display:block;width:100%;text-align:left;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;padding:15px 16px;font-size:16px;font-weight:600;font-family:inherit;margin-top:9px;cursor:pointer}
.pk-row.on{border-color:var(--accent);color:var(--accent)}
.dta{width:100%;min-height:110px;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px;resize:vertical}
.dta:focus{border-color:var(--ink)}
.no-line{display:flex;gap:8px;align-items:center;margin-top:8px}
.no-line select{flex:1;min-width:0;border:1.5px solid var(--line2);border-radius:10px;padding:12px 8px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink)}
.no-line .qty{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.no-line .qty button{width:38px;height:44px;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:10px;font-size:19px;font-weight:700;font-family:inherit;cursor:pointer}
.no-line .qty span{min-width:20px;text-align:center;font-weight:700}
.no-price{width:86px;flex:0 0 auto;border:1.5px solid var(--line2);border-radius:10px;padding:12px 10px;font-size:15px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none}
.pm-seg{display:flex;gap:8px;margin-top:8px}
.pm-seg button{flex:1;border:1.5px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:10px;padding:13px 6px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.pm-seg button.on{border-color:var(--ink);color:var(--ink)}
.din{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:14px;font-size:17px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-top:8px}
.din:focus{border-color:var(--ink)}
.dlab{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:14px}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:150px;background:var(--inv);color:var(--inv-t);border-radius:999px;padding:11px 22px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;z-index:60;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin:6px 14px 0;line-height:1.6}
.search{width:100%;border:1.5px solid var(--line2);border-radius:12px;padding:15px 16px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;margin-bottom:6px}
.search:focus{border-color:var(--ink)}
.gsec{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin:18px 2px 8px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tool{border:1px solid var(--line2);background:var(--surface);border-radius:12px;padding:17px 12px;font-size:15px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer;text-align:center}
.tool:active{background:var(--tint)}
.tool small{display:block;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:3px}
.hit{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hit .t{font-size:17px}
.hit .k{flex:0 0 auto;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent)}
</style></head><body>
<div class="bglogo"></div>
<div class="sbar"></div>

</nav>
<div class="drawer-bg" id="dbg"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== Ratio 新殼 v1（/new）：真資料版今日流＋QC 工作台＋Tools =====
   舊 app（/index.html）完全不動；同網域共用登入 session。 */
const SUPABASE_URL='https://kjhudxzvidhynpabnalp.supabase.co';
const SUPABASE_KEY='sb_publishable_vt7hUK07u-veHOb4mXGGhQ_wX06qDeQ';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CLASSIC='/index.html';
const ESP_STALE_DAYS=7, GREEN_LOW_KG=5, ORD_OVERDUE_DAYS=7;
const VAPID_PUBLIC='BFPC3UdlUFbYeowrMvVn-eJWjES_PHYuy34_7v7XbgPSb88CRdG5pjyT30Ht-1Ok4C0dj25Ut-ahokw-9STRY9o';
var view='feed', filter='all', selQC=null, ITEMS=[], QCQ=[], ROLE='director', WHO='';
var DB={orders:[],customers:[],tasks:[],dialins:[],syncs:[],samples:[],roasts:[],beans:[]};
var _drag=0;
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2000);}
function money(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function daysSince(ts){if(!ts)return 0;var d=new Date(ts);return isNaN(d)?0:Math.floor((Date.now()-d)/86400000);}
function fmtD(s){if(!s)return '';var p=String(s).slice(0,10).split('-');return p.length===3?(p[2]+'/'+p[1]):s;}
function todayKey(){return new Date().toISOString().slice(0,10);}
/* 貪睡與晨報收起：存 localStorage，到明天自動失效 */
/* 貪睡改存 app_state（key: new_snooze）＝跨裝置同步：手機睡掉的卡，電腦也不再冒出來；到明天自動失效（只認今天的 key）。全店共用——誰睡掉就是大家都先不看 */
var SNOOZE_ALL={};
function snoozeMap(){return SNOOZE_ALL[todayKey()]||{};}
var SNOOZED_SESSION=0;
function snoozePush(){
  try{sb.from('app_state').upsert({key:'new_snooze',value:SNOOZE_ALL,updated_at:new Date().toISOString()},{onConflict:'key'})
    .then(function(r){if(r&&r.error)console.error('snooze push:',r.error.message||r.error);});}catch(e){}
}
function addSnooze(id){
  var today=todayKey(),m=snoozeMap();m[id]=1;
  SNOOZE_ALL={};SNOOZE_ALL[today]=m; /* 只留今天＝順手清掉舊日期 */
  SNOOZED_SESSION++;
  snoozePush();
}
function undoSnooze(){SNOOZE_ALL={};SNOOZED_SESSION=0;snoozePush();buildItems();render();toast('Brought back');}

async function callFn(name,payload){
  var g=await sb.auth.getSession();var sess=g&&g.data&&g.data.session;
  if(!sess)throw new Error('Signed out');
  var res=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token,'apikey':SUPABASE_KEY},
    body:JSON.stringify(payload)});
  var txt=await res.text();var data;try{data=JSON.parse(txt);}catch(e){data={raw:txt};}
  if(!res.ok)throw new Error((data&&(data.error||data.message))||('HTTP '+res.status));
  return data;
}
function custById(id){return DB.customers.find(function(c){return c.id===id;})||null;}
function itemsLine(o){return (Array.isArray(o.items)?o.items:[]).map(function(it){return (it.grams?it.grams+'g ':'')+(it.name||'')+(it.qty>1?(' ×'+it.qty):'');}).join(', ');}

async function loadAll(){
  var rs=await Promise.all([
    sb.from('orders').select('*').neq('status','Cancelled').order('order_no',{ascending:false}),
    sb.from('customers').select('id,name,email,type'),
    sb.from('tasks').select('*').eq('done',false).order('created_at',{ascending:false}),
    sb.from('dialins').select('coffee,created_at').order('created_at',{ascending:false}).limit(200),
    sb.from('product_sync').select('bean_id,status').eq('channel','square'),
    sb.from('samples').select('id,sample_id,bean_id,process,roast_date,cupping_date,features,flavour_locked').eq('supplier','Ratio Coffee').order('cupping_date',{ascending:false}).order('created_at',{ascending:false}),
    sb.from('roasts').select('id,bean_name,bean_id,roast_date,qc,green_kg,status,kind,remaining_kg,roasted_kg').order('roast_date',{ascending:false}),
    sb.from('beans').select('id,name,process,quantity,low_stock_kg,country,cost_per_kg,supplier'),
    sb.from('feedback').select('*').is('reply',null).order('created_at',{ascending:false}),
    sb.from('rosters').select('week_start,shifts,deleted').eq('week_start',mondayStr()),
    sb.from('app_state').select('value').eq('key','new_snooze').maybeSingle()
  ]);
  DB={orders:rs[0].data||[],customers:rs[1].data||[],tasks:rs[2].data||[],dialins:rs[3].data||[],
      syncs:rs[4].data||[],samples:rs[5].data||[],roasts:rs[6].data||[],beans:rs[7].data||[],
      feedback:rs[8].data||[],roster:((rs[9].data||[]).filter(function(r){return !r.deleted;})[0]||null)};
  var sv=rs[10]&&rs[10].data&&rs[10].data.value;
  if(typeof sv==='string'){try{sv=JSON.parse(sv);}catch(e){sv=null;}}
  SNOOZE_ALL=(sv&&typeof sv==='object')?sv:{};
  buildItems();
}
function mondayStr(){
  var t=new Date();t.setDate(t.getDate()-((t.getDay()+6)%7));
  return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}
function todayShifts(){
  var dk=['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  var sh=(DB.roster&&Array.isArray(DB.roster.shifts))?DB.roster.shifts:[];
  return sh.filter(function(s){return s.day===dk;}).sort(function(a,b){return String(a.start||'')<String(b.start||'')?-1:1;});
}
function matchRoast(s){
  var nm=String(s.sample_id||'').trim().toLowerCase();if(!nm&&!s.bean_id)return null;
  var cands=DB.roasts.filter(function(r){
    if(s.bean_id&&r.bean_id)return String(r.bean_id)===String(s.bean_id);
    return String(r.bean_name||'').trim().toLowerCase()===nm;});
  if(!cands.length)return null;
  if(s.roast_date){var ex=cands.find(function(r){return (r.roast_date||'')===s.roast_date;});if(ex)return ex;}
  return cands[0];
}
function buildItems(){
  var out=[],sn=snoozeMap();
  /* QC 佇列（也給 QC 分頁用） */
  var seen={};QCQ=[];var LISTQ=[],LOCKQ=[];
  DB.samples.forEach(function(s){
    var k=s.bean_id?('id:'+String(s.bean_id)):((s.sample_id||'')+'·'+(s.process||'')).toLowerCase();
    if(seen[k])return;seen[k]=1;
    var r=matchRoast(s);
    if(r&&!r.qc){QCQ.push({s:s,r:r});return;}
    /* 上架佇列：QC pass 後未上 Square → List 卡；已上架但風味沒鎖 → Lock 聚合卡 */
    if(r&&r.qc==='pass'){
      var nm=String(s.sample_id||'').trim();if(!nm)return;
      var sync=DB.syncs.find(function(x){return String(x.bean_id||'').trim().toLowerCase()===nm.toLowerCase();});
      if(!(sync&&sync.status==='synced'))LISTQ.push(s);
      else if(!s.flavour_locked)LOCKQ.push(s);
    }
  });
  /* 晨報 */
  var newQ=DB.orders.filter(function(o){return (o.status||'New')==='New';});
  var packQ=DB.orders.filter(function(o){return o.status==='Confirmed'||o.status==='Roasting';});
  var shipQ=DB.orders.filter(function(o){return o.status==='Ready';});
  var payQ=DB.orders.filter(function(o){return (o.status||'New')!=='New'&&(o.payment_status==='pending_payment'||o.payment_status==='overdue');});
  var latest={};DB.dialins.forEach(function(d){var k=String(d.coffee||'').trim().toLowerCase();if(k&&!latest[k])latest[k]=d;});
  var stale=[];DB.syncs.forEach(function(x){
    if(x.status!=='synced')return;
    var d=latest[String(x.bean_id||'').trim().toLowerCase()];
    if(!d||daysSince(d.created_at)>ESP_STALE_DAYS)stale.push({name:x.bean_id,last:d?daysSince(d.created_at):null});});
  var low=DB.beans.filter(function(b){var t=(b.low_stock_kg==null?GREEN_LOW_KG:Number(b.low_stock_kg));return b.quantity!=null&&t>0&&Number(b.quantity)<=t;});
  var briefBits=[];
  if(newQ.length)briefBits.push(newQ.length+' to accept');
  if(packQ.length)briefBits.push(packQ.length+' to pack');
  if(shipQ.length)briefBits.push(shipQ.length+' to ship');
  if(QCQ.length)briefBits.push(QCQ.length+' QC');
  if(stale.length)briefBits.push(stale.length+' dial-in');
  if(low.length)briefBits.push(low.length+' bean low');
  if(DB.tasks.length)briefBits.push(DB.tasks.length+' tasks');
  var shifts=todayShifts();
  var rosterLine=shifts.map(function(s){return s.name+' '+String(s.start||'').replace(/^0/,'')+'–'+String(s.end||'').replace(/^0/,'');}).join(' · ');
  var rosterNames=shifts.map(function(s){return s.name;}).filter(function(n,i,a){return a.indexOf(n)===i;}).join(', ');
  out.push({id:'brief',st:'Brief',pin:1,t:(new Date().getHours()<12?'Morning':'Today')+' brief',
    s:(rosterNames?'On: '+esc(rosterNames)+(briefBits.length?' · ':''):'')+(briefBits.length?briefBits.join(' · '):(rosterNames?'':'all clear')),act:'Got it',
    det:[['On shift',rosterLine||'no one rostered']].concat([['To accept',String(newQ.length)],['To pack',String(packQ.length)],['To ship',String(shipQ.length)],['QC waiting',String(QCQ.length)],['Dial-in stale',String(stale.length)],['Beans low',String(low.length)],['Open tasks',String(DB.tasks.length)]]),
    roles:['director','roaster','retail','staff'],kind:'dismiss'});
  /* 烘豆需求卡：Confirmed/Roasting 品項同名合併，生豆 ×1.15（烘豆師視角的今日任務） */
  var dem={},demOrder=[];
  packQ.forEach(function(o){(Array.isArray(o.items)?o.items:[]).forEach(function(it){

/* ===== 真動作 ===== */
async function runAction(id,btn){
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      dropCard(id);toast('Task done ✓');return;
    }
    if(i.kind==='qcpass'){await qcVerdict(i.ref.r,'pass',btn,id);return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted — no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid ✓ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid ✓ receipt sent');return;
    }
    if(i.kind==='dialin'){openDialinForm(i);return;}
    if(i.kind==='roastlog'){openRoastSheet(Array.isArray(i.ref)?i.ref:null);return;}
    if(i.kind==='cup'){openCupSheet(i);return;}
    if(i.kind==='list'){await openListSheet(i);return;}
    if(i.kind==='locks'){openLocksSheet(i);return;}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent=i.act;}
    alert((i.act||'Action')+' failed: '+(e&&e.message||e));
  }
}
async function acceptOrder(i,btn){
  var o=i.ref;
  if(btn){btn.disabled=true;btn.textContent='Accepting…';}
  try{
    if(!o.payment_link&&o.payment_status!=='paid'&&Number(o.total)>0){
      try{await callFn('sync-to-square',{action:'payment_link',order_id:o.id});}catch(e){console.error('payment link',e);}
    }
    var u=await sb.from('orders').update({status:'Confirmed'}).eq('id',o.id);
    if(u.error)throw new Error(u.error.message);
    o.status='Confirmed';
    try{await callFn('send-email',{action:'order_confirmation',order_id:o.id});toast('Accepted ✓ confirmation sent');}
    catch(e){toast('Accepted ✓ but email failed');}
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Accept';}
    alert('Accept failed: '+(e&&e.message||e));
  }
}
async function qcVerdict(r,v,btn,cardId){
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var u=await sb.from('roasts').update({qc:v}).eq('id',r.id);
  if(u.error){if(btn){btn.disabled=false;}alert('QC failed: '+u.error.message);return;}
  r.qc=v;toast('QC '+v+' ✓');
  if(cardId)dropCard(cardId);
  QCQ=QCQ.filter(function(x){return x.r.id!==r.id;});
  if(view==='qc')renderQC();
}

/* ===== 出貨信資訊卡管線（自 classic 原封移植：畫卡 canvas → 上傳 mail-assets → 附進信）===== */
  function mnHexRgb(hex){hex=String(hex||'').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var n=parseInt(hex,16);if(isNaN(n))return null;return [(n>>16)&255,(n>>8)&255,n&255];}
  function _rrPath(x,X,Y,W,H,R){x.beginPath();x.moveTo(X+R,Y);x.arcTo(X+W,Y,X+W,Y+H,R);x.arcTo(X+W,Y+H,X,Y+H,R);x.arcTo(X,Y+H,X,Y,R);x.arcTo(X,Y,X+W,Y,R);x.closePath();}
  function _cardFit(x,text,weight,start,min,maxW,fam){var s=start;x.font=weight+' '+s+'px '+fam;while(s>min&&x.measureText(text).width>maxW){s-=2;x.font=weight+' '+s+'px '+fam;}return s;}
    function _cardRadar(x,cx,cy,R,scores,band){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
    x.lineWidth=2;x.strokeStyle='#1E1A19';
    [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=n;i++){var p=pt(i%n,R*l/3);if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);}x.stroke();});

    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    try{
      var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
      var pool=q.data||[];
      var proc=String(s.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* 每支豆現場重畫卡片 → 上傳 mail-assets（upsert + cache-bust）→ 回傳 {小寫名: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

function openPackSheet(i){

    openDrawerHTML('<div class="t" style="font-size:19px">'+i.t.replace('Pack ','Packing ')+'</div>'
      +'<div class="s" style="margin-top:2px">tap each item as it goes in the box</div>'

function openBatchesSheet(){
  var bats=(DB.roasts||[]).filter(function(r){return Number(r.remaining_kg)>0;});
  var groups={},order=[];
  bats.forEach(function(r){var k=String(r.bean_name||'—').trim(),lk=k.toLowerCase();if(!groups[lk]){groups[lk]={name:k,rows:[]};order.push(lk);}groups[lk].rows.push(r);});
  order.sort(function(a,b){return groups[a].name.localeCompare(groups[b].name);});
  var totKg=0;bats.forEach(function(r){totKg+=Number(r.remaining_kg)||0;});
  var h='';
  order.forEach(function(k){
    var g=groups[k];
    g.rows.sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var tot=0;g.rows.forEach(function(r){tot+=Number(r.remaining_kg)||0;});
    h+='<div class="dlab">'+esc(g.name)+' · '+(Math.round(tot*100)/100)+' kg</div>';
    g.rows.forEach(function(r,idx){
      var age=daysSince(r.roast_date);
      var old=r.roast_date&&age>30;
      var tags=[];
      if(idx===0&&g.rows.length>1)tags.push('use first');
      if(old)tags.push('<span class="red">&gt;30d</span>');
      if(r.qc==='pass')tags.push('QC ✓');else if(r.qc==='reroast')tags.push('<span class="red">re-roast</span>');else if(r.qc==='downgrade')tags.push('downgraded');
      if(r.kind==='blend')tags.push('blend');
      h+='<div class="hit" data-b="'+esc(r.id)+'"><span><div class="t">'+(r.roast_date?fmtD(r.roast_date):'—')+'</div>'
        +'<div class="s">'+(r.roast_date?age+' days old':'no roast date')+(tags.length?' · '+tags.join(' · '):'')+'</div></span>'
        +'<span class="k'+(old?' red':'')+'" style="font-size:15px">'+(Number(r.remaining_kg)||0)+' kg</span></div>';
    });

async function saveReceiveSheet(){
  var kg=parseFloat(String(RCV.kg).trim());
  if(isNaN(kg)||kg<=0){toast('Enter the received kg');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');
  var beanId,after;
  try{
    if(RCV.mode==='existing'){
      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;
      if(sup)upd.supplier=sup;
      var u=await sb.from('beans').update(upd).eq('id',b.id);
      if(u.error)throw new Error(u.error.message);
      Object.assign(b,upd);
      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* 防重複：同名同處理法已有批次 → 提醒改用 Existing lot 併批 */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='Saving…';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;
    }
    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' — '+sup:'')+(lot?' · lot '+lot:'')});}catch(e){}
    closeDrawer();toast('Received ✓ +'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to stock';}
    alert('Receive failed: '+(e&&e.message||e));
  }
}

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  closeDrawer();toast('Stocktake saved — '+ok+' bean'+(ok>1?'s':'')+' adjusted ✓');
  await reload();
}

  if(isDup&&!confirm('"'+bl.name+'" already has a batch dated '+date+'. Add another?'))return;
  var parts=(bl.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;})
    .map(function(p){return {bean:p.bean,process:p.process||'',pct:parseFloat(p.pct)};});

      recipe:{blend_id:bl.id||null,parts:parts}};

/* FIFO 消耗成分批次（照 classic consumeBlendComponents）——回傳不夠扣的清單 */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    var pool=(DB.roasts||[]).filter(function(r){
      return r.kind!=='blend'&&Number(r.remaining_kg)>0&&String(r.bean_name||'').trim().toLowerCase()===key;
    }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}
async function saveRoastSheet(){

  if(out!=null&&out>kg&&!confirm('Roasted out ('+out+' kg) is more than green in ('+kg+' kg). Save anyway?'))return;
  var stock=Number(b.quantity)||0;
  if(kg>stock+0.0001&&!confirm('Stock check:\n'+b.name+': '+kg+' kg entered, '+stock+' kg in stock\n\nLog anyway? Stock will stop at 0 — fix the numbers later with Stocktake.'))return;
  var btn=$('ro-save');if(btn){btn.disabled=true;btn.textContent='Logging…';}
  try{
    var rec={bean_id:b.id,bean_name:b.name,country:b.country||null,green_kg:kg,status:'pending_cupping'};
    if(out!=null&&out>0){rec.roasted_kg=out;rec.remaining_kg=out;}
    if(RO.date)rec.roast_date=RO.date;

    if(ins.data&&ins.data[0])DB.roasts.unshift(ins.data[0]);
    closeDrawer();toast('Roast logged ✓ stock −'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Log roast';}
    alert('Log failed: '+(e&&e.message||e));
  }
}
/* ===== 滑卡 ===== */
function attachSwipe(el,id){
  /* 誤觸防護：①方向鎖——先確認是「明確的橫向」才開始滑（斜滑/直捲直接放棄）
     ②門檻加大——要滑過卡片寬度的 35%（做）/ 45%（貪睡）才觸發 */
  var x0=null,y0=0,dx=0,locked=false,dead=false;
  function reset(anim){el.style.transition=anim?'transform .25s':'none';el.style.transform='';el.style.borderColor='';x0=null;dx=0;locked=false;dead=false;}
  el.addEventListener('pointerdown',function(e){if(e.target.closest('button'))return;x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;try{el.setPointerCapture(e.pointerId);}catch(err){}el.style.transition='none';});
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;el.style.transform='';el.style.borderColor='';return;}
      if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.6)locked=true;
      else return;
    }
    el.style.transform='translateX('+dx*0.9+'px)';
    var w=el.offsetWidth;
    el.style.borderColor=dx>w*0.25?'var(--accent)':(dx<-w*0.3?'var(--muted)':'');
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth;
    if(locked&&dx>w*0.35){var i=item(id);reset(true);if(i)runAction(id,null);}
    else if(locked&&dx<-w*0.45){addSnooze(id);dropCard(id,true);toast('Snoozed — back tomorrow');x0=null;dx=0;locked=false;}
    else reset(true);
  });
}

    +QCQ.map(function(q){
      var f=(q.s.features||[]).slice(0,3).join(', ');
      return '<div class="qrow'+(q.r.id===selQC?' sel':'')+'" data-q="'+esc(q.r.id)+'"><div class="t">'+esc(q.s.sample_id||'—')+'</div><div class="s">'+(q.r.roast_date?'roasted '+fmtD(q.r.roast_date)+' · ':'')+esc(f||'')+'</div></div>';
    }).join('');
  m.querySelectorAll('[data-q]').forEach(function(r){r.addEventListener('click',function(){selQC=r.dataset.q;renderQC();});});
  var q=QCQ.find(function(x){return String(x.r.id)===String(selQC);});
  var deck=$('deck');deck.style.display='block';
  deck.innerHTML='<div class="who">judging <b>'+esc(q.s.sample_id||'—')+'</b></div>'
    +'<div class="deck-btns"><button class="big" id="q-p">Pass</button>'
    +'<div class="pair"><button class="rr" id="q-r">Re-roast</button><button class="dn" id="q-d">Down</button></div></div>';
  $('q-p').addEventListener('click',function(){qcVerdict(q.r,'pass',null,'qc:'+q.r.id);});
  $('q-r').addEventListener('click',function(){qcVerdict(q.r,'reroast',null,'qc:'+q.r.id);});
  $('q-d').addEventListener('click',function(){qcVerdict(q.r,'downgrade',null,'qc:'+q.r.id);});
}

    +[['Green stock','full list · right here','greens'],['Roast batches','FIFO shelf · right here','batches'],['Customers','type a name above','search'],['Orders','recent list · right here','orders'],['Team notes','read and post · right here','notes'],['Classic app','full interface','classic']].map(function(x){return '<button class="tool" data-t="'+x[2]+'">'+x[0]+'<small>'+x[1]+'</small></button>';}).join('')

    DB.customers.forEach(function(c){if((c.name||'').toLowerCase().indexOf(q)>-1){
      var os=DB.orders.filter(function(o){return o.customer_id===c.id;});
      hits.push({k:'Customer',t:c.name,s:(c.type||'')+' · '+os.length+' open order'+(os.length===1?'':'s')+(c.email?' · '+c.email:''),det:[['Type',c.type||'—'],['Email',c.email||'—'],['Open orders',String(os.length)]]});}});
    DB.orders.forEach(function(o){var no='#'+String(o.order_no||'').padStart(4,'0');
      if(no.indexOf(q)>-1||itemsLine(o).toLowerCase().indexOf(q)>-1){var c=custById(o.customer_id);
      hits.push({k:'Order',t:no+' · '+((c&&c.name)||'Walk-in'),s:(o.status||'')+' · '+money(o.total)+' · '+(o.payment_status==='paid'?'paid':'unpaid'),det:[['Status',o.status||'—'],['Items',itemsLine(o)||'—'],['Total',money(o.total)],['Payment',o.payment_status||'—']]});}});
    $('thits').innerHTML=hits.length?hits.slice(0,12).map(function(x,ix){
      return '<div class="hit" data-h="'+ix+'"><span><div class="t">'+esc(x.t)+'</div><div class="s">'+esc(x.s)+'</div></span><span class="k">'+x.k+'</span></div>';
    }).join(''):'<div class="empty">No match</div>';
    $('thits').querySelectorAll('[data-h]').forEach(function(el){el.addEventListener('click',function(){
      var x=hits[+el.dataset.h];
      openDrawerHTML('<span class="tag warn">'+x.k+'</span><div class="t" style="font-size:19px">'+esc(x.t)+'</div>'
        +'<div style="margin-top:10px">'+x.det.map(function(r){return '<div class="dl"><span>'+esc(r[0])+'</span><span>'+esc(r[1])+'</span></div>';}).join('')+'</div>'
        +'<a class="dclose" style="text-decoration:none;text-align:center;display:block" href="'+CLASSIC+'">Open in classic app</a>'
        +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
      $('d-cl').addEventListener('click',closeDrawer);
    });});
  }
  inp.addEventListener('input',lookup);
  var no=$('t-neworder');if(no)no.addEventListener('click',openNewOrderSheet);
  var tr=$('t-roast');if(tr)tr.addEventListener('click',function(){openRoastSheet(null);});
  var ts=$('t-stk');if(ts)ts.addEventListener('click',openStocktakeSheet);
  var tv=$('t-recv');if(tv)tv.addEventListener('click',openReceiveSheet);
  var tn=$('t-notif');if(tn)tn.addEventListener('click',function(){enablePush(tn);});
  var tp=$('t-ptest');if(tp)tp.addEventListener('click',async function(){
    tp.disabled=true;
    try{var r=await callFn('push-send',{title:'Test from Ratio',body:'Push notifications are working ☕',url:'/new/'});
      toast('Sent to '+(r.sent||0)+' device'+(r.sent===1?'':'s'));}
    catch(e){alert('Test failed: '+(e&&e.message||e));}
    tp.disabled=false;
  });
  m.querySelectorAll('[data-classic]').forEach(function(b){b.addEventListener('click',function(){location.href=CLASSIC;});});
  m.querySelectorAll('[data-t]').forEach(function(b){b.addEventListener('click',function(){
    var k=b.dataset.t;
    if(k==='classic'){location.href=CLASSIC;return;}
    if(k==='notes'){openNotesSheet();return;}
    if(k==='orders'){openOrdersSheet();return;}
    if(k==='greens'){openGreensSheet();return;}
    if(k==='batches'){openBatchesSheet();return;}
    inp.focus();toast('Type in the search box above');
  });});
}
/* ===== 推播訂閱（iPhone 要先加入主畫面再啟用）===== */
function vapidBytes(){
  var s=VAPID_PUBLIC, pad='='.repeat((4-s.length%4)%4);
  var b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  return a;
}
async function enablePush(btn){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){alert('This browser does not support push. On iPhone: add to Home Screen first, then open from the icon.');return;}
    var reg=await navigator.serviceWorker.register('/new/sw.js');
    await navigator.serviceWorker.ready;
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Permission not granted');return;}
    var sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidBytes()});
    var j=sub.toJSON();
    var u=await sb.from('push_subs').upsert({endpoint:j.endpoint,keys:{p256dh:j.keys.p256dh,auth:j.keys.auth},who:WHO||null},{onConflict:'endpoint'});
    if(u.error)throw new Error(u.error.message);
    toast('Notifications on ✓');
    if(btn){var s=btn.querySelector('small');if(s)s.textContent='enabled on this phone ✓';}
  }catch(e){alert('Enable failed: '+(e&&e.message||e));}
}
