/* ===== 杯測快錄（照 classic submitCupping 規則：samples insert＋批次標 cupped → 進 QC 佇列）===== */
var CUP=null;
var CUP_FIELDS=[['fragrance','Aroma'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
async function openCupSheet(i){
  var r=i.ref;
  /* 帶上一次同豆紀錄的風味（DB.samples 已篩 Ratio Coffee、新→舊） */
  var prev=null;
  (DB.samples||[]).forEach(function(s){
    if(prev)return;
    if(r.bean_id&&s.bean_id){if(String(s.bean_id)===String(r.bean_id))prev=s;return;}
    if(String(s.sample_id||'').trim().toLowerCase()===String(r.bean_name||'').trim().toLowerCase())prev=s;
  });
  var bean=(DB.beans||[]).find(function(b){return String(b.id)===String(r.bean_id);});
  /* 拉霸永遠有值：上次同豆分數帶入（clamp 1–3），沒有全 2＝Medium */
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(prev?prev[f[0]]:null);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(r.bean_name,dots);
  CUP={r:r,editId:null,scores:sc,dot:dk,dot0:dk,
    feats:(prev&&prev.features?prev.features.slice(0,3):[]),comment:'',
    process:(bean&&bean.process)||(prev&&prev.process)||''};
  paintCupSheet();
}
function cupClamp(v){v=Number(v);if(isNaN(v)||v<=0)return 2;return Math.min(3,Math.max(1,v));}
/* Re-cup（老闆點名「杯測需要 re-analysed」）：QC 佇列裡的批次重開杯測抽屜，帶原紀錄、存檔＝update 同一筆 */
async function openRecupSheet(q){
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(q.s[f[0]]);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(q.r.bean_name||q.s.sample_id,dots);
  CUP={r:q.r,editId:q.s.id,scores:sc,dot:dk,dot0:dk,
    feats:(q.s.features||[]).slice(0,3),comment:String(q.s.comment||''),
    process:q.s.process||''};
  paintCupSheet();
}
/* comment 留白時的規則組句（老闆拍板：本機組句不呼叫 AI）：風味詞＋高分感官，總長 ≤30 字元 */
function cupAutoComment(sc,feats){
  sc=sc||{};
  var fl=(feats||[]).filter(Boolean);
  var out=fl.slice(0,2).join(', ');
  if(out.length>22)out=fl[0]||'';
  var cand=[];
  if((sc.acidity||0)>=2.5)cand.push([sc.acidity,'bright']);
  if((sc.sweetness||0)>=2.5)cand.push([sc.sweetness,'sweet']);
  if((sc.body||0)>=2.5)cand.push([sc.body,'syrupy']);
  else if(sc.body&&sc.body<=1.5)cand.push([2,'silky']);
  if((sc.aftertaste||0)>=2.5)cand.push([sc.aftertaste,'long finish']);
  if((sc.fragrance||0)>=2.5)cand.push([sc.fragrance,'perfumed']);
  cand.sort(function(a,b){return b[0]-a[0];});
  var first=true;
  for(var i=0;i<cand.length;i++){
    var sep=out?(first?' · ':', '):'';
    if((out+sep+cand[i][1]).length>30)continue;
    out+=sep+cand[i][1];first=false;
  }
  return out;
}
/* Cup v2（杯測師視角設計評審）：成品預覽卡（雷達＋風味＋comment 合一）＋五條拉霸即時驅動 */
function paintCupSheet(){

  var spokes=K.map(function(_,i){var q=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="var(--line2)" stroke-width="1"/>';}).join('');

    }).join('')

  function grab(){

/* FIFO 消耗成分批次（照 classic consumeBlendComponents）——回傳不夠扣的清單 */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    var pool=(DB.roasts||[]).filter(function(r){
      return r.kind!=='blend'&&Number(r.remaining_kg)>0&&String(r.bean_name||'').trim().toLowerCase()===key;
    }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}
async function saveRoastSheet(){

  if(out!=null&&out>kg&&!confirm('Roasted out ('+out+' kg) is more than green in ('+kg+' kg). Save anyway?'))return;

/* ===== 滑卡（兩段式）=====
   右滑 >35% 寬＝直接做（照舊）。左滑不再直接貪睡：過門檻放手 → 卡片停在 -88px
   露出底層 Later 鈕，要「再點 Later」才真的睡（防誤滑）；點卡片本體/滑開別張＝彈回 */
var SWIPE_OPEN=null; /* 目前滑開露出 Later 的卡 id——一次只開一張 */
function closeSwipe(){
  if(!SWIPE_OPEN)return;
  var el=document.getElementById('c-'+SWIPE_OPEN);
  if(el){el.style.transition='transform .2s';el.style.transform='';}
  SWIPE_OPEN=null;
}
function attachSwipe(el,id){
  if(!canWrite())return; /* read-only：不綁滑卡（右做左睡都是寫入/共用貪睡） */
  /* 誤觸防護：方向鎖——先確認是「明確的橫向」才開始滑（斜滑/直捲直接放棄） */
  var x0=null,y0=0,dx=0,locked=false,dead=false,wasOpen=false;
  var barC=el.style.borderLeftColor; /* 類別色條：borderColor 清空會連左條一起洗掉，回彈時補回 */
  function reset(anim){el.style.transition=anim?'transform .25s':'none';el.style.transform='';el.style.borderColor='';el.style.borderLeftColor=barC;x0=null;dx=0;locked=false;dead=false;if(SWIPE_OPEN===id)SWIPE_OPEN=null;}
  el.addEventListener('pointerdown',function(e){
    if(e.target.closest('button'))return;
    wasOpen=(SWIPE_OPEN===id);
    if(SWIPE_OPEN&&SWIPE_OPEN!==id)closeSwipe(); /* 滑開別張＝先收舊的 */
    x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;
    try{el.setPointerCapture(e.pointerId);}catch(err){}
    el.style.transition='none';
  });
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;el.style.transform=wasOpen?'translateX(-88px)':'';el.style.borderColor='';el.style.borderLeftColor=barC;return;}
      if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.6)locked=true;
      else return;
    }
    var base=wasOpen?-88:0;
    el.style.transform='translateX('+Math.max(-118,base+dx*0.9)+'px)';
    var w=el.offsetWidth;
    var bc=(base+dx)>w*0.25?'var(--accent)':'';
    el.style.borderColor=bc;
    el.style.borderLeftColor=bc||barC; /* 沒過門檻時左條維持類別色 */
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth,end=(wasOpen?-88:0)+dx;
    if(locked&&end>w*0.35){var i=item(id);reset(true);if(i)runAction(id,null);return;}
    el.style.transition='transform .2s';el.style.borderColor='';el.style.borderLeftColor=barC;
    var itm=item(id);
    if(locked&&end<-60&&!(itm&&itm.nosnooze)){el.style.transform='translateX(-88px)';SWIPE_OPEN=id;} /* 停在滑開態，等點 Later（nosnooze 卡直接彈回） */
    else{el.style.transform='';if(SWIPE_OPEN===id)SWIPE_OPEN=null;}
    x0=null;dx=0;locked=false;dead=false;
  });
  /* 滑開態下點卡片本體＝收回（不觸發卡片動作；剛放手 300ms 內的 click 是拖曳尾勁，略過） */
  el.addEventListener('click',function(){if(SWIPE_OPEN===id&&Date.now()-_drag>300)closeSwipe();});
}

/* 印刷卡雷達：html2canvas **不畫行內 SVG**（老闆真機 PDF 雷達整個消失的破圖根因）
   → 用 canvas 畫成 PNG 嵌 <img>，4 倍超取樣夠印刷 */
/* opts.grid/opts.label＝網格線與標籤色（深色照片底要翻亮，不給就用原本的淺底配色） */
function printRadarPNG(sc,color,opts){
  opts=opts||{};
  var S=4;
  var cv=document.createElement('canvas');cv.width=412*S;cv.height=246*S;
  var x=cv.getContext('2d');x.scale(S,S);x.translate(62,-2); /* 對齊定稿 viewBox -62 2 412 246（大寫標籤要寬邊） */
  var K=[['fragrance','AROMA'],['acidity','ACIDITY'],['sweetness','SWEETNESS'],['body','BODY'],['aftertaste','AFTERTASTE']];
  var cx=150,cy=128,R=88;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  x.lineWidth=1;x.strokeStyle=opts.grid||'#D9D2CB';
  [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);if(i)x.lineTo(q[0],q[1]);else x.moveTo(q[0],q[1]);}x.stroke();});
  for(var i=0;i<5;i++){var q=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(q[0],q[1]);x.stroke();}
  var pts=K.map(function(k,i){return pt(i,R*(Number(sc[k[0]])||0)/3);});
  x.beginPath();pts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
  x.globalAlpha=.14;x.fillStyle=color;x.fill();x.globalAlpha=1;
  x.lineWidth=2.5;x.strokeStyle=color;x.lineJoin='round';x.stroke();
  x.fillStyle=color;
  pts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],4.5,0,6.3);x.fill();});
  x.fillStyle=opts.label||'#8A837C';x.font='600 13.5px Inter, sans-serif';
  try{x.letterSpacing='1px';}catch(e){}
  K.forEach(function(k,i){
    var q=pt(i,R+21);
    x.textAlign=q[0]<cx-4?'right':(q[0]>cx+4?'left':'center');
    x.fillText(k[1],q[0],q[1]+4);
  });
  return cv.toDataURL('image/png');
}
/* 豆子履歷全欄位（產區/處理廠/品種/海拔/處理法/產季/烘豆日/生豆商）——資訊卡與 Retail shelf 明細共用；生豆查法同 cardDataFor */
/* 拼配成分的身世：拿配方裡的成分豆去 green stock（DB.beans，記憶體現成的）對。
   ⚠ 處理法是消歧的關鍵，不能只比名字：
     · Finca Milan 生豆表有 6 支同名（不同 culturing）
     · Hakuna Matata 兩支——Honey 是 Sidra、Washed 是 Typica，比錯品種就寫錯
   ⚠ 配方寫泛稱、生豆帶版本號（配方 "Danche" ↔ 生豆 "Danche v1/v2/v3"），
     所以精確比對落空時再退一步用「前綴＋空白」比，仍以處理法挑對的那支 */
function greenForPart(p){
  var nm=String(p.bean||'').trim().toLowerCase();
  if(!nm)return null;
  var proc=String(p.process||'').trim().toLowerCase();
  var all=DB.beans||[];
  function pick(pool){
    if(!pool.length)return null;
    return (proc&&pool.filter(function(b){return String(b.process||'').trim().toLowerCase()===proc;})[0])||pool[0];
  }
  var exact=all.filter(function(b){return String(b.name||'').trim().toLowerCase()===nm;});
  return pick(exact)||pick(all.filter(function(b){return String(b.name||'').trim().toLowerCase().indexOf(nm+' ')===0;}));
}
/* opts.omit＝要略過的列名。對外素材（摺卡／社群圖／Square 商品圖）不印 Roasted 與 Harvest：
   烘焙日一印就過期，產季對客人也不是重點；店內的 Retail Info 抽屜照樣要看得到 */

  opts=opts||{};

  var nm=String(full.sample_id||'').trim();
  var info=[];
  function add(k,v){if(!omit[k]&&v!=null&&v!=='')info.push([k,v]);}
  /* 拼配豆：beans 表沒有同名生豆，身世＝blends 配方（判斷方式同 shelf 抽屜/cardDataFor：名字命中 blends 就是拼配）。
     明細改列配方成分：左欄比例、右欄「成分豆 · 處理法 · 產國」——處理法/產國用 greenForPart
     從 green stock 消歧（配方寫泛稱、生豆帶版本號，同名不同處理法要挑對那支）。

  }
  if(btn){btn.disabled=false;btn.textContent='Add it to every shelf coffee';}
  closeDrawer();
  toast(fail?('Applied to '+ok+', '+fail+' failed'):('Pour-over added to '+ok+' coffee'+(ok===1?'':'s')+' ✓'));

var _loadedScripts={};
function loadScriptOnce(url){
  if(_loadedScripts[url])return _loadedScripts[url];
  _loadedScripts[url]=new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src=url;s.onload=res;s.onerror=function(){delete _loadedScripts[url];rej(new Error('script load failed — check the connection'));};
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}

  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){

    if(o.altitude)orows.push(['Altitude',o.altitude+' MASL']);
    if(o.region)orows.push(['Region',o.region]);
    if(bean.recipe&&bean.recipe.length){
      /* blend → pull its recipe (component beans + %) from Blending */
      lab('RECIPE');
      bean.recipe.forEach(function(cpt){
        var pct=cpt.pct?(cpt.pct+'%'):'';
        var ctry=(cpt.country||'').trim();
        var proc=(cpt.process||'').trim();
        var line=cpt.bean+[ctry,proc].filter(Boolean).map(function(v){return '  \u00b7  '+v;}).join('');
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,line,lx,cy,lw-30,8.5,6.5);
        if(pct){doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);doc.setFontSize(8.5);doc.text(pct,lx+lw,cy,{align:'right'});}
        cy+=12;
      });
      cy+=15;
    }else if(orows.length){
      lab('ORIGIN');
      orows.forEach(function(rr){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
        doc.text(rr[0],lx,cy);
        doc.setTextColor(SUB[0],SUB[1],SUB[2]);
        mnFit(doc,rr[1],lx+lw,cy,lw-58,8.5,7,'right');cy+=12;
      });
      cy+=15;
    }
    if(bean.cupScores&&bean.cupScores.some(function(o){return o.n!=null;})){
      lab('CUPPING');
      var rR=26,rCx=lx+lw/2,rCy=cy+9+rR;
      drawCuppingRadar(doc,rCx,rCy,rR,bean.cupScores,band,[124,58,68]);
      cy=rCy+rR+9+15;
    }
    /* FLAVOUR — one line, no wrap, font grown to fill the column width */
    if(bean.flavour&&bean.flavour.length){
      var flText=mnAsc(bean.flavour.join('  \u00b7  '));
      doc.setFont('helvetica','bold');
      var fs=24;doc.setFontSize(fs);
      while(fs>9&&doc.getTextWidth(flText)>lw){fs-=0.5;doc.setFontSize(fs);}
      var baseY=y+h-16,labY=baseY-fs*0.9-8;
      doc.setFont('helvetica','bold');doc.setFontSize(6.6);doc.setTextColor(LABEL[0],LABEL[1],LABEL[2]);
      doc.text('FLAVOUR',lx,labY,{charSpace:1.1});
      doc.setFont('helvetica','bold');doc.setFontSize(fs);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(flText,lx,baseY);
    }

    /* ================= RIGHT · weekly offer ================= */
    var rx0=x+leftW+16,rEnd=x+w-15,rw=rEnd-rx0,ry=y+tabH+16;
    function money(v){v=String(v==null?'':v).trim().replace(/^\$+/,'');return '$'+(v||'\u2014');}
    function rule(){doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);doc.line(rx0,ry,rEnd,ry);}
    var PSZ=12.5;      /* price size — matched to the item name for a flat, even look */
    var ITEMSZ=12.5;   /* one item-name size for every drink */
    var SUBSZ=9;       /* sub-line size (e.g. "Black and White") */
    var SECGAP=18;     /* gap after a section's rule, before next category title */
    var TITLEGAP=18;   /* baseline-to-baseline from a category title down to its first item
                          (must exceed the price cap-height so the tall price never overlaps up into the title) */
    function catTitle(t){doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(178,94,106);doc.text(t.toUpperCase(),rx0,ry,{charSpace:1});ry+=TITLEGAP;}
    /* Draw one drink row with the item name (left) and price (right) sharing a
       common baseline. The price is vertically centred to the item cap-height so
       the two never look mismatched regardless of their differing font sizes. */
    function drinkRow(label,labelCol,priceVal){
      doc.setFont('helvetica','bold');doc.setFontSize(ITEMSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      mnFit(doc,label,rx0,ry,rw-58,ITEMSZ,9);
      doc.setFont('helvetica','bold');doc.setFontSize(PSZ);doc.setTextColor(labelCol[0],labelCol[1],labelCol[2]);
      doc.text(money(priceVal),rEnd,ry-(PSZ-ITEMSZ)*0.34,{align:'right'});
    }
    /* Special of the Week — plain heading, aligned to the banner bottom */
    doc.setFont('helvetica','bolditalic');doc.setFontSize(13);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Special of the Week',rx0,ry);ry+=28;
    /* Espresso Based · 1+1 Combo */
    catTitle('Espresso Based');
    drinkRow('1+1 Combo',RED,off.combo);ry+=15;
    doc.setFont('helvetica','italic');doc.setFontSize(SUBSZ);doc.setTextColor(0,0,0);
    doc.text('Black and White',rx0,ry);ry+=16;
    rule();ry+=SECGAP;
    /* Signature · Dirty Ratio */
    catTitle('Signature');
    drinkRow('Dirty Ratio',BLUE,off.dirty);ry+=16;
    rule();ry+=SECGAP;
    /* Hand Pour - Filter Coffee · Hot / Cold */
    catTitle('Hand Pour - Filter Coffee');
    drinkRow('Hot',RED,off.hot);ry+=22;
    drinkRow('Cold',BLUE,off.cold);

  function drawDineInMenu(doc,ox,w,h,cfg,logo){
    var INK=[0,0,0], BERRY=[124,58,68], LINE=[30,26,25], MUTE=[120,112,108];
    var HOT=[214,0,108], COLD=[42,143,216];
    var padX=26, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;
    var P=cfg.prices||{};
    function pv(k,d){var s=String(P[k]==null?'':P[k]).trim();return s||d||'';}

    /* ---- unified type scale ---- */
    var FS_TITLE=20, FS_KICKER=8, FS_SECTION=9.5, FS_ITEM=11, FS_PRICE=12, FS_META=8.5, FS_DESC=8.5;
    /* ---- unified spacing ---- */
    var ROW=17.5;      /* baseline-to-baseline for a standard priced item */
    var META_LH=10;    /* line height for a meta/description line under an item */
    var SEC_TOP=15;    /* space above a section rule */
    var SEC_GAP=18;    /* space from section rule down to its first item */

    var y=38;

    /* ---------- title block ---------- */
    doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
    doc.text('DINE IN MENU',ox+w/2,y,{align:'center',charSpace:3});
    doc.setFont('helvetica','bold');doc.setFontSize(FS_TITLE);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Ratio Crows Nest',ox+w/2,y+21,{align:'center'});
    y+=21;

    /* ---------- section header ---------- */
    function section(label,sub){
      y+=SEC_TOP;
      doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
      doc.text(label.toUpperCase(),x0,y,{charSpace:1.8});
      if(sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(sub),xEnd,y,{align:'right'});}
      doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.6);
      doc.line(x0,y+6,xEnd,y+6);
      y+=SEC_GAP;
    }
    /* ---------- price row (name | size .... price) ---------- */
    function priceRow(name,size,price,note){
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(mnAsc(name),x0,y);
      var nw=doc.getTextWidth(mnAsc(name));
      if(size){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text('  |  '+size,x0+nw+3,y);}
      if(price){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(price,xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
      if(note){y+=META_LH;doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(note),x0,y);}
      y+=ROW;
    }
    /* ---------- a plain meta line: label left, value right ---------- */
    function metaRow(label,value){
      doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(mnAsc(label),x0,y);
      if(value)doc.text(mnAsc(value),xEnd,y,{align:'right'});
      y+=META_LH+2;
    }

    /* ---------- two espresso blends ---------- */
    var bl=cfg.blends||[], colCx=[x0+innerW*0.27, x0+innerW*0.73], by=y+30;
    [0,1].forEach(function(ci){
      var b=bl[ci]||{}, cx=colCx[ci], hl=!!b.highlight;
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',cx,by-12,{align:'center',charSpace:1.2});}
      doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      doc.text(mnAsc((b.name||'').toUpperCase()),cx,by,{align:'center'});
      if(b.sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(b.sub),cx,by+12,{align:'center'});}
      if(b.notes){doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(mnAsc(b.notes),cx,by+25,{align:'center'});}
    });
    var midX=x0+innerW*0.5;
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1);
    doc.line(midX+6,by-11,midX-6,by+27);
    y=by+37;

    /* ---------- ESPRESSO BASED ---------- */
    section('Espresso Based');
    priceRow('Espresso','',pv('espresso'));
    priceRow('Small','6oz',pv('small'));
    priceRow('Large','10oz',pv('large'));
    priceRow('On Ice','10oz',pv('ice'));
    metaRow('extra shot \u00b7 alternative milk',pv('altmilk','50 cents'));
    metaRow('decaf',pv('decaf','1 dollar'));

    /* ---------- SIGNATURE ---------- */
    section('Signature');
    doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Dirty Ratio',x0,y);
    var dnw=doc.getTextWidth('Dirty Ratio');
    if(cfg.dirtySub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('  '+mnAsc(cfg.dirtySub),x0+dnw+4,y);}
    if(pv('dirty')){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(pv('dirty'),xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
    y+=META_LH+2;
    if(cfg.dirtyDesc){doc.setFont('helvetica','normal');doc.setFontSize(FS_DESC);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.splitTextToSize(mnAsc(cfg.dirtyDesc),innerW).slice(0,2).forEach(function(ln){doc.text(ln,x0,y);y+=META_LH;});}
    y+=4;

    /* ---------- AUTOMATED BREWING ---------- */
    section('Automated Brewing');
    priceRow('Fresh Batch','10oz',pv('fresh'),cfg.freshNote);
    priceRow('Cold Batch','10oz',pv('cold'),cfg.coldNote);

    /* ---------- HAND POUR FILTER COFFEE ---------- */
    section('Hand Pour Filter Coffee','hot or iced');
    (cfg.pours||[]).slice(0,4).forEach(function(it){
      var name=mnAsc(it.name||'');if(!name)return;
      var hl=!!it.highlight;
      var beanCol=mnHexRgb(beanColorFor(it.bean||it.name))||null;
      var hot=String(it.hot==null?'':it.hot).trim(), cold=String(it.cold==null?'':it.cold).trim();
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1.5);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',x0,y,{charSpace:1.2});y+=10;}
      /* right-aligned hot (pink) / cold (blue), vertically centred to the item name */
      doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);
      var py=y-(FS_PRICE-FS_ITEM)*0.34, rx=xEnd;
      doc.setTextColor(COLD[0],COLD[1],COLD[2]);doc.text(cold||'-',rx,py,{align:'right'});
      var cwid=doc.getTextWidth(cold||'-');
      doc.setTextColor(INK[0],INK[1],INK[2]);doc.text(' / ',rx-cwid,py,{align:'right'});
      var swid=doc.getTextWidth(' / ');
      doc.setTextColor(HOT[0],HOT[1],HOT[2]);doc.text(hot||'-',rx-cwid-swid,py,{align:'right'});
      var priceW=cwid+swid+doc.getTextWidth(hot||'-');
      /* name — bean's own retail colour shown as a small dot marker, not text tint */
      var dotGap=11, nameX=x0+dotGap;
      if(beanCol){doc.setFillColor(beanCol[0],beanCol[1],beanCol[2]);doc.circle(x0+3,y-3.5,3,'F');}
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      mnFit(doc,name,nameX,y,innerW-priceW-14-dotGap,FS_ITEM,8.5);
      y+=META_LH+1.5;
      if(it.origin){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(it.origin),x0,y);y+=META_LH;}
      if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(FS_DESC+0.5);doc.setTextColor(INK[0],INK[1],INK[2]);
        mnFit(doc,it.flavour,x0,y,innerW,FS_DESC+0.5,8);y+=META_LH;}
      y+=6;
    });
  }

  function drawCell(doc,x,y,w,h,info,INK,BROWN,BERRY,MUTE){
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    var px=x+15, pw=w-30;
    if(!info||!info.name){
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('— empty —',x+w/2,y+h/2,{align:'center'});
      return;
    }
    /* ---- coloured banner header (name highlighted in its assigned colour) ---- */
    var band=mnHexRgb(info.color)||BROWN;
    var bandH=38;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE — small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR — primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  ·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE — primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength — radar chart (secondary, muted) — inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid — fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    for(var i=0;i<4;i++){drawCell(doc,cellX[i],cellY[i],cw,ch,info4[i],INK,BROWN,BERRY,MUTE);}
  }
  function buildMenuPDF(info4,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth();   /* ~841.89 */
    var H=doc.internal.pageSize.getHeight();  /* ~595.28 */
    drawMenu(doc,0,W/2,H,info4,logo);
    drawMenu(doc,W/2,W/2,H,info4,logo);
    /* centre dashed cut line */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_Menu.pdf');
  }

function xmlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var LBL_MM2PT=72/25.4;
var LBL_LEFT_PT=7*LBL_MM2PT;
var LBL_RIGHT_PT=62*LBL_MM2PT;
var LBL_WIDTH_PT=LBL_RIGHT_PT-LBL_LEFT_PT;
function lblFitBlock(block,origLen){
  var os=block.match(/<pt:objectStyle x="([\d.]+)pt" y="([\d.]+)pt" width="([\d.]+)pt" height="([\d.]+)pt"/);
  if(!os)return block;
  var ow=parseFloat(os[3]);
  var fe=block.match(/size="([\d.]+)pt"/);var origSize=fe?parseFloat(fe[1]):0;
  var nx=LBL_LEFT_PT,nw=LBL_WIDTH_PT;
  block=block.replace(os[0],'<pt:objectStyle x="'+nx.toFixed(2)+'pt" y="'+os[2]+'pt" width="'+nw.toFixed(2)+'pt" height="'+os[4]+'pt"');
  block=block.replace(/control="AUTOLEN"/,'control="LONGTEXTFIXED"');
  block=block.replace(/(<text:textControl[^>]*?shrink=")\w+(")/,'$1true$2');
  block=block.replace(/(<text:textControl[^>]*?autoLF=")\w+(")/,'$1false$2');
  block=block.replace(/(<text:textControl[^>]*?clipFrame=")\w+(")/,'$1false$2');
  var dm=block.match(/<pt:data>([\s\S]*?)<\/pt:data>/);
  var newLen=((dm?dm[1]:'')||'').length||1;
  if(origSize>0&&origLen>0&&ow>0){
    var cw=ow/(origLen*origSize);
    if(cw>0){
      var maxSize=(nw*0.97)/(newLen*cw);
      var ns=Math.min(origSize,maxSize);if(ns<3)ns=3;
      block=block.replace(/size="([\d.]+)pt"/g,'size="'+(Math.round(ns*10)/10)+'pt"');
    }
  }
  return block;
}

async function generateTinLbx(){
  var msg=document.getElementById('tinlbx-msg');var btn=document.getElementById('tinlbx-gen');
  try{
    if(!window.JSZip){if(msg){msg.textContent='Zip library still loading, try again';msg.className='gform-msg err';}return;}
    if(btn)btn.disabled=true;if(msg){msg.textContent='Building .lbx…';msg.className='gform-msg';}
    var zip=await JSZip.loadAsync(await fetchAsset('/tin-label.lbx'));
    var xml=await zip.file('label.xml').async('string');
    tinCompileEntries().forEach(function(f){
      var newText=(f.value==null)?'':f.value;
      var dataOld='<pt:data>'+xmlEsc(f.orig)+'</pt:data>';
      var idx=xml.indexOf(dataOld);if(idx<0)return;
      var bStart=xml.lastIndexOf('<text:text>',idx);var bEnd=xml.indexOf('</text:text>',idx)+12;
      var block=xml.slice(bStart,bEnd),nb=block;
      if(newText!==f.orig){
        nb=nb.replace(/<pt:data>[\s\S]*?<\/pt:data>/,'<pt:data>'+xmlEsc(newText)+'</pt:data>');
        var items=tinStringItems(block,newText);
        nb=nb.replace(/<text:stringItem charLen="\d+">[\s\S]*<\/text:stringItem>/,items);
      }
      if(nb!==block){xml=xml.slice(0,bStart)+nb+xml.slice(bEnd);}
    });
    var srcName=(tinMode==='blend'?tinBlend.name:(tinForm.name||tinForm.country))||'tin';
    var nm=srcName.replace(/[^A-Za-z0-9 _\-]/g,'').trim().replace(/\s+/g,'_')||'tin';
    try{var logoBmp=await tinLogoBmp();if(logoBmp)zip.file('Object0.bmp',logoBmp);}catch(e){}
    try{
      var rbmp=tinRadarBmp(tinSample);
      if(rbmp&&xml.indexOf('Object1.bmp')<0){
        zip.file('Object1.bmp',rbmp);
        xml=xml.replace('</pt:objects>',TIN_RADAR_OBJ+'</pt:objects>');
      }
    }catch(e){}
    try{
      var flav=(tinSample&&tinSample.features&&tinSample.features.length)
        ?tinSample.features.map(function(x){return String(x||'').trim();}).filter(Boolean).join(' · ').toUpperCase()
        :'';
      if(flav){
        var flavObj=TIN_FLAV_OBJ.replace('__DATA__',xmlEsc(flav)).replace('__LEN__',String(flav.length));
        xml=xml.replace('</pt:objects>',flavObj+'</pt:objects>');
      }
    }catch(e){}
    zip.file('label.xml',xml);
    var blob=await zip.generateAsync({type:'blob',mimeType:'application/octet-stream',compression:'DEFLATE'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nm+'.lbx';document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    if(btn)btn.disabled=false;if(msg){msg.textContent='Done — '+nm+'.lbx downloaded';msg.className='gform-msg ok';}
  }catch(e){if(btn)btn.disabled=false;if(msg){msg.textContent='Generate failed: '+(e&&e.message||e);msg.className='gform-msg err';}}
}

   寫入照 classic saveRosterRow upsert rosters（cash 欄原封帶回不動——薪務已搬 pay_weeks，但 classic 還讀 rosters.cash）；
   時數＝時距−(br?0.5:0)，同 classic tsPaidBr */
var RS_WK=0, RS_VIEW='day', RS_DATA={}, RS_STAFF=[], RS_NA=[], RS_TPL=null, RS_TE=null;
var RS_DOW=[['mon','Mon'],['tue','Tue'],['wed','Wed'],['thu','Thu'],['fri','Fri'],['sat','Sat'],['sun','Sun']];
/* 老闆口述班型（週六日暫無 break）——存 app_state ts_templates 後以那份為準；這只是首次預設，抽屜可改 */
var RS_TPL_DEFAULT={
  monfri:[{start:'06:15',end:'14:15',br:true},{start:'08:15',end:'14:15',br:false}],
  sat:[{start:'06:15',end:'15:15',br:false},{start:'08:15',end:'16:15',br:false},{start:'09:15',end:'16:15',br:false}],
  sun:[{start:'06:15',end:'08:15',br:false},{start:'08:15',end:'15:15',br:false},{start:'08:15',end:'16:15',br:false},{start:'09:15',end:'16:15',br:false}]
};
function rsHM(s){var p=String(s||'').split(':');return (+p[0])*60+(+p[1]);}
function rsHrs(start,end,br){if(!start||!end)return 0;var x=(rsHM(end)-rsHM(start))/60;if(x<0)x+=24;if(br)x-=0.5;return x<0?0:x;}
function rsHH(x){x=Math.round(x*10)/10;return (x===Math.round(x)?String(x):String(x))+'h';}
function rsWeekStart(i){var d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7)+i*7);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function rsDateFor(ws,dowIdx){var p=String(ws).split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+dowIdx);return d;}
function rsDMY(d){return d.getDate()+'/'+(d.getMonth()+1);}
function rsDIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function rsUnavailable(name,dObj){if(!name)return false;var ds=rsDIso(dObj);return (RS_NA||[]).some(function(n){return String(n.name)===String(name)&&String(n.start_date)<=ds&&String(n.end_date)>=ds;});}
function rsTpl(){return (RS_TPL&&RS_TPL.monfri)?RS_TPL:RS_TPL_DEFAULT;}

/* By person：同一週的班改按「人」分組（每人本週總時數＋逐班；未指派另列一格）。點班照樣進 openShiftEdit */
function rosterPersonHTML(ws,shifts){
  var canEdit=isLead();
  var byName={},order=[];
  shifts.forEach(function(s,idx){
    var nm=(s.name&&String(s.name).trim())?String(s.name).trim():'';
    if(!nm)return;
    if(!byName[nm]){byName[nm]={rows:[],total:0};order.push(nm);}
    byName[nm].rows.push({s:s,idx:idx});
    byName[nm].total+=rsHrs(s.start,s.end,s.br);
  });
  order.sort(function(a,b){var ia=RS_STAFF.indexOf(a),ib=RS_STAFF.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  var unassigned=shifts.filter(function(s){return !(s.name&&String(s.name).trim());}).length;
  if(!order.length&&!unassigned)return '<div class="rs-none" style="border:1px solid var(--line);border-radius:12px">No shifts yet — switch to By day to add them</div>';
  var dowKeys=RS_DOW.map(function(x){return x[0];});
  var html=order.map(function(nm){
    var p=byName[nm];
    p.rows.sort(function(a,b){return dowKeys.indexOf(a.s.day)-dowKeys.indexOf(b.s.day)||(String(a.s.start)<String(b.s.start)?-1:1);});
    var rows=p.rows.map(function(o){
      var di=dowKeys.indexOf(o.s.day),dObj=rsDateFor(ws,di<0?0:di),warn=rsUnavailable(nm,dObj);
      var pin='<span class="rs-nm" style="font-weight:500;font-size:13px">'+((RS_DOW[di]||['','?'])[1])+' '+rsDMY(dObj)+(warn?' <span class="fr-yellow">⚠</span>':'')+'</span>'
        +'<span class="rs-tm">'+esc(o.s.start)+'–'+esc(o.s.end)+(o.s.br?' ·½':'')+' · '+rsHH(rsHrs(o.s.start,o.s.end,o.s.br))+'</span>';
      return canEdit?'<button class="rs-shift" data-rsedit="'+o.idx+'">'+pin+'</button>':'<div class="rs-shift" style="cursor:default">'+pin+'</div>';
    }).join('');
    return '<div class="rs-day"><div class="rs-day-h"><span>'+esc(nm)+'</span><span style="color:var(--accent)">'+rsHH(p.total)+' this week</span></div>'+rows+'</div>';
  }).join('');
  if(unassigned)html+='<div class="rs-day"><div class="rs-day-h"><span style="color:var(--muted)">Unassigned</span><span style="color:var(--muted)">'+unassigned+' shift'+(unassigned===1?'':'s')+' — assign in By day</span></div></div>';
  return html;
}
function applyStandardWeek(ws){

    (slots||[]).forEach(function(sl){out.push({day:dw[0],name:'',start:sl.start,end:sl.end,br:!!sl.br});});

  RS_DATA[ws].shifts=out;renderRoster();toast('Standard week applied — now assign people');

/* ===== Timesheet 2.0 Stage D：往週薪務（時數平日/週末拆分＋薪水＋Cash/Bank＋費率）=====
   錢的顯示只給 director/finance（rsMoney）——但真正的牆是 RLS：staff_rates/pay_weeks 資料庫層 money-only，
   員工帳號查回全空，前端這層只是不畫。時數拆分同 classic weekFromShifts（mon-fri=平日，sat+sun=週末） */
function rsMoney(){return ROLE==='director'||ROLE==='finance';}
function rsWeekHours(shifts){
  var order=['mon','tue','wed','thu','fri','sat','sun'],wd={},we={},names=[];
  (shifts||[]).forEach(function(s){
    var nm=(s.name&&String(s.name).trim())?String(s.name).trim():'';if(!nm)return;
    var i=order.indexOf(s.day),h=rsHrs(s.start,s.end,s.br);
    if(names.indexOf(nm)<0)names.push(nm);
    if(i>=0&&i<5)wd[nm]=(wd[nm]||0)+h;else we[nm]=(we[nm]||0)+h;
  });
  names.sort(function(a,b){var ia=RS_STAFF.indexOf(a),ib=RS_STAFF.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  return names.map(function(nm){return {name:nm,wd:Math.round((wd[nm]||0)*10)/10,we:Math.round((we[nm]||0)*10)/10};});
}

function buildPayPDF(w,logo){
  var JS=window.jspdf.jsPDF;
  var doc=new JS({orientation:'portrait',unit:'pt',format:'a4'});
  var W=doc.internal.pageSize.getWidth();   /* ~595 */

function payTotals(w){

/* ===== 利潤計算機（從 classic CALC_HTML 移植；計算邏輯逐字照抄 getBase/calcRetail/calcWholesale，
   UI 改用新殼 tokens；零售/批發雙模式。參考案例：4 鍋·10kg·13%·$30豆·150g@$25 → 232 包·利潤 $4159·71.7%）===== */
var CX={mode:'retail',pots:4,bean:30,greenKg:10,shrink:13,cbag:0,cstick:0,cbox:0,packRate:30,packSpeed:60,venue:125,staff:50,transport:100,pkg:0,wsPrice:12,wsQty:20,pkgs:[{g:150,p:25},{g:250,p:25}]};
function cxBase(){
  var roastedKg=CX.pots*CX.greenKg*(1-CX.shrink/100), totalGreenKg=CX.pots*CX.greenKg;
  var roastMin=CX.pots*15, totalMin=30+roastMin+30, venueHrs=roastMin/60, staffHrs=totalMin/60;
  return {roastedKg:roastedKg,totalGreenKg:totalGreenKg,roastMin:roastMin,totalMin:totalMin,venueHrs:venueHrs,staffHrs:staffHrs,
    venueCost:venueHrs*CX.venue, staffCost:staffHrs*CX.staff, beanCost:totalGreenKg*CX.bean,
    packLaborPerBag:CX.packSpeed>0?CX.packRate/CX.packSpeed:0, matCostPerBag:CX.cbag+CX.cstick+CX.cbox};
}
function cxMoney(n){return '$'+(Number(n)||0).toFixed(2);}
function cxBrow(l,v,strong,col){return '<div class="dl"'+(strong?' style="font-weight:700"':'')+'><span'+(strong?' style="color:var(--ink)"':'')+'>'+l+'</span><span'+(col?' style="color:'+col+'"':'')+'>'+v+'</span></div>';}
function cxResults(){
  var b=cxBase(), pkg=CX.pkgs[CX.pkg]||CX.pkgs[0];
  if(CX.mode==='retail'){
    var bags=Math.floor(b.roastedKg/(pkg.g/1000));
    var matTotal=bags*b.matCostPerBag, packLaborTotal=bags*b.packLaborPerBag;
    var totalCost=b.venueCost+b.staffCost+CX.transport+b.beanCost+matTotal+packLaborTotal;
    var revenue=bags*pkg.p, profit=revenue-totalCost, margin=revenue>0?profit/revenue*100:0;
    var pc=profit>=0?'var(--accent)':'var(--danger)';
    var bd=cxBrow('Transport (incl. labour)',cxMoney(CX.transport))
      +cxBrow('Venue x '+b.venueHrs.toFixed(2)+' hr',cxMoney(b.venueCost))
      +cxBrow('Roast staff x '+b.staffHrs.toFixed(2)+' hr',cxMoney(b.staffCost))
      +cxBrow('Green ('+b.totalGreenKg+' kg x $'+CX.bean+')',cxMoney(b.beanCost));
    if(b.matCostPerBag>0)bd+=cxBrow('Packaging ('+bags+' x '+cxMoney(b.matCostPerBag)+')',cxMoney(matTotal));
    bd+=cxBrow('Packing labour ('+bags+' x '+cxMoney(b.packLaborPerBag)+')',cxMoney(packLaborTotal))
      +cxBrow('Total cost',cxMoney(totalCost),true)
      +cxBrow('Revenue ('+bags+' x $'+pkg.p+')',cxMoney(revenue),true);
    return '<div class="cx-mgrid">'
        +'<div class="cx-metric"><span>Sellable bags</span><b>'+bags+'</b></div>'
        +'<div class="cx-metric"><span>Roasted</span><b>'+b.roastedKg.toFixed(1)+' kg</b></div>'
        +'<div class="cx-metric hi"><span>Profit</span><b style="color:'+pc+'">'+(profit>=0?'+':'')+cxMoney(Math.abs(profit)).replace('$','$')+'</b></div>'
        +'<div class="cx-metric"><span>Margin</span><b style="color:'+pc+'">'+margin.toFixed(1)+'%</b></div></div>'
      +'<div class="dlab">Cost breakdown</div>'+bd;
  }else{
    var totalBags=Math.floor(b.roastedKg/(pkg.g/1000));
    var roastCostPerBag=totalBags>0?(b.venueCost+b.staffCost+CX.transport+b.beanCost)/totalBags:0;
    var totalCostPerBag=roastCostPerBag+b.matCostPerBag+b.packLaborPerBag;
    var subtotal=CX.wsQty*CX.wsPrice, MOQ=150, SHIP=20, moqMet=subtotal>=MOQ, shipping=moqMet?0:SHIP;
    var orderTotal=subtotal+shipping, orderCost=CX.wsQty*totalCostPerBag;
    var orderProfit=orderTotal-orderCost, orderMargin=orderTotal>0?orderProfit/orderTotal*100:0;
    var profitPerBag=CX.wsPrice-totalCostPerBag, pc=orderProfit>=0?'var(--accent)':'var(--danger)';
    var bd=cxBrow('Roast cost / bag (allocated)',cxMoney(roastCostPerBag));
    if(b.matCostPerBag>0)bd+=cxBrow('Packaging / bag',cxMoney(b.matCostPerBag));
    bd+=cxBrow('Packing labour / bag',cxMoney(b.packLaborPerBag))
      +cxBrow('Total cost / bag',cxMoney(totalCostPerBag),true)
      +cxBrow('Goods ('+CX.wsQty+' x $'+CX.wsPrice.toFixed(2)+')',cxMoney(subtotal))
      +cxBrow('Delivery',moqMet?'free':cxMoney(SHIP),false,moqMet?'var(--accent)':'')
      +cxBrow('Order total',cxMoney(orderTotal),true);
    return '<div class="cx-note'+(moqMet?' ok':'')+'">'+(moqMet?'Meets $150 MOQ · free delivery':'Under $150 MOQ · +$20 delivery (needs $'+(MOQ-subtotal).toFixed(2)+' more)')+'</div>'
      +'<div class="cx-mgrid">'
        +'<div class="cx-metric"><span>Bags made</span><b>'+totalBags+'</b></div>'
        +'<div class="cx-metric"><span>Profit / bag</span><b style="color:'+(profitPerBag>=0?'var(--accent)':'var(--danger)')+'">'+(profitPerBag>=0?'+':'')+cxMoney(Math.abs(profitPerBag))+'</b></div>'
        +'<div class="cx-metric hi"><span>Order profit</span><b style="color:'+pc+'">'+(orderProfit>=0?'+':'')+cxMoney(Math.abs(orderProfit))+'</b></div>'
        +'<div class="cx-metric"><span>Margin</span><b style="color:'+pc+'">'+orderMargin.toFixed(1)+'%</b></div></div>'
      +'<div class="dlab">Per-bag breakdown</div>'+bd;
  }
}

function vapidBytes(){
  var s=VAPID_PUBLIC, pad='='.repeat((4-s.length%4)%4);
  var b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  return a;
}

    await navigator.serviceWorker.ready;
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Permission not granted');return;}

function sampleRadarSVG(s,force){
  var axes=[['fragrance','Fragrance'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
  if(!force&&!axes.some(function(a){return s[a[0]]!=null;}))return '';
  var W=232,H=176,cx=W/2,cy=H/2+4,R=46,n=axes.length;
  function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
  function poly(r){return axes.map(function(_,i){var p=pt(i,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
  var grid='';[1,2,3].forEach(function(l){grid+='<polygon points="'+poly(R*l/3)+'" fill="none" stroke="rgba(128,120,115,0.22)" stroke-width="1"/>';});
  var spokes='';for(var i=0;i<n;i++){var p=pt(i,R);spokes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(128,120,115,0.18)" stroke-width="1"/>';}
  var dpts=axes.map(function(a,i){var v=(s[a[0]]==null?0:s[a[0]]);return pt(i,R*(v/3));});
  var dpoly=dpts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dots=dpts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2" fill="#B25E6A"/>';}).join('');
  var labels='';axes.forEach(function(a,i){
    var lp=pt(i,R+15),anc=(lp[0]<cx-2?'end':(lp[0]>cx+2?'start':'middle'));
    labels+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+3).toFixed(1)+'" font-size="9" font-weight="700" fill="#8C8079" text-anchor="'+anc+'">'+a[1]+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">'
    +grid+spokes
    +'<polygon points="'+dpoly+'" fill="rgba(178,94,106,0.18)" stroke="#B25E6A" stroke-width="1.6" stroke-linejoin="round"/>'
    +dots+labels+'</svg>';
}

/* 分類（老闆定的四格）：Blend＝有配方；Co-ferment＝culturing/co-ferment 類；Innovation＝實驗處理法；其餘 Classic */
var SHOP_CATS=[['blend','Blend'],['classic','Classic'],['innovation','Innovation'],['coferment','Co-ferment']];
var SHOP_CAT='blend', SHOP_BEANS=[];
function shopCategory(b){
  if(b.recipe&&b.recipe.length)return 'blend';
  var p=String(b.process||'').toLowerCase();
  if(/co.?ferment|culturing/.test(p))return 'coferment';
  if(/anaerobic|hydro|nitro|carbonic|thermal|cold ferment|yeast|lactic|maceration/.test(p))return 'innovation';
  return 'classic';
}
/* 店面主體：左右滑輪播（scroll-snap，一頁一支豆）＋圓點指示；tab 切分類重畫 */
function renderShopTabs(){
  var el=$('shoptabs');
  var counts={};SHOP_BEANS.forEach(function(b){var c=shopCategory(b);counts[c]=(counts[c]||0)+1;});
  var visible=SHOP_CATS.filter(function(c){return counts[c[0]];});
  if(!counts[SHOP_CAT])SHOP_CAT=visible.length?visible[0][0]:SHOP_CAT;
  /* 空分類不渲染（死路移除）；只剩一類＝整條藏 */
  if(visible.length<=1){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=visible.map(function(c){return '<button data-sct="'+c[0]+'" class="'+(SHOP_CAT===c[0]?'on':'')+'">'+c[1]+'</button>';}).join('');
  el.querySelectorAll('[data-sct]').forEach(function(b){b.addEventListener('click',function(){SHOP_CAT=b.dataset.sct;paintShopBody();});});
}
function paintShopBody(){
  var host=$('shopbody');if(!host)return;
  document.querySelectorAll('#shoptabs [data-sct]').forEach(function(b){b.classList.toggle('on',b.dataset.sct===SHOP_CAT);});
  var list=SHOP_BEANS.filter(function(b){return shopCategory(b)===SHOP_CAT;});
  if(!list.length){host.innerHTML='<div class="empty">Nothing in this corner right now ☕</div>';return;}
  host.innerHTML='<div class="shopwrap" id="shopwrap">'+shopCardsHTML(list)+'</div>'
    /* 玻璃箭頭放 shopbody 裡：離開商店畫面（innerHTML 換掉）就自動消失 */
    +(list.length>1
      ?'<button class="shoparr l" id="sharr-l" aria-label="Previous coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'
      +'<button class="shoparr r" id="sharr-r" aria-label="Next coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'
      :'');
  wireShopCards(host);
  paintCartBar();
  var w=$('shopwrap');
  if(w&&list.length>1){
    var slideW=function(){return w.children[0]?(w.children[0].offsetWidth+14):w.clientWidth;};
    var arrPaint=function(){
      var i=Math.round(w.scrollLeft/slideW());
      var l=$('sharr-l'),r=$('sharr-r');if(!l||!r)return;
      l.style.display=i>0?'flex':'none';
      r.style.display=i<list.length-1?'flex':'none';
    };
    /* smooth scrollBy 在 scroll-snap 容器會被吃掉（實測不動）→ rAF 手動滑，結尾 snap 自己吸正 */
    var glide=function(dx){
      var from=w.scrollLeft,t0=null;
      var step=function(ts){
        if(t0==null)t0=ts;
        var p=Math.min(1,(ts-t0)/260);p=1-Math.pow(1-p,3);
        w.scrollLeft=from+dx*p;
        if(p<1)requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    };
    $('sharr-l').addEventListener('click',function(){glide(-slideW());});
    $('sharr-r').addEventListener('click',function(){glide(slideW());});
    w.addEventListener('scroll',arrPaint,{passive:true});
    arrPaint();
  }
}
/* 規格明細列（Blend 或 Process/Origin/Variety/Cup/Bag/Roasted）——主卡瘦身後只在明細抽屜用 */
function shopSpecsFor(b){
  var specs=[];
  if(b.recipe&&b.recipe.length)specs.push(['Blend',b.recipe.map(function(p){return esc(p.bean)+' '+p.pct+'%';}).join(' · ')]);
  else if(b.process)specs.push(['Process',esc(b.process)]);
  if(b.origin)specs.push(['Origin',esc(b.origin)]);
  if(b.variety)specs.push(['Variety',esc(b.variety)]);
  if(b.comment)specs.push(['Cup',esc(b.comment)]);
  specs.push(['Bag',(b.grams||250)+'g whole beans']);
  if(b.roast_date){
    var age=daysSince(b.roast_date);
    /* 對客人講人話：<3週 aging（醒豆中）、3–6週 ready（最佳賞味）、>6週 fading（店內紅綠黃是營運視角） */
    var band=age<SHELF_FRESH_REST?'aging':(age<=SHELF_FRESH_PRIME?'ready':'fading');
    specs.push(['Roasted',(fmtD(b.roast_date)||'')+' — '+band]);
  }
  return specs;
}

/* 卡片互動：規格段選、數量步進、加入購物車（狀態記在卡片 data-*，不重畫不打斷輪播） */
function wireShopCards(root){
  root.querySelectorAll('.shopc').forEach(function(card){
    function price(){return parseFloat(card.dataset.price)||0;}
    function qty(){return parseInt(card.querySelector('.shopqty')?card.querySelector('.shopqty').textContent:'1',10)||1;}
    function paintBtn(){
      var b=card.querySelector('[data-addcart]');if(!b)return;
      var p=price()*qty();
      b.textContent='Add to cart'+(p?' · $'+centAmt(p):'');
    }
    card.querySelectorAll('[data-sz]').forEach(function(el){el.addEventListener('click',function(){
      card.querySelectorAll('[data-sz]').forEach(function(x){x.classList.toggle('on',x===el);});
      card.dataset.vid=el.dataset.vid;card.dataset.price=el.dataset.price;card.dataset.label=el.dataset.label;
      var pp=card.querySelector('.shopprice');
      if(pp&&el.dataset.price)pp.innerHTML=shopPriceHTML(el.dataset.price,el.dataset.label,el.dataset.retail!==''?el.dataset.retail:null);
      paintBtn();
    });});
    card.querySelectorAll('[data-shopq]').forEach(function(el){el.addEventListener('click',function(){
      var q=Math.max(1,Math.min(cartMaxQty(),qty()+(+el.dataset.shopq)));
      card.querySelector('.shopqty').textContent=q;
      paintBtn();
    });});
    var add=card.querySelector('[data-addcart]');
    if(add)add.addEventListener('click',function(){
      if(!card.dataset.vid){alert('This coffee is not available right now.');return;}
      cartAdd({bean:card.dataset.bean,label:card.dataset.label,vid:card.dataset.vid,price:parseFloat(card.dataset.price)||0,qty:qty()});
      toast('Added to cart ✓');
    });
    var det=card.querySelector('[data-shopdetail]');
    if(det)det.addEventListener('click',function(){openShopDetailSheet(card.dataset.bean);});
    /* 卡片圖的圓點跟著橫滑走。⚠ 別用 rAF 節流——頁面不畫影格時它不會跑，圓點就永遠不動 */
    var slide=card.querySelector('[data-slide]');
    if(slide){
      var dots=card.querySelectorAll('.shopimgdots span'),lastI=0;
      slide.addEventListener('scroll',function(){
        var i=Math.round(slide.scrollLeft/Math.max(1,slide.clientWidth));
        if(i===lastI)return;
        lastI=i;
        dots.forEach(function(d,di){d.classList.toggle('on',di===i);});
      },{passive:true});
    }
  });
}

    if(cq.data&&cq.data[0])custName=cq.data[0].name||'';
    if(ids.length){
      var oq=await sb.from('orders').select('order_no,status,items,total,payment_status,tracking_no,created_at,payment_link').in('customer_id',ids).neq('status','Cancelled').order('order_no',{ascending:false}).limit(20);
      orders=oq.data||[];
    }
  }catch(e){}
  SHOP_BEANS=await beansP;
  m.innerHTML='<div class="card brief"><span class="tag">'+(WS_MODE?'Wholesale':'Welcome')+'</span>'
    +'<div class="t">'+esc(custName||'Hello')+'</div>'
    +'<div class="s">'+(WS_MODE
      ?'Wholesale account'
      :('Ratio Coffee · on the shelf today'+(email?' · '+esc(email):'')))+'</div>'
    +'<button class="more" id="cp-fb" style="color:var(--inv-t)">Leave feedback</button></div>'
    +'<div id="shopbody"></div>'
    +(orders.length?'<div class="note" style="margin-top:16px">Your orders</div>'+orders.map(function(o,ox){
      var paid=o.payment_status==='paid';
      return '<div class="card"><span class="tag'+(o.status==='Dispatched'?'':' warn')+'">'+esc(o.status||'—')+'</span>'
        +'<div class="t">#'+String(o.order_no||'—').padStart(4,'0')+' · '+money(o.total)+'</div>'
        +'<div class="s">'+esc(itemsLine(o)||'—')+(paid?'':' · awaiting payment')+(o.tracking_no?' · tracking '+esc(o.tracking_no):'')+'</div>'
        +(WS_MODE&&!paid?'<button class="more" data-wspay="'+ox+'">Payment details →</button>':'')
        +'</div>';
    }).join(''):'')
    +'<button class="more" id="cp-staff" style="margin-top:18px">Sign in with another account</button>';
  renderShopTabs();
  paintShopBody();
  m.querySelectorAll('[data-wspay]').forEach(function(b){b.addEventListener('click',function(){openWsPaySheet(orders[+b.dataset.wspay]);});});
  $('cp-fb').addEventListener('click',function(){showFbOverlay('store');});
  /* 登入/開 app 後彈一次批發條款提示（抽屜沒開著才彈，避免蓋掉別的） */
  if(WS_MODE&&!WS_WELCOME_SEEN){WS_WELCOME_SEEN=true;setTimeout(function(){var dr=$('drawer');if(!(dr&&dr.classList.contains('show')))openWsWelcomeSheet(custName);},500);}
  /* 更高權限入口：登出這個客戶 → 原地開登入抽屜換帳號，全程不離開 /new */
  $('cp-staff').addEventListener('click',async function(){
    if(!confirm('Sign out and sign in with another account?'))return;
    try{await sb.auth.signOut();}catch(e){}
    await boot();
    openSignInSheet();
  });
}
/* 三層路由：沒登入＝豆單店面／customer＝客戶門戶／員工四角色＝操作台。
   登入、登出後都重呼叫一次即可換視角（nav/chips 先復位，因為店面與門戶會藏 nav） */
async function boot(){
  /* 付款完成回店面：清購物車＋致謝（Square redirect_url 帶 ?checkout=done 回來） */
  if(/[?&]checkout=done/.test(location.search)){
    try{localStorage.setItem('r2_cart','[]');}catch(e){}
    try{history.replaceState(null,'',location.pathname);}catch(e){}
    setTimeout(function(){toast('Thanks! Your order is on its way to the roastery ☕');},600);
  }
  var nav=document.querySelector('nav');if(nav)nav.style.display='';
  $('shoptabs').style.display='none';
  WS_MODE=false;WS_INFO=null;WS_WELCOME_SEEN=false; /* 批發模式只在 wholesale 門戶內開；員工/店面一律零售車；歡迎彈窗每次登入/開 app 重置 */
  paintCartBar();
  var g=await sb.auth.getSession();
  if(!(g&&g.data&&g.data.session)){
    await renderPublicMenu();
    return;
  }
  /* 沒 profile 或沒角色＝客戶（開放客戶登入前的安全預設） */
  ROLE='customer';WHO='';LEAD=false;
  try{
    var p=await sb.from('profiles').select('name,role,lead').eq('id',g.data.session.user.id).single();
    if(p&&p.data){ROLE=p.data.role||'customer';WHO=p.data.name||'';LEAD=!!p.data.lead;}
  }catch(e){}
  if(myRole()==='customer'||myRole()==='wholesale'){await renderCustomerPortal(g.data.session);return;}
  view='feed';filter='all';
  await reload();
}
(async function init(){await boot();})();
</script></body></html>
