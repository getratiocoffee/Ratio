    .then(function(r){if(r&&r.error)console.error('snooze push:',r.error.message||r.error);});}catch(e){}

function addSnooze(id){

  var today=todayKey(),m=snoozeMap();m[id]=1;
  SNOOZE_ALL={};SNOOZE_ALL[today]=m; /* еҸӘз•ҷд»ҠеӨ©пјқй ҶжүӢжё…жҺүиҲҠж—Ҙжңҹ */

async function callFn(name,payload,roOk){
  if(!roOk&&!canWrite()){roToast();throw new Error('Read-only');}
  var g=await sb.auth.getSession();var sess=g&&g.data&&g.data.session;
  if(!sess)throw new Error('Signed out');
  var res=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token,'apikey':SUPABASE_KEY},
    body:JSON.stringify(payload)});
  var txt=await res.text();var data;try{data=JSON.parse(txt);}catch(e){data={raw:txt};}
  if(!res.ok)throw new Error((data&&(data.error||data.message))||('HTTP '+res.status));
  return data;
}

function dPlus(n){var t=new Date();t.setDate(t.getDate()+n);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}

function matchRoast(s){
  var nm=String(s.sample_id||'').trim().toLowerCase();if(!nm&&!s.bean_id)return null;
  var cands=DB.roasts.filter(function(r){
    /* ID е„Әе…ҲпјҲ2026-07-15 иҖҒй—Ҷе®ҡиӘҝ QC еҸӘиӘҚ IDпјүпјҡе…©йӮҠйғҪжңү bean_idпјқеҸӘжҜ” IDпјҢдёҚзңӢеҗҚеӯ— */
    if(s.bean_id&&r.bean_id)return String(r.bean_id)===String(s.bean_id);
    if(String(r.bean_name||'').trim().toLowerCase()!==nm)return false;
    /* еҗҚеӯ—йҖҖи·ҜеҠ йӣҷйҚөпјҡе…©йӮҠйғҪиЁҳдәҶиҷ•зҗҶжі•е°ұеҝ…й ҲзӣёеҗҢпјҲеҗҢеҗҚеӨҡиҷ•зҗҶжі•дёҚдә’зӣёжұЎжҹ“пјүпјӣиҲҠиіҮж–ҷжІ’иЁҳ process е®№еҝҚ */
    if(s.process&&r.process&&procKey(r.process)!==procKey(s.process))return false;
    return true;});
  if(!cands.length)return null;
  /* жңүиІЁзҡ„жү№ж¬Ўе„Әе…Ҳй…ҚпјҲеҗҢеҗҚдёҖжү№еҗғе…үдёҖжү№жңүиІЁ вҶ’ sample жҺӣеҲ°жңүиІЁйӮЈжү№еҲӨе®ҡпјүпјӣе…ЁжІ’иІЁжүҚйҖҖеӣһеҺҹеҖҷйҒёпјҢдәӨзөҰ QCQ зҡ„ >0 ж“ӢжҺү */
  var withStock=cands.filter(function(r){return Number(r.remaining_kg)>0;});
  var pool=withStock.length?withStock:cands;
  if(s.roast_date){var ex=pool.find(function(r){return (r.roast_date||'')===s.roast_date;});if(ex)return ex;}
  return pool[0];
}
function buildItems(){
  var out=[],sn=snoozeMap();
  /* QC дҪҮеҲ—пјҲд№ҹзөҰ QC еҲҶй Ғз”Ёпјү */
  var seen={};QCQ=[];var LISTQ=[];
  DB.samples.forEach(function(s){
    var k=s.bean_id?('id:'+String(s.bean_id)):((s.sample_id||'')+'В·'+(s.process||'')).toLowerCase();
    if(seen[k])return;seen[k]=1;
    /* йҖҗйҚӢ QCпјҲ2026-07-14 иҖҒй—Ҷе®ҡиӘҝгҖҢйҒҺ QC йғҪиҰҒжүӢеӢ•пјҢдёҚиғҪ assumeгҖҚвҖ”вҖ”еҗҢж—ҘйҖЈеӢ•йҖҖеҪ№зҡ„й…ҚеҘ—пјүпјҡ
       йҖҷж”ҜиұҶжүҖжңүжңӘеҲӨе®ҡгҖҒжңүеә«еӯҳзҡ„йҚӢе…ЁйғЁйҖІдҪҮеҲ—пјҢдёҖйҚӢдёҖеҲ—еҗ„иҮӘиҰӘжүӢеҲӨпјӣй…Қе°Қжўқд»¶з…§ matchRoast
       пјҲID е„Әе…ҲгҖҒеҗҚеӯ—йҖҖи·Ҝеё¶иҷ•зҗҶжі•йӣҷйҚөгҖҒиҲҠиіҮж–ҷжІ’ process е®№еҝҚпјүпјҢжҺ’еәҸиҲҠвҶ’ж–°е…Ҳзғҳе…ҲеҲӨ */
    var nmL=String(s.sample_id||'').trim().toLowerCase();
    var pend=(nmL||s.bean_id)?(DB.roasts||[]).filter(function(x){
      if(x.qc||!(Number(x.remaining_kg)>0))return false;
      if(s.bean_id&&x.bean_id)return String(x.bean_id)===String(s.bean_id);
      if(String(x.bean_name||'').trim().toLowerCase()!==nmL)return false;
      if(s.process&&x.process&&procKey(x.process)!==procKey(s.process))return false;
      return true;
    }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;}):[];
    if(pend.length){pend.forEach(function(x){QCQ.push({s:s,r:x});});return;}
    var r=matchRoast(s);
    /* дёҠжһ¶дҪҮеҲ—пјҡQC pass еҫҢжңӘдёҠ Square вҶ’ List еҚЎ */
    if(r&&r.qc==='pass'){
      var nm=String(s.sample_id||'').trim();if(!nm)return;
      /* process зҙҡпјҲ2026-07-15пјүпјҡеҗҢеҗҚеӨҡиҷ•зҗҶжі•еҗ„зңӢеҗ„зҡ„дёҠжһ¶еҲ—пјҢдёҚеҶҚеҗҚеӯ—зҙҡиӘӨеҲӨ */
      var sync=syncFor(nm,s.process);
      /* жІ’жҳҹдёҚжҳҜзјәйҷ·пјҲ2026-07-14 иҖҒй—Ҷе®ҡиӘҝгҖҢжҲ‘жІ’жңү no star зҡ„ж©ҹеҲ¶гҖҚпјүпјҡжҳҹпјқPass д№ӢдёҠеҸҜйҒёзҡ„йҷ„еұ¬е“ҒпјҢ
         зі»зөұдёҚеӮ¬жҳҹвҖ”вҖ”еҺҹ STARQ/Add вҳ… жҸҗйҶ’еҚЎж•ҙеҖӢйҖҖеҪ№пјҢй»һжҳҹе…ҘеҸЈз•ҷеңЁ Coffee Stock chip иҲҮи©іжғ…й Ғ */
      if(!(sync&&sync.status==='synced'))LISTQ.push(s);
    }
  });
  /* жҷЁе ұ */
  var newQ=DB.orders.filter(function(o){return (o.status||'New')==='New';});
  var packQ=DB.orders.filter(function(o){return o.status==='Confirmed'||o.status==='Roasting';});
  var shipQ=DB.orders.filter(function(o){return o.status==='Ready';});
  var payQ=DB.orders.filter(function(o){return (o.status||'New')!=='New'&&(o.payment_status==='pending_payment'||o.payment_status==='overdue');});
  /* жҝғзё®жҸҗйҶ’иӘҚ target_idпјҲ2026-07-15пјүпјҡdialins/product_sync йғҪжңү target_idпјҢеҗҢеҗҚеӨҡиҷ•зҗҶжі•еҗ„иҮӘзҡ„ dial-in еҗ„з®— */
  var latest={};DB.dialins.forEach(function(d){var dk=d.target_id?('id:'+d.target_id):('nm:'+String(d.coffee||'').trim().toLowerCase());if(!latest[dk])latest[dk]=d;});
  var stale=[];DB.syncs.forEach(function(x){
    if(x.status!=='synced'||isSubName(x.bean_id))return; /* иЁӮй–ұе•Ҷе“ҒдёҚжҳҜиұҶпјҢж°ёйҒ жІ’ dial-in */
    var dk=x.target_id?('id:'+x.target_id):('nm:'+String(x.bean_id||'').trim().toLowerCase());
    var d=latest[dk];
    if(!d||daysSince(d.created_at)>ESP_STALE_DAYS)stale.push({name:x.bean_id,last:d?daysSince(d.created_at):null});});
  var low=DB.beans.filter(function(b){var t=(b.low_stock_kg==null?GREEN_LOW_KG:Number(b.low_stock_kg));return b.quantity!=null&&t>0&&Number(b.quantity)<=t;});
  /* жҷЁе ұеҚЎйҖҖеҪ№пјҲ2026-07пјүпјҡж”№зӮәжҜҸж—ҘиҮӘеӢ•еҪҲеҮәзҡ„ briefing жҠҪеұңпјҲopenBriefSheetпјүвҖ”вҖ”зҸӯиЎЁж‘ҳиҰҒж”¶йҖІ BRIEF е…Ёеҹҹпјӣ

/* йЎһеҲҘиүІиЎЁпјҡдҪҺйЈҪе’ҢеЎөеҪ©й…ҚзҙҷзҷҪзҺ«з‘°пјӣиүІжўқпјӢеҸідёҠи§’еҲҶйЎһпјӢchips иүІй»һе…ұз”Ё */
var STCOLOR={Orders:'#DD8CA4',Wholesale:'#6E8FB8',QC:'#7FA1CE',Roast:'#DE9670',Transaction:'#CDAC66',Shelf:'#AB92CE',Recipe:'#63AFAA',Green:'#84B57C','Daily Task':'#9299AE',Customers:'#C88A6E'};
var CTXS=[
{id:'morning',label:'Morning sort вҖ” recipe first',pr:{Recipe:1,Orders:2,Wholesale:3,Roast:4,QC:5,Transaction:6,Green:7,'Daily Task':8,Customers:9}},
{id:'day',label:'Daytime sort вҖ” orders first',pr:{Orders:1,Wholesale:2,Roast:3,QC:4,Recipe:5,Transaction:6,Green:7,'Daily Task':8,Customers:9}},
{id:'pay',label:'Pay chase вҖ” transaction first',pr:{Transaction:1,Wholesale:2,Orders:3,Roast:4,QC:5,Recipe:6,Green:7,'Daily Task':8,Customers:9}}];
var ctxIdx=(new Date().getHours()<11)?0:1;
/* ж¬Ҡйҷҗең°еҹәпјҡиӘҚеҫ—зҡ„еӣӣзЁ®е“Ўе·Ҙи§’иүІз…§иҲҠпјӣе…¶д»–пјҲеҗ« 'customer'гҖҒжІ’иЁӯпјүдёҖеҫӢз•¶е®ўжҲ¶вҖ”вҖ”еҜ§еҸҜе°‘зңӢдёҚеҸҜеӨҡзңӢ */
function myRole(){return (ROLE==='director'||ROLE==='roaster'||ROLE==='retail'||ROLE==='staff'||ROLE==='wholesale'||ROLE==='finance')?ROLE:'customer';}
/* leadпјқдё»з®ЎиғҪеҠӣпјҲиҲҮи§’иүІжӯЈдәӨпјҢprofiles.leadпјүпјҡжҙҫе·ҘпјӢйҡҠдјҚзңӢжқҝпјӢжҺ’зҸӯпјӣйҢўз…§жЁЈзңӢдёҚеҲ°пјҲrsMoney дёҚеҗ« leadпјҢRLS еҸҲж“ӢдёҖеұӨпјү */
function isLead(){return ROLE==='director'||LEAD===true;}
function myItems(){

/* з«ҷеҲҘ chips еҲ—е·ІйҖҖеҪ№пјҲ2026-07пјүпјҡиЁҲж•ёдәӨзөҰеҲҶзө„зө„й ӯгҖҒгҖҢеҸӘзңӢжҹҗз«ҷгҖҚпјқж‘әз–Ҡе…¶д»–зө„пјӣfilter ж©ҹеҲ¶дҝқз•ҷеӮҷз”Ё */
/* еҲҶзө„ж‘әз–ҠзӢҖж…ӢпјҡеҖӢдәәзҖҸиҰҪеҒҸеҘҪпјҢsession е…§иЁҳдҪҸеҚіеҸҜпјҲдёҚйҖІ app_stateпјү */
var FOLDED=(function(){try{return new Set(JSON.parse(sessionStorage.getItem('feed_folded')||'[]'));}catch(e){return new Set();}})();
function foldPush(){try{sessionStorage.setItem('feed_folded',JSON.stringify(Array.from(FOLDED)));}catch(e){}}
function cardHTML(i){

  var bar=i.pin?'var(--inv)':(i.hot?'var(--accent)':cc);

  var pr=Math.max(92, 22 + String(i.st).length*8 + (i.hot?46:0));

  var owner=cardOwner(i);

    ?'<div class="cfoot"><span class="moresm" style="cursor:default">'+(i.kind==='task'?'from task card':'tap to assign вҶ’')+'</span>'

    :'<div class="cfoot">'
      +'<button class="moresm" data-more="'+esc(i.id)+'">details в–ҫ</button>'

  var ownTag=(!ASSIGN_MODE&&owner&&owner!==WHO&&i.kind!=='task')?' <span style="color:var(--muted);font-weight:500">В· '+esc(owner)+'</span>':'';
  return '<div class="swipewrap" id="w-'+esc(i.id)+'">'

    +'<span class="cattag"'+(i.pin?'':' style="color:'+cc+'"')+'>в—Ҹ '+esc(i.st)+(i.hot?' <span style="color:var(--accent)">В· now</span>':'')+'</span>'

/* еҗҚе–®ијӘжҸӣз”Ёпјҡд»ҠеӨ©жңүзҸӯзҡ„дәәпјҲеҺ»йҮҚпјүпјӢиҮӘе·ұ */
function assignCycle(){
  var names=todayShifts().map(function(s){return s.name;}).filter(function(n,i,a){return a.indexOf(n)===i;});
  if(WHO&&names.indexOf(WHO)<0)names.push(WHO);
  return names;
}
function renderFeed(){
  $('deck').style.display='none';
  var base=myItems();
  $('hcnt').textContent=(base.filter(function(i){return !i.pin;}).length)+' to do В· '+WHO;
  var m=$('main');
  var me=VIEW_AS||WHO,am=assignMap();
  /* My day иҰ–и§’пјҡжҲ‘зҡ„еҚЎпјӢpin/hot/sinkпјҲжҖҘд»¶йҳІжјҸжҺҘгҖҒдҫӢиЎҢдәӢе…Ёе“ЎпјүпјӣжІ’дәәиӘҚй ҳзҡ„ж”¶ Up for grabs */
  var grabs=[],list;
  if(VIEW_MODE==='mine'&&!ASSIGN_MODE){
    list=base.filter(function(i){
      if(i.pin||i.hot||i.sink)return true;
      var o=cardOwner(i);
      if(!o){grabs.push(i);return false;}
      return o===me;
    });
  }else list=base.slice();
  /* иҰ–и§’еҲ—пјҡMy day / Everythingпјӣдё»з®ЎеҸҰжңүдёҖиЎҢ team йҖІеәҰпјҲй»һдәәеҗҚзңӢд»–зҡ„жё…е–®пјүпјӣжҙҫе·ҘжЁЎејҸж•ҙжўқжҸӣиҮү */
  var mineN=(VIEW_MODE==='mine'&&!ASSIGN_MODE)?list.filter(function(i){return !i.pin;}).length
    :base.filter(function(i){if(i.pin)return false;var o=cardOwner(i);return i.hot||i.sink||!o||o===me;}).length;
  var allN=base.filter(function(i){return !i.pin;}).length;
  var bars='';
  if(ASSIGN_MODE){
    bars='<div style="display:flex;align-items:center;gap:8px;margin:2px 0 10px"><span class="s" style="flex:1">Assigning the day вҖ” tap the name on each card</span>'
      +'<button class="chip on" id="asg-done">Done</button></div>';
  }else{
    bars='<div style="display:flex;gap:6px;margin:2px 0 8px;flex-wrap:wrap">'
      +'<button class="chip'+(VIEW_MODE==='mine'?' on':'')+'" data-vm="mine">'+(VIEW_AS?esc(VIEW_AS)+'вҖҷs day':'My day')+' В· '+mineN+'</button>'
      +'<button class="chip'+(VIEW_MODE==='all'?' on':'')+'" data-vm="all">Everything В· '+allN+'</button>'
      +(VIEW_AS?'<button class="chip" data-vw="">back to me</button>':'')
      +'</div>';
    if(isLead()){
      var cyc=assignCycle(),tl='';
      var doneOf=function(n){var d=0,t=0,sn=snoozeMap();Object.keys(am).forEach(function(id){
        if(am[id]!==n)return;t++;
        if(!ITEMS.some(function(x){return x.id===id;})&&!sn[id])d++;});return {d:d,t:t};};
      cyc.forEach(function(n){var s=doneOf(n);if(!s.t&&n!==WHO)return; /* жІ’жҙҫе·ҘеҸҲдёҚжҳҜиҮӘе·ұпјқдёҚдҪ”дҪҚ */
        tl+='<button class="chip" data-vw="'+esc(n)+'" style="min-height:32px;padding:4px 11px;font-size:12px'+(VIEW_AS===n?';border-color:var(--accent);color:var(--accent)':'')+'">'+(n===WHO?'Me':esc(n))+(s.t?' '+s.d+'/'+s.t:'')+'</button>';});
      var unA=base.filter(function(i){return !i.pin&&!i.sink&&!cardOwner(i);}).length;
      if(unA)tl+='<span class="chip" style="min-height:32px;padding:4px 11px;font-size:12px;border-style:dashed;pointer-events:none">'+unA+' unassigned</span>';
      if(canWrite())tl+='<button class="chip" id="asg-go" style="min-height:32px;padding:4px 11px;font-size:12px">Assign</button>';
      if(tl)bars+='<div style="display:flex;gap:6px;margin:0 0 10px;flex-wrap:wrap;align-items:center">'+tl+'</div>';
    }
  }
  if(!list.length&&!grabs.length){
    m.innerHTML=bars+'<div class="empty" style="padding-top:52px"><div style="font-size:24px">вң“</div>'
      +'<div style="font-size:17px;font-weight:700;color:var(--ink);margin-top:8px">All clear вҖ” nice work</div>'
      +'<div style="margin-top:4px">Everything is done В· see you tomorrow</div></div>';
    bindBars(m);
    return;
  }
  /* зүҲйқўпјҡзҪ®й ӮеҚҖпјҲжҷЁе ұ/жҖҘд»¶/жҲ‘зҡ„пјүдёҚеҲҶзө„ вҶ’ з«ҷеҲҘеҲҶзө„пјҲзө„й ӯеҸҜж‘әз–ҠпјүвҶ’ Up for grabs вҶ’ undo/жҺ’еәҸеҲҮжҸӣжІүеә• */
  var top=[],rest=[];
  list.forEach(function(i){if(i.pin||i.hot||(i.mine&&!VIEW_AS))top.push(i);else rest.push(i);});
  var h=bars+top.map(cardHTML).join(''),gi=0;
  while(gi<rest.length){
    var st=rest[gi].st,grp=[];
    while(gi<rest.length&&rest[gi].st===st){grp.push(rest[gi]);gi++;}
    var folded=FOLDED.has(st);
    h+='<button class="grphead" data-grp="'+esc(st)+'"><span class="garr">'+(folded?'в–ё':'в–ҫ')+'</span>'
      +'<span class="gdot" style="background:'+(STCOLOR[st]||'#8A837C')+'"></span>'+esc(st)+' В· '+grp.length+'</button>';
    if(!folded)h+=grp.map(cardHTML).join('');
  }
  if(grabs.length){
    var gf=FOLDED.has('__grabs');
    h+='<button class="grphead" data-grp="__grabs"><span class="garr">'+(gf?'в–ё':'в–ҫ')+'</span>'
      +'<span class="gdot" style="background:var(--line2)"></span>Up for grabs В· '+grabs.length+'</button>';
    if(!gf)h+=grabs.map(cardHTML).join('');
  }
  h+=(SNOOZED_SESSION?'<button class="more" id="unsnooze">'+SNOOZED_SESSION+' snoozed until tomorrow В· undo</button>':'')
    +'<div class="note" id="ctxline">'+CTXS[ctxIdx].label+' В· swipe right = do В· left = later</div>';
  m.innerHTML=h;
  bindBars(m);
  var un=$('unsnooze');if(un)un.addEventListener('click',undoSnooze);
  m.querySelectorAll('[data-do]').forEach(function(b){b.addEventListener('click',function(){if(Date.now()-_drag<300)return;runAction(b.dataset.do,b);});});
  m.querySelectorAll('[data-more]').forEach(function(b){b.addEventListener('click',function(){if(Date.now()-_drag<300)return;openDetails(b.dataset.more);});});
  m.querySelectorAll('[data-snz]').forEach(function(b){b.addEventListener('click',function(){snoozeCard(b.dataset.snz);});});
  m.querySelectorAll('.grphead').forEach(function(g){g.addEventListener('click',function(){
    var s=g.dataset.grp;if(FOLDED.has(s))FOLDED.delete(s);else FOLDED.add(s);foldPush();render();});});
  /* жҙҫе·ҘиҶ еӣҠпјҡй»һдёҖдёӢијӘеҲ°дёӢдёҖеҖӢдәәпјҲanyone вҶ’ зҸӯиЎЁй ҶеәҸ вҶ’ еӣһ anyoneпјүпјҢеӯҳ app_state е…Ёеә—еҗҢжӯҘ */
  m.querySelectorAll('[data-asg]').forEach(function(b){b.addEventListener('click',function(){
    if(b.disabled)return;
    var id=b.dataset.asg,cyc=[null].concat(assignCycle());
    var cur=am[id]||null,ix=cyc.indexOf(cur),next=cyc[(ix+1)%cyc.length];
    if(next)am[id]=next;else delete am[id];
    ASSIGN_ALL[todayKey()]=am;
    try{assignPush();}catch(e){}
    renderFeed();
  });});
  if(!ASSIGN_MODE)list.concat(grabs).forEach(function(i){var el=document.getElementById('c-'+i.id);if(el)attachSwipe(el,i.id);});
  var cl=$('ctxline');if(cl)cl.addEventListener('click',function(){ctxIdx=(ctxIdx+1)%CTXS.length;render();toast(CTXS[ctxIdx].label);});
  /* жҜҸеӨ©з¬¬дёҖж¬ЎйҖІ appпјҡиҮӘеӢ•еҪҲ briefingпјҲд»ҠеӨ©зңӢйҒҺе°ұдёҚеҗөпјӣжң¬ж¬Ўе•ҹеӢ•еҸӘеҪҲдёҖж¬Ўпјү */
  var seen='';try{seen=localStorage.getItem('brief_seen')||'';}catch(e){}
  if(!BRIEF_AUTO&&myRole()!=='customer'&&seen!==todayKey()){BRIEF_AUTO=true;setTimeout(openBriefSheet,450);}
}
/* иҰ–и§’еҲ—/йҖІеәҰиЎҢ/жҙҫе·ҘжЁЎејҸзҡ„е…ұз”Ёз¶Ғе®ҡ */
function bindBars(m){
  m.querySelectorAll('[data-vm]').forEach(function(b){b.addEventListener('click',function(){VIEW_MODE=b.dataset.vm;if(VIEW_MODE==='all')VIEW_AS='';renderFeed();});});
  m.querySelectorAll('[data-vw]').forEach(function(b){b.addEventListener('click',function(){VIEW_AS=(b.dataset.vw===WHO)?'':b.dataset.vw;VIEW_MODE='mine';renderFeed();});});
  var ag=$('asg-go');if(ag)ag.addEventListener('click',function(){if(!canWrite()){roToast();return;}ASSIGN_MODE=true;VIEW_MODE='all';renderFeed();});
  var ad=$('asg-done');if(ad)ad.addEventListener('click',function(){ASSIGN_MODE=false;VIEW_MODE='mine';logAct('assigned the day');renderFeed();toast('Day assigned вҖ” everyone sees their own list');});
}
/* иІӘзқЎзөұдёҖе…ҘеҸЈпјҡй»һ Later йҲ•пјҲжҲ–жҠҪеұң det2пјүиө°йҖҷиЈЎвҖ”вҖ”toast зӣҙжҺҘзөҰ Undo */
function snoozeCard(id){addSnooze(id);dropCard(id,true);toast('Snoozed вҖ” back tomorrow','Undo',undoSnooze);}
function item(id){return ITEMS.find(function(x){return x.id===id;});}
function dropCard(id,left){
  /* жңү swipewrap е°ұе№із§»ж•ҙеҖӢ wrapпјҲйҖЈеә•еұӨ Later йҲ•дёҖиө·иө°пјүпјҢжІ’жңүжүҚйҖҖеӣһеҚЎзүҮжң¬й«” */
  var el=document.getElementById('w-'+id)||document.getElementById('c-'+id);
  if(el){el.style.transition='transform .22s,opacity .22s';el.style.transform='translateX('+(left?'-':'')+'110%)';el.style.opacity='0';}
  setTimeout(function(){ITEMS=ITEMS.filter(function(x){return x.id!==id;});render();},210);
}
/* ===== зңҹеӢ•дҪң ===== */
async function runAction(id,btn){
  if(!canWrite()){roToast();return;}
  var i=item(id);if(!i)return;
  try{
    if(i.kind==='dismiss'){addSnooze(id);dropCard(id);return;}
    if(i.kind==='task'){
      if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
      var u=await sb.from('tasks').update({done:true,done_at:new Date().toISOString(),done_by:WHO||null}).eq('id',i.ref.id);
      if(u.error)throw new Error(u.error.message);
      logAct('task done',i.t);
      dropCard(id);toast('Task done вң“');return;
    }
    if(i.kind==='rstlow'){RST.seg=(i.ref||[]).some(function(x){return x.isBlend;})?'blend':'single';RST.open=null;openBatchesSheet();return;}
    if(i.kind==='qcnav'){openQCSheet();return;}
    if(i.kind==='closing'){if(CLOSING_ITEMS.length)openClosingSheet();else openClosingEdit();return;}
    if(i.kind==='paynav'){openPayrollSheet();return;}
    if(i.kind==='pack'){openPackSheet(i);return;}
    if(i.kind==='fb'){
      if(i.ref.email){openReplySheet(i);}
      else{addSnooze(id);dropCard(id);toast('Noted вҖ” no email to reply to');}
      return;
    }
    if(i.kind==='accept'){await acceptOrder(i,btn);return;}
    if(i.kind==='ship'){openDispatch(i);return;}
    if(i.kind==='paid'){
      if(!confirm('Mark '+money(i.ref.total)+' as received? The customer gets a receipt email.'))return;
      if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
      var u3=await sb.from('orders').update({payment_status:'paid'}).eq('id',i.ref.id);
      if(u3.error)throw new Error(u3.error.message);
      logAct('marked paid',i.t,money(i.ref.total));
      try{await callFn('send-email',{action:'payment_received',order_id:i.ref.id});}catch(e){toast('Paid вң“ but email failed');dropCard(id);return;}
      dropCard(id);toast('Paid вң“ receipt sent');return;
    }
    if(i.kind==='nudge'){
      var nc=i.ref.c;
      if(!confirm('Email a fresh-batch reminder to '+(nc.name||'this customer')+' ('+nc.email+')?\nIt carries the shop link and the Google review link.'))return;
      if(btn){btn.disabled=true;btn.textContent='SendingвҖҰ';}
      await callFn('send-email',{action:'repurchase_nudge',customer_id:nc.id});

}
async function acceptOrder(i,btn){

/* иҷ•зҗҶжі• keyпјҲ2026-07-13 иҷ•зҗҶжі•еҲҶй–ӢдёӢеҚҠе ҙпјүпјҡnull/undefined/з©әзҷҪе…ЁжҠҳжҲҗ ''вҖ”вҖ”
   е…ЁйҸҲгҖҢеҗҢеҗҚеҗҢиҷ•зҗҶжі•гҖҚжҜ”е°ҚйғҪз”Ёе®ғпјҢеҲҘеҶҚиЈёжҜ” process еӯ—дёІ */
function procKey(p){return String(p||'').trim().toLowerCase();}
/* з”ҹиұҶиә«еҲҶиӯүпјҲ2026-07-15 иҖҒй—Ҷе®ҡжЎҲпјҢд№Ӣе…«ж”№еүҚз¶ҙ GвҶ’SпјүпјҡжҜҸж”Ҝз”ҹиұҶдёҖеҖӢ S#00001 дәәйЎһеҸҜи®Җз·ЁиҷҹвҖ”вҖ”
   DB green_no иҮӘеӢ•зҷјиҷҹпјҲsequence defaultпјүпјҢйҖҷиЈЎеҸӘиІ иІ¬йЎҜзӨәгҖӮеҗҢеҗҚеӨҡиҷ•зҗҶжі•еҫһжӯӨдёҖзңјеҲҶжё…пјҲAlo Village S#00012/S#00013пјү */
function gNo(b){return (b&&b.green_no!=null)?('S#'+String(b.green_no).padStart(5,'0')):'';}
/* зҶҹиұҶз·Ёиҷҹ B#пјҲ2026-07-15 иҖҒй—Ҷж”№зүҲпјҢд№Ӣе…«ж”№еүҚз¶ҙ RвҶ’BпјүпјҡдёҖиұҶдёҖиҷҹзөӮиә«дёҚи®ҠвҖ”вҖ”иҷҹзўји·ҹгҖҢиұҶгҖҚиө°пјҢS/B еҸӘжҳҜз”ҹзҶҹзӢҖж…ӢгҖӮ
   е–®е“Ғжүҝз”ҹиұҶеҗҢиҷҹпјҲS#00013 зғҳеҮәдҫҶпјқB#00013пјүгҖҒжӢјй…Қз”Ё blends.blend_noпјҲеҗҢдёҖеҖӢиҷҹзўјжұ пјҢе…Ёеҹҹе”ҜдёҖпјүгҖӮ
   жү№ж¬Ўд№ӢеҲҶпјқB# пјӢ зғҳз„ҷж—ҘпјҲиЎҢе…§жң¬дҫҶе°ұйЎҜзӨәж—ҘжңҹпјүпјӣжҜҸйҚӢи·іиҷҹзҡ„ roasts.roast_no е·Іе»ўйҷӨ */
function rNo(r){
  if(!r)return '';
  var n=null;
  if(r.kind==='blend'){
    var nm=String(r.bean_name||'').trim().toLowerCase();
    var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm;});
    n=bl?bl.blend_no:null;
  }else{
    /* йӣҷи·Ҝж…ЈдҫӢпјҡжңү bean_id зІҫжә–жҜ”е°ҚпјҢеҗҰеүҮиұҶеҗҚпјӢиҷ•зҗҶжі•еӮҷжҸҙпјҲlegacy жү№ж¬ЎпјүпјҢеҶҚйҖҖеҗҚеӯ—зҙҡ */
    var b=r.bean_id?(DB.beans||[]).find(function(x){return String(x.id)===String(r.bean_id);}):null;
    if(!b){
      var bn=String(r.bean_name||'').trim().toLowerCase(),pk=procKey(r.process);
      b=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===bn&&procKey(x.process)===pk;})
        ||(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===bn;});
    }
    n=b?b.green_no:null;
  }
  return n!=null?('B#'+String(n).padStart(5,'0')):'';
}
/* дёҖзө„жү№ж¬Ўзҡ„ B# жё…е–®пјҲеҗҢзө„еҗҢиұҶпјқеҗҢиҷҹпјҢеҺ»йҮҚеҫҢйҖҡеёёе°ұдёҖеҖӢпјү */
function rNos(batches){
  var seen={},out=[];
  (batches||[]).forEach(function(r){var k=rNo(r);if(k&&!seen[k]){seen[k]=1;out.push(k);}});
  return out.join(' ');
}
/* еҗҚеӯ—пјӢиҷ•зҗҶжі• вҶ’ е‘Ҫдёӯзҡ„иұҶ/й…Қж–№ {kind:'blend'|'bean',obj}пјҲиӘҚ ID зҡ„зөұдёҖи§ЈжһҗеҷЁпјӣbeanIdFor/bNoFor йғҪз”Ёе®ғпјүгҖӮ
   жӢјй…ҚеҗҚе…Ҳе‘Ҫдёӯ blendsпјӣе–®е“Ғз…§ procKey жүҫ beansпјҲproc undefinedпјҸз©әеӯ—дёІпјқеҗҚеӯ—зҙҡпјҢеҗҢеҗҚе”ҜдёҖжүҚеӣһпјүгҖӮеӣһ nullпјқиӘҚдёҚеҮә */
function resolveCoffee(nm,proc){
  var k=String(nm||'').trim().toLowerCase();
  if(!k)return null;
  if(proc==='')proc=undefined; /* з©әеӯ—дёІжҠҳжҲҗеҗҚеӯ—зҙҡвҖ”вҖ”йҒҝе…ҚиӘӨй…Қ process зӮәз©әзҡ„зү№е®ҡиұҶпјҲеҺҹ beanIdFor/bNoFor зҡ„йҡұи—Ҹйҷ·йҳұпјү */
  var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  if(bl)return {kind:'blend',obj:bl};
  var pool=(DB.beans||[]).filter(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  var b;
  if(proc!==undefined){var pk=procKey(proc);b=pool.find(function(x){return procKey(x.process)===pk;})||(pool.length===1?pool[0]:null);}
  else b=(pool.length===1?pool[0]:null);
  return b?{kind:'bean',obj:b}:null;
}
/* еҗҚеӯ—пјӢиҷ•зҗҶжі• вҶ’ еә•еұӨ idпјҲbeans.id жҲ– blends.idпјүпјӣеӣһз©әпјқиӘҚдёҚеҮәпјҲиө°еҗҚеӯ—зҙҡйҖҖи·Ҝпјү */
function beanIdFor(nm,proc){var r=resolveCoffee(nm,proc);return r?String(r.obj.id):'';}
/* зөұдёҖеҸ–иҷҹеҸЈпјҲ2026-07-15 е…Ё app жҺӣиҷҹпјүпјҡиұҶеҗҚпјӢиҷ•зҗҶжі• вҶ’ 'B#00013'пјҲжӢјй…Қз”Ё blend_noгҖҒе–®е“Ғз”Ё green_noпјү */
function bNoFor(nm,proc){
  var r=resolveCoffee(nm,proc);if(!r)return '';
  var no=r.kind==='blend'?r.obj.blend_no:r.obj.green_no;
  return no!=null?('B#'+String(no).padStart(5,'0')):'';
}
/* еҗҢеҗҚдёӢжүҖжңүиҷҹпјҲDelete a coffee еҗҚеӯ—зҙҡиҒҡеҗҲз”ЁпјӣеҗҢеҗҚеӨҡиҷ•зҗҶжі•еҲ—е…ЁйғЁпјқжҸҗйҶ’йҖҷеҗҚеӯ—дёӢжңүе№ҫж”Ҝпјү */
function bNosForName(nm){
  var k=String(nm||'').trim().toLowerCase();
  if(!k)return '';
  var bl=(DB.blends||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===k;});
  if(bl)return bl.blend_no!=null?('B#'+String(bl.blend_no).padStart(5,'0')):'';
  return (DB.beans||[]).filter(function(x){return String(x.name||'').trim().toLowerCase()===k&&x.green_no!=null;})
    .map(function(x){return 'S#'+String(x.green_no).padStart(5,'0');}).join(' ');
}
/* йҺ–йўЁе‘іпјқе–®йҒёпјҲ2026-07-12 иҖҒй—Ҷе®ҡиӘҝпјүпјҡйҺ–пјқгҖҢеңЁиіЈзҡ„зүҲжң¬гҖҚгҖӮ
   2026-07-13 ж”¶з·ҠжҲҗгҖҢеҗҢеҗҚпјӢеҗҢиҷ•зҗҶжі•гҖҚдә’ж–ҘпјҲAlo Village White Honey / Cold Fermentation дәӢд»¶пјүвҖ”вҖ”
   дёҚеҗҢиҷ•зҗҶжі•жҳҜдёҚеҗҢе•Ҷе“ҒпјҢйҺ–дә’дёҚе№Іж¶үпјӣеҗҢеҗҚеҗҢиҷ•зҗҶжі•пјҲйҮҚиӨҮиұҶ/re-cupпјүд»ҚеҸӘиғҪдёҖзӯҶйҺ–и‘—гҖӮ
   и§ЈйҺ–иө°еүҚз«ҜйҒҺжҝҫ id жё…е–®еҶҚ .in() updateвҖ”вҖ”йҒҝй–Ӣ PostgREST е°Қ null process зҡ„жҜ”е°Қйә»з…©гҖӮ
   Coffee Info/иіҮиЁҠеҚЎ/е…¬й–ӢиұҶй Ғ/еҮәиІЁдҝЎе…Ёи·ҹйҺ–зҡ„йҖҷзӯҶиө°гҖӮеӣһеӮі falseпјқйҺ–еҜ«е…ҘеӨұж•—гҖӮ */
async function lockFlavourSolo(s){
  if(!s||!s.id)return false;
  if(!s.flavour_locked){
    var lu=await sb.from('samples').update({flavour_locked:true}).eq('id',s.id);
    if(lu.error)return false;
    s.flavour_locked=true;
  }
  var nm=String(s.sample_id||'').trim();
  if(nm){
    try{
      var ids=(DB.samples||[]).filter(function(x){
        return String(x.id)!==String(s.id)
          &&String(x.sample_id||'').trim().toLowerCase()===nm.toLowerCase()
          &&procKey(x.process)===procKey(s.process);
      }).map(function(x){return x.id;});
      if(ids.length){
        var un=await sb.from('samples').update({flavour_locked:false}).in('id',ids);
        if(!un.error)(DB.samples||[]).forEach(function(x){if(ids.indexOf(x.id)>-1)x.flavour_locked=false;});
      }
    }catch(e){}
  }
  return true;
}
/* еҗҢеҗҚеҗҢиҷ•зҗҶжі•еҸҰдёҖзӯҶе·ІйҺ–зҡ„жқҜжё¬пјҲпјқзҸҫеңЁеңЁиіЈзҡ„зүҲжң¬пјүвҖ”вҖ”жҸӣйҺ–иӯҰиЁҠз”ЁпјӣжҜ”е°Қз…§ lockFlavourSolo еҗҢзҜ„еңҚ */
function lockedMate(s){
  var nm=String(s&&s.sample_id||'').trim().toLowerCase();if(!nm)return null;
  return (DB.samples||[]).find(function(x){
    return String(x.id)!==String(s.id)&&x.flavour_locked
      &&String(x.sample_id||'').trim().toLowerCase()===nm
      &&procKey(x.process)===procKey(s.process);
  })||null;
}
/* ===== дёүж…ӢиұҶжіҒпјҲ2026-07-16 иҖҒй—ҶжӢҚжқҝз°ЎеҢ–пјү=====
   qc ж¬„дёүж…Ӣпјҡnull=PendingпјҸ'pass'=PassпјҸе…¶йӨҳ=DowngradeпјҲlegacy 'reroast' дёҖеҫӢиҰ–еҗҢйҷҚзҙҡгҖҒж°ёдёҚеҶҚеҜ«е…ҘпјүгҖӮ
   гҖҢжҺ’йҷӨдёҚеҸҜиіЈжү№гҖҚзҡ„еҲӨж–·зөұдёҖиө°йҖҷиЈЎпјҢеҲҘеҶҚж•ЈеҜ« !=='reroast'&&!=='downgrade' */
function qcState(r){
  if(!r||!r.qc)return 'pending';
  return r.qc==='pass'?'pass':'downgrade';
}
/* жүӢеӢ•еҠ жҳҹпјҲвҳ…пјқflavour_locked йҮҚеЎ‘пјҡгҖҢеңЁиіЈзҡ„зүҲжң¬гҖҚпјҢеҗҢеҗҚеҗҢиҷ•зҗҶжі•дә’ж–Ҙе–®йҒёпјүгҖӮ
   еҠ жҳҹе”ҜдёҖе…ҘеҸЈвҖ”вҖ”жҸӣжҳҹ confirm еңЁжӯӨжҠҠй—ңпјҲеҺҹ qcVerdict pass иҮӘеӢ•йҺ–зҡ„иӯҰиЁҠжҗ¬дҫҶпјүпјӣ
   quiet=trueпјқдёҚе•ҸзӣҙжҺҘжҸӣпјҲдёҠжһ¶ push з”Ёпјҡpush жң¬иә«е°ұжҳҜе®Је‘ҠйҖҷжү№еңЁиіЈпјүгҖӮ
   еӣһеӮі {ok,swapped}пјҡswappedпјқеҫһе·ІдёҠжһ¶жү№жүӢдёҠжҸӣдҫҶзҡ„жҳҹпјҢе‘јеҸ«з«Ҝи©ІжҺҘй–Ӣ List Update жҠҪеұң push ж–°иіҮиЁҠ */
async function starSample(s,quiet){
  if(!s||!s.id)return {ok:false,swapped:false};
  var swapped=false;
  if(!s.flavour_locked&&lockedMate(s)){
    var nm=String(s.sample_id||'').trim();
    var sy=syncFor(nm,s.process);
    swapped=!!(sy&&sy.status==='synced');
    if(!quiet){
      var msg=swapped
        ?nm+' already has a вҳ… batch on the shelf.\nMove the вҳ… to this batch? Shop info (flavours, roast date) will switch to this one.'
        :nm+' already has a вҳ… batch.\nMove the вҳ… to this batch?';
      if(!confirm(msg))return {ok:false,swapped:false};
    }
  }
  var ok=false;
  try{ok=await lockFlavourSolo(s);}catch(e){}
  return {ok:ok,swapped:swapped&&ok};
}
/* дёҠжһ¶йЎҜзӨәеҗҚпјҲ2026-07-13 йҡҺж®өдәҢпјүпјҡеҗҢеҗҚжңүеӨҡеҖӢиҷ•зҗҶжі•зҡ„жқҜжё¬ вҶ’ Square е•Ҷе“ҒеҗҚеё¶еҫҢз¶ҙгҖҢеҗҚ вҖ” иҷ•зҗҶжі•гҖҚ
   пјҲеҫҢеҸ°/ж”¶ж“ҡ/еә—йқўжүҚеҲҶеҫ—жё…пјүпјӣе–®дёҖиҷ•зҗҶжі•иұҶз…§иҲҠзҙ”еҗҚпјқж—ўжңүе•Ҷе“ҒдёҚжңғиў«ж”№еҗҚ */
function listNameFor(nm,s){
  var k=String(nm||'').trim().toLowerCase(),procs={};
  (DB.samples||[]).forEach(function(x){
    if(String(x.sample_id||'').trim().toLowerCase()===k)procs[procKey(x.process)]=1;
  });
  return (Object.keys(procs).length>1&&s&&s.process)?(nm+' вҖ” '+String(s.process).trim()):nm;
}
/* дёҠжһ¶еҲ—жҹҘжүҫпјҲзөұдёҖжҜ”е°Қй»һпјүпјҡproc===undefinedпјқеҗҚеӯ—зҙҡпјҲе‘јеҸ«з«ҜжІ’ process еңЁжүӢпјҸжӢјй…Қпјүпјӣ
   еҲ—зҡ„ process зӮә nullпјқйҡҺж®өдәҢеүҚзҡ„иҲҠеҲ—пјҢеҗҚеӯ—зҙҡз…§иҲҠй…ҚвҖ”вҖ”еҗ‘еүҚеҗ‘еҫҢйғҪзӣёе®№ */
function syncFor(nm,proc){
  /* ID е„Әе…ҲпјҲ2026-07-15пјүпјҡname+proc и§ЈжһҗжҲҗ target_idпјҢжҜ” product_sync.target_idпјӣ
     иЁӮй–ұе•Ҷе“Ғ/иӘҚдёҚеҮә id жүҚйҖҖеҗҚеӯ—пјӢиҷ•зҗҶжі•пјҲtid з©әжҲ–и©ІеҲ—з„Ў target_idпјү */
  var tid=beanIdFor(nm,proc),k=String(nm||'').trim().toLowerCase();
  return (DB.syncs||[]).find(function(x){
    if(!(x.status==='synced'||x.status==='paused'))return false;
    if(tid&&x.target_id)return String(x.target_id)===tid;
    if(String(x.bean_id||'').trim().toLowerCase()!==k)return false;
    return x.process==null||proc===undefined||procKey(x.process)===procKey(proc);
  })||null;
}
async function qcVerdict(r,v,btn,cardId,s){
  if(!canWrite()){roToast();return;}
  var vNm=(s&&s.sample_id)||r.bean_name||'this batch';
  /* downgrade иӯҰиЁҠпјҲиҖҒй—Ҷй»һеҗҚпјҢйҳІе·Ұж»‘иӘӨи§ёпјүпјҡеҸ–ж¶Ҳпјқд»ҖйәјйғҪдёҚеҜ« */
  if(v==='downgrade'&&!confirm('Downgrade '+vNm+'? It will not be sold as this bean.'))return;
  if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
  var u=await sb.from('roasts').update({qc:v}).eq('id',r.id);
  if(u.error){if(btn){btn.disabled=false;}alert('QC failed: '+u.error.message);return;}
  r.qc=v;
  /* еҗҢж—ҘйҖЈеӢ•е·ІйҖҖеҪ№пјҲ2026-07-14 иҖҒй—Ҷе®ҡиӘҝгҖҢд»»дҪ•иұҶеӯҗиҰҒйҒҺ QC йғҪиҰҒжүӢеӢ•пјҢдёҚиғҪ assumeгҖҚпјҢ

  logAct('qc '+v,r.bean_name||('roast '+r.id)+(r.roast_date?' В· '+r.roast_date:''));

function attachDrawerDrag(){
  var d=$('drawer'),g=d.querySelector('.grab');if(!g)return;
  var y0=null,dy=0;
  /* iOS Safari е°ҚжҚІеӢ•е®№еҷЁе…§зҡ„ touch-action:none дёҚдёҖе®ҡиІ·еёівҖ”вҖ”жүӢжҢҮдёҖеӢ•е°ұз•¶жҚІеӢ•гҖҒpointercancel жҠҠжӢ–жӣіж®әжҺүгҖӮ
     йқһ passive зҡ„ touchmove preventDefault зЎ¬ж“ӢжҚІеӢ•пјҢи®“ pointermove дёҖи·Ҝжҙ»и‘— */
  g.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  g.addEventListener('pointerdown',function(e){
    y0=e.clientY;dy=0;
    try{g.setPointerCapture(e.pointerId);}catch(err){}
    d.style.transition='none';
  });
  g.addEventListener('pointermove',function(e){
    if(y0==null)return;
    dy=Math.max(0,e.clientY-y0);
    d.style.transform='translateY('+dy+'px)';
  });
  function fin(){
    if(y0==null)return;
    d.style.transition='';d.style.transform='';
    if(dy>90)closeDrawer();
    y0=null;dy=0;
  }
  g.addEventListener('pointerup',fin);
  g.addEventListener('pointercancel',fin);
}

/* ===== еҮәиІЁиҮӘеӢ•жүЈзҶҹиұҶжү№ж¬ЎпјҲ2026-07-12пјүпјқиЎҖжўқе…ЁиҮӘеӢ• =====
   е”ҜдёҖжҸ’е…Ҙй»һпјҡopenDispatch зҡ„ go()вҖ”вҖ”е…ЁйғЁйҖҡйҒ“пјҲmanual/иЁӮй–ұ/жү№зҷј/SquareпјүйғҪиө°йҖҷиЈЎеҮәиІЁгҖӮ
   иҰҸеүҮпјҡжҜҸе“Ғй … gramsГ—qty дҫқеҗҚеӯ— FIFO жүЈеҗҢеҗҚжү№ж¬ЎпјҲй…Қж–№еҗғ kind='blend'гҖҒе–®е“Ғеҗғйқһ blendпјӣ
   жҺ’йҷӨ QC жү“йҖҖвҖ”вҖ”еҗҢ rstBatchesпјүпјӣи·ійҒҺз„Ў grams еҒҮе“Ғй …пјҲDelivery feeпјүиҲҮ Subscription е•Ҷе“ҒиЎҢпјӣ
   жү№ж¬ЎдёҚеӨ з…§жүЈеҲ° 0 дёҰеӣһе ұзҹӯзјәпјҲдёҚж“ӢеҮәиІЁвҖ”вҖ”еҮәиІЁжҳҜдәӢеҜҰпјҢеёізӣ®зҹӯзјәжҸҗйҶ’дәәе·ҘиӘҝпјүпјӣ
   orders.stock_deducted_at и“Ӣз« йҳІйҮҚиӨҮжүЈпјҲеҶҚй–ӢеҗҢе–®дёҚжңғжүЈз¬¬дәҢж¬ЎпјүгҖӮ */
/* иЁӮе–®е“Ғй … вҶ’ coffee stock зҡ„жү№ж¬Ўиә«д»Ҫ {name,proc,isBlend}пјҲ2026-07-15 иҖҒй—Ҷе®ҡиӘҝпјҡзғҳиұҶйңҖжұӮпјҸеҮәиІЁйғҪзңӢ coffee stock зҡ„ B#пјүгҖӮ
   process е„Әе…Ҳ it.processпјӣжІ’жңүе°ұеҫһе•Ҷе“ҒеҗҚзҡ„гҖҢеҗҚ вҖ” иҷ•зҗҶжі•гҖҚеҫҢз¶ҙжӢҶпјҲеҗҢеҗҚеӨҡиҷ•зҗҶжі•дёҠжһ¶жҷӮ listNameFor еҠ зҡ„пјүпјҢ
   жӢҶеҮәзҡ„ name+proc иҰҒиғҪеңЁзҶҹиұҶжү№ж¬Ўе°ҚеҲ°жүҚжҺЎз”ЁпјҲиЁӮй–ұиЎҢе‘јеҸ«з«Ҝе·Іж“ӢпјүгҖӮе–®дёҖиҷ•зҗҶжі•иұҶпјқproc undefined еҗҚеӯ—зҙҡз…§иҲҠ */
function itemBeanRef(it){
  var nm=String(it&&it.name||'').trim();
  var isBlend=(DB.blends||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
  var proc=(it&&it.process!=null&&String(it.process).trim()!=='')?String(it.process).trim():undefined;
  /* е°Қеҫ—еҲ°пјқз”ҹиұҶдё»жӘ”пјҲbeansпјүжҲ–зҶҹиұҶжү№пјҲroastsпјүд»»дёҖжңүйҖҷж”ҜвҖ”вҖ”иҰҒзғҳзҡ„иұҶжІ’зҶҹиұҶжү№дҪҶжңүз”ҹиұҶпјҢдёҚиғҪеҸӘй©—зҶҹиұҶ */
  var hit=function(n,p){
    var k=String(n||'').trim().toLowerCase(),pk=procKey(p);
    return (DB.beans||[]).some(function(b){return String(b.name||'').trim().toLowerCase()===k&&(p==null||procKey(b.process)===pk);})
      ||rstBatches(n,false,p).length>0;
  };
  /* е•Ҷе“ҒеҗҚеё¶гҖҢеҗҚ вҖ” иҷ•зҗҶжі•гҖҚеҫҢз¶ҙпјҲеҗҢеҗҚеӨҡиҷ•зҗҶжі•дёҠжһ¶жҷӮ listNameFor еҠ зҡ„пјүпјҡз”ЁзҸҫжңү nameпјӢproc е°ҚдёҚеҲ°
     е°ұжҠҠеҫҢз¶ҙжӢҶйҖІ processвҖ”вҖ”roasts/beans йғҪдёҚеё¶еҫҢз¶ҙпјҢе…ЁеҗҚжңғе°Қз©әгҖӮдёҚз®Ў proc еҺҹжң¬жңүжІ’жңүеҖјйғҪи©ҰжӢҶ */
  if(!isBlend&&nm.indexOf(' вҖ” ')>-1&&!hit(nm,proc)){
    var cutAt=nm.lastIndexOf(' вҖ” ');
    var nm2=nm.slice(0,cutAt).trim(),pr2=nm.slice(cutAt+3).trim();
    if(nm2&&pr2&&hit(nm2,pr2)){nm=nm2;proc=pr2;isBlend=false;}
  }
  return {name:nm,proc:proc,isBlend:isBlend};
}
async function deductOrderStock(o){
  if(o.stock_deducted_at)return {skipped:true,short:[]};
  var short=[],tookAny=false;
  var items=Array.isArray(o.items)?o.items:[];
  for(var ii=0;ii<items.length;ii++){
    var it=items[ii];
    var nm0=String(it&&it.name||'').trim();
    if(!nm0||!it.grams)continue; /* еҒҮе“Ғй …пјҲйҒӢиІ»иЎҢзӯүпјүдёҚжүЈ */
    if(typeof isSubName==='function'&&isSubName(nm0))continue; /* з¶Іеә—иЁӮй–ұе•Ҷе“ҒиЎҢдёҚжҳҜиұҶеҗҚ */
    var kg=(Number(it.grams)||0)*(Number(it.qty)||1)/1000;
    if(!(kg>0))continue;
    /* 2026-07-15 зөұдёҖиө° itemBeanRefпјҲеҗҢзғҳиұҶйңҖжұӮеҚЎпјүпјқе“Ғй …вҶ’coffee stock жү№ж¬Ўиә«д»ҪпјҢ
       process е„Әе…Ҳ it.processгҖҒеҗҰеүҮжӢҶгҖҢеҗҚ вҖ” иҷ•зҗҶжі•гҖҚеҫҢз¶ҙпјҢеҗҢеҗҚеӨҡиҷ•зҗҶжі•иӘҚе°Қжү№ */
    var ref=itemBeanRef(it),nm=ref.name;
    var pool=rstBatches(ref.name,ref.isBlend,ref.isBlend?undefined:ref.proc);
    var left=kg;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;tookAny=true;
      }catch(e){}
    }
    if(left>0.0001)short.push(nm+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(kg*100)/100)+' kg)');
  }
  var now=new Date().toISOString();
  try{var m=await sb.from('orders').update({stock_deducted_at:now}).eq('id',o.id);if(!m.error)o.stock_deducted_at=now;}catch(e){}
  if(tookAny||short.length)logAct('stock deducted','#'+(o.order_no||o.id),short.length?('short: '+short.length+' item(s)'):null);
  return {skipped:false,short:short};
}

}

/* ===== еҮәиІЁдҝЎиіҮиЁҠеҚЎз®Ўз·ҡпјҲиҮӘ classic еҺҹе°Ғз§»жӨҚпјҡз•«еҚЎ canvas вҶ’ дёҠеӮі mail-assets вҶ’ йҷ„йҖІдҝЎпјү===== */
  function mnHexRgb(hex){hex=String(hex||'').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var n=parseInt(hex,16);if(isNaN(n))return null;return [(n>>16)&255,(n>>8)&255,n&255];}
  function _rrPath(x,X,Y,W,H,R){x.beginPath();x.moveTo(X+R,Y);x.arcTo(X+W,Y,X+W,Y+H,R);x.arcTo(X+W,Y+H,X,Y+H,R);x.arcTo(X,Y+H,X,Y,R);x.arcTo(X,Y,X+W,Y,R);x.closePath();}
  function _cardFit(x,text,weight,start,min,maxW,fam){var s=start;x.font=weight+' '+s+'px '+fam;while(s>min&&x.measureText(text).width>maxW){s-=2;x.font=weight+' '+s+'px '+fam;}return s;}
    function _cardRadar(x,cx,cy,R,scores,band){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
    x.lineWidth=2;x.strokeStyle='#1E1A19';
    [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=n;i++){var p=pt(i%n,R*l/3);if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);}x.stroke();});
    for(var i=0;i<n;i++){var sp=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(sp[0],sp[1]);x.stroke();}
    var dpts=scores.map(function(o,i){return pt(i,R*((o.n==null?0:o.n)/3));});
    x.beginPath();dpts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
    x.fillStyle='rgb('+band.map(function(v){return Math.round(255-(255-v)*0.20);}).join(',')+')';x.fill();
    x.strokeStyle='rgb('+band.join(',')+')';x.lineWidth=4;x.stroke();
    x.fillStyle='rgb('+band.join(',')+')';
    dpts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],5,0,6.3);x.fill();});
    x.fillStyle='#7C3A44';x.font='600 24px Inter, sans-serif';
    scores.forEach(function(o,i){

    });

  }

  var _cardIcons=null;
  function _loadCardIcons(){
    if(_cardIcons)return Promise.resolve(_cardIcons);
    function li(src){return new Promise(function(res){var i=new Image();i.onload=function(){res(i);};i.onerror=function(){res(null);};i.src=src;});}
    return Promise.all([li(CARD_ICON_BEAN),li(CARD_ICON_DROP)]).then(function(a){_cardIcons={bean:a[0],drop:a[1]};return _cardIcons;});
  }
  function _tintIcon(img,color,h){
    var w=Math.round(h*(img.width/img.height));
    var c=document.createElement('canvas');c.width=w;c.height=h;
    var g=c.getContext('2d');
    g.drawImage(img,0,0,w,h);
    g.globalCompositeOperation='source-in';
    g.fillStyle=color;g.fillRect(0,0,w,h);
    return c;
  }
  async function makeSquareCard(card,opts){
    try{await document.fonts.ready;}catch(e){}
    var icons=null;try{icons=await _loadCardIcons();}catch(e){}
    var W=1200,H=1200,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var x=cv.getContext('2d');
    var INK='#1E1A19',BERRY='#C87E8E';
    var CX,CY,CW,CH,CR=28,TSX,TEX;
    if(opts&&opts.tight){
      /* tight modeпјҲеҗҢ classic Print Centre дёӢијүзүҲвҖ”вҖ”IG/е°Ҹзҙ…жӣёиІјж–Үз”ЁпјүпјҡжІ’жңүе№іеҸ°иЈҒеҲҮпјҢеӣӣйӮҠз•ҷзӘ„жЎҶеҚіеҸҜ */
      CX=40;CY=40;CW=W-80;CH=H-80;
      TSX=CX+58;TEX=W-CX-58;
    }else{
      /* square card with asymmetric safe margins вҖ” Square Online portrait hero
         crops ~150px off each side, so sides get 150px margin, top/bottom 64px */
      CX=217;CY=64;CW=W-434;CH=H-128;
      /* text-safe zone: mobile portrait hero crops ~200px+ per side, so all text lives in the centre 760px */
      TSX=275;TEX=W-275;
    }
    var TW2=TEX-TSX;
    x.fillStyle='#ffffff';x.fillRect(0,0,W,H);
    var band=mnHexRgb(card.color)||[73,66,58];
    var lum=.299*band[0]+.587*band[1]+.114*band[2];
    var bandCss='rgb('+band.join(',')+')';
    var tc=lum>165?'#282220':'#ffffff';
    var lt='rgb('+band.map(function(v){return Math.round(v+(255-v)*.85);}).join(',')+')';
    var dk='rgb('+band.map(function(v){return Math.round(v*.5);}).join(',')+')';
    x.save();_rrPath(x,CX,CY,CW,CH,CR);x.clip();
    x.textBaseline='alphabetic';x.textAlign='left';
    /* ===== header banner: bean icon + name (left), Roasted / date two lines (right) ===== */
    var headH=150;
    x.fillStyle=bandCss;x.fillRect(CX,CY,CW,headH);
    x.font='600 24px Inter, sans-serif';
    var hrW=card.roasted?Math.max(x.measureText('Roasted').width,x.measureText(card.roasted).width):0;
    var nameX=TSX;
    if(icons&&icons.bean){
      var bs=50,bw=bs*(icons.bean.width/icons.bean.height);
      x.drawImage(_tintIcon(icons.bean,tc,600),nameX,CY+(headH-bs)/2,bw,bs);
      nameX+=bw+24;
    }
    var ns=_cardFit(x,card.name,'700',62,34,TEX-nameX-(hrW?hrW+40:0),'Inter, sans-serif');
    x.fillStyle=tc;x.fillText(card.name,nameX,CY+headH/2+ns*.36);
    if(card.roasted){
      x.globalAlpha=.85;x.font='600 24px Inter, sans-serif';x.textAlign='right';
      x.fillText('Roasted',TEX,CY+headH/2-10);
      x.fillText(card.roasted,TEX,CY+headH/2+24);
      x.textAlign='left';x.globalAlpha=1;
    }
    var cy=CY+headH;
    /* ===== sub header: comment / blend note ===== */
    if(card.comment){
      var subH=76;
      x.fillStyle=lt;x.fillRect(CX,cy,CW,subH);
      var cs=_cardFit(x,card.comment,'600',30,20,TW2,'Inter, sans-serif');
      x.textAlign='center';x.fillStyle=dk;x.fillText(card.comment,CX+CW/2,cy+subH/2+cs*.36);
      x.textAlign='left';
      cy+=subH;
    }
    /* ===== footer banner: drop icon + flavour, centred as a group ===== */
    var footH=150,footY=CY+CH-footH;
    if(card.flavour&&card.flavour.length){
      x.fillStyle=bandCss;x.fillRect(CX,footY,CW,footH);
      var fl=card.flavour.join('  \u00b7  ');
      var dw=0,ds=48,gap=22;
      if(icons&&icons.drop){dw=ds*(icons.drop.width/icons.drop.height);}
      var fsz=_cardFit(x,fl,'700',48,26,TW2-(dw?dw+gap:0),'Inter, sans-serif');
      var sx=TSX;
      if(icons&&icons.drop){
        x.drawImage(_tintIcon(icons.drop,tc,600),sx,footY+(footH-ds)/2,dw,ds);
        sx+=dw+gap;
      }
      x.fillStyle=tc;x.fillText(fl,sx,footY+footH/2+fsz*.36);
    }
    /* ===== content: full-width rows, radar on its own centred row ===== */
    var zoneTop=cy,zoneBot=footY;
    var Lx=TSX,Rv=TEX;
    var ry=zoneTop+64;
    if(card.kind==='blend'){
      /* one common font size across every content row */
      var csz=34;
      (card.recipe||[]).forEach(function(p){
        var hasPct=(p.pct||p.pct===0);
        csz=Math.min(csz,_cardFit(x,p.bean,'700',34,24,TW2*0.55-(hasPct?115:0),'Inter, sans-serif'));
        if(p.process)csz=Math.min(csz,_cardFit(x,p.process,'400',34,20,TW2*0.42,'Inter, sans-serif'));
      });
      (card.recipe||[]).forEach(function(p){
        var pct=(p.pct||p.pct===0)?String(p.pct)+'%':'';
        if(pct){x.fillStyle=BERRY;x.font='700 '+csz+'px Inter, sans-serif';x.fillText(pct,Lx,ry);}
        x.fillStyle=INK;x.font='700 '+csz+'px Inter, sans-serif';
        x.fillText(p.bean,Lx+(pct?115:0),ry);
        var meta=p.process||'';
        if(meta){
          x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz+'px Inter, sans-serif';
          x.fillText(meta,Rv,ry);x.textAlign='left';
        }
        ry+=66;
      });
    }else{
      var o=card.origin||{},rows=[];
      if(o.process)rows.push(['Process',o.process]);
      if(o.variety)rows.push(['Variety',o.variety]);
      if(o.altitude)rows.push(['Altitude',o.altitude+' MASL']);
      if(o.region)rows.push(['Region',o.region]);
      var csz2=34;
      rows.forEach(function(r){csz2=Math.min(csz2,_cardFit(x,String(r[1]),'400',34,20,TW2-290,'Inter, sans-serif'));});
      rows.forEach(function(r){
        x.fillStyle=INK;x.font='700 '+csz2+'px Inter, sans-serif';x.fillText(r[0],Lx,ry);
        x.textAlign='right';x.fillStyle='#322B2A';x.font='400 '+csz2+'px Inter, sans-serif';
        x.fillText(String(r[1]),Rv,ry);
        x.textAlign='left';ry+=66;
      });
      ry-=20;
    }
    var hasCup=!!(card.cupScores&&card.cupScores.some(function(o){return o.n!=null;}));
    if(hasCup){
      var radarTop=ry+26,avail=zoneBot-radarTop-16;
      var R=Math.min(150,Math.floor(avail/2-36));
      _cardRadar(x,W/2,radarTop+avail/2+4,R,card.cupScores,band);
    }
    x.restore();
    _rrPath(x,CX,CY,CW,CH,CR);x.lineWidth=3;x.strokeStyle=INK;x.stroke();
    return cv.toDataURL('image/png').split(',')[1];
  }
  
var RTL_DOTCOL={y:'#E0B341',b:'#3D7DBF',d:'#22386B',r:'#C0392B'};
function cardSlug(n){return String(n||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function _b64ToBlob(b64,type){var bin=atob(b64),len=bin.length,arr=new Uint8Array(len);for(var i=0;i<len;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:type||'image/png'});}
var _dotsMap=null;
async function cardDots(){
  if(_dotsMap)return _dotsMap;
  _dotsMap={};
  try{var r=await sb.from('app_state').select('value').eq('key','rtl_dot').maybeSingle();
    var v=r&&r.data&&r.data.value;
    if(typeof v==='string')v=JSON.parse(v);
    if(v&&typeof v==='object')_dotsMap=v;}catch(e){}

}

   йҖҖеҗҚеӯ—зҙҡпјҲиҲҠиіҮж–ҷ/жӢјй…Қ/жІ’её¶ proc зҡ„е‘јеҸ«з«ҜпјүвҖ”вҖ”еҗҢеҗҚеӨҡиҷ•зҗҶжі•еҫһжӯӨеҗ„иҮӘжңүиүІ */
function dotKeyFor(name,dots,proc){
  var nm=String(name||'').trim();if(!nm||!dots)return '';
  var tries=[];
  if(proc!=null&&String(proc).trim()!=='')tries.push(nm+' @ '+String(proc).trim());
  tries.push(nm);
  for(var i=0;i<tries.length;i++){
    var t=tries[i];
    if(dots[t])return dots[t];
    var lk=t.toLowerCase(),key='';
    Object.keys(dots).forEach(function(k){if(!key&&String(k).trim().toLowerCase()===lk)key=dots[k];});
    if(key)return key;
  }
  return '';
}
/* жқҜжё¬жҷӮдёҠиүІпјҡread-modify-write app_state rtl_dotпјҲеҖјеҪўзӢҖпјқжүҒе№і {йҚө:'y|b|r|d'}пјҢеҗҢ classic appStatePushпјүгҖӮ
   proc жңүеҖјпјқеҜ«йӣҷйҚөгҖҢиұҶеҗҚ @ иҷ•зҗҶжі•гҖҚпјӣеҗҚеӯ—зҙҡиҲҠеҖјдёҚжё…пјҲеҗҢеҗҚеҸҰдёҖж”ҜйӮ„йқ е®ғ fallbackпјү */
async function saveDotFor(name,key,proc){
  var nm=String(name||'').trim();if(!nm)return;
  if(proc!=null&&String(proc).trim()!=='')nm=nm+' @ '+String(proc).trim();
  var r=await sb.from('app_state').select('value').eq('key','rtl_dot').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  /* еҗҢйҚөдёҚеҗҢеӨ§е°ҸеҜ«зҡ„иҲҠйҚөдёҖдҪөжё…жҺүпјҢйҒҝе…ҚйӣҷйҚөжү“жһ¶ */
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===nm.toLowerCase()&&k!==nm)delete v[k];});
  if(key)v[nm]=key;else delete v[nm];
  var u=await sb.from('app_state').upsert({key:'rtl_dot',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
  _dotsMap=v; /* еҝ«еҸ–и·ҹдёҠпјҢз•«еҚЎз«ӢеҚіеҗғж–°иүІ */
}
async function cardDataFor(s,blendMap,dots){
  var SMAP={fragrance:'Aroma',acidity:'Acidity',sweetness:'Sweetness',body:'Body',aftertaste:'Aftertaste'};
  var cup=['fragrance','acidity','sweetness','body','aftertaste'].map(function(k){return {key:k,label:SMAP[k],n:(s&&s[k]!=null)?s[k]:null};});
  var rdate=s.roast_date||null;
  if(!rdate){
    var hit=null;
    (DB.roasts||[]).forEach(function(r){if(!hit&&s.bean_id&&r.bean_id&&String(r.bean_id)===String(s.bean_id))hit=r.roast_date;});
    (DB.roasts||[]).forEach(function(r){if(!hit&&String(r.bean_name||'')===(s.sample_id||''))hit=r.roast_date;});
    rdate=hit;
  }
  var data={name:s.sample_id||'',color:dotColorFor(s.sample_id,dots,s.process),
    flavour:(s.features||[]).filter(Boolean).slice(0,3),cupScores:cup,
    comment:(s.comment||'').trim(),roasted:rdate?fmtD(rdate):''};
  var bd=blendMap[String(s.sample_id||'').trim().toLowerCase()];
  if(bd){
    data.kind='blend';
    if(!data.comment)data.comment=(bd.note||'').trim();
    data.recipe=(bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).map(function(p){return {bean:p.bean,pct:parseFloat(p.pct),process:p.process||''};});
  }else{
    data.kind='single';
    var gb=null;
    /* 2026-07-15 ID е„Әе…ҲпјҲеҗҢ beanInfoRowsпјүпјҡs.bean_id вҶ’ DB.beans иЁҳжҶ¶й«”е‘ҪдёӯпјҢж¶Ҳж»…еҗҢеҗҚеӨҡж”Ҝжӯ§зҫ© */
    if(s.bean_id)gb=(DB.beans||[]).find(function(b){return String(b.id)===String(s.bean_id);})||null;
    if(!gb){
      try{
        var q=await sb.from('beans').select('process,variety,altitude,region,country').ilike('name',s.sample_id||'');
        var pool=q.data||[];
        var proc=String(s.process||'').trim().toLowerCase();
        gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
      }catch(e){}
    }
    data.origin={process:s.process||(gb&&gb.process)||'',variety:(gb&&gb.variety)||'',
      altitude:(gb&&gb.altitude!=null&&gb.altitude!=='')?String(gb.altitude):'',
      region:gb?[gb.region,gb.country].filter(Boolean).join(', '):''};
  }
  return data;
}
/* жҜҸж”ҜиұҶзҸҫе ҙйҮҚз•«еҚЎзүҮ вҶ’ дёҠеӮі mail-assetsпјҲupsert + cache-bustпјүвҶ’ еӣһеӮі {е°ҸеҜ«еҗҚ: url} */
async function uploadCardsFor(o){
  var out={};
  var items=Array.isArray(o&&o.items)?o.items:[];
  if(!items.length)return out;
  var dots=await cardDots();
  var blendMap={};
  try{var bq=await sb.from('blends').select('name,parts,note');
    (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
  var seen={};
  for(var i=0;i<items.length;i++){
    var name=String(items[i].name||'').trim();if(!name)continue;
    var key=name.toLowerCase();if(seen[key])continue;seen[key]=true;
    try{
      var r=await sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',name)
        .order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
      var s=r&&r.data&&r.data[0];if(!s)continue;
      var b64=await makeSquareCard(await cardDataFor(s,blendMap,dots));
      if(!b64)continue;
      var path='card-'+cardSlug(name)+'.png';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
      if(up&&up.error){console.error('card upload:',up.error.message||up.error);continue;}
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var url=pub&&pub.data&&pub.data.publicUrl;
      if(url)out[key]=url+'?v='+Date.now();
    }catch(e){console.error('card',e);}
  }
  return out;
}

/* ===== Pack йҖҗй …жү“еӢҫпјҲжҜҸеӢҫдёҖй …еҚіеӯҳ pack_stateпјӣе…ЁеӢҫжүҚиғҪжҢү Readyпјү===== */
function openPackSheet(i){
  var o=i.ref;var items=Array.isArray(o.items)?o.items:[];
  /* жү№зҷје–®зҡ„ Delivery fee жҳҜ items еҒҮе“Ғй …пјҲgrams:nullпјҢйҮ‘йЎҚе°Қеёіз”ЁпјүвҖ”вҖ”дёҚз”ЁиЈқз®ұпјҢжү“еӢҫжё…е–®иҲҮе…ЁеӢҫеҲӨе®ҡйғҪи·ійҒҺпјӣ
     pack_state з…§иҲҠз”ЁеҺҹе§Ӣ index з•¶йҚөпјҢи·ійҒҺдёҚеҪұйҹҝиҲҠиіҮж–ҷ */
  var packIdx=[];items.forEach(function(it,ix){
    if(!it.grams&&/^delivery fee$/i.test(String(it.name||'').trim()))return;
    packIdx.push(ix);
  });
  var ps=(o.pack_state&&typeof o.pack_state==='object')?Object.assign({},o.pack_state):{};
  function allOn(){return packIdx.length>0&&packIdx.every(function(ix){return !!ps[String(ix)];});}
  function paint(){
    openDrawerHTML('<div class="t" style="font-size:19px">'+i.t.replace('Pack ','Packing ')+'</div>'
      +'<div class="s" style="margin-top:2px">tap each item as it goes in the box</div>'
      +packIdx.map(function(ix){
        var it=items[ix],on=!!ps[String(ix)];
        return '<button class="pk-row'+(on?' on':'')+'" data-pk="'+ix+'">'+(on?'вң“ ':'')+esc((it.grams?it.grams+'g ':'')+(it.name||'')+(it.qty>1?' Г—'+it.qty:''))+'</button>';
      }).join('')
      +'<button class="act" id="pk-ready"'+(allOn()?'':' disabled')+'>All packed вҖ” move to Ready</button>'
      +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
    document.querySelectorAll('#drawer [data-pk]').forEach(function(el){el.addEventListener('click',async function(){
      var k=String(el.dataset.pk);
      if(ps[k])delete ps[k];else ps[k]=true;
      o.pack_state=ps;
      paint();
      var u=await sb.from('orders').update({pack_state:ps}).eq('id',o.id);
      if(u.error){alert('Save failed: '+u.error.message);}
    });});
    var pr=$('pk-ready');if(pr)pr.addEventListener('click',async function(){
      pr.disabled=true;pr.textContent='SavingвҖҰ';
      var u=await sb.from('orders').update({pack_state:ps,status:'Ready'}).eq('id',o.id);
      if(u.error){pr.disabled=false;pr.textContent='All packed вҖ” move to Ready';alert('Save failed: '+u.error.message);return;}
      logAct('packed',i.t);
      closeDrawer();toast('Ready to ship вң“');await reload();
    });
    var cl=$('d-cl');if(cl)cl.addEventListener('click',closeDrawer);
  }
  paint();
}
/* ===== жҜҸж—Ҙ briefing еҪҲзӘ—пјӢе…¬е‘Ҡжқҝ =====
   жҷЁе ұдёҚжҳҜ to doгҖҒжҳҜгҖҢи®Җзҡ„жқұиҘҝгҖҚпјҡзҸӯиЎЁпјӢе…¬е‘ҠпјҲеҒңж°ҙ/е®ўиЁҙ/VIPвҖҰпјүпјӢд»Ҡж—ҘдәӢд»¶гҖӮ
   жҜҸеӨ©з¬¬дёҖж¬ЎйҖІ app иҮӘеӢ•еҪҲеҮәпјӣheader е–ҮеҸӯйҡЁжҷӮйҮҚй–Ӣпјӣж–°е…¬е‘Ҡдә®зҙ…й»һгҖӮ
   е…¬е‘Ҡеӯҳ app_state 'new_notices'пјҲе…Ёеә—еҗҢжӯҘпјүпјӣгҖҢд»ҠеӨ©е·ІзңӢгҖҚеӯҳ localStorageпјҲеҖӢдәәгҖҒper иЈқзҪ®пјү */
function niceDate(s){var d=s?new Date(s+'T00:00:00'):new Date();
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];}
function noticesToday(){var t=todayKey();return NOTICES.filter(function(n){return String(n.from||t)<=t&&t<=String(n.to||t);});}
function noticePush(){return sb.from('app_state').upsert({key:'new_notices',value:{notices:NOTICES},updated_at:new Date().toISOString()},{onConflict:'key'});}
function markBriefSeen(){
  var first=false;
  try{
    first=localStorage.getItem('brief_seen')!==todayKey();

    var mx='';noticesToday().forEach(function(n){if(String(n.ts||'')>mx)mx=String(n.ts);});
    if(mx)localStorage.setItem('brief_seen_ts',mx);

  if(first)logAct('read brief');
  updateBell();
}

     жё…жҺү inline жЁЈејҸеҸӘжңғиҗҪеӣһйӮЈеҖӢ noneвҖ”вҖ”е–ҮеҸӯеӣ жӯӨеҫһдҫҶжІ’еҮәзҸҫйҒҺпјҢжҷЁе ұеҸӘеү©жҜҸеӨ©иҮӘеӢ•еҪҲйӮЈдёҖж¬Ў */
  b.style.display=(myRole()==='customer')?'none':'block';

  h+=CLOSING_ITEMS.map(function(x){var by=cm[x.id];

      +'<span style="font-size:12px;color:var(--muted)">'+(by?esc(by):'')+'</span></button>';}).join('');
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">'
    +(canWrite()?'<button class="chip" id="ck-edit">Edit list</button>':'<span></span>')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted);margin-top:0">Close</button></div>';
  openDrawerHTML(h);
  var ce=$('ck-edit');if(ce)ce.addEventListener('click',openClosingEdit);
  $('d-cl').addEventListener('click',function(){closeDrawer();buildItems();render();});
  document.querySelectorAll('[data-ck]').forEach(function(b){b.addEventListener('click',async function(){
    if(!canWrite()){roToast();return;}
    var id=b.dataset.ck,t=todayKey(),m=closingMap();
    var it=CLOSING_ITEMS.find(function(x){return x.id===id;});
    if(m[id])delete m[id];else{m[id]=WHO||'вҖ”';logAct('ticked closing',it?it.txt:id);}
    CLOSING_ALL[t]=m;

    var allDone=CLOSING_ITEMS.length&&CLOSING_ITEMS.every(function(x){return m[x.id];});
    if(allDone){logAct('closing complete');closeDrawer();toast('Closing done вҖ” nice work вң“');buildItems();render();}
    else openClosingSheet();
  });});

async function actLoadMore(){
  var q=await sb.from('activity_log').select('*').order('ts',{ascending:false}).range(ACT_PAGE*50,ACT_PAGE*50+49);

async function saveNewOrder(){
  var rows=NO.items.filter(function(it){return (it.name||'').trim();});
  if(!rows.length){toast('Pick at least one coffee');return;}
  if(rows.some(function(it){return !(Number(it.price)>0);})){toast('Set a price for each item');return;}
  var b=$('no-save');b.disabled=true;b.textContent='CreatingвҖҰ';
  try{
    /* order_no = е…ЁиЎЁ max+1пјҲеҗ«е·ІеҸ–ж¶Ҳзҡ„пјҢйҒҝе…Қж’һиҷҹпјү */
    var mx=await sb.from('orders').select('order_no').order('order_no',{ascending:false}).limit(1);
    var maxNo=(mx.data&&mx.data[0]&&mx.data[0].order_no)||0;
    var items=rows.map(function(it){return {name:it.name,grams:it.grams,qty:it.qty,price:Number(it.price)};});
    var total=0;items.forEach(function(it){total+=it.price*it.qty;});
    var ins=await sb.from('orders').insert({order_no:maxNo+1,channel:'manual',status:'New',
      customer_id:NO.cust||null,items:items,total:total,currency:'AUD',
      payment_method:NO.pm,payment_status:'pending_payment'});
    if(ins.error)throw new Error(ins.error.message);
    closeDrawer();toast('Order #'+String(maxNo+1).padStart(4,'0')+' created вң“');
    await reload();view='feed';render();
  }catch(e){b.disabled=false;b.textContent='Create order';alert('Create failed: '+(e&&e.message||e));}
}

/* ===== Dial-in е·Ҙе…·пјҲTools зЈҒиІјзүҲпјҢиҮӘ classic openDialin з§»жӨҚпјү=====
   д»»дҪ•иұҶ/й…Қж–№йҡЁжҷӮиЁҳпјҲдёҚзӯүеҚЎзүҮжҸҗйҶ’пјүпјӢTasting noteпјӢжҜҸиұҶжңҖж–°дёҖзӯҶеҸҜ Apply йҖІ brew guideгҖӮ
   еҜ«е…ҘиҰҸеүҮз…§ classic saveDialinпјӣApply з…§ classic applyDialinпјҢдҪҶй…Қж–№и·Ҝж”№зӣҙжҺҘ update blendsпјҲж–°ж®јж…ЈдҫӢпјүгҖӮ */
var DLS={coffee:'',targetId:''};
function dlRatio(d){var ds=Number(d.dose),y=Number(d.yield);if(!(ds>0&&y>0))return '';var r=Math.round(y/ds*10)/10;return '1:'+(r%1===0?Math.round(r):r);}
function dlMeta(d){return [d.grind?('grind '+d.grind):'',d.dose!=null?(d.dose+'g'):'',d.yield!=null?('вҶ’ '+d.yield+'g'):'',d.time_s!=null?(d.time_s+'s'):'',dlRatio(d)].filter(Boolean).join(' В· ');}

  var opts=[];
  (DB.beans||[]).forEach(function(b){var n=(b.name||'').trim();if(!n)return;opts.push({id:String(b.id),name:n,proc:b.process||'',isBlend:false,lab:(gNo(b)?gNo(b)+' В· ':'')+n+(b.process?' В· '+b.process:'')});});
  (DB.blends||[]).forEach(function(b){var n=(b.name||'').trim();if(!n)return;opts.push({id:String(b.id),name:n,proc:'',isBlend:true,lab:(bNoFor(n)?bNoFor(n)+' В· ':'')+n});});

  var latest={},order=[];

  function loadLast(){

    var tid=DLS.targetId,o=opts.find(function(x){return x.id===tid;});

    if(!tid||!o){toast('Pick a coffee first');return;}
    var coffee=o.name; /* coffee ж¬„еӯҳйЎҜзӨәеҗҚпјҲзӣёе®№йЎҜзӨә/иҲҠзўјпјүпјӣиӘҚиұҶйқ  target_id */
    var num=function(id){var v=($(id).value||'').trim();var n=parseFloat(v);return (v===''||isNaN(n))?null:n;};
    var b=$('dls-save');b.disabled=true;b.textContent='SavingвҖҰ';
    var ins=await sb.from('dialins').insert({coffee:coffee,target_id:tid,grind:($('dls-g').value||'').trim()||null,dose:num('dls-d'),yield:num('dls-y'),time_s:num('dls-t'),note:($('dls-n').value||'').trim()||null,barista:WHO||null}).select();
    if(ins.error){var r2={coffee:coffee,grind:($('dls-g').value||'').trim()||null,dose:num('dls-d'),yield:num('dls-y'),time_s:num('dls-t'),note:($('dls-n').value||'').trim()||null,barista:WHO||null};ins=await sb.from('dialins').insert(r2).select();} /* target_id ж¬„дёҚеӯҳеңЁзҡ„е®№йҢҜ */

/* Apply to brew guideпјҲз…§ classic applyDialinпјүпјҡеҸӘеҜ«жңүеЎ«зҡ„ж¬„дҪҚйҖІ brew.espressoгҖҒе…¶д»– method дёҚеӢ•гҖӮ
   вҡ  brew е…§е…Ёеӯҳеӯ—дёІгҖҒtime_sвҶ’key 'time' дё”еҠ  's' еҫҢз¶ҙпјҲе…¬й–ӢиұҶй Ғ How to brew еҗғйҖҷж јејҸпјүгҖӮ
   й…Қж–№вҶ’update blends.brewпјҲзӣҙжҺҘеҜ«пјҢдёҚиө° classic зҡ„ localStorage syncпјүпјӣе–®е“ҒвҶ’update beans.brewгҖӮ */
async function applyDialinBrew(id){
  var d=(DB.dialins||[]).find(function(x){return String(x.id)===String(id);});
  if(!d)return;
  if(!confirm('Write these numbers into the espresso brew guide for "'+d.coffee+'"?'))return;
  var esp={};
  if(d.grind)esp.grind=String(d.grind);
  if(d.dose!=null)esp.dose=String(d.dose);
  if(d.yield!=null)esp.yield=String(d.yield);
  if(d.time_s!=null)esp.time=String(d.time_s)+'s';
  if(!Object.keys(esp).length){toast('This dial-in has no numbers to apply');return;}
  /* иӘҚ target_idпјҲ2026-07-15пјүпјҡзӣҙжҺҘе‘ҪдёӯйӮЈж”ҜиұҶ/й…Қж–№пјӣиҲҠзҙҖйҢ„з„Ў target_id жүҚйҖҖеҗҚеӯ—зҙҡпјҲеҗҢеҗҚеҸ–з¬¬дёҖж”Ҝпјү */
  var key=String(d.coffee||'').trim().toLowerCase(),tid=d.target_id?String(d.target_id):'';
  var bl=tid?((DB.blends||[]).find(function(b){return String(b.id)===tid;})||null):(DB.blends||[]).find(function(b){return String(b.name||'').trim().toLowerCase()===key;});
  var beanHit=(tid&&!bl)?((DB.beans||[]).find(function(b){return String(b.id)===tid;})||null):null;
  try{
    if(bl){
      var q=await sb.from('blends').select('brew').eq('id',bl.id).maybeSingle();
      if(q.error)throw new Error(q.error.message);
      var br=(q.data&&q.data.brew&&typeof q.data.brew==='object')?q.data.brew:{};
      br.espresso=Object.assign({},br.espresso||{},esp);
      var u=await sb.from('blends').update({brew:br,updated_at:new Date().toISOString()}).eq('id',bl.id);
      if(u.error)throw new Error(u.error.message);
    }else{
      /* target_id е‘Ҫдёӯзҡ„ bean е„Әе…ҲпјӣжІ’жңүпјҲиҲҠзҙҖйҢ„пјүжүҚеҗҚеӯ—зҙҡеҸ–з¬¬дёҖж”Ҝ */
      var bean=beanHit||(DB.beans||[]).find(function(b){return String(b.name||'').trim().toLowerCase()===key;});
      if(!bean){toast('No matching bean for "'+d.coffee+'"');return;}
      var q2=await sb.from('beans').select('brew').eq('id',bean.id).maybeSingle();
      if(q2.error)throw new Error(q2.error.message);
      var br2=(q2.data&&q2.data.brew&&typeof q2.data.brew==='object')?q2.data.brew:{};
      br2.espresso=Object.assign({},br2.espresso||{},esp);
      var u2=await sb.from('beans').update({brew:br2}).eq('id',bean.id);
      if(u2.error)throw new Error(u2.error.message);
    }
    logAct('brew guide updated',d.coffee,dlMeta(d));
    toast('Brew guide updated вң“');
  }catch(e){alert('Update failed: '+(e&&e.message||e));}
}

/* ===== иІЁжһ¶жё…е–®пјҲеңЁиіЈзҡ„иұҶпјҡеғ№ж јиҰҸж ј/е”®зҪ„/йҺ–йўЁе‘і/зғҳз„ҷж–°й®®еәҰпјӢеҫ…дёҠжһ¶дҪҮеҲ—пјӣе”Ҝи®Җпјү===== */
/* ж–°й®®еәҰиҰҸеүҮпјҲиҖҒй—Ҷе®ҡпјҢ2026-07-07пјүпјҡ<14 еӨ©зҙ…пјҲйӮ„еңЁйӨҠиұҶпјүгҖҒ14вҖ“28 еӨ©з¶ пјҲжңҖдҪіпјүгҖҒ>28 еӨ©й»ғпјҲиҖҒеҢ–пјүпјӣ>60 еӨ©жҷЁе ұжҺЁиӯҰзӨә */
/* ж–°й®®еәҰдёүж®өпјҲиҖҒй—Ҷе®ҡпјҢиҲҮ Labels зҡ„ ready brew date дёҖиҮҙпјүпјҡ
   зғҳеҫҢ <3йҖұ(21d)=agingпјҲйӮ„жІ’еҘҪпјүпҪң3вҖ“6йҖұ(21вҖ“42d)=readyпјҲжңҖдҪіпјүпҪң>6йҖұ(42d)=fadingпјҲиө°дёӢеқЎпјүгҖӮ
   дёҖеҖӢй–ҖжӘ»йӨөж•ҙеҖӢ appпјҲиІЁжһ¶пјӢе®ўжҲ¶еә—йқўпјүпјӣ>60 еӨ©еҶҚеҠ гҖҢre-roast?гҖҚжҸҗзӨәгҖӮ */
var SHELF_FRESH_REST=21, SHELF_FRESH_PRIME=42, SHELF_STALE_DAYS=60;

function shelfSampleFor(nm,proc){
  /* proc еҸҜйҒёпјҲ2026-07-13пјүпјҡundefinedпјқеҗҚеӯ—зҙҡз…§иҲҠпјҲиҲҠе‘јеҸ«й»һйӣ¶ж”№еӢ•пјүпјӣ
     зөҰеҖјпјҲеҗ« ''пјүпјқеҸӘеңЁеҗҢ procKey жұ жүҫвҖ”вҖ”еҗҢеҗҚеӨҡиҷ•зҗҶжі•еҗ„жүҫеҗ„зҡ„йҺ– */
  var k=String(nm||'').trim().toLowerCase();
  var pool=(DB.samples||[]).filter(function(s){
    return String(s.sample_id||'').trim().toLowerCase()===k
      &&(proc===undefined||procKey(s.process)===procKey(proc));
  });
  return pool.find(function(s){return s.flavour_locked;})||pool[0]||null;
}
/* procпјҲ2026-07-14пјүпјҡundefinedпјқеҗҚеӯ—зҙҡз…§иҲҠпјҲиҲҠе‘јеҸ«й»һйӣ¶ж”№еӢ•пјүпјӣзөҰеҖјпјҲеҗ« ''пјүпјқеҸӘз®—еҗҢиҷ•зҗҶжі•зҡ„зғҳиұҶвҖ”вҖ”
   еҗҢеҗҚеӨҡиҷ•зҗҶжі•пјҲAlo Village White Honey vs Cold FermentationпјүзғҳиұҶж—ҘдёҚеҶҚдә’зӣёжұЎжҹ“ */
function shelfLatestRoast(nm,proc){
  var best=null;
  /* е…Ҳз…§дёҠжһ¶жЁЈе“Ғзҡ„ bean_id жүҫеҗҢдёҖж”Ҝз”ҹиұҶжү№зҡ„зғҳиұҶ */
  var s=shelfSampleFor(nm,proc);
  if(s&&s.bean_id){
    (DB.roasts||[]).forEach(function(r){
      if(String(r.bean_id||'')!==String(s.bean_id)||!r.roast_date)return;
      if(proc!==undefined&&!rstProcMatch(r,proc))return;
      if(!best||r.roast_date>best)best=r.roast_date;
    });
    if(best)return best;
  }
  var k=String(nm||'').trim().toLowerCase();
  (DB.roasts||[]).forEach(function(r){
    if(String(r.bean_name||'').trim().toLowerCase()!==k||!r.roast_date)return;
    if(proc!==undefined&&!rstProcMatch(r,proc))return;
    if(!best||r.roast_date>best)best=r.roast_date;
  });
  return best;
}
function shelfFreshness(nm,proc){
  var d=shelfLatestRoast(nm,proc);
  if(!d)return {txt:'no roast date',cls:'',days:null};
  var age=daysSince(d);
  if(age<SHELF_FRESH_REST)return {txt:'roasted '+age+'d вҖ” aging',cls:'fr-yellow',days:age};
  if(age<=SHELF_FRESH_PRIME)return {txt:'roasted '+age+'d вҖ” ready',cls:'fr-green',days:age};
  return {txt:'roasted '+age+'d вҖ” fading'+(age>SHELF_STALE_DAYS?' В· re-roast?':''),cls:'fr-red',days:age};
}

/* йӣҷйҚөжҹҘжқҜжё¬ full rowпјҲflavour_locked е„Әе…ҲпјүпјҡиұҶеҗҚеҝ…её¶гҖҒиҷ•зҗҶжі•жңүеҖјжүҚеҠ пјҲilike еҜ¬й¬ҶжҜ”е°ҚпјүгҖӮ
   вҡ  иҰҸеүҮпјҡеҗҢеҗҚеӨҡиҷ•зҗҶжі•жҳҜдёҚеҗҢе•Ҷе“ҒвҖ”вҖ”еҸӘжҜ”еҗҚеӯ—жңғжҠ“еҲ°еҲҘж”Ҝиҷ•зҗҶжі•зҡ„йҺ–е®ҡйўЁе‘ігҖӮ
   жүҖжңүз”ўеҮәзү©пјҲж‘әеҚЎ/зӨҫзҫӨең–/е•Ҷе“ҒеҚЎ/дҝЎд»¶еҚЎпјүзҡ„иіҮж–ҷжәҗзөұдёҖиө°йҖҷиЈЎ */
function fullSampleQuery(nm,proc){
  var q=sb.from('samples').select('*').eq('supplier','Ratio Coffee').eq('sample_id',nm);
  if(proc!=null&&String(proc).trim()!=='')q=q.ilike('process',String(proc).trim());
  return q.order('flavour_locked',{ascending:false}).order('cupping_date',{ascending:false}).limit(1);
}
/* ===== Social post kitпјҲзӨҫзҫӨжӣқе…ү Phase 4 з¬¬дёҖеҲҖпјҡиІЁжһ¶иұҶдёҖйҚөеҮә IG/е°Ҹзҙ…жӣёзҙ жқҗпјү=====
   еҚЎзүҮпјқеҗҢ Square/дҝЎд»¶иЁӯиЁҲдҪҶиө° tight зҷҪйӮҠпјҲIG иІјж–ҮжІ’жңүе№іеҸ°иЈҒеҲҮпјҢеҗҢ classic Print Centre дёӢијүзүҲпјүпјӣ
   ж–ҮжЎҲз…§ cupAutoComment ж…ЈдҫӢжң¬ж©ҹжЁЎжқҝзө„еҸҘпјҲдёҚе‘јеҸ« AIпјүпјҢжҳҜиҚүзЁҝвҖ”вҖ”иҖҒй—ҶиІјдёҠеүҚиҮӘиЎҢдҝ® */
var PROC_ZH={washed:'ж°ҙжҙ—',natural:'ж—Ҙжӣ¬',honey:'иңңиҷ•зҗҶ',anaerobic:'еҺӯж°§',
  'anaerobic natural':'еҺӯж°§ж—Ҙжӣ¬','anaerobic washed':'еҺӯж°§ж°ҙжҙ—','wet hulled':'жҝ•еҲЁ','carbonic maceration':'дәҢж°§еҢ–зўіжөёжј¬'};
function promoCaptions(nm,info,feats,comment,price,g,proc){
  function get(lab){var r=(info||[]).find(function(x){return x[0]===lab;});return r?String(r[1]):'';}
  var origin=get('Origin'),variety=get('Variety');
  proc=String(proc||'').trim();
  var procZh=PROC_ZH[proc.toLowerCase()]||'';
  var priceLine=(price!=null)?('$'+centAmt(price)+' / '+g+'g'):'';
  var en='On the shelf вҖ” '+nm+'\n';
  var line2=[origin,proc?proc+' process':'',variety].filter(Boolean).join(' В· ');
  if(line2)en+=line2+'\n';
  if(feats.length)en+='Cupping notes: '+feats.join(', ')+'\n';
  if(comment)en+='вҖң'+comment+'вҖқ\n';
  en+='\n'+(priceLine?priceLine+'\n':'')+'Roasted fresh in Crows Nest, Sydney.\n\n'
    +'#specialtycoffee #sydneycoffee #crowsnest';
  var zh='вҳ• ж–°иұҶдёҠжһ¶пҪң'+nm+'\n';
  var zp=[];
  if(origin)zp.push('з”ўең° '+origin);
  if(proc)zp.push(procZh?procZh+'иҷ•зҗҶ':proc+' process');
  if(zp.length)zh+=zp.join('пјҢ')+'\n';
  if(feats.length)zh+='жқҜжё¬йўЁе‘іпјҡ'+feats.join('гҖҒ')+'\n';
  if(comment)zh+='гҖҢ'+comment+'гҖҚ\n';
  zh+='\n'+(priceLine?priceLine+'\n':'')+'йӣӘжўЁ Crows Nest жң¬ең°ж–°й®®зғҳз„ҷгҖӮ\n\n'
    +'#йӣӘжўЁе’–е•Ў #зІҫе“Ғе’–е•Ў #еҢ—еІёе’–е•Ў';
  return {en:en,zh:zh};
}
async function openPromoSheet(s,m){

  var nm=String(s.sample_id||'').trim();
  openDrawerHTML('<div class="t" style="font-size:19px">Social post kit</div>'

    +'<div id="pk-body"></div>'

    var dots={};try{dots=await cardDots();}catch(e){}

      (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
    var info=[];try{info=await beanInfoRows(full,{omit:['Roasted','Harvest']});}catch(e){}
    var col=dotColorFor(nm,dots,full.process)||'#C87E8E';

    var cap=promoCaptions(nm,info,feats,full.comment||'',m.rtl_price[nm],m.rtl_g[nm]||250,full.process||'');

    if(host)host.outerHTML='<img src="data:image/png;base64,'+b64+'" alt="post card" style="width:100%;display:block;margin-top:10px;border:1px solid var(--line);border-radius:12px">';
    var body=$('pk-body');
    if(body)body.innerHTML=
      '<a class="dclose" style="display:block;text-align:center;text-decoration:none" download="ig-'+beanSlug(nm)+'.png" href="data:image/png;base64,'+b64+'">Download image</a>'
      +'<div class="dlab">Export 4 images for a carousel</div>'
      +'<button class="dclose" id="pk-split">White background вҖ” ready to post</button>'
      +'<button class="dclose" id="pk-split-t">Transparent background</button>'
      +'<button class="dclose" id="pk-split-p">Photo background</button>'
      +'<div id="pk-social"></div>'
      +'<div class="dlab">Instagram caption</div>'
      +'<textarea class="dta" id="pk-en" style="min-height:180px">'+esc(cap.en)+'</textarea>'
      +'<button class="dclose" data-copy="pk-en">Copy English caption</button>'
      +'<div class="dlab">RED caption (е°Ҹзҙ…жӣё)</div>'
      +'<textarea class="dta" id="pk-zh" style="min-height:180px">'+esc(cap.zh)+'</textarea>'
      +'<button class="dclose" data-copy="pk-zh">Copy Chinese caption</button>';
    document.querySelectorAll('#drawer [data-copy]').forEach(function(btn){btn.addEventListener('click',async function(){
      var ta=$(btn.dataset.copy);if(!ta)return;
      var ok=false;
      try{await navigator.clipboard.writeText(ta.value);ok=true;}
      catch(e){try{ta.focus();ta.select();ok=document.execCommand('copy');}catch(e2){}}
      var orig=btn.dataset.copy==='pk-en'?'Copy English caption':'Copy Chinese caption';

      /* жІ’еӯҳйҒҺз…§зүҮе°ұз•¶е ҙйҒёдёҖејөпјҢйҒёе®ҢеҶҚз”ўең– */

/* ===== иұҶеӯҗиғҢжҷҜз…§пјҡеӯҳ Storage mail-assets зҡ„ photo-<slug>.jpgпјҢйқ жӘ”еҗҚе°ҚжҮүиұҶеӯҗпјҲеҗҢ card-<slug>.png ж…ЈдҫӢпјү

function beanPhotoPath(nm){return 'photo-'+beanSlug(nm)+'.jpg';}

/* жӢүжҲҗ dataURL еҶҚдәӨзөҰ html2canvasпјҲзңҒдёҖж¬Ўи·Ёз¶ІеҹҹжҠ“ең–пјӣжІ’з…§зүҮеӣһ nullпјү */
async function loadBeanPhotoData(nm){
  try{

    if(!r.ok)return null;
    var b=await r.blob();

    return await new Promise(function(ok){var fr=new FileReader();fr.onload=function(){ok(fr.result);};fr.onerror=function(){ok(null);};fr.readAsDataURL(b);});
  }catch(e){return null;}
}

function pickPhotoFile(){
  return new Promise(function(ok){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';

/* зҪ®дёӯиЈҒжҲҗ 1080 иҰӢж–№ JPEGвҖ”вҖ”дёҚз®ЎжӢҚзҡ„жҳҜзӣҙжҳҜж©«жҳҜ HEICпјҢеӯҳйҖІеҺ»йғҪеҗҢдёҖиҰҸж ј */
function _cropSquare1080(file){
  return new Promise(function(ok,bad){
    var fr=new FileReader();
    fr.onload=function(){
      var im=new Image();
      im.onload=function(){
        var s=Math.min(im.naturalWidth,im.naturalHeight);
        if(!s)return bad(new Error('That image looks empty'));
        var c=document.createElement('canvas');c.width=1080;c.height=1080;
        c.getContext('2d').drawImage(im,(im.naturalWidth-s)/2,(im.naturalHeight-s)/2,s,s,0,0,1080,1080);
        c.toBlob(function(b){b?ok(b):bad(new Error('Could not process that image'));},'image/jpeg',0.86);
      };
      im.onerror=function(){bad(new Error('Could not read that image вҖ” try a JPEG or PNG'));};
      im.src=fr.result;
    };
    fr.onerror=function(){bad(new Error('Could not read that file'));};
    fr.readAsDataURL(file);
  });
}
async function uploadBeanPhoto(nm,file){
  var blob=await _cropSquare1080(file);
  var up=await sb.storage.from('mail-assets').upload(beanPhotoPath(nm),blob,{upsert:true,contentType:'image/jpeg'});
  if(up&&up.error)throw new Error(up.error.message||'Upload failed');
  return true;
}
/* з…§зүҮеҒҸжҡ—е°ұжҠҠеӯ—зҝ»жҲҗж·әиүІпјҲдёҚз„¶ж·ұе’–е•ЎиүІжЁҷйЎҢжңғжІүйҖІз…§зүҮиЈЎпјү */
async function photoIsDark(dataUrl){
  try{
    var im=new Image();im.src=dataUrl;
    await new Promise(function(r,b){im.onload=r;im.onerror=b;});
    var c=document.createElement('canvas');c.width=32;c.height=32;
    c.getContext('2d').drawImage(im,0,0,32,32);
    var d=c.getContext('2d').getImageData(0,0,32,32).data,sum=0;
    for(var i=0;i<d.length;i+=4)sum+=0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2];
    return sum/1024<140;
  }catch(e){return false;}
}
/* иһўе№• UI дёҠзҡ„иұҶеӯҗй»һиүІпјҲQC иүІйҲ•гҖҒиІЁжһ¶ең“й»һгҖҒжҠҪеұңиЈЎзҡ„йӣ·йҒ”пјүпјҡеӨңзүҲиҰҒжҸҗдә®пјҢ
   дёҚз„¶ж·ұи—Қ #22386B е°Қ #1C1C1C зҡ„ WCAG е°ҚжҜ”еҸӘжңү 1.50пјҲең–еҪўе…ғзҙ жңҖдҪҺиҰҒ 3пјүпјҢзҙ…д№ҹеҸӘжңү 3.13гҖӮ
   иө°зҡ„жҳҜи·ҹзӨҫзҫӨең–ж·ұеә•з…§зүҮеҗҢдёҖжўқиҰҸеүҮвҖ”вҖ”дҪ еңЁ QC йҒёзҡ„и—ҚпјҢе°ұжҳҜең–дёҠйӮЈеҖӢи—ҚгҖӮ
   вҡ  еҸӘзөҰиһўе№•з”Ёпјӣз”ўеҮәзҡ„ең–зүҮ/жЁҷзұӨиҮӘе·ұжұәе®ҡжҳҺжҡ—пјҲrenderSocialImages зңӢз…§зүҮдә®еәҰпјҢдёҚзңӢ app дё»йЎҢпјү */
function isDarkUI(){
  var el=document.documentElement;
  if(el.classList.contains('dark'))return true;
  if(el.classList.contains('light'))return false;
  try{return window.matchMedia('(prefers-color-scheme: dark)').matches;}catch(e){return false;}
}
/* 0.30 жҳҜжҺғеҮәдҫҶзҡ„з”ңиңңй»һпјҡеӣӣиүІе…ЁйҒҺ 3:1пјҲж·ұи—Қ 3.45пјүпјҢеӣӣиүІе…©е…©зҡ„жңҖе°ҸиүІе·®йӮ„з•ҷ 78пјҲеҺҹиүІ 112 зҡ„дёғжҲҗпјүгҖӮ
   жҸҗеҲ° 0.45 е°ҚжҜ”жӣҙеҘҪпјҢдҪҶиүІе·®жҺүеҲ° 62вҖ”вҖ”дә®и—ҚиҲҮж·ұи—Қе°ұй–Ӣе§ӢзіҠеңЁдёҖиө·пјҢиҖҢй»һиүІзҡ„з”ЁйҖ”жӯЈжҳҜеҲҶиҫЁиұҶеӯҗгҖӮ
   зӨҫзҫӨең–йӮЈйӮҠд»Қз”Ё 0.45пјҡе®ғеЈ“еңЁйӣңдәӮзҡ„з…§зүҮдёҠпјҢйңҖиҰҒжӣҙеӨҡдә®еәҰпјӣиһўе№•иғҢжҷҜжҳҜзҙ”иүІпјҢдёҚеҝ…гҖӮ */
function uiDot(hex){return hex?(isDarkUI()?_liftColour(hex,0.30):hex):hex;}
/* ж·ұиүІз…§зүҮдёҠжҠҠиұҶеӯҗзҡ„й»һиүІеҫҖзұізҷҪжҸҗдә®пјҡж·ұи—Қ #22386B зӣҙжҺҘз•«еңЁжҡ—еә•дёҠе°ҚжҜ”еҸӘеү© 9пјҲзңӢдёҚиҰӢпјүпјҢ
   зҙ…иүІд№ҹеҸӘжңү 17гҖӮж··зҷҪеҫҢдҝқдҪҸиүІзӣёгҖҒжӢүй–Ӣдә®еәҰпјҢйӮ„жҳҜиӘҚеҫ—еҮәжҳҜе“ӘдёҖж”ҜиұҶ */
function _liftColour(hex,amt){
  var m=/^#?([0-9a-f]{6})$/i.exec(String(hex||''));
  if(!m)return hex;
  var n=parseInt(m[1],16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  function mix(c,t){return Math.round(c+(t-c)*amt);}
  return 'rgb('+mix(r,247)+','+mix(g,242)+','+mix(b,237)+')';
}
function _socTheme(dark){

    ?{ink:'#F7F2ED',muted:'#C6BEB6',soft:'#DED6CE',line:'rgba(247,242,237,.26)',orn:'rgba(247,242,237,.34)'}

}

   logo.png / drop.svg / bean.svg йғҪжҳҜж·ұиүІз·ҡзЁҝпјҢж·ұеә•дёҠжңғзңӢдёҚиҰӢгҖӮз”Ё canvas е°ұең°дёҠиүІжҲҗ dataURL
   пјҲдёҚиғҪз”Ё CSS maskвҖ”вҖ”html2canvas дёҚеҗғ maskпјҢжңғз•«жҲҗдёҖеЎҠеҜҰеҝғж–№еЎҠпјү
   еӨұж•—е°ұйҖҖеӣһеҺҹжӘ”пјҲиҮіе°‘ж·әеә•зңӢеҫ—еҲ°пјү */
var SOC_BEAN_RATIO=0.78; /* еҜҰеҝғзҡ„иұҶе°Қзҙ°з·ҡж°ҙж»ҙзҡ„е…үеӯёе°әеҜёж ЎжӯЈ */
async function _tintArt(src,col,w,h){
  try{
    var im=new Image();im.crossOrigin='anonymous';im.src=src;
    await new Promise(function(r,b){im.onload=r;im.onerror=b;});
    var c=document.createElement('canvas');
    c.width=im.naturalWidth||w;c.height=im.naturalHeight||h;

}

function wireSocBgPicker(rootSel,getCur,onPick,repaint){
  var root=document.querySelector(rootSel);
  if(!root)return;
  root.querySelectorAll('[data-bg]').forEach(function(b){b.addEventListener('click',function(){onPick(b.dataset.bg);});});
  var panel=root.querySelector('[data-bgpanel]');
  var addBtn=root.querySelector('[data-bgadd]');
  if(addBtn&&panel)addBtn.addEventListener('click',function(){panel.style.display=(panel.style.display==='none'||!panel.style.display)?'block':'none';});

  var tx=root.querySelector('[data-bghex]');
  if(col)col.addEventListener('input',function(){var h=socHexNorm(this.value);if(h){onPick(h);if(tx)tx.value=h;var lb=this.parentNode;if(lb)lb.style.background=h;}});

  if(sv)sv.addEventListener('click',function(){
    var h=socHexNorm(getCur());
    if(!h)return;
    var built=SOC_SWATCHES.map(function(x){return x.toLowerCase();});
    if(built.indexOf(h)>=0||SOC_SAVED.indexOf(h)>=0){toast('Already saved');return;}
    if(SOC_SAVED.length>=8){toast('Remove one first В· max 8');return;}
    SOC_SAVED.push(h);socBgSave();repaint();
  });
  var ed=root.querySelector('[data-bgedit]');
  if(ed)ed.addEventListener('click',function(){repaint(true);});
  root.querySelectorAll('[data-bgdel]').forEach(function(x){x.addEventListener('click',function(){
    var h=String(x.dataset.bgdel).toLowerCase(),i=SOC_SAVED.indexOf(h);
    if(i>=0)SOC_SAVED.splice(i,1);
    socBgSave();repaint();
  });});
}

/* йҒёдёҖејөз…§зүҮеӯҳзөҰйҖҷж”ҜиұҶпјҲиҰҶи“ӢиҲҠзҡ„пјүгҖӮдёҠеӮіиө° storageпјҢе”Ҝи®Җиӯ·ж¬„зҡ„ sb.from Proxy з®ЎдёҚеҲ°пјҢиҮӘе·ұж“Ӣ */

async function socialSplitPick(s){

  }

    if(fq.data&&fq.data[0])full=fq.data[0];}catch(e){}
  var dots={};try{dots=await cardDots();}catch(e){}
