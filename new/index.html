    $('d-cl').addEventListener('click',closeDrawer);return;
  }
  CTS.list=r.data||[];
  renderContactsList();
}
function renderContactsList(){
  var chips='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">'
    +[['','All']].concat(CONTACT_TYPES.map(function(t){return [t,t];})).map(function(x){
      var on=(CTS.type||'')===x[0];
      return '<button class="chip" data-ctf="'+x[0]+'"'+(on?' style="border-color:var(--accent);color:var(--accent)"':'')+'>'+x[1]+'</button>';
    }).join('')+'</div>';
  var list=CTS.list.filter(function(c){return !CTS.type||c.type===CTS.type;});
  var body=list.length?list.map(function(c){
    var sub=c.address||c.company||c.email||c.phone||'';
    return '<div class="hit" data-ct="'+esc(String(c.id))+'"><span style="min-width:0"><div class="t">'+esc(c.name||'вҖ”')+'</div>'+(sub?'<div class="s">'+esc(sub)+'</div>':'')+'</span>'
      +'<span class="k pill" style="background:'+(CT_COLORS[c.type]||'#9A8B82')+';color:#fff">'+esc(c.type||'вҖ”')+'</span></div>';
  }).join(''):'<div class="empty" style="margin-top:14px">'+(CTS.type?('No '+esc(CTS.type)+' contacts yet'):'No contacts yet')+'</div>';
  openDrawerHTML('<div class="t" style="font-size:19px">Contacts</div>'
    +'<div class="s" style="margin-top:2px">suppliers and partners вҖ” separate from customers</div>'
    +chips+'<div style="margin-top:10px">'+body+'</div>'
    +(canWrite()?'<button class="act" id="cts-add">+ New contact</button>':'')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  var d=$('drawer');
  d.querySelectorAll('[data-ctf]').forEach(function(b){b.addEventListener('click',function(){CTS.type=b.dataset.ctf||null;renderContactsList();});});
  d.querySelectorAll('[data-ct]').forEach(function(el){el.addEventListener('click',function(){
    var c=CTS.list.find(function(x){return String(x.id)===el.dataset.ct;});
    if(c)openContactEdit(c);
  });});
  var ad=$('cts-add');if(ad)ad.addEventListener('click',function(){openContactEdit(null);});
  $('d-cl').addEventListener('click',closeDrawer);
}
function openContactEdit(c){
  var isNew=!c;
  var p=c||{name:'',type:CTS.type||'Supplier',company:'',address:'',email:'',phone:'',notes:''};
  var typeOpts=CONTACT_TYPES.map(function(t){return '<option'+(t===p.type?' selected':'')+'>'+t+'</option>';}).join('');
  var ro=!canWrite();
  openDrawerHTML('<div class="t" style="font-size:19px">'+(isNew?'New contact':esc(p.name||'Contact'))+'</div>'
    +'<div class="dlab">Type</div><select class="din" id="cts-type"'+(ro?' disabled':'')+'>'+typeOpts+'</select>'
    +'<div class="dlab">Name</div><input class="din" id="cts-name" type="text" value="'+esc(p.name||'')+'" placeholder="Contact name"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Company</div><input class="din" id="cts-company" type="text" value="'+esc(p.company||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Address</div><input class="din" id="cts-address" type="text" value="'+esc(p.address||'')+'" placeholder="Street, suburb STATE postcode"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Email</div><input class="din" id="cts-email" type="email" value="'+esc(p.email||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Phone</div><input class="din" id="cts-phone" type="tel" value="'+esc(p.phone||'')+'"'+(ro?' readonly':'')+'>'
    +'<div class="dlab">Notes</div><textarea class="din" id="cts-notes" rows="2"'+(ro?' readonly':'')+'>'+esc(p.notes||'')+'</textarea>'
    +'<div class="s" id="cts-msg" style="margin-top:8px"></div>'
    +(ro?'':'<button class="act" id="cts-save">Save</button>')
    +(isNew||ro?'':'<button class="dclose" id="cts-del" style="color:var(--danger)">Delete this contact</button>')
    +'<button class="dclose" id="cts-back" style="border:none;background:none;color:var(--muted)">вҖ№ Back to Contacts</button>');
  var sv=$('cts-save');if(sv)sv.addEventListener('click',async function(){
    var g=function(id){return ($(id).value||'').trim();};
    var rec={type:$('cts-type').value,name:g('cts-name'),company:g('cts-company')||null,address:g('cts-address')||null,email:g('cts-email')||null,phone:g('cts-phone')||null,notes:g('cts-notes')||null};
    var msg=$('cts-msg');
    if(!rec.name){msg.innerHTML='<span class="red">Name is required</span>';return;}
    sv.disabled=true;sv.textContent='SavingвҖҰ';
    if(isNew){
      var ins=await sb.from('contacts').insert(rec).select();
      if(ins.error){sv.disabled=false;sv.textContent='Save';msg.innerHTML='<span class="red">Save failed: '+esc(ins.error.message)+'</span>';return;}
      if(ins.data&&ins.data[0])CTS.list.push(ins.data[0]);
      logAct('added contact',rec.name);
    }else{
      var up=await sb.from('contacts').update(rec).eq('id',c.id);
      if(up.error){sv.disabled=false;sv.textContent='Save';msg.innerHTML='<span class="red">Save failed: '+esc(up.error.message)+'</span>';return;}
      var i=CTS.list.findIndex(function(x){return String(x.id)===String(c.id);});if(i>-1)CTS.list[i]=Object.assign({},CTS.list[i],rec);
      logAct('edited contact',rec.name);
    }
    CTS.list.sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});
    toast('Saved вң“');renderContactsList();
  });
  var del=$('cts-del');if(del)del.addEventListener('click',async function(){
    if(!confirm('Delete "'+(p.name||'')+'"? This cannot be undone.'))return;
    var r=await sb.from('contacts').delete().eq('id',c.id);
    if(r.error){$('cts-msg').innerHTML='<span class="red">Delete failed: '+esc(r.error.message)+'</span>';return;}
    CTS.list=CTS.list.filter(function(x){return String(x.id)!==String(c.id);});
    logAct('deleted contact',p.name||'');
    toast('Deleted');renderContactsList();
  });
  $('cts-back').addEventListener('click',renderContactsList);
}

function openAddAccountSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Add account</div>'
    +'<div class="s" style="margin-top:2px">creates a sign-in вҖ” when it appears under Accounts, set the role there</div>'
    +'<div class="dlab">Name</div><input class="din" id="aa-name" type="text" placeholder="Match the staff list if staff">'
    +'<div class="dlab">Email</div><input class="din" id="aa-email" type="email" placeholder="them@example.com">'
    +'<div class="dlab">Password</div><input class="din" id="aa-pass" type="text" autocomplete="off" placeholder="6+ characters вҖ” share it with them">'
    +'<div class="s" id="aa-msg" style="margin-top:8px"></div>'
    +'<button class="act" id="aa-go">Create account</button>'
    +'<button class="dclose" id="aa-back" style="border:none;background:none;color:var(--muted)">вҖ№ Back to Team</button>');
  $('aa-back').addEventListener('click',openTeamSheet);
  $('aa-go').addEventListener('click',async function(){
    var name=($('aa-name').value||'').trim();
    var email=($('aa-email').value||'').trim();
    var pass=$('aa-pass').value||'';
    var msg=$('aa-msg');
    if(!email||!pass){msg.innerHTML='<span class="red">Enter email and password</span>';return;}
    if(pass.length<6){msg.innerHTML='<span class="red">Password needs 6+ characters</span>';return;}
    var b=$('aa-go');b.disabled=true;b.textContent='CreatingвҖҰ';
    try{
      var c=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
      var r=await c.auth.signUp({email:email,password:pass,options:{data:{name:name}}});
      if(r.error)throw new Error(r.error.message);
      logAct('added account',name||email);
      toast(r.data&&r.data.session?'Account created вң“':'Account created вҖ” they must confirm the email before signing in');
      openTeamSheet();
    }catch(e){b.disabled=false;b.textContent='Create account';msg.innerHTML='<span class="red">Failed: '+esc(e&&e.message||e)+'</span>';}
  });
}

async function recipeSave(){
  var defs=RCP.defs,sv=$('rcp-saved');
  var dups=blDupNames(defs);
  if(Object.keys(dups).length){if(sv){sv.textContent='вҡ пёҸ Blend names must be unique';sv.style.color='var(--accent)';sv.style.opacity='1';}paintRecipe();return;}
  var btn=$('rcp-save');if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
  var renames=[];
  defs.forEach(function(bl){var nn=(bl.name||'').trim(),on=(bl.hname||'').trim();if(!nn)return;if(!on){bl.hname=nn;return;}if(on!==nn)renames.push({bl:bl,o:on,n:nn});});
  var now=new Date().toISOString();
  var rows=defs.map(function(b,i){if(!b.id)b.id=blUid();return {id:b.id,name:b.name||'',hname:b.hname||null,parts:Array.isArray(b.parts)?b.parts:[],note:b.note||null,comment:b.comment||null,brew:(b.brew&&typeof b.brew==='object')?b.brew:null,pos:i,updated_at:now};}).filter(function(r){return !!r.id;});
  try{
    if(rows.length){var up=await sb.from('blends').upsert(rows,{onConflict:'id'});if(up.error)throw new Error(up.error.message);}
    var keep={};rows.forEach(function(r){keep[r.id]=1;});
    var gone=(RCP.knownIds||[]).filter(function(id){return !keep[id];});
    if(gone.length){var dl=await sb.from('blends').delete().in('id',gone);if(dl.error)throw new Error(dl.error.message);}
    for(var ri=0;ri<renames.length;ri++){
      var rn=renames[ri];
      var e1=(await sb.from('roasts').update({bean_name:rn.n}).eq('bean_name',rn.o)).error;
      var e2=(await sb.from('samples').update({sample_id:rn.n}).eq('sample_id',rn.o)).error;
      var e3=(await sb.from('product_sync').update({bean_id:rn.n}).eq('bean_id',rn.o)).error;
      if(e1||e2||e3)throw new Error((e1||e2||e3).message);
      (DB.roasts||[]).forEach(function(r){if((r.bean_name||'')===rn.o)r.bean_name=rn.n;});
      (DB.samples||[]).forEach(function(s){if((s.sample_id||'')===rn.o)s.sample_id=rn.n;});
      rn.bl.hname=rn.n;
    }
    RCP.knownIds=Object.keys(keep);
    logAct('edited blends',rows.length+' blends'+(renames.length?(', '+renames.length+' renamed'):''),null);
    if(btn){btn.disabled=false;btn.textContent='Save recipe';}
    if(sv){sv.textContent='вң“ Saved';sv.style.color='var(--muted)';sv.style.opacity='1';setTimeout(function(){if(sv)sv.style.opacity='0';},1800);}
    toast('Saved вң“');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Save recipe';}
    alert('Save failed: '+(e&&e.message||e));
  }
}

  var dpts=axes.map(function(a,i){var v=(s[a[0]]==null?0:s[a[0]]);return pt(i,R*(v/3));});
  var dpoly=dpts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');

  var labels='';axes.forEach(function(a,i){

function saveHomeOrder(arr){HOME_ORDER=arr;try{localStorage.setItem('home_order_v1',JSON.stringify(arr));}catch(e){}}
function orderedHome(tiles){
  if(!HOME_ORDER||!HOME_ORDER.length)return tiles;
  var rank={};HOME_ORDER.forEach(function(k,i){rank[k]=i;});
  return tiles.slice().sort(function(a,b){var ra=(a.k in rank)?rank[a.k]:99,rb=(b.k in rank)?rank[b.k]:99;return ra-rb;});
}
function renderHome(){
  $('deck').style.display='none';
  var bgl=document.querySelector('.bglogo');if(bgl)bgl.style.display='none'; /* йҒҠжҲІз•«йқўдёҚиҰҒжө®ж°ҙеҚ° */
  $('hcnt').textContent=WHO;
  var m=$('main');
  var p=todayProgress(),total=(p.done==null)?null:(p.done+p.open);
  var h='<div class="hm-prog">';
  if(p.done==null){
    h+='<div class="hm-pt"><span>Today</span><b>'+(p.open?p.open+' to go':'All clear вң“')+'</b></div>';
  }else{
    h+='<div class="hm-pt"><span>Today</span><b>'+(p.open?p.done+' / '+total+' done':'All clear вң“')+'</b></div>'
      +'<div class="hm-bar"><div class="hm-fill" style="width:'+(total?Math.round(p.done*100/total):100)+'%"></div></div>';
  }
  h+='</div>';
  var tiles=orderedHome(HOME_TILES.filter(function(t){return t.roles.indexOf(myRole())>-1;}));
  h+='<div class="hm-grid">'+tiles.map(function(t){
    var n=tileCount(t),c=STCOLOR[t.sts[0]]||'#6E8B4E';
    var fresh=n>0&&tileFresh(t);
    var num=(t.k==='payroll')?'вҶ’':(n?String(n):'вң“');
    return '<button class="hm-tile'+((n||t.k==='payroll')?'':' clear')+'" data-hm="'+t.k+'">'
      +(fresh?'<span class="hm-dot"></span>':'')
      +'<span class="hm-ic" style="background:'+c+';box-shadow:0 8px 16px '+c+'55">'+HOME_ICONS[t.k]+'</span>'
      +'<div class="hm-num">'+num+'</div>'
      +'<div class="hm-lab">'+t.lab+'</div></button>';
  }).join('')+'</div>';
  m.innerHTML=h;
  /* зҹӯжҢүпјқйҖІеҲҶйЎһпјӣй•·жҢүжӢ–жӣіпјқжҸӣдҪҚдёҰиЁҳдҪҸй ҶеәҸпјҲжҜҸеҸ°иЈқзҪ® localStorageпјү*/
  var _grid=m.querySelector('.hm-grid'),_hdrag=null,_hsx=0,_hsy=0,_hmoved=false;
  _grid.querySelectorAll('.hm-tile').forEach(function(b){
    b.addEventListener('pointerdown',function(e){
      _hdrag=b;_hsx=e.clientX;_hsy=e.clientY;_hmoved=false;
      try{b.setPointerCapture(e.pointerId);}catch(err){}
    });
    b.addEventListener('pointermove',function(e){
      if(_hdrag!==b)return;
      var dx=e.clientX-_hsx,dy=e.clientY-_hsy;
      if(!_hmoved&&Math.hypot(dx,dy)<8)return;
      _hmoved=true;b.classList.add('dragging');
      b.style.transform='translate('+dx+'px,'+dy+'px) scale(1.06)';
      b.style.pointerEvents='none';
      var under=document.elementFromPoint(e.clientX,e.clientY);
      b.style.pointerEvents='';
      var tgt=under&&under.closest('.hm-tile');
      if(tgt&&tgt!==b&&tgt.parentElement===_grid){
        var r=tgt.getBoundingClientRect();
        var after=(e.clientY>r.bottom)||(e.clientY>=r.top&&e.clientX>r.left+r.width/2);
        _grid.insertBefore(b,after?tgt.nextSibling:tgt);
        _hsx=e.clientX;_hsy=e.clientY;b.style.transform='scale(1.06)';
      }
    });
    function _hend(){
      if(_hdrag!==b)return;
      var was=_hmoved;_hdrag=null;
      b.classList.remove('dragging');b.style.transform='';
      if(was){saveHomeOrder([].map.call(_grid.querySelectorAll('.hm-tile'),function(el){return el.dataset.hm;}));}
      else{var t=HOME_TILES.find(function(x){return x.k===b.dataset.hm;});if(t)goTile(t);}
    }
    b.addEventListener('pointerup',_hend);
    b.addEventListener('pointercancel',_hend);
  });
}

var SHOP_STALE=false;

   жү№зҷјжЁЎејҸпјҲWS_MODEпјүпјҡзҚЁз«Ӣи»Ҡ r2_wcartпјҲе…ұз”ЁиЈқзҪ®дёҚж··йӣ¶е”®и»ҠпјүпјӢж•ёйҮҸдёҠйҷҗ 40пјӣзөҗеёіиө° wholesale edge ===== */
var WS_MODE=false, WS_INFO=null, WS_WELCOME_SEEN=false; /* WS_INFO={pct,moq:{threshold,delivery_fee},bank} дҫҶиҮӘ wholesale menu */

function centAmt(n){n=Number(n)||0;return n%1===0?String(n):n.toFixed(2);}
function cartKey(){return WS_MODE?'r2_wcart':'r2_cart';}
function cartMaxQty(){return WS_MODE?40:9;}
function cartGet(){try{return JSON.parse(localStorage.getItem(cartKey())||'[]');}catch(e){return [];}}
function cartSet(c){try{localStorage.setItem(cartKey(),JSON.stringify(c));}catch(e){}paintCartBar();}
function cartAdd(item){
  var c=cartGet();
  var ex=c.find(function(x){return x.vid===item.vid;});
  if(isSubName(item.bean)){ /* иЁӮй–ұеӣәе®ҡдёҖд»ҪпјҡйҮҚиӨҮеҠ дёҚз–ҠйҮҸ */
    if(ex){toast('Subscription is already in your cart');return;}
    item.qty=1;c.push(item);cartSet(c);return;
  }
  if(ex)ex.qty=Math.min(cartMaxQty(),(ex.qty||1)+(item.qty||1));
  else c.push(item);
  cartSet(c);
}
function cartCount(){return cartGet().reduce(function(a,x){return a+(x.qty||1);},0);}
function cartTotal(){return cartGet().reduce(function(a,x){return a+(x.qty||1)*(Number(x.price)||0);},0);}

var SHOP_CATS=[['blend','Blend'],['single','Single origin'],['subscription','Subscription']];

/* еә—йқўдё»й«”пјҡе·ҰеҸіж»‘ијӘж’ӯпјҲscroll-snapпјҢдёҖй ҒдёҖж”ҜиұҶпјүпјӢең“й»һжҢҮзӨәпјӣtab еҲҮеҲҶйЎһйҮҚз•« */
function renderShopTabs(){
  var el=$('shoptabs');
  var counts={};SHOP_BEANS.forEach(function(b){var c=shopCategory(b);counts[c]=(counts[c]||0)+1;});
  /* иЁӮй–ұз®—жҲҗдёҖеҖӢжңүиІЁеҲҶйЎһпјҲеҚҮзҙҡжҲҗзҚЁз«Ӣ tabпјүпјҡжңүиЁӮй–ұе•Ҷе“ҒпјӢйқһжү№зҷјжЁЎејҸжүҚеҮәзҸҫ */
  if(!WS_MODE&&SHOP_SUBS.length)counts['subscription']=SHOP_SUBS.length;
  var visible=SHOP_CATS.filter(function(c){return counts[c[0]];});
  if(!counts[SHOP_CAT])SHOP_CAT=visible.length?visible[0][0]:SHOP_CAT;
  /* з©әеҲҶйЎһдёҚжёІжҹ“пјҲжӯ»и·Ҝз§»йҷӨпјүпјӣеҸӘеү©дёҖйЎһпјқж•ҙжўқи—Ҹ */
  if(visible.length<=1){el.style.display='none';el.innerHTML='';return;}

function paintShopBody(){
  var host=$('shopbody');if(!host)return;
  document.querySelectorAll('#shoptabs [data-sct]').forEach(function(b){b.classList.toggle('on',b.dataset.sct===SHOP_CAT);});

  if(SHOP_CAT==='subscription'){

  host.innerHTML='<div class="shopwrap" id="shopwrap">'+shopCardsHTML(list)+'</div>'
    /* зҺ»з’ғз®ӯй ӯж”ҫ shopbody иЈЎпјҡйӣўй–Ӣе•Ҷеә—з•«йқўпјҲinnerHTML жҸӣжҺүпјүе°ұиҮӘеӢ•ж¶ҲеӨұ */
    +(list.length>1
      ?'<button class="shoparr l" id="sharr-l" aria-label="Previous coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'
      +'<button class="shoparr r" id="sharr-r" aria-label="Next coffee"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'
      :'')
  ;
  wireShopCards(host);
  paintCartBar();
  var w=$('shopwrap');
  if(w&&list.length>1){
    var slideW=function(){return w.children[0]?(w.children[0].offsetWidth+14):w.clientWidth;};
    var arrPaint=function(){
      var i=Math.round(w.scrollLeft/slideW());
      var l=$('sharr-l'),r=$('sharr-r');if(!l||!r)return;
      l.style.display=i>0?'flex':'none';
      r.style.display=i<list.length-1?'flex':'none';
    };
    /* smooth scrollBy еңЁ scroll-snap е®№еҷЁжңғиў«еҗғжҺүпјҲеҜҰжё¬дёҚеӢ•пјүвҶ’ rAF жүӢеӢ•ж»‘пјҢзөҗе°ҫ snap иҮӘе·ұеҗёжӯЈ */
    var glide=function(dx){
      var from=w.scrollLeft,t0=null;
      var step=function(ts){
        if(t0==null)t0=ts;
        var p=Math.min(1,(ts-t0)/260);p=1-Math.pow(1-p,3);
        w.scrollLeft=from+dx*p;
        if(p<1)requestAnimationFrame(step);
      };

    };

    $('sharr-r').addEventListener('click',function(){glide(slideW());});
    w.addEventListener('scroll',arrPaint,{passive:true});
    arrPaint();
  }
}
/* иҰҸж јжҳҺзҙ°еҲ—пјҲBlend жҲ– Process/Origin/Variety/Cup/Bag/RoastedпјүвҖ”вҖ”дё»еҚЎзҳҰиә«еҫҢеҸӘеңЁжҳҺзҙ°жҠҪеұңз”Ё */
function shopSpecsFor(b){
  var specs=[];
  if(b.recipe&&b.recipe.length)specs.push(['Blend',b.recipe.map(function(p){return esc(p.bean)+' '+p.pct+'%';}).join(' В· ')]);
  else if(b.process)specs.push(['Process',esc(b.process)]);
  if(b.origin)specs.push(['Origin',esc(b.origin)]);
  if(b.variety)specs.push(['Variety',esc(b.variety)]);
  if(b.comment)specs.push(['Cup',esc(b.comment)]);
  specs.push(['Bag',(b.grams||250)+'g whole beans']);
  if(b.roast_date){
    var age=daysSince(b.roast_date);
    /* е°Қе®ўдәәи¬ӣдәәи©ұпјҡ<3йҖұ agingпјҲйҶ’иұҶдёӯпјүгҖҒ3вҖ“6йҖұ readyпјҲжңҖдҪіиіһе‘іпјүгҖҒ>6йҖұ fadingпјҲеә—е…§зҙ…з¶ й»ғжҳҜзҮҹйҒӢиҰ–и§’пјү */
    var band=age<SHELF_FRESH_REST?'aging':(age<=SHELF_FRESH_PRIME?'ready':'fading');
    specs.push(['Roasted',(fmtD(b.roast_date)||'')+' вҖ” '+band]);
  }
  return specs;
}

        :'<div class="no-line" style="margin-top:12px;align-items:center">'
          +'<span class="qty"><button data-shopq="-1">вҲ’</button><span class="shopqty">1</span><button data-shopq="1">пјӢ</button></span>'
          +'<button class="act" data-addcart style="flex:1;margin-top:0">Add to cart'+(s0.price!=null?' В· $'+centAmt(s0.price):'')+'</button>'
          +'</div>')
      /* Details ж”ҫиіјиІ·еҲ—д№ӢеҫҢпјҡжө®еӢ•иіјзү©и»Ҡжўқи“ӢеҲ°зҡ„жҳҜж¬ЎиҰҒиіҮиЁҠпјҢдёҚжҳҜж¶ҲиІ»еӢ•з·ҡ */
      +'<div class="dl" data-shopdetail style="margin-top:10px;cursor:pointer;border-bottom:none"><span>Details & brew guide</span><span style="text-align:right;color:var(--muted)">вҶ’</span></div>'
      +'</div></div>';
  }).join('');
}
/* еҚЎзүҮдә’еӢ•пјҡиҰҸж јж®өйҒёгҖҒж•ёйҮҸжӯҘйҖІгҖҒеҠ е…Ҙиіјзү©и»ҠпјҲзӢҖж…ӢиЁҳеңЁеҚЎзүҮ data-*пјҢдёҚйҮҚз•«дёҚжү“ж–·ијӘж’ӯпјү */
function wireShopCards(root){
  root.querySelectorAll('.shopc').forEach(function(card){
    function price(){return parseFloat(card.dataset.price)||0;}
    function qty(){return parseInt(card.querySelector('.shopqty')?card.querySelector('.shopqty').textContent:'1',10)||1;}
    function paintBtn(){
      var b=card.querySelector('[data-addcart]');if(!b)return;
      var p=price()*qty();
      b.textContent='Add to cart'+(p?' В· $'+centAmt(p):'');
    }
    card.querySelectorAll('[data-sz]').forEach(function(el){el.addEventListener('click',function(){
      card.querySelectorAll('[data-sz]').forEach(function(x){x.classList.toggle('on',x===el);});
      card.dataset.vid=el.dataset.vid;card.dataset.price=el.dataset.price;card.dataset.label=el.dataset.label;
      var pp=card.querySelector('.shopprice');
      if(pp&&el.dataset.price)pp.innerHTML=shopPriceHTML(el.dataset.price,el.dataset.label,el.dataset.retail!==''?el.dataset.retail:null);
      paintBtn();
    });});
    card.querySelectorAll('[data-shopq]').forEach(function(el){el.addEventListener('click',function(){
      var q=Math.max(1,Math.min(cartMaxQty(),qty()+(+el.dataset.shopq)));
      card.querySelector('.shopqty').textContent=q;
      paintBtn();
    });});
    var add=card.querySelector('[data-addcart]');
    if(add)add.addEventListener('click',function(){
      if(!card.dataset.vid){alert('This coffee is not available right now.');return;}
      cartAdd({bean:card.dataset.bean,label:card.dataset.label,vid:card.dataset.vid,price:parseFloat(card.dataset.price)||0,qty:qty()});
      toast('Added to cart вң“');
    });
    var det=card.querySelector('[data-shopdetail]');
    if(det)det.addEventListener('click',function(){openShopDetailSheet(card.dataset.bean);});
    /* еҚЎзүҮең–зҡ„ең“й»һи·ҹи‘—ж©«ж»‘иө°гҖӮвҡ  еҲҘз”Ё rAF зҜҖжөҒвҖ”вҖ”й ҒйқўдёҚз•«еҪұж јжҷӮе®ғдёҚжңғи·‘пјҢең“й»һе°ұж°ёйҒ дёҚеӢ• */
    var slide=card.querySelector('[data-slide]');
    if(slide){
      var dots=card.querySelectorAll('.shopimgdots span'),lastI=0;
      slide.addEventListener('scroll',function(){
        var i=Math.round(slide.scrollLeft/Math.max(1,slide.clientWidth));
        if(i===lastI)return;
        lastI=i;
        dots.forEach(function(d,di){d.classList.toggle('on',di===i);});
      },{passive:true});
    }
  });
}
/* ===== зҷ»е…ҘжҠҪеұңпјҲеёіиҷҹпјқжү“й–Ӣе…¶д»–еҠҹиғҪзҡ„й‘°еҢҷпјӣз…§ classic submit зҡ„ signInWithPasswordпјҢеҸӘзҷ»е…ҘдёҚиЁ»еҶҠпјү===== */
function openSignInSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Sign in</div>'
    +'<div class="s" style="margin-top:2px">staff and account holders вҖ” unlocks your view of the app</div>'
    +'<div class="dlab">Email</div><input class="din" id="si-email" type="email" autocomplete="email" placeholder="you@example.com">'
    +'<div class="dlab">Password</div><input class="din" id="si-pass" type="password" autocomplete="current-password" placeholder="вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў">'
    +'<div class="s" id="si-msg" style="margin-top:8px"></div>'
    +'<button class="act" id="si-go">Sign in</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  async function go(){
    var email=($('si-email').value||'').trim();
    var pass=$('si-pass').value||'';
    var msg=$('si-msg');
    if(!email||!pass){msg.innerHTML='<span class="red">Enter email and password</span>';return;}
    var b=$('si-go');b.disabled=true;b.textContent='Signing inвҖҰ';
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){
      b.disabled=false;b.textContent='Sign in';
      msg.innerHTML='<span class="red">'+esc(r.error.message||'Sign in failed')+'</span>';
      return;
    }
    closeDrawer();toast('Signed in вң“');
    await boot();
  }
  $('si-go').addEventListener('click',go);
  $('si-pass').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('si-email').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* жІ’зҷ»е…Ҙпјқеә—йқўпјҡиұҶе–®зӣҙжҺҘй–Ӣй–ҖиҰӢеұұпјҲе“Ўе·Ҙеҫһеә•йғЁе°ҸйҖЈзөҗзҷ»е…Ҙпјү */
async function renderPublicMenu(){
  document.body.classList.remove('appview');
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelfвҖҰ</div>';
  SHOP_BEANS=await loadShopMenu();
  m.innerHTML='<div id="shopbody"></div>'
    +'<div class="note" style="margin-top:16px"><a href="/?fb=store" style="color:var(--accent)">Tried it? Tell us what you think вҶ’</a></div>'
    +'<button class="more" id="pm-staff">Wholesale &amp; staff sign in</button>';
  renderShopTabs();
  paintShopBody();
  var st=$('pm-staff');if(st)st.addEventListener('click',openSignInSheet);
}
/* е®ўжҲ¶зҷ»е…ҘпјқиұҶе–®еңЁдёҠгҖҒиҮӘе·ұзҡ„иЁӮе–®еңЁдёӢпјӢеҲҮе“Ўе·Ҙзҷ»е…ҘйҚөпјӣwholesale и§’иүІпјқеҗҢй–ҖжҲ¶жҸӣжү№зҷјиҸңе–®пјӢд»ҳж¬ҫжҠҪеұң */
async function renderCustomerPortal(sess){
  document.body.classList.remove('appview');
  WS_MODE=(ROLE==='wholesale');
  var nav=document.querySelector('nav');if(nav)nav.style.display='none';
  mountCartIcon();
  var m=$('main');
  m.innerHTML='<div class="empty">Loading the shelfвҖҰ</div>';
  var email=(sess&&sess.user&&sess.user.email)||'';
  var orders=[],custName='';
  var beansP=WS_MODE?loadWholesaleMenu():loadShopMenu();
  try{
    var cq=await sb.from('customers').select('id,name').ilike('email',email);
    var ids=(cq.data||[]).map(function(c){return c.id;});
    if(cq.data&&cq.data[0])custName=cq.data[0].name||'';
    if(ids.length){
      var oq=await sb.from('orders').select('order_no,status,items,total,payment_status,tracking_no,created_at,payment_link').in('customer_id',ids).neq('status','Cancelled').order('order_no',{ascending:false}).limit(20);
      orders=oq.data||[];
    }
  }catch(e){}
  SHOP_BEANS=await beansP;
  m.innerHTML='<div class="card brief"><span class="tag">'+(WS_MODE?'Wholesale':'Welcome')+'</span>'
    +'<div class="t">'+esc(custName||'Hello')+'</div>'
    +'<div class="s">'+(WS_MODE
      ?'Wholesale account'
      :('Ratio Coffee В· on the shelf today'+(email?' В· '+esc(email):'')))+'</div>'
    +'<button class="more" id="cp-fb" style="color:var(--inv-t)">Leave feedback</button></div>'
    +'<div id="shopbody"></div>'
    +(orders.length?'<div class="note" style="margin-top:16px">Your orders</div>'+orders.map(function(o,ox){
      var paid=o.payment_status==='paid';
      return '<div class="card"><span class="tag'+(o.status==='Dispatched'?'':' warn')+'">'+esc(o.status||'вҖ”')+'</span>'
        +'<div class="t">#'+String(o.order_no||'вҖ”').padStart(4,'0')+' В· '+money(o.total)+'</div>'
        +'<div class="s">'+esc(itemsLine(o)||'вҖ”')+(paid?'':' В· awaiting payment')+(o.tracking_no?' В· tracking '+esc(o.tracking_no):'')+'</div>'
        +(WS_MODE&&!paid?'<button class="more" data-wspay="'+ox+'">Payment details вҶ’</button>':'')
        +'</div>';
    }).join(''):'')
    +'<button class="more" id="cp-staff" style="margin-top:18px">Sign in with another account</button>';
  renderShopTabs();
  paintShopBody();
  m.querySelectorAll('[data-wspay]').forEach(function(b){b.addEventListener('click',function(){openWsPaySheet(orders[+b.dataset.wspay]);});});
  $('cp-fb').addEventListener('click',function(){showFbOverlay('store');});
  /* зҷ»е…Ҙ/й–Ӣ app еҫҢеҪҲдёҖж¬Ўжү№зҷјжўқж¬ҫжҸҗзӨәпјҲжҠҪеұңжІ’й–Ӣи‘—жүҚеҪҲпјҢйҒҝе…Қи“ӢжҺүеҲҘзҡ„пјү */
  if(WS_MODE&&!WS_WELCOME_SEEN){WS_WELCOME_SEEN=true;setTimeout(function(){var dr=$('drawer');if(!(dr&&dr.classList.contains('show')))openWsWelcomeSheet(custName);},500);}
  /* жӣҙй«ҳж¬Ҡйҷҗе…ҘеҸЈпјҡзҷ»еҮәйҖҷеҖӢе®ўжҲ¶ вҶ’ еҺҹең°й–Ӣзҷ»е…ҘжҠҪеұңжҸӣеёіиҷҹпјҢе…ЁзЁӢдёҚйӣўй–Ӣ /new */
  $('cp-staff').addEventListener('click',async function(){
    if(!confirm('Sign out and sign in with another account?'))return;
    try{await sb.auth.signOut();}catch(e){}
    await boot();
    openSignInSheet();
  });
}
/* дёүеұӨи·Ҝз”ұпјҡжІ’зҷ»е…ҘпјқиұҶе–®еә—йқўпјҸcustomerпјқе®ўжҲ¶й–ҖжҲ¶пјҸе“Ўе·Ҙеӣӣи§’иүІпјқж“ҚдҪңеҸ°гҖӮ
   зҷ»е…ҘгҖҒзҷ»еҮәеҫҢйғҪйҮҚе‘јеҸ«дёҖж¬ЎеҚіеҸҜжҸӣиҰ–и§’пјҲnav/chips е…Ҳеҫ©дҪҚпјҢеӣ зӮәеә—йқўиҲҮй–ҖжҲ¶жңғи—Ҹ navпјү */
async function boot(){
  /* д»ҳж¬ҫе®ҢжҲҗеӣһеә—йқўпјҡжё…иіјзү©и»ҠпјӢиҮҙи¬қпјҲSquare redirect_url её¶ ?checkout=done еӣһдҫҶпјү */
  if(/[?&]checkout=done/.test(location.search)){
    try{localStorage.setItem('r2_cart','[]');}catch(e){}
    try{history.replaceState(null,'',location.pathname);}catch(e){}
    setTimeout(function(){toast('Thanks! Your order is on its way to the roastery вҳ•');},600);
  }
  var nav=document.querySelector('nav');if(nav)nav.style.display='';
  $('shoptabs').style.display='none';
  WS_MODE=false;WS_INFO=null;WS_WELCOME_SEEN=false; /* жү№зҷјжЁЎејҸеҸӘеңЁ wholesale й–ҖжҲ¶е…§й–Ӣпјӣе“Ўе·Ҙ/еә—йқўдёҖеҫӢйӣ¶е”®и»ҠпјӣжӯЎиҝҺеҪҲзӘ—жҜҸж¬Ўзҷ»е…Ҙ/й–Ӣ app йҮҚзҪ® */
  paintCartBar();
  var g=await sb.auth.getSession();
  if(!(g&&g.data&&g.data.session)){
    await renderPublicMenu();
    return;
  }
  /* жІ’ profile жҲ–жІ’и§’иүІпјқе®ўжҲ¶пјҲй–Ӣж”ҫе®ўжҲ¶зҷ»е…ҘеүҚзҡ„е®үе…Ёй җиЁӯпјү */
  ROLE='customer';WHO='';LEAD=false;
  try{
    var p=await sb.from('profiles').select('name,role,lead').eq('id',g.data.session.user.id).single();
    if(p&&p.data){ROLE=p.data.role||'customer';WHO=p.data.name||'';LEAD=!!p.data.lead;}
  }catch(e){}
  if(myRole()==='customer'||myRole()==='wholesale'){await renderCustomerPortal(g.data.session);return;}
  view='feed';filter='all';
  await reload();
}
(async function init(){await boot();})();
</script></body></html>
