    +'<select class="din" id="ro-blend" style="padding:12px"><option value="">вҖ” pick a blend вҖ”</option>'
    +RO.blends.map(function(b){return '<option'+(RO.blendName===b.name?' selected':'')+'>'+esc(b.name)+'</option>';}).join('')
    +'</select>'
    +(bl?parts.map(function(p,pi){
        /* жҜ”дҫӢиҒҜеӢ•пјҡијёд»»дёҖжҲҗеҲҶ kg вҶ’ е…¶д»–жҲҗеҲҶиҲҮзёҪйҮҸиҮӘеӢ•еҸҚжҺЁпјҲжӯЈиҰҸеҢ– pct/blendTotal йҳІжҜ”дҫӢдёҚж»ҝ 100пјү
           жҲҗеҲҶ stock её¶ processпјҲеҗҢеҗҚеӨҡиҷ•зҗҶжі•еҸӘзңӢиҮӘе·ұзҡ„жү№пјӣиҲҠй…Қж–№жІ’иЁҳпјқеҗҚеӯ—зҙҡпјү */
        var have=blendPartPool(p.bean,(p.process!=null&&String(p.process).trim()!=='')?p.process:undefined,p.bean_id);
        return '<div style="display:flex;gap:8px;align-items:center;margin-top:6px">'
          +'<span class="s" style="flex:1">'+esc(p.pct+'% '+p.bean)+(p.process?' <span style="color:var(--muted);font-size:11px">'+esc(p.process)+'</span>':'')+'</span>'
          +'<input class="din" data-bp="'+pi+'" data-pct="'+parseFloat(p.pct)+'" data-bn="'+esc(p.bean)+'" data-bproc="'+esc(p.process||'')+'" inputmode="decimal" placeholder="kg" value="'+esc(RO.bamt[pi]!=null?String(RO.bamt[pi]):'')+'" style="width:80px;margin:0;text-align:right">'
          +'<span class="s" id="ro-bps-'+pi+'" style="flex:0 0 108px;text-align:right;'+(have<=0?'color:var(--danger)':'color:var(--muted)')+'">stock '+have+' kg</span></div>';
      }).join('')||'<div class="s" style="margin-top:6px"><span class="red">recipe has no parts вҖ” add them in Recipe</span></div>':'')
    +'<div class="dlab">Roasted out (kg) В· total вҖ” type it or any part above</div><input class="din" id="ro-bkg" inputmode="decimal" placeholder="e.g. 1.2" value="'+esc(RO.bkg)+'">';
  }
  openDrawerHTML('<div class="t" style="font-size:19px">Log roast</div>'
    +'<div class="s" style="margin-top:2px">'+(single?'add each kettle as you go В· submit once to deduct green and log all':'writes the blend batch and consumes component batches (oldest first)')+'</div>'
    +chips
    +'<div class="pm-seg"><button id="ro-m-s" class="'+(single?'on':'')+'">Single origin</button><button id="ro-m-b" class="'+(single?'':'on')+'">Blend</button></div>'
    +body
    +'<div class="dlab" style="margin-top:14px">Roast date В· whole session</div><input class="din" id="ro-date" type="date" value="'+esc(RO.date)+'">'
    +(single
      ?'<button class="act" id="ro-submit"'+(RO.batches.length?'':' disabled style="opacity:.5"')+'>'+(RO.batches.length?'Submit вҖ” log '+RO.batches.length+' roast'+(RO.batches.length>1?'s':'')+' to stock':'Submit вҖ” add a batch first')+'</button>'
      :'<button class="act" id="ro-save">Log blend batch</button>')
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">'+(single?'Close':'Cancel')+'</button>');
  /* йҮҚз•«еүҚе…ҲжҠҠе·Іжү“зҡ„еҖјж”¶еӣһ ROпјҢйҒҝе…ҚеҲҮиұҶ/еҲҮжЁЎејҸжҷӮжү“еҲ°дёҖеҚҠзҡ„еӯ—ж¶ҲеӨұ */
  function grab(){['kg','out','date','charge','fc','drop','dur','bkg'].forEach(function(k){var el=$('ro-'+k);if(el)RO[k]=el.value;});
    document.querySelectorAll('#drawer [data-bp]').forEach(function(el){RO.bamt[+el.dataset.bp]=el.value;});}
  document.querySelectorAll('#drawer [data-lot]').forEach(function(el){el.addEventListener('click',function(){
    grab();RO.mode='single';RO.beanId=el.dataset.lot;RO.kg=el.dataset.kg;paintRoastSheet();
  });});
  document.querySelectorAll('#drawer [data-blend]').forEach(function(el){el.addEventListener('click',function(){
    grab();RO.mode='blend';RO.blendName=el.dataset.blend;RO.bkg=el.dataset.bkg;paintRoastSheet();
  });});
  $('ro-m-s').addEventListener('click',function(){grab();RO.mode='single';paintRoastSheet();});
  $('ro-m-b').addEventListener('click',function(){grab();RO.mode='blend';paintRoastSheet();});
  var rbSel=$('ro-bean');if(rbSel)rbSel.addEventListener('change',function(){grab();RO.beanId=this.value;paintRoastSheet();});
  /* еӨұйҮҚзҺҮеҚіжҷӮпјҲдёҚ repaintпјҢе…ҚжҺүйҚөзӣӨз„Ұй»һпјүпјҡжү“з”ҹиұҶ/зҶҹиұҶз•¶дёӢжӣҙж–°зҷҫеҲҶжҜ” */
  function updLoss(){var el=$('ro-loss');if(!el)return;var kel=$('ro-kg'),oel=$('ro-out');var lp=roastLossPct(kel?kel.value:RO.kg,oel?oel.value:RO.out);el.textContent=lp!=null?'вҲ’'+lp+'%':'вҖ”';}
  var kgEl=$('ro-kg');if(kgEl)kgEl.addEventListener('input',updLoss);
  var outEl=$('ro-out');if(outEl)outEl.addEventListener('input',updLoss);
  var blSel=$('ro-blend');if(blSel)blSel.addEventListener('change',function(){grab();RO.blendName=this.value;RO.bamt={};RO.bkg='';paintRoastSheet();});
  /* жҜ”дҫӢиҒҜеӢ•пјҡblTotпјқй…Қж–№жҜ”дҫӢзёҪе’ҢпјҲжӯЈиҰҸеҢ–еҲҶжҜҚпјүпјӣдёҚйҮҚз№ӘжҠҪеұңпјҲжңғжҺүйҚөзӣӨз„Ұй»һпјүпјҢзӣҙжҺҘж”№еҲҘзҡ„жЎҶ */
  var blTot=0;document.querySelectorAll('#drawer [data-bp]').forEach(function(el){blTot+=parseFloat(el.dataset.pct)||0;});
  function roStockHint(el,val){
    var pi=el.dataset.bp,have=blendPartPool(el.dataset.bn,el.dataset.bproc?el.dataset.bproc:undefined),sp=$('ro-bps-'+pi);if(!sp)return;
    var need=parseFloat(val)||0;
    if(need>have+0.0001){sp.style.color='var(--danger)';sp.textContent='short '+(Math.round((need-have)*100)/100)+' В· stock '+have;}
    else{sp.style.color=have<=0?'var(--danger)':'var(--muted)';sp.textContent='stock '+have+' kg';}
  }
  function roSpread(total,skipPi){ /* зёҪйҮҸ вҶ’ еҗ„жҲҗеҲҶз…§жҜ”дҫӢж”ӨпјҲи·ійҒҺжӯЈеңЁжү“еӯ—зҡ„йӮЈж јпјү */
    document.querySelectorAll('#drawer [data-bp]').forEach(function(el){
      var share=blTot>0?((parseFloat(el.dataset.pct)||0)/blTot):0;
      var v=total>0?String(Math.round(total*share*1000)/1000):'';
      if(el.dataset.bp!==skipPi){el.value=v;RO.bamt[+el.dataset.bp]=v;}
      roStockHint(el,el.dataset.bp===skipPi?el.value:v);
    });
  }
  document.querySelectorAll('#drawer [data-bp]').forEach(function(el){el.addEventListener('input',function(){
    RO.bamt[+el.dataset.bp]=el.value;
    var amt=parseFloat(el.value),share=blTot>0?((parseFloat(el.dataset.pct)||0)/blTot):0;
    if(isNaN(amt)||share<=0){roStockHint(el,el.value);return;}
    var total=Math.round(amt/share*1000)/1000;
    var bk=$('ro-bkg');if(bk){bk.value=total>0?String(total):'';RO.bkg=bk.value;}
    roSpread(total,el.dataset.bp);
  });});
  var bkEl=$('ro-bkg');
  if(bkEl&&!single)bkEl.addEventListener('input',function(){RO.bkg=bkEl.value;roSpread(parseFloat(bkEl.value)||0,null);});
  document.querySelectorAll('#drawer [data-bp]').forEach(function(el){roStockHint(el,el.value);});
  var lt=$('ro-log-t');if(lt)lt.addEventListener('click',function(){grab();RO.logOpen=!RO.logOpen;paintRoastSheet();});
  var addB=$('ro-add');if(addB)addB.addEventListener('click',function(){grab();roastAddBatch();});
  var subB=$('ro-submit');if(subB)subB.addEventListener('click',function(){grab();submitRoastSession();});
  var svB=$('ro-save');if(svB)svB.addEventListener('click',function(){grab();saveBlendBatch();});
  document.querySelectorAll('#drawer [data-editbatch]').forEach(function(el){el.addEventListener('click',function(){grab();roastEditBatch(+el.dataset.editbatch);});});
  document.querySelectorAll('#drawer [data-delbatch]').forEach(function(el){el.addEventListener('click',function(){roastDelBatch(+el.dataset.delbatch);});});
  $('d-cl').addEventListener('click',closeDrawer);
}
/* жӢјй…Қжү№ж¬ЎеӯҳжӘ”пјҲз…§ classic addCoffeeSubmit blend и·Ҝеҫ‘пјҡеҝ«з…§й…Қж–№вҶ’insertвҶ’FIFO жүЈжҲҗеҲҶпјү*/
async function saveBlendBatch(){
  var bl=RO.blends.find(function(b){return b.name===RO.blendName;});
  if(!bl){toast('Pick a blend first');return;}
  var bkg=String(RO.bkg).trim()===''?0:parseFloat(RO.bkg);
  if(isNaN(bkg)||bkg<0){toast('Roasted kg must be a number');return;}
  var date=RO.date||todayStr();
  var isDup=(DB.roasts||[]).some(function(r){return (r.roast_date||'')===date&&String(r.bean_name||'').trim().toLowerCase()===String(bl.name).trim().toLowerCase();});
  if(isDup&&!confirm('"'+bl.name+'" already has a batch dated '+date+'. Add another?'))return;
  var parts=(bl.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;})

/* FIFO ж¶ҲиҖ—жҲҗеҲҶжү№ж¬ЎпјҲз…§ classic consumeBlendComponentsпјүвҖ”вҖ”еӣһеӮідёҚеӨ жүЈзҡ„жё…е–® */
async function consumeBlendParts(parts,totalKg){
  var short=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var need=totalKg*(parseFloat(p.pct)||0)/100;
    if(!(need>0))continue;
    var key=String(p.bean||'').trim().toLowerCase();
    /* ID е„Әе…ҲпјҲ2026-07-15пјүпјҡpart.bean_id иҲҮ roast.bean_id е…©йӮҠйғҪжңүжҜ” IDпјӣеҗҰеүҮеҗҚеӯ—пјӢиҷ•зҗҶжі•пјҲиҲҠй…Қж–№/иҲҠжү№пјү */
    var pProc=(p.process!=null&&String(p.process).trim()!=='')?p.process:undefined;
    var pid=(p.bean_id!=null&&String(p.bean_id).trim()!=='')?String(p.bean_id):'';
    var pool=(DB.roasts||[]).filter(function(r){
      if(r.kind==='blend'||!(Number(r.remaining_kg)>0))return false;
      return (pid&&r.bean_id)?(String(r.bean_id)===pid):(String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,pProc));
    }).sort(function(a,b){
      /* йҷҚзҙҡиұҶе„Әе…ҲйҖІй…Қж–№пјҲ2026-07-13 иҖҒй—Ҷе®ҡиӘҝпјҡdowngradeпјқй…Қж–№иұҶйҰ–йҒёпјүпјӣеҗҢзҙҡе…§з…§ roast_date иҲҠвҶ’ж–° FIFO */
      var da=qcState(a)==='downgrade'?0:1,db=qcState(b)==='downgrade'?0:1;
      if(da!==db)return da-db;
      return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;
    });
    var left=need;
    for(var j=0;j<pool.length&&left>0.0001;j++){
      var b=pool[j];
      var take=Math.min(Number(b.remaining_kg)||0,left);
      var nr=Math.max(0,Math.round(((Number(b.remaining_kg)||0)-take)*1000)/1000);
      try{
        var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',b.id);
        if(u.error)continue;
        b.remaining_kg=nr;left-=take;
      }catch(e){}
    }
    if(left>0.0001)short.push(p.bean+(p.process?' ('+p.process+')':'')+': short '+(Math.round(left*100)/100)+' kg (needed '+(Math.round(need*100)/100)+' kg)');
  }
  return short;
}

     жүӢжҢҮдёҖеӢ•зҖҸиҰҪеҷЁе°ұз•¶жҚІеӢ•гҖҒpointercancel ж®әжҺүжӢ–жӣіпјҲд»Ҡж—ҘжөҒеҚЎ .card жңү pan-y жүҖд»ҘеҘҪж»‘пјүгҖӮ
     в‘ touch-action:pan-yпјқзёұжҚІз…§еёёгҖҒж©«ж»‘жӯё JS в‘ЎiOS Safari е°ҚжҚІеӢ•е®№еҷЁе…§дёҚдёҖе®ҡиІ·еёіпјҲеҗҢ attachDrawerDrag
     зҡ„еқ‘пјүвҖ”вҖ”йҺ–е®ҡж©«ж»‘еҫҢз”Ёйқһ passive touchmove preventDefault зЎ¬ж“ӢжҚІеӢ•пјҢи®“ pointermove дёҖи·Ҝжҙ»и‘— */
  el.style.touchAction='pan-y';
  el.addEventListener('touchmove',function(e){if(locked)e.preventDefault();},{passive:false});
  function reset(anim){el.style.transition=anim?'transform .2s':'none';el.style.transform='';el.style.background='';x0=null;dx=0;locked=false;dead=false;}
  el.addEventListener('pointerdown',function(e){
    if(e.target.closest('button'))return;
    x0=e.clientX;y0=e.clientY;dx=0;locked=false;dead=false;
    try{el.setPointerCapture(e.pointerId);}catch(err){}
    el.style.transition='none';
  });
  el.addEventListener('pointermove',function(e){
    if(x0==null||dead)return;
    dx=e.clientX-x0;var dy=e.clientY-y0;
    if(!locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){dead=true;return;} /* зёұеҗ‘пјқи®“жҠҪеұңжҚІеӢ• */
      if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy)*1.3)locked=true; /* ж©«ж»‘йҺ–е®ҡж”ҫеҜ¬пјҲ18px/1.6вҶ’12px/1.3пјүпјқжӣҙеҝ«жҺҘжүӢ */
      else return;
    }
    el.style.transform='translateX('+Math.max(-130,Math.min(130,dx*0.9))+'px)';
    el.style.background=dx>el.offsetWidth*0.3?'color-mix(in srgb,var(--green) 22%,transparent)'
      :dx<-el.offsetWidth*0.3?'color-mix(in srgb,var(--danger) 22%,transparent)':'';
  });
  el.addEventListener('pointercancel',function(){reset(true);});
  el.addEventListener('pointerup',function(){
    if(x0==null)return;
    if(Math.abs(dx)>10)_drag=Date.now();
    var w=el.offsetWidth;
    if(locked&&dx>w*0.35){reset(false);qcVerdict(q.r,'pass',null,'qc:'+q.r.id,q.s);return;}
    if(locked&&dx<-w*0.35){reset(false);qcVerdict(q.r,'downgrade',null,'qc:'+q.r.id,q.s);return;}
    reset(true);
  });
}
/* ===== QC е·ҘдҪңеҸ°пјҲ2026-07-12 ж”№жҲҗжҠҪеұң popupпјҢжӢҝжҺүеә•йғЁеӣәе®ҡеҲӨе®ҡеҸ°пјү=====
   еҲҶе–®е“Ғ/жӢјй…ҚеҲҶй ҒпјҲQCSEGпјүпјӣIn hand еҫ…жқҜжё¬пјҲеҗҢж—ҘеҗҲдҪөпјҢй»һй–Ӣ CupпјүпјӢеҫ…еҲӨе®ҡжё…е–®пјҲй»һжҹҗзӯҶе°ұең°еұ•й–ӢеҲӨе®ҡеҚҖпјүгҖӮ
   иҲҠ renderQCпјҲж•ҙй ҒпјӢ.deck bannerпјүйҖҖеҪ№вҖ”вҖ”qcnav()пјқзӣёе®№еҲҘеҗҚпјҢе…ЁйғЁе°Һеҗ‘ openQCSheet жҠҪеұң */
var QCSEG='single';
function qcnav(){openQCSheet();}
function openQCSheet(){
  var isBl=function(k){return k==='blend';};
  var blend=QCSEG==='blend';
  var tocupAll=toCupList();
  var tocup=tocupAll.filter(function(r){return isBl(r.kind)===blend;});
  var queue=QCQ.filter(function(q){return isBl(q.r.kind)===blend;});
  var nS=tocupAll.filter(function(r){return !isBl(r.kind);}).length+QCQ.filter(function(q){return !isBl(q.r.kind);}).length;
  var nB=tocupAll.filter(function(r){return isBl(r.kind);}).length+QCQ.filter(function(q){return isBl(q.r.kind);}).length;
  var segHTML='<div class="pm-seg" style="margin-top:10px"><button id="qc-seg-s" class="'+(blend?'':'on')+'">Single origins'+(nS?' В· '+nS:'')+'</button>'
    +'<button id="qc-seg-b" class="'+(blend?'on':'')+'">Blends'+(nB?' В· '+nB:'')+'</button></div>';
  /* In handпјҲеҫ…жқҜжё¬пјүпјҡеҗҢдёҖж”ҜиұҶеҗҢдёҖеӨ©зғҳзҡ„е№ҫйҚӢеҗҲдҪөдёҖеҲ—пјҢй»һ вҶ’ й–Ӣ Cup жҠҪеұң */
  var cupGroups=[],cgi={};
  tocup.forEach(function(r){
    var b=(DB.beans||[]).find(function(x){return String(x.id)===String(r.bean_id);});
    var proc=r.process||(b&&b.process)||'';
    var k=String(r.bean_name||'').trim().toLowerCase()+'|'+String(proc).trim().toLowerCase()+'|'+String(r.roast_date||'');
    if(cgi[k]==null){cgi[k]=cupGroups.length;cupGroups.push({first:r,name:r.bean_name,proc:proc,date:r.roast_date,green:0,n:0,rows:[]});}
    var g=cupGroups[cgi[k]];g.n++;g.green+=Number(r.green_kg)||0;g.rows.push(r);
  });
  var cupSec=cupGroups.length
    ?'<div class="dlab">In hand вҖ” tap to cup</div>'
      +cupGroups.map(function(g){
        /* йӮ„жІ’ cup зҡ„йҶ’зӣ®пјҡNew жіЎжіЎпјӢж·Ў accent еә• highlightпјҲеҗҢиҲҠж•ҙй Ғ qc-newпјү */
        return '<div class="hit" data-tocup="'+esc(g.first.id)+'" style="cursor:pointer;border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,transparent)"><span style="min-width:0"><div class="t">'+esc(g.name||'вҖ”')+(g.proc?' <span style="color:var(--muted);font-weight:400;font-size:12.5px">'+esc(g.proc)+'</span>':'')+' <span class="qc-new">New</span></div><div class="s">'+(rNos(g.rows)?rNos(g.rows)+' В· ':'')+(g.date?'roasted '+fmtD(g.date):'roast batch')+(g.n>1?' В· '+g.n+' roasts':'')+(g.green>0?' В· '+(Math.round(g.green*10)/10)+' kg green':'')+'</div></span><span class="k">cup</span></div>';
      }).join('')
    :'';
  /* еҫ…еҲӨе®ҡпјҲQCQпјүпјҡй»һжҹҗзӯҶ вҶ’ е°ұең°еұ•й–ӢеҲӨе®ҡеҚҖпјҲView/Editгғ»Stockгғ»Roast Dateгғ»Lockгғ»Pass/Downgradeпјү */
  if(selQC!=null&&!queue.find(function(q){return q.r.id===selQC;}))selQC=null;
  var qSec='';
  if(queue.length){
    qSec='<div class="dlab">To judge вҖ” tap to open'+(canWrite()?' В· swipe вҶ’ pass В· вҶҗ downgrade':'')+'</div>'
      +queue.map(function(q){
        var f=(q.s.features||[]).slice(0,3).join(', ');
        var op=q.r.id===selQC;
        var head='<div class="hit" data-q="'+esc(q.r.id)+'" style="cursor:pointer'+(op?';border-color:var(--accent);border-bottom-left-radius:0;border-bottom-right-radius:0':'')+'"><span style="min-width:0"><div class="t">'+esc(q.s.sample_id||'вҖ”')+(q.s.process?' <span style="color:var(--muted);font-weight:400;font-size:12.5px">'+esc(q.s.process)+'</span>':'')+'</div><div class="s">'+(rNo(q.r)?rNo(q.r)+' В· ':'')+(q.r.roast_date?'roasted '+fmtD(q.r.roast_date)+' В· ':'')+esc(f||'')+'</div></span><span class="k">'+(op?'в–ҫ':'judge вҖә')+'</span></div>';
        if(!op)return head;
        var body='<div style="border:1px solid var(--accent);border-top:none;border-radius:0 0 12px 12px;padding:11px 13px;margin:-8px 0 8px">'
          +'<div style="display:flex;gap:7px">'
          +'<button class="chip" data-qact="recup" style="flex:1;margin:0">View/Edit</button>'
          +'<button class="chip" data-qact="stock" style="flex:1;margin:0">Edit/Add Stock</button>'
          +'<button class="chip" data-qact="date" style="flex:1;margin:0">Roast Date</button></div>'
          +(q.s.flavour_locked
            ?'<div style="text-align:center;font-size:12.5px;color:var(--muted);margin:9px 0 4px">вҳ… this batch is the selling version</div>'
            :'<div style="text-align:center;font-size:12.5px;color:var(--muted);margin:9px 0 4px">pass = OK to sell В· вҳ… is added when you list it on Square</div>')
          +'<div style="display:flex;gap:8px;margin-top:6px"><button class="act" data-qact="pass" style="flex:1;margin:0">Pass</button><button class="act" data-qact="down" style="flex:1;margin:0;background:var(--danger)">Downgrade</button></div>'
          +'</div>';
        return head+body;
      }).join('');
  }
  openDrawerHTML('<div class="t" style="font-size:19px">QC</div>'
    +'<div class="s" style="margin-top:2px">cup and judge В· '+(QCQ.length?QCQ.length+' waiting':(tocupAll.length?tocupAll.length+' to cup':'all judged'))+'</div>'
    +segHTML
    +cupSec+qSec
    +((!cupGroups.length&&!queue.length)?'<div class="empty" style="margin-top:14px">'+(blend?'No blends in QC':'No single origins in QC')+'</div>':'')
    +'<div style="display:flex;gap:8px;margin-top:12px"><button class="chip" id="qc-add" style="flex:1;margin:0">пјӢ Add a past batch</button><button class="chip" id="qc-shelf" style="flex:1;margin:0">Shelf В· on sale now</button></div>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  var d=$('drawer');
  var ss=$('qc-seg-s');if(ss)ss.addEventListener('click',function(){if(QCSEG!=='single'){QCSEG='single';selQC=null;openQCSheet();}});
  var sbb=$('qc-seg-b');if(sbb)sbb.addEventListener('click',function(){if(QCSEG!=='blend'){QCSEG='blend';selQC=null;openQCSheet();}});
  var ad=$('qc-add');if(ad)ad.addEventListener('click',openBackfillSheet);
  var sh=$('qc-shelf');if(sh)sh.addEventListener('click',openRetailSheet);
  $('d-cl').addEventListener('click',closeDrawer);
  d.querySelectorAll('[data-tocup]').forEach(function(el){el.addEventListener('click',function(){
    var r=(DB.roasts||[]).find(function(x){return String(x.id)===String(el.dataset.tocup);});
    if(r)openCupSheet({ref:r});
  });});
  d.querySelectorAll('[data-q]').forEach(function(el){
    var qq=queue.find(function(x){return String(x.r.id)===el.dataset.q;});
    if(qq)attachQcSwipe(el,qq); /* еҸіж»‘пјқеҝ«йҖҹ pass */
    el.addEventListener('click',function(){
      if(Date.now()-_drag<300)return; /* еүӣж»‘е®ҢеҲҘиӘӨи§ёеұ•й–Ӣ */
      selQC=(selQC===el.dataset.q)?null:el.dataset.q;openQCSheet();
    });
  });
  var cq=queue.find(function(x){return String(x.r.id)===String(selQC);});
  if(cq)d.querySelectorAll('[data-qact]').forEach(function(el){el.addEventListener('click',function(){
    var a=el.dataset.qact;
    if(a==='recup')return openRecupSheet(cq);
    if(a==='stock')return openQcStockSheet(cq);
    if(a==='date')return openRoastDateSheet(cq);
    if(a==='pass')return qcVerdict(cq.r,'pass',null,'qc:'+cq.r.id,cq.s);
    if(a==='down')return qcVerdict(cq.r,'downgrade',null,'qc:'+cq.r.id,cq.s);
  });});
}
/* QC иЈңеә«еӯҳпјҲиҖҒй—Ҷй»һеҗҚпјҢеҸ–д»Ј Menu Card йҲ•пјүпјҡjudging з•¶дёӢе°ҚйҖҷжү№еҠ еә«еӯҳйҮҸпјӢеё¶ж—ҘжңҹвҖ”вҖ”
   иЈңжјҸз¶Ід№Ӣйӯҡзҡ„й ҶжүӢи·ҜгҖӮеҸӘ update roastsпјҲremaining_kg/roasted_kg/roast_dateпјүпјҢ
   дёҚеӢ• beansгҖҒдёҚеҜ« stock_movesпјҲеҗҢ Add a past batch иӘһж„ҸпјүгҖӮжүЈиЎҖи«ӢеҺ» Coffee зЈҒиІјзҡ„гҖҢвҲ’гҖҚгҖӮ */
function openQcStockSheet(q){
  var cur=Number(q.r.remaining_kg)||0;
  openDrawerHTML('<div class="t" style="font-size:19px">Edit/Add Stock В· '+esc(q.s.sample_id||q.r.bean_name||'вҖ”')+(rNo(q.r)?' <span style="color:var(--muted);font-weight:400;font-size:13px">'+rNo(q.r)+'</span>':'')+'</div>'
    +'<div class="s" style="margin-top:2px">adds roasted stock to this batch вҖ” green stock is not touched</div>'
    +'<div class="dl" style="margin-top:12px"><span>Batch stock now</span><span><b>'+cur+' kg</b>'+(q.r.roasted_kg!=null?' <span style="color:var(--muted)">В· roasted '+(Number(q.r.roasted_kg)||0)+' kg</span>':'')+'</span></div>'
    +'<div class="dlab">Add to stock (kg)</div><input class="din" id="qs-add" inputmode="decimal" placeholder="e.g. 2.5">'
    +'<div class="s" id="qs-new" style="margin-top:6px;text-align:right">= new total '+cur+' kg</div>'
    +'<div class="dlab">Roast date</div><input class="din" id="qs-date" type="date" value="'+esc(q.r.roast_date||'')+'">'
    +'<div class="s" style="margin-top:6px">date keeps this batch separate from other roasts of the same coffee</div>'
    +'<button class="act" id="qs-save">Save</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  $('qs-add').addEventListener('input',function(){
    var a=parseFloat(this.value)||0;
    $('qs-new').textContent='= new total '+(Math.round((cur+a)*1000)/1000)+' kg';
  });
  $('qs-save').addEventListener('click',async function(){
    var raw=String($('qs-add').value||'').trim();
    var add=raw===''?0:parseFloat(raw);
    if(isNaN(add)||add<0){toast('Add must be 0 or more вҖ” to deduct use Coffee вҶ’ вҲ’');return;}
    var date=$('qs-date').value||q.r.roast_date||null;
    if(add===0&&date===(q.r.roast_date||null)){toast('Nothing to change');return;}
    var btn=this;btn.disabled=true;btn.textContent='SavingвҖҰ';
    try{
      var upd={remaining_kg:Math.round((cur+add)*1000)/1000};
      if(add>0)upd.roasted_kg=Math.round(((Number(q.r.roasted_kg)||0)+add)*1000)/1000;
      if(date)upd.roast_date=date;
      var u=await sb.from('roasts').update(upd).eq('id',q.r.id);
      if(u.error)throw new Error(u.error.message);
      /* ж—Ҙжңҹжңүж”№вҶ’жқҜжё¬зҙҖйҢ„и·ҹи‘—иө°пјҲеҗҢ openRoastDateSheetпјҡmatchRoast йқ ж—Ҙжңҹе„Әе…Ҳй…Қе°Қпјү */
      if(date&&date!==q.r.roast_date&&q.s.id&&q.s.roast_date){try{await sb.from('samples').update({roast_date:date}).eq('id',q.s.id);q.s.roast_date=date;}catch(e){}}
      Object.assign(q.r,upd);
      logAct('added stock',q.r.bean_name||q.s.sample_id,(add>0?'+'+add+' kg':'date only'));
      toast(add>0?'Stock +'+add+' kg вң“':'Date updated вң“');
      buildItems();openQCSheet(); /* еӣһ QC жҠҪеұң */
    }catch(e){
      btn.disabled=false;btn.textContent='Save';
      alert('Save failed: '+(e&&e.message||e));
    }
  });
  $('d-cl').addEventListener('click',openQCSheet);
}
/* з·ЁијҜзғҳиұҶж—ҘжңҹпјҲиҖҒй—Ҷй»һеҗҚпјүпјҡдҝ®жү№ж¬Ўж—ҘжңҹвҖ”вҖ”ж–°й®®еәҰгҖҒиіҮиЁҠеҚЎгҖҒиІЁжһ¶жҺ’еәҸе…Ёи·ҹи‘—иө° */
function openRoastDateSheet(q){
  openDrawerHTML('<div class="t" style="font-size:19px">Roast date В· '+esc(q.s.sample_id||'вҖ”')+'</div>'
    +'<div class="s" style="margin-top:2px">fixes this batch вҖ” freshness, cards and shelf order follow</div>'
    +'<div class="dlab">Roast date</div><input class="din" id="rd-date" type="date" value="'+esc(q.r.roast_date||'')+'">'
    +'<button class="act" id="rd-save">Save date</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');

    var btn=this;btn.disabled=true;btn.textContent='SavingвҖҰ';
    try{
      var u=await sb.from('roasts').update({roast_date:v}).eq('id',q.r.id);
      if(u.error)throw new Error(u.error.message);
      /* жқҜжё¬зҙҖйҢ„иӢҘжңүжҺӣж—Ҙжңҹе°ұи·ҹи‘—ж”№пјҲmatchRoast йқ ж—Ҙжңҹе„Әе…Ҳй…Қе°Қпјү */
      if(q.s.id&&q.s.roast_date){try{await sb.from('samples').update({roast_date:v}).eq('id',q.s.id);}catch(e){}}
      q.r.roast_date=v;if(q.s.roast_date)q.s.roast_date=v;
      toast('Roast date updated вң“');
      buildItems();openQCSheet(); /* еӣһ QC жҠҪеұң */
    }catch(e){
      btn.disabled=false;btn.textContent='Save date';
      alert('Save failed: '+(e&&e.message||e));
    }
  });
  $('d-cl').addEventListener('click',openQCSheet);
}
/* QC иЈңиұҶпјҡиҲҠзғҳиұҶиЈңзҷ»пјҲroasts иЈңдёҖзӯҶпјүвҖ”вҖ”жңүжқҜжё¬зҙҖйҢ„зӣҙжҺҘйҖІ QC дҪҮеҲ—пјҢжІ’жңүе°ұй•· Cup еҚЎгҖӮ
   2026-07-12пјҡеҠ  Single origin / Blend tabпјҢдёҖеҖӢе…ҘеҸЈиЈңжүҖжңүжјҸз¶Ід№ӢйӯҡгҖӮй—ңйҚөе·®з•°вҖ”вҖ”
   Blend еҲҶй Ғзҙ”иЈңдёҖзӯҶжӢјй…ҚзҶҹиұҶпјҲkind='blend' йҖІжӢјй…ҚиІЁжһ¶пјүпјҢ**дёҚеғҸ Log roast Blend жүЈжҲҗеҲҶ**пјҢ
   жүҖд»ҘиЈңжӯ·еҸІдёҚзў°д»»дҪ•е…¶д»–еә«еӯҳпјҲз”ҹиұҶгҖҒжҲҗеҲҶе–®е“ҒйғҪдёҚеӢ•пјүгҖҒиЈңзҡ„й ҶеәҸдёҚз”Ёи¬ӣз©¶гҖӮ */
var BF={mode:'single',beanId:'',name:'',blendName:'',date:'',out:''};
function openBackfillSheet(){

          +'</select>'
        :'<div class="sempty">No blends yet вҖ” build the recipe first in Tools вҶ’ Recipe</div>');
  }
  openDrawerHTML('<div class="t" style="font-size:19px">Add a past batch</div>'
    +'<div class="s" style="margin-top:2px">'+(single?'for roasts done before logging existed вҖ” green stock is not touched':'a past blend batch вҖ” nothing else is touched')+'</div>'

/* еҚ°еҲ·еҚЎйӣ·йҒ”пјҡhtml2canvas **дёҚз•«иЎҢе…§ SVG**пјҲиҖҒй—Ҷзңҹж©ҹ PDF йӣ·йҒ”ж•ҙеҖӢж¶ҲеӨұзҡ„з ҙең–ж №еӣ пјү

/* opts.grid/opts.labelпјқз¶Іж јз·ҡиҲҮжЁҷзұӨиүІпјҲж·ұиүІз…§зүҮеә•иҰҒзҝ»дә®пјҢдёҚзөҰе°ұз”ЁеҺҹжң¬зҡ„ж·әеә•й…ҚиүІпјү */
function printRadarPNG(sc,color,opts){
  opts=opts||{};
  var S=4;
  var cv=document.createElement('canvas');cv.width=412*S;cv.height=246*S;
  var x=cv.getContext('2d');x.scale(S,S);x.translate(62,-2); /* е°ҚйҪҠе®ҡзЁҝ viewBox -62 2 412 246пјҲеӨ§еҜ«жЁҷзұӨиҰҒеҜ¬йӮҠпјү */
  var K=[['fragrance','AROMA'],['acidity','ACIDITY'],['sweetness','SWEETNESS'],['body','BODY'],['aftertaste','AFTERTASTE']];
  var cx=150,cy=128,R=88;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  x.lineWidth=1;x.strokeStyle=opts.grid||'#D9D2CB';
  [1,2,3].forEach(function(l){x.beginPath();for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);if(i)x.lineTo(q[0],q[1]);else x.moveTo(q[0],q[1]);}x.stroke();});
  for(var i=0;i<5;i++){var q=pt(i,R);x.beginPath();x.moveTo(cx,cy);x.lineTo(q[0],q[1]);x.stroke();}
  var pts=K.map(function(k,i){return pt(i,R*(Number(sc[k[0]])||0)/3);});
  x.beginPath();pts.forEach(function(p,i){if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);});x.closePath();
  x.globalAlpha=.14;x.fillStyle=color;x.fill();x.globalAlpha=1;
  x.lineWidth=2.5;x.strokeStyle=color;x.lineJoin='round';x.stroke();
  x.fillStyle=color;
  pts.forEach(function(p){x.beginPath();x.arc(p[0],p[1],4.5,0,6.3);x.fill();});
  x.fillStyle=opts.label||'#8A837C';x.font='600 13.5px Inter, sans-serif';
  try{x.letterSpacing='1px';}catch(e){}
  K.forEach(function(k,i){
    var q=pt(i,R+21);
    x.textAlign=q[0]<cx-4?'right':(q[0]>cx+4?'left':'center');
    x.fillText(k[1],q[0],q[1]+4);
  });
  return cv.toDataURL('image/png');
}

/* жӢјй…ҚжҲҗеҲҶзҡ„иә«дё–пјҡжӢҝй…Қж–№иЈЎзҡ„жҲҗеҲҶиұҶеҺ» green stockпјҲDB.beansпјҢиЁҳжҶ¶й«”зҸҫжҲҗзҡ„пјүе°ҚгҖӮ
   вҡ  иҷ•зҗҶжі•жҳҜж¶Ҳжӯ§зҡ„й—ңйҚөпјҢдёҚиғҪеҸӘжҜ”еҗҚеӯ—пјҡ
     В· Finca Milan з”ҹиұҶиЎЁжңү 6 ж”ҜеҗҢеҗҚпјҲдёҚеҗҢ culturingпјү
     В· Hakuna Matata е…©ж”ҜвҖ”вҖ”Honey жҳҜ SidraгҖҒWashed жҳҜ TypicaпјҢжҜ”йҢҜе“ҒзЁ®е°ұеҜ«йҢҜ
   вҡ  й…Қж–№еҜ«жіӣзЁұгҖҒз”ҹиұҶеё¶зүҲжң¬иҷҹпјҲй…Қж–№ "Danche" вҶ” з”ҹиұҶ "Danche v1/v2/v3"пјүпјҢ
     жүҖд»ҘзІҫзўәжҜ”е°ҚиҗҪз©әжҷӮеҶҚйҖҖдёҖжӯҘз”ЁгҖҢеүҚз¶ҙпјӢз©әзҷҪгҖҚжҜ”пјҢд»Қд»Ҙиҷ•зҗҶжі•жҢ‘е°Қзҡ„йӮЈж”Ҝ */
function greenForPart(p){
  /* ID е„Әе…ҲпјҲ2026-07-15пјүпјҡй…Қж–№жҲҗеҲҶеё¶ bean_id вҶ’ иЁҳжҶ¶й«”зІҫжә–е‘ҪдёӯйӮЈж”Ҝз”ҹиұҶпјӣиҲҠй…Қж–№жІ’иЁҳжүҚйҖҖеҗҚеӯ—пјӢиҷ•зҗҶжі•ж¶Ҳжӯ§ */
  if(p&&p.bean_id!=null&&String(p.bean_id).trim()!==''){
    var byId=(DB.beans||[]).find(function(b){return String(b.id)===String(p.bean_id);});
    if(byId)return byId;
  }
  var nm=String(p.bean||'').trim().toLowerCase();
  if(!nm)return null;
  var proc=String(p.process||'').trim().toLowerCase();
  var all=DB.beans||[];
  function pick(pool){
    if(!pool.length)return null;
    return (proc&&pool.filter(function(b){return String(b.process||'').trim().toLowerCase()===proc;})[0])||pool[0];
  }
  var exact=all.filter(function(b){return String(b.name||'').trim().toLowerCase()===nm;});
  return pick(exact)||pick(all.filter(function(b){return String(b.name||'').trim().toLowerCase().indexOf(nm+' ')===0;}));
}
/* opts.omitпјқиҰҒз•ҘйҒҺзҡ„еҲ—еҗҚгҖӮе°ҚеӨ–зҙ жқҗпјҲж‘әеҚЎпјҸзӨҫзҫӨең–пјҸSquare е•Ҷе“Ғең–пјүдёҚеҚ° Roasted иҲҮ Harvestпјҡ
   зғҳз„ҷж—ҘдёҖеҚ°е°ұйҒҺжңҹпјҢз”ўеӯЈе°Қе®ўдәәд№ҹдёҚжҳҜйҮҚй»һпјӣеә—е…§зҡ„ Retail Info жҠҪеұңз…§жЁЈиҰҒзңӢеҫ—еҲ° */
async function beanInfoRows(full,opts){
  opts=opts||{};
  var omit={};(opts.omit||[]).forEach(function(k){omit[k]=1;});
  var nm=String(full.sample_id||'').trim();
  var info=[];
  function add(k,v){if(!omit[k]&&v!=null&&v!=='')info.push([k,v]);}
  /* жӢјй…ҚиұҶпјҡbeans иЎЁжІ’жңүеҗҢеҗҚз”ҹиұҶпјҢиә«дё–пјқblends й…Қж–№пјҲеҲӨж–·ж–№ејҸеҗҢ shelf жҠҪеұң/cardDataForпјҡеҗҚеӯ—е‘Ҫдёӯ blends е°ұжҳҜжӢјй…ҚпјүгҖӮ
     жҳҺзҙ°ж”№еҲ—й…Қж–№жҲҗеҲҶпјҡе·Ұж¬„жҜ”дҫӢгҖҒеҸіж¬„гҖҢжҲҗеҲҶиұҶ В· иҷ•зҗҶжі• В· з”ўеңӢгҖҚвҖ”вҖ”иҷ•зҗҶжі•/з”ўеңӢз”Ё greenForPart
     еҫһ green stock ж¶Ҳжӯ§пјҲй…Қж–№еҜ«жіӣзЁұгҖҒз”ҹиұҶеё¶зүҲжң¬иҷҹпјҢеҗҢеҗҚдёҚеҗҢиҷ•зҗҶжі•иҰҒжҢ‘е°ҚйӮЈж”ҜпјүгҖӮ
     йҖҷиЈЎжҳҜж‘әеҚЎ/зӨҫзҫӨ origin ең–/Square е•Ҷе“Ғең–зҡ„е…ұз”ЁиіҮж–ҷжәҗпјҢж”№йҖҷдёҖиҷ•е…ЁйғЁз”ҹж•Ҳ */
  var bd=null;
  try{var bq=await sb.from('blends').select('name,parts').ilike('name',nm);bd=(bq.data||[])[0]||null;}catch(e){}
  if(bd){
    (bd.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}).forEach(function(p){
      var g=greenForPart(p);
      var v=[p.bean,(g&&g.process)||p.process||'',(g&&g.country)||''].filter(Boolean).join(' В· ');
      add(parseFloat(p.pct)+'%',v);
    });
    var brd=full.roast_date||(matchRoast(full)||{}).roast_date;
    add('Roasted',brd?fmtD(brd):'');
    return info;
  }
  var gb=null;
  /* 2026-07-15 ID е„Әе…Ҳпјҡsamples её¶ bean_id вҶ’ иЁҳжҶ¶й«” DB.beans зІҫжә–е‘ҪдёӯпјҲж¶Ҳж»…еҗҢеҗҚеӨҡж”Ҝзҡ„ pool[0] зҢңжё¬пјҢ
     дё”зңҒдёҖж¬Ў DB жҹҘи©ўвҖ”вҖ”DB.beans е·Іијүе…Ёж¬„дҪҚпјүгҖӮжІ’ bean_id зҡ„иҲҠиіҮж–ҷжүҚйҖҖеӣһеҗҚеӯ—пјӢиҷ•зҗҶжі•жҹҘ */
  if(full.bean_id)gb=(DB.beans||[]).find(function(b){return String(b.id)===String(full.bean_id);})||null;
  if(!gb){
    try{
      var gq=await sb.from('beans').select('process,variety,altitude,region,country,station,harvest,supplier').ilike('name',nm);
      var pool=gq.data||[];
      var proc=String(full.process||'').trim().toLowerCase();
      gb=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }catch(e){}
  }
  add('Origin',gb?[gb.region,gb.country].filter(Boolean).join(', '):'');
  add('Station',gb&&gb.station);
  add('Variety',gb&&gb.variety);
  add('Altitude',(gb&&gb.altitude!=null&&gb.altitude!=='')?gb.altitude+' MASL':'');
  add('Process',full.process||(gb&&gb.process)||'');
  add('Harvest',gb&&gb.harvest);
  var rd=full.roast_date||(matchRoast(full)||{}).roast_date;
  add('Roasted',rd?fmtD(rd):'');
  add('Sourced via',gb&&gb.supplier);
  return info;
}
/* е–®еҚЎзҡ„жӯЈеҸҚйқў HTMLпјҲcoverпјқе°ҒйқўпјӢQRгҖҒinfoпјқйӣ·йҒ”пјӢжҳҺзҙ°пјүвҖ”вҖ”еӣӣж јж··жҺ’ PDF зҡ„еҺҹж–ҷ */
async function infoCardFaces(s){
  /* full rowпјҲflavour_locked е„Әе…ҲпјүпјӢйЎҸиүІпјӢbrewпјҲеҗҢ immersion зҡ„зӣ®жЁҷи§Јжһҗпјү

  try{

  }catch(e){}
  var dots={};try{dots=await cardDots();}catch(e){}
  var col=dotColorFor(full.sample_id,dots,full.process)||'#C87E8E';
  var nm=String(full.sample_id||'').trim();
  var info=await beanInfoRows(full,{omit:['Roasted','Harvest']});

  var qrImg='<div style="border:.25mm solid #E1DAD3;padding:1.1mm;background:#fff;display:inline-block"><img src="'+cardQrSrc(nm)+'" style="width:21mm;height:21mm;display:block" alt="QR"></div>';
  /* йқў 1пјқе°ҒйқўпјӢQRпјҲе°Қж‘әеҚЎпјҡдёҠеҚҠпјқе°ҒйқўиҪү 180В°гҖҒдёӢеҚҠпјқQR дёҚи®ҠпјӣжҠҳеҫҢе…©еҚҠзҡҶжӯЈз«ӢпјүгҖӮдёӯз·ҡпјқе°Қж‘әиҷӣз·ҡ */
  var cardCover='<div class="card4"><div class="frame frame2"></div>'
    +'<div class="inner" style="padding:0">'
    +'<div style="flex:1;transform:rotate(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3mm 5mm">'
    +'<img src="/logo.png" style="width:11mm;height:11mm" alt="Ratio">'
    +'<div class="serif" style="font-size:12pt;font-weight:700;margin-top:1.2mm;letter-spacing:.01em">'+esc(CARD_TEXT.brand)+'</div>'
    +'<div class="lab" style="letter-spacing:.28em;margin-top:.6mm">'+esc(CARD_TEXT.tagline)+'</div>'
    +orn
    +'<div class="serif" style="font-style:italic;font-size:14pt;font-weight:600;line-height:1.1">'+esc(nm)+'</div>'
    +'<div style="width:9mm;border-top:.5mm solid '+col+';margin:1.6mm 0 1.4mm"></div>'
    +(comment?'<div class="serif" style="font-style:italic;font-size:9pt;font-weight:500;line-height:1.5;color:#5A534C;max-width:74mm">'+esc(comment)+'</div>':'')
    +'</div>'

    +qrImg
    +'<div class="lab" style="margin-top:1.6mm">'+esc(CARD_TEXT.scan)+'</div>'

    +'</div></div></div>';
  /* йқў 2пјқйўЁе‘ійӣ·йҒ”пјӢз”ўеҚҖжҳҺзҙ°пјҲе°Қж‘әеҚЎпјҡдёҠеҚҠпјқйӣ·йҒ”зҪ®дёӯгҖҒдёӢеҚҠпјқжҳҺзҙ°зҪ®дёӯпјүгҖӮдёӯз·ҡпјқе°Қж‘әиҷӣз·ҡ */

     иӢҘзңҹж©ҹеҚ°еҮәжӯЈеҸҚе°ҚдёҚдёҠпјқеҚ°иЎЁж©ҹйӣҷйқўзҝ»й ҒйӮҠиЁӯе®ҡпјҲй•·йӮҠ/зҹӯйӮҠпјүи®ҠдәҶпјҢеӣһе ұеҶҚиӘҝ */

async function applyPouroverToAll(btn){
  var list=passedBeans();
  if(!list.length){alert('No QC-passed coffees to apply to yet.');return;}
  if(!confirm('Add the house pour-over recipe to all '+list.length+' shelf coffee'+(list.length===1?'':'s')+'?\n\nIt then shows in dispatch emails and on the QR bean page. This overwrites any existing pour-over (infusion) notes on those coffees.'))return;
  if(btn){btn.disabled=true;btn.textContent='ApplyingвҖҰ';}
  /* и§ЈжһҗдёҚйҮҚиӨҮзҡ„ blend / bean targetпјҲblends иЎЁеҗҢеҗҚе„Әе…ҲпјҢеҗҰеүҮз”ҹиұҶиЎЁ bean_id вҶ’ еҗҚеӯ—+process еӮҷжҸҙпјү */
  var blendIds={},beanIds={},blendRows=[];
  try{var bq=await sb.from('blends').select('id,name,brew');blendRows=bq.data||[];}catch(e){}
  for(var i=0;i<list.length;i++){
    var s=list[i],nm=String(s.sample_id||'').trim();
    var bl=blendRows.find(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
    if(bl){blendIds[bl.id]=1;continue;}
    var bean=null;
    if(s.bean_id)bean=(DB.beans||[]).find(function(b){return String(b.id)===String(s.bean_id);});
    if(!bean){
      var proc=String(s.process||'').trim().toLowerCase();
      var pool=(DB.beans||[]).filter(function(b){return String(b.name||'').trim().toLowerCase()===nm.toLowerCase();});
      bean=(proc?pool.find(function(b){return String(b.process||'').trim().toLowerCase()===proc;}):null)||pool[0]||null;
    }
    if(bean)beanIds[bean.id]=1;
  }
  var ok=0,fail=0;
  /* еҸӘиҰҶеҜ« infusionпјҢе…¶д»–жІ–з…®ж–№жі•еҺҹе°ҒдёҚеӢ• */
  for(var bid in blendIds){
    var row=blendRows.find(function(b){return String(b.id)===String(bid);});
    var brew=(row&&row.brew&&typeof row.brew==='object')?Object.assign({},row.brew):{};
    brew.infusion=POUROVER_INFUSION;
    try{var u=await sb.from('blends').update({brew:brew}).eq('id',bid);if(u.error)throw new Error(u.error.message);ok++;}catch(e){fail++;}
  }
  for(var beanid in beanIds){
    var cur={};
    try{var fr=await sb.from('beans').select('brew').eq('id',beanid).maybeSingle();var v=fr&&fr.data&&fr.data.brew;if(v&&typeof v==='object')cur=v;}catch(e){}
    var brew2=Object.assign({},cur);brew2.infusion=POUROVER_INFUSION;
    try{var u2=await sb.from('beans').update({brew:brew2}).eq('id',beanid);if(u2.error)throw new Error(u2.error.message);ok++;}catch(e){fail++;}
  }
  if(btn){btn.disabled=false;btn.textContent='Add it to every shelf coffee';}
  closeDrawer();
  toast(fail?('Applied to '+ok+', '+fail+' failed'):('Pour-over added to '+ok+' coffee'+(ok===1?'':'s')+' вң“'));
}

var _loadedScripts={};
function loadScriptOnce(url){
  if(_loadedScripts[url])return _loadedScripts[url];
  _loadedScripts[url]=new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src=url;s.onload=res;s.onerror=function(){delete _loadedScripts[url];rej(new Error('script load failed вҖ” check the connection'));};
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}

  function drawCuppingRadar(doc,cx,cy,R,scores,BERRY,MUTE){
    var n=scores.length;if(!n)return;
    function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a), cy-r*Math.cos(a)];}
    function segsOf(pts){var s=[];for(var i=1;i<pts.length;i++)s.push([pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]]);return s;}
    /* grid rings: Light / Medium / Strong */
    doc.setLineWidth(0.5);doc.setDrawColor(30,26,25);
    [1,2,3].forEach(function(lvl){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,R*lvl/3));doc.lines(segsOf(pts),pts[0][0],pts[0][1],[1,1],'S',true);});
    /* spokes */
    doc.setDrawColor(30,26,25);
    for(var i=0;i<n;i++){var sp=pt(i,R);doc.line(cx,cy,sp[0],sp[1]);}
    /* data polygon (0 = centre when a bean has no reading on that axis) */
    var dpts=scores.map(function(o,i){var v=(o.n==null?0:o.n);return pt(i,R*(v/3));});
    var dseg=segsOf(dpts);
    var TINT=[Math.round(255-(255-BERRY[0])*0.20),Math.round(255-(255-BERRY[1])*0.20),Math.round(255-(255-BERRY[2])*0.20)];
    doc.setFillColor(TINT[0],TINT[1],TINT[2]);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'F',true);
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1.1);
    doc.lines(dseg,dpts[0][0],dpts[0][1],[1,1],'S',true);
    doc.setFillColor(BERRY[0],BERRY[1],BERRY[2]);
    dpts.forEach(function(p){doc.circle(p[0],p[1],1,'F');});
    /* axis labels, anchored just outside each vertex */
    doc.setFont('helvetica','bold');doc.setFontSize(5.6);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
    scores.forEach(function(o,i){
      var lp=pt(i,R+7);
      var align=(lp[0]<cx-2)?'right':(lp[0]>cx+2?'left':'center');
      doc.text(o.label,lp[0],lp[1]+2,{align:align});
    });
  }

    var padX=26, x0=ox+padX, xEnd=ox+w-padX, innerW=w-padX*2;

    /* ---- unified type scale ---- */
    var FS_TITLE=20, FS_KICKER=8, FS_SECTION=9.5, FS_ITEM=11, FS_PRICE=12, FS_META=8.5, FS_DESC=8.5;
    /* ---- unified spacing ---- */

    /* ---------- title block ---------- */

    /* ---------- section header ---------- */
    function section(label,sub){
      y+=SEC_TOP;

      doc.text(label.toUpperCase(),x0,y,{charSpace:1.8});

        doc.text(mnAsc(sub),xEnd,y,{align:'right'});}
      doc.setDrawColor(LINE[0],LINE[1],LINE[2]);doc.setLineWidth(0.6);
      doc.line(x0,y+6,xEnd,y+6);
      y+=SEC_GAP;
    }
    /* ---------- price row (name | size .... price) ---------- */
    function priceRow(name,size,price,note){
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(mnAsc(name),x0,y);
      var nw=doc.getTextWidth(mnAsc(name));
      if(size){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text('  |  '+size,x0+nw+3,y);}
      if(price){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(price,xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
      if(note){y+=META_LH;doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(note),x0,y);}
      y+=ROW;
    }
    /* ---------- a plain meta line: label left, value right ---------- */
    function metaRow(label,value){
      doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text(mnAsc(label),x0,y);
      if(value)doc.text(mnAsc(value),xEnd,y,{align:'right'});
      y+=META_LH+2;
    }

    /* ---------- two espresso blends ---------- */
    var bl=cfg.blends||[], colCx=[x0+innerW*0.27, x0+innerW*0.73], by=y+30;
    [0,1].forEach(function(ci){
      var b=bl[ci]||{}, cx=colCx[ci], hl=!!b.highlight;
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',cx,by-12,{align:'center',charSpace:1.2});}
      doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      doc.text(mnAsc((b.name||'').toUpperCase()),cx,by,{align:'center'});
      if(b.sub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(b.sub),cx,by+12,{align:'center'});}
      if(b.notes){doc.setFont('helvetica','bold');doc.setFontSize(FS_SECTION);doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(mnAsc(b.notes),cx,by+25,{align:'center'});}
    });
    var midX=x0+innerW*0.5;
    doc.setDrawColor(BERRY[0],BERRY[1],BERRY[2]);doc.setLineWidth(1);
    doc.line(midX+6,by-11,midX-6,by+27);
    y=by+37;

    /* ---------- ESPRESSO BASED ---------- */
    section('Espresso Based');
    priceRow('Espresso','',pv('espresso'));
    priceRow('Small','6oz',pv('small'));
    priceRow('Large','10oz',pv('large'));
    priceRow('On Ice','10oz',pv('ice'));
    metaRow('extra shot \u00b7 alternative milk',pv('altmilk','50 cents'));
    metaRow('decaf',pv('decaf','1 dollar'));

    /* ---------- SIGNATURE ---------- */
    section('Signature');
    doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);doc.setTextColor(INK[0],INK[1],INK[2]);
    doc.text('Dirty Ratio',x0,y);
    var dnw=doc.getTextWidth('Dirty Ratio');
    if(cfg.dirtySub){doc.setFont('helvetica','italic');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('  '+mnAsc(cfg.dirtySub),x0+dnw+4,y);}
    if(pv('dirty')){doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(pv('dirty'),xEnd,y-(FS_PRICE-FS_ITEM)*0.34,{align:'right'});}
    y+=META_LH+2;
    if(cfg.dirtyDesc){doc.setFont('helvetica','normal');doc.setFontSize(FS_DESC);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.splitTextToSize(mnAsc(cfg.dirtyDesc),innerW).slice(0,2).forEach(function(ln){doc.text(ln,x0,y);y+=META_LH;});}
    y+=4;

    /* ---------- AUTOMATED BREWING ---------- */
    section('Automated Brewing');
    priceRow('Fresh Batch','10oz',pv('fresh'),cfg.freshNote);
    priceRow('Cold Batch','10oz',pv('cold'),cfg.coldNote);

    /* ---------- HAND POUR FILTER COFFEE ---------- */
    section('Hand Pour Filter Coffee','hot or iced');
    (cfg.pours||[]).slice(0,4).forEach(function(it){
      var name=mnAsc(it.name||'');if(!name)return;
      var hl=!!it.highlight;
      var beanCol=mnHexRgb(beanColorFor(it.bean||it.name))||null;
      var hot=String(it.hot==null?'':it.hot).trim(), cold=String(it.cold==null?'':it.cold).trim();
      if(hl){doc.setFont('helvetica','bold');doc.setFontSize(FS_KICKER-1.5);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);
        doc.text('STAFF PICK',x0,y,{charSpace:1.2});y+=10;}
      /* right-aligned hot (pink) / cold (blue), vertically centred to the item name */
      doc.setFont('helvetica','bold');doc.setFontSize(FS_PRICE);
      var py=y-(FS_PRICE-FS_ITEM)*0.34, rx=xEnd;
      doc.setTextColor(COLD[0],COLD[1],COLD[2]);doc.text(cold||'-',rx,py,{align:'right'});
      var cwid=doc.getTextWidth(cold||'-');
      doc.setTextColor(INK[0],INK[1],INK[2]);doc.text(' / ',rx-cwid,py,{align:'right'});
      var swid=doc.getTextWidth(' / ');
      doc.setTextColor(HOT[0],HOT[1],HOT[2]);doc.text(hot||'-',rx-cwid-swid,py,{align:'right'});
      var priceW=cwid+swid+doc.getTextWidth(hot||'-');
      /* name вҖ” bean's own retail colour shown as a small dot marker, not text tint */
      var dotGap=11, nameX=x0+dotGap;
      if(beanCol){doc.setFillColor(beanCol[0],beanCol[1],beanCol[2]);doc.circle(x0+3,y-3.5,3,'F');}
      doc.setFont('helvetica','bold');doc.setFontSize(FS_ITEM);
      doc.setTextColor(hl?BERRY[0]:INK[0], hl?BERRY[1]:INK[1], hl?BERRY[2]:INK[2]);
      mnFit(doc,name,nameX,y,innerW-priceW-14-dotGap,FS_ITEM,8.5);
      y+=META_LH+1.5;
      if(it.origin){doc.setFont('helvetica','normal');doc.setFontSize(FS_META);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
        doc.text(mnAsc(it.origin),x0,y);y+=META_LH;}
      if(it.flavour){doc.setFont('helvetica','bold');doc.setFontSize(FS_DESC+0.5);doc.setTextColor(INK[0],INK[1],INK[2]);
        mnFit(doc,it.flavour,x0,y,innerW,FS_DESC+0.5,8);y+=META_LH;}

  function drawCell(doc,x,y,w,h,info,INK,BROWN,BERRY,MUTE){
    /* card outline */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    var px=x+15, pw=w-30;
    if(!info||!info.name){
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('вҖ” empty вҖ”',x+w/2,y+h/2,{align:'center'});
      return;
    }
    /* ---- coloured banner header (name highlighted in its assigned colour) ---- */
    var band=mnHexRgb(info.color)||BROWN;
    var bandH=38;
    doc.setFillColor(band[0],band[1],band[2]);
    if(doc.roundedRect)doc.roundedRect(x,y,w,bandH,9,9,'F');else doc.rect(x,y,w,bandH,'F');
    /* square off the bottom of the band so only the top corners stay rounded */
    doc.rect(x,y+bandH-10,w,10,'F');
    /* readable text colour on the band */
    var lum=(0.299*band[0]+0.587*band[1]+0.114*band[2]);
    var tc=lum>165?[40,34,32]:[255,255,255];
    doc.setFont('helvetica','bold');doc.setTextColor(tc[0],tc[1],tc[2]);
    var ns=18;doc.setFontSize(ns);
    while(ns>11&&doc.getTextWidth(mnAsc(info.name))>pw){ns-=0.5;doc.setFontSize(ns);}
    doc.text(mnAsc(info.name),px,y+bandH/2+ns*0.34,{maxWidth:pw});
    var cy=y+bandH+20;
    /* ===== NOTE вҖ” small highlighted title bar, centred under the name ===== */
    if(info.note){
      var nt=mnAsc(String(info.note));
      doc.setFont('helvetica','bold');
      var nsz=8.5;doc.setFontSize(nsz);
      while(nsz>6&&doc.getTextWidth(nt)>w-16){nsz-=0.3;doc.setFontSize(nsz);}
      while(doc.getTextWidth(nt)>w-14&&nt.length>4){nt=nt.slice(0,-2);}
      if(nt!==mnAsc(String(info.note))){nt=nt.replace(/[\s\u2026.]+$/,'')+'\u2026';}
      var barH=nsz+7,barTop=y+bandH;   /* flush under the name band, no white gap */
      var lt=[Math.round(band[0]+(255-band[0])*0.80),Math.round(band[1]+(255-band[1])*0.80),Math.round(band[2]+(255-band[2])*0.80)];
      doc.setFillColor(lt[0],lt[1],lt[2]);
      doc.rect(x,barTop,w,barH,'F');   /* full-width highlight row */
      var dk=[Math.round(band[0]*0.5),Math.round(band[1]*0.5),Math.round(band[2]*0.5)];
      doc.setTextColor(dk[0],dk[1],dk[2]);
      doc.text(nt,x+w/2,barTop+barH/2+nsz*0.34,{align:'center'});
      cy=barTop+barH+14;
    }
    /* redraw a crisp cell border on top of the coloured name band + note bar,
       so the black outline stays a clean unbroken line where the fills reach the edges */
    doc.setDrawColor(30,26,25);doc.setLineWidth(0.8);
    if(doc.roundedRect)doc.roundedRect(x,y,w,h,9,9,'S');else doc.rect(x,y,w,h,'S');
    /* ===== FLAVOUR вҖ” primary focus (large) ===== */
    if(info.flavour&&info.flavour.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('FLAVOUR',px,cy,{charSpace:1.1});cy+=14;
      doc.setFont('helvetica','bold');doc.setTextColor(INK[0],INK[1],INK[2]);
      mnFit(doc,info.flavour.join('  В·  '),px,cy,pw,12.5,8.5);cy+=12;
    }
    cy+=8;
    /* footer + cupping placement, computed from the bottom up */
    var by=y+h-13;
    var hasC=false;   /* comment + net weight are no longer printed */
    var commentY=by, netY=by;
    var hasCup=!!(info.cupScores&&info.cupScores.some(function(o){return o.n!=null;}));
    var RADAR_R=20,RADAR_HEAD=11,RADAR_PAD=9;
    var cupBottom=(hasC?commentY-11:netY-5);
    var cupTotal=hasCup?(RADAR_HEAD+RADAR_PAD+RADAR_R*2+RADAR_PAD):0;
    var cupTop=cupBottom-cupTotal;
    var recipeBottom=(hasCup?cupTop:(hasC?commentY:netY))-8;
    /* ===== RECIPE вҖ” primary focus (large, spreads to fill) ===== */
    if(info.recipe&&info.recipe.length){
      doc.setFont('helvetica','bold');doc.setFontSize(6.8);doc.setTextColor(MUTE[0],MUTE[1],MUTE[2]);
      doc.text('RECIPE',px,cy,{charSpace:1.1});cy+=14;
      var lineH=12;
      var comps=info.recipe.map(function(c){
        var pctTxt=c.pct?(c.pct+'%'):'';var nx=px+(pctTxt?34:0);
        doc.setFont('helvetica','bold');doc.setFontSize(11);
        var lines=doc.splitTextToSize(mnAsc(c.bean),pw-(nx-px));if(lines.length>2)lines=lines.slice(0,2);
        return {pctTxt:pctTxt,nx:nx,lines:lines};
      });
      var totalLines=comps.reduce(function(s,o){return s+o.lines.length;},0);
      var avail=recipeBottom-cy;
      var gap=comps.length?Math.max(3,Math.min(22,(avail-totalLines*lineH)/comps.length)):0;
      comps.forEach(function(o){
        var sy=cy;
        if(o.pctTxt){doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BERRY[0],BERRY[1],BERRY[2]);doc.text(o.pctTxt,px,sy);}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(BROWN[0],BROWN[1],BROWN[2]);
        o.lines.forEach(function(ln,i){doc.text(ln,o.nx,sy+i*lineH);});
        cy=sy+o.lines.length*lineH+gap;
      });
    }
    /* ===== cupping strength вҖ” radar chart (secondary, muted) вҖ” inner=Light, outer=Strong ===== */
    if(hasCup){
      var ccy=cupTop;
      doc.setFont('helvetica','bold');doc.setFontSize(6.3);doc.setTextColor(178,94,106);
      doc.text('CUPPING STRENGTH',px,ccy,{charSpace:1});ccy+=RADAR_HEAD;
      var rCx=px+pw/2, rCy=ccy+RADAR_PAD+RADAR_R;
      drawCuppingRadar(doc,rCx,rCy,RADAR_R,info.cupScores,band,[124,58,68]);
    }
  }
  function drawMenu(doc,ox,w,h,info4,logo){
    var INK=[0,0,0], BROWN=[73,66,58], BERRY=[178,94,106], MUTE=[124,58,68];
    var padX=24, padTop=24, padBot=24;
    var x0=ox+padX, innerW=w-padX*2;
    /* full-bleed 2x2 grid вҖ” fills the whole half-page */
    var gTop=padTop, gBot=h-padBot;
    var colGap=14, rowGap=14;
    var cw=(innerW-colGap)/2, ch=(gBot-gTop-rowGap)/2;
    var cellX=[x0, x0+cw+colGap, x0, x0+cw+colGap];
    var cellY=[gTop, gTop, gTop+ch+rowGap, gTop+ch+rowGap];
    for(var i=0;i<4;i++){drawCell(doc,cellX[i],cellY[i],cw,ch,info4[i],INK,BROWN,BERRY,MUTE);}
  }
  function buildMenuPDF(info4,logo){
    var JS=window.jspdf.jsPDF;
    var doc=new JS({orientation:'landscape',unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth();   /* ~841.89 */

    doc.setDrawColor(30,26,25);doc.setLineWidth(0.7);
    if(doc.setLineDashPattern)doc.setLineDashPattern([4,4],0);
    doc.line(W/2,18,W/2,H-18);
    if(doc.setLineDashPattern)doc.setLineDashPattern([],0);
    doc.save('Ratio_Menu.pdf');
  }

/* PDF еј•ж“ҺиҲҮ logoпјҲjsPDF еҗҢ classic 2.5.1пјӣйҰ–ж¬Ўз”ЁжүҚијүпјү */
async function menusPDF(buildFn){
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  if(!(window.jspdf&&window.jspdf.jsPDF))throw new Error('PDF engine failed to load');
  return new Promise(function(res){
    var img=new Image();
    img.onload=function(){res(buildFn(img));};
    img.onerror=function(){res(buildFn(null));};
    img.src='/logo.png';
  });
}

function xmlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _assetCache={};
async function fetchAsset(path){
  if(_assetCache[path])return _assetCache[path];

var LBL_MM2PT=72/25.4;
var LBL_LEFT_PT=7*LBL_MM2PT;
var LBL_RIGHT_PT=62*LBL_MM2PT;
var LBL_WIDTH_PT=LBL_RIGHT_PT-LBL_LEFT_PT;
function lblFitBlock(block,origLen){
  var os=block.match(/<pt:objectStyle x="([\d.]+)pt" y="([\d.]+)pt" width="([\d.]+)pt" height="([\d.]+)pt"/);
  if(!os)return block;
  var ow=parseFloat(os[3]);
  var fe=block.match(/size="([\d.]+)pt"/);var origSize=fe?parseFloat(fe[1]):0;
  var nx=LBL_LEFT_PT,nw=LBL_WIDTH_PT;
  block=block.replace(os[0],'<pt:objectStyle x="'+nx.toFixed(2)+'pt" y="'+os[2]+'pt" width="'+nw.toFixed(2)+'pt" height="'+os[4]+'pt"');
  block=block.replace(/control="AUTOLEN"/,'control="LONGTEXTFIXED"');
  block=block.replace(/(<text:textControl[^>]*?shrink=")\w+(")/,'$1true$2');
  block=block.replace(/(<text:textControl[^>]*?autoLF=")\w+(")/,'$1false$2');
  block=block.replace(/(<text:textControl[^>]*?clipFrame=")\w+(")/,'$1false$2');
  var dm=block.match(/<pt:data>([\s\S]*?)<\/pt:data>/);
  var newLen=((dm?dm[1]:'')||'').length||1;
  if(origSize>0&&origLen>0&&ow>0){
    var cw=ow/(origLen*origSize);
    if(cw>0){
      var maxSize=(nw*0.97)/(newLen*cw);
      var ns=Math.min(origSize,maxSize);if(ns<3)ns=3;
      block=block.replace(/size="([\d.]+)pt"/g,'size="'+(Math.round(ns*10)/10)+'pt"');
    }
  }
  return block;
}

async function generateLabelLbx(){
  var msg=document.getElementById('lbx-msg');var btn=document.getElementById('lbx-gen');
  try{
    if(!window.JSZip){if(msg){msg.textContent='Zip library still loading, try again';msg.className='gform-msg err';}return;}
    if(btn)btn.disabled=true;if(msg){msg.textContent='Building .lbxвҖҰ';msg.className='gform-msg';}
    var zip=await JSZip.loadAsync(await fetchAsset('/blend-label.lbx'));
    var xml=await zip.file('label.xml').async('string');
    compileLabelEntries().forEach(function(f){
      var v=(f.value||'').trim();
      var empty=(v==='');
      var newText=empty?'':((f.pre||'')+v+(f.post&&!(new RegExp(f.post+'$','i').test(v))?f.post:''));
      var dataOld='<pt:data>'+xmlEsc(f.orig)+'</pt:data>';
      var idx=xml.indexOf(dataOld);if(idx<0)return;
      var bStart=xml.lastIndexOf('<text:text>',idx);var bEnd=xml.indexOf('</text:text>',idx)+12;
      var block=xml.slice(bStart,bEnd),nb=block;
      if(newText!==f.orig){
        nb=nb.replace(/<pt:data>[\s\S]*?<\/pt:data>/,'<pt:data>'+xmlEsc(newText)+'</pt:data>')
             .replace(/(<text:stringItem charLen=")\d+(")/,'$1'+newText.length+'$2');
      }
      if(f.fit&&!empty){nb=lblFitBlock(nb,f.orig.length);}
      if(nb!==block){xml=xml.slice(0,bStart)+nb+xml.slice(bEnd);}
    });
    var srcName=(labelMode==='single'?soForm.name:labelForm.name)||'label';
    var nm=srcName.replace(/[^A-Za-z0-9 _\-]/g,'').trim().replace(/\s+/g,'_')||'label';
    zip.file('label.xml',xml);
    var blob=await zip.generateAsync({type:'blob',mimeType:'application/octet-stream',compression:'DEFLATE'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nm+'.lbx';document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    if(btn)btn.disabled=false;if(msg){msg.textContent='Done вҖ” '+nm+'.lbx downloaded';msg.className='gform-msg ok';}
  }catch(e){if(btn)btn.disabled=false;if(msg){msg.textContent='Generate failed: '+(e&&e.message||e);msg.className='gform-msg err';}}
}

function tinCanvasToBmp(cv){
  var w=cv.width,h=cv.height;
  var data=cv.getContext('2d').getImageData(0,0,w,h).data;
  var rowSize=w*4,dataSize=rowSize*h,fileSize=54+dataSize;
  var buf=new ArrayBuffer(fileSize),dv=new DataView(buf),u=new Uint8Array(buf);
  u[0]=0x42;u[1]=0x4D;
  dv.setUint32(2,fileSize,true);dv.setUint32(6,0,true);dv.setUint32(10,54,true);
  dv.setUint32(14,40,true);dv.setInt32(18,w,true);dv.setInt32(22,h,true);
  dv.setUint16(26,1,true);dv.setUint16(28,32,true);dv.setUint32(30,0,true);
  dv.setUint32(34,dataSize,true);dv.setInt32(38,2835,true);dv.setInt32(42,2835,true);
  dv.setUint32(46,0,true);dv.setUint32(50,0,true);
  var o=54;
  for(var y=h-1;y>=0;y--){var r=y*w*4;for(var x=0;x<w;x++){var i=r+x*4;u[o++]=data[i+2];u[o++]=data[i+1];u[o++]=data[i];u[o++]=255;}}
  return u;
}

function tinRadarBmp(s){
  var axes=['fragrance','acidity','sweetness','body','aftertaste'];
  var labels=['Fragrance','Acidity','Sweetness','Body','Aftertaste'];
  if(!s||!axes.some(function(a){return s[a]!=null;}))return null;
  var W=560,H=420;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');if(!ctx)return null;
  ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,W,H);
  var cx=W/2,cy=H/2+6,R=130,n=5;
  function pt(i,r){var a=i*2*Math.PI/n;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
  ctx.strokeStyle='#000000';ctx.lineJoin='round';
  ctx.lineWidth=1.6;[1,2,3].forEach(function(l){ctx.beginPath();for(var i=0;i<n;i++){var p=pt(i,R*l/3);if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);}ctx.closePath();ctx.stroke();});
  ctx.lineWidth=1.2;for(var i=0;i<n;i++){var p=pt(i,R);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p[0],p[1]);ctx.stroke();}
  var dp=axes.map(function(a,i){var v=(s[a]==null?0:s[a]);return pt(i,R*(v/3));});
  ctx.lineWidth=3.5;ctx.beginPath();dp.forEach(function(p,i){if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);});ctx.closePath();ctx.stroke();
  ctx.fillStyle='#000000';dp.forEach(function(p){ctx.beginPath();ctx.arc(p[0],p[1],4.5,0,2*Math.PI);ctx.fill();});
  ctx.font='700 24px Arial, sans-serif';ctx.textBaseline='middle';
  labels.forEach(function(t,i){var lp=pt(i,R+26);ctx.textAlign=(lp[0]<cx-4?'right':(lp[0]>cx+4?'left':'center'));ctx.fillText(t,lp[0],lp[1]);});
  return tinCanvasToBmp(cv);
}

async function generateTinLbx(){
  var msg=document.getElementById('tinlbx-msg');var btn=document.getElementById('tinlbx-gen');
  try{
    if(!window.JSZip){if(msg){msg.textContent='Zip library still loading, try again';msg.className='gform-msg err';}return;}
    if(btn)btn.disabled=true;if(msg){msg.textContent='Building .lbxвҖҰ';msg.className='gform-msg';}
    var zip=await JSZip.loadAsync(await fetchAsset('/tin-label.lbx'));
    var xml=await zip.file('label.xml').async('string');
    tinCompileEntries().forEach(function(f){
      var newText=(f.value==null)?'':f.value;
      var dataOld='<pt:data>'+xmlEsc(f.orig)+'</pt:data>';
      var idx=xml.indexOf(dataOld);if(idx<0)return;
      var bStart=xml.lastIndexOf('<text:text>',idx);var bEnd=xml.indexOf('</text:text>',idx)+12;
      var block=xml.slice(bStart,bEnd),nb=block;
      if(newText!==f.orig){
        nb=nb.replace(/<pt:data>[\s\S]*?<\/pt:data>/,'<pt:data>'+xmlEsc(newText)+'</pt:data>');
        var items=tinStringItems(block,newText);
        nb=nb.replace(/<text:stringItem charLen="\d+">[\s\S]*<\/text:stringItem>/,items);
      }
      if(nb!==block){xml=xml.slice(0,bStart)+nb+xml.slice(bEnd);}
    });
    var srcName=(tinMode==='blend'?tinBlend.name:(tinForm.name||tinForm.country))||'tin';
    var nm=srcName.replace(/[^A-Za-z0-9 _\-]/g,'').trim().replace(/\s+/g,'_')||'tin';
    try{var logoBmp=await tinLogoBmp();if(logoBmp)zip.file('Object0.bmp',logoBmp);}catch(e){}
    try{
      var rbmp=tinRadarBmp(tinSample);
      if(rbmp&&xml.indexOf('Object1.bmp')<0){
        zip.file('Object1.bmp',rbmp);
        xml=xml.replace('</pt:objects>',TIN_RADAR_OBJ+'</pt:objects>');
      }
    }catch(e){}
    try{
      var flav=(tinSample&&tinSample.features&&tinSample.features.length)
        ?tinSample.features.map(function(x){return String(x||'').trim();}).filter(Boolean).join(' В· ').toUpperCase()
        :'';
      if(flav){
        var flavObj=TIN_FLAV_OBJ.replace('__DATA__',xmlEsc(flav)).replace('__LEN__',String(flav.length));
        xml=xml.replace('</pt:objects>',flavObj+'</pt:objects>');
      }
    }catch(e){}
    zip.file('label.xml',xml);
    var blob=await zip.generateAsync({type:'blob',mimeType:'application/octet-stream',compression:'DEFLATE'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nm+'.lbx';document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    if(btn)btn.disabled=false;if(msg){msg.textContent='Done вҖ” '+nm+'.lbx downloaded';msg.className='gform-msg ok';}
  }catch(e){if(btn)btn.disabled=false;if(msg){msg.textContent='Generate failed: '+(e&&e.message||e);msg.className='gform-msg err';}}
}

var RS_WK=0, RS_VIEW='day', RS_DATA={}, RS_STAFF=[], RS_NA=[], RS_TPL=null, RS_TE=null;

/* иҖҒй—ҶеҸЈиҝ°зҸӯеһӢпјҲйҖұе…ӯж—Ҙжҡ«з„Ў breakпјүвҖ”вҖ”еӯҳ app_state ts_templates еҫҢд»ҘйӮЈд»ҪзӮәжә–пјӣйҖҷеҸӘжҳҜйҰ–ж¬Ўй җиЁӯпјҢжҠҪеұңеҸҜж”№ */
var RS_TPL_DEFAULT={
  monfri:[{start:'06:15',end:'14:15',br:true},{start:'08:15',end:'14:15',br:false}],

};
function rsHM(s){var p=String(s||'').split(':');return (+p[0])*60+(+p[1]);}
function rsHrs(start,end,br){if(!start||!end)return 0;var x=(rsHM(end)-rsHM(start))/60;if(x<0)x+=24;if(br)x-=0.5;return x<0?0:x;}
function rsHH(x){x=Math.round(x*10)/10;return (x===Math.round(x)?String(x):String(x))+'h';}
function rsWeekStart(i){var d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7)+i*7);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function rsDateFor(ws,dowIdx){var p=String(ws).split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+dowIdx);return d;}
function rsDMY(d){return d.getDate()+'/'+(d.getMonth()+1);}
function rsDIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function rsUnavailable(name,dObj){if(!name)return false;var ds=rsDIso(dObj);return (RS_NA||[]).some(function(n){return String(n.name)===String(name)&&String(n.start_date)<=ds&&String(n.end_date)>=ds;});}
function rsTpl(){return (RS_TPL&&RS_TPL.monfri)?RS_TPL:RS_TPL_DEFAULT;}

/* By personпјҡеҗҢдёҖйҖұзҡ„зҸӯж”№жҢүгҖҢдәәгҖҚеҲҶзө„пјҲжҜҸдәәжң¬йҖұзёҪжҷӮж•ёпјӢйҖҗзҸӯпјӣжңӘжҢҮжҙҫеҸҰеҲ—дёҖж јпјүгҖӮй»һзҸӯз…§жЁЈйҖІ openShiftEdit */
function rosterPersonHTML(ws,shifts){
  var canEdit=isLead();
  var byName={},order=[];
  shifts.forEach(function(s,idx){
    var nm=(s.name&&String(s.name).trim())?String(s.name).trim():'';
    if(!nm)return;
    if(!byName[nm]){byName[nm]={rows:[],total:0};order.push(nm);}
    byName[nm].rows.push({s:s,idx:idx});
    byName[nm].total+=rsHrs(s.start,s.end,s.br);
  });
  order.sort(function(a,b){var ia=RS_STAFF.indexOf(a),ib=RS_STAFF.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  var unassigned=shifts.filter(function(s){return !(s.name&&String(s.name).trim());}).length;
  if(!order.length&&!unassigned)return '<div class="rs-none" style="border:1px solid var(--line);border-radius:12px">No shifts yet вҖ” switch to By day to add them</div>';
  var dowKeys=RS_DOW.map(function(x){return x[0];});
  var html=order.map(function(nm){
    var p=byName[nm];
    p.rows.sort(function(a,b){return dowKeys.indexOf(a.s.day)-dowKeys.indexOf(b.s.day)||(String(a.s.start)<String(b.s.start)?-1:1);});
    var rows=p.rows.map(function(o){
      var di=dowKeys.indexOf(o.s.day),dObj=rsDateFor(ws,di<0?0:di),warn=rsUnavailable(nm,dObj);
      var pin='<span class="rs-nm" style="font-weight:500;font-size:13px">'+((RS_DOW[di]||['','?'])[1])+' '+rsDMY(dObj)+(warn?' <span class="fr-yellow">вҡ </span>':'')+'</span>'
        +'<span class="rs-tm">'+esc(o.s.start)+'вҖ“'+esc(o.s.end)+(o.s.br?' В·ВҪ':'')+' В· '+rsHH(rsHrs(o.s.start,o.s.end,o.s.br))+'</span>';
      return canEdit?'<button class="rs-shift" data-rsedit="'+o.idx+'">'+pin+'</button>':'<div class="rs-shift" style="cursor:default">'+pin+'</div>';
    }).join('');
    return '<div class="rs-day"><div class="rs-day-h"><span>'+esc(nm)+'</span><span style="color:var(--accent)">'+rsHH(p.total)+' this week</span></div>'+rows+'</div>';
  }).join('');
  if(unassigned)html+='<div class="rs-day"><div class="rs-day-h"><span style="color:var(--muted)">Unassigned</span><span style="color:var(--muted)">'+unassigned+' shift'+(unassigned===1?'':'s')+' вҖ” assign in By day</span></div></div>';
  return html;

function applyStandardWeek(ws){

  var tpl=rsTpl(),out=[];
  RS_DOW.forEach(function(dw){
    var slots=dw[0]==='sat'?tpl.sat:dw[0]==='sun'?tpl.sun:tpl.monfri;
    (slots||[]).forEach(function(sl){out.push({day:dw[0],name:'',start:sl.start,end:sl.end,br:!!sl.br});});
  });
  RS_DATA[ws].shifts=out;renderRoster();toast('Standard week applied вҖ” now assign people');
}
function addRosterShift(ws,dk){

    +'<div class="dlab">Who</div><div id="rs-who" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:8px">'+chips()+'</div>'

function rsMoney(){return ROLE==='director'||ROLE==='finance';}
function rsWeekHours(shifts){

/* зҷјзҘЁиҷҹпјҡapp_state 'inv_seq' map {"YYYYMMDD":n}пјҲж јејҸзӣёе®№ classicпјүвҖ”вҖ”з”ўз”ҹжҷӮжҹҘжңҖж–°гҖҒжҲҗеҠҹжүҚеҜ«еӣһпјқи·ЁиЈқзҪ®дёҚеҖ’йҖҖ */
async function invNextNo(dateStr){
  var d=(dateStr||todayKey()).replace(/-/g,'');
  var map={};
  try{
    var q=await sb.from('app_state').select('value').eq('key','inv_seq').maybeSingle();
    var v=q.data&&q.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
    if(v&&typeof v==='object')map=v;
  }catch(e){}
  var n=(parseInt(map[d],10)||0)+1;
  return {no:'INV-'+d+'-'+String(n).padStart(3,'0'),commit:async function(){
    map[d]=n;
    try{await sb.from('app_state').upsert({key:'inv_seq',value:map,updated_at:new Date().toISOString()},{onConflict:'key'});}catch(e){}
  }};
}
/* PDF зүҲйқўгҖҗз…§ classic buildInvoicePDF йҖҗеӯ—еҸЈеҫ‘гҖ‘пјҡA4 зӣҙејҸгҖҒе…¬еҸёеёёж•ё verbatimгҖҒTAX INVOICE еғ…еңЁжңү GST жҷӮ */

  doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(120);
  doc.text('ABN 57 658 829 899',cx,y+22);
  doc.text('Shop 2, 473 Pacific Highway, Crows Nest NSW 2065',cx,y+34);
  doc.text('getratiocoffee@gmail.com',cx,y+46);

  var cDesc=L,cQty=350,cUnit=410,cAmt=R;

  doc.text('Description',cDesc,y);doc.text('Qty',cQty,y,{align:'right'});doc.text('Unit',cUnit,y,{align:'right'});doc.text('Amount',cAmt,y,{align:'right'});
  y+=8;doc.setDrawColor(210);doc.line(L,y,R,y);

  var rows=[];
  INV.items.forEach(function(it){
    var q=parseFloat(it.qty)||0;
    if(invIsGreen(it)){
      var gc=invRaw(it);
      if(gc>0||it.beanName)rows.push({desc:it.beanName||'Green beans',cat:'Green Beans  (GST-free)',qty:q,unit:(parseFloat(it.unit)||0),amt:gc});
      if(invHasHandle(it))rows.push({desc:'Handling fee',cat:'GST inc $5.00 / item',qty:1,unit:INV_HANDLE/1.1,amt:INV_HANDLE/1.1});
    }else if(it.cat==='Roasted Beans'){
      if(invRaw(it)>0||it.desc)rows.push({desc:(it.desc||'Roasted beans')+(it.pack?' В· '+it.pack:''),cat:'Roasted Beans  (GST-free)',qty:q,unit:(parseFloat(it.unit)||0),amt:invRaw(it)});
    }else{
      if(invRaw(it)>0||it.desc){var ex=invEx(it);rows.push({desc:it.desc||it.cat,cat:it.cat,qty:q,unit:(q?ex/q:ex),amt:ex});}
    }
  });
  rows.forEach(function(r){
    if(y>770){doc.addPage();y=60;}
    y+=20;doc.setTextColor(20);doc.setFontSize(10.5);

    doc.text(m(r.unit),cUnit,y,{align:'right'});
    doc.text(m(r.amt),cAmt,y,{align:'right'});
    y+=8;

  y+=4;doc.setDrawColor(210);doc.line(L,y,R,y);
  var tl=380;
  y+=22;doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(60);
  doc.text('Subtotal (ex GST)',tl,y);doc.setTextColor(20);doc.text(m(invSubtotal()),cAmt,y,{align:'right'});
  y+=16;doc.setTextColor(60);doc.text('GST 10%',tl,y);doc.setTextColor(20);doc.text(m(invGstAmt()),cAmt,y,{align:'right'});

  var by=y+20;doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(20);
  doc.text('Payment вҖ” Bank Transfer',L+14,by);

  by+=17;doc.text('Account Name: Ratio Coffee Pty Ltd',L+14,by);

  y+=78;
  if(INV.notes){y+=22;doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(90);doc.text(String(INV.notes).substring(0,120),L,y);}
  y+=22;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(150);

}
/* ===== Finance P&L иІЎеӢҷзёҪиҰҪпјҲзјәеҸЈ #4пјҢиҮӘ classic openFinance/renderFinance з§»жӨҚпјҢеҸЈеҫ‘дёҖжЁЎдёҖжЁЈпјү=====
   е”Ҝи®Җе„ҖиЎЁжқҝпјҡжң¬жңҲ/дёҠжңҲе·Іж”¶пјҲpaid дҫқ created_at еҲҶжЎ¶пјҢUTC YYYY-MMгҖҒдёҠжңҲз”Ё 15 иҷҹйҳІи·ЁжңҲпјүгҖҒ
   жңӘж”¶е…ЁзҙҜеҠ пјҲpending_payment/overdueпјҢеҸӘи®ҖжҢҒд№…еҢ–зҡ„ overdue жЁҷиЁҳвҖ”вҖ”иҪүжҸӣд»ҚеңЁ Orders жөҒзЁӢпјүгҖҒ
   з”ҹиұҶеә«еӯҳеғ№еҖј ОЈ(quantityГ—cost_per_kg)пјҲq>0 дё”жңүеғ№пјӣжңӘе®ҡеғ№еҸҰиЁҲжҸҗзӨәпјүгҖҒжң¬жңҲиІ·иұҶпјҲordered_at||created_atпјүгҖӮ
   orders/beans з”ЁиЁҳжҶ¶й«”пјҲloadAll е·ІжҺ’йҷӨ Cancelledпјүпјӣpurchases з•¶е ҙжҹҘгҖӮйҢўзҡ„ gateпјқrsMoneyпјҲзЈҒиІјеҚҖе·І gateпјҢйҖҷиЈЎеҶҚж“ӢдёҖж¬ЎдҝқйҡӘпјүгҖӮ */
async function openPnlSheet(){
  if(!rsMoney()){roToast();return;}
  openDrawerHTML('<div class="t" style="font-size:19px">P&L</div><div class="empty" style="margin-top:16px">LoadingвҖҰ</div>');
  var pos=[];
  try{var pq=await sb.from('purchases').select('name,kg,cost_per_kg,status,ordered_at,created_at');pos=pq.data||[];}catch(e){}
  var ym=function(d){return String(d||'').slice(0,7);};
  var now=new Date(),thisM=now.toISOString().slice(0,7);
  var lastD=new Date(now.getFullYear(),now.getMonth()-1,15),lastM=lastD.toISOString().slice(0,7);
  /* в‘  ж”¶е…Ҙпјҡе·Іж”¶ж¬ҫиЁӮе–®пјҲз…§дёӢе–®жңҲд»ҪеҲҶжЎ¶пјүвҖ”вҖ”DB.orders е·ІжҺ’йҷӨ Cancelled */
  var inThis=0,nThis=0,inLast=0,nLast=0,outSum=0,outRows=[];
  (DB.orders||[]).forEach(function(o){
    var m=ym(o.created_at),t=Number(o.total)||0;
    if(o.payment_status==='paid'){
      if(m===thisM){inThis+=t;nThis++;}else if(m===lastM){inLast+=t;nLast++;}
    }else if(o.payment_status==='pending_payment'||o.payment_status==='overdue'){
      outSum+=t;outRows.push(o);
    }
  });
  outRows.sort(function(a,b){return daysSince(b.created_at)-daysSince(a.created_at);});
  /* в‘Ў еә«еӯҳеғ№еҖјпјӢжң¬жңҲжҺЎиіј */
  var stockVal=0,nPriced=0,nUnpriced=0;
  (DB.beans||[]).forEach(function(b){
    var q=Number(b.quantity)||0;if(q<=0)return;
    var c=parseFloat(b.cost_per_kg);
    if(isNaN(c)){nUnpriced++;return;}
    stockVal+=q*c;nPriced++;
  });
  var buyThis=0,nBuy=0;
  pos.forEach(function(p){
    if(p.status==='cancelled')return;
    if(ym(p.ordered_at||p.created_at)!==thisM)return;
    var v=(Number(p.kg)||0)*(parseFloat(p.cost_per_kg)||0);
    if(v>0){buyThis+=v;nBuy++;}
  });
  var card=function(title,badge,big,sub){
    return '<div style="border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-top:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline"><span class="t" style="font-size:14px">'+title+'</span><span class="s" style="color:var(--muted)">'+badge+'</span></div>'
      +'<div style="margin-top:3px;font-size:'+(big?'18px':'14px')+';font-weight:700">'+sub+'</div></div>';
  };
  var h='<div class="t" style="font-size:19px">P&L</div>'
    +'<div class="s" style="margin-top:2px">read-only money overview вҖ” orders, stock and buying already in the app</div>'
    +'<div class="dlab">Money in В· paid orders</div>'
    +card('This month',nThis+(nThis===1?' order':' orders'),true,money(inThis))
    +card('Last month',nLast+(nLast===1?' order':' orders'),false,money(inLast))
    +'<div class="dlab">Outstanding В· not yet paid</div>';
  if(outRows.length){
    h+='<div style="border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-top:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline"><span class="t" style="font-size:16px;font-weight:700">'+money(outSum)+'</span><span class="s" style="color:var(--muted)">'+outRows.length+(outRows.length===1?' order':' orders')+'</span></div>'
      +outRows.slice(0,6).map(function(o){
        var c=custById(o.customer_id);
        var days=daysSince(o.created_at);
        var od=o.payment_status==='overdue';
        return '<div class="dl"><span>#'+(o.order_no!=null?String(o.order_no).padStart(4,'0'):'вҖ”')+' В· '+esc(c?(c.name||'вҖ”'):'Walk-in')+'</span>'
          +'<span>'+money(o.total)+' В· '+(od?'<span class="red">'+days+'d overdue</span>':days+'d')+'</span></div>';
      }).join('')
      +'</div>';
  }else{
    h+='<div class="sempty">Nothing outstanding вң“</div>';
  }
  h+='<div class="dlab">Stock and buying</div>'
    +card('Green stock value',nPriced+(nPriced===1?' bean':' beans'),true,money(stockVal)+(nUnpriced?'<div class="s" style="font-weight:400;color:var(--muted);margin-top:2px">'+nUnpriced+' bean'+(nUnpriced>1?'s':'')+' without a cost/kg вҖ” not counted</div>':''))
    +card('Green bought this month',nBuy+(nBuy===1?' purchase':' purchases'),false,money(buyThis))
    +'<button class="dclose" id="pnl-calc">Calculator вҖ” model margins</button>'
    +'<div class="s" style="margin-top:6px;color:var(--muted)">figures follow order dates В· card fees and other expenses are not tracked yet</div>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>';
  openDrawerHTML(h);
  $('d-cl').addEventListener('click',closeDrawer);
  var pc=$('pnl-calc');if(pc)pc.addEventListener('click',openCalcSheet);
}

/* ===== Payroll PDFпјҲжҷӮж•ёпјӢиІ»зҺҮпјӢйҮ‘йЎҚпјӢCash/BankпјӢзёҪиЁҲпјӣеҸӘжңү director/finance еҮәйҲ•пјӣjsPDF еј•ж“ҺйҮҚз”Ё menusPDF ијүе…ҘеҷЁпјү===== */
async function genPayPDF(ws,btn){
  var w=null;PAY_WK.forEach(function(x){if(x.ws===ws)w=x;});
  if(!w)return;
  if(btn){btn.disabled=true;btn.textContent='DrawingвҖҰ';}
  try{
    var doc=await menusPDF(function(logo){return buildPayPDF(w,logo);});
    doc.save('Ratio_Payroll_'+w.ws+'.pdf');
    toast('Payroll PDF вң“');
  }catch(e){alert('PDF failed: '+(e&&e.message||e));}
  if(btn){btn.disabled=false;btn.textContent='Download PDF';}
}
function buildPayPDF(w,logo){
  var JS=window.jspdf.jsPDF;
  var doc=new JS({orientation:'portrait',unit:'pt',format:'a4'});
  var W=doc.internal.pageSize.getWidth();   /* ~595 */
  var xR=W-48, x0=48;
  var INK=[30,26,25], MUTE=[120,116,112], LINE=[221,216,212], ACC=[150,52,70];
  /* ж¬„дҪҚйҢЁй»һпјҲж•ёеӯ—ж¬„еҸіе°ҚйҪҠеҲ° right edgeпјӣж¬„и·қз¶“ getTextWidth ж ЎйҒҺдёҚйҮҚз–ҠпјҢеҗ«еӣӣдҪҚж•ёйҮ‘йЎҚпјү */
  var cWd=x0+252, cWe=x0+307, cRate=x0+317, cWage=xR-77, cPaid=xR-62;
  var y=64;
  if(logo){try{var lw=30,lh=logo.height*(lw/logo.width);doc.addImage(logo,'PNG',x0,y-22,lw,lh);}catch(e){}}
  var tx=logo?x0+40:x0;
  doc.setTextColor.apply(doc,INK);doc.setFont('helvetica','bold');doc.setFontSize(17);doc.text('Ratio Coffee',tx,y);
  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor.apply(doc,MUTE);doc.text('Payroll',tx,y+15);
  var wsD=rsDMY(rsDateFor(w.ws,0))+' вҖ“ '+rsDMY(rsDateFor(w.ws,6))+' '+String(w.ws).slice(0,4);
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor.apply(doc,INK);doc.text(wsD,xR,y,{align:'right'});
  var now=new Date();
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor.apply(doc,MUTE);
  doc.text('generated '+now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear(),xR,y+15,{align:'right'});
  y+=42;
  /* иЎЁй ӯ */
  doc.setFontSize(8.5);doc.setTextColor.apply(doc,MUTE);doc.setFont('helvetica','bold');
  doc.text('STAFF',x0,y);doc.text('WEEKDAY',cWd,y,{align:'right'});doc.text('WEEKEND',cWe,y,{align:'right'});
  doc.text('RATE (wd / we)',cRate,y);doc.text('WAGE',cWage,y,{align:'right'});doc.text('PAID',cPaid,y);
  y+=6;doc.setDrawColor.apply(doc,INK);doc.setLineWidth(0.8);doc.line(x0,y,xR,y);y+=18;
  /* жҜҸдәәдёҖеҲ— */
  var ppl=rsWeekHours(w.shifts),totWd=0,totWe=0,totWage=0;
  ppl.forEach(function(p){
    var r=PAY_RATES[p.name]||{},meta=PAY_META[w.ws]||{cash:[]};
    var hasRate=(r.wd!=null||r.we!=null),amt=p.wd*(Number(r.wd)||0)+p.we*(Number(r.we)||0);
    var isCash=(meta.cash||[]).indexOf(p.name)>-1;
    totWd+=p.wd;totWe+=p.we;if(hasRate)totWage+=amt;
    doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor.apply(doc,INK);
    doc.text(String(p.name),x0,y);
    doc.setFontSize(10.5);
    doc.text(rsHH(p.wd),cWd,y,{align:'right'});doc.text(rsHH(p.we),cWe,y,{align:'right'});
    doc.setTextColor.apply(doc,MUTE);doc.setFontSize(9.5);
    doc.text(hasRate?('$'+(r.wd!=null?r.wd:'вҖ”')+' / $'+(r.we!=null?r.we:'вҖ”')):'no rate',cRate,y);
    doc.setFontSize(11);
    if(hasRate){doc.setFont('helvetica','bold');doc.setTextColor.apply(doc,INK);doc.text('$'+amt.toFixed(2),cWage,y,{align:'right'});}
    else{doc.setTextColor.apply(doc,MUTE);doc.text('вҖ”',cWage,y,{align:'right'});}
    doc.setFont('helvetica','normal');doc.setFontSize(9.5);
    if(isCash){doc.setTextColor.apply(doc,ACC);doc.text('Cash',cPaid,y);}else{doc.setTextColor.apply(doc,MUTE);doc.text('Bank',cPaid,y);}
    y+=8;doc.setDrawColor.apply(doc,LINE);doc.setLineWidth(0.5);doc.line(x0,y,xR,y);y+=17;
  });
  /* зёҪиЁҲ */
  y+=4;doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor.apply(doc,INK);
  doc.text('Total',x0,y);
  doc.text(rsHH(Math.round(totWd*10)/10),cWd,y,{align:'right'});
  doc.text(rsHH(Math.round(totWe*10)/10),cWe,y,{align:'right'});
  doc.text('$'+totWage.toFixed(2),cWage,y,{align:'right'});
  return doc;
}
/* йҖұи–ӘеӢҷеҠ зёҪпјҲжҷӮж•ёпјӢи–Әж°ҙпјӢдәәж•ёпјӣдёӢијү/еҜ„дҝЎе…ұз”Ёпјү */
function payTotals(w){
  var ppl=rsWeekHours(w.shifts),totWd=0,totWe=0,totWage=0;
  ppl.forEach(function(p){var r=PAY_RATES[p.name]||{};totWd+=p.wd;totWe+=p.we;if(r.wd!=null||r.we!=null)totWage+=p.wd*(Number(r.wd)||0)+p.we*(Number(r.we)||0);});
  return {staff:ppl.length,totWd:Math.round(totWd*10)/10,totWe:Math.round(totWe*10)/10,totWage:Math.round(totWage*100)/100};
}

   contacts иЎЁпјқдҫӣжҮүе•Ҷ/жңҚеӢҷе•ҶиҒҜзөЎз°ҝпјҢи·ҹ CustomersпјҲиЁӮе–®е®ўжҲ¶пјүеҲҶй–ӢгҖӮйЎһеһӢеӣӣиүІз…§ classic CT_COLORSпјӣ
   insert/update/delete payload йҖҗеӯ—з…§жҠ„ classicпјӣеҲӘйҷӨж”№ж–°ж®јж…ЈдҫӢ confirmпјҲclassic жҳҜе…©ж®өжҢүйҲ•пјүпјӣ
   иЈң logActпјҲclassic жІ’иЁҳвҖ”вҖ”й–№еүІзӣӨй»һжҷӮеҲ—йҒҺзҡ„зјәпјүгҖӮи®ҖдәәдәәеҸҜзңӢгҖҒеҜ«е…Ҙ canWrite е®Ҳй–ҖгҖӮ */
var CONTACT_TYPES=['Supplier','Customer','Roaster','Service'];
var CT_COLORS={Supplier:'#6E6256',Customer:'#C87E8E',Roaster:'#7E9B7A',Service:'#7C7BA0'};
var CTS={list:[],type:null};
async function openContactsSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Contacts</div><div class="empty" style="margin-top:16px">LoadingвҖҰ</div>');
  var r=await sb.from('contacts').select('*').order('name');
  if(r.error){
    openDrawerHTML('<div class="t" style="font-size:19px">Contacts</div><div class="empty" style="margin-top:16px">Load failed: '+esc(r.error.message)+'</div>'
