/* йҖҸжҳҺзё®ең–зҡ„жЈӢзӣӨж јиҘҜеә•вҖ”вҖ”дёҚз„¶жҠҪеұңиЈЎзңӢдёҚеҮәе“ӘејөжҳҜйҖҸжҳҺзҡ„ */
var _SOC_CHK='background-image:linear-gradient(45deg,#c9c4be 25%,transparent 25%),linear-gradient(-45deg,#c9c4be 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#c9c4be 75%),linear-gradient(-45deg,transparent 75%,#c9c4be 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;background-color:#fff';
/* дҝқеә•пјҡжҲӘең–е°әеҜёдёҚжҳҜ 1080 иҰӢж–№е°ұзё®ж”ҫиЈңжӯЈпјҲIG иҰҒжӯЈж–№еҪўпјүгҖӮйҖҸжҳҺзүҲдёҚиЈңеә•иүІд№ҹдёҚиғҪиҪү JPEG */
function _soc1080(cv,mode,fmt,q,bg){
  fmt=fmt||'image/png';
  if(cv.width===1080&&cv.height===1080)return cv.toDataURL(fmt,q);
  var o=document.createElement('canvas');o.width=1080;o.height=1080;
  var g=o.getContext('2d');
  if(mode!=='clear'){g.fillStyle=bg||'#FAF8F4';g.fillRect(0,0,1080,1080);}
  g.drawImage(cv,0,0,1080,1080);
  return o.toDataURL(fmt,q);
}
/* з”ўеӣӣејөең–зҡ„ж ёеҝғпјҲзӨҫзҫӨдёӢијүиҲҮ Square е•Ҷе“Ғең–е…ұз”ЁйҖҷдёҖд»Ҫпјү
   mode: 'white'пҪң'clear' йҖҸжҳҺпҪң'photo' и©ІиұҶзҡ„иғҢжҷҜз…§
   opts: {fmt,quality,onStep} вҖ” Square иҰҒ JPEGпјҲеӣӣејө PNG еӨӘиӮҘпјҢedge зҡ„и«ӢжұӮй«”еЎһдёҚдёӢпјү */
async function renderSocialImages(full,info,feats,nm,col,mode,opts){
  opts=opts||{};
  var step=opts.onStep||function(){};
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  var photo=null;
  if(mode==='photo'){
    step('Loading photoвҖҰ');
    photo=await loadBeanPhotoData(nm);
    if(!photo)throw new Error('No photo saved for '+nm+' yet вҖ” tap Photo to choose one');
  }
  /* white жЁЎејҸзҡ„еә•иүІпјҡopts.bgпјҲдёҠжһ¶ per-bean иЁҳжҶ¶пјүе„Әе…ҲпјҢеҗҰеүҮе…Ёеҹҹ SOC_BGпјҲSocial Images жҠҪеұңпјүпјӣ
     photo/clear дёҚеҗғеә•иүІгҖӮж·ұеә•иүІжІҝз”Ё photo ж·ұз…§зүҮйӮЈеҘ—пјҡеӯ—зҝ»зұізҷҪгҖҒйӣ·йҒ” grid зҝ»ж·әгҖҒй»һиүІжҸҗдә® */
  var bg=mode==='white'?(opts.bg||SOC_BG||'#FAF8F4'):'#FAF8F4';
  var dark=photo?await photoIsDark(photo):(mode==='white'?socBgIsDark(bg):false);
  var T=_socTheme(dark);
  /* зҙ—жҝғеәҰпјҡopts.scrimпјҲдёҠжһ¶ per-bean иЁҳжҶ¶пјүе„Әе…ҲпјҢеҗҰеүҮе…Ёеҹҹ socScrimпјҲSocial Images жҠҪеұңпјҸиҮӘеӢ•пјү */
  var scrim=(opts.scrim!=null?opts.scrim:socScrim(dark));
  /* зүҲйқўеӣәе®ҡй»‘зҷҪпјҡе‘јеҸ«з«ҜеӮійҖІдҫҶзҡ„ col жҳҜ dotColorFor() зҡ„зҪҗжЁҷиүІпјҲй»ғ/и—Қ/зҙ…пјүпјҢйӮЈжҳҜеә—иЈЎиІЁжһ¶
     иҫЁиӯҳз”Ёзҡ„з®ЎзҗҶиүІпјҢдёҚеҸҜжӢҝдҫҶз•¶зүҲйқўдё»иүІвҖ”вҖ”дёҚз„¶еҗҢдёҖж”ҜиұҶжҸӣеҖӢй»һиүІпјҢж•ҙејөең–е°ұи®Ҡе…Ёй»ғжҲ–е…Ёзҙ…гҖӮ
     з”Ё T.inkпјҡж·әеә•жҳҜеўЁй»‘пјҢж·ұз…§зүҮдёҠиҮӘеӢ•зҝ»жҲҗзұізҷҪпјҢжҳҺжҡ—еӨ©з”ҹе°ҚзЁұгҖӮ
     вҡ  дҫӢеӨ–пјқйӣ·йҒ”еӨҡйӮҠеҪўиҲҮе°ҒйқўиҸұеҪўпјҡйӮЈжҳҜйҖҷж”ҜиұҶзҡ„иӯҳеҲҘиүІпјҢз”ЁдҫҶдёҖзңјиӘҚеҮәжҳҜе“ӘдёҖж”ҜпјҲиҖҒй—Ҷе®ҡжЎҲпјүгҖӮ
     ж·ұиүІз…§зүҮдёҠиҰҒе…ҲжҸҗдә®пјҢеҗҰеүҮж·ұи—Қ/зҙ…й»һиүІжңғж•ҙеҖӢжІүйҖІжҡ—еә•гҖӮ */
  var radarCol=col||'#C87E8E';
  if(dark)radarCol=_liftColour(radarCol,0.45);
  col=T.ink;
  var o={mode:mode,photo:photo,scrim:scrim,dark:dark,T:T,dot:radarCol,bg:bg,
    logo:await _socLogo(T.ink), drop:await _socDrop(col), bean:await _socBean(col)};
  var sc={fragrance:full.fragrance,acidity:full.acidity,sweetness:full.sweetness,body:full.body,aftertaste:full.aftertaste};
  var radar=printRadarPNG(sc,radarCol,dark?{grid:'rgba(247,242,237,.32)',label:T.muted}:{});
  var comment=String(full.comment||'').trim();
  var qrSrc=cardQrSrc(nm);
  /* й ҶеәҸеӣәе®ҡпјҡе°Ғйқў вҶ’ йӣ·йҒ” вҶ’ з”ўеҚҖ вҶ’ QRпјҲSquare е•Ҷе“Ғең–зҡ„ијӘж’ӯй ҶеәҸз…§йҖҷеҖӢпјү */
  var defs=[['cover',socialCoverHTML(nm,feats,comment,col,o)],['radar',socialRadarHTML(radar,feats,col,o)],['origin',socialOriginHTML(nm,info,col,o)],['qr',socialQrHTML(qrSrc,col,o)]];
  var out=[];
  for(var i=0;i<defs.length;i++){
    step('Rendering image '+(i+1)+' of 4вҖҰ');
    var host=document.createElement('div');
    host.style.cssText='position:absolute;left:-9999px;top:0';
    host.innerHTML=defs[i][1];
    document.body.appendChild(host);
    await Promise.all(Array.prototype.map.call(host.querySelectorAll('img'),function(im){
      if(im.src.slice(0,5)!=='data:')im.crossOrigin='anonymous';
      return (im.complete&&im.naturalWidth)?Promise.resolve():new Promise(function(r){im.onload=r;im.onerror=r;});
    }));
    var canvas=await html2canvas(host.firstChild,{scale:1,useCORS:true,backgroundColor:mode==='clear'?null:bg});
    out.push([defs[i][0],_soc1080(canvas,mode,opts.fmt,opts.quality,bg)]);
    host.remove();
  }
  return {images:out,dark:dark,scrim:scrim,bg:bg};
}
/* mode: 'white'пјҲй җиЁӯпјүпҪң'clear' йҖҸжҳҺпҪң'photo' и©ІиұҶзҡ„иғҢжҷҜз…§йӢӘеӣӣејө */
async function exportSocialImages(full,info,feats,nm,col,btn,mode){
  if(mode===true)mode='white';if(mode===false)mode='clear';   /* иҲҠзҡ„еёғжһ—е‘јеҸ«д»Қзӣёе®№ */
  mode=mode||'white';
  var orig=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Rendering 4 imagesвҖҰ';}
  var box=$('pk-social');if(box)box.innerHTML='<div class="s" style="margin-top:8px;color:var(--muted)">Rendering four square imagesвҖҰ</div>';
  try{
    var r=await renderSocialImages(full,info,feats,nm,col,mode,{onStep:function(m){
      if(box)box.innerHTML='<div class="s" style="margin-top:8px;color:var(--muted)">'+esc(m)+'</div>';
    }});
    var out=r.images,dark=r.dark,scrim=r.scrim,bg=r.bg||'#FAF8F4';
    var bghex=bg.replace('#','').toUpperCase();
    /* иЁӯе®ҡжҸҸиҝ° tagпјҡжҜҸејөзё®ең–дёӢжЁҷдёҖиЎҢгҖҒжӘ”еҗҚеё¶еҫҢз¶ҙвҖ”вҖ”д»ҘеҫҢеӣһй ӯзңӢжӘ”жЎҲе°ұзҹҘйҒ“йӮЈжү№з”ЁдәҶд»ҖйәјиЁӯе®ҡпјҲиҖҒй—Ҷй»һеҗҚпјү */
    var tag=mode==='clear'?'transparent':(mode==='photo'?'photo В· fade '+Math.round(scrim*100)+'%':'colour #'+bghex);
    var sfx=mode==='clear'?'-transparent':(mode==='photo'?'-photo-fade'+Math.round(scrim*100):(bghex==='FAF8F4'?'':'-bg-'+bghex));
    var thumbBg=mode==='clear'?_SOC_CHK:'';
    var lbl=' В· '+tag+((mode==='photo'||dark)?' В· '+(dark?'light text':'dark text'):'');
    if(box)box.innerHTML='<div class="dlab">Four images'+lbl+' вҖ” tap each to save</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">'
      +out.map(function(r,ix){return '<a download="ratio-'+beanSlug(nm)+'-'+(ix+1)+'-'+r[0]+sfx+'.png" href="'+r[1]+'" style="text-decoration:none"><img src="'+r[1]+'" style="width:100%;display:block;border:1px solid var(--line);border-radius:10px;'+thumbBg+'"><div style="text-align:center;font-size:12.5px;color:var(--accent);margin:4px 0 0">'+(ix+1)+' В· '+r[0]+' вҶ“</div><div style="text-align:center;font-size:11.5px;color:var(--muted);margin:0 0 2px">'+esc(tag)+'</div></a>';}).join('')
      +'</div>';
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }catch(e){
    if(box)box.innerHTML='<div class="s" style="color:var(--danger)">Export failed: '+esc(e&&e.message||String(e))+'</div>';
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }
}
/* ===== Marketing вҶ’ IG asset зӣҙжҺҘе…ҘеҸЈпјҡеҲ—дёҠжһ¶дёӯзҡ„иұҶ вҶ’ й»һдёҖж”Ҝй–ӢзҸҫжҲҗзҡ„ Social post kitпјҲopenPromoSheetпјү=====
   жё…е–®е»әзҪ®з…§ openRetailSheetпјҲијү rtl_* иЁҳжҶ¶пјӢDB.syncs дёҠжһ¶иұҶпјүпјҢдҪҶ IG з”ЁжңҖж–°зғҳз„ҷжҺ’жңҖдёҠпјҲе…Ҳд»Ӣзҙ№ж–°й®®зҡ„пјү */
/* дёҠжһ¶иұҶжё…е–®пјӢrtl_* иЁҳжҶ¶пјҲIG asset иҲҮ Post to socials е…ұз”Ёпјүпјҡsynced/paused иұҶжҢүжңҖж–°зғҳз„ҷжҺ’еәҸ */
async function shelfLiveBeans(){
  var m={rtl_price:{},rtl_g:{},rtl_sizes:{},rtl_sold:{}};
  try{var r=await sb.from('app_state').select('key,value').in('key',['rtl_price','rtl_g','rtl_sizes','rtl_sold']);
    (r.data||[]).forEach(function(x){var v=x.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
      if(v&&typeof v==='object')m[x.key]=v;});
  }catch(e){}
  /* proc её¶еҮәдҫҶпјҲproduct_sync жңү process ж¬„пјүпјқжҢ‘иұҶеҷЁеҸҜжҢүиҷ•зҗҶжі•еҲҶиЎҢпјӣе–®е“Ғ process зҙҡгҖҒжӢјй…ҚпјҲprocess з©әпјүеҗҚеӯ—зҙҡ */
  var live=(DB.syncs||[]).filter(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim()&&!isSubName(x.bean_id);})
    .map(function(x){var nm=String(x.bean_id).trim();var pr=x.process||'';var d=null;try{d=shelfLatestRoast(nm,pr||undefined);}catch(e){}return {nm:nm,proc:pr,d:d};})
    .sort(function(a,b){if(!!a.d!==!!b.d)return a.d?-1:1;return String(b.d||'').localeCompare(String(a.d||''))||a.nm.localeCompare(b.nm);});
  return {m:m,live:live};
}
/* ===== Publish дёҖйҚөдёҠжһ¶йқўжқҝпјҲ2026-07-12 зөұж•ҙпјҡCoffee Info/Post to socials/IG asset/Announce еӣӣзЈҒиІјж”¶жҲҗдёҖеҖӢпјү=====

async function runSocialPost(){

  var targets=[].slice.call(document.querySelectorAll('#drawer [data-spt]')).filter(function(el){return el.checked;}).map(function(el){return el.dataset.spt;});
  if(!targets.length){toast('Pick at least one platform');return;}
  var cap=($('sp-cap')?$('sp-cap').value:'').trim();
  if(S.postedToday&&!confirm('Already posted '+S.nm+' today вҖ” post again?'))return;
  if(!confirm('Post '+S.nm+' to '+targets.map(function(t){return SP_LABEL[t];}).join(' + ')+'?'))return;
  var b=$('sp-go');b.disabled=true;
  try{
    /* еӣӣејөдёҠеӮіе…¬й–Ӣең–еәҠжӢҝ URLпјҲMeta еҫһ URL жҠ“ең–пјүпјӣд»»дёҖејөеӨұж•—еҚіеҒңгҖҒдёҚжү“ API */
    var urls=[];
    for(var i=0;i<S.images.length;i++){
      b.textContent='Uploading image '+(i+1)+'/'+S.images.length+'вҖҰ';
      var b64=String(S.images[i][1]).split(',')[1];
      var path='social-'+beanSlug(S.nm)+'-'+(i+1)+'.jpg';
      var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/jpeg'),{upsert:true,contentType:'image/jpeg'});
      if(up&&up.error)throw new Error('image upload failed: '+up.error.message);
      var pub=sb.storage.from('mail-assets').getPublicUrl(path);
      var u=pub&&pub.data&&pub.data.publicUrl;
      if(!u)throw new Error('could not get a public image link');
      urls.push(u+'?v='+Date.now());
    }
    b.textContent='PostingвҖҰ';
    var r=await callFn('social-post',{action:'post',caption:cap,image_urls:urls,targets:targets,bean:S.nm});
    var res=(r&&r.results)||{};
    var lines=targets.map(function(t){var x=res[t]||{};return SP_LABEL[t]+' '+(x.ok?'вң“':'вң— вҖ” '+(x.error||'failed'));});
    logAct('posted socials',S.nm,targets.map(function(t){return t+':'+((res[t]||{}).ok?'ok':'fail');}).join(' '));
    var links=targets.filter(function(t){return res[t]&&res[t].ok&&res[t].permalink;})
      .map(function(t){return '<a class="dclose" style="display:block;text-align:center;text-decoration:none" target="_blank" rel="noopener" href="'+esc(res[t].permalink)+'">Open the '+SP_LABEL[t]+' post вҖә</a>';}).join('');
    var host=$('sp-result');
    if(host)host.innerHTML='<div class="s" style="margin-top:8px;white-space:pre-line">'+esc(lines.join('\n'))+'</div>'+links;
    if(r&&r.ok){S.postedToday=true;b.textContent='Posted вң“';toast(lines.join(' В· '));}
    else{b.disabled=false;b.textContent='Post now';alert('Post failed:\n'+lines.join('\n'));}
  }catch(e){b.disabled=false;b.textContent='Post now';alert('Post failed: '+(e&&e.message||e));}
}
/* ===== ж–°иұҶйҖҡзҹҘдҝЎзҫӨзҷјпјҲзӨҫзҫӨжӣқе…ү Phase 4пјҡдёҖд»Ҫе…§е®№дёүзҷјзҡ„гҖҢдҝЎгҖҚвҖ”вҖ”IG/е°Ҹзҙ…жӣёеңЁ Social post kitпјү=====

   дёҚжҳҜ IG tight зүҲпјүвҶ’ send-email announce_coffee зҫӨзҷј */
async function uploadCardForBean(nm,proc){
  try{
    var fq=await fullSampleQuery(nm,proc); /* йӣҷйҚөпјҡиұҶеҗҚпјӢиҷ•зҗҶжі•пјҲproc жңүжүҚйҒҺжҝҫпјү */
    var full=fq&&fq.data&&fq.data[0];if(!full)return '';
    var dots={};try{dots=await cardDots();}catch(e){}
    var blendMap={};
    try{var bq=await sb.from('blends').select('name,parts,note');
      (bq.data||[]).forEach(function(b){if(b.name)blendMap[String(b.name).trim().toLowerCase()]={parts:b.parts||[],note:b.note||''};});}catch(e){}
    var b64=await makeSquareCard(await cardDataFor(full,blendMap,dots));
    if(!b64)return '';
    var path='card-'+cardSlug(nm)+'.png';
    var up=await sb.storage.from('mail-assets').upload(path,_b64ToBlob(b64,'image/png'),{upsert:true,contentType:'image/png'});
    if(up&&up.error)return '';
    var pub=sb.storage.from('mail-assets').getPublicUrl(path);
    var u=pub&&pub.data&&pub.data.publicUrl;
    return u?(u+'?v='+Date.now()):'';
  }catch(e){return '';}
}

async function announceShelfBean(s,nm,btn){
  /* QC й–ҳй–ҖеҗҢ classic listingGateпјҡжү“ж§Қжү№ж“Ӣжӯ»пјҢжІ’ pass/жІ’йҺ–йўЁе‘іеҸӘиӯҰе‘Ҡ */
  var qr=null;try{qr=matchRoast(s);}catch(e){}
  if(qr&&qcState(qr)==='downgrade'){alert('The latest batch is downgraded вҖ” not retail grade.');return;}
  var warns=[];
  if(!qr||!qr.qc)warns.push('no QC pass recorded for the latest batch');
  /* вҳ… зЎ¬ж“ӢпјҲдёүж…Ӣз°ЎеҢ–пјүпјҡжІ’жҳҹпјқжІ’жңүгҖҢеңЁиіЈзүҲжң¬гҖҚиіҮж–ҷжәҗпјҢдёҖеҫӢдёҚеҮҶзҷјпјҲеҺҹжң¬еҸӘи»ҹиӯҰе‘Ҡпјү */
  if(!s.flavour_locked){alert('Only starred coffees can be announced вҖ” add a вҳ… first (it marks the selling version).');return;}
  if(warns.length&&!confirm('Heads up: '+warns.join('; ')+'.\nAnnounce anyway?'))return;
  var res=null;
  try{res=await sb.from('customers').select('id,email').not('email','is',null);}catch(e){}
  var n=(res&&res.data)?res.data.filter(function(c){return c.email;}).length:0;
  if(!n){alert('No customers with an email address yet.');return;}
  if(!confirm('Email "New coffee: '+nm+'" to '+n+' customer'+(n>1?'s':'')+'?'))return;
  var orig=btn.textContent;btn.disabled=true;btn.textContent='SendingвҖҰ';
  try{
    var cardUrl=await uploadCardForBean(nm,s&&s.process);
    var flav=(s.features&&s.features.length)?s.features.slice(0,3).join(', '):'';
    var r=await callFn('send-email',{action:'announce_coffee',name:nm,card_url:cardUrl,flavour:flav,note:(s.comment||'').trim()});
    logAct('announced coffee',nm,(r.sent||0)+' customers'); /* Publish йқўжқҝзҡ„ Email зӢҖж…Ӣйқ йҖҷзӯҶ */
    toast('Sent to '+(r.sent||0)+' of '+(r.total||n)+' customers'+(r.failed?(' В· '+r.failed+' failed'):'')+' вң“');
  }catch(e){alert('Announce failed: '+(e&&e.message||e));}
  btn.disabled=false;btn.textContent=orig;
}
/* ===== еҲӘйҷӨе’–е•ЎиұҶпјҲиҖҒй—Ҷй»һеҗҚпјҡжё…жү“йҢҜеҗҚ/йҮҚиӨҮзҡ„йӣ¶е”®иұҶпјү=====
   еҲӘ samplesпјҲRatio Coffee жқҜжё¬зҙҖйҢ„пјүпјӢroastsпјҲзғҳиұҶжү№ж¬ЎпјүпјӢproduct_syncпјӢapp_state иЁҳжҶ¶йҚөпјӣ
   **з”ҹиұҶеә«еӯҳпјҲbeansпјүж°ёйҒ дёҚзў°**пјӣSquare зӣ®йҢ„дёҠзҡ„е•Ҷе“Ғжң¬иә«з•ҷи‘—пјҲиҰҒз§»йҷӨеҺ» Square еҫҢеҸ°пјүпјҢдҪҶжё…жҺү product_sync еҫҢеә—йқўиҸңе–®е°ұдёҚеҶҚеҲ—е®ғ */
function allRetailCoffees(){
  var seen={},out=[];
  (DB.samples||[]).forEach(function(s){
    var nm=String(s.sample_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].cups++;
  });
  (DB.roasts||[]).forEach(function(r){
    var nm=String(r.bean_name||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
    seen[k].roasts++;
  });
  /* зҙ”дёҠжһ¶еӯӨе…’д№ҹиҰҒеҲ—пјҲеҸӘеңЁ product_syncгҖҒ0 жқҜжё¬ 0 зғҳиұҶвҖ”вҖ”иҖҒй—Ҷзҡ„ Danche ж®ҳз•ҷе°ұжҳҜйҖҷзЁ®жјҸз¶Ійӯҡпјү */
  (DB.syncs||[]).forEach(function(x){
    var nm=String(x.bean_id||'').trim();if(!nm)return;
    var k=nm.toLowerCase();
    if(!seen[k]){seen[k]={name:nm,cups:0,roasts:0};out.push(seen[k]);}
  });
  /* synced еҗ« pausedпјҲе”®зҪ„д№ҹжҳҜдёҠжһ¶дёӯпјүвҖ”вҖ”еҲӘйҷӨжҷӮжүҚжңғйҖЈ Square е•Ҷе“ҒдёҖиө·жӢҶ */
  out.forEach(function(e){e.synced=!!(DB.syncs||[]).find(function(x){return (x.status==='synced'||x.status==='paused')&&String(x.bean_id||'').trim().toLowerCase()===e.name.toLowerCase();});});
  return out.sort(function(a,b){return a.name.localeCompare(b.name);});
}
/* ===== Clean up жё…жҪ”жҢүйҲ•пјҲ2026-07-14 иҖҒй—Ҷй»һеҗҚпјүпјқдёҖйҚөжҺғеӯӨе…’гҖҒеҲҶйЎһжё…зҗҶ =====
   дә”йЎһпјҡA Square жӯ»йҖЈзөҗпјҲedge v28 reconcileпјүпјҸB иҲҠжқҜжё¬пјҲжІ’йҺ–пјӢжІ’иІЁпјқз„ЎеӯҳжӘ”еғ№еҖјпјүпјҸ
   C еҫ…з§Өи¶…жңҹпјҲ>2 еӨ©жІ’ weigh inпјүпјҸD йҷҚзҙҡж»Ҝз•ҷпјҲ>30 еӨ©пјҢзҙ”жҸҗйҶ’пјүпјҸE дёӢжһ¶иЁҳжҶ¶ж®ҳз•ҷпјҲrtl_sold vs еҜҰйҡӣпјүгҖӮ
   жҺғжҸҸжўқд»¶е…ЁйҒөе®ҲйӣҷйҚөиҰҸеүҮпјҲеҗҚеӯ—пјӢиҷ•зҗҶжі•пјүгҖӮ */
async function openCleanupSheet(){
  openDrawerHTML('<div class="t" style="font-size:19px">Clean up</div><div class="empty">ScanningвҖҰ</div>');
  /* B иҲҠжқҜжё¬пјҡжІ’йҺ–пјӢи©ІиұҶпјҲеҗҚпјӢprocKeyпјүжІ’еә«еӯҳжІ’еҫ…з§ӨжІ’йҷҚзҙҡпјӢдёҚеңЁ QC дҪҮеҲ—пјҲйҮҚеҜ©дёӯзҡ„дёҚзў°пјү */
  var inQ={};(QCQ||[]).forEach(function(q){inQ[String(q.s.id)]=1;});
  var oldCups=(DB.samples||[]).filter(function(s){
    if((s.supplier||'')!=='Ratio Coffee'||s.flavour_locked||inQ[String(s.id)])return false;
    var nm=String(s.sample_id||'').trim();if(!nm)return false;
    var isB=rtlIsBlend(nm),proc=isB?undefined:(s.process||'');
    return rstStockKg(nm,isB,proc)<=0&&!rstPendingBatches(nm,isB,proc).length&&!rstDgBatches(nm,isB,proc).length;
  });
  /* C еҫ…з§Өи¶…жңҹ >2 еӨ© */
  var pend=(DB.roasts||[]).filter(function(r){
    return Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'&&r.roast_date&&daysSince(r.roast_date)>2;
  });
  /* D йҷҚзҙҡж»Ҝз•ҷ >30 еӨ© */
  var dgOld=(DB.roasts||[]).filter(function(r){
    return qcState(r)==='downgrade'&&Number(r.remaining_kg)>0&&r.roast_date&&daysSince(r.roast_date)>30;
  });
  /* E rtl_sold ж®ҳз•ҷпјҡиЁҳжҶ¶иӘӘдёӢжһ¶гҖҒproduct_sync иӘӘеңЁиіЈпјқж®ҳз•ҷпјҲжӯ·еҸІ key еҗҚеӯ—зҙҡжҜ”е°Қпјү */
  var soldKeys=[];
  try{
    var rs=await sb.from('app_state').select('value').eq('key','rtl_sold').maybeSingle();
    var v=rs&&rs.data&&rs.data.value;if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v=null;}}
    if(v&&typeof v==='object')Object.keys(v).forEach(function(k){
      if(!v[k])return;
      var lk=String(k).trim().toLowerCase();
      if((DB.syncs||[]).some(function(x){return x.status==='synced'&&String(x.bean_id||'').trim().toLowerCase()===lk;}))soldKeys.push(k);
    });
  }catch(e){}
  /* A жӯ»йҖЈзөҗпјҡedge д№ҫи·‘пјҲйңҖиҰҒзҷ»е…Ҙж…ӢпјӣеӨұж•—дёҚж“Ӣе…¶д»–еҚҖпјү */
  var dead=null,deadErr=null;
  try{var rr=await callFn('sync-to-square',{action:'reconcile'});dead=rr.dead||[];}
  catch(e){deadErr=String(e&&e.message||e);}
  paintCleanup({dead:dead,deadErr:deadErr,oldCups:oldCups,pend:pend,dgOld:dgOld,soldKeys:soldKeys});
}
function paintCleanup(sc){

  var h='<div class="t" style="font-size:19px">Clean up</div>'
    +'<div class="s" style="margin-top:2px">orphans and dead links вҖ” each section cleans separately</div>';

  /* A жӯ»йҖЈзөҗ */
  if(sc.deadErr){any=true;h+=sec('Square dead links')+'<div class="s"><span class="red">scan failed: '+esc(sc.deadErr)+'</span></div>';}
  else if(sc.dead&&sc.dead.length){any=true;
    h+=sec('Square dead links В· '+sc.dead.length,'listed as on sale but the Square item is gone вҖ” customers cannot buy these')
    +sc.dead.map(function(d){var bn=bNoFor(d.bean_id,d.process);return '<div class="dl"><span>'+esc(d.bean_id)+(d.process?' <span style="color:var(--muted);font-size:12px">'+esc(d.process)+'</span>':'')+(bn?' <span style="color:var(--muted);font-size:12px">'+bn+'</span>':'')+'</span><span class="red">'+esc(d.status||'')+'</span></div>';}).join('')
    +'<button class="act" id="cl-fixdead" style="margin-top:8px">Fix '+sc.dead.length+' dead link'+(sc.dead.length>1?'s':'')+'</button>';
  }
  /* B иҲҠжқҜжё¬ */
  if(sc.oldCups.length){any=true;
    h+=sec('Old cupping records В· '+sc.oldCups.length,'no вҳ… and no stock left вҖ” secondary batches, safe to delete')
    +sc.oldCups.map(function(s){var bn=bNoFor(s.sample_id,s.process);return '<div class="dl"><span>'+esc(s.sample_id)+(s.process?' <span style="color:var(--muted);font-size:12px">'+esc(s.process)+'</span>':'')+(bn?' <span style="color:var(--muted);font-size:12px">'+bn+'</span>':'')+'</span><span style="color:var(--muted)">'+(s.cupping_date?fmtD(s.cupping_date):'вҖ”')+'</span></div>';}).join('')

async function lcStart(o){

function lcSub(){
  lcCleanup();

    .on('postgres_changes',{event:'*',schema:'public',table:'cupping_notes',filter:'session_id=eq.'+LC.sid},function(p){
      var row=p&&p.new;if(!row||!row.id)return;
      var i=LC.notes.findIndex(function(n){return n.id===row.id;});
      if(i>-1)LC.notes[i]=row;else LC.notes.push(row);
      lcLiveUpdate();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'cupping_sessions',filter:'id=eq.'+LC.sid},function(p){
      if(p&&p.new){LC.session=p.new;lcPaint();} /* жңүдәәжҸӯжӣүпјқжүҖжңүдәәиҮӘеӢ•зҝ»зүҢ */

    .subscribe();

async function confirmDeleteCoffee(e){
  /* жӢјй…ҚпјқCoffee Stock зҡ„еҲ—еҗҚйқ  blends й…Қж–№вҖ”вҖ”дёҚйҖЈй…Қж–№дёҖиө·еҲӘе°ұжңғж®ҳз•ҷ 0 kg е№ҪйқҲиЎҢпјҲиҖҒй—Ҷй»һеҗҚеҗҢжӯҘпјү */

    if(e.synced){

      catch(err){
        if(!confirm('Square removal failed: '+(err&&err.message||err)+'\n\nDelete the local records anyway? The Square item will stay until you remove it in the Square dashboard.'))return;

    /* Coffee Stock еҗҢжӯҘпјҲ2026-07-12 иҖҒй—Ҷй»һеҗҚпјүпјҡиұҶеҲӘдәҶе°ұеҲҘеҶҚеҲ—вҖ”вҖ”

       жӢјй…Қзҡ„еҲ—еҗҚйқ  blends й…Қж–№ вҶ’ ж•ҙеҲ—еҲӘпјҲconfirm иЁҠжҒҜе·ІеҲ—жҳҺпјӣжҲҗеҲҶиұҶжң¬иә«дёҚеӢ•пјү */
    try{await sb.from('beans').update({roast_target_kg:null,roast_low_kg:null}).ilike('name',e.name);}catch(err){}
    if(hasBlend){try{await sb.from('blends').delete().ilike('name',e.name);}catch(err){}}
    /* app_state иЁҳжҶ¶йҚөеӨ§жҺғйҷӨпјҲеғ№/е…Ӣ/иҰҸж ј/е”®зҪ„/йЎҸиүІпјү */
    var keys=['rtl_price','rtl_g','rtl_sizes','rtl_sold','rtl_dot'];
    for(var i=0;i<keys.length;i++){

        var r=await sb.from('app_state').select('value').eq('key',keys[i]).maybeSingle();

        if(hit)await sb.from('app_state').upsert({key:keys[i],value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
      }catch(err){}
    }

  }catch(err){
    alert('Delete failed: '+(err&&err.message||err));
  }

async function setShelfSold(nm,sold,proc){
  /* proc еҸҜйҒёпјҲ2026-07-13пјүпјҡеҗҢеҗҚеӨҡиҷ•зҗҶжі•иұҶеё¶ process зІҫжә–е®ҡдҪҚйӮЈдёҖеҲ—пјӣжІ’её¶пјқеҗҚеӯ—зҙҡз…§иҲҠ */
  await callFn('sync-to-square',{action:'availability',sample_id:nm,sold_out:!!sold,process:(proc!=null&&String(proc).trim()!=='')?String(proc).trim():null,target_id:beanIdFor(nm,proc)||null});
  var r=await sb.from('app_state').select('value').eq('key','rtl_sold').maybeSingle();
  var v=(r&&r.data&&r.data.value)||{};
  if(typeof v==='string'){try{v=JSON.parse(v);}catch(e){v={};}}
  if(!v||typeof v!=='object')v={};
  var key=(proc!=null&&String(proc).trim()!=='')?(nm+' @ '+String(proc).trim()):nm;
  Object.keys(v).forEach(function(k){if(String(k).trim().toLowerCase()===key.toLowerCase()&&k!==key)delete v[k];});
  if(sold)v[key]=true;else delete v[key];
  var u=await sb.from('app_state').upsert({key:'rtl_sold',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(u.error)throw new Error(u.error.message);
}

async function saveSubForm(){
  var S=SUB_NEW,b=$('sf-save');
  var price=Number(S.price),grams=parseInt(S.grams,10);
  if(!(price>0)){toast('Set a price per box');return;}
  if(!(grams>0)){toast('Set grams per bag');return;}
  if(!S.date){toast('Pick a ship date');return;}
  if(!S.id){
    if(!S.cust&&!(S.nc&&S.nc.name.trim())){toast('Pick or add a customer');return;}
    if(S.nc&&!S.nc.email.trim()&&S.source==='app'){
      if(!confirm('No email вҖ” the payment link cannot be emailed each fortnight. Add anyway?'))return;
    }
  }
  b.disabled=true;b.textContent=S.id?'SavingвҖҰ':'AddingвҖҰ';
  try{
    var custId=S.cust||null;
    if(!S.id&&S.nc&&S.nc.name.trim()){
      var addr={line1:S.nc.line1,suburb:S.nc.suburb,postcode:S.nc.postcode};
      var cr=await sb.from('customers').insert({name:S.nc.name.trim(),type:'retail',phone:S.nc.phone||null,email:S.nc.email||null,address:addr}).select().single();
      if(cr.error)throw new Error(cr.error.message);
      custId=cr.data.id;
      DB.customers.push({id:cr.data.id,name:cr.data.name,email:cr.data.email,type:cr.data.type});
    }
    if(S.id){
      var u=await sb.from('subscriptions').update({plan:S.plan,price:price,grams:grams,source:S.source,
        next_ship_date:S.date,notes:S.notes||null,updated_at:new Date().toISOString()}).eq('id',S.id);
      if(u.error)throw new Error(u.error.message);
      logAct('subscription updated',(custById(S.cust)||{}).name||'');
    }else{
      var ins=await sb.from('subscriptions').insert({customer_id:custId,plan:S.plan,price:price,grams:grams,
        source:S.source,next_ship_date:S.date,notes:S.notes||null});
      if(ins.error)throw new Error(ins.error.message);
      logAct('subscription added',(custById(custId)||{}).name||'');
    }
    await reloadSubs();

    openSubsSheet();
  }catch(e){
    b.disabled=false;b.textContent=S.id?'Save changes':'Add subscriber';
    alert('Save failed: '+(e&&e.message||e));
  }
}
/* ===== иЁӮй–ұеҮәиІЁеҹ·иЎҢпјҲrun sheetпјүпјҡеҲ°жңҹеҚЎжҢүйҖІдҫҶ вҶ’ жҢ‘йҖҷжңҹзҡ„иұҶпјҲе–®е“ҒдёҖж”Ҝ/й…Қж–№дёҖжү№пјҢе…Ёе“ЎеҘ—з”ЁпјүвҶ’ дёҖйҚөжү№ж¬Ўе»әе–®гҖӮ
   йҖҗзӯҶиҷ•зҗҶпјҡinsert еӨұж•—пјқи©ІзӯҶи·ійҒҺгҖҒж—ҘжңҹдёҚжҺЁйҖІпјҢжҳҺеӨ©еҚЎзүҮеҸӘеү©еӨұж•—иҖ…еҶҚжҢүдёҖж¬ЎеҚіеҸҜпјӣ
   йҖЈзөҗ/email еӨұж•—еҸӘз•¶ warningпјҲpayment_link еҶӘзӯүеҸҜйҮҚе‘јпјҢеӮ¬ж¬ҫдҝЎжңғеё¶йҖЈзөҗиЈңж•‘пјү ===== */
var SUBRUN=null;
function subDueList(){return (DB.subs||[]).filter(function(s){return s.status==='active'&&String(s.next_ship_date||'').slice(0,10)<=todayKey();});}
/* дёӢж¬ЎеҮәиІЁпјқеҺҹж—ҘжңҹпјӢйҖұжңҹпјҢдҪҶиҮіе°‘жҳҺеӨ©пјҲз©Қж¬ еӨҡжңҹдёҚжңғжҺЁе®ҢеҸҲз«ӢеҲ»еҲ°жңҹпјү */
function subBump(s){
  var d=new Date(String(s.next_ship_date||'').slice(0,10)+'T00:00:00');
  if(isNaN(d.getTime()))d=new Date();
  d.setDate(d.getDate()+(Number(s.interval_days)||14));
  var t=new Date();t.setDate(t.getDate()+1);t.setHours(0,0,0,0);
  if(d<t)d=t;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
/* ж”¶ж¬ҫжҠҪиұЎй»һпјҲиЁӮй–ұпјүпјҡе…Ё app еҸӘжңүйҖҷеҖӢеҮҪејҸзҹҘйҒ“йҢўжҖҺйәјж”¶гҖӮж—ҘеҫҢжҸӣ StripeпјҸеӯҳеҚЎжүЈж¬ҫеҸӘж”№йҖҷиЈЎпјҢ
   еӣһеҜ«еҗҢдёҖжү№ orders ж¬„дҪҚпјҲpayment_link зӯүпјүпјҢдёӢжёёпјҲзўәиӘҚдҝЎд»ҳж¬ҫйҲ•гҖҒwebhook е°Қеёіпјүд»ӢйқўдёҚи®ҠгҖӮ
   еҶӘзӯүпјҡsync-to-square payment_link е°Қе·ІжңүйҖЈзөҗзҡ„е–®жңғ reuseгҖӮ */
async function subCollectPayment(order,sub){
  if(sub.source==='square')return {ok:true};  /* Square з«ҜиЁӮй–ұе·ІиҮӘеӢ•жүЈж¬ҫ */
  var r=await callFn('sync-to-square',{action:'payment_link',order_id:order.id});
  return {ok:true,url:r&&r.url};
}

async function runSubShipment(due,needSingle,needBlend){
  var singleName=needSingle?($('sr-single')?$('sr-single').value:''):'';
  var blendName='';
  if(needBlend){
    var bf=$('sr-blendfree'),bs=$('sr-blend');
    blendName=((bf&&bf.value.trim())||(bs&&bs.value)||'').trim();
  }
  if(needSingle&&!singleName){toast('Pick the single origin first');return;}
  if(needBlend&&!blendName){toast('Pick or name the blend first');return;}
  if(!confirm('Create '+due.length+' subscription order'+(due.length>1?'s':'')+'?'
    +(singleName?'\nSingle origin: '+singleName:'')+(blendName?'\nBlend: '+blendName:'')))return;
  var b=$('sr-go');b.disabled=true;b.textContent='CreatingвҖҰ';
  var made=0,fails=[],warns=[];
  try{
    /* order_no иҝҙеңҲеӨ–жҹҘдёҖж¬Ў maxпјҲз…§ saveNewOrderпјүпјҢжҲҗеҠҹдёҖзӯҶ ++ дёҖж¬Ў */
    var mx=await sb.from('orders').select('order_no').order('order_no',{ascending:false}).limit(1);
    var nextNo=((mx.data&&mx.data[0]&&mx.data[0].order_no)||0)+1;
    for(var ix=0;ix<due.length;ix++){
      var s=due[ix],c=custById(s.customer_id),nm=(c&&c.name)||'вҖ”';
      b.textContent='CreatingвҖҰ '+(ix+1)+'/'+due.length;
      try{
        var bean=(s.plan==='blend')?blendName:singleName;
        var ins=await sb.from('orders').insert({order_no:nextNo,channel:'subscription',status:'Confirmed',
          customer_id:s.customer_id,items:[{name:bean,grams:Number(s.grams)||150,qty:1,price:Number(s.price)||0}],
          total:Number(s.price)||0,currency:'AUD',payment_method:'platform',
          payment_status:(s.source==='square')?'paid':'pending_payment',
          notes:'Subscription вҖ” '+s.plan+(s.notes?' В· '+s.notes:'')}).select().single();
        if(ins.error)throw new Error(ins.error.message);
        nextNo++;made++;
        var uo=await sb.from('subscriptions').update({next_ship_date:subBump(s),last_order_id:ins.data.id,
          updated_at:new Date().toISOString()}).eq('id',s.id);
        if(uo.error)warns.push(nm+': order #'+String(ins.data.order_no).padStart(4,'0')+' created but the next-ship date did not move вҖ” fix the date in Subscriptions or this box ships twice');
        try{await subCollectPayment(ins.data,s);}
        catch(e1){warns.push(nm+': payment link failed вҖ” resend from the unpaid card later');}
        try{await callFn('send-email',{action:'order_confirmation',order_id:ins.data.id});}
        catch(e2){warns.push(nm+': confirmation email failed');}
      }catch(e){fails.push(nm+': '+(e&&e.message||e));}
    }
    logAct('subscription run',made+' orders',singleName||blendName||'');
    closeDrawer();
    if(fails.length||warns.length){
      alert(made+' order'+(made===1?'':'s')+' created.'
        +(fails.length?'\n\nFailed (still due, run again tomorrow):\nВ· '+fails.join('\nВ· '):'')
        +(warns.length?'\n\nWarnings:\nВ· '+warns.join('\nВ· '):''));
    }else{
      toast(made+' subscription order'+(made===1?'':'s')+' created вң“');
    }
    await reload();view='feed';render();
  }catch(e){
    b.disabled=false;b.textContent='Create '+due.length+' order'+(due.length>1?'s':'');
    alert('Run failed: '+(e&&e.message||e));
  }
}

}

async function saveGreenBean(b,btn){
  var upd={},msg=$('gb-msg');
  document.querySelectorAll('#drawer [data-gf]').forEach(function(inp){
    var f=inp.dataset.gf,v=String(inp.value||'').trim();

    else upd[f]=v===''?null:v;
  });
  if(!upd.name){if(msg)msg.textContent='Name cannot be empty';return;}
  if(greenDupExists(upd.name,upd.process,b.id)){if(msg)msg.textContent='"'+upd.name+'" + "'+(upd.process||'вҖ”')+'" already exists вҖ” use a different process for the same farm';return;}
  var oldName=String(b.name||'').trim(),newName=String(upd.name||'').trim(),renamed=oldName&&newName&&oldName!==newName;
  btn.disabled=true;btn.textContent='SavingвҖҰ';if(msg)msg.textContent='';
  try{
    var u=await sb.from('beans').update(upd).eq('id',b.id);
    if(u.error)throw new Error(u.error.message);
    /* ж”№еҗҚйҖЈйҺ–пјҡе…Ҳйқ  bean_id зІҫжә–ж”№пјҢеҶҚиЈң legacy з„Ў bean_id йқ иҲҠеҗҚвҖ”вҖ”жқҜжё¬/зғҳз„ҷзҙҖйҢ„дёҚи„«йүӨ */
    if(renamed){
      btn.textContent='RelinkingвҖҰ';
      var e1=(await sb.from('samples').update({sample_id:newName}).eq('bean_id',b.id)).error;
      var e1b=(await sb.from('samples').update({sample_id:newName}).is('bean_id',null).eq('sample_id',oldName)).error;
      var e2=(await sb.from('roasts').update({bean_name:newName}).eq('bean_id',b.id)).error;
      var e2b=(await sb.from('roasts').update({bean_name:newName}).is('bean_id',null).eq('bean_name',oldName)).error;
      var eAny=e1||e1b||e2||e2b;
      if(eAny)throw new Error('bean renamed but relinking failed: '+eAny.message+' вҖ” please retry');
      (DB.samples||[]).forEach(function(s){if(String(s.bean_id||'')===String(b.id)||(!s.bean_id&&String(s.sample_id||'')===oldName))s.sample_id=newName;});
      (DB.roasts||[]).forEach(function(r){if(String(r.bean_id||'')===String(b.id)||(!r.bean_id&&String(r.bean_name||'')===oldName))r.bean_name=newName;});
      /* зӨҫзҫӨиғҢжҷҜз…§зҡ„жӘ”еҗҚз¶ҒиұҶеҗҚвҖ”вҖ”дёҖиө·жҗ¬пјҢдёҚз„¶ж–°еҗҚеӯ—жүҫдёҚеҲ°з…§зүҮгҖӮжҗ¬дёҚеӢ•дёҚж“Ӣж”№еҗҚпјҢжҸҗйҶ’йҮҚеӮіеҚіеҸҜ */
      try{
        var mv=await sb.storage.from('mail-assets').move(beanPhotoPath(oldName),beanPhotoPath(newName));
        if(mv&&mv.error&&!/not found/i.test(mv.error.message||''))toast('Renamed вҖ” but the background photo did not move, please re-upload it');
      }catch(e){}
    }
    var i=(DB.beans||[]).findIndex(function(x){return String(x.id)===String(b.id);});
    var nb=Object.assign({},b,upd);
    if(i>-1)DB.beans[i]=nb;
    try{buildItems();}catch(e){}
    toast('Saved вң“');
    openGreenDetail(nb);
  }catch(e){btn.disabled=false;btn.textContent='Save details';if(msg)msg.textContent=String(e&&e.message||e);}
}
/* ===== зҶҹиұҶжү№ж¬Ўжё…е–®пјҲз…§ classic Batch stockпјҡremaining>0гҖҒFIFO жңҖиҲҠе…Ҳз”ЁгҖҒ>30 еӨ©зҙ…гҖҒй»һжү№ж¬ЎиЁҳз”ЁйҮҸпјү===== */
/* ===== Roasted Stock иЎҖжўқзёҪиҰҪпјҲ2026-07-11 еҚҮзҙҡпјү=====
   жҜҸиұҶдёҖиЎҢпјҡеҗҚпјӢеҲҶж®өиЎҖжўқпјҲжҜҸжү№дёҖж®өиҲҠж·ұж–°ж·әпјүпјӢkg жЁҷзұӨпјӣBlendsпҪңSingles еҲҶжӘ”пјҲиҖҒй—ҶжӢҚжқҝеҲҶй–ӢзңӢпјүпјӣ
   дҪҺиЎҖ/и¶…йҮҸжҺ’еүҚпјӢиҪүзҙ…пјӣй»һиЎҢеұ•й–Ӣпјқжү№ж¬ЎжҳҺзҙ°пјӢTarget/Low иЁӯе®ҡпјӢBlend/Roast thisпјӣ
   гҖҢвҲ’гҖҚеҝ«йҖҹжүЈиЎҖпјқйҒёжү№пјӢеҺҹеӣ пјҲDefect/Transfer еҗ«еҺ»еҗ‘/OtherпјүпјҢиЁҳ activity_logгҖӮ
   зғҳе®ҢеҠ иЎҖйӣ¶ж“ҚдҪңпјҲLog roast еҜ« remaining_kg еҚійҖІпјүгҖӮиҲҠ openBatchUse е·Іж”¶з·ЁйҖІжүЈиЎҖиЎЁе–®гҖӮ */
var RST={seg:'blend',open:null};
function rstRows(isBlend){
  /* еҗҚе–®пјҡжӢјй…ҚпјқDB.blends е…ЁеҲ—пјҲ0 иЎҖдҪҺйҮҸжңҖи©ІзңӢеҲ°пјүпјӣе–®е“ҒпјқbeansпјҲжңүиЎҖжҲ–жңүиЁӯй–ҫеҖјпјүвҲӘ жү№ж¬ЎеӯӨе…’еҗҚ */
  var rows=[],seen={};
  if(isBlend){
    (DB.blends||[]).forEach(function(b){
      if(!b.name)return;seen[String(b.name).trim().toLowerCase()]=1;
      rows.push({name:b.name,isBlend:true,target:b.target_kg,low:b.low_stock_kg,ref:b});
    });
  }else{
    /* 2026-07-12 иҷ•зҗҶжі•еҲҶй–ӢпјҡеҗҢеҗҚдёҚеҗҢ process жҳҜдёҚеҗҢе•Ҷе“ҒпјҲFinca Milan Г—6 culturingпјүвҖ”вҖ”
       дёҖж”Ҝ beanпјҲname+process е”ҜдёҖпјүдёҖиЎҢпјҢиЎҖжўқ/жү№ж¬Ў/жүЈиұҶе…ЁжҢү process йҒҺжҝҫ */
    (DB.beans||[]).forEach(function(b){
      var nm=String(b.name||'').trim();if(!nm)return;
      var proc=String(b.process||'').trim();
      var lk=nm.toLowerCase()+'|'+proc.toLowerCase();if(seen[lk])return;
      /* 2026-07-14 иҖҒй—Ҷе®ҡиӘҝпјҡ0kg зҡ„е–®е“ҒдёҚеҲ—вҖ”вҖ”еҸӘжңүеҸҜиіЈ/йҷҚзҙҡ/еҫ…е…Ҙеә«пјҲLog roast еҮәдҫҶзҡ„пјүжүҚзҸҫиә«гҖӮ
         еҺҹгҖҢиЁӯдәҶ target/low е°ұз®— 0kg д№ҹеҲ—гҖҚиҰҸеүҮж”¶жҺүпјҲиіЈе…үзҡ„иұҶеҺ» Coffee Info History зңӢпјү */
      var has=rstStockKg(nm,false,proc)>0||rstDgBatches(nm,false,proc).length>0||rstPendingBatches(nm,false,proc).length>0;
      if(!has)return;seen[lk]=1;
      rows.push({name:nm,proc:proc,isBlend:false,target:b.roast_target_kg,low:b.roast_low_kg,ref:b});
    });
  }
  /* жү№ж¬ЎеӯӨе…’пјҲдё»жӘ”е·ІеҲӘ/process е°ҚдёҚдёҠпјҢдҪҶжү№ж¬ЎжңүиЎҖжҲ–еҫ…з§Өпјүд№ҹиҰҒеҲ—пјҢдёҚиғҪжҶ‘з©әж¶ҲеӨұпјӣе–®е“ҒеӯӨе…’жҢү name+process еҲҶжЎ¶ */
  (DB.roasts||[]).forEach(function(r){
    if((isBlend?r.kind==='blend':r.kind!=='blend')&&(Number(r.remaining_kg)>0||(Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'))){
      var nm=String(r.bean_name||'').trim();if(!nm)return;
      var proc=isBlend?'':String(r.process||'').trim();
      var lk=isBlend?nm.toLowerCase():(nm.toLowerCase()+'|'+proc.toLowerCase());
      if(!seen[lk]){seen[lk]=1;rows.push({name:nm,proc:proc,isBlend:isBlend,target:null,low:null,ref:null});}
    }
  });
  rows.forEach(function(x){
    x.batches=rstBatches(x.name,x.isBlend,x.isBlend?undefined:(x.proc||''));
    /* downgrade жұ еҲҶй–ӢжҺӣпјҲдёҚйҖІиЎҖжўқ/зёҪйҮҸвҖ”вҖ”йӮЈдәӣеҸӘз®—еҸҜиіЈиұҶпјүпјӣжңүйҮҸе°ұеңЁеҲ—иЎЁеё¶зҙ…жЁҷйЎҜзӨә */
    x.dg=rstDgBatches(x.name,x.isBlend,x.isBlend?undefined:(x.proc||''));
    x.dgKg=0;x.dg.forEach(function(r){x.dgKg+=Number(r.remaining_kg)||0;});
    x.dgKg=Math.round(x.dgKg*100)/100;

    openRstDeduct(x,rstGroupByDate(x.batches)[+el.dataset.bat]);

  document.querySelectorAll('#drawer [data-pdbat]').forEach(function(el){el.addEventListener('click',function(){

/* еҝ«йҖҹжүЈиЎҖпјҡйҒёж—Ҙжңҹзө„пјҲй җиЁӯжңҖиҲҠпјүпјӢеҺҹеӣ пјҲз‘•з–ө/иӘҝж’Ҙеҗ«еҺ»еҗ‘/е…¶д»–пјүвҖ”вҖ”еҗҢж—ҘеӨҡйҚӢеҗҲдҪөдёҖзө„гҖҒзө„е…§дҫқеәҸжүЈгҖҒ
   и¶…йҮҸж“ӢеӯҳпјҲеёіиҰҒжҳҺзўәдёҚеҒ·жәўпјүгҖӮ
   Fix kg жЁЎејҸпјҲ2026-07-12 иҖҒй—Ҷй»һеҗҚијёе…ҘйҢҜиӘӨиҰҒиғҪж”№пјүпјҡеҗҢжҠҪеұңеҲҮжҸӣпјҢијёе…Ҙи©Іжү№гҖҢжӯЈзўәзҡ„зёҪ kgгҖҚзӣҙжҺҘиӘҝеҲ°дҪҚвҖ”вҖ”
   еҠ жёӣйғҪдҝ® roasted_kgпјҲжҳҜиЁҳйҢҜдёҚжҳҜиҖ—жҗҚпјүпјҢlogAct иЁҳ corrected дёҚжұЎжҹ“з‘•з–өеёі */
var RSTD={gkey:null,why:'Defect',mode:'ded'};
/* иЈңзҶҹиұҶе…Ҙеә«пјҲ2026-07-13 иҖҒй—Ҷй»һеҗҚйҖЈзөҗ roast logвҶ’coffee stockпјүпјҡеҫ…е…Ҙеә«жү№ж¬Ўй»һиЎҢйҖІдҫҶпјҢ
   еЎ«зҶҹиұҶ kg вҶ’ update roasts roasted_kg+remaining_kgпјқе…Ҙеә«пјҲйҖҷжү№еҫһеҫ…з§Өи®ҠзҸҫиІЁ/еҫ… QCпјүгҖӮеӨұйҮҚзҺҮеҚіжҷӮгҖӮ */
function openWeighIn(r){
  if(!canWrite()){roToast();return;}
  if(!r||!r.id){toast('No batch');return;}
  var green=Number(r.green_kg)||0;
  openDrawerHTML('<div class="t" style="font-size:19px">Weigh in В· '+esc(r.bean_name||'')+(r.process?' <span style="color:var(--muted);font-weight:400;font-size:13px">'+esc(r.process)+'</span>':'')+'</div>'
    +'<div class="s" style="margin-top:2px">roasted '+(r.roast_date?fmtD(r.roast_date):'вҖ”')+' В· green in '+green+' kg вҖ” enter what it weighed out</div>'
    +'<div class="dlab">Roasted out (kg)</div><input class="din" id="wi-out" inputmode="decimal" placeholder="e.g. '+(green?Math.round(green*0.86*10)/10:'8.6')+'">'
    +'<div class="s" style="margin-top:6px;display:flex;justify-content:space-between"><span style="color:var(--muted)">weight loss</span><span id="wi-loss" style="color:var(--accent);font-weight:700">вҖ”</span></div>'
    +'<button class="act" id="wi-save" style="margin-top:12px">Weigh in вҖ” into stock</button>'
    +'<button class="dclose" id="wi-back">вҖ№ Back to stock</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  var outEl=$('wi-out');
  function upd(){var el=$('wi-loss');if(!el)return;var lp=roastLossPct(green,outEl.value);el.textContent=lp!=null?'вҲ’'+lp+'%':'вҖ”';}
  if(outEl)outEl.addEventListener('input',upd);
  $('wi-back').addEventListener('click',openBatchesSheet);
  $('d-cl').addEventListener('click',closeDrawer);
  $('wi-save').addEventListener('click',async function(){
    var out=parseFloat(outEl.value);
    if(isNaN(out)||out<=0){toast('Enter the roasted kg');return;}
    if(out>green&&!confirm('Roasted out ('+out+' kg) is more than green in ('+green+' kg). Save anyway?'))return;
    var btn=this;btn.disabled=true;btn.textContent='SavingвҖҰ';
    try{
      var u=await sb.from('roasts').update({roasted_kg:out,remaining_kg:out}).eq('id',r.id);
      if(u.error)throw new Error(u.error.message);
      var rr=(DB.roasts||[]).find(function(z){return String(z.id)===String(r.id);});if(rr){rr.roasted_kg=out;rr.remaining_kg=out;}
      logAct('weighed in',r.bean_name||('roast '+r.id),green+' вҶ’ '+out+' kg');
      toast('Weighed in вң“ '+out+' kg into stock');
      await reload();openBatchesSheet();
    }catch(e){
      btn.disabled=false;btn.textContent='Weigh in вҖ” into stock';
      alert('Failed: '+(e&&e.message||e));
    }
  });
}
function openRstDeduct(x,preGroup,pool){ /* preGroupпјқеҫһжү№ж¬ЎеҲ—иЎЁй»һиЎҢйҖІдҫҶгҖҒй җйҒёйӮЈдёҖеӨ©пјҲv3пјүпјӣpoolпјқжҢҮе®ҡжү№ж¬Ўжұ пјҲйҷҚзҙҡжұ з”ЁпјүпјҢ
  жІ’зөҰпјқеҸҜиіЈжұ пјҢеҸҜиіЈжұ з©әжҷӮйҖҖеҲ°йҷҚзҙҡжұ пјҲзҙ”йҷҚзҙҡиұҶд№ҹиғҪз”ЁгҖҢвҲ’гҖҚжё…зҗҶпјү */
  if(!canWrite()){roToast();return;}
  var groups=rstGroupByDate(pool||(x.batches.length?x.batches:(x.dg||[])));
  if(!groups.length){toast('No batches to deduct from');return;}
  RSTD={gkey:(preGroup||groups[0]).key,why:'Defect',mode:'ded'};
  openDrawerHTML('<div class="t" style="font-size:19px">'+esc(x.name)+(x.proc?' <span style="color:var(--muted);font-weight:400;font-size:13px">'+esc(x.proc)+'</span>':'')+'</div>'
    +'<div class="s" style="margin-top:2px">pick the batch вҖ” the date decides which roast you take from</div>'
    +'<div class="pm-seg" style="margin-top:10px"><button id="rd-m-d">Deduct</button><button id="rd-m-f">Fix kg В· typo</button></div>'
    +'<div class="dlab">Batch</div><div id="rd-bats">'
    +groups.map(function(g){return '<button class="chip" data-rb="'+esc(g.key)+'" style="margin-bottom:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:3px;background:'+rstFreshColor(g.date)+';margin-right:5px;vertical-align:0"></span>'+(g.date?fmtD(g.date):'no date')+' В· '+g.kg+' kg</button>';}).join(' ')+'</div>'
    +'<div class="dlab" id="rd-kglab">Kg to deduct</div><input class="din" id="rd-kg" inputmode="decimal" placeholder="e.g. 0.5">'
    +'<div id="rd-whywrap"><div class="dlab">Why</div><div id="rd-whys">'
    +['Defect','Transfer','Other'].map(function(w){return '<button class="chip" data-rw="'+w+'" style="margin-bottom:6px">'+w+'</button>';}).join(' ')+'</div>'
    +'<div id="rd-towrap" style="display:none"><div class="dlab">Transfer to</div><input class="din" id="rd-to" placeholder="own shop / cafe name"></div></div>'
    +'<div class="s" id="rd-fixhint" style="display:none;margin-top:8px;color:var(--muted)">for typos вҖ” sets this batch to the number you type, no defect on record</div>'
    +'<button class="act" id="rd-save">Deduct</button>'
    +'<button class="dclose" id="rd-back">вҖ№ Back to stock</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Close</button>');
  function paint(){
    var fix=RSTD.mode==='fix';
    var g=groups.find(function(b){return b.key===RSTD.gkey;});
    $('rd-m-d').className=fix?'':'on';$('rd-m-f').className=fix?'on':'';
    document.querySelectorAll('#rd-bats .chip').forEach(function(c){var on=c.dataset.rb===RSTD.gkey;c.style.borderColor=on?'var(--accent)':'';c.style.color=on?'var(--accent)':'';});
    document.querySelectorAll('#rd-whys .chip').forEach(function(c){var on=c.dataset.rw===RSTD.why;c.style.borderColor=on?'var(--accent)':'';c.style.color=on?'var(--accent)':'';});
    $('rd-whywrap').style.display=fix?'none':'';
    $('rd-fixhint').style.display=fix?'':'none';
    $('rd-towrap').style.display=(!fix&&RSTD.why==='Transfer')?'':'none';
    $('rd-kglab').textContent=fix?('Correct total kg вҖ” now '+(g?g.kg:'?')+' kg'):'Kg to deduct';
    $('rd-kg').placeholder=fix?(g?String(g.kg):''):'e.g. 0.5';
    $('rd-save').textContent=fix?'Save correction':'Deduct';
  }
  paint();
  $('rd-m-d').addEventListener('click',function(){if(RSTD.mode!=='ded'){RSTD.mode='ded';paint();}});
  $('rd-m-f').addEventListener('click',function(){if(RSTD.mode!=='fix'){RSTD.mode='fix';paint();}});
  document.querySelectorAll('#rd-bats .chip').forEach(function(c){c.addEventListener('click',function(){RSTD.gkey=c.dataset.rb;paint();});});
  document.querySelectorAll('#rd-whys .chip').forEach(function(c){c.addEventListener('click',function(){RSTD.why=c.dataset.rw;paint();});});
  $('rd-back').addEventListener('click',openBatchesSheet);
  $('d-cl').addEventListener('click',closeDrawer);
  $('rd-save').addEventListener('click',async function(){
    var g=groups.find(function(b){return b.key===RSTD.gkey;});
    if(!g){toast('Pick a batch');return;}
    /* Fix kg жЁЎејҸпјҡијёе…Ҙзҡ„жҳҜгҖҢжӯЈзўәзҡ„зёҪ kgгҖҚпјҢзӣҙжҺҘиӘҝеҲ°дҪҚпјӣroasted_kg еҗҢжӯҘдҝ®пјҲиЁҳйҢҜдёҚжҳҜиҖ—жҗҚпјү */
    if(RSTD.mode==='fix'){
      var cv=parseFloat(($('rd-kg').value||'').trim());
      if(isNaN(cv)||cv<0){toast('Enter the correct kg');return;}
      var diff=Math.round((cv-g.kg)*1000)/1000;
      if(Math.abs(diff)<0.0005){toast('Already '+g.kg+' kg вҖ” nothing to fix');return;}
      var fbtn=$('rd-save');fbtn.disabled=true;fbtn.textContent='SavingвҖҰ';
      var ferr=null;
      if(diff>0){ /* е°‘иЁҳдәҶпјқиЈңеҲ°зө„е…§з¬¬дёҖйҚӢпјҲеҗҢж—ҘеҗҢиұҶпјҢе“ӘйҚӢз„ЎжүҖи¬Ӯпјү */
        var fr=g.batches[0];
        var fu={remaining_kg:Math.round(((Number(fr.remaining_kg)||0)+diff)*1000)/1000,
                roasted_kg:Math.round(((Number(fr.roasted_kg)||0)+diff)*1000)/1000};
        var fq=await sb.from('roasts').update(fu).eq('id',fr.id);
        if(fq.error)ferr=fq.error.message;else Object.assign(fr,fu);
      }else{ /* еӨҡиЁҳдәҶпјқзө„е…§дҫқеәҸжёӣжҺү */
        var fleft=-diff;
        for(var fi=0;fi<g.batches.length&&fleft>0.0001;fi++){
          var fr2=g.batches[fi];
          var fh=Number(fr2.remaining_kg)||0;if(!(fh>0))continue;
          var ftake=Math.min(fh,fleft);
          var fu2={remaining_kg:Math.max(0,Math.round((fh-ftake)*1000)/1000),
                   roasted_kg:Math.max(0,Math.round(((Number(fr2.roasted_kg)||0)-ftake)*1000)/1000)};
          var fq2=await sb.from('roasts').update(fu2).eq('id',fr2.id);
          if(fq2.error){ferr=fq2.error.message;break;}
          Object.assign(fr2,fu2);fleft-=ftake;
        }
      }
      if(ferr){fbtn.disabled=false;fbtn.textContent='Save correction';alert('Fix failed: '+ferr);buildItems();openBatchesSheet();return;}
      logAct('corrected roasted kg',x.name,g.kg+' вҶ’ '+cv+' kg В· '+(g.date?fmtD(g.date):'no date'));
      toast('Fixed вң“ batch is now '+cv+' kg');
      buildItems();openBatchesSheet();return;
    }
    var v=parseFloat(($('rd-kg').value||'').trim());
    if(isNaN(v)||v<=0){toast('Enter the kg');return;}
    var have=g.kg;
    if(v>have+0.0001){toast('That batch only has '+have+' kg');return;} /* и¶…йҮҸж“ӢеӯҳвҖ”вҖ”йҒёжү№е°ұжҳҜиҰҒеёізӣ®жҳҺзўә */
    var to=RSTD.why==='Transfer'?(($('rd-to').value||'').trim()):'';
    if(RSTD.why==='Transfer'&&!to){toast('Say where it went');return;}
    var btn=$('rd-save');btn.disabled=true;btn.textContent='SavingвҖҰ';
    /* еҗҢж—ҘеӨҡйҚӢпјқзө„е…§дҫқеәҸжүЈпјҲе“ӘдёҖйҚӢе…ҲжүЈз„ЎжүҖи¬ӮпјҢеҗҢдёҖеӨ©зҡ„иұҶпјү */
    var left=v,done=0;
    for(var i=0;i<g.batches.length&&left>0.0001;i++){
      var r=g.batches[i];
      var bh=Number(r.remaining_kg)||0;if(!(bh>0))continue;
      var take=Math.min(bh,left);
      var nr=Math.max(0,Math.round((bh-take)*1000)/1000);
      var u=await sb.from('roasts').update({remaining_kg:nr}).eq('id',r.id);
      if(u.error){
        btn.disabled=false;btn.textContent='Deduct';
        alert('Failed'+(done>0?' after deducting '+(Math.round(done*1000)/1000)+' kg':'')+': '+u.error.message);
        buildItems();openBatchesSheet();return;
      }
      r.remaining_kg=nr;left-=take;done+=take;
    }
    logAct(RSTD.why==='Transfer'?'transferred roasted':'deducted roasted',x.name,
      v+' kg В· '+(g.date?fmtD(g.date):'no date')+(to?(' вҶ’ '+to):(RSTD.why!=='Transfer'?' В· '+RSTD.why.toLowerCase():'')));
    var leftKg=Math.round((have-v)*1000)/1000;
    toast(leftKg>0?('Deducted вң“ '+leftKg+' kg left in batch'):'Batch used up вң“');
    buildItems();openBatchesSheet();
  });
}

async function saveReceiveSheet(){
  var kg=parseFloat(String(RCV.kg).trim());
  if(isNaN(kg)||kg<=0){toast('Enter the received kg');return;}
  var cost=String(RCV.cost).trim()===''?null:parseFloat(String(RCV.cost).replace(/[^0-9.]/g,''));
  if(cost!=null&&(isNaN(cost)||cost<0)){toast('Cost must be a number');return;}
  var sup=String(RCV.supplier||'').trim(),lot=String(RCV.lot||'').trim();
  var btn=$('rv-save');
  var beanId,after;
  try{
    if(RCV.mode==='existing'){
      var b=(DB.beans||[]).find(function(x){return String(x.id)===String(RCV.beanId);});
      if(!b){toast('Pick a bean first');return;}
      if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
      var nq=Math.round(((Number(b.quantity)||0)+kg)*1000)/1000;
      var upd={quantity:nq};
      if(cost!=null)upd.cost_per_kg=cost;
      if(sup)upd.supplier=sup;
      var u=await sb.from('beans').update(upd).eq('id',b.id);
      if(u.error)throw new Error(u.error.message);
      Object.assign(b,upd);
      beanId=b.id;after=nq;
    }else{
      var nm=String(RCV.name||'').trim();
      if(!nm){toast('Enter the coffee name');return;}
      /* йҳІйҮҚиӨҮпјҡеҗҢеҗҚеҗҢиҷ•зҗҶжі•е·Іжңүжү№ж¬Ў вҶ’ жҸҗйҶ’ж”№з”Ё Existing lot дҪөжү№ */
      var dup=(DB.beans||[]).find(function(x){return String(x.name||'').trim().toLowerCase()===nm.toLowerCase()&&String(x.process||'').trim().toLowerCase()===String(RCV.process||'').trim().toLowerCase();});
      if(dup&&!confirm('"'+nm+'" with this process is already on the books ('+(Number(dup.quantity)||0)+' kg). Create a separate lot anyway?'))return;
      if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
      var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
        name:nm,process:String(RCV.process||'').trim()||null,country:String(RCV.country||'').trim()||null,
        quantity:kg,cost_per_kg:cost,supplier:sup||null};
      var ins=await sb.from('beans').insert(rec).select();
      if(ins.error)throw new Error(ins.error.message);
      DB.beans.push((ins.data&&ins.data[0])||rec);
      beanId=rec.id;after=kg;
    }
    try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'Received'+(sup?' вҖ” '+sup:'')+(lot?' В· lot '+lot:'')});}catch(e){}
    logAct('received green','+'+kg+' kg',sup||null);
    closeDrawer();toast('Received вң“ +'+kg+' kg');
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Add to stock';}
    alert('Receive failed: '+(e&&e.message||e));
  }
}

    rows+='<div class="no-line" style="align-items:center;margin-top:8px">'
      +'<span style="flex:1;min-width:0"><b>'+esc(b.name)+'</b>'+(b.process?' <span style="color:var(--muted);font-size:13px">'+esc(b.process)+'</span>':'')
      +'<br><span style="color:var(--muted);font-size:13px">'+(gNo(b)?gNo(b)+' В· ':'')+'book '+(Number(b.quantity)||0)+' kg</span></span>'

      +'</div>';
  });

    +(rows||'<div class="empty">No green beans on the books</div>')

    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  document.querySelectorAll('#drawer [data-stk]').forEach(function(el){el.addEventListener('input',function(){STK.vals[el.dataset.stk]=el.value;});});
  $('stk-save').addEventListener('click',saveStocktakeSheet);
  $('d-cl').addEventListener('click',closeDrawer);

async function saveStocktakeSheet(){
  var changes=[];
  (DB.beans||[]).forEach(function(b){
    var raw=STK.vals[b.id];
    if(raw==null||String(raw).trim()==='')return;
    var v=parseFloat(String(raw).trim());
    if(isNaN(v)||v<0)return;
    var cur=Number(b.quantity)||0;
    var delta=Math.round((v-cur)*1000)/1000;
    if(Math.abs(delta)<0.0005)return;
    changes.push({b:b,v:v,delta:delta});
  });
  if(!changes.length){toast('No changes to save');return;}
  var btn=$('stk-save');if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
  var ok=0,fail=0,failMsg='';
  for(var i=0;i<changes.length;i++){
    var c=changes[i];
    var u=await sb.from('beans').update({quantity:c.v}).eq('id',c.b.id);
    if(u.error){fail++;failMsg=u.error.message;continue;}
    try{await sb.from('stock_moves').insert({bean_id:c.b.id,kind:'stocktake',delta_kg:c.delta,after_kg:c.v,note:'Bulk stocktake'});}catch(e){}
    c.b.quantity=c.v;ok++;
  }
  if(fail){
    if(btn){btn.disabled=false;btn.textContent='Save stocktake';}
    alert(ok+' saved, '+fail+' failed: '+failMsg);
    return;
  }
  logAct('stocktake',ok+' bean'+(ok>1?'s':'')+' adjusted');
  closeDrawer();toast('Stocktake saved вҖ” '+ok+' bean'+(ok>1?'s':'')+' adjusted вң“');
  await reload();
}

         йҮҚж–° List еҸӘеҜ« product_sync syncedпјҢrtl_sold иҲҠжЁҷиЁҳжІ’дәәжё… вҶ’ жҳҺжҳҺеңЁиіЈйӮ„жҺӣ Off shelfпјү */
      Object.keys(m.rtl_sold).forEach(function(k){

    if(!s.flavour_locked&&!LST.requeue&&(!LST.upd||LST.lock)){try{await starSample(s,true);}catch(e){}}

/* ===== жқҜжё¬еҝ«йҢ„пјҲз…§ classic submitCupping иҰҸеүҮпјҡsamples insertпјӢжү№ж¬ЎжЁҷ cupped вҶ’ йҖІ QC дҪҮеҲ—пјү===== */
var CUP=null;
var CUP_FIELDS=[['fragrance','Aroma'],['acidity','Acidity'],['sweetness','Sweetness'],['body','Body'],['aftertaste','Aftertaste']];
async function openCupSheet(i){
  var r=i.ref;
  /* её¶дёҠдёҖж¬ЎеҗҢиұҶзҙҖйҢ„зҡ„йўЁе‘іпјҲDB.samples е·ІзҜ© Ratio CoffeeгҖҒж–°вҶ’иҲҠпјү */
  var prev=null;
  (DB.samples||[]).forEach(function(s){
    if(prev)return;
    if(r.bean_id&&s.bean_id){if(String(s.bean_id)===String(r.bean_id))prev=s;return;}
    if(String(s.sample_id||'').trim().toLowerCase()===String(r.bean_name||'').trim().toLowerCase())prev=s;
  });
  var bean=(DB.beans||[]).find(function(b){return String(b.id)===String(r.bean_id);});
  /* жӢүйңёж°ёйҒ жңүеҖјпјҡдёҠж¬ЎеҗҢиұҶеҲҶж•ёеё¶е…ҘпјҲclamp 1вҖ“3пјүпјҢжІ’жңүе…Ё 2пјқMedium */
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(prev?prev[f[0]]:null);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(r.bean_name,dots,r.process);
  CUP={r:r,editId:null,scores:sc,dot:dk,dot0:dk,
    feats:(prev&&prev.features?prev.features.slice(0,3):[]),comment:'',
    process:(bean&&bean.process)||(prev&&prev.process)||''};
  paintCupSheet();
}
function cupClamp(v){v=Number(v);if(isNaN(v)||v<=0)return 2;return Math.min(3,Math.max(1,v));}
/* Re-cupпјҲиҖҒй—Ҷй»һеҗҚгҖҢжқҜжё¬йңҖиҰҒ re-analysedгҖҚпјүпјҡQC дҪҮеҲ—иЈЎзҡ„жү№ж¬ЎйҮҚй–ӢжқҜжё¬жҠҪеұңпјҢеё¶еҺҹзҙҖйҢ„гҖҒеӯҳжӘ”пјқupdate еҗҢдёҖзӯҶ */
async function openRecupSheet(q){
  var sc={};CUP_FIELDS.forEach(function(f){sc[f[0]]=cupClamp(q.s[f[0]]);});
  var dots={};try{dots=await cardDots();}catch(e){}
  var dk=dotKeyFor(q.r.bean_name||q.s.sample_id,dots,q.r.process||q.s.process);
  CUP={r:q.r,editId:q.s.id,scores:sc,dot:dk,dot0:dk,
    feats:(q.s.features||[]).slice(0,3),comment:String(q.s.comment||''),
    process:q.s.process||''};
  paintCupSheet();
}
/* comment з•ҷзҷҪжҷӮзҡ„иҰҸеүҮзө„еҸҘпјҲиҖҒй—ҶжӢҚжқҝпјҡжң¬ж©ҹзө„еҸҘдёҚе‘јеҸ« AIпјүпјҡйўЁе‘іи©һпјӢй«ҳеҲҶж„ҹе®ҳпјҢзёҪй•· вүӨ30 еӯ—е…ғ */
function cupAutoComment(sc,feats){
  sc=sc||{};
  var fl=(feats||[]).filter(Boolean);
  var out=fl.slice(0,2).join(', ');
  if(out.length>22)out=fl[0]||'';
  var cand=[];
  if((sc.acidity||0)>=2.5)cand.push([sc.acidity,'bright']);
  if((sc.sweetness||0)>=2.5)cand.push([sc.sweetness,'sweet']);
  if((sc.body||0)>=2.5)cand.push([sc.body,'syrupy']);
  else if(sc.body&&sc.body<=1.5)cand.push([2,'silky']);
  if((sc.aftertaste||0)>=2.5)cand.push([sc.aftertaste,'long finish']);
  if((sc.fragrance||0)>=2.5)cand.push([sc.fragrance,'perfumed']);
  cand.sort(function(a,b){return b[0]-a[0];});
  var first=true;
  for(var i=0;i<cand.length;i++){
    var sep=out?(first?' В· ':', '):'';
    if((out+sep+cand[i][1]).length>30)continue;
    out+=sep+cand[i][1];first=false;
  }
  return out;
}
/* Cup v2пјҲжқҜжё¬её«иҰ–и§’иЁӯиЁҲи©•еҜ©пјүпјҡжҲҗе“Ғй җиҰҪеҚЎпјҲйӣ·йҒ”пјӢйўЁе‘іпјӢcomment еҗҲдёҖпјүпјӢдә”жўқжӢүйңёеҚіжҷӮй©…еӢ• */
function paintCupSheet(){
  var r=CUP.r,K=CUP_FIELDS;
  var cx=150,cy=118,R=84;

  var rings=[1,2,3].map(function(l){

    return '<path d="'+p+'Z" fill="none" stroke="var(--line2)" stroke-width="1"/>';
  }).join('');
  var spokes=K.map(function(_,i){var q=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="var(--line2)" stroke-width="1"/>';}).join('');
  var labels=K.map(function(k,i){
    var q=pt(i,R+16);var anch=q[0]<cx-4?'end':(q[0]>cx+4?'start':'middle');
    return '<text x="'+q[0].toFixed(1)+'" y="'+(q[1]+4).toFixed(1)+'" text-anchor="'+anch+'" font-size="11.5" font-weight="600" fill="var(--muted)">'+k[1]+'</text>';
  }).join('');
  var dots=K.map(function(_,i){return '<circle id="cup-dot'+i+'" r="3.5" fill="var(--accent)"/>';}).join('');
  openDrawerHTML('<div class="t" style="font-size:19px">'+(CUP.editId?'View/Edit':'Cup')+' В· '+esc(r.bean_name||'вҖ”')+(rNo(r)?' <span style="color:var(--muted);font-weight:400;font-size:13px">'+rNo(r)+'</span>':'')+'</div>'
    +'<div class="s" style="margin-top:2px">'+(r.roast_date?'roasted '+fmtD(r.roast_date)+' В· ':'')+(CUP.editId?'updates the existing cupping record':'saves a cupping record and queues it for QC')+'</div>'
    +'<div style="border:1.5px solid var(--ink);border-radius:14px;padding:12px 10px;margin-top:12px;background:var(--surface)">'
    +'<svg viewBox="0 0 300 236" style="width:100%;max-width:300px;display:block;margin:0 auto">'+rings+spokes
    +'<polygon id="cup-poly" points="" fill="var(--accent)" fill-opacity=".18" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>'
    +dots+labels+'</svg>'
    +'<div id="cup-flprev" style="text-align:center;margin-top:4px;font-family:\'Fraunces\',serif;font-weight:700;font-size:17px"></div>'
    +'<div id="cup-cprev" style="text-align:center;margin-top:3px;font-size:13px;color:var(--muted);font-style:italic"></div>'
    /* зӣёе°ҚйЎҸиүІпјҲиҖҒй—Ҷе®ҡзҡ„еӣӣиүІпјҡй»ғ/и—Қ/зҙ…/ж·ұи—ҚпјқиіҮиЁҠеҚЎ band иүІпјүпјӣNoneпјқдёҚжЁҷиүІ */
    +'<div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-top:12px">'
    +['y','b','r','d'].map(function(k){
      return '<button data-cupdot="'+k+'" aria-label="'+k+'" style="width:28px;height:28px;border-radius:50%;cursor:pointer;background:'+uiDot(RTL_DOTCOL[k])+';border:2px solid '+(CUP.dot===k?'var(--ink)':'transparent')+';box-shadow:'+(CUP.dot===k?'0 0 0 2px var(--surface) inset':'none')+'"></button>';
    }).join('')
    +'<button data-cupdot="" aria-label="none" style="width:28px;height:28px;border-radius:50%;cursor:pointer;background:none;border:2px '+(CUP.dot===''?'solid var(--ink)':'dashed var(--line2)')+';color:var(--muted);font-size:13px;line-height:1">вң•</button>'
    +'</div>'
    +'</div>'
    +K.map(function(k){
      return '<div style="display:flex;align-items:center;gap:10px;margin-top:13px">'
        +'<span style="flex:0 0 76px;font-size:13px;font-weight:600;color:var(--muted)">'+k[1]+'</span>'
        +'<span style="font-size:10.5px;color:var(--muted)">light</span>'
        +'<input type="range" data-cup="'+k[0]+'" min="1" max="3" step="0.5" value="'+CUP.scores[k[0]]+'" style="flex:1;accent-color:var(--accent)">'
        +'<span style="font-size:10.5px;color:var(--muted)">heavy</span></div>';
    }).join('')
    +'<div class="dlab">Flavours</div>'
    +[0,1,2].map(function(ix){return '<input class="din" id="cup-f'+ix+'" maxlength="22" placeholder="e.g. Blueberry" value="'+esc(CUP.feats[ix]||'')+'">';}).join('')
    +'<div class="dlab">Comment В· 30 chars В· blank = auto</div>'
    +'<input class="din" id="cup-c" maxlength="30" placeholder="вҖ”" value="'+esc(CUP.comment)+'">'
    +'<button class="act" id="cup-save">'+(CUP.editId?'Update cupping':'Save cupping')+'</button>'

  function grab(){

  function preview(){

async function saveCupSheet(){
  var r=CUP.r;
  var name=String(r.bean_name||'').trim();
  if(!name){toast('This batch has no coffee name');return;}
  var sc=CUP.scores;
  var feats=CUP.feats.filter(Boolean);
  var hasInfo=CUP_FIELDS.some(function(f){return sc[f[0]]>0;})||feats.length||CUP.comment;
  if(!hasInfo){toast('Add a score, flavour or note first');return;}
  /* Re-cupпјҡupdate еҺҹзҙҖйҢ„пјҲдёҚеӢ• no/ж—ҘжңҹгҖҒдёҚеҶҚеӢ• roastsгҖҒдёҚжҹҘйҮҚиӨҮпјү */
  if(CUP.editId){
    var btn0=$('cup-save');if(btn0){btn0.disabled=true;btn0.textContent='UpdatingвҖҰ';}
    try{
      var up={fragrance:sc.fragrance||null,acidity:sc.acidity||null,sweetness:sc.sweetness||null,body:sc.body||null,aftertaste:sc.aftertaste||null,
        features:feats,comment:(CUP.comment||cupAutoComment(sc,feats))||null,cupper:WHO||null};
      var uq=await sb.from('samples').update(up).eq('id',CUP.editId);
      if(uq.error){var up2=Object.assign({},up);delete up2.features;delete up2.cupper;uq=await sb.from('samples').update(up2).eq('id',CUP.editId);}
      if(uq.error)throw new Error(uq.error.message);
      if(CUP.dot!==CUP.dot0){try{await saveDotFor(name,CUP.dot,CUP.process);}catch(e){toast('Saved, but colour failed');}}
      toast('Cupping updated вң“');
      await reload();openQCSheet(); /* еӣһ QC жҠҪеұң */
    }catch(e){
      if(btn0){btn0.disabled=false;btn0.textContent='Update cupping';}
      alert('Update failed: '+(e&&e.message||e));
    }
    return;
  }
  var today=todayStr();
  /* йҳІе‘ҶпјҡеҗҢиұҶеҗҢж—ҘеҗҢиҷ•зҗҶжі•е·ІжңүзҙҖйҢ„пјҲ2026-07-13 еҠ  processвҖ”вҖ”еҗҢеҗҚдёҚеҗҢиҷ•зҗҶжі•еҗҢж—ҘжқҜжё¬дёҚиӘӨж“Ӣпјү */
  var isDup=(DB.samples||[]).some(function(x){
    return x.cupping_date===today&&String(x.sample_id||'').trim().toLowerCase()===name.toLowerCase()
      &&procKey(x.process)===procKey(CUP.process);
  });
  if(isDup&&!confirm('"'+name+'" already has a cupping record today. Save another?'))return;
  var btn=$('cup-save');if(btn){btn.disabled=true;btn.textContent='SavingвҖҰ';}
  try{
    /* No. дҫқж—ҘжңҹйҖЈиҷҹпјҲеҗҢ classic nextNoпјҢж”№жҲҗеӯҳжӘ”жҷӮзҸҫжҹҘпјү */
    var mx=await sb.from('samples').select('no').eq('cupping_date',today).order('no',{ascending:false}).limit(1);
    var no=((mx.data&&mx.data[0]&&Number(mx.data[0].no))||0)+1;
    var rec={no:no,cupping_date:today,roast_date:r.roast_date||null,supplier:'Ratio Coffee',
      sample_id:name,process:String(CUP.process||'').trim()||null,bean_id:r.bean_id||null,
      fragrance:sc.fragrance||null,acidity:sc.acidity||null,sweetness:sc.sweetness||null,body:sc.body||null,aftertaste:sc.aftertaste||null,
      features:feats,comment:(CUP.comment||cupAutoComment(sc,feats))||null,decision:null,cupper:WHO||null};
    /* еҗҢ classic зҡ„е®№йҢҜйҸҲпјҡиҲҠж¬„дҪҚзјәе°ұйҖҗеҖӢжӢҝжҺүйҮҚи©Ұ */
    var ins=await sb.from('samples').insert(rec).select();
    if(ins.error){var r2=Object.assign({},rec);delete r2.features;ins=await sb.from('samples').insert(r2).select();}
    if(ins.error){var r3=Object.assign({},rec);delete r3.features;delete r3.cupper;ins=await sb.from('samples').insert(r3).select();}
    if(ins.error){var r4=Object.assign({},rec);delete r4.features;delete r4.cupper;delete r4.bean_id;ins=await sb.from('samples').insert(r4).select();}
    if(ins.error)throw new Error(ins.error.message);
    var u=await sb.from('roasts').update({status:'cupped'}).eq('id',r.id);
    if(u.error)throw new Error('sample saved but batch status update failed: '+u.error.message);
    if(CUP.dot!==CUP.dot0){try{await saveDotFor(name,CUP.dot,CUP.process);}catch(e){toast('Saved, but colour failed');}}
    logAct('cupped',name);
    toast('Cupped вң“ now in the QC queue');
    await reload();openQCSheet(); /* еӣһ QC жҠҪеұң */
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Save cupping';}
    alert('Save failed: '+(e&&e.message||e));
  }
}
/* ===== з”ҹиұҶжЁЈе“ҒеҲҶжһҗ Sample analyseпјҲзјәеҸЈ #12пјҢиҮӘ classic loadSamples/saveSample з§»жӨҚпјү=====

function wireSampleRowActions(){

/* иЎЁе–®пјҡжҠ„ paintCupSheet зҡ„жҙ»йӣ·йҒ”пјӢж»‘жЎҝпјҲзҚЁз«Ӣж–ј CUP зҶҹиұҶжөҒзЁӢпјүпјӣs=null ж–°еўһгҖҒs=зҙҖйҢ„ з·ЁијҜ */
function openSampleForm(s){
  if(!canWrite()){roToast();return;}
  SMP={editId:s?s.id:null,date:(s&&String(s.cupping_date||'').slice(0,10))||todayStr(),name:(s&&s.sample_id)||'',supplier:(s&&s.supplier)||'',process:(s&&s.process)||'',
    scores:{fragrance:(s&&s.fragrance)||2,acidity:(s&&s.acidity)||2,sweetness:(s&&s.sweetness)||2,body:(s&&s.body)||2,aftertaste:(s&&s.aftertaste)||2},
    feats:(s&&(s.features||[]).filter(Boolean))||[],comment:(s&&s.comment)||''};

function paintSampleForm(){
  var K=CUP_FIELDS;
  var cx=150,cy=118,R=84;
  function pt(i,rad){var a=i*2*Math.PI/5;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];}
  var rings=[1,2,3].map(function(l){
    var p='';for(var i=0;i<=5;i++){var q=pt(i%5,R*l/3);p+=(i?'L':'M')+q[0].toFixed(1)+','+q[1].toFixed(1);}
    return '<path d="'+p+'Z" fill="none" stroke="var(--line2)" stroke-width="1"/>';
  }).join('');
  var spokes=K.map(function(_,i){var q=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="var(--line2)" stroke-width="1"/>';}).join('');
  var labels=K.map(function(k,i){
    var q=pt(i,R+16);var anch=q[0]<cx-4?'end':(q[0]>cx+4?'start':'middle');
    return '<text x="'+q[0].toFixed(1)+'" y="'+(q[1]+4).toFixed(1)+'" text-anchor="'+anch+'" font-size="11.5" font-weight="600" fill="var(--muted)">'+k[1]+'</text>';
  }).join('');
  var dots=K.map(function(_,i){return '<circle id="smp-dot'+i+'" r="3.5" fill="var(--accent)"/>';}).join('');
  openDrawerHTML('<div class="t" style="font-size:19px">'+(SMP.editId?'Edit sample':'New sample')+'</div>'
    +'<div class="s" style="margin-top:2px">green sample cupping вҖ” scores, flavours and a one-liner</div>'
    +'<div class="dlab">Cupping date</div><input class="din" id="sf-date" type="date" value="'+esc(SMP.date)+'">'
    +'<div class="dlab">Sample name</div><input class="din" id="sf-name" placeholder="e.g. Kii AB" value="'+esc(SMP.name)+'">'
    +'<div class="dlab">Supplier</div><input class="din" id="sf-sup" placeholder="e.g. Melbourne Coffee Merchants" value="'+esc(SMP.supplier)+'">'
    +'<div class="dlab">Process</div><input class="din" id="sf-proc" placeholder="e.g. Washed" value="'+esc(SMP.process)+'">'
    +'<div style="border:1.5px solid var(--ink);border-radius:14px;padding:12px 10px;margin-top:12px;background:var(--surface)">'
    +'<svg viewBox="0 0 300 236" style="width:100%;max-width:300px;display:block;margin:0 auto">'+rings+spokes
    +'<polygon id="smp-poly" points="" fill="var(--accent)" fill-opacity=".18" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>'
    +dots+labels+'</svg>'
    +'<div id="smp-flprev" style="text-align:center;margin-top:4px;font-family:\'Fraunces\',serif;font-weight:700;font-size:17px"></div>'
    +'<div id="smp-cprev" style="text-align:center;margin-top:3px;font-size:13px;color:var(--muted);font-style:italic"></div>'
    +'</div>'
    +K.map(function(k){
      return '<div style="display:flex;align-items:center;gap:10px;margin-top:13px">'
        +'<span style="flex:0 0 76px;font-size:13px;font-weight:600;color:var(--muted)">'+k[1]+'</span>'
        +'<span style="font-size:10.5px;color:var(--muted)">light</span>'
        +'<input type="range" data-sf="'+k[0]+'" min="1" max="3" step="0.5" value="'+SMP.scores[k[0]]+'" style="flex:1;accent-color:var(--accent)">'
        +'<span style="font-size:10.5px;color:var(--muted)">heavy</span></div>';
    }).join('')
    +'<div class="dlab">Flavours</div>'
    +[0,1,2].map(function(ix){return '<input class="din" id="sf-f'+ix+'" maxlength="22" placeholder="e.g. Blueberry" value="'+esc(SMP.feats[ix]||'')+'">';}).join('')
    +'<div class="dlab">Comment В· 30 chars В· blank = auto</div>'
    +'<input class="din" id="sf-c" maxlength="30" placeholder="вҖ”" value="'+esc(SMP.comment)+'">'
    +'<button class="act" id="sf-save">'+(SMP.editId?'Update sample':'Save sample')+'</button>'
    +'<button class="dclose" id="sf-back">вҖ№ Back to samples</button>'
    +'<button class="dclose" id="d-cl" style="border:none;background:none;color:var(--muted)">Cancel</button>');
  function grab(){
    document.querySelectorAll('#drawer [data-sf]').forEach(function(el){SMP.scores[el.dataset.sf]=parseFloat(el.value)||2;});

    SMP.comment=($('sf-c').value||'').trim();

  }

    grab();

  [0,1,2].forEach(function(ix){$('sf-f'+ix).addEventListener('input',preview);});
  $('sf-c').addEventListener('input',preview);
  $('sf-back').addEventListener('click',openSampleSheet);
  $('d-cl').addEventListener('click',closeDrawer);
  $('sf-save').addEventListener('click',saveSampleForm);
  preview();
}

      var isDup=dupKey&&SMPL.list.some(function(x){return String(x.cupping_date||'').slice(0,10)===SMP.date&&String(x.sample_id||'').trim().toLowerCase()===dupKey;});
      if(isDup&&!confirm('"'+SMP.name+'" already has a record on '+fmtD(SMP.date)+' вҖ” save another?')){btn.disabled=false;btn.textContent='Save sample';return;}

    try{
      /* еҗҢеҗҚпјӢеҗҢиҷ•зҗҶжі•дҪөжү№пјҢеҗҰеүҮж–°е»әпјҲз…§ classicпјӣbean id еүҚз«Ҝз”ҹжҲҗеҗҢ saveReceiveSheetпјү */
      var n=String(p.name||'').trim().toLowerCase(),pr=String(p.process||'').trim().toLowerCase();
      var bean=(DB.beans||[]).find(function(b){return String(b.name||'').trim().toLowerCase()===n&&String(b.process||'').trim().toLowerCase()===pr;});
      var beanId,after;
      if(bean){
        var nq=Math.round(((Number(bean.quantity)||0)+kg)*1000)/1000;
        var upd={quantity:nq};
        if(p.cost_per_kg!=null)upd.cost_per_kg=p.cost_per_kg;
        if(p.supplier)upd.supplier=p.supplier;
        var u=await sb.from('beans').update(upd).eq('id',bean.id);
        if(u.error)throw new Error(u.error.message);
        Object.assign(bean,upd);
        beanId=bean.id;after=nq;
      }else{
        var rec={id:'bean_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8),
          name:p.name,process:p.process||null,country:p.country||null,quantity:kg,cost_per_kg:p.cost_per_kg,supplier:p.supplier||null};

        if(ins.error)throw new Error(ins.error.message);

        beanId=rec.id;after=kg;
      }
      try{await sb.from('stock_moves').insert({bean_id:beanId,kind:'receive',delta_kg:kg,after_kg:after,note:'PO received'+(p.supplier?' вҖ” '+p.supplier:'')+(lot?' В· lot '+lot:'')});}catch(e){}
      var today=todayKey();
      var pu=await sb.from('purchases').update({status:'received',received_at:today,bean_id:beanId,kg:kg,lot_no:lot||null}).eq('id',p.id);
      if(pu.error)throw new Error('Stock added, but the order status update failed: '+pu.error.message);

      logAct('received green',p.name,kg+' kg В· PO'+(lot?' lot '+lot:''));

      openBuyLogSheet();
    }catch(e){
      btn.disabled=false;btn.textContent='Add to stock';
      alert('Receive failed: '+(e&&e.message||e));
    }
  });

/* жҲҗеҲҶзҶҹиұҶжү№ж¬ЎеҸҜз”ЁйҮҸпјҡйқһ blendгҖҒеҗҢеҗҚгҖҒremaining_kg>0 */
function blendPartPool(name,process,beanId){
  /* жҲҗеҲҶеҸҜз”ЁзҶҹиұҶйҮҸпјҡpart.bean_id иҲҮ roast.bean_id е…©йӮҠйғҪжңүе°ұжҜ” IDпјҲеҗҢеҗҚеӨҡиҷ•зҗҶжі•зІҫжә–пјүпјӣеҗҰеүҮеҗҚеӯ—пјӢиҷ•зҗҶжі• */
  var key=String(name||'').trim().toLowerCase(),pid=(beanId!=null&&String(beanId).trim()!=='')?String(beanId):'',sum=0;
  (DB.roasts||[]).forEach(function(r){
    if(r.kind==='blend'||!(Number(r.remaining_kg)>0))return;
    var m=(pid&&r.bean_id)?(String(r.bean_id)===pid):(String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process));
    if(m)sum+=Number(r.remaining_kg)||0;
  });
  return Math.round(sum*1000)/1000;
}
/* ===== зҶҹиұҶиЎҖжўқ helperпјҲRoasted Stock зёҪиҰҪз”Ёпјү=====
   иЎҖпјқеҗҢеҗҚжү№ж¬Ў remaining_kgпјӣжӢјй…ҚзңӢ kind='blend'гҖҒе–®е“ҒзңӢйқһ blendпјӣжү№ж¬Ўдҫқ roast_date иҲҠвҶ’ж–°пјҲеҗҢиЎҖжўқж®өеәҸпјүгҖӮ
   QC жү“йҖҖпјҲreroast/downgradeпјүдёҚз®—иЎҖвҖ”вҖ”и·ҹ shelfG дёҠжһ¶е·®йЎҚеҗҢиҰҸеүҮпјҢиЎҖжўқпјқеҸҜжӯЈеёёеҮәиІЁзҡ„иұҶ */
/* process з¬¬дёүеҸғж•ёпјҲ2026-07-12 иҷ•зҗҶжі•еҲҶй–ӢпјүпјҡundefinedпјқдёҚйҒҺжҝҫпјҲеҗҚеӯ—зҙҡпјҢеҗ‘еҫҢзӣёе®№пјүпјӣ
   зөҰеӯ—дёІпјҲеҗ«з©әеӯ—дёІпјүпјқзІҫжә–йҒҺжҝҫвҖ”вҖ”еҗҢеҗҚдёҚеҗҢиҷ•зҗҶжі•жҳҜдёҚеҗҢе•Ҷе“ҒпјҲFinca Milan жңү 6 зЁ® culturingпјү */
function rstProcMatch(r,process){
  if(process===undefined)return true;
  return String(r.process||'').trim().toLowerCase()===String(process||'').trim().toLowerCase();
}
function rstBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.remaining_kg)>0&&qcState(r)!=='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
function rstStockKg(name,isBlend,process){
  var s=0;rstBatches(name,isBlend,process).forEach(function(r){s+=Number(r.remaining_kg)||0;});
  return Math.round(s*1000)/1000;
}
/* downgrade жү№ж¬Ўжұ пјҲ2026-07-13 иҖҒй—Ҷе®ҡиӘҝпјҡйҷҚзҙҡиұҶдёҚйҡұеҪўвҖ”вҖ”Coffee Stock её¶жЁҷиЁҳйЎҜзӨәгҖҒжӢјй…Қе„Әе…ҲеҗғпјүгҖӮ
   иҲҮ rstBatches еҗҢеҪўзӢҖдҪҶеҸӘж’Ҳ qc='downgrade'пјӣеҲ»ж„ҸеҲҶжұ пјқдёҚйҖІиЎҖжўқ/зёҪйҮҸ/еҮәиІЁ FIFOпјҲйӮЈдәӣеҸӘз®—еҸҜжӯЈеёёеҮәиІЁзҡ„иұҶпјү */
function rstDgBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.remaining_kg)>0&&qcState(r)==='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
/* еҫ…е…Ҙеә«жү№ж¬ЎпјҲ2026-07-13 иҖҒй—Ҷй»һеҗҚпјҡйҖЈзөҗ roast logвҶ’coffee stockпјүпјқзғҳдәҶдҪҶйӮ„жІ’з§ӨзҶҹиұҶзҡ„жү№ж¬Ў
   пјҲgreen_kg>0 дҪҶ remaining_kg з©ә/0пјүгҖӮеҲ»ж„ҸеҲҶжұ пјҡдёҚйҖІиЎҖжўқ/зёҪйҮҸ/еҮәиІЁпјҢCoffee Stock её¶зҗҘзҸҖжЁҷгҖҢеҫ…з§ӨгҖҚгҖҒ
   й»һиЎҢ openWeighIn иЈңзҶҹиұҶпјқе…Ҙеә«гҖӮqc жү“йҖҖзҡ„дёҚз®—пјҲйӮЈжҳҜеҸҰдёҖеӣһдәӢпјүгҖӮ */
function rstPendingBatches(name,isBlend,process){
  var key=String(name||'').trim().toLowerCase();
  return (DB.roasts||[]).filter(function(r){
    return (isBlend?r.kind==='blend':r.kind!=='blend')&&Number(r.green_kg)>0&&!(Number(r.remaining_kg)>0)&&qcState(r)!=='downgrade'&&String(r.bean_name||'').trim().toLowerCase()===key&&rstProcMatch(r,process);
  }).sort(function(a,b){return String(a.roast_date||'9999')<String(b.roast_date||'9999')?-1:1;});
}
/* еҲҶж®өиЎҖжўқпјҲ2026-07-12 v3 е®ҡзЁҝпјҡйЎҸиүІпјқи©Іжү№ж–°й®®еәҰпјҢи·ЁиұҶдёҖиҮҙпјүпјҡй»ғ=aging(<21d йӨҠиұҶ) з¶ =ready(21-42d)
   зҙ…=fading(>42d) зҒ°=з„Ўж—Ҙжңҹпјӣй–ҫеҖјеҗҢ shelfFreshnessпјӣж®өй–“ 1px зё«гҖӮдҪҺ/и¶…йҮҸдёҚеҶҚж•ҙжўқиҪүзҙ…пјҲзҙ…е·Іжңүж–°ж„Ҹзҫ©пјүпјҢ
   иӯҰзӨәз•ҷеңЁ label зҡ„ low!/over! зҙ…еӯ—гҖӮtarget жІ’иЁӯпјқд»ҘзҸҫйҮҸз•«ж»ҝзүҲгҖӮеӣһеӮі {bar,label,state} */
function rstFreshColor(rd){
  if(!rd)return 'var(--line2)';
  var age=daysSince(rd);
  if(age<SHELF_FRESH_REST)return '#C29036';   /* aging вҖ” еҗҢ .fr-yellow */
  if(age<=SHELF_FRESH_PRIME)return '#3F9A66'; /* ready вҖ” еҗҢ .fr-green */
  return 'var(--danger)';                     /* fading */
}
/* еҗҢж—Ҙжңҹжү№ж¬ЎеҗҲдҪөжҲҗдёҖзө„пјҲ2026-07-12 иҖҒй—Ҷй»һеҗҚпјҡеҗҢдёҖеӨ©зғҳе№ҫйҚӢеңЁ Coffee Stock е°ұжҳҜеҗҢдёҖжү№пјүвҖ”вҖ”
   иіҮж–ҷеұӨеҗ„зӯҶдҝқз•ҷпјҲQC еҲӨе®ҡ/жөҒж°ҙеёідёҚеӢ•пјүпјҢеҸӘжңүйЎҜзӨәиҲҮжүЈиұҶжҢүзө„пјӣзө„е…§з¶ӯжҢҒеҺҹ FIFO й ҶеәҸ */
function rstGroupByDate(batches){
  var out=[],idx={};
  batches.forEach(function(r){
    var k=String(r.roast_date||'');
    if(idx[k]==null){idx[k]=out.length;out.push({date:r.roast_date||null,key:k,kg:0,batches:[]});}
    var g=out[idx[k]];
    g.kg+=Number(r.remaining_kg)||0;
    g.batches.push(r);
  });
  out.forEach(function(g){g.kg=Math.round(g.kg*1000)/1000;});
  return out;
}
function rstBarHTML(batches,target,low){
  var tot=0;batches.forEach(function(r){tot+=Number(r.remaining_kg)||0;});
  tot=Math.round(tot*1000)/1000;
  var t=Number(target)||0,l=Number(low)||0;
  var state=(l>0&&tot<=l)?'low':((t>0&&tot>t)?'over':'ok');
  var denom=t>0?Math.max(t,tot):tot; /* и¶…йҮҸжҷӮеҲҶжҜҚж’җеӨ§еҲ°зҸҫйҮҸпјқз•«ж»ҝдёҚзҲҶжЎҶ */
  var segs='';
  rstGroupByDate(batches).forEach(function(g){
    var w=denom>0?(g.kg/denom*100):0;
    if(w<=0)return;
    segs+='<div style="width:'+w+'%;background:'+rstFreshColor(g.date)+';border-right:1px solid var(--surface)"></div>';
  });
  var label=t>0?(tot+' / '+t+' kg'):(tot+' kg');
  if(state==='low')label+=' В· low!';else if(state==='over')label+=' В· over!';
  return {bar:'<div class="hm-bar" style="display:flex">'+segs+'</div>',label:label,state:state};
}

      /* й…ҚдёҚеҲ°з”ҹиұҶжү№ вҶ’ жҹҘй…Қж–№иЎЁпјҢжҳҜ blend е°ұеҲҮжӢјй…ҚжЁЎејҸеё¶е…ҘпјҲзҶҹиұҶйҮҸдёҚ Г—1.15пјү */

      return '<button class="dclose" disabled style="opacity:.55">'+lab+' В· no green lot</button>';
    }).join('');
  }
  var single=RO.mode==='single';
  var body;
  if(single){
    var lossNow=roastLossPct(RO.kg,RO.out);
    /* Add a batch ијёе…ҘеҚҖпјҲеҗ«жҜҸйҚӢжӣІз·ҡж‘әз–Ҡпјү */
    var addBox='<div class="dlab">Add a batch</div>'
    +'<select class="din" id="ro-bean" style="padding:12px"><option value="">вҖ” pick a bean вҖ”</option>'
    +beans.map(function(b){return '<option value="'+esc(b.id)+'"'+(String(RO.beanId)===String(b.id)?' selected':'')+'>'+(gNo(b)?gNo(b)+' В· ':'')+esc(b.name)+(b.process?' В· '+esc(b.process):'')+' В· '+(Number(b.quantity)||0)+' kg</option>';}).join('')
    +'</select>'
    +(sel?'<div class="s" style="margin-top:4px">stock '+(Number(sel.quantity)||0)+' kg'+(over?' В· <span class=red>exceeds stock</span>':'')+'</div>':'')
    +'<div style="display:flex;gap:8px">'
    +'<div style="flex:1"><div class="dlab">Green in (kg)</div><input class="din" id="ro-kg" inputmode="decimal" placeholder="e.g. 10" value="'+esc(RO.kg)+'"></div>'
    +'<div style="flex:1"><div class="dlab">Roasted out (kg)</div><input class="din" id="ro-out" inputmode="decimal" placeholder="вҖ” optional" value="'+esc(RO.out)+'"></div>'

    +(RO.logOpen?'<div class="dlab">Charge temp В°C</div><input class="din" id="ro-charge" inputmode="decimal" value="'+esc(RO.charge)+'">'
      +'<div class="dlab">First crack mm:ss</div><input class="din" id="ro-fc" placeholder="e.g. 8:30" value="'+esc(RO.fc)+'">'
      +'<div class="dlab">Drop temp В°C</div><input class="din" id="ro-drop" inputmode="decimal" value="'+esc(RO.drop)+'">'
      +'<div class="dlab">Total time mm:ss</div><input class="din" id="ro-dur" placeholder="e.g. 11:20" value="'+esc(RO.dur)+'">':'')
    +'<button class="act" id="ro-add" style="margin-top:10px">пјӢ Add this batch</button>';
    /* This session зҙҜз©ҚеҲ—иЎЁпјӢз”ҹиұҶжүЈйҷӨй җиҰҪ */
    var listBox='';
    if(RO.batches.length){
      var byBeanG={};RO.batches.forEach(function(b){byBeanG[b.beanName]=(byBeanG[b.beanName]||0)+b.green;});
      listBox='<div class="dlab" style="margin-top:14px">This session В· '+RO.batches.length+' batch'+(RO.batches.length>1?'es':'')+'</div>'

        return '<div class="dl" style="align-items:center"><span data-editbatch="'+ix+'" style="cursor:pointer;flex:1;min-width:0"><span class="t" style="font-size:14px">'+esc(bt.beanName)+'</span>'+(bt.process?' <span style="color:var(--muted);font-weight:400;font-size:12px">'+esc(bt.process)+'</span>':'')+'<div class="s">'+line+'</div></span>'

      +Object.keys(byBeanG).map(function(nm){return esc(nm)+' '+(Math.round(byBeanG[nm]*100)/100)+' kg';}).join(' В· ')+'</div></div>';
    }
    body=addBox+listBox;
  }else{
    var bl=RO.blends.find(function(b){return b.name===RO.blendName;})||null;
    var parts=bl?(bl.parts||[]).filter(function(p){return p&&p.bean&&parseFloat(p.pct)>0;}):[];
